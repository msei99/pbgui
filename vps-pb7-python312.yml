---
# Recreate PB7 venv with Python 3.12 on a VPS
# Steps:
# 1. Stop PBRun + PBRemote
# 2. Kill running PB7 processes (bots + workers)
# 3. Install python3.12-venv
# 4. Remove old venv_pb7
# 5. Update pb7 repository (keep current branch)
# 6. Measure disk footprint before reinstall
# 7. Create new python3.12 venv for pb7 + install requirements
# 8. Build passivbot-rust with maturin
# 9. Clean rustup downloads/tmp and print disk usage summary
# 10. Start PBRun + PBRemote

- hosts: "{{ hostname }}"
  gather_facts: true

  vars:
    ansible_become_password: "{{ user_pw }}"
    user: "{{ user }}"
    pb7_requirements_file: "{{ ansible_facts['env']['HOME'] }}/software/pb7/requirements-live.txt"

  tasks:
    - name: display facts
      debug:
        var: ansible_facts
      tags: debug,never

    - name: get install_dir
      set_fact:
        install_dir: "{{ ansible_facts['env']['HOME'] }}/software"

    - name: Stop PBRun + PBRemote
      shell: |
        source "{{ install_dir }}/venv_pbgui/bin/activate"
        python "{{ install_dir }}/pbgui/starter.py" -k PBRun PBRemote
      args:
        executable: /bin/bash
        chdir: "{{ install_dir }}/pbgui"
      ignore_errors: yes

    - name: kill all pb7 processes (bots)
      shell: |
        pids="$(ps -ef | grep "{{ install_dir }}/pb7/src/main.py" | grep -v grep | awk '{print $2}')"
        if [ -n "$pids" ]; then
          kill $pids
        fi
      args:
        executable: /bin/bash
      changed_when: false
      ignore_errors: yes

    - name: kill all pb7 processes (workers using pb7 venv)
      shell: |
        pids="$(ps -ef | grep "{{ install_dir }}/venv_pb7/bin/python" | grep -v grep | awk '{print $2}')"
        if [ -n "$pids" ]; then
          kill $pids
        fi
      args:
        executable: /bin/bash
      changed_when: false
      ignore_errors: yes

    - name: Install python3.12-venv
      apt:
        pkg:
          - python3.12-venv
        update_cache: yes
        clean: yes
      become: yes

    - name: Remove old pb7 venv
      file:
        path: "{{ install_dir }}/venv_pb7"
        state: absent
      become: yes

    - name: Get current pb7 branch
      command: git rev-parse --abbrev-ref HEAD
      args:
        chdir: "{{ install_dir }}/pb7"
      register: current_pb7_branch
      changed_when: false

    - name: update passivbot repository for pb7 (keep current branch)
      git:
        repo: https://github.com/enarjord/passivbot.git
        dest: "{{ install_dir }}/pb7"
        version: "{{ current_pb7_branch.stdout }}"
        update: yes
        force: yes
      register: pb7_repo

    - name: print pb7_repo
      debug:
        var: pb7_repo
      tags: debug,never

    - name: Measure pb7 disk footprint before reinstall
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        echo "free_mb=$(df -Pm '{{ install_dir }}' | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb '{{ install_dir }}/venv_pb7')"
        echo "rust_target_mb=$(path_mb '{{ install_dir }}/pb7/passivbot-rust/target')"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      register: pb7_disk_before
      changed_when: false

    - name: create python3.12 venv for pb7
      pip:
        virtualenv_command: python3.12 -m venv
        virtualenv: "{{ install_dir }}/venv_pb7"
        requirements: "{{ pb7_requirements_file }}"
        extra_args: --no-cache-dir
      environment:
        PIP_NO_CACHE_DIR: "1"
        PIP_DISABLE_PIP_VERSION_CHECK: "1"

    - name: remove pip cache directory
      file:
        path: "{{ ansible_facts['env']['HOME'] }}/.cache/pip"
        state: absent

    - name: clean apt package cache
      apt:
        autoremove: yes
        autoclean: yes
        clean: yes
      become: yes

    - name: Measure pb7 disk footprint after requirements install
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        echo "free_mb=$(df -Pm '{{ install_dir }}' | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb '{{ install_dir }}/venv_pb7')"
        echo "rust_target_mb=$(path_mb '{{ install_dir }}/pb7/passivbot-rust/target')"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      register: pb7_disk_after_deps
      changed_when: false

    - name: Build passivbot-rust with maturin
      shell: |
        source ~/.profile || source ~/.bashrc || true
        source "{{ install_dir }}/venv_pb7/bin/activate"
        maturin develop --release
      args:
        chdir: "{{ install_dir }}/pb7/passivbot-rust"
        executable: /bin/bash
      register: maturin_result

    - name: print maturin result
      debug:
        var: maturin_result
      tags: debug,never

    - name: Measure pb7 disk footprint after Rust build
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        echo "free_mb=$(df -Pm '{{ install_dir }}' | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb '{{ install_dir }}/venv_pb7')"
        echo "rust_target_mb=$(path_mb '{{ install_dir }}/pb7/passivbot-rust/target')"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      register: pb7_disk_after_build
      changed_when: false

    - name: remove rustup downloads directory
      file:
        path: "{{ ansible_facts['env']['HOME'] }}/.rustup/downloads"
        state: absent

    - name: remove rustup tmp directory
      file:
        path: "{{ ansible_facts['env']['HOME'] }}/.rustup/tmp"
        state: absent

    - name: Measure pb7 disk footprint after cleanup
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        echo "free_mb=$(df -Pm '{{ install_dir }}' | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb '{{ install_dir }}/venv_pb7')"
        echo "rust_target_mb=$(path_mb '{{ install_dir }}/pb7/passivbot-rust/target')"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      register: pb7_disk_after_cleanup
      changed_when: false

    - name: Print pb7 disk usage summary
      debug:
        msg:
          - "before: {{ pb7_disk_before.stdout_lines | join(', ') }}"
          - "after_deps: {{ pb7_disk_after_deps.stdout_lines | join(', ') }}"
          - "after_build: {{ pb7_disk_after_build.stdout_lines | join(', ') }}"
          - "after_cleanup: {{ pb7_disk_after_cleanup.stdout_lines | join(', ') }}"
          - "usage_mb: deps={{ free_before_mb - free_after_deps_mb }}, build={{ free_after_deps_mb - free_after_build_mb }}, cleanup_reclaimed={{ free_after_cleanup_mb - free_after_build_mb }}, net={{ free_before_mb - free_after_cleanup_mb }}"
      vars:
        free_before_mb: "{{ (pb7_disk_before.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
        free_after_deps_mb: "{{ (pb7_disk_after_deps.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
        free_after_build_mb: "{{ (pb7_disk_after_build.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
        free_after_cleanup_mb: "{{ (pb7_disk_after_cleanup.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"

    - name: Start PBRun + PBRemote
      shell: |
        source "{{ install_dir }}/venv_pbgui/bin/activate"
        python "{{ install_dir }}/pbgui/starter.py" -s PBRun PBRemote
      args:
        executable: /bin/bash
        chdir: "{{ install_dir }}/pbgui"
