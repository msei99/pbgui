---
# Clenaup vps
# Steps:
# 1. Remove snap
# 2. Clean up apt cache
# 3. Clean up pip cache
# 4. Clean up rustup downloads/tmp
# 5. Clear systemd journal logs

- hosts: "{{ hostname }}"
  gather_facts: "{{ debug }}"

  vars:
    # ansible_ssh_pass: "{{ user_pw }}"
    ansible_become_password: "{{ user_pw }}"
    user: "{{ user }}"
    # user_pw: "{{ user_pw }}"
    reboot: "{{ reboot }}"

  tasks:
    - name: display facts
      debug:
        var: ansible_facts
      tags: debug,never

    - name: get remote home and install_dir
      shell: printf '%s' "$HOME"
      args:
        executable: /bin/bash
      register: remote_home_result
      changed_when: false

    - name: set install_dir
      set_fact:
        install_dir: "{{ remote_home_result.stdout + '/software' }}"

    - name: install daily user cleanup cron job
      cron:
        name: "pbgui-cleanup-user"
        minute: "17"
        hour: "4"
        job: '"{{ install_dir }}/pbgui/setup/vps_cleanup_job.sh" >/dev/null 2>&1'

    - name: install daily journal cleanup cron job
      cron:
        name: "pbgui-cleanup-journal"
        minute: "27"
        hour: "4"
        user: root
        job: 'journalctl --vacuum-time=1d >/dev/null 2>&1'
      become: yes

    - name: run local user-space cleanup job
      script: setup/vps_cleanup_job.sh
      register: local_cleanup_result
      changed_when: "'changed=1' in local_cleanup_result.stdout"

    - name: print local cleanup result
      debug:
        var: local_cleanup_result

    - name: remove snap
      apt:
        name: snapd
        state: absent
      become: yes
      register: snap_result
    
    - name: print snap removal result
      debug:
        var: snap_result
    
    - name: clean apt cache
      apt:
        autoclean: yes
        autoremove: yes
        clean: yes
        cache_valid_time: 3600
      become: yes
      register: apt_cleanup_result

    - name: print apt cleanup result
      debug:
        var: apt_cleanup_result

    - name: clear systemd journal logs
      command: journalctl --vacuum-time=1d
      become: yes
      register: journal_cleanup_result

    - name: print journal cleanup result
      debug:
        var: journal_cleanup_result
