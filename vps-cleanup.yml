---
# Clenaup vps
# Steps:
# 1. Remove snap
# 2. Remove legacy PBRemote rclone package
# 3. Clean up apt cache
# 4. Clean up pip cache
# 5. Clean up rustup downloads/tmp
# 6. Clear systemd journal logs

- hosts: "{{ hostname }}"
  gather_facts: "{{ debug }}"

  vars:
    # ansible_ssh_pass: "{{ user_pw }}"
    ansible_become_password: "{{ user_pw }}"
    user: "{{ user }}"
    # user_pw: "{{ user_pw }}"
    reboot: "{{ reboot }}"

  tasks:
    - name: display facts
      debug:
        var: ansible_facts
      tags: debug,never

    - name: detect remote pbgui dir
      shell: |
        python3 - <<'PY'
        from pathlib import Path

        home = Path.home().resolve()
        preferred = [
            home / 'software' / 'pbgui',
            home / 'pbgui',
        ]
        seen = set()

        def is_pbgui_root(path: Path) -> bool:
            return (
                (path / 'pbgui.ini').is_file()
                and (path / 'setup' / 'vps_cleanup_job.sh').is_file()
                and (path / 'starter.py').is_file()
            )

        for candidate in preferred:
            resolved = candidate.resolve()
            if str(resolved) in seen:
                continue
            seen.add(str(resolved))
            if is_pbgui_root(resolved):
                print(resolved)
                raise SystemExit(0)

        max_depth = 4
        for path in home.rglob('pbgui.ini'):
            try:
                root = path.parent.resolve()
            except Exception:
                continue
            if str(root) in seen:
                continue
            seen.add(str(root))
            try:
                depth = len(root.relative_to(home).parts)
            except Exception:
                continue
            if depth > max_depth:
                continue
            if is_pbgui_root(root):
                print(root)
                raise SystemExit(0)

        raise SystemExit(1)
        PY
      args:
        executable: /bin/bash
      register: remote_pbgui_dir_result
      changed_when: false

    - name: fail when remote pbgui dir is missing
      fail:
        msg: "Could not detect remote PBGui install directory"
      when: remote_pbgui_dir_result.stdout | trim == ""

    - name: set pbgui paths
      set_fact:
        pbgui_dir: "{{ remote_pbgui_dir_result.stdout | trim }}"
        install_dir: "{{ (remote_pbgui_dir_result.stdout | trim) | dirname }}"

    - name: install daily user cleanup cron job
      cron:
        name: "pbgui-cleanup-user"
        minute: "17"
        hour: "4"
        job: 'PBGUI_DIR="{{ pbgui_dir }}" "{{ pbgui_dir }}/setup/vps_cleanup_job.sh"'

    - name: install daily journal cleanup cron job
      cron:
        name: "pbgui-cleanup-journal"
        minute: "27"
        hour: "4"
        user: root
        job: 'journalctl --vacuum-time=1d >/dev/null 2>&1'
      become: yes

    - name: run local user-space cleanup job
      script: setup/vps_cleanup_job.sh
      environment:
        PBGUI_DIR: "{{ pbgui_dir }}"
      register: local_cleanup_result
      changed_when: "'changed=1' in local_cleanup_result.stdout"

    - name: print local cleanup result
      debug:
        var: local_cleanup_result

    - name: remove snap
      apt:
        name: snapd
        state: absent
      become: yes
      register: snap_result
    
    - name: print snap removal result
      debug:
        var: snap_result

    - name: remove legacy rclone package
      apt:
        name: rclone
        state: absent
      become: yes
      register: rclone_result

    - name: print rclone removal result
      debug:
        var: rclone_result
    
    - name: clean apt cache
      apt:
        autoclean: yes
        autoremove: yes
        clean: yes
        cache_valid_time: 3600
      become: yes
      register: apt_cleanup_result

    - name: print apt cleanup result
      debug:
        var: apt_cleanup_result

    - name: clear systemd journal logs
      command: journalctl --vacuum-time=1d
      become: yes
      register: journal_cleanup_result

    - name: print journal cleanup result
      debug:
        var: journal_cleanup_result
