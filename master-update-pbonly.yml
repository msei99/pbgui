---
# Update PB7 on localhost
# Steps:
# 1. Update Rust toolchain
# 2. Clone passivbot repository for pb7
# 3. Restart all pb7 bots if pb7 repository was updated

- hosts: localhost
  gather_facts: "{{ debug }}"

  vars:
    # ansible_ssh_pass: "{{ user_pw }}"
    # ansible_become_password: "{{ user_pw }}"
    user: "{{ user }}"
    pbgdir: "{{ pbgdir }}"
    pbgvenv: "{{ pbgvenv }}"
    pb7dir: "{{ pb7dir }}"
    pb7venv: "{{ pb7venv }}"
    pb7_ref: "{{ lookup('file', playbook_dir + '/pb7_ref.txt') | trim }}"
    # user_pw: "{{ user_pw }}"

  tasks:
    - name: display facts
      debug:
        var: ansible_facts
      tags: debug,never

    - name: remove stable toolchain if exists
      shell: |
        source ~/.profile || source ~/.bashrc || true
        rustup toolchain uninstall stable 1.78.0
      args:
        executable: /bin/bash
      ignore_errors: yes

    - name: Update rust
      shell: |
        source ~/.profile || source ~/.bashrc || true
        rustup update 1.90.0
      args:
        executable: /bin/bash
      register: update_rust

    - name: print update_rust
      debug:
        var: update_rust
      tags: debug,never

    - name: Validate pinned PB7 commit
      assert:
        that:
          - pb7_ref is match('^[0-9a-f]{40}$')
        fail_msg: "pb7_ref.txt must contain one exact lowercase 40-character commit SHA."

    - name: Fetch and verify pinned Passivbot v7
      command:
        argv:
          - python3
          - "{{ pbgdir }}/pb7_guard.py"
          - --repo
          - "{{ pb7dir }}"
          - --ref
          - "{{ pb7_ref }}"
          - --expected-major
          - "7"
          - --fetch-url
          - https://github.com/enarjord/passivbot.git
      register: pb7_preflight
      changed_when: false
      when: pb7dir != ""

    - name: Stop PBRun before changing PB7 checkout
      command:
        argv:
          - "{{ pbgui_python | default(ansible_playbook_python) }}"
          - "{{ pbgdir }}/starter.py"
          - --stop
          - PBRun
      changed_when: false
      when: pb7dir != "" and 'checkout_required=true' in pb7_preflight.stdout

    - name: Stop PB7 processes before changing checkout
      command:
        argv:
          - python3
          - "{{ pbgdir }}/pb7_guard.py"
          - --repo
          - "{{ pb7dir }}"
          - --ref
          - "{{ pb7_ref }}"
          - --expected-major
          - "7"
          - --stop-processes
          - --venv
          - "{{ pb7venv }}"
      changed_when: false
      when: pb7dir != "" and 'checkout_required=true' in pb7_preflight.stdout

    - name: Checkout verified pinned Passivbot v7
      command:
        argv:
          - python3
          - "{{ pbgdir }}/pb7_guard.py"
          - --repo
          - "{{ pb7dir }}"
          - --ref
          - "{{ pb7_ref }}"
          - --expected-major
          - "7"
          - --checkout
      register: pb7_repo
      changed_when: "'checkout_changed=true' in pb7_repo.stdout"
      when: pb7dir != ""
      notify: restart pb7

    - name: print pb7_repo
      debug:
        var: pb7_repo
      tags: debug,never

  handlers:
    - name: Stop PBRun before PB7 rebuild
      command:
        argv:
          - "{{ pbgui_python | default(ansible_playbook_python) }}"
          - "{{ pbgdir }}/starter.py"
          - --stop
          - PBRun
      changed_when: false
      listen: "restart pb7"
      ignore_errors: yes

    - name: kill all pb7 processes
      shell: |
        pids="$({
          ps -ef | grep "{{ pb7dir }}/src/main.py" | grep -v grep | awk '{print $2}'
          ps -ef | grep "{{ pb7venv }}/bin/python" | grep -v grep | awk '{print $2}'
        } | sort -u)"
        if [ -n "$pids" ]; then
          kill $pids
        fi
      args:
        executable: /bin/bash
      changed_when: false
      listen: "restart pb7"
      ignore_errors: yes

    - name: Install pb7 requirements
      pip:
        virtualenv: "{{ pb7venv }}"
        requirements: "{{ pb7dir }}/requirements.txt"
        extra_args: --upgrade pip
      listen: "restart pb7"

    - name: Build passivbot-rust with maturin
      shell: |
        source ~/.profile || source ~/.bashrc || true
        source "{{ pb7venv }}/bin/activate"
        maturin develop --release
      args:
        chdir: "{{ pb7dir }}/passivbot-rust"
        executable: /bin/bash
      register: maturin_result
      listen: "restart pb7"

    - name: Write rust source stamp after maturin build
      shell: |
        source "{{ pb7venv }}/bin/activate"
        python - <<'PY'
        import sys
        sys.path.insert(0, 'src')
        from rust_utils import stamp_compiled_extensions, source_fingerprint
        stamp_compiled_extensions(source_fingerprint())
        print('Rust source stamp updated.')
        PY
      args:
        chdir: "{{ pb7dir }}"
        executable: /bin/bash
      listen: "restart pb7"

    - name: Make sure PBRun ist running
      shell: |
        "{{ pbgui_python | default(ansible_playbook_python) }}" "{{ pbgdir }}/starter.py" -s PBRun
      args:
        executable: /bin/bash
        chdir: "{{ pbgdir }}"
      listen: "restart pb7"
