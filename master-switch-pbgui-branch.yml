---
# Switch pbgui branch/commit on localhost
# Steps:
# 1. Fetch all branches from origin
# 2. Discard tracked local changes by default, matching normal PBGui updates
# 3. Checkout specified branch
# 4. Optionally reset to specific commit (stays on branch)
# 5. Pull if on branch HEAD (no specific commit)
# 6. Sync systemd units and restart PBCluster/PBCoinData/PBMonitorAgent

- hosts: localhost
  gather_facts: "{{ debug }}"
  force_handlers: true

  vars:
    pbgdir: "{{ pbgdir }}"
    target_branch: "{{ branch }}"
    target_commit: "{{ commit | default('') }}"

  tasks:
    - name: display facts
      debug:
        var: ansible_facts
      tags: debug,never

    - name: Fetch all branches from origin
      command: git fetch --prune origin +refs/heads/*:refs/remotes/origin/*
      args:
        chdir: "{{ pbgdir }}"
      when: pbgdir != ""
      changed_when: false

    - name: Check for uncommitted changes (tracked files only)
      shell: git diff --name-only && git diff --cached --name-only
      args:
        chdir: "{{ pbgdir }}"
      register: git_status
      changed_when: false

    - name: Discard uncommitted tracked changes when forced
      command: git reset --hard
      args:
        chdir: "{{ pbgdir }}"
      when: git_status.stdout != "" and (force_local_changes | default(true) | bool)

    - name: Fail if uncommitted changes exist and force is disabled
      fail:
        msg: "Uncommitted changes detected. Please commit or stash changes before switching branches."
      when: git_status.stdout != "" and not (force_local_changes | default(true) | bool)

    - name: Check if branch exists locally
      command: git rev-parse --verify "{{ target_branch }}"
      args:
        chdir: "{{ pbgdir }}"
      register: branch_exists
      failed_when: false
      changed_when: false

    - name: Create and checkout local branch from remote if it doesn't exist
      command: git checkout -b "{{ target_branch }}" "refs/remotes/origin/{{ target_branch }}"
      args:
        chdir: "{{ pbgdir }}"
      when: branch_exists.rc != 0
      notify: restart pbgui

    - name: Checkout target branch if it already exists locally
      command: git checkout "{{ target_branch }}"
      args:
        chdir: "{{ pbgdir }}"
      when: branch_exists.rc == 0
      register: checkout_result
      notify: restart pbgui

    - name: Reset to specific commit if provided (stays on branch)
      command: git reset --hard "{{ target_commit }}"
      args:
        chdir: "{{ pbgdir }}"
      when: target_commit != ""
      register: commit_reset
      notify: restart pbgui

    - name: Reset to latest remote HEAD (only if no specific commit provided)
      command: git reset --hard "origin/{{ target_branch }}"
      args:
        chdir: "{{ pbgdir }}"
      when: target_commit == ""
      register: pull_result
      notify: restart pbgui

    - name: Display checkout result
      debug:
        msg: |
          Branch: {{ target_branch }}
          Commit: {{ target_commit if target_commit != '' else 'HEAD' }}
          Status: Switched successfully
      tags: debug,never

    - name: Check required PBGui systemd units
      shell: |
        target_user={{ user | default('', true) | quote }}
        target_home=""
        if [ -n "$target_user" ]; then
          target_home="$(getent passwd "$target_user" | cut -d: -f6)"
        fi
        unit_dir="${target_home:-$HOME}/.config/systemd/user"
        required_units="pbgui-api.service"
        starter_help="$({{ ansible_playbook_python }} "{{ pbgdir }}/starter.py" -h 2>&1 || true)"
        if printf '%s' "$starter_help" | grep -q 'PBCluster'; then
          required_units="pbgui-api.service pbgui-pbcluster.service pbgui-pbcoindata.service pbgui-monitor-agent.service"
        fi
        uid="$(id -u "$target_user" 2>/dev/null || id -u)"
        run_user_systemctl() {
          env XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/$uid}" systemctl --user "$@" 2>/dev/null || true
        }
        for unit in $required_units; do
          if [ ! -f "$unit_dir/$unit" ]; then
            echo "repair=missing:$unit"
            continue
          fi
          enabled="$(run_user_systemctl is-enabled "$unit")"
          active="$(run_user_systemctl is-active "$unit")"
          case "$enabled" in enabled|enabled-runtime) ;; *) echo "repair=disabled:$unit:$enabled" ;; esac
          case "$active" in active|activating|reloading) ;; *) echo "repair=inactive:$unit:$active" ;; esac
        done
      args:
        executable: /bin/bash
      register: required_systemd_units
      changed_when: "'repair=' in required_systemd_units.stdout"
      notify: restart pbgui

  handlers:
    - name: Install pbgui requirements
      pip:
        requirements: "{{ pbgdir }}/requirements.txt"
        extra_args: --upgrade
      listen: "restart pbgui"

    - name: Sync PBGui systemd user services
      shell: |
        set -euo pipefail
        setup_script="{{ pbgdir }}/setup/setup_systemd.sh"
        enable_services="api,pbrun,pbdata,pbcoindata"
        starter_help="$({{ ansible_playbook_python }} "{{ pbgdir }}/starter.py" -h 2>&1 || true)"
        if printf '%s' "$starter_help" | grep -q 'PBCluster'; then
          enable_services="api,pbcluster,pbcoindata,monitor-agent"
        fi
        args=("$setup_script" --pbgui-dir "{{ pbgdir }}" --python "{{ ansible_playbook_python }}" --enable "$enable_services" --no-start)
        if /bin/bash "$setup_script" --help 2>&1 | grep -q -- '--no-disable-excluded'; then
          args+=(--no-disable-excluded)
        fi
        /bin/bash "${args[@]}"
      args:
        executable: /bin/bash
      register: systemd_setup_result
      changed_when: systemd_setup_result.rc == 0
      listen: "restart pbgui"

    - name: Restart PBGui services for target branch
      shell: |
        set -euo pipefail
        starter_help="$({{ ansible_playbook_python }} "{{ pbgdir }}/starter.py" -h 2>&1 || true)"
        if printf '%s' "$starter_help" | grep -q 'PBCluster'; then
          PBGUI_DIR="{{ pbgdir }}" PBGUI_PYTHON="{{ ansible_playbook_python }}" \
            /bin/bash "{{ pbgdir }}/setup/vps_service_control.sh" restart PBCluster PBCoinData PBMonitorAgent
          exit 0
        fi
        services=(PBRun PBCoinData)
        if printf '%s' "$starter_help" | grep -q 'PBRemote'; then
          services=(PBRun PBRemote PBCoinData)
        fi
        cd "{{ pbgdir }}"
        "{{ ansible_playbook_python }}" "{{ pbgdir }}/starter.py" -r "${services[@]}"
      args:
        executable: /bin/bash
      environment:
        PBGUI_DIR: "{{ pbgdir }}"
        PBGUI_PYTHON: "{{ ansible_playbook_python }}"
        PBGUI_REQUIRE_PBCOINDATA: "1"
      listen: "restart pbgui"

    - name: Restart PBApiServer
      shell: |
        set -euo pipefail
        restart_unit="pbgui-api-restart-$(date +%s%N)"
        systemd-run --user --unit="$restart_unit" --collect /bin/bash -lc 'sleep 1; systemctl --user enable pbgui-api.service; systemctl --user restart pbgui-api.service'
      args:
        executable: /bin/bash
      changed_when: true
      listen: "restart pbgui"
