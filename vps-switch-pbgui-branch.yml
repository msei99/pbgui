---
# Switch pbgui branch/commit on VPS
# Steps:
# 1. Fetch from origin
# 2. Check for uncommitted changes (fail if found)
# 3. Checkout specified branch
# 4. Optionally reset to specific commit (stays on branch)
# 5. Pull if on branch HEAD (no specific commit)
# 6. Restart pbgui services

- hosts: "{{ hostname }}"
  gather_facts: yes

  vars:
    user: "{{ user }}"
    target_branch: "{{ branch }}"
    target_commit: "{{ commit | default('') }}"
    install_dir: "{{ install_dir | default(ansible_facts['env']['HOME'] + '/software') }}"
    pbgdir: "{{ install_dir }}/pbgui"

  tasks:
    - name: display facts
      debug:
        var: ansible_facts
      tags: debug,never

    - name: Fetch from origin
      command: git fetch origin
      args:
        chdir: "{{ pbgdir }}"
      changed_when: false

    - name: Check for uncommitted changes (tracked files only)
      shell: git diff --name-only && git diff --cached --name-only
      args:
        chdir: "{{ pbgdir }}"
      register: git_status
      changed_when: false

    - name: Fail if uncommitted changes exist
      fail:
        msg: "Uncommitted changes detected. Please commit or stash changes before switching branches."
      when: git_status.stdout != ""

    - name: Check if branch exists locally
      command: git rev-parse --verify "{{ target_branch }}"
      args:
        chdir: "{{ pbgdir }}"
      register: branch_exists
      failed_when: false
      changed_when: false

    - name: Create and checkout local branch from remote if it doesn't exist
      command: git checkout -b "{{ target_branch }}" --track "origin/{{ target_branch }}"
      args:
        chdir: "{{ pbgdir }}"
      when: branch_exists.rc != 0
      notify: restart pbgui

    - name: Checkout target branch (if already exists locally)
      command: git checkout "{{ target_branch }}"
      args:
        chdir: "{{ pbgdir }}"
      when: branch_exists.rc == 0
      notify: restart pbgui

    - name: Reset to specific commit if provided (stays on branch)
      command: git reset --hard "{{ target_commit }}"
      args:
        chdir: "{{ pbgdir }}"
      when: target_commit != ""
      register: commit_reset
      notify: restart pbgui

    - name: Reset to latest remote HEAD (only if no specific commit provided)
      command: git reset --hard "origin/{{ target_branch }}"
      args:
        chdir: "{{ pbgdir }}"
      when: target_commit == ""
      notify: restart pbgui

  handlers:
    - name: Install pbgui requirements
      pip:
        virtualenv: "{{ install_dir }}/venv_pbgui"
        requirements: "{{ install_dir }}/pbgui/requirements_vps.txt"
        extra_args: --no-cache-dir --upgrade pip
      environment:
        PIP_NO_CACHE_DIR: "1"
        PIP_DISABLE_PIP_VERSION_CHECK: "1"
      listen: "restart pbgui"

    - name: Remove pip cache directory
      file:
        path: "{{ install_dir | dirname }}/.cache/pip"
        state: absent
      listen: "restart pbgui"

    - name: Restart PBRun, PBRemote and PBCoinData
      script: setup/vps_service_control.sh restart PBRun PBRemote PBCoinData
      environment:
        PBGUI_DIR: "{{ install_dir }}/pbgui"
        PBGUI_PYTHON: "{{ install_dir }}/venv_pbgui/bin/python"
        PBGUI_USER: "{{ user }}"
      listen: "restart pbgui"
