---
# Switch pbgui branch/commit on VPS
# Steps:
# 1. Fetch all branches from origin
# 2. Discard tracked local changes by default, matching normal PBGui updates
# 3. Checkout specified branch
# 4. Optionally reset to specific commit (stays on branch)
# 5. Pull if on branch HEAD (no specific commit)
# 6. Sync PBGui systemd units and restart pbgui services

- hosts: "{{ hostname }}"
  gather_facts: yes

  vars:
    target_branch: "{{ branch }}"
    target_commit: "{{ commit | default('') }}"
    install_dir: "{{ install_dir | default(ansible_facts['env']['HOME'] + '/software') }}"
    pbgdir: "{{ install_dir }}/pbgui"

  tasks:
    - name: display facts
      debug:
        var: ansible_facts
      tags: debug,never

    - name: Fetch all branches from origin
      command: git fetch --prune origin +refs/heads/*:refs/remotes/origin/*
      args:
        chdir: "{{ pbgdir }}"
      changed_when: false

    - name: Check for uncommitted changes (tracked files only)
      shell: git diff --name-only && git diff --cached --name-only
      args:
        chdir: "{{ pbgdir }}"
      register: git_status
      changed_when: false

    - name: Discard uncommitted tracked changes when forced
      command: git reset --hard
      args:
        chdir: "{{ pbgdir }}"
      when: git_status.stdout != "" and (force_local_changes | default(true) | bool)

    - name: Fail if uncommitted changes exist and force is disabled
      fail:
        msg: "Uncommitted changes detected. Please commit or stash changes before switching branches."
      when: git_status.stdout != "" and not (force_local_changes | default(true) | bool)

    - name: Check if branch exists locally
      command: git rev-parse --verify "{{ target_branch }}"
      args:
        chdir: "{{ pbgdir }}"
      register: branch_exists
      failed_when: false
      changed_when: false

    - name: Create and checkout local branch from remote if it doesn't exist
      command: git checkout -b "{{ target_branch }}" "refs/remotes/origin/{{ target_branch }}"
      args:
        chdir: "{{ pbgdir }}"
      when: branch_exists.rc != 0
      notify: restart pbgui

    - name: Checkout target branch (if already exists locally)
      command: git checkout "{{ target_branch }}"
      args:
        chdir: "{{ pbgdir }}"
      when: branch_exists.rc == 0
      notify: restart pbgui

    - name: Reset to specific commit if provided (stays on branch)
      command: git reset --hard "{{ target_commit }}"
      args:
        chdir: "{{ pbgdir }}"
      when: target_commit != ""
      register: commit_reset
      notify: restart pbgui

    - name: Reset to latest remote HEAD (only if no specific commit provided)
      command: git reset --hard "origin/{{ target_branch }}"
      args:
        chdir: "{{ pbgdir }}"
      when: target_commit == ""
      notify: restart pbgui

    - name: Check required PBGui systemd units
      shell: |
        target_user={{ user | default('', true) | quote }}
        target_home=""
        if [ -n "$target_user" ]; then
          target_home="$(getent passwd "$target_user" | cut -d: -f6)"
        fi
        unit_dir="${target_home:-$HOME}/.config/systemd/user"
        for unit in pbgui-pbcluster.service pbgui-pbrun.service; do
          if [ ! -f "$unit_dir/$unit" ]; then
            echo "missing=$unit"
          fi
        done
      args:
        executable: /bin/bash
      register: required_systemd_units
      changed_when: "'missing=' in required_systemd_units.stdout"
      notify: restart pbgui

  handlers:
    - name: Install pbgui requirements
      pip:
        virtualenv: "{{ install_dir }}/venv_pbgui"
        requirements: "{{ install_dir }}/pbgui/requirements_vps.txt"
        extra_args: --no-cache-dir --upgrade pip
      environment:
        PIP_NO_CACHE_DIR: "1"
        PIP_DISABLE_PIP_VERSION_CHECK: "1"
      listen: "restart pbgui"

    - name: Remove pip cache directory
      file:
        path: "{{ install_dir | dirname }}/.cache/pip"
        state: absent
      listen: "restart pbgui"

    - name: Ensure PBCluster SSH key exists
      command:
        argv:
          - "{{ install_dir }}/venv_pbgui/bin/python"
          - "{{ install_dir }}/pbgui/cluster_ssh_setup.py"
          - ensure-local
          - --pbgdir
          - "{{ install_dir }}/pbgui"
      register: cluster_sync_key_setup
      changed_when: "'\"created\": true' in cluster_sync_key_setup.stdout"
      listen: "restart pbgui"

    - name: Install master PBCluster authorized key
      command:
        argv:
          - "{{ install_dir }}/venv_pbgui/bin/python"
          - "{{ install_dir }}/pbgui/cluster_ssh_setup.py"
          - install-authorized-key
          - --pbgdir
          - "{{ install_dir }}/pbgui"
          - --source-node
          - "{{ cluster_sync_source_node_id }}"
          - --source-public-key
          - "{{ cluster_sync_source_public_key }}"
      register: cluster_sync_authorized_key
      changed_when: "'\"changed\": true' in cluster_sync_authorized_key.stdout"
      when: (cluster_sync_source_node_id | default('') | string | length) > 0 and (cluster_sync_source_public_key | default('') | string | length) > 0
      listen: "restart pbgui"

    - name: Read PBGui optional service config
      shell: |
        PBGUI_CONFIG_PATH={{ install_dir | quote }}/pbgui/pbgui.ini python3 - <<'PY'
        import configparser
        import os

        config = configparser.ConfigParser()
        config.read(os.environ.get('PBGUI_CONFIG_PATH') or '')

        def configured(value):
            normalized = str(value or '').strip()
            lowered = normalized.lower()
            if not normalized or lowered in {'none', 'null', 'false', '<api_key>'}:
                return False
            return not normalized.startswith('<')

        print('coindata_configured=' + ('yes' if configured(config.get('coinmarketcap', 'api_key', fallback='')) else 'no'))
        PY
      args:
        executable: /bin/bash
      register: optional_service_config
      changed_when: false
      listen: "restart pbgui"

    - name: Build enabled PBGui service list
      set_fact:
        pbgui_enabled_services: "{{ ['pbcluster', 'pbrun'] + (['pbcoindata'] if ('coindata_configured=yes' in optional_service_config.stdout_lines) else []) }}"
      listen: "restart pbgui"

    - name: Sync PBGui systemd user services
      command:
        argv:
          - /bin/bash
          - "{{ install_dir }}/pbgui/setup/setup_systemd.sh"
          - --user
          - "{{ user }}"
          - --pbgui-dir
          - "{{ install_dir }}/pbgui"
          - --python
          - "{{ install_dir }}/venv_pbgui/bin/python"
          - --enable
          - "{{ pbgui_enabled_services | join(',') }}"
          - --no-start
      register: systemd_setup_result
      changed_when: systemd_setup_result.rc == 0
      listen: "restart pbgui"

    - name: Restart PBCluster, PBRun and PBCoinData
      script: setup/vps_service_control.sh restart PBCluster PBRun PBCoinData
      environment:
        PBGUI_DIR: "{{ install_dir }}/pbgui"
        PBGUI_PYTHON: "{{ install_dir }}/venv_pbgui/bin/python"
        PBGUI_USER: "{{ user }}"
      listen: "restart pbgui"
