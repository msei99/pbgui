---
# Update pbgui and pb7 on localhost
# Steps:
# 1. Clone pbgui repository
# 2. Sync PBGui systemd units and restart PBCluster/PBCoinData/PBMonitorAgent if pbgui repository was updated
# 3. Clone passivbot repository for pb7
# 4. Restart all pb7 bots if pb7 repository was updated

- hosts: localhost
  gather_facts: "{{ debug }}"
  force_handlers: true

  vars:
    # ansible_ssh_pass: "{{ user_pw }}"
    # ansible_become_password: "{{ user_pw }}"
    pbgdir: "{{ pbgdir }}"
    pb7dir: "{{ pb7dir }}"
    pb7venv: "{{ pb7venv }}"
    # user_pw: "{{ user_pw }}"

  tasks:
    - name: display facts
      debug:
        var: ansible_facts
      tags: debug,never

    - name: remove stable toolchain if exists
      shell: |
        source ~/.profile || source ~/.bashrc || true
        rustup toolchain uninstall stable 1.78.0
      args:
        executable: /bin/bash
      ignore_errors: yes

    - name: Update rust
      shell: |
        source ~/.profile || source ~/.bashrc || true
        rustup update 1.90.0
      args:
        executable: /bin/bash
      register: update_rust

    - name: print update_rust
      debug:
        var: update_rust
      tags: debug,never

    - name: Get current pbgui branch
      command: git rev-parse --abbrev-ref HEAD
      args:
        chdir: "{{ pbgdir }}"
      register: current_pbgui_branch
      changed_when: false
      when: pbgdir != ""

    - name: clone pbgui repository
      git:
        repo: https://github.com/msei99/pbgui.git
        dest: "{{ pbgdir }}"
        version: "{{ current_pbgui_branch.stdout }}"
        update: yes
        force: yes
      when: pbgdir != ""
      register: pbgui_repo
      notify: restart pbgui

    - name: print pbgui_repo
      debug:
        var: pbgui_repo
      tags: debug,never

    - name: Get current pb7 branch
      command: git rev-parse --abbrev-ref HEAD
      args:
        chdir: "{{ pb7dir }}"
      register: current_pb7_branch
      changed_when: false
      when: pb7dir != ""

    - name: clone passivbot repository for pb7
      git:
        repo: https://github.com/enarjord/passivbot.git
        dest: "{{ pb7dir }}"
        version: "{{ current_pb7_branch.stdout }}"
        update: yes
        force: yes
      when: pb7dir != ""
      register: pb7_repo
      notify: restart pb7

    - name: Check required PBGui systemd units
      shell: |
        target_user={{ user | default('', true) | quote }}
        target_home=""
        if [ -n "$target_user" ]; then
          target_home="$(getent passwd "$target_user" | cut -d: -f6)"
        fi
        unit_dir="${target_home:-$HOME}/.config/systemd/user"
        uid="$(id -u "$target_user" 2>/dev/null || id -u)"
        run_user_systemctl() {
          env XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/$uid}" systemctl --user "$@" 2>/dev/null || true
        }
        for unit in pbgui-api.service pbgui-pbcluster.service pbgui-pbcoindata.service pbgui-monitor-agent.service; do
          if [ ! -f "$unit_dir/$unit" ]; then
            echo "repair=missing:$unit"
            continue
          fi
          if [ "$unit" != "pbgui-api.service" ]; then
            enabled="$(run_user_systemctl is-enabled "$unit")"
            active="$(run_user_systemctl is-active "$unit")"
            case "$enabled" in enabled|enabled-runtime) ;; *) echo "repair=disabled:$unit:$enabled" ;; esac
            case "$active" in active|activating|reloading) ;; *) echo "repair=inactive:$unit:$active" ;; esac
          fi
        done
      args:
        executable: /bin/bash
      when: pbgdir != ""
      register: required_systemd_units
      changed_when: "'repair=' in required_systemd_units.stdout"
      notify: restart pbgui

    - name: print pb7_repo
      debug:
        var: pb7_repo
      tags: debug,never

  handlers:
    - name: Install pbgui requirements
      pip:
        requirements: "{{ pbgdir }}/requirements.txt"
        extra_args: --upgrade pip
      listen: "restart pbgui"

    - name: Sync PBGui systemd user services
      command:
        argv:
          - /bin/bash
          - "{{ pbgdir }}/setup/setup_systemd.sh"
          - --pbgui-dir
          - "{{ pbgdir }}"
          - --python
          - "{{ ansible_playbook_python }}"
          - --enable
          - api,pbcluster,pbcoindata,monitor-agent
          - --no-disable-excluded
          - --no-start
      register: systemd_setup_result
      changed_when: systemd_setup_result.rc == 0
      listen: "restart pbgui"

    - name: Restart PBCluster, PBCoinData and PBMonitorAgent
      script: setup/vps_service_control.sh restart PBCluster PBCoinData PBMonitorAgent
      environment:
        PBGUI_DIR: "{{ pbgdir }}"
        PBGUI_PYTHON: "{{ ansible_playbook_python }}"
        PBGUI_REQUIRE_PBCOINDATA: "1"
      listen: "restart pbgui"

    - name: Restart PBApiServer
      shell: |
        set -euo pipefail
        restart_unit="pbgui-api-restart-$(date +%s%N)"
        systemd-run --user --unit="$restart_unit" --collect /bin/bash -lc 'sleep 1; systemctl --user enable pbgui-api.service; systemctl --user restart pbgui-api.service'
      args:
        executable: /bin/bash
      changed_when: true
      listen: "restart pbgui"

    - name: Install pb7 requirements
      pip:
        virtualenv: "{{ pb7venv }}"
        requirements: "{{ pb7dir }}/requirements.txt"
        extra_args: --upgrade pip
      listen: "restart pb7"

    - name: Build passivbot-rust with maturin
      shell: |
        source ~/.profile || source ~/.bashrc || true
        source "{{ pb7venv }}/bin/activate"
        maturin develop --release
      args:
        chdir: "{{ pb7dir }}/passivbot-rust"
        executable: /bin/bash
      listen: "restart pb7"

    - name: Write rust source stamp after maturin build
      shell: |
        source "{{ pb7venv }}/bin/activate"
        python - <<'PY'
        import sys
        sys.path.insert(0, 'src')
        from rust_utils import stamp_compiled_extensions, source_fingerprint
        stamp_compiled_extensions(source_fingerprint())
        print('Rust source stamp updated.')
        PY
      args:
        chdir: "{{ pb7dir }}"
        executable: /bin/bash
      listen: "restart pb7"

    - name: kill all pb7 processes
      shell: |
        pids="$(ps -ef | grep "{{ pb7dir }}/src/main.py" | grep -v grep | awk '{print $2}')"
        if [ -n "$pids" ]; then
          kill $pids
        fi
      args:
        executable: /bin/bash
      changed_when: false
      listen: "restart pb7"
      ignore_errors: yes
    
    - name: Make sure PBRun ist running
      shell: |
        python "{{ pbgdir }}/starter.py" -s PBRun
      args:
        executable: /bin/bash
        chdir: "{{ pbgdir }}"
      listen: "restart pb7"
