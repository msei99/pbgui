---
# Update pbgui on localhost
# Steps:
# 1. Clone/update pbgui repository
# 2. If updated, install requirements and restart PBRun, PBRemote and PBCoinData

- hosts: localhost
  gather_facts: "{{ debug }}"

  vars:
    user: "{{ user }}"
    pbgdir: "{{ pbgdir }}"

  tasks:
    - name: display facts
      debug:
        var: ansible_facts
      tags: debug,never

    - name: Get current branch
      command: git rev-parse --abbrev-ref HEAD
      args:
        chdir: "{{ pbgdir }}"
      register: current_branch
      changed_when: false
      when: pbgdir != ""

    - name: clone pbgui repository
      git:
        repo: https://github.com/msei99/pbgui.git
        dest: "{{ pbgdir }}"
        version: "{{ current_branch.stdout }}"
        update: yes
        force: yes
      when: pbgdir != ""
      register: pbgui_repo
      notify: restart pbgui

    - name: print pbgui_repo
      debug:
        var: pbgui_repo
      tags: debug,never

    # --- PB6 cleanup: remove pb6 if still installed ---
    - name: Set software base directory
      set_fact:
        software_dir: "{{ pbgdir | dirname }}"

    - name: Check if pb6 directory exists
      stat:
        path: "{{ software_dir }}/pb6"
      register: pb6_dir

    - name: Check if pb6 venv exists
      stat:
        path: "{{ software_dir }}/venv_pb6"
      register: pb6_venv

    - name: Kill all running pb6 processes
      shell: |
        pids="$(ps -ef | grep "{{ software_dir }}/pb6/passivbot" | grep -v grep | awk '{print $2}')"
        if [ -n "$pids" ]; then
          echo "Killing pb6 processes: $pids"
          kill $pids
        else
          echo "No pb6 processes running"
        fi
      args:
        executable: /bin/bash
      changed_when: false
      ignore_errors: yes
      when: pb6_dir.stat.exists

    - name: Remove pb6 directory
      file:
        path: "{{ software_dir }}/pb6"
        state: absent
      when: pb6_dir.stat.exists

    - name: Remove pb6 venv
      file:
        path: "{{ software_dir }}/venv_pb6"
        state: absent
      when: pb6_venv.stat.exists

    - name: Remove pb6 entries from pbgui.ini
      lineinfile:
        path: "{{ pbgdir }}/pbgui.ini"
        regexp: 'pb6'
        state: absent
      when: pb6_dir.stat.exists or pb6_venv.stat.exists

  handlers:
    - name: Install pbgui requirements
      pip:
        requirements: "{{ pbgdir }}/requirements.txt"
        extra_args: --upgrade pip
      listen: "restart pbgui"

    - name: Restart PBRun, PBRemote and PBCoinData
      shell: |
        python "{{ pbgdir }}/starter.py" -r PBRun PBRemote PBCoinData
      args:
        executable: /bin/bash
        chdir: "{{ pbgdir }}"
      listen: "restart pbgui"
