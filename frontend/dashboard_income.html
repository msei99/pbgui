<!-- Dashboard Income — live view component.
     Embedded via st.html(unsafe_allow_javascript=True).  NOTE: st.html is NOT iframed;
     multiple instances share the same window/document.  Every DOM id and window.*
     variable MUST be scoped by POSITION to avoid collisions.
     Config injected as JS variables (%%PLACEHOLDER%%) by Dashboard.py.
     All rendering delegated to DashRender.buildIncome() — single source of truth.
     Data updates driven by WebSocket income_updated events — zero polling. -->
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

<div id="di-container-%%POSITION%%" style="width:100%;"></div>

<script>
(function () {
    'use strict';

    var TOKEN    = "%%TOKEN%%";
    var API_BASE = "%%API_BASE%%";
    var API_HOST = "%%API_HOST%%";
    var USERS    = %%USERS%%;
    var PERIOD   = "%%PERIOD%%";
    var LAST_N   = %%LAST_N%%;
    var FILTER   = %%FILTER%%;
    var HEIGHT   = %%HEIGHT%%;
    var LVB_USER = "%%LVB_USER%%";
    var POSITION = "%%POSITION%%";

    /* Position-scoped keys for window-level WS/timer refs.
       st.html is NOT iframed — all instances share the same window. */
    var _wsKey    = '_diWs_' + POSITION;
    var _timerKey = '_diReconnTimer_' + POSITION;

    /* mutable current values — changed by inline controls but not persisted */
    var currentPeriod = PERIOD;
    var currentLastN  = LAST_N;
    var currentFilter = FILTER;

    var PERIODS = ['TODAY','YESTERDAY','THIS_WEEK','LAST_WEEK','LAST_WEEK_NOW',
                   'THIS_MONTH','LAST_MONTH','LAST_MONTH_NOW',
                   'LAST_7_DAYS','LAST_30_DAYS','LAST_90_DAYS','LAST_180_DAYS','LAST_365_DAYS',
                   'THIS_QUARTER','LAST_QUARTER','LAST_QUARTER_NOW',
                   'THIS_YEAR','LAST_YEAR','LAST_YEAR_NOW','ALL_TIME','CUSTOM'];

    /* Kill any previous WS + reconnect timer from a prior render of THIS position */
    if (window[_wsKey]) { try { window[_wsKey].close(); } catch (_) {} window[_wsKey] = null; }
    if (window[_timerKey]) { clearTimeout(window[_timerKey]); window[_timerKey] = null; }

    var ws          = null;
    var reconnTimer = null;
    var reconnDelay = 1000;
    var container   = document.getElementById('di-container-' + POSITION);

    function reportHeight() {
        var h = document.documentElement.scrollHeight + 16;
        try {
            window.parent.postMessage(
                { isStreamlitMessage: true, type: 'streamlit:setFrameHeight', height: h }, '*'
            );
        } catch (_) {}
    }

    function load() {
        var usersParam = (Array.isArray(USERS) && USERS.length > 0) ? USERS.join(',') : 'ALL';
        /* parse CUSTOM:from:to */
        var isCustom = currentPeriod.indexOf('CUSTOM:') === 0;
        var customFrom = '', customTo = '';
        if (isCustom) {
            var _cp = currentPeriod.split(':');
            customFrom = _cp[1] || ''; customTo = _cp[2] || '';
        }
        var displayPeriod = isCustom ? 'CUSTOM' : currentPeriod;

        var url = API_BASE + '/dashboard/income_data'
            + '?users='  + encodeURIComponent(usersParam)
            + '&period=' + encodeURIComponent(currentPeriod)
            + '&last_n=' + currentLastN
            + '&filter=' + currentFilter;

        fetch(url, { headers: { 'Authorization': 'Bearer ' + TOKEN } })
            .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(function (d) {
                /* ── Period select ── */
                var periodCtrl = document.createElement('select');
                periodCtrl.className = 'dt-ctrl-sel';
                PERIODS.forEach(function (p) {
                    var opt = document.createElement('option');
                    opt.value = p; opt.textContent = p;
                    if (p === displayPeriod) opt.selected = true;
                    periodCtrl.appendChild(opt);
                });
                periodCtrl.addEventListener('change', function () {
                    if (this.value === 'CUSTOM') {
                        var _today = new Date();
                        var _to   = _today.toISOString().slice(0,10);
                        var _from = new Date(_today - 30*24*3600*1000).toISOString().slice(0,10);
                        currentPeriod = 'CUSTOM:' + _from + ':' + _to;
                    } else {
                        currentPeriod = this.value;
                    }
                    load();
                });

                /* ── CUSTOM date inputs ── */
                var fromCtrl = null, toCtrl = null, toNowCtrl = null;
                if (isCustom) {
                    var toNow = (customTo === 'NOW' || customTo === '');
                    fromCtrl = document.createElement('input');
                    fromCtrl.type = 'date'; fromCtrl.className = 'dt-ctrl-date';
                    fromCtrl.value = customFrom;
                    fromCtrl.addEventListener('change', function () {
                        var _parts = currentPeriod.split(':');
                        currentPeriod = 'CUSTOM:' + this.value + ':' + (_parts[2] || customTo);
                        load();
                    });
                    toCtrl = document.createElement('input');
                    toCtrl.type = 'date'; toCtrl.className = 'dt-ctrl-date';
                    toCtrl.value = toNow ? new Date().toISOString().slice(0,10) : customTo;
                    toCtrl.disabled = toNow;
                    toCtrl.addEventListener('change', function () {
                        var _parts = currentPeriod.split(':');
                        currentPeriod = 'CUSTOM:' + (_parts[1] || customFrom) + ':' + this.value;
                        load();
                    });
                    toNowCtrl = document.createElement('label');
                    toNowCtrl.className = 'dt-ctrl-now-wrap';
                    var _chk = document.createElement('input');
                    _chk.type = 'checkbox'; _chk.checked = toNow;
                    toNowCtrl.appendChild(_chk);
                    toNowCtrl.appendChild(document.createTextNode('Now'));
                    _chk.addEventListener('change', function () {
                        var _parts = currentPeriod.split(':');
                        if (this.checked) {
                            currentPeriod = 'CUSTOM:' + (_parts[1] || customFrom) + ':NOW';
                        } else {
                            var _td = new Date().toISOString().slice(0,10);
                            currentPeriod = 'CUSTOM:' + (_parts[1] || customFrom) + ':' + _td;
                        }
                        load();
                    });
                }

                /* ── Last N control ── */
                var lastNCtrl = document.createElement('input');
                lastNCtrl.type = 'number'; lastNCtrl.min = 0; lastNCtrl.max = 9999; lastNCtrl.step = 10;
                lastNCtrl.value = currentLastN;
                lastNCtrl.className = 'dt-ctrl-num';
                lastNCtrl.addEventListener('change', function () {
                    currentLastN = parseInt(this.value, 10) || 0;
                    load();
                });

                /* ── Filter control ── */
                var filterCtrl = document.createElement('input');
                filterCtrl.type = 'number'; filterCtrl.min = 0; filterCtrl.step = 0.01;
                filterCtrl.value = currentFilter;
                filterCtrl.className = 'dt-ctrl-num';
                filterCtrl.style.width = '68px';
                filterCtrl.addEventListener('change', function () {
                    currentFilter = parseFloat(this.value) || 0;
                    load();
                });

                DashRender.buildIncome(container, d, {
                    users:          USERS,
                    period:         currentPeriod,
                    lastN:          currentLastN,
                    filterVal:      currentFilter,
                    periodControl:  periodCtrl,
                    fromControl:    fromCtrl,
                    toControl:      toCtrl,
                    toNowControl:   toNowCtrl,
                    lastNControl:   lastNCtrl,
                    filterControl:  filterCtrl,
                    apiBase:        API_BASE,
                    token:          TOKEN,
                    onReload:       load,
                    onJumpToDate:   function (dateStr) {
                        /* load the last N rows up to (and including) the target date */
                        currentPeriod = 'CUSTOM:2017-01-01:' + dateStr;
                        /* currentLastN stays as-is */
                        load();
                    },
                    height:         HEIGHT > 0 ? HEIGHT : null,
                    displayModeBar: true,
                    responsive:     true,
                    lvbUser:        LVB_USER || ''
                });
                /* Standalone live view: set explicit maxHeight on .di-table-wrap
                   so the table scrolls within the allocated height. */
                var _dr = container.querySelector('.di-root');
                if (_dr && !_dr.querySelector('.js-plotly-plot')) {
                    var _wrap = _dr.querySelector('.di-table-wrap');
                    if (_wrap) {
                        var capH = HEIGHT > 0 ? HEIGHT : 280;
                        /* Subtract header row height from cap */
                        var _hdr = _dr.querySelector('.dt-header');
                        var _hdrH = _hdr ? _hdr.offsetHeight : 40;
                        _wrap.style.maxHeight = Math.max(100, capH - _hdrH - 10) + 'px';
                    }
                }
                reportHeight();
            })
            .catch(function (e) {
                container.innerHTML = '';
                var st = document.createElement('div');
                st.className = 'dt-status';
                st.textContent = '\u26a0 Data unavailable';
                container.appendChild(st);
                reportHeight();
            });
    }

    function connect() {
        if (!TOKEN || !API_HOST) return;
        clearTimeout(reconnTimer);
        var proto = (window.location.protocol === 'https:') ? 'wss' : 'ws';
        ws = new WebSocket(proto + '://' + API_HOST + '/ws/dashboard?token=' + TOKEN);
        window[_wsKey] = ws;
        ws.onopen = function () { reconnDelay = 1000; load(); };
        ws.onmessage = function (evt) {
            try {
                var m = JSON.parse(evt.data);
                if (m.type === 'income_updated') {
                    var mu = m.user || '';
                    var relevant = !mu || !Array.isArray(USERS) || USERS.length === 0 || USERS.indexOf(mu) !== -1;
                    if (relevant) load();
                }
            } catch (_) {}
        };
        ws.onclose = function () {
            reconnTimer = setTimeout(connect, reconnDelay);
            reconnDelay = Math.min(reconnDelay * 2, 30000);
            window[_timerKey] = reconnTimer;
        };
        ws.onerror = function () { ws.close(); };
    }

    function waitForPlotly(cb) {
        if (typeof Plotly !== 'undefined') { cb(); }
        else { setTimeout(function () { waitForPlotly(cb); }, 50); }
    }

    var DR_VERSION = '20260322e';

    function _loadRenderScript(cb) {
        /* Force reload if a stale version of DashRender is cached in window */
        if (window.DashRender && window.DashRender.VERSION !== DR_VERSION) {
            window.DashRender = null;
            var old = document.getElementById('dr-css');
            if (old) old.parentNode.removeChild(old);
        }
        if (window.DashRender) { cb(); return; }
        if (window._drLoading) { setTimeout(function () { _loadRenderScript(cb); }, 50); return; }
        window._drLoading = true;
        var proto = (window.location.protocol === 'https:') ? 'https' : 'http';
        var s = document.createElement('script');
        s.src = proto + '://' + API_HOST + '/app/dashboard_render.js?v=' + DR_VERSION;
        s.onload  = function () { window._drLoading = false; cb(); };
        s.onerror = function () { window._drLoading = false; cb(); };
        document.head.appendChild(s);
    }

    _loadRenderScript(function () {
        if (window.DashRender) { DashRender.injectCSS(); }
        waitForPlotly(connect);
    });
}());
</script>
