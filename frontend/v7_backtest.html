<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBGui — V7 Backtest</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<link rel="stylesheet" href="/app/css/sidebar.css?v=1">
<style>
/* ── Design Tokens ─────────────────────────────── */
:root {
  --bg: #0e1117;       --bg2: #1a1d24;
  --bg3: #262730;      --border: #333640;
  --text: #fafafa;     --text-dim: #a0a4ab;
  --green: #21c354;    --orange: #ff8c00;
  --red: #ff4b4b;      --blue: #1f77ff;
  --accent: #4da6ff;
  --font: 'Source Sans Pro', -apple-system, BlinkMacSystemFont, sans-serif;
  --fs-xs: 11px; --fs-sm: 13px; --fs-base: 14px;
  --fs-md: 15px; --fs-lg: 18px; --fs-xl: 22px;
  --sp-xs: 4px;  --sp-sm: 8px;  --sp-md: 12px; --sp-lg: 20px;
  --input-h: 32px; --btn-h: 32px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); font-size: var(--fs-base);
             color: var(--text); background: var(--bg); overflow: hidden; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Connection Banner ─────────────────────────── */
#conn-banner { padding: var(--sp-sm) 16px; text-align: center; font-size: var(--fs-sm); font-weight: 600; transition: all .3s; }
.conn-ok      { background: var(--green); color: #000; display: none; }
.conn-lost    { background: var(--red);   color: #fff; }
.conn-waiting { background: var(--orange); color: #000; }

/* ── Page Layout ───────────────────────────────── */
#page-body { display: flex; height: calc(100vh - 52px); overflow: hidden; }

/* ── Main Content ──────────────────────────────── */
#main-content { flex: 1; overflow-y: auto; overflow-x: hidden; background: var(--bg); padding: var(--sp-lg); }
/* When results panel is pinned: only the chart area scrolls, not main-content */
#main-content:has(#panel-results.active):not(:has(#panel-results.unpinned)) { overflow: hidden; padding-bottom: 0; }

/* Panels */
.view-panel { display: none; }
.view-panel.active { display: block; }
/* Results panel pinned layout: table fixed at top, charts-only scrollable */
#panel-results.active:not(.unpinned) { display: flex !important; flex-direction: column; height: 100%; }
#results-scroll-area { flex: 1; min-height: 0; overflow-y: auto; padding-bottom: var(--sp-lg); }
#panel-results.unpinned #results-scroll-area { flex: none; min-height: unset; overflow-y: visible; }

/* ── Tables ────────────────────────────────────── */
.tbl { width: 100%; border-collapse: collapse; font-size: var(--fs-base); user-select: none; }
.tbl th { position: sticky; top: 0; z-index: 2; background: var(--bg2); font-size: var(--fs-sm);
          text-transform: uppercase; letter-spacing: .5px; color: var(--text-dim);
          padding: 8px 10px; text-align: left; border-bottom: 2px solid var(--border);
          cursor: pointer; user-select: none; white-space: nowrap; }
.tbl th:hover { color: var(--text); }
.tbl th .sort-arrow { margin-left: 4px; font-size: var(--fs-xs); }
.tbl td { padding: 7px 10px; border-bottom: 1px solid var(--border); white-space: nowrap;
          overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
.tbl tr:hover td { background: rgba(255,255,255,.03); }
.tbl tr.selected td { background: rgba(77,166,255,.08); }

/* Status badges */
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: var(--fs-xs);
         font-weight: 600; letter-spacing: .3px; }
.badge-queued    { background: rgba(160,164,171,.15); color: var(--text-dim); }
.badge-running   { background: rgba(31,119,255,.15);  color: var(--blue); }
.badge-backtesting { background: rgba(255,140,0,.15); color: var(--orange); }
.badge-complete  { background: rgba(33,195,84,.15);   color: var(--green); }
.badge-error     { background: rgba(255,75,75,.15);    color: var(--red); }

/* Action buttons (inline) */
.act-btn { background: none; border: 1px solid var(--border); border-radius: 4px; color: var(--text-dim);
           cursor: pointer; padding: 3px 8px; font-size: var(--fs-xs); transition: all .15s; }
.act-btn:hover { color: var(--text); border-color: var(--accent); }
.act-btn-danger:hover { color: var(--red); border-color: var(--red); }

/* ── Config Editor form grid (matches v7_edit.html style) ── */
.form-row { display: grid; gap: var(--sp-md); margin-bottom: var(--sp-md); }
.cols-2 { grid-template-columns: 1fr 1fr; }
.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.cols-5 { grid-template-columns: 1fr 1fr 1fr 1fr 1fr; }
.cols-6 { grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr; }
.cols-ex6 { grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr; }
.cols-7 { grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr; }
.cols-8 { grid-template-columns: repeat(8, 1fr); }
.form-group { display: flex; flex-direction: column; }
.form-group label { font-size: var(--fs-xs); color: var(--text-dim); text-transform: uppercase;
  letter-spacing: .07em; margin-bottom: 2px; display: flex; align-items: center; gap: 4px; }
.form-group input, .form-group select, .form-group textarea {
  height: var(--input-h); padding: 0 var(--sp-sm);
  background: var(--bg2); color: var(--text); border: 1px solid var(--border);
  border-radius: 4px; font-size: var(--fs-sm); font-family: var(--font); outline: none; width: 100%; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { height: auto; padding: var(--sp-sm); resize: vertical; font-family: monospace; }
.form-group select[multiple] { height: auto; min-height: calc(var(--input-h)*3.5); padding: var(--sp-xs) 0; }
.chk-row { display: flex; align-items: center; gap: 6px; height: var(--input-h); }
.chk-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); flex-shrink: 0; }
.chk-row label { font-size: var(--fs-sm); color: var(--text); margin: 0; cursor: pointer; }
.section-title { font-size: var(--fs-md); font-weight: 600;
  margin: var(--sp-lg) 0 var(--sp-sm); padding-bottom: var(--sp-xs); border-bottom: 1px solid var(--border); }
.expander { border: 1px solid var(--border); border-radius: 6px; margin: var(--sp-sm) 0 var(--sp-md); overflow: hidden; }
.expander-header { display: flex; align-items: center; gap: 6px; padding: var(--sp-sm) var(--sp-md);
  cursor: pointer; background: var(--bg2); font-size: var(--fs-sm); font-weight: 600; user-select: none; }
.expander-header:hover { background: var(--bg3); }
.expander-header .arrow { transition: transform 0.2s; font-size: 10px; }
.expander.open .expander-header .arrow { transform: rotate(90deg); }
.expander-body { display: none; padding: var(--sp-md); }
.expander.open .expander-body { display: block; }
.num-stepper { display: flex; align-items: center; }
.num-stepper input { flex: 1; border-radius: 0 !important; text-align: center; min-width: 0; }
.num-stepper input[type=number]::-webkit-inner-spin-button,
.num-stepper input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.num-stepper input[type=number] { -moz-appearance: textfield; }
.stepper-btn { width: 28px; height: var(--input-h); flex-shrink: 0; background: var(--bg3);
  border: 1px solid var(--border); color: var(--text); font-size: 16px; line-height: 1;
  cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
.stepper-btn:first-child { border-radius: 4px 0 0 4px; border-right: none; }
.stepper-btn:last-child  { border-radius: 0 4px 4px 0; border-left: none; }
.stepper-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }

/* ─── Multiselect (tag-input) ──────────────────────────────── */
.ms-wrap {
  border: 1px solid var(--border); border-radius: 4px;
  background: var(--bg2); min-height: var(--input-h); padding: 2px 4px;
  display: flex; flex-wrap: wrap; gap: 3px; align-items: center;
  cursor: text; position: relative;
}
.ms-wrap:focus-within { border-color: var(--accent); }
.ms-clear-btn {
  cursor: pointer; color: var(--text-dim); font-size: 11px; padding: 0 3px;
  border-radius: 3px; margin-left: 2px;
}
.ms-clear-btn:hover { color: var(--red); background: rgba(255,75,75,0.15); }
.ms-all-btn {
  cursor: pointer; color: var(--text-dim); font-size: 11px; padding: 0 3px;
  border-radius: 3px; margin-left: 2px;
}
.ms-all-btn:hover { color: var(--accent); background: rgba(77,166,255,0.15); }
.ms-tag {
  display: inline-flex; align-items: center; gap: 3px;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 3px;
  padding: 1px 6px; font-size: var(--fs-xs); color: var(--text);
}
.ms-tag .ms-x {
  cursor: pointer; color: var(--text-dim); font-size: 11px; line-height: 1;
}
.ms-tag .ms-x:hover { color: var(--red); }
.ms-input {
  border: none; background: transparent; color: var(--text);
  font-size: var(--fs-sm); outline: none; min-width: 60px; flex: 1;
  height: 24px; font-family: var(--font);
}
.ms-dropdown {
  position: absolute; top: 100%; left: 0; right: 0;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 0 0 4px 4px; max-height: 200px; overflow-y: auto;
  z-index: 100; display: none;
}
.ms-dropdown.open { display: block; }
.ms-option {
  padding: 4px 8px; font-size: var(--fs-sm); cursor: pointer;
}
.ms-option:hover, .ms-option.highlight { background: var(--bg3); }
.ms-option.selected { color: var(--accent); }
.ms-option.in-other { color: var(--orange); }
.ms-option.in-other.selected { color: var(--accent); }

/* Icon toggle buttons in results table */
.icon-btn { background: none; border: 1px solid transparent; border-radius: 4px; color: var(--text-dim);
            cursor: pointer; padding: 2px 5px; font-size: 15px; transition: all .15s; opacity: 0.5; line-height: 1; }
.icon-btn:hover { opacity: 0.8; }
.icon-btn.active { opacity: 1; color: var(--accent); border-color: var(--accent); }
.icon-btn.active:hover { opacity: 1; }
.tbl td.actions-cell { white-space: nowrap; overflow: visible; padding: 4px 6px; }

/* Row selection for bulk actions */
.tbl tbody tr { cursor: pointer; }
.tbl tr.selected td { background: rgba(77,166,255,.12); }
.tbl tr.selected td:first-child { border-left: 3px solid var(--accent); }

/* Checkbox column */
.tbl input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }

/* ── Modal ─────────────────────────────────────── */
#modal-root { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,.6);
              align-items: center; justify-content: center; }
#modal-root.open { display: flex; }
.modal-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
             padding: var(--sp-lg); min-width: 160px; max-width: 760px; max-height: 85vh;
             overflow: hidden; resize: both; box-sizing: border-box;
             display: flex; flex-direction: column; }
.modal-header { display: flex; align-items: center; justify-content: space-between;
                margin-bottom: 0; padding-bottom: var(--sp-sm); border-bottom: 1px solid var(--border);
                cursor: move; user-select: none; flex-shrink: 0; margin-bottom: var(--sp-md); }
.modal-body { flex: 1; overflow: auto; min-height: 0; min-width: 0; }
.modal-title { font-size: var(--fs-lg); font-weight: 600; }
.modal-close { background: none; border: none; color: var(--text-dim); cursor: pointer;
               font-size: 1.2rem; line-height: 1; padding: 2px 8px; border-radius: 4px; }
.modal-close:hover { background: rgba(255,255,255,.1); color: var(--text); }
.modal-actions { display: flex; gap: var(--sp-sm); justify-content: flex-end; margin-top: var(--sp-lg); flex-shrink: 0; }
.modal-btn { height: var(--btn-h); padding: 0 16px; border-radius: 4px; font-size: var(--fs-base);
             cursor: pointer; border: 1px solid var(--border); background: var(--bg3); color: var(--text); }
.modal-btn:hover { background: rgba(255,255,255,.08); }
.modal-btn-primary { background: var(--blue); border-color: var(--blue); color: #fff; }
.modal-btn-primary:hover { background: #1a6ae0; }
.modal-btn-danger { background: var(--red); border-color: var(--red); color: #fff; }
.modal-btn-danger:hover { background: #d43d3d; }

/* ── Toast ─────────────────────────────────────── */
#toast { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex;
         flex-direction: column; gap: var(--sp-sm); pointer-events: none; }
.toast-msg { padding: 10px 16px; border-radius: 6px; font-size: var(--fs-sm); font-weight: 500;
             pointer-events: auto; animation: fadeIn .2s; }
.toast-ok   { background: var(--green); color: #000; }
.toast-err  { background: var(--red); color: #fff; }
.toast-info { background: var(--blue); color: #fff; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ── Empty states ──────────────────────────────── */
.empty-state { text-align: center; color: var(--text-dim); padding: 60px 20px; font-size: var(--fs-md); }
.empty-state .empty-icon { font-size: 48px; margin-bottom: var(--sp-md); opacity: .4; }

/* ── Charts ────────────────────────────────────── */
.chart-wrap { position: relative; margin-top: var(--sp-md); background: var(--bg2); border-radius: 6px; border: 1px solid var(--border); overflow: hidden; }
.chart-wrap:fullscreen { background: #0e1117; display: flex; flex-direction: column; }
.chart-wrap:fullscreen .chart-inner { flex: 1; height: 100% !important; }
.chart-wrap:fullscreen .chart-inner > div { height: 100% !important; }
.chart-container { padding: var(--sp-md); }
.chart-resize-handle { height: 6px; cursor: row-resize; background: var(--border);
                       display: flex; align-items: center; justify-content: center; }
.chart-resize-handle span { width: 32px; height: 2px; background: var(--text-dim); border-radius: 2px; opacity: .4; }
/* Close button overlaid top-right of chart-wrap / json panel */
.chart-close-btn { position: absolute; top: 6px; right: 8px; z-index: 10; background: rgba(14,17,23,.7);
                   border: 1px solid var(--border); color: var(--text-dim); cursor: pointer;
                   font-size: 11px; border-radius: 3px; padding: 1px 5px; line-height: 1.4; }
.chart-close-btn:hover { color: var(--red); border-color: var(--red); background: rgba(255,75,75,.15); }
/* JSON panels (Config / Analysis) */
.json-panel-wrap { position: relative; margin-top: var(--sp-md); background: var(--bg2);
                   border: 1px solid var(--border); border-radius: 6px; padding: var(--sp-md); padding-bottom: 0; overflow: hidden; }
.json-panel-hdr { display: flex; align-items: center; gap: var(--sp-sm); margin-bottom: var(--sp-sm); }
.json-panel-hdr .sb-label { margin: 0; }
.json-panel-close { background: none; border: none; color: var(--text-dim); cursor: pointer;
                    font-size: 13px; margin-left: auto; padding: 0 4px; line-height: 1; }
.json-panel-close:hover { color: var(--red); }
.json-pre { font-size: var(--fs-xs); background: var(--bg); padding: var(--sp-md); border-radius: 4px;
            overflow-y: auto; height: 400px; min-height: 80px; color: var(--green); margin: 0; }
/* ── Results detail ────────────────────────────── */
.result-detail { margin-top: var(--sp-lg); }
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: var(--sp-sm); margin-bottom: var(--sp-lg); }
.metric-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: var(--sp-md); }
.metric-label { font-size: var(--fs-xs); color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; }
.metric-value { font-size: var(--fs-lg); font-weight: 600; margin-top: 2px; }
.metric-value.positive { color: var(--green); }
.metric-value.negative { color: var(--red); }

/* ── Log panel (floating) ──────────────────────── */
#log-panel { position: fixed; bottom: 0; right: 0; width: 50%; height: 40vh; min-width: 240px; min-height: 150px;
             background: var(--bg2); border-top: 2px solid var(--accent); border-left: 2px solid var(--accent);
             z-index: 500; display: none; flex-direction: column; resize: both; overflow: hidden; }
#log-panel.visible { display: flex; }
#log-panel-header { display: flex; align-items: center; justify-content: space-between;
                    padding: var(--sp-sm) var(--sp-md); background: var(--bg3); border-bottom: 1px solid var(--border);
                    flex-shrink: 0; cursor: move; user-select: none; }
#log-panel-title { font-size: var(--fs-sm); font-weight: 600; }
#log-panel-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: var(--fs-lg); }
#log-panel-close:hover { color: var(--text); }
#log-viewer-target { flex: 1; min-height: 0; overflow: hidden; }
</style>
</head>
<body>

<nav id="topnav"></nav>
<div id="conn-banner" class="conn-waiting">Connecting…</div>

<div id="page-body">
  <!-- ── Sidebar ─────────────────────── -->
  <div id="sidebar">
    <div id="sidebar-inner">
      <!-- Section nav -->
      <button class="sb-section active" data-panel="configs" onclick="selectPanel('configs')">
        <span class="sb-icon">📋</span> Configs
      </button>
      <button class="sb-section" data-panel="queue" onclick="selectPanel('queue')">
        <span class="sb-icon">⏳</span> Queue <span id="queue-count-badge" style="margin-left:auto;font-size:var(--fs-xs);color:var(--text-dim)"></span>
      </button>
      <button class="sb-section" data-panel="results" onclick="selectPanel('results')">
        <span class="sb-icon">📊</span> Results
      </button>
      <button class="sb-section" data-panel="archive" onclick="selectPanel('archive')">
        <span class="sb-icon">🗄️</span> Archive
      </button>

      <!-- Context actions (dynamic) -->
      <hr class="sb-sep">
      <div id="ctx-configs" class="ctx-actions">
        <button class="sb-btn accent" onclick="newConfig()">+ New Config</button>
        <button class="sb-btn danger" onclick="deleteSelectedConfigs()">🗑 Delete Selected</button>
      </div>
      <div id="ctx-queue" class="ctx-actions" style="display:none">
        <button class="sb-btn" onclick="refreshQueue()">↻ Refresh</button>
        <button class="sb-btn" onclick="clearFinished()">✓ Clear Finished</button>
        <button class="sb-btn danger" onclick="stopAllQueue()">⬛ Stop All</button>
        <hr class="sb-sep">
        <div class="sb-label">Settings</div>
        <div class="sb-stepper">
          <span style="font-size:var(--fs-sm);color:var(--text-dim);min-width:32px">CPU</span>
          <button onclick="setCpu(-1)">−</button>
          <input type="text" id="cpu-val" value="1" readonly>
          <button onclick="setCpu(1)">+</button>
        </div>
        <label class="sb-toggle" style="margin-top:var(--sp-xs)">
          <input type="checkbox" id="autostart-cb" onchange="toggleAutostart()">
          <span>Autostart</span>
        </label>
      </div>
      <div id="ctx-results" class="ctx-actions" style="display:none">
        <button class="sb-btn" onclick="rebacktestSelected()">🔄 Backtest</button>
        <button class="sb-btn" onclick="addToRun()">▶ Add to Run</button>
        <button class="sb-btn" onclick="compareSelected()">📈 Compare</button>
        <button class="sb-btn danger" onclick="deleteSelectedResults()">🗑 Delete Selected</button>
      </div>
      <div id="ctx-archive" class="ctx-actions" style="display:none">
        <button class="sb-btn" onclick="refreshArchives()">↻ Refresh</button>
        <button class="sb-btn" onclick="pullArchive()">⬇ Git Pull</button>
        <button class="sb-btn" onclick="pushArchive()">⬆ Git Push</button>
        <button class="sb-btn accent" onclick="addArchive()">+ Add Archive</button>
      </div>


    </div>
    <!-- Editor sidebar — structure mirrors v7_edit sidebar exactly -->
    <div id="sidebar-editor" class="sidebar-sticky" style="display:none">
      <div class="sidebar-header">
        <span class="sb-title">EDIT BACKTEST</span>
      </div>
      <div class="sidebar-toolbar">
        <button class="sb-btn" onclick="closeEditor()" title="Back to configs list">🏠 Home</button>
        <button class="sb-btn primary" onclick="saveEditor()" title="Save config">💾 Save</button>
        <button class="sb-btn info" onclick="saveAndQueue()" title="Save and add to queue">▶ Save &amp; Queue</button>
        <button class="sb-btn" onclick="importConfig()" title="Import JSON config">📥 Import</button>
        <hr class="sb-sep">
        <button class="sb-btn" id="sb-btn-results" onclick="goEditorResults()" title="Jump to results for this config" disabled>📊 Results</button>
        <button class="sb-btn" onclick="goStrategyExplorer()" title="Open Strategy Explorer">🔍 Strategy Explorer</button>
        <button class="sb-btn" onclick="goBalanceCalc()" title="Open Balance Calculator">💰 Balance Calculator</button>
        <button class="sb-btn" onclick="goCalcBalance()" title="Calculate balance">⚡ Calc Balance</button>
        <hr class="sb-sep">
        <button class="sb-btn" onclick="openLogPanel()" title="Open log viewer">📋 Log</button>
      </div>
    </div>
    <div id="sidebar-resize"></div>
  </div>

  <!-- ── Main Content ────────────────── -->
  <div id="main-content">

    <!-- CONFIGS panel -->
    <div id="panel-configs" class="view-panel active">
      <div id="configs-toolbar" style="display:flex;gap:var(--sp-sm);align-items:center;margin-bottom:var(--sp-sm)">
        <span style="flex:1"></span>
        <button class="act-btn" onclick="selectAllConfigs()" title="Select all visible rows">Select All</button>
        <button class="act-btn" onclick="deselectAllConfigs()" title="Deselect all">Deselect</button>
      </div>
      <div id="configs-list"></div>
      <div id="configs-editor" style="display:none"></div>
    </div>

    <!-- QUEUE panel -->
    <div id="panel-queue" class="view-panel">
      <div id="queue-list"></div>
    </div>

    <!-- RESULTS panel -->
    <div id="panel-results" class="view-panel">
      <!-- Sticky top area: toolbar + table stay visible while charts scroll -->
      <div id="results-fixed-top" style="background:var(--bg);padding-bottom:var(--sp-sm);border-bottom:2px solid var(--border);box-shadow:0 4px 12px rgba(0,0,0,.6);margin-bottom:var(--sp-md)">
        <div id="results-toolbar" style="display:flex;gap:var(--sp-sm);align-items:center;margin-bottom:var(--sp-md);flex-wrap:wrap;padding-top:var(--sp-sm)">
          <label style="font-size:var(--fs-sm);color:var(--text-dim)">Config:</label>
          <select id="results-config-filter" class="sb-input" style="max-width:200px" onchange="renderResults()">
            <option value="">All configs</option>
          </select>
          <input type="text" id="results-filter" class="sb-input" style="max-width:200px" placeholder="Filter…" oninput="renderResults()">
          <span style="flex:1"></span>
          <button class="act-btn" onclick="selectAllResults()" title="Select all visible rows">Select All</button>
          <button class="act-btn" onclick="deselectAllResults()" title="Deselect all">Deselect</button>
          <button id="results-pin-btn" class="act-btn" onclick="toggleResultsSticky()" title="Pin table (sticky on/off)" style="font-size:15px;padding:0 6px">📌</button>
        </div>
        <div id="results-list-wrap" style="height:25vh;min-height:80px;overflow-y:auto;border:1px solid var(--border);border-radius:4px;position:relative">
          <div id="results-list"></div>
        </div>
        <div id="results-resize-handle" title="Drag to resize list"
             style="height:6px;cursor:row-resize;background:var(--border);border-radius:0 0 4px 4px;margin-bottom:0;display:flex;align-items:center;justify-content:center;user-select:none">
          <span style="width:32px;height:2px;background:var(--text-dim);border-radius:2px;opacity:.5"></span>
        </div>
      </div>
      <div id="results-scroll-area">
        <!-- Compare chart appears directly after the table -->
        <div id="compare-chart-area" style="display:none"></div>
        <!-- Icon-triggered charts below -->
        <div id="results-charts" style="display:none"></div>
      </div>
    </div>

    <!-- ARCHIVE panel -->
    <div id="panel-archive" class="view-panel">
      <div id="archive-selector" style="margin-bottom:var(--sp-md)">
        <select id="archive-select" class="sb-input" style="max-width:300px" onchange="loadArchiveResults()">
          <option value="">Select archive…</option>
        </select>
      </div>
      <div id="archive-results"></div>
    </div>

  </div>
</div>

<!-- Floating log panel -->
<div id="log-panel">
  <div id="log-panel-header">
    <span id="log-panel-title">Log</span>
    <button id="log-panel-close" onclick="closeLogPanel()">✕</button>
  </div>
  <div id="log-viewer-target" style="flex:1;min-height:0;overflow:hidden"></div>
</div>

<div id="toast"></div>
<div id="modal-root"><div class="modal-box" id="modal-box"></div></div>

<script>
/* ════════════════════════════════════════════════
   GLOBALS (injected by server)
   ════════════════════════════════════════════════ */
var TOKEN         = "%%TOKEN%%";
var API_BASE      = "%%API_BASE%%";
var WS_BASE       = "%%WS_BASE%%";
var ST_BASE       = "%%ST_BASE%%";
var PBGUI_VERSION = "%%VERSION%%";
var PBGUI_SERIAL  = "%%SERIAL%%";

/* ════════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════════ */
var configs     = [];          // saved backtest configs
var queueItems  = [];          // queue items from WS
var results     = [];          // backtest results
var archives    = [];          // git archives
var archiveResults = [];       // results in selected archive
var compareSet  = [];          // paths of results to compare
var settings    = { autostart: false, cpu: 1, cpu_max: 1 };
var currentPanel = 'configs';
var sortCol     = 'modified';  // current sort column
var sortAsc     = false;       // sort direction
var editingConfig = null;      // name of config being edited, or null
var ws = null;
var wsReconnectTimer = null;
var wsReconnectDelay = 1000;

/* ════════════════════════════════════════════════
   API HELPERS
   ════════════════════════════════════════════════ */
function apiFetch(path, opts) {
  opts = opts || {};
  var url = API_BASE + path;
  opts.headers = Object.assign({ 'Authorization': 'Bearer ' + TOKEN }, opts.headers || {});
  return fetch(url, opts).then(function(r) {
    if (!r.ok) return r.json().then(function(e) { throw new Error(e.detail || r.statusText); });
    return r.json();
  });
}

function toast(msg, type) {
  type = type || 'info';
  var el = document.createElement('div');
  el.className = 'toast-msg toast-' + type;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(function() { el.remove(); }, 4000);
}

/* ════════════════════════════════════════════════
   CONNECTION BANNER
   ════════════════════════════════════════════════ */
function setBanner(state) {
  var b = document.getElementById('conn-banner');
  b.className = 'conn-' + state;
  if (state === 'ok') b.textContent = 'Connected';
  else if (state === 'lost') b.textContent = 'Connection lost — reconnecting…';
  else b.textContent = 'Connecting…';
}

/* ════════════════════════════════════════════════
   WEBSOCKET
   ════════════════════════════════════════════════ */
function connectWS() {
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
  var url = WS_BASE + '/api/backtest-v7/ws/bt7?token=' + encodeURIComponent(TOKEN);
  ws = new WebSocket(url);
  ws.onopen = function() { wsReconnectDelay = 1000; setBanner('ok'); };
  ws.onmessage = function(ev) {
    try {
      var msg = JSON.parse(ev.data);
      if (msg.type === 'queue_update') {
        queueItems = msg.items || [];
        if (msg.settings) {
          settings.autostart = msg.settings.autostart === 'True' || msg.settings.autostart === true;
          settings.cpu = parseInt(msg.settings.cpu) || 1;
        }
        updateSettingsUI();
        renderQueue();
        updateQueueBadge();
      }
    } catch(e) { /* ignore parse errors */ }
  };
  ws.onclose = function() { setBanner('lost'); scheduleReconnect(); };
  ws.onerror = function() { setBanner('lost'); };
}

function scheduleReconnect() {
  if (wsReconnectTimer) return;
  wsReconnectTimer = setTimeout(function() {
    wsReconnectTimer = null;
    connectWS();
    wsReconnectDelay = Math.min(wsReconnectDelay * 2, 30000);
  }, wsReconnectDelay);
}

function wsRefresh() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'refresh' }));
  }
}

/* ════════════════════════════════════════════════
   NAVIGATION
   ════════════════════════════════════════════════ */
function selectPanel(id) {
  currentPanel = id;
  document.querySelectorAll('.sb-section').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-panel') === id);
  });
  document.querySelectorAll('.view-panel').forEach(function(p) {
    p.classList.toggle('active', p.id === 'panel-' + id);
  });
  document.querySelectorAll('.ctx-actions').forEach(function(c) {
    c.style.display = c.id === 'ctx-' + id ? '' : 'none';
  });
  history.replaceState(null, '', '#' + id);
  // Lazy-load data when switching panels
  if (id === 'configs' && configs.length === 0) loadConfigs();
  if (id === 'results' && results.length === 0) loadResults();
  if (id === 'archive' && archives.length === 0) loadArchives();
}

/* ════════════════════════════════════════════════
   SETTINGS
   ════════════════════════════════════════════════ */
function updateSettingsUI() {
  document.getElementById('cpu-val').value = settings.cpu;
  document.getElementById('autostart-cb').checked = settings.autostart;
}

function setCpu(delta) {
  var v = settings.cpu + delta;
  if (v < 1) v = 1;
  if (v > (settings.cpu_max || 16)) v = settings.cpu_max || 16;
  settings.cpu = v;
  updateSettingsUI();
  apiFetch('/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ cpu: v })
  }).catch(function(e) { toast('Failed: ' + e.message, 'err'); });
}

function toggleAutostart() {
  var v = document.getElementById('autostart-cb').checked;
  settings.autostart = v;
  apiFetch('/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ autostart: v })
  }).catch(function(e) { toast('Failed: ' + e.message, 'err'); });
}

function loadSettings() {
  apiFetch('/settings').then(function(d) {
    settings = d;
    updateSettingsUI();
  }).catch(function() {});
}

/* ════════════════════════════════════════════════
   CONFIGS VIEW
   ════════════════════════════════════════════════ */
function loadConfigs() {
  apiFetch('/configs').then(function(d) {
    configs = d.configs || [];
    renderConfigs();
  }).catch(function(e) { toast('Load configs failed: ' + e.message, 'err'); });
}

function renderConfigs() {
  var el = document.getElementById('configs-list');
  if (editingConfig !== null) { el.style.display = 'none'; return; }
  el.style.display = '';
  document.getElementById('configs-editor').style.display = 'none';

  if (!configs.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div>No saved configs yet.<br>Click <b>+ New Config</b> to create one.</div>';
    return;
  }
  var html = '<table class="tbl"><thead><tr>' +
    thSort('Name', 'name') + thSort('Exchange', 'exchanges') + thSort('Coins', 'coins') +
    thSort('TWE L/S', 'twe_long') + thSort('Start', 'start_date') + thSort('End', 'end_date') +
    thSort('Results', 'results') + thSort('Modified', 'modified') +
    '<th>Actions</th></tr></thead><tbody>';

  var sorted = configs.slice().sort(sortFn);
  sorted.forEach(function(c) {
    html += '<tr data-name="' + esc(c.name) + '">' +
      '<td title="' + esc(c.name) + '">' + esc(c.name) + '</td>' +
      '<td>' + esc(Array.isArray(c.exchanges) ? c.exchanges.join(', ') : c.exchanges) + '</td>' +
      '<td>' + c.coins + '</td>' +
      '<td>' + fmt(c.twe_long, 2) + ' / ' + fmt(c.twe_short, 2) + '</td>' +
      '<td>' + esc(c.start_date || '—') + '</td>' +
      '<td>' + esc(c.end_date || '—') + '</td>' +
      '<td>' + c.results + '</td>' +
      '<td>' + fmtDate(c.modified) + '</td>' +
      '<td class="actions-cell">' +
        '<button class="act-btn" onclick="editConfig(\'' + esc(c.name) + '\')" title="Edit">✏️</button> ' +
        '<button class="act-btn" onclick="addConfigToQueue(\'' + esc(c.name) + '\')" title="Add to Queue">▶</button> ' +
        '<button class="act-btn" onclick="viewConfigResults(\'' + esc(c.name) + '\')" title="View Results">📊</button> ' +
        '<button class="act-btn" onclick="duplicateConfig(\'' + esc(c.name) + '\')" title="Duplicate">📄</button>' +
      '</td></tr>';
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

function thSort(label, key) {
  var arrow = sortCol === key ? (sortAsc ? ' ▲' : ' ▼') : '';
  return '<th onclick="setSort(\'' + key + '\')">' + label + '<span class="sort-arrow">' + arrow + '</span></th>';
}

function setSort(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  renderConfigs();
}

function sortFn(a, b) {
  var va = a[sortCol], vb = b[sortCol];
  if (va === undefined) va = '';
  if (vb === undefined) vb = '';
  if (typeof va === 'string') va = va.toLowerCase();
  if (typeof vb === 'string') vb = vb.toLowerCase();
  if (Array.isArray(va)) va = va.join(',');
  if (Array.isArray(vb)) vb = vb.join(',');
  if (va < vb) return sortAsc ? -1 : 1;
  if (va > vb) return sortAsc ? 1 : -1;
  return 0;
}

function editConfig(name) {
  apiFetch('/configs/' + encodeURIComponent(name)).then(function(cfg) {
    editingConfig = name;
    showConfigEditor(name, cfg);
  }).catch(function(e) { toast('Load failed: ' + e.message, 'err'); });
}

function showEditorSidebar() {
  // Enable Results button only if results exist for this config
  var btn = document.getElementById('sb-btn-results');
  if (btn) {
    var hasResults = editingConfig && editingConfig !== '__new__' &&
      results.some(function(r) { return r.config_name === editingConfig; });
    btn.disabled = !hasResults;
    // If results not loaded yet, fetch them and re-check
    if (!hasResults && results.length === 0 && editingConfig && editingConfig !== '__new__') {
      apiFetch('/results').then(function(d) {
        results = d.results || [];
        var found = results.some(function(r) { return r.config_name === editingConfig; });
        if (btn) btn.disabled = !found;
      }).catch(function() {});
    }
  }
  document.getElementById('sidebar-inner').style.display = 'none';
  document.getElementById('sidebar-editor').style.display = '';
}

function hideEditorSidebar() {
  document.getElementById('sidebar-editor').style.display = 'none';
  document.getElementById('sidebar-inner').style.display = '';
}

function goEditorResults() {
  var name = editingConfig || '';
  closeEditor();
  viewConfigResults(name);
}

function goStrategyExplorer() {
  window.location.href = ST_BASE + '/?target=V7_STRATEGY_EXPLORER&token=' + TOKEN;
}

function goBalanceCalc() {
  /* Balance Calculator is a FastAPI direct page */
  var apiOrigin = API_BASE.match(/^(https?:\/\/[^/]+)/);
  apiOrigin = apiOrigin ? apiOrigin[1] : window.location.origin;
  window.location.href = apiOrigin + '/api/balance-calc/main_page?token=' + encodeURIComponent(TOKEN) + '&st_base=' + encodeURIComponent(ST_BASE);
}
var goCalcBalance = goBalanceCalc;

function openLogPanel() {
  document.getElementById('log-panel').classList.add('visible');
}

function newConfig() {
  editingConfig = '__new__';
  showConfigEditor('', {});
}

function showConfigEditor(name, cfg) {
  document.getElementById('configs-list').style.display = 'none';
  document.getElementById('configs-toolbar').style.display = 'none';
  var ed = document.getElementById('configs-editor');
  ed.style.display = '';
  var isNew = (name === '');

  var bt     = cfg.backtest || {};
  var bot    = cfg.bot      || {};
  var live   = cfg.live     || {};
  var pbgui  = cfg.pbgui    || {};

  /* ── Show editor sidebar ── */
  showEditorSidebar();

  /* ── Row 1: Exchanges, Name, Start, End, BTC caps (6 cols 2:1:1:1:1:1) ── */
  var exAll = ['binance','bybit','bitget','okx','hyperliquid','combined'];
  var exSel = bt.exchanges || [];
  var html = '<div class="form-row cols-ex6">';
  html += '<div class="form-group"><label>Exchanges ' +
    '<span class="ms-clear-btn" onclick="cfgClearMs(\'ms-cfg-exchanges\')" title="Clear all">\u00d7</span></label>' +
    '<div class="ms-wrap" id="ms-cfg-exchanges">' +
      '<input class="ms-input" id="ms-cfg-exchanges-input" placeholder="Select exchanges...">' +

  html += fieldText('cfg-name', 'Config Name', name, isNew);
  html += fieldText('cfg-start-date', 'start_date', bt.start_date || '2020-01-01', true, 'YYYY-MM-DD');
  html += fieldText('cfg-end-date', 'end_date', bt.end_date || 'now', true, 'YYYY-MM-DD or now');
  html += fieldNumber('cfg-btc-cap', 'btc_collateral_cap', bt.btc_collateral_cap || 0, 0.1);
  html += fieldNumber('cfg-btc-ltv', 'btc_collateral_ltv_cap', bt.btc_collateral_ltv_cap || 0, 0.1);
  html += '</div>';

  /* ── Row 2: Balance, Candle, CoinAge, Gap, Warmup, Divider, Logging (7 cols) ── */
  html += '<div class="form-row cols-7">';
  html += fieldNumber('cfg-starting-balance', 'starting_balance', bt.starting_balance || 1000, 500);
  html += fieldNumber('cfg-candle-interval', 'candle_interval_minutes', bt.candle_interval_minutes || 1, 1);

  html += fieldSelect('cfg-logging', 'logging level', ['INFO','DEBUG','WARNING'],
    [cfg.logging && cfg.logging.level || 'INFO'], false);
  html += '</div>';

  /* ── Row 3: OHLCV + fee overrides + checkboxes (8 cols) ── */
  html += '<div class="form-row cols-8">';
  /* ohlcv_source_dir: span 2 */
  html += '<div class="form-group" style="grid-column:span 2"><label>ohlcv_source_dir</label>' +
    '<div style="display:flex;gap:var(--sp-xs)">' +

      '<button type="button" class="act-btn" style="white-space:nowrap" onclick="fillPbguiDataPath()" title="Use PBGui market data directory">📂 PBGui Data</button>' +
    '</div></div>';

  var mfEnabled = bt.maker_fee_override !== null && bt.maker_fee_override !== undefined;
  var mfVal = mfEnabled ? bt.maker_fee_override : 0;
  html += '<div class="form-group" style="grid-column:span 2"><label>&nbsp;</label>' +
    '<div class="chk-row"><input type="checkbox" id="cfg-maker-fee-enabled"' + (mfEnabled ? ' checked' : '') +
    ' onchange="document.getElementById(\'cfg-maker-fee-val\').disabled=!this.checked">' +

      '<button type="button" class="stepper-btn" onclick="var i=document.getElementById(\'cfg-maker-fee-val\');i.value=+(+i.value-0.00001).toFixed(5)">−</button>' +
      '<input type="number" id="cfg-maker-fee-val" value="' + mfVal + '" step="0.00001" min="0" max="0.01"' + (mfEnabled ? '' : ' disabled') + '>' +

    '</div></div>';
  /* taker_fee_override: span 2 */
  var tfEnabled = bt.taker_fee_override !== null && bt.taker_fee_override !== undefined;
  var tfVal = tfEnabled ? bt.taker_fee_override : 0;
  html += '<div class="form-group" style="grid-column:span 2"><label>&nbsp;</label>' +
    '<div class="chk-row"><input type="checkbox" id="cfg-taker-fee-enabled"' + (tfEnabled ? ' checked' : '') +
    ' onchange="document.getElementById(\'cfg-taker-fee-val\').disabled=!this.checked">' +
    '<label for="cfg-taker-fee-enabled">taker_fee_override</label></div>' +
    '<div class="num-stepper" style="margin-top:4px">' +
      '<button type="button" class="stepper-btn" onclick="var i=document.getElementById(\'cfg-taker-fee-val\');i.value=+(+i.value-0.00001).toFixed(5)">−</button>' +

  html += '<div class="form-group" style="justify-content:center">' +

  html += '</div>';

    '</div>' +
    '<div class="expander-body">';
  html += '<table class="tbl" style="width:100%;margin-bottom:var(--sp-sm)">' +
    '<thead><tr><th style="width:30px">✕</th><th>Coin</th><th>Exchange</th></tr></thead><tbody id="cs-tbody">';
  csKeys.forEach(function(coin) {
    html += '<tr data-coin="' + esc(coin) + '"><td style="text-align:center">' +
      '<input type="checkbox" class="cs-del-chk"></td>' +
      '<td>' + esc(coin) + '</td><td>' + esc(cs[coin]) + '</td></tr>';
  });
  html += '</tbody></table>';
  html += '<div style="display:flex;gap:var(--sp-sm);align-items:end">' +
    '<div class="form-group" style="flex:1"><label>Coin</label>' +
      '<input type="text" id="cs-add-coin" placeholder="e.g. BTC"></div>' +
    '<div class="form-group" style="flex:1"><label>Exchange</label>' +
      '<select id="cs-add-exchange">' +
        '<option>binance</option><option>bybit</option><option>bitget</option><option>okx</option><option>hyperliquid</option>' +
      '</select></div>' +
    '<div class="form-group"><button class="act-btn" onclick="csAddRow()">➕ Add</button></div>' +
    '<div class="form-group"><button class="act-btn" onclick="csDeleteChecked()" style="color:var(--red)">🗑 Delete</button></div>' +
  '</div>';
  html += '</div></div>';

  /* ── market_settings_sources (table editor) ── */
  var mss = bt.market_settings_sources || {};
  var mssKeys = Object.keys(mss).sort();
  html += '<div class="expander" id="exp-mss">' +
    '<div class="expander-header" onclick="toggleExpander(\'exp-mss\')">' +
      '<span class="arrow">▶</span> market_settings_sources (' + mssKeys.length + ' configured)' +
    '</div>' +
    '<div class="expander-body">';
  html += '<table class="tbl" style="width:100%;margin-bottom:var(--sp-sm)">' +
    '<thead><tr><th style="width:30px">✕</th><th>Coin</th><th>Exchange</th></tr></thead><tbody id="mss-tbody">';
  mssKeys.forEach(function(coin) {
    html += '<tr data-coin="' + esc(coin) + '"><td style="text-align:center">' +
      '<input type="checkbox" class="mss-del-chk"></td>' +
      '<td>' + esc(coin) + '</td><td>' + esc(mss[coin]) + '</td></tr>';
  });
  html += '</tbody></table>';
  html += '<div style="display:flex;gap:var(--sp-sm);align-items:end">' +
    '<div class="form-group" style="flex:1"><label>Coin</label>' +
      '<input type="text" id="mss-add-coin" placeholder="e.g. BTC"></div>' +

/* ─── Config editor multiselect component ─────────────────── */
var _cfgMs = {};  // id → {options: [], selected: [], highlightIdx: -1}
var _cfgEditorCfg = null;  // store cfg reference for exchange-change reloads
var _cfgMsCp = {
  'ms-cfg-app-long':  'ms-cfg-ign-long',
  'ms-cfg-ign-long':  'ms-cfg-app-long',
  'ms-cfg-app-short': 'ms-cfg-ign-short',
  'ms-cfg-ign-short': 'ms-cfg-app-short'
};

function cfgRebuildMs(id, options, selected) {
  _cfgMs[id] = { options: options.slice(), selected: selected.slice(), highlightIdx: -1 };
  cfgRenderMsTags(id);
  // Wire up input events (called after innerHTML rebuild each time editor opens)
  var wrap = document.getElementById(id);
  if (!wrap) return;
  var input = wrap.querySelector('.ms-input');
  if (!input) return;
  input.addEventListener('focus', function() { cfgShowMsDd(id, this.value); });
  input.addEventListener('input', function() { cfgShowMsDd(id, this.value); });
  input.addEventListener('blur', function() {
    var dd = wrap.querySelector('.ms-dropdown');
    if (dd) setTimeout(function() { dd.classList.remove('open'); }, 150);
  });
}

function cfgClearMs(id) {
  if (!_cfgMs[id]) return;
  _cfgMs[id].selected = [];
  cfgRenderMsTags(id);
}

function cfgSelectAllMs(id) {
  if (!_cfgMs[id]) return;
  var cpId = _cfgMsCp[id];
  var cpSelected = (cpId && _cfgMs[cpId]) ? _cfgMs[cpId].selected : [];
  _cfgMs[id].selected = _cfgMs[id].options.filter(function(o) {
    return cpSelected.indexOf(o) < 0;
  });
  cfgRenderMsTags(id);
}

function cfgGetMs(id) {
  return _cfgMs[id] ? _cfgMs[id].selected.slice() : [];
}

function cfgSetMs(id, vals) {
  if (!_cfgMs[id]) return;
  _cfgMs[id].selected = vals.slice();
  cfgRenderMsTags(id);
}

function cfgRenderMsTags(id) {
  var wrap = document.getElementById(id);
  if (!wrap) return;
  var inputEl = wrap.querySelector('.ms-input');
  wrap.querySelectorAll('.ms-tag').forEach(function(t) { t.remove(); });
  var state = _cfgMs[id];
  if (!state) return;
  state.selected.forEach(function(val) {
    var tag = document.createElement('span');
    tag.className = 'ms-tag';
    tag.innerHTML = val + ' <span class="ms-x" data-val="' + val + '">\u00d7</span>';
    wrap.insertBefore(tag, inputEl);
  });
  wrap.querySelectorAll('.ms-x').forEach(function(x) {
    x.addEventListener('click', function(e) {
      e.stopPropagation();
      var v = this.getAttribute('data-val');
      state.selected = state.selected.filter(function(s) { return s !== v; });
      cfgRenderMsTags(id);
    });
  });
  // When exchanges multiselect changes, reload symbols
  if (id === 'ms-cfg-exchanges' && _cfgEditorCfg) {
    loadCfgSymbols(_cfgEditorCfg);
  }
}

function cfgShowMsDd(id, filter) {
  var wrap = document.getElementById(id);
  if (!wrap) return;
  var dd = wrap.querySelector('.ms-dropdown');
  if (!dd) return;
  var state = _cfgMs[id];
  if (!state) return;
  var cpId = _cfgMsCp[id];
  var cpSelected = (cpId && _cfgMs[cpId]) ? _cfgMs[cpId].selected : [];
  var f = (filter || '').toUpperCase();
  var html = '';
  var count = 0;
  state.options.forEach(function(opt) {
    if (f && opt.toUpperCase().indexOf(f) < 0) return;
    var sel = state.selected.indexOf(opt) >= 0;
    var inOther = cpSelected.indexOf(opt) >= 0;
    var cls = 'ms-option' + (sel ? ' selected' : '') + (inOther ? ' in-other' : '');
    var label = inOther ? (opt + ' \u21c4') : opt;
    html += '<div class="' + cls + '" data-val="' + opt + '">' + label + '</div>';
    count++;
    if (count > 200) return;
  });
  dd.innerHTML = html;
  dd.classList.add('open');
  dd.querySelectorAll('.ms-option').forEach(function(el) {
    el.addEventListener('mousedown', function(e) {
      e.preventDefault();
      var v = this.getAttribute('data-val');
      var idx = state.selected.indexOf(v);
      if (idx >= 0) {
        state.selected.splice(idx, 1);
      } else {
        state.selected.push(v);
        if (cpId && _cfgMs[cpId]) {
          var cpIdx = _cfgMs[cpId].selected.indexOf(v);
          if (cpIdx >= 0) {
            _cfgMs[cpId].selected.splice(cpIdx, 1);
            cfgRenderMsTags(cpId);
          }
        }
      }
      cfgRenderMsTags(id);
      var inp = wrap.querySelector('.ms-input');
      cfgShowMsDd(id, inp ? inp.value : '');
    });
  });
}

async function loadCfgSymbols(cfg) {
  // Determine exchange list from the exchanges multiselect
  var exchanges = cfgGetMs('ms-cfg-exchanges');
  // Use first non-combined exchange for symbol lookup
  var exchange = '';
  for (var j = 0; j < exchanges.length; j++) {
    if (exchanges[j] !== 'combined') { exchange = exchanges[j]; break; }
  }

  var live2   = (cfg && cfg.live)   || {};
  var pbgui2  = (cfg && cfg.pbgui) || {};
  var appLong2  = (live2.approved_coins && live2.approved_coins.long)  || [];
  var appShort2 = (live2.approved_coins && live2.approved_coins.short) || [];
  var ignLong2  = (live2.ignored_coins  && live2.ignored_coins.long)   || [];
  var ignShort2 = (live2.ignored_coins  && live2.ignored_coins.short)  || [];
  var cfgTags   = pbgui2.tags || [];

  if (!exchange) {
    // No exchange — seed multiselects with existing coin values only
    var allCoins = appLong2.concat(appShort2).concat(ignLong2).concat(ignShort2)
      .filter(function(v, i, a) { return a.indexOf(v) === i; }).sort();
    cfgRebuildMs('ms-cfg-app-long',  allCoins, appLong2);
    cfgRebuildMs('ms-cfg-app-short', allCoins, appShort2);
    cfgRebuildMs('ms-cfg-ign-long',  allCoins, ignLong2);
    cfgRebuildMs('ms-cfg-ign-short', allCoins, ignShort2);
    cfgRebuildMs('ms-cfg-tags', cfgTags, cfgTags);
    return;
  }

  // apiFetch prepends API_BASE and returns parsed JSON — use raw fetch for the v7 endpoint
  var v7Base = API_BASE.replace('/backtest-v7', '/v7');
  try {
    var results = await Promise.all([
      fetch(v7Base + '/symbols?exchange=' + encodeURIComponent(exchange), {
        headers: { 'Authorization': 'Bearer ' + TOKEN }
      }).then(function(r) { return r.json(); }),
      fetch(v7Base + '/tags?exchange=' + encodeURIComponent(exchange), {
        headers: { 'Authorization': 'Bearer ' + TOKEN }
      }).then(function(r) { return r.json(); })
    ]);
    var symbols = (results[0].symbols || []).slice().sort();
    var allTags = (results[1].tags || []).slice().sort();
    cfgRebuildMs('ms-cfg-app-long',  symbols, appLong2);
    cfgRebuildMs('ms-cfg-app-short', symbols, appShort2);
    cfgRebuildMs('ms-cfg-ign-long',  symbols, ignLong2);
    cfgRebuildMs('ms-cfg-ign-short', symbols, ignShort2);
    cfgRebuildMs('ms-cfg-tags', allTags, cfgTags);
  } catch (e) {
    console.error('loadCfgSymbols failed:', e);
    // Fall back to seeding with existing values
    var fallback = appLong2.concat(appShort2).concat(ignLong2).concat(ignShort2)
      .filter(function(v, i, a) { return a.indexOf(v) === i; }).sort();
    cfgRebuildMs('ms-cfg-app-long',  fallback, appLong2);
    cfgRebuildMs('ms-cfg-app-short', fallback, appShort2);
    cfgRebuildMs('ms-cfg-ign-long',  fallback, ignLong2);
    cfgRebuildMs('ms-cfg-ign-short', fallback, ignShort2);
    cfgRebuildMs('ms-cfg-tags', cfgTags, cfgTags);
  }
}

/* ─── apply_filters (calls v7 filter API) ──────────────────── */
async function cfgApplyFilters() {
  var exchanges = cfgGetMs('ms-cfg-exchanges');
  if (!exchanges.length) { toast('Select at least one exchange', 'err'); return; }
  var v7Base = API_BASE.replace('/backtest-v7', '/v7');
  var mcap = parseFloat(document.getElementById('cfg-market-cap').value) || 0;
  var volMcap = parseFloat(document.getElementById('cfg-vol-mcap').value) || 10;
  var onlyCpt = document.getElementById('cfg-only-cpt').checked;
  var noticesIgnore = document.getElementById('cfg-notices-ignore').checked;
  var tags = cfgGetMs('ms-cfg-tags');

  var allApproved = new Set();
  var allIgnored  = new Set();
  for (var j = 0; j < exchanges.length; j++) {
    var ex = exchanges[j];
    if (ex === 'combined') continue;
    try {
      var url = v7Base + '/coins/filter?exchange=' + encodeURIComponent(ex) +
        '&market_cap=' + mcap + '&vol_mcap=' + volMcap +
        '&only_cpt=' + onlyCpt + '&notices_ignore=' + noticesIgnore;
      if (tags.length) url += '&tags=' + encodeURIComponent(tags.join(','));
      var resp = await fetch(url, { headers: { 'Authorization': 'Bearer ' + TOKEN } });
      var data = await resp.json();
      (data.approved || []).forEach(function(c) { allApproved.add(c); });
      (data.ignored || []).forEach(function(c) { allIgnored.add(c); });
    } catch(e) { console.error('filter failed for', ex, e); }
  }
  // ignored = ignored minus approved
  allApproved.forEach(function(c) { allIgnored.delete(c); });
  var appArr = Array.from(allApproved).sort();
  var ignArr = Array.from(allIgnored).sort();
  cfgSetMs('ms-cfg-app-long',  appArr);
  cfgSetMs('ms-cfg-app-short', appArr);
  cfgSetMs('ms-cfg-ign-long',  ignArr);
  cfgSetMs('ms-cfg-ign-short', ignArr);
  document.getElementById('cfg-apply-filters').checked = false;
  toast('Filters applied: ' + appArr.length + ' approved, ' + ignArr.length + ' ignored', 'ok');
}


function fmtGroup(id, label, inputHtml) {

}
function fieldText(id, label, value, editable, placeholder) {
  return fmtGroup(id, label,
    '<input type="text" id="' + id + '" value="' + esc(String(value)) + '"' +
    (editable ? '' : ' readonly') +
    (placeholder ? ' placeholder="' + esc(placeholder) + '"' : '') + '>');
}
function fieldNumber(id, label, value, step) {
  return fmtGroup(id, label,
    '<div class="num-stepper">' +
    '<button type="button" class="stepper-btn" onclick="var i=document.getElementById(\'' + id + '\');i.value=+(+i.value-' + step + ').toFixed(10)">−</button>' +
    '<input type="number" id="' + id + '" value="' + value + '" step="' + step + '">' +
    '<button type="button" class="stepper-btn" onclick="var i=document.getElementById(\'' + id + '\');i.value=+(+i.value+' + step + ').toFixed(10)">+</button>' +
    '</div>');
}
function fieldSelect(id, label, options, selected, multi) {
  var inner = '<select id="' + id + '"' + (multi ? ' multiple' : '') + '>';
  options.forEach(function(o) {
    var sel = (Array.isArray(selected) ? selected.indexOf(o) >= 0 : selected === o) ? ' selected' : '';
    inner += '<option value="' + esc(o) + '"' + sel + '>' + esc(o) + '</option>';
  });
  return fmtGroup(id, label, inner + '</select>');
}
function fieldCheckbox(id, label, checked) {
  return '<div class="form-group"><label>&nbsp;</label><div class="chk-row">' +
    '<input type="checkbox" id="' + id + '"' + (checked ? ' checked' : '') + '>' +

}

function collectConfig() {
  /* Build config from editor form fields */
  var rawEl = document.getElementById('cfg-raw-json');
  var cfg;
  try { cfg = JSON.parse(rawEl.value); } catch(e) { cfg = {}; }

  // Overlay form values
  var exchanges = cfgGetMs('ms-cfg-exchanges');

  if (!cfg.backtest) cfg.backtest = {};
  cfg.backtest.exchanges = exchanges;
  cfg.backtest.start_date = document.getElementById('cfg-start-date').value;
  cfg.backtest.end_date = document.getElementById('cfg-end-date').value;
  cfg.backtest.starting_balance = parseFloat(document.getElementById('cfg-starting-balance').value) || 10000;
  cfg.backtest.balance_sample_divider = parseFloat(document.getElementById('cfg-balance-divider').value) || 1;
  cfg.backtest.gap_tolerance_ohlcvs_minutes = parseFloat(document.getElementById('cfg-gap-tolerance').value) || 5;
  cfg.backtest.candle_interval_minutes = parseInt(document.getElementById('cfg-candle-interval').value) || 1;
  cfg.backtest.max_warmup_minutes = parseFloat(document.getElementById('cfg-max-warmup').value) || 1440;
  cfg.backtest.compress_cache = document.getElementById('cfg-compress').checked;
  cfg.backtest.filter_by_min_effective_cost = document.getElementById('cfg-filter-cost').checked;
  cfg.backtest.volume_normalization = document.getElementById('cfg-vol-norm').checked;
  cfg.backtest.btc_collateral_cap = parseFloat(document.getElementById('cfg-btc-cap').value) || 0;
  var ltvVal = parseFloat(document.getElementById('cfg-btc-ltv').value) || 0;
  cfg.backtest.btc_collateral_ltv_cap = ltvVal === 0 ? null : ltvVal;
  var ohlcvDir = document.getElementById('cfg-ohlcv-dir').value.trim();
  cfg.backtest.ohlcv_source_dir = ohlcvDir || null;

  // maker_fee_override
  if (document.getElementById('cfg-maker-fee-enabled').checked) {
    cfg.backtest.maker_fee_override = parseFloat(document.getElementById('cfg-maker-fee-val').value) || 0;
  } else {
    cfg.backtest.maker_fee_override = null;
  }

  // taker_fee_override
  if (document.getElementById('cfg-taker-fee-enabled').checked) {
    cfg.backtest.taker_fee_override = parseFloat(document.getElementById('cfg-taker-fee-val').value) || 0;
  } else {
    cfg.backtest.taker_fee_override = null;
  }

  // coin_sources and market_settings_sources
  var cs = csCollect();
  if (Object.keys(cs).length > 0) { cfg.backtest.coin_sources = cs; }
  else { delete cfg.backtest.coin_sources; }
  var mss = mssCollect();
  if (Object.keys(mss).length > 0) { cfg.backtest.market_settings_sources = mss; }
  else { delete cfg.backtest.market_settings_sources; }

  if (!cfg.logging) cfg.logging = {};
  cfg.logging.level = document.getElementById('cfg-logging').value;

  if (!cfg.live) cfg.live = {};
  cfg.live.minimum_coin_age_days = parseFloat(document.getElementById('cfg-min-coin-age').value) || 30;

  // Coins
  if (!cfg.live.approved_coins) cfg.live.approved_coins = {};
  if (!cfg.live.ignored_coins)  cfg.live.ignored_coins  = {};
  cfg.live.approved_coins.long  = cfgGetMs('ms-cfg-app-long');
  cfg.live.approved_coins.short = cfgGetMs('ms-cfg-app-short');
  cfg.live.ignored_coins.long   = cfgGetMs('ms-cfg-ign-long');
  cfg.live.ignored_coins.short  = cfgGetMs('ms-cfg-ign-short');
  cfg.live.empty_means_all_approved = document.getElementById('cfg-empty-all-approved').checked;

  if (!cfg.pbgui) cfg.pbgui = {};
  cfg.pbgui.market_cap     = parseFloat(document.getElementById('cfg-market-cap').value) || 0;
  cfg.pbgui.vol_mcap       = parseFloat(document.getElementById('cfg-vol-mcap').value) || 10;
  cfg.pbgui.tags           = cfgGetMs('ms-cfg-tags');
  cfg.pbgui.only_cpt       = document.getElementById('cfg-only-cpt').checked;
  cfg.pbgui.notices_ignore = document.getElementById('cfg-notices-ignore').checked;
  cfg.pbgui.dynamic_ignore = document.getElementById('cfg-dynamic-ignore').checked;

  // Bot config — try parsing JSON textareas, fall back to TWE/npos values
  if (!cfg.bot) cfg.bot = {};
  try { cfg.bot.long = JSON.parse(document.getElementById('cfg-bot-long').value); } catch(e) {
    if (!cfg.bot.long) cfg.bot.long = {};
  }
  try { cfg.bot.short = JSON.parse(document.getElementById('cfg-bot-short').value); } catch(e) {
    if (!cfg.bot.short) cfg.bot.short = {};
  }
  cfg.bot.long.total_wallet_exposure_limit = parseFloat(document.getElementById('cfg-twe-long').value) || 0;
  cfg.bot.long.n_positions = parseInt(document.getElementById('cfg-npos-long').value) || 0;
  cfg.bot.short.total_wallet_exposure_limit = parseFloat(document.getElementById('cfg-twe-short').value) || 0;
  cfg.bot.short.n_positions = parseInt(document.getElementById('cfg-npos-short').value) || 0;

  return cfg;
}

      var rect = panel.getBoundingClientRect();

      panel.style.top    = rect.top  + 'px';
      panel.style.right  = 'auto';
      panel.style.bottom = 'auto';
      var startX = e.clientX, startY = e.clientY;
      var startL = rect.left,  startT = rect.top;
      function onMove(e) {
        panel.style.left = (startL + e.clientX - startX) + 'px';
        panel.style.top  = (startT + e.clientY - startY) + 'px';
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup',   onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup',   onUp);
      e.preventDefault();
    });
  }

/* ── CSV parser (handles unquoted commas in quoted fields) ── */
function parseCSV(text) {
  var lines = text.split('\n');
  if (lines.length < 2) return { headers: [], rows: [] };
  var headers = lines[0].split(',');
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    var vals = lines[i].split(',');
    var row = {};
    for (var j = 0; j < headers.length; j++) {
      row[headers[j].trim()] = (vals[j] || '').trim();
    }
    rows.push(row);
  }
  return { headers: headers, rows: rows };
}

/* ── Fetch CSV from file-streaming endpoint ── */
function fetchCSV(path, file) {
  var url = API_BASE + '/results/' + file + '?path=' + encodeURIComponent(path);
  return fetch(url, { headers: { 'Authorization': 'Bearer ' + TOKEN } })
    .then(function(r) {
      if (!r.ok) throw new Error(r.statusText);
      return r.text();
    })
    .then(function(text) { return parseCSV(text); });
}

/* ── Row selection: click to toggle, drag to multi-select ── */
var _rowDragStart = null; /* { tr, y } */
var _rowDragSelecting = false;
var _rowDragMode = null;

/* ── Config row selection: click to toggle, drag to multi-select ── */
var _cfgDragStart = null;
var _cfgDragSelecting = false;
var _cfgDragMode = null;

(function() {
  function rowsOfCfg() {
    return Array.from(document.querySelectorAll('#configs-list .tbl tbody tr'));
  }
  function rowIdxAtY(rows, y) {
    var idx = 0;
    for (var i = 0; i < rows.length; i++) {
      if (y >= rows[i].getBoundingClientRect().top) idx = i;
    }
    return idx;
  }
  document.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    var tr = e.target.closest('#configs-list .tbl tbody tr');
    if (!tr || e.target.closest('.actions-cell')) return;
    e.preventDefault(); /* prevent text-selection / drag cursor */
    _cfgDragStart = { tr: tr, y: e.clientY };
    _cfgDragSelecting = false;
    _cfgDragMode = null;
  });
  document.addEventListener('mousemove', function(e) {
    if (!_cfgDragStart) return;
    if (!_cfgDragSelecting && Math.abs(e.clientY - _cfgDragStart.y) > 5) {
      _cfgDragSelecting = true;
      _cfgDragMode = _cfgDragStart.tr.classList.contains('selected') ? 'remove' : 'add';
    }
    if (_cfgDragSelecting) {
      e.preventDefault();
      var rows = rowsOfCfg();
      var anchor = rows.indexOf(_cfgDragStart.tr);
      var cur = rowIdxAtY(rows, e.clientY);
      var lo = Math.min(anchor, cur), hi = Math.max(anchor, cur);
      rows.forEach(function(r, i) {
        if (i >= lo && i <= hi) {
          if (_cfgDragMode === 'add') r.classList.add('selected');
          else r.classList.remove('selected');
        }
      });
    }
  });
  document.addEventListener('mouseup', function() {
    if (_cfgDragStart && !_cfgDragSelecting) {
      _cfgDragStart.tr.classList.toggle('selected');
    }
    _cfgDragStart = null;
    _cfgDragSelecting = false;
    _cfgDragMode = null;
  });
  document.addEventListener('dblclick', function(e) {
    var tr = e.target.closest('#configs-list .tbl tbody tr');
    if (!tr || e.target.closest('.actions-cell')) return;
    var name = tr.dataset.name;
    if (name) editConfig(name);
  });
}());

/* ── Results row selection: click to toggle, drag to multi-select ── */
(function() {
  function rowsOfRes() {
    return Array.from(document.querySelectorAll('#results-list .tbl tbody tr'));
  }
  function rowIdxAtY(rows, y) {
    var idx = 0;
    for (var i = 0; i < rows.length; i++) {
      if (y >= rows[i].getBoundingClientRect().top) idx = i;
    }
    return idx;
  }
  document.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    var tr = e.target.closest('#results-list .tbl tbody tr');
    if (!tr || e.target.closest('.actions-cell')) return;
    e.preventDefault(); /* prevent text-selection / drag cursor */
    _rowDragStart = { tr: tr, y: e.clientY };
    _rowDragSelecting = false;
    _rowDragMode = null;
  });
  document.addEventListener('mousemove', function(e) {
    if (!_rowDragStart) return;
    if (!_rowDragSelecting && Math.abs(e.clientY - _rowDragStart.y) > 5) {
      _rowDragSelecting = true;
      _rowDragMode = _rowDragStart.tr.classList.contains('selected') ? 'remove' : 'add';
    }
    if (_rowDragSelecting) {
      e.preventDefault();
      var rows = rowsOfRes();
      var anchor = rows.indexOf(_rowDragStart.tr);
      var cur = rowIdxAtY(rows, e.clientY);
      var lo = Math.min(anchor, cur), hi = Math.max(anchor, cur);
      rows.forEach(function(r, i) {
        if (i >= lo && i <= hi) {
          if (_rowDragMode === 'add') r.classList.add('selected');
          else r.classList.remove('selected');
        }
      });
    }
  });
  document.addEventListener('mouseup', function() {
    if (_rowDragStart && !_rowDragSelecting) {
      _rowDragStart.tr.classList.toggle('selected');
    }
    _rowDragStart = null;
    _rowDragSelecting = false;
    _rowDragMode = null;
  });
})();

/* Listen for fullscreen change to relayout the chart */

  var el = document.fullscreenElement;
  if (el && el.classList.contains('chart-wrap')) {
    var inner = el.querySelector('.chart-inner > div[id]');
    if (inner) setTimeout(function() { Plotly.relayout(inner.id, { autosize: true }); }, 50);

function startChartResize(e, divId) {
  var inner = document.getElementById(divId);
  if (!inner) return;
  e.preventDefault();
  var startY = e.clientY;
  var startH = inner.offsetHeight;
  function onMove(ev) {
    var newH = Math.max(200, startH + (ev.clientY - startY));
    inner.style.height = newH + 'px';
    if (inner.data) Plotly.relayout(divId, { height: newH });
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.body.style.userSelect = '';
  }
  document.body.style.userSelect = 'none';
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function startJsonResize(e, preId) {
  var pre = document.getElementById(preId);
  if (!pre) return;
  e.preventDefault();
  var startY = e.clientY;
  var startH = pre.offsetHeight;
  function onMove(ev) {
    var newH = Math.max(80, startH + (ev.clientY - startY));
    pre.style.height = newH + 'px';
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.body.style.userSelect = '';
  }
  document.body.style.userSelect = 'none';
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

/* ── Chart rendering based on active icon buttons ── */
function onResultActionsChanged() {
  var chartsEl = document.getElementById('results-charts');
  var filtered = window._filteredResults || [];

  /* Collect which results have which icons active */
  var viewIdxs = [], plotIdxs = [], fillsIdxs = [], configIdxs = [], analysisIdxs = [];
  document.querySelectorAll('.icon-btn.active').forEach(function(btn) {
    var idx = parseInt(btn.dataset.idx);
    var action = btn.dataset.action;
    if (action === 'view') viewIdxs.push(idx);
    else if (action === 'plot') plotIdxs.push(idx);
    else if (action === 'fills') fillsIdxs.push(idx);
    else if (action === 'config') configIdxs.push(idx);
    else if (action === 'analysis') analysisIdxs.push(idx);
  });

  if (!viewIdxs.length && !plotIdxs.length && !fillsIdxs.length && !configIdxs.length && !analysisIdxs.length) {
    chartsEl.style.display = 'none';
    chartsEl.innerHTML = '';
    return;
  }

  chartsEl.style.display = '';

  /* Save expanded state of JSON panels BEFORE clearing innerHTML */
  var _jsonState = {};
  chartsEl.querySelectorAll('.json-pre').forEach(function(pre) {
    if (pre.id) _jsonState[pre.id] = { h: pre.style.height, exp: pre.dataset.expanded || '0' };
  });

  chartsEl.innerHTML = '\x3Cdiv style="text-align:center;padding:var(--sp-lg);color:var(--text-dim)">Loading charts\u2026\x3C/div>';

  /* Process each active result in order */
  var html = '';
  var chartDivs = []; /* { id, type, path, result, idx } */
  var allIdxs = Array.from(new Set(viewIdxs.concat(plotIdxs).concat(fillsIdxs).concat(configIdxs).concat(analysisIdxs)));
  allIdxs.sort(function(a,b){return a-b;});

  allIdxs.forEach(function(idx) {
    var r = filtered[idx];
    if (!r) return;
    var showView = viewIdxs.indexOf(idx) >= 0;
    var showPlot = plotIdxs.indexOf(idx) >= 0;
    var showFills = fillsIdxs.indexOf(idx) >= 0;
    var showConfig = configIdxs.indexOf(idx) >= 0;
    var showAnalysis = analysisIdxs.indexOf(idx) >= 0;
    var vsClose = 'closeViewSection(' + idx + ')';

    if (showView) {
      html += '\x3Cdiv id="view-section-' + idx + '">';

      /* Liquidation warning */
      var eqbDiff = r.equity_balance_diff_neg_max || 0;
      if (eqbDiff >= 1.0) {
        html += '\x3Cdiv style="background:rgba(255,75,75,.15);color:var(--red);padding:var(--sp-sm) var(--sp-md);border-radius:4px;margin-bottom:var(--sp-sm);font-weight:600">\u26A0 Backtest ended in liquidation (equity_balance_diff_neg_max=' + fmt(eqbDiff, 4) + ')\x3C/div>';
      }

      /* 1. Balance & Equity chart */
      var beId = 'be-chart-' + idx;
      html += '\x3Cdiv style="margin-bottom:var(--sp-xs)">\x3Clabel class="sb-toggle">\x3Cinput type="checkbox" id="log-toggle-' + idx + '" onchange="toggleLogScale(\'' + beId + '\', this.checked)">\x3Cspan style="font-size:var(--fs-sm)">logarithmic\x3C/span>\x3C/label>\x3C/div>';
      html += chartWrap(beId, vsClose);
      chartDivs.push({ id: beId, type: 'be', path: r.path, result: r, idx: idx });

      /* 2. PnL per Symbol chart */
      var pnlId = 'pnl-chart-' + idx;
      html += '\x3Cdiv style="margin-bottom:var(--sp-xs)">\x3Clabel class="sb-toggle">\x3Cinput type="checkbox" id="pnl-log-toggle-' + idx + '" onchange="toggleLogScale(\'' + pnlId + '\', this.checked)">\x3Cspan style="font-size:var(--fs-sm)">logarithmic\x3C/span>\x3C/label>\x3C/div>';
      html += chartWrap(pnlId, vsClose);
      chartDivs.push({ id: pnlId, type: 'pnl_symbol', path: r.path, result: r, idx: idx });

      /* 3. Drawdown chart */
      var ddId = 'dd-chart-' + idx;
      html += chartWrap(ddId, vsClose);
      chartDivs.push({ id: ddId, type: 'drawdown', path: r.path, result: r, idx: idx });

      /* 4. TWE chart — resolution dropdown + show coins toggle */
      var tweId = 'twe-chart-' + idx;
      html += '\x3Cdiv style="margin-bottom:var(--sp-xs);display:flex;align-items:center;gap:var(--sp-md);flex-wrap:wrap">';
      html += '\x3Clabel style="font-size:var(--fs-sm);color:var(--text-dim)" title="Small resolutions with many symbols generate a lot of data and can take a long time to render">Resolution (min) \x3Cspan style="cursor:help;opacity:.6">(i)\x3C/span>:\x3C/label>';
      html += '\x3Cselect class="sb-input" style="max-width:100px" id="twe-res-' + idx + '" onchange="rerenderTWEChart(' + idx + ')">';
      [1440,720,240,60,30,15,10,5,2,1].forEach(function(v) {
        html += '\x3Coption value="' + v + '"' + (v === 1440 ? ' selected' : '') + '>' + v + '\x3C/option>';
      });
      html += '\x3C/select>';
      html += '\x3Clabel class="sb-toggle" title="Show all per-coin traces (double-click a legend entry to isolate one coin)">\x3Cinput type="checkbox" id="twe-showcoins-' + idx + '" onchange="toggleTWECoins(\'' + tweId + '\', this.checked)">\x3Cspan style="font-size:var(--fs-sm)">Show coins\x3C/span>\x3C/label>';
      html += '\x3C/div>';

      /* BTC charts if btc_collateral_cap > 0 */
      if (r.btc_collateral_cap > 0) {
        var beBtcId = 'be-btc-chart-' + idx;
        html += chartWrap(beBtcId, vsClose);
        chartDivs.push({ id: beBtcId, type: 'be_btc', path: r.path, result: r, idx: idx });
        var ddBtcId = 'dd-btc-chart-' + idx;
        html += chartWrap(ddBtcId, vsClose);
        chartDivs.push({ id: ddBtcId, type: 'drawdown_btc', path: r.path, result: r, idx: idx });
      }

      html += '\x3C/div>'; /* end view-section */
    }

    if (showAnalysis) {
      var awrapId = 'analysis-wrap-' + idx;
      var apreId = 'analysis-json-' + idx;
      html += '\x3Cdiv class="json-panel-wrap" id="' + awrapId + '">' +
        '\x3Cdiv class="json-panel-hdr">' +
          '\x3Cspan class="sb-label">Analysis\x3C/span>' +
          '\x3Cbutton class="act-btn" onclick="copyJsonPanel(\'' + apreId + '\',this)" title="Copy to clipboard" style="font-size:var(--fs-xs);padding:2px 8px">\u29c9 Copy\x3C/button>' +
          '\x3Cbutton class="act-btn" onclick="expandJsonPanel(\'' + apreId + '\',this)" title="Expand / Collapse" style="font-size:var(--fs-xs);padding:2px 8px">\u2b0c Expand\x3C/button>' +
          '\x3Cbutton class="json-panel-close" onclick="closeAnalysisSection(' + idx + ')" title="Close">\u2715\x3C/button>' +
        '\x3C/div>' +
        '\x3Cpre id="' + apreId + '" class="json-pre">\x3C/pre>' +
        '\x3Cdiv class="chart-resize-handle" onmousedown="startJsonResize(event,\'' + apreId + '\')" title="Drag to resize">\x3Cspan>\x3C/span>\x3C/div>' +
        '\x3C/div>';
      chartDivs.push({ id: apreId, type: 'analysis_json', path: r.path, result: r, idx: idx });
    }

    if (showConfig) {
      var cwrapId = 'config-wrap-' + idx;
      var cpreId = 'config-json-' + idx;
      html += '\x3Cdiv class="json-panel-wrap" id="' + cwrapId + '">' +
        '\x3Cdiv class="json-panel-hdr">' +
          '\x3Cspan class="sb-label">Config\x3C/span>' +
          '\x3Cbutton class="act-btn" onclick="copyJsonPanel(\'' + cpreId + '\',this)" title="Copy to clipboard" style="font-size:var(--fs-xs);padding:2px 8px">\u29c9 Copy\x3C/button>' +
          '\x3Cbutton class="act-btn" onclick="expandJsonPanel(\'' + cpreId + '\',this)" title="Expand / Collapse" style="font-size:var(--fs-xs);padding:2px 8px">\u2b0c Expand\x3C/button>' +
          '\x3Cbutton class="json-panel-close" onclick="closeConfigSection(' + idx + ')" title="Close">\u2715\x3C/button>' +
        '\x3C/div>' +
        '\x3Cpre id="' + cpreId + '" class="json-pre">\x3C/pre>' +
        '\x3Cdiv class="chart-resize-handle" onmousedown="startJsonResize(event,\'' + cpreId + '\')" title="Drag to resize">\x3Cspan>\x3C/span>\x3C/div>' +
        '\x3C/div>';
      chartDivs.push({ id: cpreId, type: 'config_json', path: r.path, result: r, idx: idx });
    }

    if (showPlot) {
      /* Show PB7-generated PNG images */
      var imgId = 'plot-imgs-' + idx;
      var plotWrapId = 'plot-section-' + idx;
      html += '\x3Cdiv class="chart-wrap" id="' + plotWrapId + '" style="margin-top:var(--sp-md)">' +
        '\x3Cbutton class="chart-close-btn" onclick="closePlotSection(' + idx + ')" title="Close">\u2715\x3C/button>' +
        '\x3Cdiv id="' + imgId + '" style="padding:var(--sp-md)">\x3C/div>' +
        '\x3C/div>';
      chartDivs.push({ id: imgId, type: 'plot_images', path: r.path, result: r, idx: idx });
    }

    if (showFills) {
      /* Show fills_plots/*.png images */
      var fillsImgId = 'fills-imgs-' + idx;
      var fillsWrapId = 'fills-section-' + idx;
      html += '\x3Cdiv class="chart-wrap" id="' + fillsWrapId + '" style="margin-top:var(--sp-md)">' +
        '\x3Cbutton class="chart-close-btn" onclick="closeFillsSection(' + idx + ')" title="Close">\u2715\x3C/button>' +
        '\x3Cdiv id="' + fillsImgId + '" style="padding:var(--sp-md)">\x3C/div>' +
        '\x3C/div>';
      chartDivs.push({ id: fillsImgId, type: 'fills_images', path: r.path, result: r, idx: idx });
    }
  });

  chartsEl.innerHTML = html;

  /* Restore expanded state of JSON panels */
  Object.keys(_jsonState).forEach(function(preId) {
    var pre = document.getElementById(preId);
    if (!pre) return;
    var s = _jsonState[preId];
    pre.dataset.expanded = s.exp;
    if (s.exp === '1') {
      pre.style.height = s.h || 'auto';
      var hdr = pre.closest('.json-panel-wrap');
      if (hdr) {
        var expandBtn = hdr.querySelector('.act-btn[onclick*="expandJsonPanel"]');
        if (expandBtn) expandBtn.textContent = '\u2b0d Collapse';
      }
    } else if (s.h) {
      pre.style.height = s.h;
    }
  });

  /* Now load data and render each chart */
  chartDivs.forEach(function(cd) {
    if (cd.type === 'be' || cd.type === 'be_btc' || cd.type === 'drawdown' || cd.type === 'drawdown_btc') {
      loadAndRenderBEChart(cd);
    } else if (cd.type === 'pnl_symbol') {

    } else if (cd.type === 'twe') {
      loadAndRenderTWEChart(cd);
    } else if (cd.type === 'analysis_json') {
      loadAnalysis(cd);
    } else if (cd.type === 'config_json') {
      loadConfig(cd);
    } else if (cd.type === 'plot_images') {
      loadPlotImages(cd);
    } else if (cd.type === 'fills_images') {
      loadFillsImages(cd);
    }
  });
}

/* ── Balance & Equity chart (matches Streamlit view_chart_be) ── */
var _beCache = {}; /* path → parsed BE data */

function loadAndRenderBEChart(cd) {
  if (_beCache[cd.path]) {
    renderBEChart(cd, _beCache[cd.path]);
    return;
  }
  fetchCSV(cd.path, 'equity').then(function(csv) {
    var be = normalizeBE(csv, cd.result);
    _beCache[cd.path] = be;
    renderBEChart(cd, be);
  }).catch(function(e) {
    document.getElementById(cd.id).innerHTML = '<div style="color:var(--red);padding:var(--sp-md)">Failed to load BE data: ' + esc(e.message) + '</div>';
  });
}

/* Normalize BE CSV to { time[], balance[], equity[], balance_btc[], equity_btc[] }
   Mirrors Streamlit load_be() logic exactly */
function normalizeBE(csv, result) {
  var rows = csv.rows;
  var headers = csv.headers.map(function(h) { return h.trim(); });
  var be = { time: [], balance: [], equity: [], balance_btc: [], equity_btc: [] };
  if (!rows.length) return be;

  /* Detect format: new (datetime index + usd_ columns) vs old (minute index + balance/equity columns) */
  var firstRow = rows[0];
  var indexKey = headers[0] || ''; /* first column is the index */
  var hasUsd = headers.indexOf('usd_total_balance') >= 0;
  var hasMinuteIdx = !isNaN(parseFloat(firstRow[indexKey]));

  if (hasUsd) {
    /* New format: index is datetime string */
    rows.forEach(function(r) {
      be.time.push(r[indexKey] || '');
      be.balance.push(parseFloat(r['usd_total_balance']) || 0);
      be.equity.push(parseFloat(r['usd_total_equity']) || 0);
      be.balance_btc.push(parseFloat(r['btc_total_balance']) || 0);
      be.equity_btc.push(parseFloat(r['btc_total_equity']) || 0);
    });
  } else if (hasMinuteIdx) {
    /* Old format: index is minutes, columns are balance, equity */
    var endDate = result.end_date || '';
    var endTs = endDate ? new Date(endDate).getTime() : Date.now();
    var maxMinute = parseFloat(rows[rows.length - 1][indexKey]) || 1;
    var startTs = endTs - (maxMinute * 60000);
    rows.forEach(function(r) {
      var minute = parseFloat(r[indexKey]) || 0;
      be.time.push(new Date(startTs + minute * 60000).toISOString());
      be.balance.push(parseFloat(r['balance']) || 0);
      be.equity.push(parseFloat(r['equity']) || 0);
      be.balance_btc.push(parseFloat(r['balance_btc']) || 0);
      be.equity_btc.push(parseFloat(r['equity_btc']) || 0);
    });
  } else {
    /* Fallback: try datetime index */
    rows.forEach(function(r) {
      be.time.push(r[indexKey] || '');
      be.balance.push(parseFloat(r['balance'] || r['usd_total_balance']) || 0);
      be.equity.push(parseFloat(r['equity'] || r['usd_total_equity']) || 0);
      be.balance_btc.push(parseFloat(r['balance_btc'] || r['btc_total_balance']) || 0);
      be.equity_btc.push(parseFloat(r['equity_btc'] || r['btc_total_equity']) || 0);
    });
  }
  return be;
}

function renderBEChart(cd, be) {
