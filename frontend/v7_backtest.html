function ensureJsonFieldHighlightOverlay(textarea) {
  if (!textarea || textarea.id === 'cfg-raw-json' || textarea.id === 'cfg-bot-long' || textarea.id === 'cfg-bot-short') return null;
  var anchor = window.PBGuiEditorShared.captureTextareaAnchor(textarea);
  var wrapper = textarea.parentNode;
  if (!wrapper || !wrapper.classList || !wrapper.classList.contains('json-highlight-wrap')) {
    var parent = textarea.parentNode;
    var nextWrapper = document.createElement('div');
    nextWrapper.className = 'json-highlight-wrap';
    parent.insertBefore(nextWrapper, textarea);
    nextWrapper.appendChild(textarea);
    wrapper = nextWrapper;
  }
  var pre = textarea._jsonHighlightPre || wrapper.querySelector('.json-highlight-pre');
  if (!pre) {
    var cs = window.getComputedStyle(textarea);
    pre = document.createElement('pre');
    pre.className = 'json-highlight-pre';
    pre.setAttribute('aria-hidden', 'true');
    pre.style.cssText = [
      'position:absolute', 'top:0', 'left:0', 'right:0', 'bottom:0',
      'margin:0',
      'padding:' + cs.padding,
      'font-family:' + cs.fontFamily,
      'font-size:' + cs.fontSize,
      'line-height:' + cs.lineHeight,
      'white-space:pre-wrap',
      'word-wrap:break-word',
      'overflow:hidden',
      'pointer-events:none',
      'background:transparent',
      'border:1px solid transparent',
      'box-sizing:border-box',
      'color:transparent',
      'z-index:0'
    ].join(';');
    wrapper.insertBefore(pre, textarea);
    textarea.addEventListener('scroll', function() {
      if (textarea._jsonHighlightPre) textarea._jsonHighlightPre.scrollTop = textarea.scrollTop;
    });
  }
  textarea._jsonHighlightPre = pre;
  window.PBGuiEditorShared.restoreTextareaAnchor(textarea, anchor);
  return pre;
}

function syncJsonFieldHighlightOverlay(textarea) {
  if (!textarea || textarea.id === 'cfg-raw-json' || textarea.id === 'cfg-bot-long' || textarea.id === 'cfg-bot-short') return;
  var pre = ensureJsonFieldHighlightOverlay(textarea);
  if (!pre) return;
  var errorLine = textarea._jsonValidationError ? textarea._jsonValidationError.line : null;
  if (!errorLine) {
    pre.innerHTML = '';
    pre.style.display = 'none';
    textarea.style.background = '';
    textarea.style.color = '';
    textarea.style.caretColor = '';
    textarea.style.position = '';
    textarea.style.zIndex = '';
    return;
  }
  try {
    var cs = window.getComputedStyle(textarea);
    pre.innerHTML = (textarea.value || '').split('\n').map(function(line, index) {
      var styles = ['display:block'];
      if (errorLine === index + 1) {
        styles.push('box-shadow:inset 3px 0 0 rgba(255,75,75,0.95)', 'background:rgba(255,75,75,0.16)', 'border-radius:2px');
      }
      return '<span style="' + styles.join(';') + '">' + (esc(line) || '&nbsp;') + '</span>';
    }).join('');
    textarea.style.position = 'relative';
    textarea.style.zIndex = '1';
    textarea.style.background = 'transparent';
    textarea.style.color = cs.color;
    textarea.style.caretColor = cs.color;
    pre.style.display = 'block';
    pre.style.height = textarea.offsetHeight + 'px';
    pre.scrollTop = textarea.scrollTop;
  } catch (e) {
    pre.innerHTML = '';
    pre.style.display = 'none';
    textarea.style.color = '';
    textarea.style.background = '';
    textarea.style.caretColor = '';
    textarea.style.position = '';
    textarea.style.zIndex = '';
  }
}

function setJsonFieldValidationState(textarea, error) {
  if (!textarea) return;
  textarea.classList.toggle('json-invalid', !!error);
  textarea._jsonValidationError = error || null;
  if ((textarea.id === 'cfg-bot-long' || textarea.id === 'cfg-bot-short') && !textarea._botHighlightSync && error) {
    _applyBotJsonHighlight(textarea, textarea.id === 'cfg-bot-long' ? _cfgBotParamStatus.long : _cfgBotParamStatus.short);
  }
  if (textarea._botHighlightSync) textarea._botHighlightSync();
  else syncJsonFieldHighlightOverlay(textarea);

  var statusEl = getJsonFieldStatusEl(textarea);
  if (!error) {
    if (statusEl) {
      statusEl.innerHTML = '';
      statusEl.className = 'field-status field-status-inline';
    }
    window.PBGuiEditorShared.clearFixedValidationStatus(textarea.id);
    return;
  }

  var summary = getJsonFieldLabel(textarea) + ' is invalid';
  if (error.line != null && error.column != null) {
    summary += ' at line ' + error.line + ', column ' + error.column;
  }
  if (statusEl) {
    statusEl.innerHTML = '';
    statusEl.className = 'field-status field-status-inline';
  }
  window.PBGuiEditorShared.setFixedValidationStatus(textarea.id, {
    summary: summary,
    message: error.message || '',
    actionLabel: error.line != null ? 'Reveal line in editor' : '',
    action: error.line != null ? function() { revealJsonFieldError(textarea.id); } : null,
  });
}

function validateJsonFieldTextarea(textarea) {
  if (!textarea) return { parsed: null, error: null };
  var validation = validateJsonText(textarea.value, getJsonFieldValidationOptions(textarea));
  setJsonFieldValidationState(textarea, validation.error);
  return validation;
}

function revealJsonFieldError(textareaId) {
  var textarea = document.getElementById(textareaId);
  if (!textarea || !textarea._jsonValidationError) return;
  var detail = getJsonLineDetail(textarea.value || '', textarea._jsonValidationError.line, textarea._jsonValidationError.column);
  textarea.focus();
  if (!detail) return;
  try {
    textarea.setSelectionRange(detail.selectionStart, detail.selectionEnd);
  } catch (e) {}
  var style = window.getComputedStyle(textarea);
  var lineHeight = parseFloat(style.lineHeight) || 20;
  var paddingTop = parseFloat(style.paddingTop) || 0;
  var targetTop = window.scrollY + textarea.getBoundingClientRect().top + paddingTop + Math.max(0, detail.line - 2) * lineHeight - 120;
  window.scrollTo({ top: Math.max(0, targetTop), behavior: 'smooth' });
}

function bindJsonFieldValidation(textareaId, opts) {
  var textarea = document.getElementById(textareaId);
  if (!textarea) return;
  opts = opts || {};
  textarea.dataset.jsonStatusId = opts.statusId || (textareaId + '-status');
  textarea.dataset.jsonLabel = opts.label || textareaId;
  textarea.dataset.jsonExpectObject = opts.expectObject ? '1' : '';
  textarea.dataset.jsonEmptyMessage = opts.emptyMessage || 'JSON cannot be empty';
  if (!textarea.dataset.jsonValidationBound) {
    textarea.dataset.jsonValidationBound = '1';
    textarea.addEventListener('input', function() {
      validateJsonFieldTextarea(textarea);
    });
    textarea.addEventListener('blur', function() {
      validateJsonFieldTextarea(textarea);
    });
  }
  if (opts.skipInitialValidation && !(textarea.value || '').trim()) {
    setJsonFieldValidationState(textarea, null);
    return;
  }
  validateJsonFieldTextarea(textarea);
}

function bindStructuredJsonFieldValidation() {
  bindJsonFieldValidation('cfg-bot-long', {
    expectObject: true,
    emptyMessage: 'Long config cannot be empty',
    label: 'Long config JSON'
  });
  bindJsonFieldValidation('cfg-bot-short', {
    expectObject: true,
    emptyMessage: 'Short config cannot be empty',
    label: 'Short config JSON'
  });
  bindJsonFieldValidation('import-json', {
    expectObject: true,
    emptyMessage: 'Config cannot be empty',
    label: 'Import JSON',
    statusId: 'import-error',
    skipInitialValidation: true
  });
  _extraBtKeys.forEach(function(k) {
    var textarea = document.getElementById('extra-bt-' + k);
    if (!textarea || textarea.tagName !== 'TEXTAREA') return;
    bindJsonFieldValidation(textarea.id, {
      expectObject: false,
      emptyMessage: 'JSON value cannot be empty',
      label: k + ' JSON'
    });
  });
}

function ensureStructuredJsonFieldsValidForSave() {
  var fields = [
    document.getElementById('cfg-bot-long'),
    document.getElementById('cfg-bot-short')
  ];
  _extraBtKeys.forEach(function(k) {
    var textarea = document.getElementById('extra-bt-' + k);
    if (textarea && textarea.tagName === 'TEXTAREA') fields.push(textarea);
  });

  var firstInvalid = null;
  fields.forEach(function(textarea) {
    if (!textarea) return;
    var validation = validateJsonFieldTextarea(textarea);
    if (!validation.error || firstInvalid) return;
    firstInvalid = { textarea: textarea, validation: validation };
  });
  if (!firstInvalid) return true;

  var expander = firstInvalid.textarea.closest('.expander');
  if (expander) expander.classList.add('open');
  revealJsonFieldError(firstInvalid.textarea.id);
  var msg = getJsonFieldLabel(firstInvalid.textarea) + ' is invalid';
  if (firstInvalid.validation.error.line != null && firstInvalid.validation.error.column != null) {
    msg += ' at line ' + firstInvalid.validation.error.line + ', column ' + firstInvalid.validation.error.column;
  }
  toast(msg + '. Fix it before saving.', 'err');
  return false;
}

function ensureRawJsonValidForSave() {
  var rawEl = document.getElementById('cfg-raw-json');
  var validation = validateRawJson(rawEl ? rawEl.value : '');
  setRawJsonValidationError(validation.error);
  if (!validation.error) return true;
  var rawExpander = document.getElementById('exp-raw');
  if (rawExpander) rawExpander.classList.add('open');
  revealRawJsonError();
  var msg = 'Raw JSON is invalid';
  if (validation.error.line != null && validation.error.column != null) {
    msg += ' at line ' + validation.error.line + ', column ' + validation.error.column;
  }
  toast(msg + '. Fix it before saving.', 'err');
  return false;
}

function cfgShouldIgnoreStructuredSyncTarget(target, phase) {
  if (!target) return true;
  if (target.id === 'cfg-raw-json') return true;
  if (target.classList && target.classList.contains('ms-input')) return true;
  if (phase === 'input' && target.tagName === 'TEXTAREA') {
    if (target.id === 'cfg-bot-long' || target.id === 'cfg-bot-short') return true;
    if (target.id === 'cov-cfg-long' || target.id === 'cov-cfg-short') return true;
    if (target.dataset && target.dataset.extraBtType === 'json') return true;
  }
  return false;
}

function cfgSyncExtraBtFields(bt) {
  var extraBtInfo = buildExtraBtExpanderHtml(bt || {});
  var nextKeys = extraBtInfo.keys;
  var currentEl = document.getElementById('exp-extra-bt');
  var rawEl = document.getElementById('exp-raw');
  var wasOpen = currentEl && currentEl.classList.contains('open');
  var sameKeys = JSON.stringify((_extraBtKeys || []).slice()) === JSON.stringify(nextKeys);

  _extraBtKeys = nextKeys.slice();

  if (!sameKeys) {
    if (currentEl) currentEl.remove();
    if (nextKeys.length && rawEl) {
      rawEl.insertAdjacentHTML('beforebegin', extraBtInfo.html);
      var nextEl = document.getElementById('exp-extra-bt');
      if (nextEl && wasOpen) nextEl.classList.add('open');
      nextKeys.forEach(function(k) {
        var el = document.getElementById('extra-bt-' + k);
        if (el && el.tagName === 'TEXTAREA') autoResizeTa(el);
      });
    }
    bindStructuredJsonFieldValidation();
    return;
  }

  nextKeys.forEach(function(k) {
    var el = document.getElementById('extra-bt-' + k);
    if (!el) return;
    var type = el.getAttribute('data-extra-bt-type');
    var value = bt[k];
    if (type === 'boolean') {
      el.checked = !!value;
    } else if (type === 'number') {
      el.value = value === undefined || value === null ? '' : String(value);
    } else if (type === 'json') {
      el.value = JSON.stringify(value, null, 2);
      autoResizeTa(el);
    } else if (type === 'null') {
      if (value === undefined || value === null) {
        el.value = '';
      } else if (typeof value === 'string') {
        el.value = value;
      } else {
        el.value = JSON.stringify(value);
      }
    } else {
      el.value = value === undefined || value === null ? '' : String(value);
    }
  });
  bindStructuredJsonFieldValidation();
}

function cfgSyncEditorFromParsed(name, cfg) {

  var live = (cfg && cfg.live) || {};

  cfgSetFieldValue('cfg-liq-thresh', bt.liquidation_threshold !== undefined ? bt.liquidation_threshold : 0.05);
  cfgSetFieldValue('cfg-mo-slippage', bt.market_order_slippage_pct !== undefined ? bt.market_order_slippage_pct : 0.0005);
  cfgSetFieldValue('cfg-ohlcv-dir', bt.ohlcv_source_dir || '');
  cfgSetFieldValue('cfg-candle-interval', bt.candle_interval_minutes || 1);
  cfgSetFieldValue('cfg-gap-tolerance', bt.gap_tolerance_ohlcvs_minutes || 5);
  cfgSetFieldValue('cfg-logging', logging.level || 'INFO');
  cfgSetFieldValue('cfg-market-cap', pbgui.market_cap !== undefined ? pbgui.market_cap : 0);
  cfgSetFieldValue('cfg-vol-mcap', pbgui.vol_mcap !== undefined ? pbgui.vol_mcap : 10);
  cfgSetCheckedValue('cfg-dyn-wel', bt.dynamic_wel_by_tradability !== undefined ? bt.dynamic_wel_by_tradability : true);
  cfgSetCheckedValue('cfg-filter-cost', bt.filter_by_min_effective_cost !== undefined ? bt.filter_by_min_effective_cost : (live.filter_by_min_effective_cost !== false));
  cfgSetCheckedValue('cfg-compress', !!bt.compress_cache);
  cfgSetCheckedValue('cfg-vol-norm', !!bt.volume_normalization);
  cfgSetCheckedValue('cfg-only-cpt', !!pbgui.only_cpt);
  cfgSetCheckedValue('cfg-notices-ignore', !!pbgui.notices_ignore);
  cfgSetCheckedValue('cfg-maker-fee-enabled', mfEnabled);
  cfgSetFieldValue('cfg-maker-fee-val', mfEnabled ? bt.maker_fee_override : 0);
  cfgSetCheckedValue('cfg-taker-fee-enabled', tfEnabled);
  cfgSetFieldValue('cfg-taker-fee-val', tfEnabled ? bt.taker_fee_override : 0);
  cfgSetFieldValue('cfg-twe-long', ((bot.long || {}).total_wallet_exposure_limit || 1));
  cfgSetFieldValue('cfg-npos-long', ((bot.long || {}).n_positions || 1));
  cfgSetFieldValue('cfg-twe-short', ((bot.short || {}).total_wallet_exposure_limit || 0));
  cfgSetFieldValue('cfg-npos-short', ((bot.short || {}).n_positions || 0));

  var startDateEl = document.getElementById('cfg-start-date');
  if (startDateEl) startDateEl.dataset.prev = startDateEl.value;

  if (endDateEl) endDateEl.dataset.prev = endDateEl.value;

  suiteLoad(cfg, { preserveEdit: true });
  coinOvSetConfigName(name);
  coinOvLoad(cfg);
  cfgSyncExtraBtFields(bt);
  cfgRestoreRawAnchor(anchor);
  if (cfg._pbgui_param_status) setCfgBotParamStatus(cfg._pbgui_param_status);

function applyStructuredEditorSync() {
  if (_rawEditorSyncing || _structuredEditorSyncing) return;
  var rawEl = document.getElementById('cfg-raw-json');
  if (!rawEl) return;
  if (document.activeElement === rawEl) return;

  var currentRaw = rawEl.value || '';
  if (currentRaw.trim()) {
    var structuredValidation = validateRawJson(currentRaw);
    if (structuredValidation.error) {
      setRawJsonValidationError(structuredValidation.error);
      return;
    }
  }

  _structuredEditorSyncing = true;
  try {
    var nextCfg = collectConfig();
    var nextRaw = JSON.stringify(nextCfg, null, 2);
    if (rawEl.value === nextRaw) {
      _rawEditorLastApplied = nextRaw;
      return;
    }
    var rawScrollTop = rawEl.scrollTop;
    rawEl.value = nextRaw;
    rawEl.scrollTop = Math.min(rawScrollTop, rawEl.scrollHeight);
    autoResizeTa(rawEl);
    _rawEditorLastApplied = nextRaw;
    setRawJsonValidationError(null);
  } finally {
    _structuredEditorSyncing = false;
  }
}

function applyRawJsonEditorSync() {
  if (_rawEditorSyncing) return;
  var rawEl = document.getElementById('cfg-raw-json');
  if (!rawEl) return;

  var raw = rawEl.value;
  var rawValidation = validateRawJson(raw);
  setRawJsonValidationError(rawValidation.error);
  if (rawValidation.error || raw === _rawEditorLastApplied) return;

  var parsed = rawValidation.parsed;
  if (!parsed) return;

  var nameEl = document.getElementById('cfg-name');
  var displayName = nameEl ? nameEl.value.trim() : '';

  _rawEditorSyncing = true;
  try {
    cfgSyncEditorFromParsed(displayName, parsed);
    _rawEditorLastApplied = raw;
    setRawJsonValidationError(null);
  } finally {
    _rawEditorSyncing = false;
  }
}

function toggleExpander(id) {
  var el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('open');
  if (el.classList.contains('open')) {
    el.querySelectorAll('textarea').forEach(function(ta) { autoResizeTa(ta); });
  }
}

/* ─── Config editor multiselect component ─────────────────── */
var _cfgMs = {};  // id → {options: [], selected: [], highlightIdx: -1, coinMeta: {}}
var _cfgEditorCfg = null;  // store cfg reference for exchange-change reloads
var _cfgSymbolsLoadSeq = 0;
var _structuredEditorSyncing = false;
var _cfgMsCp = {
  'ms-cfg-app-long':  'ms-cfg-ign-long',
  'ms-cfg-ign-long':  'ms-cfg-app-long',
  'ms-cfg-app-short': 'ms-cfg-ign-short',
  'ms-cfg-ign-short': 'ms-cfg-app-short'
};
var _cfgCoinMsIds = {
  'ms-cfg-app-long': true,
  'ms-cfg-app-short': true,
  'ms-cfg-ign-long': true,
  'ms-cfg-ign-short': true
};

function cfgRebuildMs(id, options, selected) {
  _cfgMs[id] = { options: options.slice(), selected: selected.slice(), highlightIdx: -1, coinMeta: {} };
  cfgRenderMsTags(id);
  // Wire up input events (called after innerHTML rebuild each time editor opens)
  var wrap = document.getElementById(id);
  if (!wrap) return;
  var input = wrap.querySelector('.ms-input');
  if (!input) return;
  input.addEventListener('focus', function() { cfgShowMsDd(id, this.value); });
  input.addEventListener('input', function() {
    if (_cfgMs[id]) _cfgMs[id].highlightIdx = -1;
    cfgShowMsDd(id, this.value);
  });
  input.addEventListener('blur', function() {
    this.value = '';
    var dd = wrap.querySelector('.ms-dropdown');
    if (dd) setTimeout(function() { dd.classList.remove('open'); if (_cfgMs[id]) _cfgMs[id].highlightIdx = -1; }, 150);
  });
  input.addEventListener('keydown', function(e) {
    var dd = wrap.querySelector('.ms-dropdown');
    if (!dd || !dd.classList.contains('open')) return;
    var items = dd.querySelectorAll('.ms-option:not(.selected)');
    var state = _cfgMs[id];
    if (!state) return;
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
      e.preventDefault();
      if (!items.length) return;
      if (e.key === 'ArrowDown') state.highlightIdx = state.highlightIdx < items.length - 1 ? state.highlightIdx + 1 : 0;
      else state.highlightIdx = state.highlightIdx > 0 ? state.highlightIdx - 1 : items.length - 1;
      items.forEach(function(el, i) {
        if (i === state.highlightIdx) { el.classList.add('highlighted'); el.scrollIntoView({block:'nearest'}); }
        else el.classList.remove('highlighted');
      });
    } else if (e.key === 'Enter') {
      e.preventDefault();
      var val = null;
      if (items.length === 1) {
        val = items[0].getAttribute('data-val');
      } else if (state.highlightIdx >= 0 && state.highlightIdx < items.length) {
        val = items[state.highlightIdx].getAttribute('data-val');
      }
      if (val) {
        var cpId = _cfgMsCp[id];
        var sel = state.selected.indexOf(val);
        if (val === 'all') {
          state.selected = sel >= 0 ? [] : ['all'];
        } else {
          if (sel >= 0) {
            state.selected.splice(sel, 1);
          } else {
            var allIdx = state.selected.indexOf('all');
            if (allIdx >= 0) state.selected.splice(allIdx, 1);
            state.selected.push(val);
            if (cpId && _cfgMs[cpId]) {
              var cpIdx = _cfgMs[cpId].selected.indexOf(val);
              if (cpIdx >= 0) { _cfgMs[cpId].selected.splice(cpIdx, 1); cfgRenderMsTags(cpId); }
            }
          }
        }
        state.highlightIdx = -1;
        cfgRenderMsTags(id);
        this.value = '';
        cfgShowMsDd(id, '');
      }
    }
  });
}

function cfgEnsureStatusEl(id) {
  var wrap = document.getElementById(id);
  if (!wrap) return null;
  var group = wrap.closest('.form-group');
  if (!group) return null;
  var el = group.querySelector('.ms-status-summary[data-for="' + id + '"]');
  if (!el) {
    el = document.createElement('div');
    el.className = 'ms-status-summary';
    el.setAttribute('data-for', id);
    group.appendChild(el);
  }
  return el;
}

function cfgGetCoinMeta(id, value) {
  var state = _cfgMs[id];
  if (!state || !state.coinMeta) return null;
  return state.coinMeta[value] || null;
}

function cfgClearCoinMeta(id) {
  if (!_cfgMs[id]) return;
  _cfgMs[id].coinMeta = {};
  cfgUpdateMsStatusSummary(id);
}

function cfgApplyCoinStatus(id, statuses) {
  var state = _cfgMs[id];
  if (!state) return;

  var nextSelected = [];
  var nextMeta = {};
  state.selected.forEach(function(value) {
    var info = statuses ? statuses[value] : null;
    var nextValue = value;
    if (info && info.status !== 'invalid' && info.normalized) {
      nextValue = info.normalized;
    }
    if (nextSelected.indexOf(nextValue) >= 0) return;
    nextSelected.push(nextValue);
    if (info) {
      nextMeta[nextValue] = {
        status: info.status,
        normalized: info.normalized || nextValue,
        raw: value,
        changed: (info.normalized || nextValue) !== value,
      };
    }
  });

  state.selected = nextSelected;
  state.coinMeta = nextMeta;
  cfgRenderMsTags(id);
}

function cfgCoinTagLabel(value, meta) {
  if (!meta) return value;
  if (meta.status === 'invalid') return '? ' + (meta.raw || value);
  return meta.normalized || value;
}

function cfgCoinTagTitle(value, meta) {
  if (!meta) return '';
  if (meta.status === 'invalid') {
    return (meta.changed ? ('Normalized from ' + meta.raw + ' to ' + meta.normalized + '. ') : '') +
      'CoinData could not resolve this entry to an active coin for the current exchange selection.';
  }
  if (meta.changed) {
    return 'Normalized from ' + meta.raw + ' to ' + meta.normalized + '.';
  }
  return '';
}

function cfgRemoveAllInvalidCoins() {
  var removed = 0;
  Object.keys(_cfgCoinMsIds).forEach(function(id) {
    var state = _cfgMs[id];
    if (!state) return;

    var nextSelected = [];
    var nextMeta = {};
    state.selected.forEach(function(value) {
      var meta = cfgGetCoinMeta(id, value);
      if (meta && meta.status === 'invalid') {
        removed += 1;
        return;
      }
      nextSelected.push(value);
      if (meta) nextMeta[value] = meta;
    });

    state.selected = nextSelected;
    state.coinMeta = nextMeta;
    cfgRenderMsTags(id);
  });

  if (!removed) {
    toast('No invalid coins to remove', 'warn');
    return;
  }
  toast('Removed ' + removed + ' invalid coin' + (removed === 1 ? '' : 's'), 'ok');
}

function cfgUpdateMsStatusSummary(id) {
  if (!_cfgCoinMsIds[id]) return;
  var el = cfgEnsureStatusEl(id);
  if (!el) return;
  var state = _cfgMs[id];
  if (!state || !state.selected.length) {
    el.textContent = '';
    el.style.display = 'none';
    return;
  }

  var invalid = 0;
  state.selected.forEach(function(value) {
    var meta = cfgGetCoinMeta(id, value);
    if (!meta) return;
    if (meta.status === 'invalid') invalid += 1;
  });

  if (!invalid) {
    el.textContent = '';
    el.style.display = 'none';
    return;
  }

  var parts = [];
  if (invalid) parts.push('<span class="err">' + invalid + ' invalid</span>');
  if (invalid) parts.push('<button type="button" class="act-btn ms-status-action" onclick="cfgRemoveAllInvalidCoins()">Remove all invalid</button>');
  el.innerHTML = parts.join(' <span class="sep">&middot;</span> ');
  el.style.display = 'flex';
}

async function cfgFetchV7Json(path, opts) {
  opts = opts || {};
  var v7Base = API_BASE.replace('/backtest-v7', '/v7');
  opts.headers = Object.assign({ 'Authorization': 'Bearer ' + TOKEN }, opts.headers || {});
  var resp = await fetch(v7Base + path, opts);
  var data = await resp.json();
  if (!resp.ok) throw new Error((data && data.detail) || resp.statusText || 'Request failed');
  return data;
}

async function cfgRefreshCoinStatuses(exchanges) {
  var ids = ['ms-cfg-app-long', 'ms-cfg-app-short', 'ms-cfg-ign-long', 'ms-cfg-ign-short'];
  if (!exchanges || !exchanges.length) {
    var emptyAnchor = cfgCaptureRawAnchor();
    ids.forEach(function(id) { cfgClearCoinMeta(id); });
    cfgRestoreRawAnchor(emptyAnchor);
    return;
  }

  var coins = [];
  ids.forEach(function(id) {
    cfgGetMs(id).forEach(function(value) {
      if (!value || value === 'all' || coins.indexOf(value) >= 0) return;
      coins.push(value);
    });
  });
  if (!coins.length) {
    var noCoinAnchor = cfgCaptureRawAnchor();
    ids.forEach(function(id) { cfgClearCoinMeta(id); });
    cfgRestoreRawAnchor(noCoinAnchor);
    return;
  }

  try {
    var data = await cfgFetchV7Json('/coins/status', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ exchanges: exchanges, coins: coins })
    });
    var applyAnchor = cfgCaptureRawAnchor();
    ids.forEach(function(id) {
      cfgApplyCoinStatus(id, data.statuses || {});
    });
    cfgRestoreRawAnchor(applyAnchor);
  } catch (e) {
    console.error('cfgRefreshCoinStatuses failed:', e);
    var errorAnchor = cfgCaptureRawAnchor();
    ids.forEach(function(id) { cfgClearCoinMeta(id); });
    cfgRestoreRawAnchor(errorAnchor);
  }
}

function cfgClearMs(id) {
  if (!_cfgMs[id]) return;
  _cfgMs[id].selected = [];
  cfgRenderMsTags(id);
}

function cfgSelectAllMs(id) {
  if (!_cfgMs[id]) return;
  var cpId = _cfgMsCp[id];
  var cpSelected = (cpId && _cfgMs[cpId]) ? _cfgMs[cpId].selected : [];
  _cfgMs[id].selected = _cfgMs[id].options.filter(function(o) {
    return o !== 'all' && cpSelected.indexOf(o) < 0;
  });
  cfgRenderMsTags(id);
}

function cfgGetMs(id) {
  return _cfgMs[id] ? _cfgMs[id].selected.slice() : [];
}

function cfgSetMs(id, vals) {
  if (!_cfgMs[id]) return;
  _cfgMs[id].selected = vals.slice();
  cfgRenderMsTags(id);
}

function cfgRenderMsTags(id) {
  var wrap = document.getElementById(id);
  if (!wrap) return;
  var inputEl = wrap.querySelector('.ms-input');
  wrap.querySelectorAll('.ms-tag').forEach(function(t) { t.remove(); });
  var state = _cfgMs[id];
  if (!state) return;
  state.selected.forEach(function(val) {
    var meta = cfgGetCoinMeta(id, val);
    var tag = document.createElement('span');
    tag.className = val === 'all'
      ? 'ms-tag ms-tag-all'
      : 'ms-tag' + (meta && meta.status === 'invalid' ? ' ms-tag-invalid' : '');
    if (meta) tag.title = cfgCoinTagTitle(val, meta);
    tag.appendChild(document.createTextNode(val === 'all' ? '\u2605 all ' : (cfgCoinTagLabel(val, meta) + ' ')));
    var close = document.createElement('span');
    close.className = 'ms-x';
    close.setAttribute('data-val', val);
    close.textContent = '×';
    tag.appendChild(close);
    wrap.insertBefore(tag, inputEl);
  });
  wrap.querySelectorAll('.ms-x').forEach(function(x) {
    x.addEventListener('click', function(e) {
      e.stopPropagation();
      var v = this.getAttribute('data-val');
      state.selected = state.selected.filter(function(s) { return s !== v; });
      cfgRenderMsTags(id);
    });
  });
  cfgUpdateMsStatusSummary(id);
  // When exchanges multiselect changes, reload symbols
  if (id === 'ms-cfg-exchanges' && _cfgEditorCfg) {
    loadCfgSymbols(_cfgEditorCfg);
  }
  scheduleStructuredEditorSync();
}

function cfgShowMsDd(id, filter) {
  var wrap = document.getElementById(id);
  if (!wrap) return;
  var dd = wrap.querySelector('.ms-dropdown');
  if (!dd) return;
  var state = _cfgMs[id];
  if (!state) return;
  var cpId = _cfgMsCp[id];
  var cpSelected = (cpId && _cfgMs[cpId]) ? _cfgMs[cpId].selected : [];
  var f = (filter || '').toUpperCase();
  var html = '';
  var count = 0;
  var hiIdx = (state.highlightIdx !== undefined) ? state.highlightIdx : -1;
  var visibleIdx = 0;
  state.options.forEach(function(opt) {
    if (f && opt.toUpperCase().indexOf(f) < 0) return;
    var sel = state.selected.indexOf(opt) >= 0;
    var isAll = opt === 'all';
    var inOther = !isAll && cpSelected.indexOf(opt) >= 0;
    var isHi = !sel && (visibleIdx === hiIdx);
    var cls = 'ms-option' + (sel ? ' selected' : '') + (inOther ? ' in-other' : '') + (isHi ? ' highlighted' : '') + (isAll ? ' ms-opt-all' : '');
    var label = inOther ? (opt + ' \u21c4') : opt;
    html += '<div class="' + cls + '" data-val="' + opt + '">' + label + '</div>';
    if (!sel) visibleIdx++;
    count++;
    if (count > 200) return;
  });
  dd.innerHTML = html;
  dd.classList.add('open');
  var hiEl = dd.querySelector('.highlighted');
  if (hiEl) hiEl.scrollIntoView({block:'nearest'});
  dd.querySelectorAll('.ms-option').forEach(function(el) {
    el.addEventListener('mousedown', function(e) {
      e.preventDefault();
      var v = this.getAttribute('data-val');
      var idx = state.selected.indexOf(v);
      if (v === 'all') {
        state.selected = idx >= 0 ? [] : ['all'];
      } else {
        if (idx >= 0) {
          state.selected.splice(idx, 1);
        } else {
          var allIdx = state.selected.indexOf('all');
          if (allIdx >= 0) state.selected.splice(allIdx, 1);
          state.selected.push(v);
          if (cpId && _cfgMs[cpId]) {
            var cpIdx = _cfgMs[cpId].selected.indexOf(v);
            if (cpIdx >= 0) {
              _cfgMs[cpId].selected.splice(cpIdx, 1);
              cfgRenderMsTags(cpId);
            }
          }
        }
      }
      cfgRenderMsTags(id);
      var inp = wrap.querySelector('.ms-input');
      if (inp) inp.value = '';
      cfgShowMsDd(id, '');
    });
  });
}

async function loadCfgSymbols(cfg) {
  var requestSeq = ++_cfgSymbolsLoadSeq;

  // Determine exchange list from the exchanges multiselect
  var exchanges = cfgGetMs('ms-cfg-exchanges').filter(function(exchange) {
    return exchange !== 'combined';
  });

  var live2   = (cfg && cfg.live)   || {};
  var pbgui2  = (cfg && cfg.pbgui) || {};
  var emptyMeansAll = !!(live2.empty_means_all_approved);
  var appLong2  = (live2.approved_coins && live2.approved_coins.long)  || [];
  var appShort2 = (live2.approved_coins && live2.approved_coins.short) || [];
  // Old config: empty_means_all_approved=true + empty list → treat as "all"
  if (emptyMeansAll && appLong2.length  === 0) appLong2  = ['all'];
  if (emptyMeansAll && appShort2.length === 0) appShort2 = ['all'];
  var ignLong2  = (live2.ignored_coins  && live2.ignored_coins.long)   || [];
  var ignShort2 = (live2.ignored_coins  && live2.ignored_coins.short)  || [];
  var cfgTags   = pbgui2.tags || [];
  var seededCoins = appLong2.concat(appShort2).concat(ignLong2).concat(ignShort2)
    .filter(function(v, i, a) { return v !== 'all' && a.indexOf(v) === i; }).sort();
  var seededAnchor = cfgCaptureRawAnchor();

  cfgRebuildMs('ms-cfg-app-long',  ['all'].concat(seededCoins), appLong2);
  cfgRebuildMs('ms-cfg-app-short', ['all'].concat(seededCoins), appShort2);
  cfgRebuildMs('ms-cfg-ign-long',  seededCoins, ignLong2);
  cfgRebuildMs('ms-cfg-ign-short', seededCoins, ignShort2);
  cfgRebuildMs('ms-cfg-tags', cfgTags, cfgTags);
  coinOvSetCoins(seededCoins);
  cfgRestoreRawAnchor(seededAnchor);

  if (!exchanges.length) {
    // No exchange — keep the seeded values only.
    cfgRefreshCoinStatuses([]);
    return;
  }

  try {
    var results = await Promise.all([
      Promise.all(exchanges.map(function(exchange) {
        return cfgFetchV7Json('/symbols?exchange=' + encodeURIComponent(exchange));
      })),
      Promise.all(exchanges.map(function(exchange) {
        return cfgFetchV7Json('/tags?exchange=' + encodeURIComponent(exchange));
      }))
    ]);
    var symbolSet = new Set();
    var tagSet = new Set();
    results[0].forEach(function(resp) {
      (resp.symbols || []).forEach(function(symbol) { symbolSet.add(symbol); });
    });
    results[1].forEach(function(resp) {
      (resp.tags || []).forEach(function(tag) { tagSet.add(tag); });
    });
    if (requestSeq !== _cfgSymbolsLoadSeq) return;
    var symbols = Array.from(symbolSet).sort();
    var allTags = Array.from(tagSet).sort();
    var loadedAnchor = cfgCaptureRawAnchor();
    cfgRebuildMs('ms-cfg-app-long',  ['all'].concat(symbols), appLong2);
    cfgRebuildMs('ms-cfg-app-short', ['all'].concat(symbols), appShort2);
    cfgRebuildMs('ms-cfg-ign-long',  symbols, ignLong2);
    cfgRebuildMs('ms-cfg-ign-short', symbols, ignShort2);
    cfgRebuildMs('ms-cfg-tags', allTags, cfgTags);
    coinOvSetCoins(symbols);
    cfgRestoreRawAnchor(loadedAnchor);
    cfgRefreshCoinStatuses(exchanges);
  } catch (e) {
    console.error('loadCfgSymbols failed:', e);
    if (requestSeq !== _cfgSymbolsLoadSeq) return;
    // Fall back to the seeded values already applied above.
    cfgRefreshCoinStatuses([]);
  }
}

/* ─── Generic key-value chip editor (coin_sources / market_settings_sources) ── */
var _kvData = {};       // prefix → { coin: exchange, ... }
var _kvSymCache = {};   // exchange → [symbols]
var _kvHighlight = {};  // prefix → index (-1 = none)
var _kvMeta = {
  'kv-cs': { expId: 'exp-coin-sources', label: 'coin_sources' },
  'kv-mss': { expId: 'exp-mss', label: 'market_settings_sources' },
  'suite-kv-cs': { expId: 'suite-exp-csrc', label: 'coin_sources' },
};

function kvInit(prefix, data) {
  _kvData[prefix] = {};
  Object.keys(data).forEach(function(k) { _kvData[prefix][k] = data[k]; });
  kvRenderChips(prefix);
}

function kvRenderChips(prefix) {
  var container = document.getElementById(prefix);
  if (!container) return;
  var entries = _kvData[prefix] || {};
  var keys = Object.keys(entries).sort();
  if (!keys.length) { container.innerHTML = '<span style="color:var(--text-dim);font-size:var(--fs-xs)">No entries</span>'; return; }
  var html = '';
  keys.forEach(function(coin) {
    html += '<span class="kv-chip"><span class="kv-chip-ex">' + esc(entries[coin]) + '</span>' +
      esc(coin) + '<span class="ms-x" onclick="kvRemove(\'' + prefix + '\',\'' + esc(coin) + '\')">\u00d7</span></span>';
  });
  container.innerHTML = html;
}

function kvRemove(prefix, coin) {
  if (_kvData[prefix]) delete _kvData[prefix][coin];
  kvRenderChips(prefix);
  kvUpdateExpanderCount(prefix);
  scheduleStructuredEditorSync();
}

function kvAdd(prefix, coin) {
  var exchange = document.getElementById(prefix + '-exchange').value;
  if (!coin) return;
  coin = coin.toUpperCase();
  // swap if already exists with different exchange, no-op if same
  _kvData[prefix][coin] = exchange;
  kvRenderChips(prefix);
  kvUpdateExpanderCount(prefix);
  // Clear input
  var inp = document.getElementById(prefix + '-coin-input');
  if (inp) inp.value = '';
  scheduleStructuredEditorSync();
}

function kvCollect(prefix) {
  return Object.assign({}, _kvData[prefix] || {});
}

function kvUpdateExpanderCount(prefix) {
  var meta = _kvMeta[prefix];
  if (!meta) return;
  var hdr = document.querySelector('#' + meta.expId + ' .expander-header');
  if (!hdr) return;
  var count = Object.keys(_kvData[prefix] || {}).length;
  var arrow = hdr.querySelector('.arrow');
  hdr.innerHTML = '';
  if (arrow) hdr.appendChild(arrow);
  hdr.appendChild(document.createTextNode(' ' + meta.label + ' (' + count + ' configured)'));
}

async function kvLoadCoins(prefix) {
  var exchange = document.getElementById(prefix + '-exchange').value;
  var inp = document.getElementById(prefix + '-coin-input');
  var dd  = document.getElementById(prefix + '-coin-dd');
  if (!inp || !dd) return;

  // Wire up events (idempotent via data attribute)
  if (!inp.dataset.wired) {
    inp.dataset.wired = '1';
    _kvHighlight[prefix] = -1;
    inp.addEventListener('focus', function() { kvShowDd(prefix, this.value); });
    inp.addEventListener('input', function() { _kvHighlight[prefix] = -1; kvShowDd(prefix, this.value); });
    inp.addEventListener('blur', function() {
      setTimeout(function() { dd.classList.remove('open'); _kvHighlight[prefix] = -1; }, 150);
    });
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        e.preventDefault();
        var items = dd.querySelectorAll('.ms-option:not(.selected)');
        if (!items.length) return;
        var idx = _kvHighlight[prefix];
        if (e.key === 'ArrowDown') idx = idx < items.length - 1 ? idx + 1 : 0;
        else idx = idx > 0 ? idx - 1 : items.length - 1;
        _kvHighlight[prefix] = idx;
        kvHighlightItem(dd, items, idx);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        var items = dd.querySelectorAll('.ms-option:not(.selected)');
        var idx = _kvHighlight[prefix];
        var targetEl = null;
        if (items.length === 1) targetEl = items[0];
        else if (idx >= 0 && idx < items.length) targetEl = items[idx];
        if (targetEl) {
          var val = targetEl.getAttribute('data-val');
          // in-other = swap, otherwise add
          kvAdd(prefix, val);
        }
        _kvHighlight[prefix] = -1;
        kvShowDd(prefix, this.value);
      }
    });
  }

  if (_kvSymCache[exchange]) { return; }
  var v7Base = API_BASE.replace('/backtest-v7', '/v7');
  try {
    var r = await fetch(v7Base + '/symbols?exchange=' + encodeURIComponent(exchange), {
      headers: { 'Authorization': 'Bearer ' + TOKEN }
    });
    var data = await r.json();
    _kvSymCache[exchange] = (data.symbols || []).slice().sort();
  } catch(e) {
    console.error('kvLoadCoins failed for', exchange, e);
    _kvSymCache[exchange] = [];
  }
}

function kvShowDd(prefix, filter) {
  var exchange = document.getElementById(prefix + '-exchange').value;
  var dd = document.getElementById(prefix + '-coin-dd');
  if (!dd) return;
  var syms = _kvSymCache[exchange] || [];
  var existing = _kvData[prefix] || {};
  var f = (filter || '').toUpperCase();
  var html = '';
  var count = 0;
  var hiIdx = _kvHighlight[prefix] !== undefined ? _kvHighlight[prefix] : -1;
  var visibleIdx = 0;
  syms.forEach(function(s) {
    if (f && s.toUpperCase().indexOf(f) < 0) return;
    var existingEx = existing[s];
    var sameEx = existingEx === exchange;
    var diffEx = existingEx !== undefined && existingEx !== exchange;
    var isHi = !sameEx && (visibleIdx === hiIdx);
    var cls = 'ms-option';
    var label = s;
    if (sameEx) {
      cls += ' selected';
      label = s + ' \u2713';
    } else if (diffEx) {
      cls += ' in-other';
      label = s + ' @ ' + existingEx + ' \u21c4';
    }
    if (isHi) cls += ' highlighted';
    html += '<div class="' + cls + '" data-val="' + s + '">' + label + '</div>';
    if (!sameEx) visibleIdx++;
    count++;
    if (count > 200) return;
  });
  if (!count) html = '<div style="padding:4px 8px;color:var(--text-dim);font-size:var(--fs-xs)">No matches</div>';
  dd.innerHTML = html;
  dd.classList.add('open');
  var hiEl = dd.querySelector('.highlighted');
  if (hiEl) hiEl.scrollIntoView({block:'nearest'});
  // non-selected (new) → add; in-other (swap) → update exchange; selected (same-ex) → remove
  dd.querySelectorAll('.ms-option:not(.selected)').forEach(function(el) {
    el.addEventListener('mousedown', function(e) {
      e.preventDefault();
      kvAdd(prefix, this.getAttribute('data-val'));
      kvShowDd(prefix, document.getElementById(prefix + '-coin-input').value);
    });
  });
  dd.querySelectorAll('.ms-option.selected').forEach(function(el) {
    el.addEventListener('mousedown', function(e) {
      e.preventDefault();
      kvRemove(prefix, this.getAttribute('data-val'));
      kvShowDd(prefix, document.getElementById(prefix + '-coin-input').value);
    });
  });
}

function kvClearAll(prefix) {

function kvHighlightItem(dd, items, idx) {
  items.forEach(function(el, i) {

    else el.classList.remove('highlighted');
  });
}

/* ─── apply_filters (calls v7 filter API) ──────────────────── */
async function cfgApplyFilters() {
  var exchanges = cfgGetMs('ms-cfg-exchanges');
  if (!exchanges.length) { toast('Select at least one exchange', 'err'); return; }
  var v7Base = API_BASE.replace('/backtest-v7', '/v7');
  var mcap = parseFloat(document.getElementById('cfg-market-cap').value) || 0;
  var volMcap = parseFloat(document.getElementById('cfg-vol-mcap').value) || 10;
  var onlyCpt = document.getElementById('cfg-only-cpt').checked;
  var noticesIgnore = document.getElementById('cfg-notices-ignore').checked;
  var tags = cfgGetMs('ms-cfg-tags');

  var allApproved = new Set();
  var allIgnored  = new Set();
  for (var j = 0; j < exchanges.length; j++) {
    var ex = exchanges[j];
    if (ex === 'combined') continue;
    try {
      var url = v7Base + '/coins/filter?exchange=' + encodeURIComponent(ex) +
        '&market_cap=' + mcap + '&vol_mcap=' + volMcap +
        '&only_cpt=' + onlyCpt + '&notices_ignore=' + noticesIgnore;
      if (tags.length) url += '&tags=' + encodeURIComponent(tags.join(','));
      var resp = await fetch(url, { headers: { 'Authorization': 'Bearer ' + TOKEN } });
      var data = await resp.json();
      (data.approved || []).forEach(function(c) { allApproved.add(c); });
      (data.ignored || []).forEach(function(c) { allIgnored.add(c); });
    } catch(e) { console.error('filter failed for', ex, e); }
  }
  // ignored = ignored minus approved
  allApproved.forEach(function(c) { allIgnored.delete(c); });
  var appArr = Array.from(allApproved).sort();
  var ignArr = Array.from(allIgnored).sort();
  cfgSetMs('ms-cfg-app-long',  appArr);
  cfgSetMs('ms-cfg-app-short', appArr);
  cfgSetMs('ms-cfg-ign-long',  ignArr);
  cfgSetMs('ms-cfg-ign-short', ignArr);
  toast('Filters applied: ' + appArr.length + ' approved, ' + ignArr.length + ' ignored', 'ok');
}

function collectConfig() {
  /* Build config from editor form fields */
  var rawEl = document.getElementById('cfg-raw-json');
  var cfg;
  try { cfg = JSON.parse(rawEl.value); } catch(e) { cfg = {}; }

  // Overlay form values
  var exchanges = cfgGetMs('ms-cfg-exchanges');

  if (!cfg.backtest) cfg.backtest = {};
  cfg.backtest.exchanges = exchanges;
  cfg.backtest.start_date = document.getElementById('cfg-start-date').value;
  cfg.backtest.end_date = document.getElementById('cfg-end-date').value;
  cfg.backtest.starting_balance = parseFloat(document.getElementById('cfg-starting-balance').value) || 10000;
  cfg.backtest.balance_sample_divider = parseFloat(document.getElementById('cfg-balance-divider').value) || 1;
  cfg.backtest.gap_tolerance_ohlcvs_minutes = parseFloat(document.getElementById('cfg-gap-tolerance').value) || 5;
  cfg.backtest.candle_interval_minutes = parseInt(document.getElementById('cfg-candle-interval').value) || 1;
  cfg.backtest.max_warmup_minutes = parseFloat(document.getElementById('cfg-max-warmup').value) || 1440;
  cfg.backtest.compress_cache = document.getElementById('cfg-compress').checked;
  cfg.backtest.filter_by_min_effective_cost = document.getElementById('cfg-filter-cost').checked;
  cfg.backtest.volume_normalization = document.getElementById('cfg-vol-norm').checked;
  cfg.backtest.btc_collateral_cap = parseFloat(document.getElementById('cfg-btc-cap').value) || 0;
  var ltvVal = parseFloat(document.getElementById('cfg-btc-ltv').value) || 0;
  cfg.backtest.btc_collateral_ltv_cap = ltvVal === 0 ? null : ltvVal;
  var ohlcvDir = document.getElementById('cfg-ohlcv-dir').value.trim();
  cfg.backtest.ohlcv_source_dir = ohlcvDir || null;

  // maker_fee_override
  if (document.getElementById('cfg-maker-fee-enabled').checked) {
    cfg.backtest.maker_fee_override = parseFloat(document.getElementById('cfg-maker-fee-val').value) || 0;
  } else {
    cfg.backtest.maker_fee_override = null;
  }

  // taker_fee_override
  if (document.getElementById('cfg-taker-fee-enabled').checked) {
    cfg.backtest.taker_fee_override = parseFloat(document.getElementById('cfg-taker-fee-val').value) || 0;
  } else {
    cfg.backtest.taker_fee_override = null;
  }

  // liquidation_threshold, market_order_slippage_pct, dynamic_wel_by_tradability
  cfg.backtest.liquidation_threshold = parseFloat(document.getElementById('cfg-liq-thresh').value) || 0;
  cfg.backtest.market_order_slippage_pct = parseFloat(document.getElementById('cfg-mo-slippage').value) || 0;
  cfg.backtest.dynamic_wel_by_tradability = document.getElementById('cfg-dyn-wel').checked;

  // coin_sources and market_settings_sources
  var cs = csCollect();
  if (Object.keys(cs).length > 0) { cfg.backtest.coin_sources = cs; }
  else { delete cfg.backtest.coin_sources; }
  var mss = mssCollect();
  if (Object.keys(mss).length > 0) { cfg.backtest.market_settings_sources = mss; }
  else { delete cfg.backtest.market_settings_sources; }

  if (!cfg.logging) cfg.logging = {};
  cfg.logging.level = document.getElementById('cfg-logging').value;

  if (!cfg.live) cfg.live = {};
  cfg.live.minimum_coin_age_days = parseFloat(document.getElementById('cfg-min-coin-age').value) || 30;

  // Coins — approved_coins supports "all" (string) per side or globally
  if (!cfg.live.ignored_coins)  cfg.live.ignored_coins  = {};
  cfg.live.ignored_coins.long   = cfgGetMs('ms-cfg-ign-long');
  cfg.live.ignored_coins.short  = cfgGetMs('ms-cfg-ign-short');
  var _appLong  = cfgGetMs('ms-cfg-app-long');
  var _appShort = cfgGetMs('ms-cfg-app-short');
  var _allLong  = _appLong.indexOf('all') >= 0;
  var _allShort = _appShort.indexOf('all') >= 0;
  if (_allLong && _allShort) {
    cfg.live.approved_coins = 'all';
  } else {
    cfg.live.approved_coins = { long: _allLong ? 'all' : _appLong, short: _allShort ? 'all' : _appShort };
  }
  // Remove deprecated field if present
  if (cfg.live.empty_means_all_approved !== undefined) delete cfg.live.empty_means_all_approved;
  if (!cfg.pbgui) cfg.pbgui = {};
  cfg.pbgui.market_cap     = parseFloat(document.getElementById('cfg-market-cap').value) || 0;
  cfg.pbgui.vol_mcap       = parseFloat(document.getElementById('cfg-vol-mcap').value) || 10;
  cfg.pbgui.tags           = cfgGetMs('ms-cfg-tags');
  cfg.pbgui.only_cpt       = document.getElementById('cfg-only-cpt').checked;
  cfg.pbgui.notices_ignore = document.getElementById('cfg-notices-ignore').checked;

  // Bot config — try parsing JSON textareas, fall back to TWE/npos values
  if (!cfg.bot) cfg.bot = {};
  try { cfg.bot.long = JSON.parse(document.getElementById('cfg-bot-long').value); } catch(e) {
    if (!cfg.bot.long) cfg.bot.long = {};
  }
  try { cfg.bot.short = JSON.parse(document.getElementById('cfg-bot-short').value); } catch(e) {
    if (!cfg.bot.short) cfg.bot.short = {};
  }
  cfg.bot.long.total_wallet_exposure_limit = parseFloat(document.getElementById('cfg-twe-long').value) || 0;
  cfg.bot.long.n_positions = parseInt(document.getElementById('cfg-npos-long').value) || 0;
  cfg.bot.short.total_wallet_exposure_limit = parseFloat(document.getElementById('cfg-twe-short').value) || 0;
  cfg.bot.short.n_positions = parseInt(document.getElementById('cfg-npos-short').value) || 0;

  // Suite mode
  var suite = suiteCollect();
  cfg.backtest.suite_enabled = suite.suite_enabled;
  if (suite.suite_enabled) {
    cfg.backtest.scenarios = suite.scenarios;
    cfg.backtest.aggregate = suite.aggregate;
  } else {
    delete cfg.backtest.scenarios;
    delete cfg.backtest.aggregate;
    delete cfg.backtest.suite_enabled;
  }

  // Coin overrides
  var covData = coinOvCollect();
  if (covData.coin_overrides) {
    cfg.coin_overrides = covData.coin_overrides;
  } else {
    delete cfg.coin_overrides;
  }

  // Additional (extra) backtest parameters not handled by the GUI
  _extraBtKeys.forEach(function(k) {
    var el = document.getElementById('extra-bt-' + k);
    if (!el) return;
    var type = el.getAttribute('data-extra-bt-type');
    if (type === 'boolean') {
      cfg.backtest[k] = el.checked;
    } else if (type === 'number') {
      var n = parseFloat(el.value);
      cfg.backtest[k] = isNaN(n) ? el.value : n;
    } else if (type === 'json') {
      try { cfg.backtest[k] = JSON.parse(el.value); } catch(e) { cfg.backtest[k] = el.value; }
    } else if (type === 'null') {
      var raw = el.value.trim();
      if (raw === '' || raw === 'null') { cfg.backtest[k] = null; }
      else { try { cfg.backtest[k] = JSON.parse(raw); } catch(e) { cfg.backtest[k] = raw; } }
    } else {
      cfg.backtest[k] = el.value;
    }
  });

  return cfg;
}

function saveEditor() {
  var name = document.getElementById('cfg-name').value.trim();
  if (!name) { toast('Config name is required', 'err'); return; }
  if (!ensureRawJsonValidForSave()) return;
  if (!ensureStructuredJsonFieldsValidForSave()) return;
  coinOvSetConfigName(name);  // ensure override files are saved to the correct directory
  var cfg = collectConfig();
  var dateErr = cfgValidateDateRanges(cfg);
  if (dateErr) { toast(dateErr, 'err'); return; }
  // Auto-set base_dir only if not explicitly overridden by the user in Additional Parameters
  var _baseDirEl = document.getElementById('extra-bt-base_dir');
  if (!_baseDirEl || _baseDirEl.value.trim() === '') {
    cfg.backtest.base_dir = 'backtests/pbgui/' + name;
  }
  var oldName = (editingConfig && editingConfig !== '__new__') ? editingConfig : null;
  var isNewName = oldName && oldName !== name;
  var url = '/configs/' + encodeURIComponent(name);
  if (isNewName) url += '?source_name=' + encodeURIComponent(oldName);
  apiFetch(url, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(cfg)
  }).then(function() {
    toast(isNewName ? 'Saved as new config "' + name + '"' : 'Config saved', 'ok');
    editingConfig = name;
    loadConfigs();
    closeEditor();
  }).catch(function(e) { toast('Save failed: ' + e.message, 'err'); });
}

function saveAndQueue() {
  var name = document.getElementById('cfg-name').value.trim();
  if (!name) { toast('Config name is required', 'err'); return; }
  if (!ensureRawJsonValidForSave()) return;
  if (!ensureStructuredJsonFieldsValidForSave()) return;
  coinOvSetConfigName(name);  // ensure override files are saved to the correct directory
  var cfg = collectConfig();
  var dateErr = cfgValidateDateRanges(cfg);
  if (dateErr) { toast(dateErr, 'err'); return; }
  // Auto-set base_dir only if not explicitly overridden by the user in Additional Parameters
  var _baseDirEl2 = document.getElementById('extra-bt-base_dir');
  if (!_baseDirEl2 || _baseDirEl2.value.trim() === '') {
    cfg.backtest.base_dir = 'backtests/pbgui/' + name;
  }
  var oldName = (editingConfig && editingConfig !== '__new__') ? editingConfig : null;
  var isNewName = oldName && oldName !== name;
  // Save first (always as new config if name changed, never delete original)
  var url = '/configs/' + encodeURIComponent(name);
  if (isNewName) url += '?source_name=' + encodeURIComponent(oldName);
  apiFetch(url, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(cfg)
  }).then(function() {
    // Then add to queue — config is already saved on disk
    return apiFetch('/queue', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name })
    });
  }).then(function() {
    toast('Saved and queued', 'ok');
    editingConfig = null;
    loadConfigs();
    closeEditor();
    selectPanel('queue');
  }).catch(function(e) { toast('Failed: ' + e.message, 'err'); });
}

async function doImport() {
  var nameEl = document.getElementById('import-name');
  var jsonEl = document.getElementById('import-json');
  var errEl = document.getElementById('import-error');
  if (!nameEl || !jsonEl || !errEl) return;
  var name = nameEl.value.trim();
  if (!name) {
    errEl.innerHTML = '<div class="field-status-main">Config name is required</div>';
    errEl.className = 'field-status field-status-inline error';
    return;
  }
  var validation = validateJsonFieldTextarea(jsonEl);
  if (validation.error || !validation.parsed) {
    return;
  }
  var prepared;
  try {
    prepared = await prepareImportedBacktestConfig(validation.parsed);
  } catch (e) {
    window.PBGuiEditorShared.setInlineStatusError(errEl, {
      baseClassName: 'field-status field-status-inline',
      summary: 'Import failed',
      message: e.message || 'Unable to prepare imported config'
    });
    return;
  }
  var raw = jsonEl.value;
  editingConfig = '__new__';
  closeImportModal();
  showConfigEditor(name, prepared.config, raw, prepared.param_status || {});
  toast('Imported into editor. Review and save when ready.', 'ok');
}

var _queueSort = 'created', _queueSortAsc = false;
function setQueueSort(col) {
  if (_queueSort === col) _queueSortAsc = !_queueSortAsc;
  else { _queueSort = col; _queueSortAsc = false; }
  renderQueue();
}
function qth(label, key) {
  var arrow = _queueSort === key ? (_queueSortAsc ? ' \u25b2' : ' \u25bc') : '';
  return '<th onclick="setQueueSort(\'' + key + '\')" style="cursor:pointer;user-select:none">' + label + '<span style="font-size:var(--fs-xs);margin-left:4px">' + arrow + '</span></th>';
}
function renderQueue() {
  var el = document.getElementById('queue-list');
  if (!queueItems.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">\u23f3</div>Queue is empty.<br>Add configs to start backtesting.</div>';
    return;
  }
  var sorted = queueItems.slice().sort(function(a, b) {
    var va = a[_queueSort] || '', vb = b[_queueSort] || '';
    if (va < vb) return _queueSortAsc ? -1 : 1;
    if (va > vb) return _queueSortAsc ? 1 : -1;
    return 0;
  });
  var html = '<table class="tbl"><thead><tr>' +
    qth('Status', 'status') + qth('Name', 'name') + qth('Exchange', 'exchange') + qth('Created', 'created') + '<th>Actions</th>' +
    '</tr></thead><tbody>';
  sorted.forEach(function(q) {
    var bc = 'badge-' + q.status.replace('...', '');
    html += '<tr data-filename="' + esc(q.filename) + '">' +
      '<td><span class="badge ' + bc + '">' + esc(q.status) + '</span></td>' +
      '<td title="' + esc(q.filename) + '" ondblclick="editConfig(\'' + esc(q.name).replace(/'/g, "\\'") + '\');selectPanel(\'configs\')" style="cursor:pointer">' + esc(q.name) + '</td>' +
      '<td>' + esc(Array.isArray(q.exchange) ? q.exchange.join(', ') : q.exchange) + '</td>' +
      '<td>' + fmtDate(q.created) + '</td>' +
      '<td class="actions-cell" onclick="event.stopPropagation()">';
    if (q.status === 'error') {
      html += '<button class="act-btn" onclick="restartQueueItem(\'' + esc(q.filename) + '\')" title="Restart" style="border-color:var(--yellow,#f59e0b);color:var(--yellow,#f59e0b)">&#9654;</button> ';
    }
    if (q.status === 'queued') {
      html += '<button class="act-btn" onclick="startQueueItem(\'' + esc(q.filename) + '\')" title="Start">\u25b6</button> ';
    }
    if (q.status === 'running' || q.status === 'backtesting') {
      html += '<button class="act-btn act-btn-danger" onclick="stopQueueItem(\'' + esc(q.filename) + '\')" title="Stop">\u2b1b</button> ';
    }
    if (q.status === 'complete') {
      html += '<button class="act-btn" onclick="viewConfigResults(\'' + esc(q.name).replace(/'/g, "\\'") + '\')" title="View Results" style="border-color:var(--green);color:var(--green)">\ud83d\udcca</button> ';
    }
    html += '<button class="act-btn" onclick="showLog(\'' + esc(q.filename) + '\')" title="Log">\ud83d\udcdc</button> ';
    html += '<button class="act-btn act-btn-danger" onclick="removeQueueItem(\'' + esc(q.filename) + '\')" title="Remove">\ud83d\uddd1</button>';
    html += '</td></tr>';
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

var _btLogViewer = null;

function _openLogPanel(title, logViewerOpts) {
  var panel = document.getElementById('log-panel');
  document.getElementById('log-panel-title').textContent = title;
  if (_btLogViewer) { _btLogViewer.close(); _btLogViewer = null; }
  _btLogViewer = new LogViewerPanel(Object.assign({
    containerId: 'log-viewer-target',
    wsBase: WS_BASE,
    token: TOKEN,
    presets: 'system',
    showRestart: false,
    height: '100%'
  }, logViewerOpts));
  _btLogViewer.open();
  /* Position panel (reset to default bottom-right if not yet dragged) */
  if (!panel.style.left) {
    panel.style.right = '0';
    panel.style.bottom = '0';
    panel.style.left = '';
    panel.style.top = '';
  }
  panel.classList.add('visible');
  /* Make header draggable */
  var hdr = document.getElementById('log-panel-header');
  if (!hdr._dragBound) {
    hdr._dragBound = true;
    hdr.addEventListener('mousedown', function(e) {
      if (e.target === document.getElementById('log-panel-close')) return;
      var rect = panel.getBoundingClientRect();
      panel.style.left   = rect.left + 'px';
      panel.style.top    = rect.top  + 'px';
      panel.style.right  = 'auto';
      panel.style.bottom = 'auto';
      var startX = e.clientX, startY = e.clientY;
      var startL = rect.left,  startT = rect.top;
      function onMove(e) {
        panel.style.left = (startL + e.clientX - startX) + 'px';
        panel.style.top  = (startT + e.clientY - startY) + 'px';
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup',   onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup',   onUp);
      e.preventDefault();
    });
  }
  /* Bind edge/corner resize handles */
  if (!panel._resizeBound) {
    panel._resizeBound = true;
    panel.querySelectorAll('.lp-resize').forEach(function(handle) {
      handle.addEventListener('mousedown', function(e) {
        e.preventDefault(); e.stopPropagation();
        var dir = handle.dataset.dir;
        var rect = panel.getBoundingClientRect();
        /* Switch to absolute left/top positioning */
        panel.style.left   = rect.left + 'px';
        panel.style.top    = rect.top  + 'px';
        panel.style.right  = 'auto';
        panel.style.bottom = 'auto';
        panel.style.width  = rect.width + 'px';
        panel.style.height = rect.height + 'px';
        var sX = e.clientX, sY = e.clientY;
        var sL = rect.left, sT = rect.top, sW = rect.width, sH = rect.height;
        function onMove(e) {
          var dx = e.clientX - sX, dy = e.clientY - sY;
          var nL = sL, nT = sT, nW = sW, nH = sH;
          if (dir.indexOf('w') >= 0) { nL = sL + dx; nW = sW - dx; }
          if (dir.indexOf('e') >= 0) { nW = sW + dx; }
          if (dir.indexOf('n') >= 0) { nT = sT + dy; nH = sH - dy; }
          if (dir.indexOf('s') >= 0) { nH = sH + dy; }
          if (nW < 240) { if (dir.indexOf('w') >= 0) nL = sL + sW - 240; nW = 240; }
          if (nH < 150) { if (dir.indexOf('n') >= 0) nT = sT + sH - 150; nH = 150; }
          panel.style.left   = nL + 'px';
          panel.style.top    = nT + 'px';
          panel.style.width  = nW + 'px';
          panel.style.height = nH + 'px';
        }
        function onUp() {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    });
  }
}

/* ── CSV parser (handles unquoted commas in quoted fields) ── */
function parseCSV(text) {
  var lines = text.split('\n');
  if (lines.length < 2) return { headers: [], rows: [] };
  var headers = lines[0].split(',');
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    var vals = lines[i].split(',');
    var row = {};
    for (var j = 0; j < headers.length; j++) {
      row[headers[j].trim()] = (vals[j] || '').trim();
    }
    rows.push(row);
  }
  return { headers: headers, rows: rows };
}

/* ── Fetch CSV from file-streaming endpoint ── */
function fetchCSV(path, file) {
  var url = API_BASE + '/results/' + file + '?path=' + encodeURIComponent(path);
  return fetch(url, { headers: { 'Authorization': 'Bearer ' + TOKEN } })
    .then(function(r) {
      if (!r.ok) throw new Error(r.statusText);
      return r.text();
    })
    .then(function(text) { return parseCSV(text); });
}

function renderResults() {
  var el = document.getElementById('results-list');
  var chartsEl = document.getElementById('results-charts');
  var filter = (document.getElementById('results-filter').value || '').toLowerCase();
  var cfgFilter = (document.getElementById('results-config-filter').value || '');

  var filtered = results.filter(function(r) {
    if (cfgFilter && r.config_name !== cfgFilter) return false;
    if (!filter) return true;
    var hay = ((r.config_name || '') + ' ' + (r.result_name || '')).toLowerCase();
    return hay.indexOf(filter) >= 0;
  });

  // Sort
  filtered.sort(function(a, b) {
    var va = a[_resSort], vb = b[_resSort];
    if (va === undefined) va = '';
    if (vb === undefined) vb = '';
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return _resSortAsc ? -1 : 1;
    if (va > vb) return _resSortAsc ? 1 : -1;
    return 0;
  });

  _renderResultsTableInto(el, filtered, chartsEl, rth);
}

var _rowDragStart = null; /* { tr, y } */
var _rowDragSelecting = false;
var _rowDragMode = null;

/* ── Config row selection: click to toggle, drag to multi-select ── */
var _cfgDragStart = null;
var _cfgDragSelecting = false;
var _cfgDragMode = null;

(function() {
  function rowsOfCfg() {
    return Array.from(document.querySelectorAll('#configs-list .tbl tbody tr'));
  }
  function rowIdxAtY(rows, y) {
    var idx = 0;
    for (var i = 0; i < rows.length; i++) {
      if (y >= rows[i].getBoundingClientRect().top) idx = i;
    }
    return idx;
  }
  document.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    var tr = e.target.closest('#configs-list .tbl tbody tr');
    if (!tr || e.target.closest('.actions-cell') || e.target.closest('.results-count-cell')) return;
    e.preventDefault(); /* prevent text-selection / drag cursor */
    _cfgDragStart = { tr: tr, y: e.clientY };
    _cfgDragSelecting = false;
    _cfgDragMode = null;
  });
  document.addEventListener('mousemove', function(e) {
    if (!_cfgDragStart) return;
    if (!_cfgDragSelecting && Math.abs(e.clientY - _cfgDragStart.y) > 5) {
      _cfgDragSelecting = true;
      _cfgDragMode = _cfgDragStart.tr.classList.contains('selected') ? 'remove' : 'add';
    }
    if (_cfgDragSelecting) {
      e.preventDefault();
      var rows = rowsOfCfg();
      var anchor = rows.indexOf(_cfgDragStart.tr);
      var cur = rowIdxAtY(rows, e.clientY);
      var lo = Math.min(anchor, cur), hi = Math.max(anchor, cur);
      rows.forEach(function(r, i) {
        if (i >= lo && i <= hi) {
          if (_cfgDragMode === 'add') r.classList.add('selected');
          else r.classList.remove('selected');
        }
      });
    }
  });
  document.addEventListener('mouseup', function() {
    if (_cfgDragStart && !_cfgDragSelecting) {
      _cfgDragStart.tr.classList.toggle('selected');
    }
    _cfgDragStart = null;
    _cfgDragSelecting = false;
    _cfgDragMode = null;
  });
  document.addEventListener('dblclick', function(e) {
    var tr = e.target.closest('#configs-list .tbl tbody tr');
    if (!tr || e.target.closest('.actions-cell')) return;
    var name = tr.dataset.name;
    if (name) editConfig(name);
  });
}());

function chartWrap(divId, closeCmd) {
  var wrapId = 'wrap-' + divId;
  var cmd = closeCmd || "document.getElementById('" + wrapId + "').remove()";
  return '<div class="chart-wrap" id="' + wrapId + '">' +
    '<button class="chart-close-btn" onclick="' + cmd + '" title="Close chart">\u2715</button>' +
    '<div class="chart-container chart-inner"><div id="' + divId + '" style="height:800px"></div></div>' +
    '<div class="chart-resize-handle" data-chartid="' + divId + '" onmousedown="startChartResize(event, this.dataset.chartid)" title="Drag to resize"><span></span></div>' +
  '</div>';
}
