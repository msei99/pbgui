/* Listen for fullscreen change to relayout the chart */
document.addEventListener('fullscreenchange', function() {
  var el = document.fullscreenElement;
  if (el && el.classList.contains('chart-wrap')) {
    var inner = el.querySelector('.chart-inner > div[id]');
    if (inner) setTimeout(function() { Plotly.relayout(inner.id, { autosize: true }); }, 50);
  }
});

function startChartResize(e, divId) {
  var inner = document.getElementById(divId);
  if (!inner) return;
  e.preventDefault();
  var startY = e.clientY;
  var startH = inner.offsetHeight;
  function onMove(ev) {
    var newH = Math.max(200, startH + (ev.clientY - startY));
    inner.style.height = newH + 'px';
    if (inner.data) Plotly.relayout(divId, { height: newH });
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.body.style.userSelect = '';
  }
  document.body.style.userSelect = 'none';
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function startJsonResize(e, preId) {
  var pre = document.getElementById(preId);
  if (!pre) return;
  e.preventDefault();
  var startY = e.clientY;
  var startH = pre.offsetHeight;
  function onMove(ev) {
    var newH = Math.max(80, startH + (ev.clientY - startY));
    pre.style.height = newH + 'px';
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.body.style.userSelect = '';
  }
  document.body.style.userSelect = 'none';
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

/* ── Chart rendering based on active icon buttons ── */
function onResultActionsChanged() {
  var chartsEl = _activeResultsCtx.chartsEl || document.getElementById('results-charts');
  var filtered = _activeResultsCtx.data || [];

  /* Collect which results have which icons active */
  var viewIdxs = [], plotIdxs = [], fillsIdxs = [], configIdxs = [], analysisIdxs = [];
  document.querySelectorAll('.icon-btn.active').forEach(function(btn) {
    var idx = parseInt(btn.dataset.idx);
    var action = btn.dataset.action;
    if (action === 'view') viewIdxs.push(idx);
    else if (action === 'plot') plotIdxs.push(idx);
    else if (action === 'fills') fillsIdxs.push(idx);
    else if (action === 'config') configIdxs.push(idx);
    else if (action === 'analysis') analysisIdxs.push(idx);
  });

  if (!viewIdxs.length && !plotIdxs.length && !fillsIdxs.length && !configIdxs.length && !analysisIdxs.length) {
    chartsEl.style.display = 'none';
    chartsEl.innerHTML = '';
    return;
  }

  chartsEl.style.display = '';

  /* Save expanded state of JSON panels BEFORE clearing innerHTML */
  var _jsonState = {};
  chartsEl.querySelectorAll('.json-pre').forEach(function(pre) {
    if (pre.id) _jsonState[pre.id] = { h: pre.style.height, exp: pre.dataset.expanded || '0' };
  });

  chartsEl.innerHTML = '\x3Cdiv style="text-align:center;padding:var(--sp-lg);color:var(--text-dim)">Loading charts\u2026\x3C/div>';

  /* Process each active result in order */
  var html = '';
  var chartDivs = []; /* { id, type, path, result, idx } */
  var allIdxs = Array.from(new Set(viewIdxs.concat(plotIdxs).concat(fillsIdxs).concat(configIdxs).concat(analysisIdxs)));
  allIdxs.sort(function(a,b){return a-b;});

  allIdxs.forEach(function(idx) {
    var r = filtered[idx];
    if (!r) return;
    var showView = viewIdxs.indexOf(idx) >= 0;
    var showPlot = plotIdxs.indexOf(idx) >= 0;
    var showFills = fillsIdxs.indexOf(idx) >= 0;
    var showConfig = configIdxs.indexOf(idx) >= 0;
    var showAnalysis = analysisIdxs.indexOf(idx) >= 0;
    var vsClose = 'closeViewSection(' + idx + ')';

    if (showView) {
      html += '\x3Cdiv id="view-section-' + idx + '">';

      /* Liquidation warning */
      if (r.liquidated) {
        var reasons = [];
        if ((r.drawdown_worst || 0) >= 0.95) reasons.push('drawdown_worst=' + fmt(r.drawdown_worst, 4));
        if ((r.equity_balance_diff_neg_max || 0) >= 0.95) reasons.push('eq_bal_diff=' + fmt(r.equity_balance_diff_neg_max, 4));
        if (r.starting_balance > 0 && r.final_balance < r.starting_balance * 0.05) reasons.push('final_bal=' + fmt(r.final_balance, 0));
        html += '\x3Cdiv style="background:rgba(255,75,75,.15);color:var(--red);padding:var(--sp-sm) var(--sp-md);border-radius:4px;margin-bottom:var(--sp-sm);font-weight:600">\u26A0 Backtest ended in liquidation (' + reasons.join(', ') + ')\x3C/div>';
      }

      /* 1. Balance & Equity chart */
      var beId = 'be-chart-' + idx;
      html += '\x3Cdiv style="margin-bottom:var(--sp-xs)">\x3Clabel class="sb-toggle">\x3Cinput type="checkbox" id="log-toggle-' + idx + '" onchange="toggleLogScale(\'' + beId + '\', this.checked)">\x3Cspan style="font-size:var(--fs-sm)">logarithmic\x3C/span>\x3C/label>\x3C/div>';
      html += chartWrap(beId, vsClose);
      chartDivs.push({ id: beId, type: 'be', path: r.path, result: r, idx: idx });

      /* 2. PnL per Symbol chart */
      var pnlId = 'pnl-chart-' + idx;
      html += '\x3Cdiv style="margin-bottom:var(--sp-xs)">\x3Clabel class="sb-toggle">\x3Cinput type="checkbox" id="pnl-log-toggle-' + idx + '" onchange="toggleLogScale(\'' + pnlId + '\', this.checked)">\x3Cspan style="font-size:var(--fs-sm)">logarithmic\x3C/span>\x3C/label>\x3C/div>';
      html += chartWrap(pnlId, vsClose);
      chartDivs.push({ id: pnlId, type: 'pnl_symbol', path: r.path, result: r, idx: idx });

      /* 3. Drawdown chart */
      var ddId = 'dd-chart-' + idx;
      html += chartWrap(ddId, vsClose);
      chartDivs.push({ id: ddId, type: 'drawdown', path: r.path, result: r, idx: idx });

      /* 4. TWE chart — resolution dropdown + show coins toggle */
      var tweId = 'twe-chart-' + idx;
      html += '\x3Cdiv style="margin-bottom:var(--sp-xs);display:flex;align-items:center;gap:var(--sp-md);flex-wrap:wrap">';
      html += '\x3Clabel style="font-size:var(--fs-sm);color:var(--text-dim)" title="Small resolutions with many symbols generate a lot of data and can take a long time to render">Resolution (min) \x3Cspan style="cursor:help;opacity:.6">(i)\x3C/span>:\x3C/label>';
      html += '\x3Cselect class="sb-input" style="max-width:100px" id="twe-res-' + idx + '" onchange="rerenderTWEChart(' + idx + ')">';
      [1440,720,240,60,30,15,10,5,2,1].forEach(function(v) {
        html += '\x3Coption value="' + v + '"' + (v === 1440 ? ' selected' : '') + '>' + v + '\x3C/option>';
      });
      html += '\x3C/select>';
      html += '\x3Clabel class="sb-toggle" title="Show all per-coin traces (double-click a legend entry to isolate one coin)">\x3Cinput type="checkbox" id="twe-showcoins-' + idx + '" onchange="toggleTWECoins(\'' + tweId + '\', this.checked)">\x3Cspan style="font-size:var(--fs-sm)">Show coins\x3C/span>\x3C/label>';
      html += '\x3C/div>';
      html += chartWrap(tweId, vsClose);
      chartDivs.push({ id: tweId, type: 'twe', path: r.path, result: r, idx: idx });

      /* BTC charts if btc_collateral_cap > 0 */
      if (r.btc_collateral_cap > 0) {
        var beBtcId = 'be-btc-chart-' + idx;
        html += chartWrap(beBtcId, vsClose);
        chartDivs.push({ id: beBtcId, type: 'be_btc', path: r.path, result: r, idx: idx });
        var ddBtcId = 'dd-btc-chart-' + idx;
        html += chartWrap(ddBtcId, vsClose);
        chartDivs.push({ id: ddBtcId, type: 'drawdown_btc', path: r.path, result: r, idx: idx });
      }

      html += '\x3C/div>'; /* end view-section */
    }

    if (showAnalysis) {
      var awrapId = 'analysis-wrap-' + idx;
      var apreId = 'analysis-json-' + idx;
      html += '\x3Cdiv class="json-panel-wrap" id="' + awrapId + '">' +
        '\x3Cdiv class="json-panel-hdr">' +
          '\x3Cspan class="sb-label">Analysis\x3C/span>' +
          '\x3Cbutton class="act-btn" onclick="copyJsonPanel(\'' + apreId + '\',this)" title="Copy to clipboard" style="font-size:var(--fs-xs);padding:2px 8px">\u29c9 Copy\x3C/button>' +
          '\x3Cbutton class="act-btn" onclick="expandJsonPanel(\'' + apreId + '\',this)" title="Expand / Collapse" style="font-size:var(--fs-xs);padding:2px 8px">\u2b0c Expand\x3C/button>' +
          '\x3Cbutton class="act-btn" onclick="zoomJsonPanel(\'' + apreId + '\',-1)" title="Smaller font" style="font-size:var(--fs-xs);padding:2px 6px">A\u2212\x3C/button>' +
          '\x3Cbutton class="act-btn" onclick="zoomJsonPanel(\'' + apreId + '\',1)" title="Larger font" style="font-size:var(--fs-xs);padding:2px 6px">A+\x3C/button>' +
          '\x3Cbutton class="json-panel-close" onclick="closeAnalysisSection(' + idx + ')" title="Close">\u2715\x3C/button>' +
        '\x3C/div>' +
        '\x3Cpre id="' + apreId + '" class="json-pre">\x3C/pre>' +
        '\x3Cdiv class="chart-resize-handle" onmousedown="startJsonResize(event,\'' + apreId + '\')" title="Drag to resize">\x3Cspan>\x3C/span>\x3C/div>' +
        '\x3C/div>';
      chartDivs.push({ id: apreId, type: 'analysis_json', path: r.path, result: r, idx: idx });
    }

    if (showConfig) {
      var cwrapId = 'config-wrap-' + idx;
      var cpreId = 'config-json-' + idx;
      html += '\x3Cdiv class="json-panel-wrap" id="' + cwrapId + '">' +
        '\x3Cdiv class="json-panel-hdr">' +
          '\x3Cspan class="sb-label">Config\x3C/span>' +
          '\x3Cbutton class="act-btn" onclick="copyJsonPanel(\'' + cpreId + '\',this)" title="Copy to clipboard" style="font-size:var(--fs-xs);padding:2px 8px">\u29c9 Copy\x3C/button>' +
          '\x3Cbutton class="act-btn" onclick="expandJsonPanel(\'' + cpreId + '\',this)" title="Expand / Collapse" style="font-size:var(--fs-xs);padding:2px 8px">\u2b0c Expand\x3C/button>' +
          '\x3Cbutton class="act-btn" onclick="zoomJsonPanel(\'' + cpreId + '\',-1)" title="Smaller font" style="font-size:var(--fs-xs);padding:2px 6px">A\u2212\x3C/button>' +
          '\x3Cbutton class="act-btn" onclick="zoomJsonPanel(\'' + cpreId + '\',1)" title="Larger font" style="font-size:var(--fs-xs);padding:2px 6px">A+\x3C/button>' +
          '\x3Cbutton class="json-panel-close" onclick="closeConfigSection(' + idx + ')" title="Close">\u2715\x3C/button>' +
        '\x3C/div>' +
        '\x3Cpre id="' + cpreId + '" class="json-pre">\x3C/pre>' +
        '\x3Cdiv class="chart-resize-handle" onmousedown="startJsonResize(event,\'' + cpreId + '\')" title="Drag to resize">\x3Cspan>\x3C/span>\x3C/div>' +
        '\x3C/div>';
      chartDivs.push({ id: cpreId, type: 'config_json', path: r.path, result: r, idx: idx });
    }

    if (showPlot) {
      /* Show PB7-generated PNG images */
      var imgId = 'plot-imgs-' + idx;
      var plotWrapId = 'plot-section-' + idx;
      html += '\x3Cdiv class="chart-wrap" id="' + plotWrapId + '" style="margin-top:var(--sp-md)">' +
        '\x3Cbutton class="chart-close-btn" onclick="closePlotSection(' + idx + ')" title="Close">\u2715\x3C/button>' +
        '\x3Cdiv id="' + imgId + '" style="padding:var(--sp-md)">\x3C/div>' +
        '\x3C/div>';
      chartDivs.push({ id: imgId, type: 'plot_images', path: r.path, result: r, idx: idx });
    }

    if (showFills) {
      /* Show fills_plots/*.png images */
      var fillsImgId = 'fills-imgs-' + idx;
      var fillsWrapId = 'fills-section-' + idx;
      html += '\x3Cdiv class="chart-wrap" id="' + fillsWrapId + '" style="margin-top:var(--sp-md)">' +
        '\x3Cbutton class="chart-close-btn" onclick="closeFillsSection(' + idx + ')" title="Close">\u2715\x3C/button>' +
        '\x3Cdiv id="' + fillsImgId + '" style="padding:var(--sp-md)">\x3C/div>' +
        '\x3C/div>';
      chartDivs.push({ id: fillsImgId, type: 'fills_images', path: r.path, result: r, idx: idx });
    }
  });

  chartsEl.innerHTML = html;

  /* Restore expanded state of JSON panels */
  Object.keys(_jsonState).forEach(function(preId) {
    var pre = document.getElementById(preId);
    if (!pre) return;
    var s = _jsonState[preId];
    pre.dataset.expanded = s.exp;
    if (s.exp === '1') {
      pre.style.height = s.h || 'auto';
      var hdr = pre.closest('.json-panel-wrap');
      if (hdr) {
        var expandBtn = hdr.querySelector('.act-btn[onclick*="expandJsonPanel"]');
        if (expandBtn) expandBtn.textContent = '\u2b0d Collapse';
      }
    } else if (s.h) {
      pre.style.height = s.h;
    }
  });

  /* Now load data and render each chart */
  chartDivs.forEach(function(cd) {
    if (cd.type === 'be' || cd.type === 'be_btc' || cd.type === 'drawdown' || cd.type === 'drawdown_btc') {
      loadAndRenderBEChart(cd);
    } else if (cd.type === 'pnl_symbol') {
      loadAndRenderPnlChart(cd);
    } else if (cd.type === 'twe') {
      loadAndRenderTWEChart(cd);
    } else if (cd.type === 'analysis_json') {
      loadAnalysis(cd);
    } else if (cd.type === 'config_json') {
      loadConfig(cd);
    } else if (cd.type === 'plot_images') {
      loadPlotImages(cd);
    } else if (cd.type === 'fills_images') {
      loadFillsImages(cd);
    }
  });
}

/* ── JSON panel helpers ── */
function copyJsonPanel(preId, btn) {
  var el = document.getElementById(preId);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(function() {
    var orig = btn.textContent;
    btn.textContent = '\u2713 Copied';
    setTimeout(function() { btn.textContent = orig; }, 1400);
  }).catch(function() { toast('Copy failed', 'err'); });
}
function expandJsonPanel(preId, btn) {
  var el = document.getElementById(preId);
  if (!el) return;
  if (el.dataset.expanded === '1') {
    el.style.height = '400px';
    el.dataset.expanded = '0';
    btn.textContent = '\u2b0c Expand';
  } else {
    el.style.height = 'auto';
    el.dataset.expanded = '1';
    btn.textContent = '\u2b0d Collapse';
  }
}

function zoomJsonPanel(preId, dir) {
  var el = document.getElementById(preId);
  if (!el) return;
  var cur = parseFloat(el.dataset.fontSize) || parseFloat(getComputedStyle(el).fontSize) || 11;
  var next = Math.min(24, Math.max(8, cur + dir));
  el.style.fontSize = next + 'px';
  el.dataset.fontSize = next;
}

/* ── Balance & Equity chart (matches Streamlit view_chart_be) ── */
var _beCache = {}; /* path → parsed BE data */

function loadAndRenderBEChart(cd) {
  if (_beCache[cd.path]) {
    var _cached = _beCache[cd.path];
    requestAnimationFrame(function() { renderBEChart(cd, _cached); });
    return;
  }
  fetchCSV(cd.path, 'equity').then(function(csv) {
    var be = normalizeBE(csv, cd.result);
    _beCache[cd.path] = be;
    requestAnimationFrame(function() { renderBEChart(cd, be); });
  }).catch(function(e) {
    document.getElementById(cd.id).innerHTML = '<div style="color:var(--red);padding:var(--sp-md)">Failed to load BE data: ' + esc(e.message) + '</div>';
  });
}

/* Normalize BE CSV to { time[], balance[], equity[], balance_btc[], equity_btc[] }
   Mirrors Streamlit load_be() logic exactly */
function normalizeBE(csv, result) {
  var rows = csv.rows;
  var headers = csv.headers.map(function(h) { return h.trim(); });
  var be = { time: [], balance: [], equity: [], balance_btc: [], equity_btc: [] };
  if (!rows.length) return be;

  /* Detect format: new (datetime index + usd_ columns) vs old (minute index + balance/equity columns) */
  var firstRow = rows[0];
  var indexKey = headers[0] || ''; /* first column is the index */
  var hasUsd = headers.indexOf('usd_total_balance') >= 0;
  var hasMinuteIdx = !isNaN(parseFloat(firstRow[indexKey]));

  if (hasUsd) {
    /* New format: index is datetime string */
    rows.forEach(function(r) {
      be.time.push(r[indexKey] || '');
      be.balance.push(parseFloat(r['usd_total_balance']) || 0);
      be.equity.push(parseFloat(r['usd_total_equity']) || 0);
      be.balance_btc.push(parseFloat(r['btc_total_balance']) || 0);
      be.equity_btc.push(parseFloat(r['btc_total_equity']) || 0);
    });
  } else if (hasMinuteIdx) {
    /* Old format: index is minutes, columns are balance, equity */
    var endDate = result.end_date || '';
    var endTs = endDate ? new Date(endDate).getTime() : Date.now();
    var maxMinute = parseFloat(rows[rows.length - 1][indexKey]) || 1;
    var startTs = endTs - (maxMinute * 60000);
    rows.forEach(function(r) {
      var minute = parseFloat(r[indexKey]) || 0;
      be.time.push(new Date(startTs + minute * 60000).toISOString());
      be.balance.push(parseFloat(r['balance']) || 0);
      be.equity.push(parseFloat(r['equity']) || 0);
      be.balance_btc.push(parseFloat(r['balance_btc']) || 0);
      be.equity_btc.push(parseFloat(r['equity_btc']) || 0);
    });
  } else {
    /* Fallback: try datetime index */
    rows.forEach(function(r) {
      be.time.push(r[indexKey] || '');
      be.balance.push(parseFloat(r['balance'] || r['usd_total_balance']) || 0);
      be.equity.push(parseFloat(r['equity'] || r['usd_total_equity']) || 0);
      be.balance_btc.push(parseFloat(r['balance_btc'] || r['btc_total_balance']) || 0);
      be.equity_btc.push(parseFloat(r['equity_btc'] || r['btc_total_equity']) || 0);
    });
  }
  return be;
}

function renderBEChart(cd, be) {
  if (!be.time.length) {
    document.getElementById(cd.id).innerHTML = '<div style="color:var(--text-dim);padding:var(--sp-md)">No balance and equity data found</div>';
    return;
  }
  var r = cd.result;
  var name = r.display_name || (r.config_name + '/' + (r.exchange_dir || '') + '/' + (r.result_name || ''));
  var timeStr = fmtDate(r.modified);
  var titleText = name + ' ' + timeStr;

  var isBtc = (cd.type === 'be_btc' || cd.type === 'drawdown_btc');
  var isDrawdown = (cd.type === 'drawdown' || cd.type === 'drawdown_btc');

  if (isDrawdown) {
    /* Drawdown chart: normalized equity (1 → 0) */
    var eqArr = isBtc ? be.equity_btc : be.equity;
    var dd = [];
    var maxEq = 0;
    for (var i = 0; i < eqArr.length; i++) {
      if (eqArr[i] > maxEq) maxEq = eqArr[i];
      dd.push(maxEq > 0 ? 1 + (eqArr[i] - maxEq) / maxEq : 1);
    }
    var traces = [{ x: be.time, y: dd, name: 'Drawdown', line: { width: 1.5 }, showlegend: true }];
    var layout = _chartLayout(titleText, 'Drawdown');
    Plotly.newPlot(cd.id, traces, layout, _plotlyConf());
  } else {
    /* Balance & Equity chart */
    var balArr = isBtc ? be.balance_btc : be.balance;
    var eqArr2 = isBtc ? be.equity_btc : be.equity;
    var eqName = isBtc ? 'equity_btc' : 'equity';
    var balName = isBtc ? 'balance_btc' : 'balance';
    var traces = [
      { x: be.time, y: eqArr2, name: eqName, line: { width: 0.75 } },
      { x: be.time, y: balArr, name: balName, line: { width: 2.5 } }
    ];
    var layout = _chartLayout(titleText, 'Balance');
    Plotly.newPlot(cd.id, traces, layout, _plotlyConf());
  }
}

function toggleLogScale(chartId, isLog) {
  var el = document.getElementById(chartId);
  if (!el || !el.data) return;
  Plotly.relayout(chartId, { 'yaxis.type': isLog ? 'log' : 'linear' });
}

function _chartLayout(title, yTitle) {
  return {
    paper_bgcolor: '#0e1117', plot_bgcolor: '#0e1117',
    font: { color: '#fafafa', size: 12, family: 'Source Sans Pro, sans-serif' },
    margin: { l: 60, r: 20, t: 40, b: 40 },
    title: { text: title, x: 0.5, font: { size: 14 } },
    xaxis: { gridcolor: '#333640', griddash: 'dot', showgrid: true },
    yaxis: { gridcolor: '#333640', title: yTitle },
    legend: { orientation: 'h', y: 1.05 },
    hovermode: 'x unified',
    height: 800
  };
}

/* ── PnL per Symbol chart (matches Streamlit view_chart_symbol) ── */
var _fillsCache = {};

function loadAndRenderPnlChart(cd) {
  if (_fillsCache[cd.path]) {
    var _cached = _fillsCache[cd.path];
    requestAnimationFrame(function() { renderPnlChart(cd, _cached); });
    return;
  }
  fetchCSV(cd.path, 'fills').then(function(csv) {
    _fillsCache[cd.path] = csv;
    requestAnimationFrame(function() { renderPnlChart(cd, csv); });
  }).catch(function(e) {

function renderPnlChart(cd, csv) {
  var rows = csv.rows;
  if (!rows.length) {
    document.getElementById(cd.id).innerHTML = '<div style="color:var(--text-dim);padding:var(--sp-md)">No fills data</div>';
    return;
  }

  /* Detect time column: time → timestamp → minute */
  var headers = csv.headers.map(function(h) { return h.trim(); });
  var coinCol = headers.indexOf('coin') >= 0 ? 'coin' : 'symbol';
  var pnlCol = 'pnl';

  /* Resolve timestamps like Streamlit load_fills() */
  var r = cd.result;
  var times = resolveFilsTimes(rows, headers, r);

  /* Group PnL by coin, cumulative */
  var coins = {};
  rows.forEach(function(row, i) {
    var coin = row[coinCol] || 'unknown';
    if (!coins[coin]) coins[coin] = { times: [], pnl: [], cumPnl: 0 };
    coins[coin].cumPnl += parseFloat(row[pnlCol]) || 0;
    coins[coin].times.push(times[i]);
    coins[coin].pnl.push(coins[coin].cumPnl);
  });

  var traces = [];
  Object.keys(coins).forEach(function(coin) {
    traces.push({
      x: coins[coin].times, y: coins[coin].pnl,

    });
  });

  var timeStr = fmtDate(r.modified);
  var layout = _chartLayout(name + ' ' + timeStr, 'PnL');
  Plotly.newPlot(cd.id, traces, layout, _plotlyConf());
}

/* resolveFilsTimes — mirrors Streamlit load_fills() column priority:
   1. time  (already a datetime string)
   2. minute (offset from end_date, same as Streamlit)
   3. timestamp (numeric ms/s  OR  datetime string like "2020-01-05 21:33:00")
*/
function resolveFilsTimes(rows, headers, result) {
  var times = [];

  if (headers.indexOf('time') >= 0) {
    /* Already datetime strings */
    rows.forEach(function(r) { times.push(r['time']); });
    return times;
  }

  if (headers.indexOf('minute') >= 0) {
    /* Same as Streamlit: start_time = end_date_ts - max_minute * 60 */
    var endDate = result.end_date || '';
    var endTs = endDate ? new Date(endDate).getTime() : Date.now();
    var maxMin = 0;
    rows.forEach(function(r) { var m = parseFloat(r['minute']) || 0; if (m > maxMin) maxMin = m; });
    var startTs = endTs - (maxMin * 60000);
    rows.forEach(function(r) {
      var m = parseFloat(r['minute']) || 0;
      times.push(new Date(startTs + m * 60000).toISOString());
    });
    return times;
  }

  if (headers.indexOf('timestamp') >= 0) {
    /* Numeric (ms if > 1e11, else seconds) OR datetime string — same as Streamlit */
    var firstVal = (rows[0] || {})['timestamp'] || '';
    var firstNum = parseFloat(firstVal);
    var isNumeric = !isNaN(firstNum);
    rows.forEach(function(r) {
      var raw = r['timestamp'] || '';
      if (isNumeric) {
        var n = parseFloat(raw) || 0;
        var ms = n > 1e11 ? n : n * 1000;
        times.push(new Date(ms).toISOString());
      } else {
        /* datetime string like "2020-01-05 21:33:00" — replace space with T for ISO parse */
        times.push(new Date(raw.replace(' ', 'T')).toISOString());
      }
    });
    return times;
  }

  /* Fallback: row index */
  rows.forEach(function(r, i) { times.push(i); });
  return times;
}

function renderTWEChart(cd, csv, resolution) {
  var rows = csv.rows;
  if (!rows.length) {
    document.getElementById(cd.id).innerHTML = '\x3Cdiv style="color:var(--text-dim);padding:var(--sp-md)">No fills data\x3C/div>';
    return;
  }

  var headers = csv.headers.map(function(h) { return h.trim(); });
  var coinCol = headers.indexOf('coin') >= 0 ? 'coin' : 'symbol';
  var balCol = headers.indexOf('balance') >= 0 ? 'balance' : 'usd_total_balance';
  var hasType = headers.indexOf('type') >= 0;
  var r = cd.result;

  /* Resolve timestamps */
  var times = resolveFilsTimes(rows, headers, r);

  /* Compute WE = (1/balance) * psize * pprice for each fill row */
  /* Separate long/short fills, then build per-coin time series */
  var longFills = []; /* { time, coin, we } */
  var shortFills = [];

  rows.forEach(function(row, i) {
    var bal = parseFloat(row[balCol]) || 0;
    if (bal === 0) return;
    var psize = parseFloat(row['psize']) || 0;
    var pprice = parseFloat(row['pprice']) || 0;
    var we = (1 / bal) * psize * pprice;
    var coin = row[coinCol] || 'unknown';
    var t = times[i];
    var type = hasType ? (row['type'] || '') : '';

    if (type.indexOf('short') >= 0) {
      shortFills.push({ time: t, coin: coin, we: we });
    } else {
      longFills.push({ time: t, coin: coin, we: we });
    }
  });

  /* Build pivot-like structure: for each coin, last WE at each time, forward-filled */
  function buildExposure(fills) {
    /* Collect all unique coins and times */
    var coinSet = {};
    fills.forEach(function(f) { coinSet[f.coin] = true; });
    var coins = Object.keys(coinSet).sort();
    if (!coins.length) return { times: [], twe: [], coins: {} };

    /* For each coin, build sparse time→we map */
    var coinData = {};
    coins.forEach(function(c) { coinData[c] = {}; });
    fills.forEach(function(f) { coinData[f.coin][f.time] = f.we; });

    /* Collect all unique times, sorted */
    var allTimesSet = {};
    fills.forEach(function(f) { allTimesSet[f.time] = true; });
    var allTimes = Object.keys(allTimesSet).sort();

    /* Forward-fill: for each time, each coin gets its last known WE */
    var lastWE = {};
    coins.forEach(function(c) { lastWE[c] = 0; });
    var timeline = []; /* { time, coinWE: {coin: we}, twe: number } */

    allTimes.forEach(function(t) {
      coins.forEach(function(c) {
        if (coinData[c][t] !== undefined) lastWE[c] = coinData[c][t];
      });
      var totalWE = 0;
      var cwe = {};
      coins.forEach(function(c) {
        cwe[c] = lastWE[c];
        totalWE += lastWE[c];
      });
      timeline.push({ time: t, coinWE: cwe, twe: totalWE });
    });

    /* Resample: group by resolution-minute buckets, take max TWE entry per bucket */
    var resMs = resolution * 60000;
    var buckets = {};
    timeline.forEach(function(entry) {
      var ts = new Date(entry.time).getTime();
      if (isNaN(ts)) return;
      var bucketKey = Math.floor(ts / resMs) * resMs;
      if (!buckets[bucketKey] || entry.twe > buckets[bucketKey].twe) {
        buckets[bucketKey] = entry;
      }
    });

    /* Create COMPLETE time grid from minBucket to maxBucket, forward-fill empty slots.
       Mirrors Streamlit: resample(...).max().ffill().fillna(0) */
    var allTs = timeline.map(function(e) { return new Date(e.time).getTime(); }).filter(function(t) { return !isNaN(t); });
    if (!allTs.length) return { times: [], twe: [], coins: {} };
    var minBk = Math.floor(Math.min.apply(null, allTs) / resMs) * resMs;
    var maxBk = Math.floor(Math.max.apply(null, allTs) / resMs) * resMs;

    var outTimes = [];
    var outTWE = [];
    var outCoins = {};
    coins.forEach(function(c) { outCoins[c] = []; });

    var lastEntry = null;
    for (var bk = minBk; bk <= maxBk; bk += resMs) {
      if (buckets[bk]) lastEntry = buckets[bk];
      if (!lastEntry) continue; /* no data yet, skip (fillna(0) equivalent: skip leading zeros) */
      outTimes.push(new Date(bk).toISOString());
      outTWE.push(lastEntry.twe);
      coins.forEach(function(c) { outCoins[c].push(lastEntry.coinWE[c] || 0); });
    }

    return { times: outTimes, twe: outTWE, coins: outCoins };
  }

  var longExp = buildExposure(longFills);
  var shortExp = buildExposure(shortFills);

  /* Build Plotly traces */
  var traces = [];

  if (longExp.twe.length) {
    traces.push({ x: longExp.times, y: longExp.twe, name: 'Long TWE', line: { width: 2.5 } });
  }
  if (shortExp.twe.length) {
    traces.push({ x: shortExp.times, y: shortExp.twe, name: 'Short TWE', line: { width: 2.5 } });
  }

  /* Per-coin traces */
  Object.keys(longExp.coins).forEach(function(coin) {
    traces.push({ x: longExp.times, y: longExp.coins[coin], name: coin + ' Long WE', line: { width: 0.75 }, visible: 'legendonly' });
  });
  Object.keys(shortExp.coins).forEach(function(coin) {
    traces.push({ x: shortExp.times, y: shortExp.coins[coin], name: coin + ' Short WE', line: { width: 0.75 }, visible: 'legendonly' });
  });

  var name = r.display_name || (r.config_name + '/' + (r.exchange_dir || '') + '/' + (r.result_name || ''));
  var timeStr = fmtDate(r.modified);
  var layout = _chartLayout(name + ' ' + timeStr + ' - Wallet Exposure', 'Exposure');
  /* Move title below the (horizontal) legend to avoid overlap */
  layout.margin.t = 80;
  layout.title.y = 0.97;
  layout.title.yanchor = 'top';
  layout.legend = { orientation: 'h', y: 1.0, yanchor: 'bottom' };
  Plotly.newPlot(cd.id, traces, layout, _plotlyConf());
}

function toggleTWECoins(chartId, show) {
  var el = document.getElementById(chartId);
  if (!el || !el.data) return;
  /* Traces 0 and 1 are Long/Short TWE (always visible); rest are per-coin */
  var updates = [];
  for (var i = 2; i < el.data.length; i++) {
    updates.push(show ? true : 'legendonly');
  }
  if (!updates.length) return;
  var traceIdxs = [];
  for (var j = 2; j < el.data.length; j++) traceIdxs.push(j);
  Plotly.restyle(chartId, { visible: updates }, traceIdxs);
}

function addConfigToRunByName(name) {
  if (!name || name === '__new__') { toast('Save the config first', 'err'); return; }
  var v7Base = API_BASE.replace('/backtest-v7', '/v7');

  function navigateWithConfig(cfg, finalUser) {
    var cfgToSend = JSON.parse(JSON.stringify(cfg));
    cfgToSend.live = cfgToSend.live || {};
    cfgToSend.live.user = finalUser;
    // Tag so the v7 save endpoint can copy coin override files on first save.
    // Always reset enabled_on to 'disabled' — the source may reference a VPS
    // that doesn't exist in the run editor's host list, which causes a blank select.
    cfgToSend.pbgui = cfgToSend.pbgui || {};
    cfgToSend.pbgui.from_backtest_config = name;
    cfgToSend.pbgui.enabled_on = 'disabled';
    return fetch(v7Base + '/draft', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify({ config: cfgToSend })
    }).then(function(r) { return r.json(); }).then(function(d) {
      var editUrl = v7Base + '/edit_page?token=' + encodeURIComponent(TOKEN) +
        '&new=1&draft_id=' + encodeURIComponent(d.draft_id) + '&st_base=' + encodeURIComponent(ST_BASE);
      window.location.href = editUrl;
    });
  }

  Promise.all([
    apiFetch('/configs/' + encodeURIComponent(name)),
    fetch(v7Base + '/instances', { headers: { 'Authorization': 'Bearer ' + TOKEN } }).then(function(r) { return r.json(); }),
    fetch(v7Base + '/users',     { headers: { 'Authorization': 'Bearer ' + TOKEN } }).then(function(r) { return r.json(); })
  ]).then(function(res) {
    var cfgResp   = res[0] || {};
    var cfg       = cfgResp.config || {};
    var instances = res[1].instances || [];
    var users     = res[2].users     || [];
    var configUser = (cfg.live || {}).user || '';
    var usedBy = {};
    instances.forEach(function(inst) { if (inst.user) usedBy[inst.user] = inst.name; });

    if (configUser && usedBy[configUser]) {
      var userOptions = '<option value=""></option>' +
        users.map(function(u) {
          var isUsed = !!usedBy[u.name];
          var label = esc(u.name);
          if (isUsed) label += ' ⚠ (instance: ' + esc(usedBy[u.name]) + ')';
          var color = isUsed ? ' style="color:#e07800"' : '';
          return '<option value="' + esc(u.name) + '"' + (u.name === configUser ? ' selected' : '') + color + '>' + label + '</option>';
        }).join('');
      var bodyHtml =
        '<p style="color:var(--warn);margin:0 0 12px">⚠ User <strong>' + esc(configUser) + '</strong> ' +
        'already has an active instance: <em>' + esc(usedBy[configUser]) + '</em></p>' +
        '<div class="sb-label">Select user for new instance</div>' +
        '<select id="add-to-run-user-sel" class="sb-input" style="width:100%">' + userOptions + '</select>';
      showModal('Add to Run — User Conflict', bodyHtml, [
        { text: 'Cancel', cls: '' },
        { text: 'Continue', cls: 'modal-btn-primary', action: function() {
          var selEl = document.getElementById('add-to-run-user-sel');
          var chosen = selEl ? selEl.value : configUser;
          closeModal();
          navigateWithConfig(cfg, chosen).catch(function(e) { toast('Failed: ' + e.message, 'err'); });
        }}
      ]);
    } else {
      navigateWithConfig(cfg, configUser).catch(function(e) { toast('Failed: ' + e.message, 'err'); });
    }
  }).catch(function(e) { toast('Failed: ' + e.message, 'err'); });
}

function closeAllSectionsForPaths(paths) {
  var pathSet = {};
  paths.forEach(function(p) { pathSet[p] = true; });
  document.querySelectorAll('#results-list .tbl tbody tr').forEach(function(tr) {
    if (!pathSet[tr.dataset.path]) return;
    var idx = tr.dataset.idx;
    ['view-section-', 'plot-section-', 'fills-section-', 'analysis-wrap-', 'config-wrap-'].forEach(function(prefix) {
      var el = document.getElementById(prefix + idx);
      if (el) el.remove();
    });
    tr.querySelectorAll('.icon-btn').forEach(function(btn) { btn.classList.remove('active'); });
  });
}

function runInlineCalcBalance() {
  var cfg = window._bcalcConfig;
  if (!cfg) return;
  var exchEl = document.getElementById('bcalc-exch');
  var spinEl = document.getElementById('bcalc-spin');
  var resEl  = document.getElementById('bcalc-res');
  if (!exchEl || !resEl) return;
  spinEl.style.display = '';
  resEl.innerHTML = '';
  window.PBGuiEditorShared.requestBalanceCalculation({
    apiBase: API_BASE,
    token: TOKEN,
    config: cfg,
    exchange: exchEl.value,
  }).then(function(data) {
    spinEl.style.display = 'none';
    if (data.error) { resEl.innerHTML = '\x3Cspan style="color:var(--red)"\x3E' + esc(data.error) + '\x3C/span\x3E'; return; }
    var card = 'background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px';
    var html = '';
    if (data.recommendation) {
      var rec = data.recommendation;
      html += '\x3Cdiv style="' + card + '"\x3E';
      html += '\x3Cdiv style="font-weight:700;margin-bottom:4px"\x3ERecommended Balance — ' + esc(rec.symbol) + ' (' + esc(rec.side) + ')\x3C/div\x3E';
      html += '\x3Cdiv style="font-size:1.5em;color:var(--accent);font-weight:700;margin-bottom:6px"\x3E' + rec.recommended_balance + ' USDT\x3C/div\x3E';
      html += '\x3Cdiv style="display:flex;justify-content:space-between"\x3E\x3Cspan style="color:var(--text-dim)"\x3ECalculated\x3C/span\x3E\x3Cspan\x3E' + rec.calculated_balance.toFixed(2) + ' USDT\x3C/span\x3E\x3C/div\x3E';
      html += '\x3C/div\x3E';
    }
    if (data.balance_long && data.balance_long.length) {
      html += '\x3Cdiv style="' + card + '"\x3E\x3Cdiv style="font-weight:600;margin-bottom:4px"\x3ELong\x3C/div\x3E';
      html += '\x3Ctable class="tbl" style="font-size:var(--fs-xs)"\x3E\x3Cthead\x3E\x3Ctr\x3E\x3Cth\x3ECoin\x3C/th\x3E\x3Cth\x3ERequired\x3C/th\x3E\x3C/tr\x3E\x3C/thead\x3E\x3Ctbody\x3E';
      data.balance_long.forEach(function(r) { html += '\x3Ctr\x3E\x3Ctd\x3E' + esc(r.coin) + '\x3C/td\x3E\x3Ctd\x3E' + r.balance.toFixed(2) + '\x3C/td\x3E\x3C/tr\x3E'; });
      html += '\x3C/tbody\x3E\x3C/table\x3E\x3C/div\x3E';
    }
    if (data.balance_short && data.balance_short.length) {
      html += '\x3Cdiv style="' + card + '"\x3E\x3Cdiv style="font-weight:600;margin-bottom:4px"\x3EShort\x3C/div\x3E';
      html += '\x3Ctable class="tbl" style="font-size:var(--fs-xs)"\x3E\x3Cthead\x3E\x3Ctr\x3E\x3Cth\x3ECoin\x3C/th\x3E\x3Cth\x3ERequired\x3C/th\x3E\x3C/tr\x3E\x3C/thead\x3E\x3Ctbody\x3E';
      data.balance_short.forEach(function(r) { html += '\x3Ctr\x3E\x3Ctd\x3E' + esc(r.coin) + '\x3C/td\x3E\x3Ctd\x3E' + r.balance.toFixed(2) + '\x3C/td\x3E\x3C/tr\x3E'; });
      html += '\x3C/tbody\x3E\x3C/table\x3E\x3C/div\x3E';
    }
    if (!html) html = '\x3Cdiv style="color:var(--text-dim)"\x3ENo results — check that the config has approved coins.\x3C/div\x3E';
    resEl.innerHTML = html;
  }).catch(function(e) {
    spinEl.style.display = 'none';
    resEl.innerHTML = '\x3Cspan style="color:var(--red)"\x3ERequest failed: ' + esc(e.message) + '\x3C/span\x3E';

function renderArchiveResults(name) {
  var tableEl = document.getElementById('archive-results-table');
  var chartsEl = document.getElementById('archive-charts');

  /* Populate config filter dropdown */
  var cfgSel = document.getElementById('arc-results-config-filter');
  if (cfgSel) {
    var cfgVal = cfgSel.value;
    var cfgNames = [];
    archiveResults.forEach(function(r) { if (cfgNames.indexOf(r.config_name) < 0) cfgNames.push(r.config_name); });
    cfgNames.sort();
    cfgSel.innerHTML = '\x3Coption value="">All configs\x3C/option>' +
      cfgNames.map(function(n) { return '\x3Coption value="' + esc(n) + '"' + (n === cfgVal ? ' selected' : '') + '>' + esc(n) + '\x3C/option>'; }).join('');
  }

  /* Apply config + text filter */
  var cfgFilter = cfgSel ? cfgSel.value : '';
  var textFilter = ((document.getElementById('arc-results-filter') || {}).value || '').toLowerCase();
  var filtered = archiveResults.filter(function(r) {
    if (cfgFilter && r.config_name !== cfgFilter) return false;
    if (!textFilter) return true;
    var hay = ((r.config_name || '') + ' ' + (r.result_name || '')).toLowerCase();
    return hay.indexOf(textFilter) >= 0;
  });

  if (!filtered.length) {
    tableEl.innerHTML = '\x3Cdiv class="empty-state">No results in this archive.\x3C/div>';
    return;
  }

  var sorted = filtered.slice().sort(function(a, b) {
    var va = a[_archResSort], vb = b[_archResSort];
    if (va === undefined) va = '';
    if (vb === undefined) vb = '';
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return _archResSortAsc ? -1 : 1;
    if (va > vb) return _archResSortAsc ? 1 : -1;
    return 0;
  });

  _renderResultsTableInto(tableEl, sorted, chartsEl, _rthA);
}

/* ════════════════════════════════════════════════
   MODAL
   ════════════════════════════════════════════════ */
function makeDraggable(el, handle) {
  var startX, startY, startL, startT;
  handle.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    var rect = el.getBoundingClientRect();
    startX = e.clientX; startY = e.clientY;
    startL = rect.left;  startT = rect.top;
    el.style.margin   = '0';
    el.style.position = 'fixed';
    el.style.left     = startL + 'px';
    el.style.top      = startT + 'px';
    function onMove(e) {
      el.style.left = (startL + e.clientX - startX) + 'px';
      el.style.top  = (startT + e.clientY - startY) + 'px';
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
    e.preventDefault();
  });
}

function showModal(title, bodyHtml, buttons) {
  var root = document.getElementById('modal-root');
  var box  = document.getElementById('modal-box');
  box.style.left = ''; box.style.top = ''; box.style.position = ''; box.style.margin = '';
  var html = '<div class="modal-header">' +
             '<span class="modal-title">' + esc(title) + '</span>' +
             '<button class="modal-close" id="modal-close-btn" title="Close">✕</button>' +
             '</div><div class="modal-body">' + bodyHtml + '</div><div class="modal-actions">';
  buttons.forEach(function(b, i) {
    html += '<button class="modal-btn ' + (b.cls || '') + '" id="modal-btn-' + i + '">' + esc(b.text) + '</button>';
  });
  html += '</div>';
  box.innerHTML = html;
  root.classList.add('open');
  document.getElementById('modal-close-btn').onclick = closeModal;
  buttons.forEach(function(b, i) {
    document.getElementById('modal-btn-' + i).onclick = b.action || closeModal;
  });
  makeDraggable(box, box.querySelector('.modal-header'));
}

function closeModal() {
  document.getElementById('modal-root').classList.remove('open');
}

/* ════════════════════════════════════════════════
   FORMATTING HELPERS
   ════════════════════════════════════════════════ */
function esc(s) {
  if (s === null || s === undefined) return '';
  var d = document.createElement('div'); d.textContent = String(s); return d.innerHTML;
}
function fmt(v, decimals) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return Number(v).toFixed(decimals);
}
function pct(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return (Number(v) * 100).toFixed(2) + '%';
}
function fmtDate(iso) {
  if (!iso) return '—';
  try { var d = new Date(iso); return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
  catch(e) { return iso; }
}

  var helpFilter   = document.getElementById('help-toc-filter');
  var helpLangEN   = document.getElementById('help-lang-en');
  var helpLangDE   = document.getElementById('help-lang-de');
  var helpDragHandle = document.getElementById('help-drag-handle');
  var helpSearch      = document.getElementById('help-search');
  var helpSearchUp    = document.getElementById('help-search-up');
  var helpSearchDn    = document.getElementById('help-search-dn');
  var helpSearchCount = document.getElementById('help-search-count');
  var helpSearchGlobal = document.getElementById('help-search-global');

  var helpLang   = 'EN';
  var helpTopics = [];
  var helpSel    = 0;
  var _sMarks = [], _sIdx = -1, _sTimer = null, _rawHtml = null;
  var _topicCache = {}, _globalMode = false;

  /* Docs endpoints: strip the router prefix from API_BASE */
  var docsBase = API_BASE.replace('/backtest-v7', '');

  function mdToHtml(md) {
    var lines = md.split('\n'), html = '', inPre = false, preBuf = '', inUl = false, inOl = false;
    function flushList() { if (inUl) { html += '</ul>'; inUl = false; } if (inOl) { html += '</ol>'; inOl = false; } }
    function inlineFormat(t) {
      t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
      t = t.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
      t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
      t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      t = t.replace(/__(.+?)__/g, '<strong>$1</strong>');
      t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
      t = t.replace(/_(.+?)_/g, '<em>$1</em>');
      return t;
    }
    for (var i = 0; i < lines.length; i++) {
      var l = lines[i];
      if (l.match(/^```/)) { if (!inPre) { flushList(); inPre = true; preBuf = ''; } else { html += '<pre><code>' + preBuf.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</code></pre>'; inPre = false; } continue; }
      if (inPre) { preBuf += (preBuf ? '\n' : '') + l; continue; }
      if (l.match(/^---+$/)) { flushList(); html += '<hr>'; continue; }
      var hm = l.match(/^(#{1,6})\s+(.*)/); if (hm) { flushList(); html += '<h' + hm[1].length + '>' + inlineFormat(hm[2]) + '</h' + hm[1].length + '>'; continue; }
      if (l.match(/^>\s?/)) { flushList(); html += '<blockquote>' + inlineFormat(l.replace(/^>\s?/, '')) + '</blockquote>'; continue; }
      var ulm = l.match(/^[\-\*]\s+(.*)/); if (ulm) { if (!inUl) { if (inOl) { html += '</ol>'; inOl = false; } html += '<ul>'; inUl = true; } html += '<li>' + inlineFormat(ulm[1]) + '</li>'; continue; }
      var olm = l.match(/^\d+\.\s+(.*)/); if (olm) { if (!inOl) { if (inUl) { html += '</ul>'; inUl = false; } html += '<ol>'; inOl = true; } html += '<li>' + inlineFormat(olm[1]) + '</li>'; continue; }
      if (l.trim() === '') { flushList(); html += '<p></p>'; continue; }
      flushList(); html += '<p>' + inlineFormat(l) + '</p>';
    }
    flushList();
    return html;
  }

  function _clearSearch() {
    if (_rawHtml !== null) helpContent.innerHTML = _rawHtml;
    _sMarks = []; _sIdx = -1; helpSearchCount.textContent = '';
  }
  function _applySearch(term) {
    if (_rawHtml === null) return;
    if (!term) { _clearSearch(); return; }
    var re; try { re = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'); } catch(e) { return; }
    helpContent.innerHTML = _rawHtml.replace(/(<[^>]+>)|([^<]+)/g, function(_, tag, text) {
      if (tag) return tag;
      return text.replace(re, function(_, m) { return '<mark>' + m + '</mark>'; });
    });
    _sMarks = Array.from(helpContent.querySelectorAll('mark'));
    _updateSCount();
    if (_sMarks.length > 0) _gotoMark(0);
  }
  function _updateSCount() {
    helpSearchCount.textContent = _sMarks.length ? (_sIdx + 1) + '/' + _sMarks.length : (helpSearch.value.trim() ? '0 found' : '');
  }
  function _gotoMark(idx) {
    if (!_sMarks.length) return;
    if (_sIdx >= 0 && _sIdx < _sMarks.length) _sMarks[_sIdx].classList.remove('current');
    _sIdx = ((idx % _sMarks.length) + _sMarks.length) % _sMarks.length;
    _sMarks[_sIdx].classList.add('current');
    _sMarks[_sIdx].scrollIntoView({ block: 'center', behavior: 'smooth' });
    _updateSCount();
  }
  function _ensureTopicCached(idx, cb) {
    if (_topicCache[idx] !== undefined) { cb(_topicCache[idx]); return; }
    var t = helpTopics[idx];
    if (!t) { cb(''); return; }
    fetch(docsBase + '/docs/content?file=' + encodeURIComponent(t.file) + '&lang=' + helpLang + '&token=' + TOKEN)
      .then(function(r) { return r.json(); })
      .then(function(d) { _topicCache[idx] = mdToHtml(d.content || ''); cb(_topicCache[idx]); })
      .catch(function() { _topicCache[idx] = ''; cb(''); });
  }
  function _showGlobalResults(term) {
    if (!term) { helpContent.innerHTML = '<p style="color:#64748b;padding:8px 0;">Type a search term to find across all topics.</p>'; helpSearchCount.textContent = ''; return; }
    var re; try { re = new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'); } catch(e) { return; }
    helpContent.innerHTML = '<div class="help-loading">Searching&#x2026;</div>';
    var pending = helpTopics.length, allResults = [];
    if (pending === 0) { helpContent.innerHTML = ''; helpSearchCount.textContent = '0 found'; return; }
    helpTopics.forEach(function(t, idx) {
      _ensureTopicCached(idx, function(html) {
        var text = html.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ');
        var matchIdxs = [], m;
        re.lastIndex = 0;
        while ((m = re.exec(text)) !== null) { matchIdxs.push(m.index); if (matchIdxs.length >= 3) break; }
        if (matchIdxs.length > 0) {
          allResults.push({ idx: idx, title: t.title, snippets: matchIdxs.map(function(mi) { return text.slice(Math.max(0, mi - 55), Math.min(text.length, mi + 80)); }) });
        }
        if (--pending === 0) _renderGlobalResults(term, allResults);
      });
    });
  }
  function _renderGlobalResults(term, results) {
    var re; try { re = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'); } catch(e) { return; }
    if (results.length === 0) { helpContent.innerHTML = '<p style="color:#64748b;padding:8px 0;">No results found.</p>'; helpSearchCount.textContent = '0 found'; return; }
    helpSearchCount.textContent = results.length + (results.length === 1 ? ' topic' : ' topics');
    var html = '<div class="gs-results">';
    results.forEach(function(r) {
      html += '<div class="gs-item" data-idx="' + r.idx + '"><div class="gs-topic">' + r.title + '</div>';
      r.snippets.forEach(function(s) { html += '<div class="gs-snip">\u2026' + s.replace(re, function(_, m) { return '<mark>' + m + '</mark>'; }) + '\u2026</div>'; });
      html += '</div>';
    });
    html += '</div>';
    helpContent.innerHTML = html;
    helpContent.querySelectorAll('.gs-item').forEach(function(el) {
      el.addEventListener('click', function() { var idx = parseInt(el.getAttribute('data-idx'), 10); helpSearchGlobal.checked = false; _globalMode = false; helpSearch.placeholder = 'Search in topic\u2026'; loadTopic(idx); });
    });
  }

  helpSearch.addEventListener('input', function() {
    if (_sTimer) clearTimeout(_sTimer);
    _sTimer = setTimeout(function() { var term = helpSearch.value.trim(); if (_globalMode) _showGlobalResults(term); else _applySearch(term); }, 260);
  });
  helpSearch.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !_globalMode) { e.preventDefault(); _gotoMark(_sIdx + (e.shiftKey ? -1 : 1)); }
    if (e.key === 'Escape') { helpSearch.value = ''; if (_globalMode) _showGlobalResults(''); else _clearSearch(); }
  });
  helpSearchUp.addEventListener('click', function() { _gotoMark(_sIdx - 1); });
  helpSearchDn.addEventListener('click', function() { _gotoMark(_sIdx + 1); });
  helpSearchGlobal.addEventListener('change', function() {
    _globalMode = helpSearchGlobal.checked;
    helpSearch.placeholder = _globalMode ? 'Search all topics\u2026' : 'Search in topic\u2026';
    var term = helpSearch.value.trim();
    if (_globalMode) { _showGlobalResults(term); }
    else { if (_rawHtml !== null) { helpContent.innerHTML = _rawHtml; _sMarks = []; _sIdx = -1; helpSearchCount.textContent = ''; } if (term) _applySearch(term); }
  });

  function loadHelpIndex(keyword) {
    helpTocList.innerHTML = '<div class="help-loading">Loading...</div>';
    fetch(docsBase + '/docs/index?lang=' + helpLang + '&token=' + TOKEN)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        helpTopics = data || [];
        renderToc();
        if (helpTopics.length > 0) {
          var startIdx = 0;
          if (keyword) {
            var kw = keyword.toLowerCase();
            for (var i = 0; i < helpTopics.length; i++) {
              if (helpTopics[i].title.toLowerCase().indexOf(kw) !== -1 ||
                  (helpTopics[i].file && helpTopics[i].file.toLowerCase().indexOf(kw) !== -1)) {
                startIdx = i; break;
              }
            }
          }
          loadTopic(startIdx);
        }
      })
      .catch(function() { helpTocList.innerHTML = '<div class="help-loading">Failed to load topics.</div>'; });
  }

  function renderToc() {
    var flt = helpFilter.value.trim().toLowerCase();
    helpTocList.innerHTML = '';
    helpTopics.forEach(function(t, idx) {
      if (flt && t.title.toLowerCase().indexOf(flt) === -1) return;
      var el = document.createElement('div');
      el.className = 'toc-item' + (idx === helpSel ? ' active' : '');
      el.textContent = t.title;
      el.addEventListener('click', function() { loadTopic(idx); });
      helpTocList.appendChild(el);
    });
  }

  function loadTopic(idx) {
    helpSel = idx; renderToc();
    var t = helpTopics[idx];
    if (!t) return;
    _rawHtml = null; _sMarks = []; _sIdx = -1; helpSearchCount.textContent = '';
    helpContent.innerHTML = '<div class="help-loading">Loading...</div>';
    fetch(docsBase + '/docs/content?file=' + encodeURIComponent(t.file) + '&lang=' + helpLang + '&token=' + TOKEN)
      .then(function(r) { return r.json(); })
      .then(function(d) {
        _rawHtml = mdToHtml(d.content || '');
        _topicCache[idx] = _rawHtml;
        helpContent.innerHTML = _rawHtml;
        helpContent.scrollTop = 0;
        var st = helpSearch.value.trim(); if (st) _applySearch(st);
      })
      .catch(function() { helpContent.innerHTML = '<div class="help-loading">Failed to load content.</div>'; });
  }

  helpFilter.addEventListener('input', renderToc);
  helpLangEN.addEventListener('click', function() {
    if (helpLang === 'EN') return;
    helpLang = 'EN'; helpLangEN.classList.add('active'); helpLangDE.classList.remove('active');
    _topicCache = {}; helpSel = 0; loadHelpIndex('backtest');
  });
  helpLangDE.addEventListener('click', function() {
    if (helpLang === 'DE') return;
    helpLang = 'DE'; helpLangDE.classList.add('active'); helpLangEN.classList.remove('active');
    _topicCache = {}; helpSel = 0; loadHelpIndex('backtest');
  });
  document.getElementById('help-close').addEventListener('click', function() { helpOvl.classList.remove('visible'); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') helpOvl.classList.remove('visible'); });

  /* Drag to move */
  (function() {
    var startX, startY, boxL, boxT;
    helpDragHandle.addEventListener('mousedown', function(e) {
      e.preventDefault();
      var r = helpOvl.getBoundingClientRect();
      helpOvl.style.transform = 'none';
      helpOvl.style.left = r.left + 'px'; helpOvl.style.top = r.top + 'px';
      startX = e.clientX; startY = e.clientY; boxL = r.left; boxT = r.top;
      function onMove(ev) { helpOvl.style.left = (boxL + ev.clientX - startX) + 'px'; helpOvl.style.top = (boxT + ev.clientY - startY) + 'px'; }
      function onUp() { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }());

  window._openBacktestHelp = function() {
    helpOvl.classList.add('visible');
    if (helpTopics.length === 0) {
      loadHelpIndex('backtest');
    } else {
      var kw = 'backtest';
      for (var i = 0; i < helpTopics.length; i++) {
        if (helpTopics[i].title.toLowerCase().indexOf(kw) !== -1 ||
            (helpTopics[i].file && helpTopics[i].file.toLowerCase().indexOf(kw) !== -1)) {
          loadTopic(i); return;
        }
      }
      loadTopic(0);
    }
  };
}());
</script>

<!-- Guide button override: must run AFTER pbgui_nav.js DOMContentLoaded handler -->
<script>
document.addEventListener('DOMContentLoaded', function () {
  var btn = document.getElementById('pbgui-guide-btn');
  if (btn) {
    var fresh = btn.cloneNode(true);
    btn.parentNode.replaceChild(fresh, btn);
    fresh.addEventListener('click', function () {
      if (typeof window._openBacktestHelp === 'function') window._openBacktestHelp();
    });
  }
});
</script>
</body>
