<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBGui — V7 Backtest</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<link rel="stylesheet" href="/app/css/sidebar.css?v=1">
<style>
/* ── Design Tokens ─────────────────────────────── */
:root {
  --bg: #0e1117;       --bg2: #1a1d24;
  --bg3: #262730;      --border: #333640;
  --text: #fafafa;     --text-dim: #a0a4ab;
  --green: #21c354;    --orange: #ff8c00;
  --red: #ff4b4b;      --blue: #1f77ff;
  --accent: #4da6ff;
  --font: 'Source Sans Pro', -apple-system, BlinkMacSystemFont, sans-serif;
  --fs-xs: 11px; --fs-sm: 13px; --fs-base: 14px;
  --fs-md: 15px; --fs-lg: 18px; --fs-xl: 22px;
  --sp-xs: 4px;  --sp-sm: 8px;  --sp-md: 12px; --sp-lg: 20px;
  --input-h: 32px; --btn-h: 32px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); font-size: var(--fs-base);
             color: var(--text); background: var(--bg); overflow: hidden; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Connection Banner ─────────────────────────── */
#conn-banner { padding: var(--sp-sm) 16px; text-align: center; font-size: var(--fs-sm); font-weight: 600; transition: all .3s; }
.conn-ok      { background: var(--green); color: #000; display: none; }
.conn-lost    { background: var(--red);   color: #fff; }
.conn-waiting { background: var(--orange); color: #000; }

/* ── Page Layout ───────────────────────────────── */
#page-body { display: flex; height: calc(100vh - 52px); overflow: hidden; }

/* ── Main Content ──────────────────────────────── */
#main-content { flex: 1; overflow: hidden; background: var(--bg); padding: var(--sp-lg); display: flex; flex-direction: column; }
/* When results panel is unpinned: main-content scrolls everything */
#main-content:has(#panel-results.active.unpinned) { overflow-y: auto; }
/* When archive results panel is unpinned: main-content scrolls everything */
#main-content:has(#panel-archive.active.arc-unpinned) { overflow-y: auto; }

/* Panels */
.view-panel { display: none; }
.view-panel.active { display: flex !important; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }

/* ── Results panel: PINNED (default) ── */
/* Panel fills viewport; only scroll-area scrolls */
#panel-results.active:not(.unpinned) { height: 100%; }
#results-scroll-area { flex: 1; min-height: 0; overflow-y: auto; padding-bottom: var(--sp-lg); }
/* ── Results panel: UNPINNED ── */
/* Panel must NOT clip → release overflow + flex so main-content can scroll */
#panel-results.active.unpinned { overflow: visible; flex: none; min-height: unset; height: auto; }
#panel-results.unpinned #results-scroll-area { flex: none; min-height: unset; overflow-y: visible; }

/* ── Archive list view ── */
#archive-list-view { flex: 1; min-height: 0; overflow-y: auto; }

/* ── Archive results view: PINNED (default) ── */
#panel-archive.active:not(.arc-unpinned) { height: 100%; }
#archive-results-view { display: flex; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }
#archive-results-scroll { flex: 1; min-height: 0; overflow-y: auto; padding-bottom: var(--sp-lg); }
/* ── Archive results view: UNPINNED ── */
/* Same pattern as Results: release overflow + flex on both panel and inner view */
#panel-archive.active.arc-unpinned { overflow: visible; flex: none; min-height: unset; height: auto; }
#panel-archive.arc-unpinned #archive-results-view { overflow: visible; flex: none; min-height: unset; }
#panel-archive.arc-unpinned #archive-results-scroll { flex: none; min-height: unset; overflow-y: visible; }
/* Scrollable list areas within panels */
#configs-list, #queue-list { flex: 1; min-height: 0; overflow-y: auto; }
/* Config editor replaces list — also needs flex scroll */
#configs-editor { flex: 1; min-height: 0; overflow-y: auto; padding-right: var(--sp-md); }
/* ── Tables ────────────────────────────────────── */
.tbl { width: 100%; border-collapse: separate; border-spacing: 0; font-size: var(--fs-base); user-select: none; }
.tbl th { position: sticky; top: 0; z-index: 2; background: var(--bg2); font-size: var(--fs-sm);
          text-transform: uppercase; letter-spacing: .5px; color: var(--text-dim);
          padding: 8px 10px; text-align: left; border-bottom: 2px solid var(--border);
          cursor: pointer; user-select: none; white-space: nowrap; }
.tbl th:hover { color: var(--text); }
.tbl th .sort-arrow { margin-left: 4px; font-size: var(--fs-xs); }
.tbl td { padding: 7px 10px; border-bottom: 1px solid var(--border); white-space: nowrap;
          overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
.tbl tr:hover td { background: rgba(255,255,255,.03); }
.tbl tr.selected td { background: rgba(77,166,255,.08); }

/* Status badges */
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: var(--fs-xs);
         font-weight: 600; letter-spacing: .3px; }
.badge-queued    { background: rgba(160,164,171,.15); color: var(--text-dim); }
.badge-running   { background: rgba(31,119,255,.15);  color: var(--blue); }
.badge-backtesting { background: rgba(255,140,0,.15); color: var(--orange); }
.badge-complete  { background: rgba(33,195,84,.15);   color: var(--green); }
.badge-error     { background: rgba(255,75,75,.15);    color: var(--red); }

/* Action buttons (inline) */
.act-btn { background: none; border: 1px solid var(--border); border-radius: 4px; color: var(--text-dim);
           cursor: pointer; padding: 3px 8px; font-size: var(--fs-xs); transition: all .15s; }
.act-btn:hover { color: var(--text); border-color: var(--accent); }
.act-btn-danger:hover { color: var(--red); border-color: var(--red); }

/* ── Config Editor form grid (matches v7_edit.html style) ── */
.form-row { display: grid; gap: var(--sp-md); margin-bottom: var(--sp-md); }
.cols-2 { grid-template-columns: 1fr 1fr; }
.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.cols-5 { grid-template-columns: 1fr 1fr 1fr 1fr 1fr; }
.cols-6 { grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr; }
.cols-ex6 { grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr; }
.cols-7 { grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr; }
.cols-8 { grid-template-columns: repeat(8, minmax(0, 1fr)); }
.span-4 { grid-column: span 4; }
@media (max-width: 1400px) { .cols-8 { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
@media (max-width:  700px) { .cols-8 { grid-template-columns: repeat(2, minmax(0, 1fr)); } .span-4 { grid-column: span 2; } }
.form-group { display: flex; flex-direction: column; min-width: 0; }
.form-group label { font-size: var(--fs-xs); color: var(--text-dim);
  letter-spacing: .03em; margin-bottom: 2px; display: flex; align-items: center; gap: 4px;
  flex-wrap: wrap; white-space: normal; overflow: visible; line-height: 1.2; min-width: 0;
  min-height: 2.4em; align-content: flex-start; }
.form-group label span,
.chk-row label span {
  min-width: 0;
  overflow-wrap: anywhere;
  word-break: break-word;
}
.form-group input, .form-group select, .form-group textarea {
  height: var(--input-h); padding: 0 var(--sp-sm);
  background: var(--bg2); color: var(--text); border: 1px solid var(--border);
  border-radius: 4px; font-size: var(--fs-sm); font-family: var(--font); outline: none; width: 100%; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { height: auto; padding: var(--sp-sm); resize: vertical; font-family: monospace; }
.form-group select[multiple] { height: auto; min-height: calc(var(--input-h)*3.5); padding: var(--sp-xs) 0; }
.chk-row { display: flex; align-items: flex-start; gap: 6px; min-height: var(--input-h); height: auto; min-width: 0; }
.chk-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); flex-shrink: 0; }
.chk-row label { font-size: var(--fs-sm); color: var(--text); margin: 0; cursor: pointer; white-space: normal; overflow: visible; line-height: 1.2; min-width: 0; flex: 1 1 auto; overflow-wrap: anywhere; word-break: break-word; }
/* ─── data-tip tooltip ───────────────────────────────────── */
[data-tip] {
  cursor: help;
  border-bottom: none;
  text-decoration-line: underline;
  text-decoration-style: dotted;
  text-decoration-color: #64748b;
  text-underline-offset: 2px;
  text-decoration-thickness: 1px;
}
#data-tip-tooltip {
  display: none; position: fixed; z-index: 9999;
  background: #1e293b; color: #e2e8f0; border: 1px solid #334155;
  border-radius: 5px; font-size: var(--fs-xs); font-weight: normal;
  padding: 6px 10px; white-space: pre-wrap; max-width: 480px;
  line-height: 1.5; box-shadow: 0 4px 12px rgba(0,0,0,.5); pointer-events: none;
}
.section-title { font-size: var(--fs-md); font-weight: 600;
  margin: var(--sp-lg) 0 var(--sp-sm); padding-bottom: var(--sp-xs); border-bottom: 1px solid var(--border); }
.expander { border: 1px solid var(--border); border-radius: 6px; margin: var(--sp-sm) 0 var(--sp-md); }
.expander-header { display: flex; align-items: center; gap: 6px; padding: var(--sp-sm) var(--sp-md);
  cursor: pointer; background: var(--bg2); font-size: var(--fs-sm); font-weight: 600; user-select: none;
  border-radius: 6px; }
.expander.open .expander-header { border-radius: 6px 6px 0 0; }
.expander-header:hover { background: var(--bg3); }
.expander-header .arrow { transition: transform 0.2s; font-size: 10px; }
.expander.open .expander-header .arrow { transform: rotate(90deg); }
.expander-body { display: none; padding: var(--sp-md); }
.expander.open .expander-body { display: block; }
/* ── Coin Overrides: badge + hover tooltip ── */
.cov-badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  background: var(--bg3); border: 1px solid var(--border);
  font-size: var(--fs-xs); color: var(--text-dim); cursor: default;
}
.cov-badge:hover { border-color: var(--accent); color: var(--text); }
#cov-tooltip {
  display: none; position: fixed; z-index: 9000;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
  padding: 8px 10px; min-width: 280px; max-width: 540px;
  box-shadow: 0 4px 16px rgba(0,0,0,.45);
  font-size: var(--fs-xs); color: var(--text); pointer-events: none;
}
.cov-tt-tbl { border-collapse: collapse; width: 100%; }
.cov-tt-tbl td { padding: 2px 8px; border-bottom: 1px solid var(--border); vertical-align: top; word-break: break-all; }
.cov-tt-tbl td:first-child { color: var(--text-dim); white-space: nowrap; padding-right: 16px; }
.cov-tt-tbl tr.cov-tt-hdr td { font-weight: 600; color: var(--accent); background: var(--bg3); padding: 4px 8px; border-bottom: 1px solid var(--border); }
.num-stepper { display: flex; align-items: center; }
.num-stepper input { flex: 1; border-radius: 0 !important; text-align: center; min-width: 0; }
.num-stepper input[type=number]::-webkit-inner-spin-button,
.num-stepper input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.num-stepper input[type=number] { appearance: textfield; -moz-appearance: textfield; }
.stepper-btn { width: 28px; height: var(--input-h); flex-shrink: 0; background: var(--bg3);
  border: 1px solid var(--border); color: var(--text); font-size: 16px; line-height: 1;
  cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
.stepper-btn:first-child { border-radius: 4px 0 0 4px; border-right: none; }
.stepper-btn:last-child  { border-radius: 0 4px 4px 0; border-left: none; }
.stepper-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }

/* ─── Multiselect (tag-input) ──────────────────────────────── */
.ms-wrap {
  border: 1px solid var(--border); border-radius: 4px;
  background: var(--bg2); min-height: var(--input-h); padding: 2px 4px;
  display: flex; flex-wrap: wrap; gap: 3px; align-items: center;
  cursor: text; position: relative;
}
.ms-wrap:focus-within { border-color: var(--accent); }
.form-group .ms-wrap input.ms-input {
  border: none; background: transparent; padding: 0; height: 24px; width: auto;
}
.ms-clear-btn {
  cursor: pointer; color: var(--text-dim); font-size: 11px; padding: 0 3px;
  border-radius: 3px; margin-left: 2px;
}
.ms-clear-btn:hover { color: var(--red); background: rgba(255,75,75,0.15); }
.ms-all-btn {
  cursor: pointer; color: var(--text-dim); font-size: 11px; padding: 0 3px;
  border-radius: 3px; margin-left: 2px;
}
.ms-all-btn:hover { color: var(--accent); background: rgba(77,166,255,0.15); }
.ms-tag {
  display: inline-flex; align-items: center; gap: 3px;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 3px;
  padding: 1px 6px; font-size: var(--fs-xs); color: var(--text);
}
.ms-tag.ms-tag-invalid {
  color: #ffb3b3; border-color: rgba(255,75,75,.6); background: rgba(255,75,75,.14);
}
.ms-tag.ms-tag-all {
  background: var(--green); color: #000; font-weight: 600; border-color: var(--green);
}
.ms-tag.ms-tag-all .ms-x { color: rgba(0,0,0,.5); }
.ms-tag.ms-tag-all .ms-x:hover { color: #000; }
.ms-tag .ms-x {
  cursor: pointer; color: var(--text-dim); font-size: 11px; line-height: 1;
}
.ms-tag .ms-x:hover { color: var(--red); }
.ms-status-summary {
  display: none; margin-top: 4px; font-size: var(--fs-xs); color: var(--text-dim); align-items: center; gap: 6px; flex-wrap: wrap;
}
.ms-status-summary .warn { color: var(--orange); }
.ms-status-summary .err { color: var(--red); }
.ms-status-summary .sep { color: var(--text-dim); }
.ms-status-summary .ms-status-action { padding: 1px 6px; }
.ms-opt-all { font-weight: 600; color: var(--green); border-bottom: 1px solid var(--border); }
/* kv-chip for coin_sources / market_settings_sources */
.kv-chips { display:flex; flex-wrap:wrap; gap:4px; min-height:24px; }
.kv-chip {
  display:inline-flex; align-items:center; gap:3px;
  background:var(--bg3); border:1px solid var(--border); border-radius:3px;
  padding:1px 6px; font-size:var(--fs-xs); color:var(--text);
}
.kv-chip .ms-x { cursor:pointer; color:var(--text-dim); font-size:11px; line-height:1; }
.kv-chip .ms-x:hover { color:var(--red); }
.kv-chip-ex {
  font-size:10px; color:var(--accent); margin-right:2px;
  opacity:.8; text-transform:uppercase;
}
.kv-chip-ex::after { content:':'; }
.ms-input {
  border: none; background: transparent; color: var(--text);
  font-size: var(--fs-sm); outline: none; min-width: 60px; flex: 1;
  height: 24px; font-family: var(--font);
}
.ms-dropdown {
  position: absolute; top: 100%; left: 0; right: 0;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 0 0 4px 4px; max-height: 200px; overflow-y: auto;
  z-index: 100; display: none;
}
.ms-dropdown.open { display: block; }
.ms-option {
  padding: 4px 8px; font-size: var(--fs-sm); cursor: pointer;
}
.ms-option:hover, .ms-option.highlight, .ms-option.highlighted { background: var(--bg3); }
.ms-option.selected { color: var(--accent); }
.ms-option.in-other { color: var(--orange); }
.ms-option.in-other.selected { color: var(--accent); }

/* Icon toggle buttons in results table */
.icon-btn { background: none; border: 1px solid transparent; border-radius: 4px; color: var(--text-dim);
            cursor: pointer; padding: 2px 5px; font-size: 15px; transition: all .15s; opacity: 0.5; line-height: 1; }
.icon-btn:hover { opacity: 0.8; }
.icon-btn.active { opacity: 1; color: var(--accent); border-color: var(--accent); }
.icon-btn.active:hover { opacity: 1; }
.tbl td.actions-cell { white-space: nowrap; overflow: visible; padding: 4px 6px; }

/* Row selection for bulk actions */
.tbl tbody tr { cursor: pointer; }
.tbl tr.selected td { background: rgba(77,166,255,.12); }
.tbl tr.selected td:first-child { border-left: 3px solid var(--accent); }

/* Checkbox column */
.tbl input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }

/* ── Modal ─────────────────────────────────────── */
#modal-root { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,.6);
              align-items: center; justify-content: center; }
#modal-root.open { display: flex; }
.modal-overlay { display: none; position: fixed; inset: 0; z-index: 1100; background: rgba(0,0,0,.6);
                 align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
             padding: var(--sp-lg); min-width: 160px; max-width: 760px; max-height: 85vh;
             overflow: hidden; resize: both; box-sizing: border-box;
             display: flex; flex-direction: column; }
.import-modal-box {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
  padding: var(--sp-lg); width: min(760px, 92vw); max-height: 85vh;
  display: flex; flex-direction: column;
}
.import-modal-box h3 { font-size: var(--fs-lg); }
.modal-header { display: flex; align-items: center; justify-content: space-between;
                margin-bottom: 0; padding-bottom: var(--sp-sm); border-bottom: 1px solid var(--border);
                cursor: move; user-select: none; flex-shrink: 0; margin-bottom: var(--sp-md); }
.modal-body { flex: 1; overflow: auto; min-height: 0; min-width: 0; }
.modal-title { font-size: var(--fs-lg); font-weight: 600; }
.modal-close { background: none; border: none; color: var(--text-dim); cursor: pointer;
               font-size: 1.2rem; line-height: 1; padding: 2px 8px; border-radius: 4px; }
.modal-close:hover { background: rgba(255,255,255,.1); color: var(--text); }
.modal-actions { display: flex; gap: var(--sp-sm); justify-content: flex-end; margin-top: var(--sp-lg); flex-shrink: 0; }
.modal-btn { height: var(--btn-h); padding: 0 16px; border-radius: 4px; font-size: var(--fs-base);
             cursor: pointer; border: 1px solid var(--border); background: var(--bg3); color: var(--text); }
.modal-btn:hover { background: rgba(255,255,255,.08); }
.modal-btn-primary { background: var(--blue); border-color: var(--blue); color: #fff; }
.modal-btn-primary:hover { background: #1a6ae0; }
.modal-btn-danger { background: var(--red); border-color: var(--red); color: #fff; }
.modal-btn-danger:hover { background: #d43d3d; }
.btn { height: var(--btn-h); padding: 0 16px; border-radius: 4px; font-size: var(--fs-base);
       cursor: pointer; border: 1px solid var(--border); background: var(--bg3); color: var(--text); }
.btn:hover { background: rgba(255,255,255,.08); }
.btn-ok { background: var(--blue); border-color: var(--blue); color: #fff; }
.btn-ok:hover { background: #1a6ae0; }
.btn-cancel { background: var(--bg3); border-color: var(--border); color: var(--text); }

.json-editor {
  width: 100%; min-height: 200px; max-height: 500px;
  font-family: 'Fira Code', 'Cascadia Code', monospace;
  font-size: var(--fs-xs); line-height: 1.4;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; padding: var(--sp-sm); resize: vertical;
  color: var(--text); tab-size: 4;
}
textarea.json-invalid,
textarea.json-invalid:focus {
  border-color: var(--red);
}
.field-status {
  display: none;
  font-size: var(--fs-sm);
  line-height: 1.35;
}
.field-status.error {
  display: block;
  color: var(--red);
}
#cfg-raw-json-status.field-status.error {
  position: fixed;
  top: 64px;
  right: 16px;
  z-index: 220;
  width: min(520px, calc(100vw - 32px));
  max-height: calc(100vh - 80px);
  padding: 6px 10px;
  border: 1px solid rgba(255, 75, 75, 0.45);
  border-radius: 4px;
  background: rgba(55, 20, 20, 0.96);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  box-sizing: border-box;
  overflow: auto;
}
.field-status-main {
  font-weight: 600;
}
.field-status-inline.error {
  margin-top: var(--sp-xs);
  padding: 6px 10px;
  border: 1px solid rgba(255, 75, 75, 0.35);
  border-radius: 4px;
  background: rgba(55, 20, 20, 0.84);
}
.field-status-meta {
  margin-top: 2px;
  color: #ffb3b3;
}
.field-status-actions {
  margin-top: 8px;
}
.field-status-btn {
  height: 26px;
  padding: 0 10px;
  border: 1px solid rgba(255, 75, 75, 0.45);
  border-radius: 4px;
  background: rgba(255, 255, 255, 0.04);
  color: #ffe7e7;
  cursor: pointer;
  font-size: var(--fs-sm);
}
.field-status-btn:hover {
  background: rgba(255, 255, 255, 0.08);
}
.json-highlight-wrap {
  position: relative;
  width: 100%;
  min-width: 0;
}
.json-highlight-wrap textarea {
  display: block;
  width: 100%;
  min-width: 0;
}
.json-highlight-pre {
  display: none;
}
.raw-json-wrap {
  position: relative;
  width: 100%;
  min-width: 0;
}
.raw-json-wrap textarea {
  display: block;
  width: 100%;
  min-width: 0;
}
.raw-json-highlight {
  display: none;
}

/* ── Spinner ────────────────────────────────────── */
.spinner { display:inline-block;width:14px;height:14px;border:2px solid var(--border);
           border-top-color:var(--accent);border-radius:50%;
           animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Toast ─────────────────────────────────────── */
#toast { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex;
         flex-direction: column; gap: var(--sp-sm); pointer-events: none; }
.toast-msg { padding: 10px 16px; border-radius: 6px; font-size: var(--fs-sm); font-weight: 500;
             pointer-events: auto; animation: fadeIn .2s; }
.toast-ok   { background: var(--green); color: #000; }
.toast-err  { background: var(--red); color: #fff; }
.toast-info { background: var(--blue); color: #fff; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ── Empty states ──────────────────────────────── */
.empty-state { text-align: center; color: var(--text-dim); padding: 60px 20px; font-size: var(--fs-md); }
.empty-state .empty-icon { font-size: 48px; margin-bottom: var(--sp-md); opacity: .4; }

/* ── Charts ────────────────────────────────────── */
.chart-wrap { position: relative; margin-top: var(--sp-md); background: var(--bg2); border-radius: 6px; border: 1px solid var(--border); overflow: hidden; }
.chart-wrap:fullscreen { background: #0e1117; display: flex; flex-direction: column; }
.chart-wrap:fullscreen .chart-inner { flex: 1; height: 100% !important; }
.chart-wrap:fullscreen .chart-inner > div { height: 100% !important; }
.chart-container { padding: var(--sp-md); }
.chart-resize-handle { height: 6px; cursor: row-resize; background: var(--border);
                       display: flex; align-items: center; justify-content: center; }
.chart-resize-handle span { width: 32px; height: 2px; background: var(--text-dim); border-radius: 2px; opacity: .4; }
/* Close button overlaid top-right of chart-wrap / json panel */
.chart-close-btn { position: absolute; top: 6px; right: 8px; z-index: 10; background: rgba(14,17,23,.7);
                   border: 1px solid var(--border); color: var(--text-dim); cursor: pointer;
                   font-size: 11px; border-radius: 3px; padding: 1px 5px; line-height: 1.4; }
.chart-close-btn:hover { color: var(--red); border-color: var(--red); background: rgba(255,75,75,.15); }
/* JSON panels (Config / Analysis) */
.json-panel-wrap { position: relative; margin-top: var(--sp-md); background: var(--bg2);
                   border: 1px solid var(--border); border-radius: 6px; padding: var(--sp-md); padding-bottom: 0; overflow: hidden; }
.json-panel-hdr { display: flex; align-items: center; gap: var(--sp-sm); margin-bottom: var(--sp-sm); }
.json-panel-hdr .sb-label { margin: 0; }
.json-panel-close { background: none; border: none; color: var(--text-dim); cursor: pointer;
                    font-size: 13px; margin-left: auto; padding: 0 4px; line-height: 1; }
.json-panel-close:hover { color: var(--red); }
.json-pre { font-size: var(--fs-xs); background: var(--bg); padding: var(--sp-md); border-radius: 4px;
            overflow-y: auto; height: 400px; min-height: 80px; color: var(--green); margin: 0; }
/* ── Results detail ────────────────────────────── */
.result-detail { margin-top: var(--sp-lg); }
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: var(--sp-sm); margin-bottom: var(--sp-lg); }
.metric-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: var(--sp-md); }
.metric-label { font-size: var(--fs-xs); color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; }
.metric-value { font-size: var(--fs-lg); font-weight: 600; margin-top: 2px; }
.metric-value.positive { color: var(--green); }
.metric-value.negative { color: var(--red); }

/* ── Log panel (floating) ──────────────────────── */
#log-panel { position: fixed; bottom: 0; right: 0; width: 50%; height: 40vh; min-width: 240px; min-height: 150px;
             background: var(--bg2); border: 2px solid var(--accent);
             z-index: 500; display: none; flex-direction: column; overflow: hidden; border-radius: 6px 6px 0 0; }
#log-panel.visible { display: flex; }
#log-panel-header { display: flex; align-items: center; justify-content: space-between;
                    padding: var(--sp-sm) var(--sp-md); background: var(--bg3); border-bottom: 1px solid var(--border);
                    flex-shrink: 0; cursor: move; user-select: none; }
#log-panel-title { font-size: var(--fs-sm); font-weight: 600; }
#log-panel-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: var(--fs-lg); }
#log-panel-close:hover { color: var(--text); }
#log-viewer-target { flex: 1; min-height: 0; overflow: hidden; }
/* Resize handles */
.lp-resize { position: absolute; z-index: 2; }
.lp-resize-n  { top: -4px; left: 6px; right: 6px; height: 8px; cursor: n-resize; }
.lp-resize-s  { bottom: -4px; left: 6px; right: 6px; height: 8px; cursor: s-resize; }
.lp-resize-w  { left: -4px; top: 6px; bottom: 6px; width: 8px; cursor: w-resize; }
.lp-resize-e  { right: -4px; top: 6px; bottom: 6px; width: 8px; cursor: e-resize; }
.lp-resize-nw { top: -4px; left: -4px; width: 12px; height: 12px; cursor: nw-resize; }
.lp-resize-ne { top: -4px; right: -4px; width: 12px; height: 12px; cursor: ne-resize; }
.lp-resize-sw { bottom: -4px; left: -4px; width: 12px; height: 12px; cursor: sw-resize; }
.lp-resize-se { bottom: -4px; right: -4px; width: 12px; height: 12px; cursor: se-resize; }
/* ── Help overlay ── */
#help-ovl {
  display: none;
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 3000;
  width: min(900px, 95vw);
  height: min(700px, 90vh);
  min-width: 480px; min-height: 300px;
  background: #131b2b;
  border: 1px solid #2d3748;
  border-radius: 12px;
  box-shadow: 0 20px 70px rgba(0,0,0,0.9);
  flex-direction: column;
  overflow: hidden;
  resize: both;
}
#help-ovl.visible { display: flex; }
#help-drag-handle {
  position: absolute; top: 0; left: 0; right: 48px;
  height: 46px; cursor: move; z-index: 2;
}
#help-ovl > .ovl-panel {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; position: relative;
}
.ovl-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.85rem 1.1rem 0.85rem 1.25rem;
  border-bottom: 1px solid #1e2736;
  flex-shrink: 0; background: #111827;
}
.ovl-header-title { font-size: var(--fs-sm); font-weight: 700; color: #e2e8f0; display: flex; align-items: center; gap: 0.5rem; }
.ovl-header-actions { display: flex; align-items: center; gap: 0.5rem; position: relative; z-index: 3; }
.ovl-close { background: transparent; border: none; color: #64748b; font-size: var(--fs-md); cursor: pointer; padding: 0.2rem 0.35rem; border-radius: 5px; line-height: 1; transition: color 0.12s, background 0.12s; }
.ovl-close:hover { color: #e2e8f0; background: rgba(255,255,255,0.06); }
.lang-pill { display: flex; border: 1px solid #2d3748; border-radius: 6px; overflow: hidden; flex-shrink: 0; }
.lang-pill button { background: transparent; border: none; color: #64748b; font-size: var(--fs-xs); font-weight: 600; letter-spacing: 0.05em; padding: 0.2rem 0.55rem; cursor: pointer; transition: all 0.12s; }
.lang-pill button.active { background: #1e3a5f; color: #63b3ed; }
.lang-pill button:hover:not(.active) { background: rgba(255,255,255,0.04); color: #e2e8f0; }
#help-body { display: flex; flex: 1; overflow: hidden; }
#help-toc { width: 230px; min-width: 170px; flex-shrink: 0; border-right: 1px solid #1e2736; overflow-y: auto; padding: 0.5rem 0; background: #0e1117; }
#help-toc-filter { width: calc(100% - 1.2rem); margin: 0 0.6rem 0.4rem; background: #1a202c; color: #e2e8f0; border: 1px solid #2d3748; border-radius: 5px; padding: 0.35rem 0.5rem; font-size: var(--fs-sm); outline: none; }
#help-toc-filter:focus { border-color: #4a5568; }
#help-toc-filter::placeholder { color: #4a5568; }
.toc-item { display: block; padding: 0.42rem 0.9rem; color: #94a3b8; font-size: var(--fs-sm); cursor: pointer; border-left: 3px solid transparent; transition: all 0.1s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.toc-item:hover { background: #1a2030; color: #e2e8f0; }
.toc-item.active { border-left-color: #63b3ed; color: #63b3ed; background: rgba(99,179,237,0.07); font-weight: 600; }
#help-content { flex: 1; overflow-y: auto; padding: 1.5rem 1.8rem; line-height: 1.7; color: #cbd5e0; font-size: var(--fs-base); }
#help-content h1 { font-size: var(--fs-xl); color: #e2e8f0; margin: 0 0 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #1e2736; }
#help-content h2 { font-size: var(--fs-lg); color: #e2e8f0; margin: 1.5rem 0 0.5rem; }
#help-content h3 { font-size: var(--fs-md); color: #cbd5e0; margin: 1.1rem 0 0.35rem; }
#help-content p  { margin: 0.5rem 0; }
#help-content a  { color: #63b3ed; text-decoration: none; }
#help-content a:hover { text-decoration: underline; }
#help-content strong { color: #e2e8f0; }
#help-content code { background: #1a202c; color: #f6ad55; padding: 0.1em 0.35em; border-radius: 3px; font-size: var(--fs-xs); font-family: 'Fira Code','Consolas',monospace; }
#help-content pre { background: #0e1117; border: 1px solid #2d3748; border-radius: 6px; padding: 0.9rem 1rem; overflow-x: auto; margin: 0.75rem 0; }
#help-content pre code { background: none; padding: 0; color: #a0aec0; font-size: var(--fs-sm); }
#help-content ul, #help-content ol { padding-left: 1.5rem; margin: 0.5rem 0; }
#help-content li { margin: 0.2rem 0; }
#help-content blockquote { border-left: 3px solid #63b3ed; margin: 0.75rem 0; padding: 0.4rem 0.9rem; background: rgba(99,179,237,0.05); border-radius: 0 5px 5px 0; color: #94a3b8; }
#help-content table { border-collapse: collapse; width: 100%; margin: 0.75rem 0; }
#help-content th, #help-content td { border: 1px solid #2d3748; padding: 0.4rem 0.7rem; text-align: left; font-size: var(--fs-sm); }
#help-content th { background: #1a202c; color: #e2e8f0; font-weight: 600; }
#help-content hr { border: none; border-top: 1px solid #1e2736; margin: 1rem 0; }
#help-content img { max-width: 100%; border-radius: 6px; margin: 0.5rem 0; }
.help-loading { color: #4a5568; font-style: italic; padding: 2rem; text-align: center; }
#help-search-wrap { display: flex; align-items: center; gap: 3px; }
#help-search { background: #1a202c; color: #e2e8f0; border: 1px solid #2d3748; border-radius: 5px; padding: 0.28rem 0.5rem; font-size: var(--fs-sm); outline: none; width: 170px; }
#help-search:focus { border-color: #4a5568; }
#help-search::placeholder { color: #4a5568; }
.help-snav-btn { background: #1a202c; border: 1px solid #2d3748; border-radius: 3px; color: #94a3b8; cursor: pointer; font-size: var(--fs-xs); padding: 2px 5px; line-height: 1.4; }
.help-snav-btn:hover { color: #e2e8f0; border-color: #4a5568; }
#help-search-count { font-size: var(--fs-xs); color: #64748b; white-space: nowrap; min-width: 44px; }
#help-content mark { background: rgba(255,200,0,0.2); color: #fcd34d; border-radius: 2px; }
#help-content mark.current { background: rgba(251,146,60,0.45); color: #fef08a; outline: 1px solid #f59e0b; }
#help-search-global-lbl { display:flex; align-items:center; gap:3px; color:#94a3b8; font-size: var(--fs-xs); cursor:pointer; white-space:nowrap; user-select:none; }
#help-search-global-lbl input[type=checkbox] { accent-color:#4da6ff; cursor:pointer; margin:0; }
.gs-results { display:flex; flex-direction:column; gap:8px; padding:4px 0; }
.gs-item { background:#1a202c; border:1px solid #2d3748; border-radius:6px; padding:10px 14px; cursor:pointer; transition:border-color 0.15s; }
.gs-item:hover { border-color:#4a5568; }
.gs-topic { color:#93c5fd; font-weight:600; font-size: var(--fs-sm); margin-bottom:5px; }
.gs-snip { color:#94a3b8; font-size: var(--fs-xs); line-height:1.55; overflow:hidden; text-overflow:ellipsis; }
</style>
</head>
<body>

<nav id="topnav"></nav>

<!-- Help overlay -->
<div id="help-ovl">
  <div class="ovl-panel">
    <div id="help-drag-handle"></div>
    <div class="ovl-header">
      <div class="ovl-header-title">&#128218; Guide &amp; Help</div>
      <div class="ovl-header-actions">
        <div id="help-search-wrap">
          <input id="help-search" type="text" placeholder="Search in topic&#x2026;" autocomplete="off">
          <button class="help-snav-btn" id="help-search-up" title="Previous match (Shift+Enter)">&#9650;</button>
          <button class="help-snav-btn" id="help-search-dn" title="Next match (Enter)">&#9660;</button>
          <span id="help-search-count"></span>
          <label id="help-search-global-lbl" title="Search across all topics"><input type="checkbox" id="help-search-global"> All</label>
        </div>
        <div style="width:1px;height:16px;background:#2d3748;flex-shrink:0;"></div>
        <div class="lang-pill">
          <button id="help-lang-en" class="active">EN</button>
          <button id="help-lang-de">DE</button>
        </div>
        <button class="ovl-close" id="help-close">&#x2715;</button>
      </div>
    </div>
    <div id="help-body">
      <div id="help-toc">
        <input id="help-toc-filter" type="text" placeholder="Filter topics&#x2026;" autocomplete="off">
        <div id="help-toc-list"></div>
      </div>
      <div id="help-content"><div class="help-loading">Select a topic from the left.</div></div>
    </div>
  </div>
</div>
<div id="conn-banner" class="conn-waiting">Connecting…</div>

<div id="page-body">
  <!-- ── Sidebar ─────────────────────── -->
  <div id="sidebar">
    <div id="sidebar-inner">
      <!-- Section nav -->
      <button class="sb-section active" data-panel="configs" onclick="selectPanel('configs')">
        <span class="sb-icon">📋</span> Configs
      </button>
      <button class="sb-section" data-panel="queue" onclick="selectPanel('queue')">
        <span class="sb-icon">⏳</span> Queue <span id="queue-count-badge" style="margin-left:auto;font-size:var(--fs-xs);color:var(--text-dim)"></span>
      </button>
      <button class="sb-section" data-panel="results" onclick="selectPanel('results')">
        <span class="sb-icon">📊</span> Results
      </button>
      <button class="sb-section" data-panel="archive" onclick="selectPanel('archive')">
        <span class="sb-icon">🗄️</span> Archive
      </button>

      <!-- Context actions (dynamic) -->
      <hr class="sb-sep">
      <div id="ctx-configs" class="ctx-actions">
        <button class="sb-btn accent" onclick="newConfig()">+ New Config</button>
        <button class="sb-btn danger" onclick="deleteSelectedConfigs()">🗑 Delete Selected</button>
      </div>
      <div id="ctx-queue" class="ctx-actions" style="display:none">
        <button class="sb-btn" onclick="clearFinished()">✓ Clear Finished</button>
        <button class="sb-btn danger" onclick="stopAllQueue()">⬛ Stop All</button>
        <button class="sb-btn danger" onclick="deleteSelectedQueue()">🗑 Delete Selected</button>
        <hr class="sb-sep">
        <button class="sb-btn" onclick="openSettingsModal()">⚙ Settings</button>
      </div>
      <div id="ctx-results" class="ctx-actions" style="display:none">
        <button class="sb-btn" onclick="rebacktestSelected()">🔄 Backtest</button>
        <button class="sb-btn" onclick="addToRun()">▶ Add to Run</button>
        <button class="sb-btn" onclick="compareSelected()">📈 Compare</button>
        <button class="sb-btn" onclick="strategyExplorerFromResult()">🔍 Strategy Explorer</button>
        <button class="sb-btn" onclick="goBalanceCalculatorFromResult()">💰 Balance Calculator</button>
        <button class="sb-btn" onclick="calcBalanceFromResult()">⚡ Calc Balance</button>
        <button class="sb-btn" onclick="optimizeFromResult()">🧬 Optimize from Result</button>
        <button class="sb-btn" onclick="addResultToArchive()">🗄 Add to Archive</button>
        <button class="sb-btn danger" onclick="deleteSelectedResults()">🗑 Delete Selected</button>
      </div>
      <div id="ctx-archive" class="ctx-actions" style="display:none">
        <button class="sb-btn" onclick="pullAllArchives()">⬇ Pull All</button>
        <button class="sb-btn" onclick="pushArchive()">⬆ Git Push</button>
        <button class="sb-btn accent" onclick="addArchive()">+ Add Archive</button>
        <button class="sb-btn" onclick="setupArchive()">⚙ Setup</button>
        <button class="sb-btn" onclick="showArchiveLog()">📋 Log</button>
      </div>
      <div id="ctx-archive-results" style="display:none">
        <button class="sb-btn" onclick="closeArchiveResults()">🏠 Archives</button>
        <button class="sb-btn" onclick="rebacktestSelectedArchive()">🔄 Backtest</button>
        <button class="sb-btn" onclick="addToRunFromArchive()">▶ Add to Run</button>
        <button class="sb-btn" onclick="compareSelectedArchive()">📈 Compare</button>
        <button class="sb-btn danger" onclick="deleteSelectedArchiveResults()">🗑 Delete Selected</button>
      </div>

    </div>
    <!-- Editor sidebar — structure mirrors v7_edit sidebar exactly -->
    <div id="sidebar-editor" class="sidebar-sticky" style="display:none">
      <div class="sidebar-header">
        <span class="sb-title">EDIT BACKTEST</span>
      </div>
      <div class="sidebar-toolbar">
        <button class="sb-btn" onclick="closeEditor()" title="Back to configs list">🏠 Home</button>
        <button class="sb-btn primary" onclick="saveEditor()" title="Save config">💾 Save</button>
        <button class="sb-btn info" onclick="saveAndQueue()" title="Save and add to queue">▶ Save &amp; Queue</button>
        <button class="sb-btn" onclick="importConfig()" title="Import JSON config">📥 Import</button>
        <hr class="sb-sep">
        <button class="sb-btn" id="sb-btn-results" onclick="goEditorResults()" title="Jump to results for this config" disabled>📊 Results</button>
        <button class="sb-btn" id="sb-btn-add-to-run" onclick="addConfigToRunByName(editingConfig)" title="Open this config in Run V7 editor" disabled>▶ Add to Run</button>
        <button class="sb-btn" onclick="goStrategyExplorer()" title="Open Strategy Explorer">🔍 Strategy Explorer</button>
        <button class="sb-btn" onclick="goBalanceCalc()" title="Open Balance Calculator">💰 Balance Calculator</button>
        <button class="sb-btn" onclick="goCalcBalance()" title="Calculate balance">⚡ Calc Balance</button>
        <hr class="sb-sep">
        <button class="sb-btn" onclick="openLogPanel()" title="Open log viewer">📋 Log</button>
        <hr class="sb-sep">
        <button class="sb-btn" onclick="cfgApplyFilters()" title="Apply market cap &amp; tag filters to approved/ignored coins">🔎 Apply Filters</button>
      </div>
    </div>
    <div id="sidebar-resize"></div>
  </div>

  <!-- ── Main Content ────────────────── -->
  <div id="main-content">

    <!-- CONFIGS panel -->
    <div id="panel-configs" class="view-panel active">
      <div id="configs-toolbar" style="display:flex;gap:var(--sp-sm);align-items:center;margin-bottom:var(--sp-sm)">
        <input type="text" id="configs-filter" class="sb-input" style="max-width:240px" placeholder="Search name…" oninput="renderConfigs()">
        <span style="flex:1"></span>
        <button class="act-btn" onclick="selectAllConfigs()" title="Select all visible rows">Select All</button>
        <button class="act-btn" onclick="deselectAllConfigs()" title="Deselect all">Deselect</button>
      </div>
      <div id="configs-list"></div>
      <div id="configs-editor" style="display:none"></div>
    </div>

    <!-- QUEUE panel -->
    <div id="panel-queue" class="view-panel">
      <div id="queue-toolbar" style="display:flex;gap:var(--sp-sm);align-items:center;margin-bottom:var(--sp-sm)">
        <span style="flex:1"></span>
        <button class="act-btn" onclick="selectAllQueue()" title="Select all visible rows">Select All</button>
        <button class="act-btn" onclick="deselectAllQueue()" title="Deselect all">Deselect</button>
      </div>
      <div id="queue-list"></div>
    </div>

    <!-- RESULTS panel -->
    <div id="panel-results" class="view-panel">
      <!-- Sticky top area: toolbar + table stay visible while charts scroll -->
      <div id="results-fixed-top" style="background:var(--bg);padding-bottom:var(--sp-sm);border-bottom:2px solid var(--border);box-shadow:0 4px 12px rgba(0,0,0,.6);margin-bottom:var(--sp-md)">
        <div id="results-toolbar" style="display:flex;gap:var(--sp-sm);align-items:center;margin-bottom:var(--sp-md);flex-wrap:wrap;padding-top:var(--sp-sm)">
          <label style="font-size:var(--fs-sm);color:var(--text-dim)">Config:</label>
          <select id="results-config-filter" class="sb-input" style="max-width:200px" onchange="renderResults()">
            <option value="">All configs</option>
          </select>
          <input type="text" id="results-filter" class="sb-input" style="max-width:200px" placeholder="Search name…" oninput="renderResults()">
          <span style="flex:1"></span>
          <button class="act-btn" onclick="selectAllResults()" title="Select all visible rows">Select All</button>
          <button class="act-btn" onclick="deselectAllResults()" title="Deselect all">Deselect</button>
          <button id="results-pin-btn" class="act-btn" onclick="toggleResultsSticky()" title="Pin table (sticky on/off)" style="font-size:15px;padding:0 6px">📌</button>
        </div>
        <div id="results-list-wrap" style="height:25vh;min-height:80px;overflow-y:auto;border:1px solid var(--border);border-radius:4px;position:relative">
          <div id="results-list"></div>
        </div>
        <div id="results-resize-handle" title="Drag to resize list"
             style="height:6px;cursor:row-resize;background:var(--border);border-radius:0 0 4px 4px;margin-bottom:0;display:flex;align-items:center;justify-content:center;user-select:none">
          <span style="width:32px;height:2px;background:var(--text-dim);border-radius:2px;opacity:.5"></span>
        </div>
      </div>
      <div id="results-scroll-area">
        <!-- Compare chart appears directly after the table -->
        <div id="compare-chart-area" style="display:none"></div>
        <!-- Icon-triggered charts below -->
        <div id="results-charts" style="display:none"></div>
      </div>
    </div>

    <!-- ARCHIVE panel -->
    <div id="panel-archive" class="view-panel">
      <div id="archive-list-view">
        <div id="archive-list-container"></div>
      </div>
      <div id="archive-results-view" style="display:none">
        <!-- Sticky top area: toolbar + table -->

<script src="/app/js/editor_shared.js?v=4"></script>
<script>
/* ════════════════════════════════════════════════
   GLOBALS (injected by server)
   ════════════════════════════════════════════════ */
var TOKEN         = "%%TOKEN%%";
var API_BASE      = "%%API_BASE%%";
var WS_BASE       = "%%WS_BASE%%";
var ST_BASE       = "%%ST_BASE%%";
var PBGUI_VERSION = "%%VERSION%%";
var PBGUI_SERIAL  = "%%SERIAL%%";

/* ════════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════════ */
var configs     = [];          // saved backtest configs
var queueItems  = [];          // queue items from WS
var _lastQueueHash = '';       // JSON hash of last queue state (skip re-render if unchanged)
var results     = [];          // backtest results
var archives    = [];          // git archives
var archiveResults = [];       // results in selected archive
var compareSet  = [];          // paths of results to compare
var settings    = { autostart: false, cpu: 1, cpu_max: 1, hlcvs_cleanup_enabled: false, hlcvs_cleanup_days: 7, hlcvs_cleanup_interval_h: 24 };
var currentPanel = 'configs';
var _pendingResultFilter = '';  /* config name to pre-filter when next loadResults runs */
var sortCol     = 'modified';  // current sort column
var sortAsc     = false;       // sort direction
var editingConfig = null;      // name of config being edited, or null
var _extraBtKeys  = [];        // unknown backtest keys found when loading a config
var _rawEditorSyncing = false;
var _rawEditorLastApplied = '';
var _cfgBotParamStatus = { long: {}, short: {} };
var ws = null;
var _scheduleRawJsonEditorSync = window.PBGuiEditorShared.createDebouncedRunner(applyRawJsonEditorSync, 250);
var _scheduleStructuredEditorSync = window.PBGuiEditorShared.createDebouncedRunner(applyStructuredEditorSync, 150);

/* Set of backtest keys explicitly handled by the GUI editor.
   Any key in cfg.backtest NOT in this set will be auto-rendered
   in the "Additional Parameters" expander. */
var KNOWN_BT_PARAMS = new Set([
  'start_date', 'end_date', 'starting_balance', 'balance_sample_divider',
  'exchanges', 'btc_collateral_cap', 'btc_collateral_ltv_cap',
  'maker_fee_override', 'taker_fee_override', 'market_order_slippage_pct',
  'filter_by_min_effective_cost', 'liquidation_threshold', 'dynamic_wel_by_tradability',
  'max_warmup_minutes', 'ohlcv_source_dir', 'candle_interval_minutes',
  'gap_tolerance_ohlcvs_minutes', 'compress_cache', 'volume_normalization',
  'coin_sources', 'market_settings_sources', 'suite_enabled', 'scenarios', 'aggregate'
]);

/* Per-key metadata for fields in the Additional Parameters expander.
   tip: shown as hover tooltip on the label.
   fmt: static format hint shown below the input field. */
var EXTRA_BT_META = {
  'base_dir': {
    tip: 'Location to save backtest results.\nLeave empty to use the default path (backtests/pbgui/{config-name}).',
    fmt: 'e.g. "backtests/my_custom_dir"  —  leave empty for default'
  },
  'visible_metrics': {
    tip: 'Controls which metrics are printed to the terminal after a standalone backtest.\nnull = metrics implied by optimize.scoring / optimize.limits\n[] = all metrics\n[\'adg\', \'sharpe_ratio\'] = specific metrics added to the default view\nAffects CLI output only; full metrics are always computed and saved.',
    fmt: "null  |  []  |  ['adg', 'sharpe_ratio', ...]"
  }
};
var wsReconnectTimer = null;
var wsReconnectDelay = 1000;

/* ════════════════════════════════════════════════
   API HELPERS
   ════════════════════════════════════════════════ */
function apiFetch(path, opts) {
  opts = opts || {};
  var url = API_BASE + path;
  opts.headers = Object.assign({ 'Authorization': 'Bearer ' + TOKEN }, opts.headers || {});
  return fetch(url, opts).then(function(r) {
    if (!r.ok) return r.json().then(function(e) { throw new Error(e.detail || r.statusText); });
    return r.json();
  });
}

/* ── Notification log ── */
/* (handled globally by pbgui_nav.js floating panel) */

function toast(msg, type) {
  type = type || 'info';
  /* ── write to server log (fire-and-forget) ── */
  fetch('/api/notify_log', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
    body: JSON.stringify({ msg: msg, level: type })
  }).catch(function() {});
  var el = document.createElement('div');
  el.className = 'toast-msg toast-' + type;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(function() { el.remove(); }, 4000);
}

/* ════════════════════════════════════════════════
   CONNECTION BANNER
   ════════════════════════════════════════════════ */
function setBanner(state) {
  var b = document.getElementById('conn-banner');
  b.className = 'conn-' + state;
  if (state === 'ok') b.textContent = 'Connected';
  else if (state === 'lost') b.textContent = 'Connection lost — reconnecting…';
  else b.textContent = 'Connecting…';
}

/* ════════════════════════════════════════════════
   WEBSOCKET
   ════════════════════════════════════════════════ */
function connectWS() {
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
  var url = WS_BASE + '/api/backtest-v7/ws/bt7?token=' + encodeURIComponent(TOKEN);
  ws = new WebSocket(url);
  ws.onopen = function() { wsReconnectDelay = 1000; setBanner('ok'); };
  ws.onmessage = function(ev) {
    try {
      var msg = JSON.parse(ev.data);
      if (msg.type === 'queue_update') {
        var newItems = msg.items || [];
        var newHash = JSON.stringify(newItems);
        var changed = (newHash !== _lastQueueHash);
        // Detect newly completed jobs → refresh configs result counts
        if (changed) {
          var prevRunning = {};
          queueItems.forEach(function(q) {
            if (q.status === 'running' || q.status === 'backtesting') prevRunning[q.filename] = true;
          });
          var justCompleted = newItems.some(function(q) {
            return q.status === 'complete' && prevRunning[q.filename];
          });
          if (justCompleted) loadConfigs();
        }
        _lastQueueHash = newHash;
        queueItems = newItems;
        if (msg.settings) {
          settings.autostart = msg.settings.autostart === 'True' || msg.settings.autostart === true;
          settings.cpu = parseInt(msg.settings.cpu) || 1;
          settings.hlcvs_cleanup_enabled = msg.settings.hlcvs_cleanup_enabled === 'True' || msg.settings.hlcvs_cleanup_enabled === true;
          settings.hlcvs_cleanup_days = parseInt(msg.settings.hlcvs_cleanup_days) || 7;
          settings.hlcvs_cleanup_interval_h = parseInt(msg.settings.hlcvs_cleanup_interval_h) || 24;
        }
        if (changed) {
          renderQueue();
          updateQueueBadge();
        }
      } else if (msg.type === 'archive_update') {
        // inotify detected a change in the local archives directory
        if (currentPanel === 'archive') {
          if (selectedArchiveName) loadArchiveResults();
          else loadArchives();
        } else {
          // invalidate cache so next visit fetches fresh
          archives = [];
        }
      }
    } catch(e) { /* ignore parse errors */ }
  };
  ws.onclose = function() { setBanner('lost'); scheduleReconnect(); };
  ws.onerror = function() { setBanner('lost'); };
}

function scheduleReconnect() {
  if (wsReconnectTimer) return;
  wsReconnectTimer = setTimeout(function() {
    wsReconnectTimer = null;
    connectWS();
    wsReconnectDelay = Math.min(wsReconnectDelay * 2, 30000);
  }, wsReconnectDelay);
}

function wsRefresh() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'refresh' }));
  }
}

/* ════════════════════════════════════════════════
   NAVIGATION
   ════════════════════════════════════════════════ */
function selectPanel(id) {
  window.PBGuiEditorShared.clearFixedValidationStatus();
  /* If leaving archive while results are open, hide archive-results sidebar */
  if (id !== 'archive') {
    document.getElementById('ctx-archive-results').style.display = 'none';
  }
  currentPanel = id;
  document.querySelectorAll('.sb-section').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-panel') === id);
  });
  document.querySelectorAll('.view-panel').forEach(function(p) {
    p.classList.toggle('active', p.id === 'panel-' + id);
  });
  document.querySelectorAll('.ctx-actions').forEach(function(c) {
    c.style.display = c.id === 'ctx-' + id ? '' : 'none';
  });
  history.replaceState(null, '', '#' + id);
  // Lazy-load data when switching panels
  if (id === 'configs') {
    if (configs.length === 0) loadConfigs(); else renderConfigs();
  }
  if (id === 'results') { if (results.length === 0) loadResults(); else renderResults(); }
  if (id === 'archive' && archives.length === 0) loadArchives();
  /* If returning to archive while results view is still open, restore DOM and
     fetch fresh results (viewArchive is guarded by currentPanel === 'archive'). */
  if (id === 'archive' && selectedArchiveName) {
    viewArchive(selectedArchiveName);
  }
}

/* ════════════════════════════════════════════════
   SETTINGS
   ════════════════════════════════════════════════ */
function loadSettings() {
  apiFetch('/settings').then(function(d) {
    settings = d;
  }).catch(function() {});
}

function openSettingsModal() {
  var cpuMax = settings.cpu_max || 16;
  var cpu = settings.cpu || 1;
  var autostart = settings.autostart || false;
  var cleanupEnabled = settings.hlcvs_cleanup_enabled || false;
  var cleanupDays = settings.hlcvs_cleanup_days || 7;
  var cleanupInterval = settings.hlcvs_cleanup_interval_h || 24;

  var body = '' +
    '\x3Cdiv style="display:flex;flex-direction:column;gap:var(--sp-md);min-width:320px">' +
      '\x3Cdiv class="sb-label">Backtest CPU Slots\x3C/div>' +
      '\x3Cdiv class="sb-stepper">' +
        '\x3Cspan class="sb-stepper-label">CPU\x3C/span>' +
        '\x3Cbutton onclick="settingsAdjustCpu(-1)">−\x3C/button>' +
        '\x3Cinput type="text" id="set-cpu-val" value="' + cpu + '" readonly>' +
        '\x3Cbutton onclick="settingsAdjustCpu(1)">+\x3C/button>' +
        '\x3Cspan style="color:var(--text-dim);font-size:var(--fs-xs);margin-left:var(--sp-sm)">max ' + cpuMax + '\x3C/span>' +
      '\x3C/div>' +
      '\x3Clabel class="sb-toggle">' +
        '\x3Cinput type="checkbox" id="set-autostart"' + (autostart ? ' checked' : '') + '>' +
        '\x3Cspan>Autostart\x3C/span>' +
      '\x3C/label>' +
      '\x3Chr class="sb-sep">' +
      '\x3Cdiv class="sb-label">HLCVS Cache Cleanup\x3C/div>' +
      '\x3Clabel class="sb-toggle">' +
        '\x3Cinput type="checkbox" id="set-cleanup-enabled"' + (cleanupEnabled ? ' checked' : '') + ' onchange="settingsToggleCleanup()">' +
        '\x3Cspan>Enabled\x3C/span>' +
      '\x3C/label>' +
      '\x3Cdiv id="cleanup-opts" style="' + (cleanupEnabled ? '' : 'opacity:0.4;pointer-events:none;') + '">' +
        '\x3Cdiv style="display:flex;gap:var(--sp-md);align-items:center">' +
          '\x3Cdiv style="flex:1">' +
            '\x3Cdiv class="sb-label">Retention (days)\x3C/div>' +
            '\x3Cinput type="number" id="set-cleanup-days" class="sb-input" min="1" max="365" value="' + cleanupDays + '" style="width:80px">' +
          '\x3C/div>' +
          '\x3Cdiv style="flex:1">' +
            '\x3Cdiv class="sb-label">Check interval (h)\x3C/div>' +
            '\x3Cinput type="number" id="set-cleanup-interval" class="sb-input" min="1" max="168" value="' + cleanupInterval + '" style="width:80px">' +
          '\x3C/div>' +
        '\x3C/div>' +
      '\x3C/div>' +
      '\x3Cdiv style="margin-top:var(--sp-sm)">' +
        '\x3Cbutton class="modal-btn" id="clean-now-btn" onclick="cleanHlcvsNow()" style="font-size:var(--fs-sm)">🧹 Clean Now\x3C/button>' +
      '\x3C/div>' +
    '\x3C/div>';

  showModal('Settings', body, [
    { text: 'Cancel' },
    { text: 'Save', cls: 'modal-btn-primary', action: saveSettingsFromModal }
  ]);
}

function settingsAdjustCpu(delta) {
  var el = document.getElementById('set-cpu-val');
  var v = parseInt(el.value, 10) + delta;
  var mx = settings.cpu_max || 16;
  if (v < 1) v = 1;
  if (v > mx) v = mx;
  el.value = v;
}

function settingsToggleCleanup() {
  var enabled = document.getElementById('set-cleanup-enabled').checked;
  var opts = document.getElementById('cleanup-opts');
  opts.style.opacity = enabled ? '' : '0.4';
  opts.style.pointerEvents = enabled ? '' : 'none';
}

function saveSettingsFromModal() {
  var cpu = parseInt(document.getElementById('set-cpu-val').value, 10);
  var autostart = document.getElementById('set-autostart').checked;
  var cleanupEnabled = document.getElementById('set-cleanup-enabled').checked;
  var cleanupDays = parseInt(document.getElementById('set-cleanup-days').value, 10) || 7;
  var cleanupInterval = parseInt(document.getElementById('set-cleanup-interval').value, 10) || 24;

  settings.cpu = cpu;
  settings.autostart = autostart;
  settings.hlcvs_cleanup_enabled = cleanupEnabled;
  settings.hlcvs_cleanup_days = cleanupDays;
  settings.hlcvs_cleanup_interval_h = cleanupInterval;

  apiFetch('/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      cpu: cpu,
      autostart: autostart,
      hlcvs_cleanup_enabled: cleanupEnabled,
      hlcvs_cleanup_days: cleanupDays,
      hlcvs_cleanup_interval_h: cleanupInterval
    })
  }).then(function() {
    toast('Settings saved', 'ok');
    closeModal();
  }).catch(function(e) {
    toast('Failed: ' + e.message, 'err');
  });
}

function cleanHlcvsNow() {
  var days = parseInt(document.getElementById('set-cleanup-days').value, 10) || 7;
  var btn = document.getElementById('clean-now-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Cleaning\u2026'; }
  apiFetch('/settings/hlcvs-cleanup-now', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ days: days })
  }).then(function(d) {
    toast('Cleaned ' + (d.removed || 0) + ' dirs (' + (d.freed_mb || 0) + ' MB freed)', 'ok');
    if (btn) { btn.disabled = false; btn.textContent = '\ud83e\uddf9 Clean Now'; }
  }).catch(function(e) {
    toast('Cleanup failed: ' + e.message, 'err');
    if (btn) { btn.disabled = false; btn.textContent = '\ud83e\uddf9 Clean Now'; }
  });
}

/* ════════════════════════════════════════════════
   CONFIGS VIEW
   ════════════════════════════════════════════════ */
function loadConfigs() {
  apiFetch('/configs').then(function(d) {
    configs = d.configs || [];
    renderConfigs();
  }).catch(function(e) { toast('Load configs failed: ' + e.message, 'err'); });
}

function renderConfigs() {
  var el = document.getElementById('configs-list');
  if (editingConfig !== null) { el.style.display = 'none'; return; }
  el.style.display = '';
  document.getElementById('configs-editor').style.display = 'none';
  // Focus search input whenever the configs list is rendered (panel switch or data load)
  if (currentPanel === 'configs') {
    var cf = document.getElementById('configs-filter');
    if (cf) cf.focus();
  }

  var filter = ((document.getElementById('configs-filter') || {}).value || '').trim().toLowerCase();

  if (!configs.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div>No saved configs yet.<br>Click <b>+ New Config</b> to create one.</div>';
    return;
  }
  var sorted = configs.slice().sort(sortFn);
  if (filter) sorted = sorted.filter(function(c) { return (c.name || '').toLowerCase().indexOf(filter) >= 0; });
  if (!sorted.length) {
    el.innerHTML = '<div class="empty-state">No configs match your search.</div>';
    return;
  }
  var html = '<table class="tbl"><thead><tr>' +
    thSort('Name', 'name') + thSort('Exchange', 'exchanges') + thSort('Coins', 'coins') +
    thSort('TWE L/S', 'twe_long') + thSort('Start', 'start_date') + thSort('End', 'end_date') +
    thSort('Results', 'results') + thSort('Modified', 'modified') +
    '<th>Actions</th></tr></thead><tbody>';

  sorted.forEach(function(c) {
    html += '<tr data-name="' + esc(c.name) + '">' +
      '<td title="' + esc(c.name) + '">' + esc(c.name) + '</td>' +
      '<td>' + esc(Array.isArray(c.exchanges) ? c.exchanges.join(', ') : c.exchanges) + '</td>' +
      '<td>' + c.coins + '</td>' +
      '<td>' + fmt(c.twe_long, 2) + ' / ' + fmt(c.twe_short, 2) + '</td>' +
      '<td>' + esc(c.start_date || '—') + '</td>' +
      '<td>' + esc(c.end_date || '—') + '</td>' +
      '<td class="results-count-cell" onclick="event.stopPropagation();viewConfigResults(\'' + esc(c.name) + '\')" title="Open results" style="cursor:pointer;color:' + (c.results ? '#63b3ed' : '#64748b') + ';font-weight:' + (c.results ? '600' : 'normal') + '">' + c.results + '</td>' +
      '<td>' + fmtDate(c.modified) + '</td>' +
      '<td class="actions-cell">' +
        '<button class="act-btn" onclick="editConfig(\'' + esc(c.name) + '\')" title="Edit">✏️</button> ' +
        '<button class="act-btn" onclick="addConfigToQueue(\'' + esc(c.name) + '\')" title="Add to Queue">▶</button> ' +
        '<button class="act-btn" onclick="event.stopPropagation();viewConfigResults(\'' + esc(c.name) + '\')" title="View Results">📊</button>' +
      '</td></tr>';
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

function thSort(label, key) {
  var arrow = sortCol === key ? (sortAsc ? ' ▲' : ' ▼') : '';
  return '<th onclick="setSort(\'' + key + '\')">' + label + '<span class="sort-arrow">' + arrow + '</span></th>';
}

function setSort(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  renderConfigs();
}

function sortFn(a, b) {
  var va = a[sortCol], vb = b[sortCol];
  if (va === undefined) va = '';
  if (vb === undefined) vb = '';
  if (typeof va === 'string') va = va.toLowerCase();
  if (typeof vb === 'string') vb = vb.toLowerCase();
  if (Array.isArray(va)) va = va.join(',');
  if (Array.isArray(vb)) vb = vb.join(',');
  if (va < vb) return sortAsc ? -1 : 1;
  if (va > vb) return sortAsc ? 1 : -1;
  return 0;
}

function editConfig(name) {
  apiFetch('/configs/' + encodeURIComponent(name)).then(function(data) {
    editingConfig = data && data.name ? data.name : name;
    showConfigEditor(editingConfig, (data && data.config) || {}, null, (data && data.param_status) || {});
  }).catch(function(e) { toast('Load failed: ' + e.message, 'err'); });
}

function showEditorSidebar() {
  // Enable Results button only if results exist for this config
  var btn = document.getElementById('sb-btn-results');
  var btnRun = document.getElementById('sb-btn-add-to-run');
  var isExisting = editingConfig && editingConfig !== '__new__';
  if (btnRun) btnRun.disabled = !isExisting;
  if (btn) {
    var hasResults = editingConfig && editingConfig !== '__new__' &&
      results.some(function(r) { return r.config_name === editingConfig; });
    btn.disabled = !hasResults;
    // If results not loaded yet, fetch them and re-check
    if (!hasResults && results.length === 0 && editingConfig && editingConfig !== '__new__') {
      apiFetch('/results').then(function(d) {
        results = d.results || [];
        var found = results.some(function(r) { return r.config_name === editingConfig; });
        if (btn) btn.disabled = !found;
      }).catch(function() {});
    }
  }
  document.getElementById('sidebar-inner').style.display = 'none';
  document.getElementById('sidebar-editor').style.display = '';
}

function hideEditorSidebar() {
  document.getElementById('sidebar-editor').style.display = 'none';
  document.getElementById('sidebar-inner').style.display = '';
}

function goEditorResults() {
  var name = editingConfig || '';
  closeEditor();

function goStrategyExplorer() {
  window.location.href = ST_BASE + '/?target=V7_STRATEGY_EXPLORER&token=' + TOKEN;
}

function getConfigDefaultExchange(cfg) {
  var exchanges = (cfg && cfg.backtest && Array.isArray(cfg.backtest.exchanges)) ? cfg.backtest.exchanges : [];
  var exchange = exchanges.length ? exchanges[0] : 'binance';
  return String(exchange || 'binance').toLowerCase();
}

function openBalanceCalculatorWithConfig(cfg, defaultExchange) {
  return window.PBGuiEditorShared.openBalanceCalcPage({
    apiBase: API_BASE,
    token: TOKEN,
    stBase: ST_BASE,
    config: cfg,
    exchange: defaultExchange || 'binance',
  });
}

async function goBalanceCalc() {
  if (!ensureRawJsonValidForSave()) return;
  if (!ensureStructuredJsonFieldsValidForSave()) return;
  try {
    var cfg = collectConfig();
    await openBalanceCalculatorWithConfig(cfg, getConfigDefaultExchange(cfg));
  } catch (e) {
    toast('Failed to open Balance Calculator: ' + e.message, 'err');
  }
}

function goCalcBalance() {
  if (!ensureRawJsonValidForSave()) return;
  if (!ensureStructuredJsonFieldsValidForSave()) return;
  try {
    var cfg = collectConfig();
    _showBalanceCalcModal(cfg, getConfigDefaultExchange(cfg));
  } catch (e) {
    toast('Failed to prepare config: ' + e.message, 'err');
  }
}

function openLogPanel() {
  document.getElementById('log-panel').classList.add('visible');
}

async function newConfig() {
  editingConfig = '__new__';
  var tmpl = {};
  var tmplParamStatus = {};
  try {
    var data = await apiFetch('/configs/new-config');
    if (data && data.config) tmpl = data.config;
    if (data && data.param_status) tmplParamStatus = data.param_status;
  } catch(e) {
    console.warn('newConfig: failed to fetch template, using empty defaults', e);
  }
  showConfigEditor('', tmpl, null, tmplParamStatus);
}

function buildExtraBtExpanderHtml(bt) {
  var extraBtKeys = Object.keys(bt || {}).filter(function(k) { return !KNOWN_BT_PARAMS.has(k); }).sort();
  var html = '';

  if (extraBtKeys.length > 0) {
    html += '<div class="expander" id="exp-extra-bt">' +
      '<div class="expander-header" onclick="toggleExpander(\'exp-extra-bt\')">' +
        '<span class="arrow">▶</span> Additional Parameters' +
        '<span style="margin-left:auto;font-size:var(--fs-xs);color:var(--text-dim)">Parameters not yet in the GUI — edit and they will be preserved on save</span>' +
      '</div>' +
      '<div class="expander-body">' +
        '<div class="form-row cols-3">';
    extraBtKeys.forEach(function(k) {
      var v = bt[k];
      var t = typeof v;
      var meta = EXTRA_BT_META[k] || {};
      var lbl = meta.tip ? '<span data-tip="' + esc(meta.tip) + '">' + esc(k) + '</span>' : esc(k);
      var hint = meta.fmt ? '<div style="font-size:var(--fs-xs);color:var(--text-dim);margin-top:2px">' + esc(meta.fmt) + '</div>' : '';
      var fld = '';
      if (t === 'boolean') {
        fld = '<div class="form-group"><label>' + lbl + '</label>' +
          '<div class="chk-row"><input type="checkbox" id="extra-bt-' + esc(k) + '" data-extra-bt-type="boolean"' + (v ? ' checked' : '') + '></div>' + hint + '</div>';
      } else if (t === 'number') {
        fld = '<div class="form-group"><label>' + lbl + '</label>' +
          '<input type="number" id="extra-bt-' + esc(k) + '" data-extra-bt-type="number" class="form-input" value="' + esc(String(v)) + '">' + hint + '</div>';
      } else if (t === 'object' || Array.isArray(v)) {
        fld = '<div class="form-group" style="grid-column:span 3"><label>' + lbl + '</label>' +
          '<textarea id="extra-bt-' + esc(k) + '" data-extra-bt-type="json" style="overflow:hidden;resize:vertical" oninput="autoResizeTa(this)">' + esc(JSON.stringify(v, null, 2)) + '</textarea>' +
          '<div id="extra-bt-' + esc(k) + '-status" class="field-status field-status-inline" aria-live="polite"></div>' + hint + '</div>';
      } else {
        fld = '<div class="form-group"><label>' + lbl + '</label>' +
          '<input type="text" id="extra-bt-' + esc(k) + '" data-extra-bt-type="' + (v === null ? 'null' : 'string') + '" class="form-input" value="' + esc(v === null ? '' : String(v)) + '" placeholder="' + (v === null ? 'null' : '') + '">' + hint + '</div>';
      }
      html += fld;
    });
    html +=     '</div>' +
      '</div>' +
    '</div>';
  }

  return { html: html, keys: extraBtKeys };
}

function formatJsonParseMessage(message) {
  if (!message) return 'Invalid JSON';
  return String(message)
    .replace(/\s+at position \d+(?:\s+\(line \d+ column \d+\))?/i, '')
    .replace(/^JSON\.parse:\s*/i, '')
    .trim();
}

function getJsonErrorLocation(raw, error) {
  var message = error && error.message ? error.message : String(error || '');
  var lineColMatch = message.match(/line\s+(\d+)\s+column\s+(\d+)/i);
  if (lineColMatch) {
    return {
      line: parseInt(lineColMatch[1], 10),
      column: parseInt(lineColMatch[2], 10),
    };
  }
  var posMatch = message.match(/position\s+(\d+)/i);
  if (!posMatch) return { line: null, column: null };
  var pos = parseInt(posMatch[1], 10);
  if (!Number.isFinite(pos) || pos < 0) return { line: null, column: null };
  var line = 1;
  var column = 1;
  var limit = Math.min(pos, raw.length);
  for (var i = 0; i < limit; i++) {
    if (raw.charCodeAt(i) === 10) {
      line += 1;
      column = 1;
    } else {
      column += 1;
    }
  }
  return { line: line, column: column };
}

function getLineColumnFromJsonPos(raw, pos) {
  if (!Number.isFinite(pos) || pos < 0) return { line: null, column: null };
  var line = 1;
  var column = 1;
  var limit = Math.min(pos, raw.length);
  for (var i = 0; i < limit; i++) {
    if (raw.charCodeAt(i) === 10) {
      line += 1;
      column = 1;
    } else {
      column += 1;
    }
  }
  return { line: line, column: column };
}

function findJsonSyntaxError(raw) {
  var text = typeof raw === 'string' ? raw : '';
  var idx = 0;
  var len = text.length;

  function fail(pos, message) {
    throw { pos: pos, message: message };
  }

  function skipWhitespace() {
    while (idx < len) {
      var ch = text.charCodeAt(idx);
      if (ch === 9 || ch === 10 || ch === 13 || ch === 32) idx += 1;
      else break;
    }
  }

  function parseValue() {
    skipWhitespace();
    if (idx >= len) fail(idx, 'Unexpected end of JSON');
    var ch = text[idx];
    if (ch === '{') return parseObject();
    if (ch === '[') return parseArray();
    if (ch === '"') return parseString();
    if (ch === '-' || (ch >= '0' && ch <= '9')) return parseNumber();
    if (text.slice(idx, idx + 4) === 'true') { idx += 4; return; }
    if (text.slice(idx, idx + 5) === 'false') { idx += 5; return; }
    if (text.slice(idx, idx + 4) === 'null') { idx += 4; return; }
    fail(idx, 'Unexpected token');
  }

  function parseString() {
    idx += 1;
    while (idx < len) {
      var ch = text[idx];
      if (ch === '"') {
        idx += 1;
        return;
      }
      if (ch === '\\') {
        idx += 1;
        if (idx >= len) fail(idx, 'Unterminated escape sequence in string');
        var esc = text[idx];
        if ('"\\/bfnrt'.indexOf(esc) >= 0) {
          idx += 1;
          continue;
        }
        if (esc === 'u') {
          idx += 1;
          for (var i = 0; i < 4; i++) {
            var code = text[idx + i];
            if (!code || !/[0-9a-fA-F]/.test(code)) fail(idx + i, 'Invalid Unicode escape in string');
          }
          idx += 4;
          continue;
        }
        fail(idx, 'Invalid escape sequence in string');
      }
      if (ch === '\n' || ch === '\r') fail(idx, 'Unterminated string literal');
      idx += 1;
    }
    fail(idx, 'Unterminated string literal');
  }

  function parseNumber() {
    if (text[idx] === '-') idx += 1;
    if (idx >= len) fail(idx, 'Invalid number');
    if (text[idx] === '0') {
      idx += 1;
    } else if (text[idx] >= '1' && text[idx] <= '9') {
      while (idx < len && text[idx] >= '0' && text[idx] <= '9') idx += 1;
    } else {
      fail(idx, 'Invalid number');
    }
    if (text[idx] === '.') {
      idx += 1;
      if (idx >= len || text[idx] < '0' || text[idx] > '9') fail(idx, 'Invalid number');
      while (idx < len && text[idx] >= '0' && text[idx] <= '9') idx += 1;
    }
    if (text[idx] === 'e' || text[idx] === 'E') {
      idx += 1;
      if (text[idx] === '+' || text[idx] === '-') idx += 1;
      if (idx >= len || text[idx] < '0' || text[idx] > '9') fail(idx, 'Invalid number exponent');
      while (idx < len && text[idx] >= '0' && text[idx] <= '9') idx += 1;
    }
  }

  function parseArray() {
    idx += 1;
    skipWhitespace();
    if (idx >= len) fail(idx, 'Unterminated array');
    if (text[idx] === ']') {
      idx += 1;
      return;
    }
    while (idx < len) {
      parseValue();
      skipWhitespace();
      if (idx >= len) fail(idx, 'Unterminated array');
      if (text[idx] === ',') {
        idx += 1;
        skipWhitespace();
        if (idx >= len) fail(idx, 'Unexpected end of JSON after array comma');
        if (text[idx] === ']') fail(idx, 'Expected value after array comma');
        continue;
      }
      if (text[idx] === ']') {
        idx += 1;
        return;
      }
      fail(idx, 'Expected comma or closing bracket after array element');
    }
    fail(idx, 'Unterminated array');
  }

  function parseObject() {
    idx += 1;
    skipWhitespace();
    if (idx >= len) fail(idx, 'Unterminated object');
    if (text[idx] === '}') {
      idx += 1;
      return;
    }
    while (idx < len) {
      skipWhitespace();
      if (text[idx] !== '"') fail(idx, 'Expected double-quoted property name in JSON');
      parseString();
      skipWhitespace();
      if (idx >= len || text[idx] !== ':') fail(idx, 'Expected colon after property name');
      idx += 1;
      parseValue();
      skipWhitespace();
      if (idx >= len) fail(idx, 'Unterminated object');
      if (text[idx] === ',') {
        idx += 1;
        skipWhitespace();
        if (idx >= len) fail(idx, 'Unexpected end of JSON after object comma');
        if (text[idx] === '}') fail(idx, 'Expected property name after object comma');
        continue;
      }
      if (text[idx] === '}') {
        idx += 1;
        return;
      }
      fail(idx, 'Expected comma or closing brace after property value');
    }
    fail(idx, 'Unterminated object');
  }

  try {
    skipWhitespace();
    parseValue();
    skipWhitespace();
    if (idx < len) fail(idx, 'Unexpected token after end of JSON');
    return null;
  } catch (error) {
    return error && Number.isFinite(error.pos) ? error : null;
  }
}

function getJsonLineDetail(raw, line, column) {
  if (!raw || !line || line < 1) return null;
  var lines = raw.split('\n');
  if (line > lines.length) return null;
  var lineText = lines[line - 1].replace(/\r$/, '');
  var safeColumn = Math.max(1, Math.min(column || 1, lineText.length + 1));
  var lineStart = 0;
  for (var i = 0; i < line - 1; i++) lineStart += lines[i].length + 1;
  var lineEnd = lineStart + lineText.length;
  return {
    lineText: lineText,
    lineStart: lineStart,
    lineEnd: lineEnd,
    selectionStart: Math.max(lineStart, Math.min(lineEnd, lineStart + safeColumn - 1)),
    selectionEnd: lineEnd,
    column: safeColumn,
    line: line,
  };
}

function syncRawJsonHighlightOverlay(error, detail) {
  var rawEl = document.getElementById('cfg-raw-json');
  var overlay = ensureRawJsonHighlightOverlay(rawEl);
  if (!rawEl || !overlay) return;
  if (!error || !detail || !detail.line) {
    overlay.innerHTML = '';
    overlay.style.display = 'none';
    return;
  }
  var errorLine = detail.line;
  overlay.innerHTML = (rawEl.value || '').split('\n').map(function(line, index) {
    var lineEsc = esc(line);
    if (!lineEsc) lineEsc = '&nbsp;';
    var style = 'display:block';
    if (index + 1 === errorLine) {
      style += ';background:rgba(255,75,75,0.16);box-shadow:inset 3px 0 0 rgba(255,75,75,0.95);border-radius:2px';
    }
    return '<span style="' + style + '">' + lineEsc + '</span>';
  }).join('');
  overlay.style.display = 'block';
}

function revealRawJsonError() {
  var rawEl = document.getElementById('cfg-raw-json');
  var statusEl = document.getElementById('cfg-raw-json-status');
  if (!rawEl || !statusEl) return;
  var line = parseInt(statusEl.dataset.errorLine || '', 10);
  var selectionStart = parseInt(statusEl.dataset.selectionStart || '', 10);
  var selectionEnd = parseInt(statusEl.dataset.selectionEnd || '', 10);
  rawEl.focus();
  if (Number.isFinite(selectionStart) && Number.isFinite(selectionEnd)) {
    try {
      rawEl.setSelectionRange(selectionStart, selectionEnd);
    } catch (e) {}
  }
  if (!Number.isFinite(line) || line < 1) return;
  var style = window.getComputedStyle(rawEl);
  var lineHeight = parseFloat(style.lineHeight) || 20;
  var paddingTop = parseFloat(style.paddingTop) || 0;
  var targetTop = window.scrollY + rawEl.getBoundingClientRect().top + paddingTop + Math.max(0, line - 2) * lineHeight - 120;
  window.scrollTo({ top: Math.max(0, targetTop), behavior: 'smooth' });
}

function setRawJsonValidationError(error) {
  var rawEl = document.getElementById('cfg-raw-json');
  var statusEl = document.getElementById('cfg-raw-json-status');
  if (rawEl) rawEl.classList.toggle('json-invalid', !!error);
  if (!statusEl) return;
  if (!error) {
    statusEl.innerHTML = '';
    statusEl.className = 'field-status';
    delete statusEl.dataset.errorLine;
    delete statusEl.dataset.selectionStart;
    delete statusEl.dataset.selectionEnd;
    window.PBGuiEditorShared.clearFixedValidationStatus('cfg-raw-json');
    syncRawJsonHighlightOverlay(null, null);
    return;
  }
  var summary = 'Raw JSON is invalid';
  if (error.line != null && error.column != null) {
    summary += ' at line ' + error.line + ', column ' + error.column;
  }
  var detail = rawEl ? getJsonLineDetail(rawEl.value || '', error.line, error.column) : null;
  if (detail) {
    statusEl.dataset.errorLine = String(detail.line);
    statusEl.dataset.selectionStart = String(detail.selectionStart);
    statusEl.dataset.selectionEnd = String(detail.selectionEnd);
  } else {
    delete statusEl.dataset.errorLine;
    delete statusEl.dataset.selectionStart;
    delete statusEl.dataset.selectionEnd;
  }
  statusEl.innerHTML = '';
  statusEl.className = 'field-status';
  window.PBGuiEditorShared.setFixedValidationStatus('cfg-raw-json', {
    summary: summary,
    message: error.message || '',
    actionLabel: detail ? 'Reveal line in editor' : '',
    action: detail ? revealRawJsonError : null,
  });
  syncRawJsonHighlightOverlay(error, detail);
}

function validateRawJson(raw) {
  return validateJsonText(raw, {
    expectObject: true,
    emptyMessage: 'Config cannot be empty'
  });
}

function validateJsonText(raw, opts) {
  opts = opts || {};
  var text = typeof raw === 'string' ? raw : '';
  if (!text.trim()) {
    return {
      parsed: null,
      error: { line: 1, column: 1, message: opts.emptyMessage || 'JSON cannot be empty' }
    };
  }
  try {
    var parsed = JSON.parse(text);
    if (opts.expectObject && (!parsed || typeof parsed !== 'object' || Array.isArray(parsed))) {
      return {
        parsed: null,
        error: { line: null, column: null, message: 'Top-level JSON value must be an object' }
      };
    }
    return { parsed: parsed, error: null };
  } catch (error) {
    var location = getJsonErrorLocation(text, error);
    var fallbackError = (!location.line || !location.column) ? findJsonSyntaxError(text) : null;
    if (fallbackError) {
      var fallbackLocation = getLineColumnFromJsonPos(text, fallbackError.pos);
      location = {
        line: fallbackLocation.line,
        column: fallbackLocation.column,
      };
    }
    return {
      parsed: null,
      error: {
        line: location.line,
        column: location.column,
        message: fallbackError && fallbackError.message
          ? fallbackError.message
          : formatJsonParseMessage(error && error.message ? error.message : error),
      }
    };
  }
}
