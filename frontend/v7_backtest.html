function renderPnlChart(cd, csv) {
  var rows = csv.rows;
  if (!rows.length) {
    document.getElementById(cd.id).innerHTML = '<div style="color:var(--text-dim);padding:var(--sp-md)">No fills data</div>';
    return;
  }

  /* Detect time column: time → timestamp → minute */
  var headers = csv.headers.map(function(h) { return h.trim(); });
  var coinCol = headers.indexOf('coin') >= 0 ? 'coin' : 'symbol';
  var pnlCol = 'pnl';

  /* Resolve timestamps like Streamlit load_fills() */
  var r = cd.result;
  var times = resolveFilsTimes(rows, headers, r);

  /* Group PnL by coin, cumulative */
  var coins = {};
  rows.forEach(function(row, i) {
    var coin = row[coinCol] || 'unknown';
    if (!coins[coin]) coins[coin] = { times: [], pnl: [], cumPnl: 0 };
    coins[coin].cumPnl += parseFloat(row[pnlCol]) || 0;
    coins[coin].times.push(times[i]);
    coins[coin].pnl.push(coins[coin].cumPnl);
  });

  var traces = [];
  Object.keys(coins).forEach(function(coin) {
    traces.push({
      x: coins[coin].times, y: coins[coin].pnl,
      name: coin, mode: 'lines'
    });
  });

  var name = r.config_name;
  var timeStr = fmtDate(r.modified);
  var layout = _chartLayout(name + ' ' + timeStr, 'PnL');
  Plotly.newPlot(cd.id, traces, layout, _plotlyConf());
}

/* resolveFilsTimes — mirrors Streamlit load_fills() column priority:
   1. time  (already a datetime string)
   2. minute (offset from end_date, same as Streamlit)
   3. timestamp (numeric ms/s  OR  datetime string like "2020-01-05 21:33:00")
*/
function resolveFilsTimes(rows, headers, result) {
  var times = [];

  if (headers.indexOf('time') >= 0) {
    /* Already datetime strings */
    rows.forEach(function(r) { times.push(r['time']); });
    return times;
  }

  if (headers.indexOf('minute') >= 0) {
    /* Same as Streamlit: start_time = end_date_ts - max_minute * 60 */
    var endDate = result.end_date || '';
    var endTs = endDate ? new Date(endDate).getTime() : Date.now();
    var maxMin = 0;
    rows.forEach(function(r) { var m = parseFloat(r['minute']) || 0; if (m > maxMin) maxMin = m; });
    var startTs = endTs - (maxMin * 60000);
    rows.forEach(function(r) {
      var m = parseFloat(r['minute']) || 0;
      times.push(new Date(startTs + m * 60000).toISOString());
    });
    return times;
  }

  if (headers.indexOf('timestamp') >= 0) {
    /* Numeric (ms if > 1e11, else seconds) OR datetime string — same as Streamlit */
    var firstVal = (rows[0] || {})['timestamp'] || '';
    var firstNum = parseFloat(firstVal);
    var isNumeric = !isNaN(firstNum);
    rows.forEach(function(r) {
      var raw = r['timestamp'] || '';
      if (isNumeric) {
        var n = parseFloat(raw) || 0;
        var ms = n > 1e11 ? n : n * 1000;
        times.push(new Date(ms).toISOString());
      } else {
        /* datetime string like "2020-01-05 21:33:00" — replace space with T for ISO parse */
        times.push(new Date(raw.replace(' ', 'T')).toISOString());
      }
    });
    return times;
  }

  /* Fallback: row index */
  rows.forEach(function(r, i) { times.push(i); });
  return times;
}

function renderTWEChart(cd, csv, resolution) {
  var rows = csv.rows;
  if (!rows.length) {
    document.getElementById(cd.id).innerHTML = '\x3Cdiv style="color:var(--text-dim);padding:var(--sp-md)">No fills data\x3C/div>';
    return;
  }

  var headers = csv.headers.map(function(h) { return h.trim(); });
  var coinCol = headers.indexOf('coin') >= 0 ? 'coin' : 'symbol';
  var balCol = headers.indexOf('balance') >= 0 ? 'balance' : 'usd_total_balance';
  var hasType = headers.indexOf('type') >= 0;
  var r = cd.result;

  /* Resolve timestamps */
  var times = resolveFilsTimes(rows, headers, r);

  /* Compute WE = (1/balance) * psize * pprice for each fill row */
  /* Separate long/short fills, then build per-coin time series */
  var longFills = []; /* { time, coin, we } */
  var shortFills = [];

  rows.forEach(function(row, i) {
    var bal = parseFloat(row[balCol]) || 0;
    if (bal === 0) return;
    var psize = parseFloat(row['psize']) || 0;
    var pprice = parseFloat(row['pprice']) || 0;
    var we = (1 / bal) * psize * pprice;
    var coin = row[coinCol] || 'unknown';
    var t = times[i];
    var type = hasType ? (row['type'] || '') : '';

    if (type.indexOf('short') >= 0) {
      shortFills.push({ time: t, coin: coin, we: we });
    } else {
      longFills.push({ time: t, coin: coin, we: we });
    }
  });

  /* Build pivot-like structure: for each coin, last WE at each time, forward-filled */
  function buildExposure(fills) {
    /* Collect all unique coins and times */
    var coinSet = {};
    fills.forEach(function(f) { coinSet[f.coin] = true; });
    var coins = Object.keys(coinSet).sort();
    if (!coins.length) return { times: [], twe: [], coins: {} };

    /* For each coin, build sparse time→we map */
    var coinData = {};
    coins.forEach(function(c) { coinData[c] = {}; });
    fills.forEach(function(f) { coinData[f.coin][f.time] = f.we; });

    /* Collect all unique times, sorted */
    var allTimesSet = {};
    fills.forEach(function(f) { allTimesSet[f.time] = true; });
    var allTimes = Object.keys(allTimesSet).sort();

    /* Forward-fill: for each time, each coin gets its last known WE */
    var lastWE = {};
    coins.forEach(function(c) { lastWE[c] = 0; });
    var timeline = []; /* { time, coinWE: {coin: we}, twe: number } */

    allTimes.forEach(function(t) {
      coins.forEach(function(c) {
        if (coinData[c][t] !== undefined) lastWE[c] = coinData[c][t];
      });
      var totalWE = 0;
      var cwe = {};
      coins.forEach(function(c) {
        cwe[c] = lastWE[c];
        totalWE += lastWE[c];
      });
      timeline.push({ time: t, coinWE: cwe, twe: totalWE });
    });

    /* Resample: group by resolution-minute buckets, take max TWE entry per bucket */
    var resMs = resolution * 60000;
    var buckets = {};
    timeline.forEach(function(entry) {
      var ts = new Date(entry.time).getTime();
      if (isNaN(ts)) return;
      var bucketKey = Math.floor(ts / resMs) * resMs;
      if (!buckets[bucketKey] || entry.twe > buckets[bucketKey].twe) {
        buckets[bucketKey] = entry;
      }
    });

    /* Create COMPLETE time grid from minBucket to maxBucket, forward-fill empty slots.
       Mirrors Streamlit: resample(...).max().ffill().fillna(0) */
    var allTs = timeline.map(function(e) { return new Date(e.time).getTime(); }).filter(function(t) { return !isNaN(t); });
    if (!allTs.length) return { times: [], twe: [], coins: {} };
    var minBk = Math.floor(Math.min.apply(null, allTs) / resMs) * resMs;
    var maxBk = Math.floor(Math.max.apply(null, allTs) / resMs) * resMs;

    var outTimes = [];
    var outTWE = [];
    var outCoins = {};
    coins.forEach(function(c) { outCoins[c] = []; });

    var lastEntry = null;
    for (var bk = minBk; bk <= maxBk; bk += resMs) {
      if (buckets[bk]) lastEntry = buckets[bk];
      if (!lastEntry) continue; /* no data yet, skip (fillna(0) equivalent: skip leading zeros) */
      outTimes.push(new Date(bk).toISOString());
      outTWE.push(lastEntry.twe);
      coins.forEach(function(c) { outCoins[c].push(lastEntry.coinWE[c] || 0); });
    }

    return { times: outTimes, twe: outTWE, coins: outCoins };
  }

  var longExp = buildExposure(longFills);
  var shortExp = buildExposure(shortFills);

  /* Build Plotly traces */
  var traces = [];

  if (longExp.twe.length) {
    traces.push({ x: longExp.times, y: longExp.twe, name: 'Long TWE', line: { width: 2.5 } });
  }
  if (shortExp.twe.length) {
    traces.push({ x: shortExp.times, y: shortExp.twe, name: 'Short TWE', line: { width: 2.5 } });
  }

  /* Per-coin traces */
  Object.keys(longExp.coins).forEach(function(coin) {
    traces.push({ x: longExp.times, y: longExp.coins[coin], name: coin + ' Long WE', line: { width: 0.75 }, visible: 'legendonly' });
  });
  Object.keys(shortExp.coins).forEach(function(coin) {
    traces.push({ x: shortExp.times, y: shortExp.coins[coin], name: coin + ' Short WE', line: { width: 0.75 }, visible: 'legendonly' });
  });

  var name = r.config_name;
  var timeStr = fmtDate(r.modified);
  var layout = _chartLayout(name + ' ' + timeStr + ' - Wallet Exposure', 'Exposure');
  /* Move title below the (horizontal) legend to avoid overlap */
  layout.margin.t = 80;
  layout.title.y = 0.97;
  layout.title.yanchor = 'top';
  layout.legend = { orientation: 'h', y: 1.0, yanchor: 'bottom' };
  Plotly.newPlot(cd.id, traces, layout, _plotlyConf());
}

}

function compareSelected() {
  var compareEl = document.getElementById('compare-chart-area');

  /* Toggle: second click hides the compare plot */
  if (compareEl.style.display !== 'none' && compareEl.innerHTML !== '') {
    compareEl.style.display = 'none';
    compareEl.innerHTML = '';
    return;
  }

  var sel = getSelectedResults();
  if (sel.length < 2) { toast('Select at least 2 results to compare', 'err'); return; }

  compareEl.style.display = '';
  compareEl.innerHTML = '\x3Cdiv style="text-align:center;padding:var(--sp-lg);color:var(--text-dim)">Loading equity data for comparison\u2026\x3C/div>';

  var promises = sel.map(function(path) {
    if (_beCache[path]) return Promise.resolve({ path: path, be: _beCache[path] });
    return fetchCSV(path, 'equity').then(function(csv) {
      /* Find matching result for end_date */
      var r = results.find(function(rr) { return rr.path === path; }) || {};
      var be = normalizeBE(csv, r);
      _beCache[path] = be;
      return { path: path, be: be };
    }).catch(function() { return { path: path, be: { time: [], equity: [], balance: [] } }; });
  });

  Promise.all(promises).then(function(allData) {
    var traces = [];
    var colors = ['#4da6ff', '#21c354', '#ff8c00', '#ff4b4b', '#b366ff', '#ffcc00', '#00cccc', '#ff66b2'];
    allData.forEach(function(item, i) {
      if (!item.be.time.length) return;
      var label = item.path.split('/').slice(-3).join('/');
      traces.push({ x: item.be.time, y: item.be.equity, name: 'eq ' + label, line: { width: 0.75, color: colors[i % colors.length] } });
      traces.push({ x: item.be.time, y: item.be.balance, name: 'bal ' + label, line: { width: 2.5, color: colors[i % colors.length], dash: 'dot' } });
    });
    var layout = _chartLayout('Compare', 'Balance');
    compareEl.innerHTML = chartWrap('compare-chart-div');
    Plotly.newPlot('compare-chart-div', traces, layout, _plotlyConf());
  });
}

function rebacktestSelected() {
  var sel = getSelectedResults();
  if (!sel.length) { toast('Nothing selected', 'err'); return; }

  if (sel.length === 1) {
    /* Single: open config editor with the result's config pre-loaded */
    apiFetch('/results/config?path=' + encodeURIComponent(sel[0])).then(function(cfg) {
      var name = sel[0].split('/').slice(-3, -2)[0] || 'rebacktest';
      editingConfig = name;
      selectPanel('configs');
      showConfigEditor(name, cfg);
    }).catch(function(e) { toast('Failed to load config: ' + e.message, 'err'); });
    return;
  }

  /* Multiple: show parameter popup then queue all */
  var today = new Date().toISOString().slice(0, 10);
  var allExchanges = ['binance', 'bybit', 'bitget', 'okx', 'hyperliquid', 'combined'];

  /* Collect default exchanges from first result */
  apiFetch('/results/config?path=' + encodeURIComponent(sel[0])).then(function(cfg) {
    var defExchanges = (cfg.backtest && cfg.backtest.exchanges) || ['bybit'];
    var defStart = (cfg.backtest && cfg.backtest.start_date) || '2020-01-01';
    var defBalance = (cfg.backtest && cfg.backtest.starting_balance) || 1000;

    var exOpts = allExchanges.map(function(e) {
      return '<option value="' + e + '"' + (defExchanges.indexOf(e) >= 0 ? ' selected' : '') + '>' + e + '</option>';
    }).join('');

    var body =
      '<div style="display:flex;flex-direction:column;gap:var(--sp-md);height:100%;min-width:0">' +
        '<div style="flex-shrink:0"><div class="sb-label">start_date</div>' +
          '<input id="rbt-start" class="sb-input" style="width:100%" value="' + esc(defStart) + '"></div>' +
        '<div style="flex-shrink:0"><div class="sb-label">end_date</div>' +
          '<input id="rbt-end" class="sb-input" style="width:100%" value="' + esc(today) + '"></div>' +
        '<div style="flex-shrink:0"><div class="sb-label">Starting Balance</div>' +
          '<div style="display:flex;align-items:center;gap:var(--sp-xs)">' +
            '<input id="rbt-balance" class="sb-input" style="flex:1;text-align:right" type="number" min="1" step="100" value="' + defBalance + '">' +
            '<button class="act-btn" style="width:28px;padding:0" onclick="document.getElementById(\'rbt-balance\').value=Math.max(1,parseFloat(document.getElementById(\'rbt-balance\').value)-100)">−</button>' +
            '<button class="act-btn" style="width:28px;padding:0" onclick="document.getElementById(\'rbt-balance\').value=parseFloat(document.getElementById(\'rbt-balance\').value)+100">+</button>' +
          '</div></div>' +
        '<div style="flex:1;display:flex;flex-direction:column;min-height:60px"><div class="sb-label">Exchanges</div>' +
          '<select id="rbt-exchanges" class="sb-input" multiple style="flex:1;height:auto;min-height:var(--input-h)">' + exOpts + '</select></div>' +
      '</div>';

    showModal('Select backtest parameters', body, [
      { text: 'OK', cls: 'modal-btn-primary', action: function() {
        var start = document.getElementById('rbt-start').value.trim();
        var end = document.getElementById('rbt-end').value.trim();
        var balance = parseFloat(document.getElementById('rbt-balance').value) || 1000;
        var exSel = document.getElementById('rbt-exchanges');
        var exchanges = [];
        for (var i = 0; i < exSel.options.length; i++) {
          if (exSel.options[i].selected) exchanges.push(exSel.options[i].value);
        }
        if (!exchanges.length) { toast('Select at least one exchange', 'err'); return; }
        closeModal();
        var promises = sel.map(function(path) {
          return apiFetch('/results/config?path=' + encodeURIComponent(path)).then(function(cfg) {
            if (!cfg.backtest) cfg.backtest = {};
            cfg.backtest.start_date = start;
            cfg.backtest.end_date = end;
            cfg.backtest.starting_balance = balance;
            cfg.backtest.exchanges = exchanges;
            var name = path.split('/').slice(-3, -2)[0] || 'rebacktest';
            return apiFetch('/queue', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name: name, config: cfg })
            });
          });
        });
        Promise.all(promises)
          .then(function() { toast('Queued ' + sel.length + ' backtests', 'ok'); wsRefresh(); })
          .catch(function(e) { toast('Failed: ' + e.message, 'err'); });
      }},
      { text: 'Cancel', cls: '' }
    ]);
  }).catch(function(e) { toast('Failed to load config: ' + e.message, 'err'); });
}

function addToRun() {
  var sel = getSelectedResults();
  if (sel.length !== 1) { toast('Select exactly 1 result', 'err'); return; }
  var v7Base = API_BASE.replace('/backtest-v7', '/v7');

  function navigateWithConfig(cfg, finalUser) {
    var cfgToSend = JSON.parse(JSON.stringify(cfg));
    cfgToSend.live = cfgToSend.live || {};
    cfgToSend.live.user = finalUser;
    return fetch(v7Base + '/draft', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify({ config: cfgToSend })
    }).then(function(r) { return r.json(); }).then(function(d) {
      var editUrl = v7Base + '/edit_page?token=' + encodeURIComponent(TOKEN) +
        '&new=1&draft_id=' + encodeURIComponent(d.draft_id) + '&st_base=' + encodeURIComponent(ST_BASE);
      window.location.href = editUrl;
    });
  }

  Promise.all([
    apiFetch('/results/config?path=' + encodeURIComponent(sel[0])),
    fetch(v7Base + '/instances', { headers: { 'Authorization': 'Bearer ' + TOKEN } }).then(function(r) { return r.json(); }),
    fetch(v7Base + '/users',     { headers: { 'Authorization': 'Bearer ' + TOKEN } }).then(function(r) { return r.json(); })
  ]).then(function(res) {
    var cfg       = res[0];
    var instances = res[1].instances || [];
    var users     = res[2].users     || [];
    var configUser = (cfg.live || {}).user || '';

    /* Build map: userName → instanceName for already-used users */
    var usedBy = {};
    instances.forEach(function(inst) { if (inst.user) usedBy[inst.user] = inst.name; });

    if (configUser && usedBy[configUser]) {
      /* ── Show conflict modal ── */
      var userOptions = '<option value=""></option>' +
        users.map(function(u) {
          var isUsed = !!usedBy[u.name];
          var label = esc(u.name);
          if (isUsed) label += ' ⚠ (instance: ' + esc(usedBy[u.name]) + ')';
          var color = isUsed ? ' style="color:#e07800"' : '';
          return '<option value="' + esc(u.name) + '"' + (u.name === configUser ? ' selected' : '') + color + '>' + label + '</option>';
        }).join('');

      var bodyHtml =
        '<p style="color:var(--warn);margin:0 0 12px">⚠ User <strong>' + esc(configUser) + '</strong> ' +
        'already has an active instance: <em>' + esc(usedBy[configUser]) + '</em></p>' +
        '<div class="sb-label">Select user for new instance</div>' +
        '<select id="add-to-run-user-sel" class="sb-input" style="width:100%">' + userOptions + '</select>';

      showModal('Add to Run — User Conflict', bodyHtml, [
        { text: 'Cancel', cls: '' },
        { text: 'Continue', cls: 'modal-btn-primary', action: function() {
          var selEl = document.getElementById('add-to-run-user-sel');
          var chosen = selEl ? selEl.value : configUser;
          closeModal();
          navigateWithConfig(cfg, chosen).catch(function(e) { toast('Failed: ' + e.message, 'err'); });
        }}
      ]);
    } else {
      navigateWithConfig(cfg, configUser).catch(function(e) { toast('Failed: ' + e.message, 'err'); });
    }
  }).catch(function(e) { toast('Failed: ' + e.message, 'err'); });
}

function closeAllSectionsForPaths(paths) {
  var pathSet = {};
  paths.forEach(function(p) { pathSet[p] = true; });
  document.querySelectorAll('#results-list .tbl tbody tr').forEach(function(tr) {
    if (!pathSet[tr.dataset.path]) return;
    var idx = tr.dataset.idx;
    ['view-section-', 'plot-section-', 'fills-section-', 'analysis-wrap-', 'config-wrap-'].forEach(function(prefix) {
      var el = document.getElementById(prefix + idx);
      if (el) el.remove();
    });
    tr.querySelectorAll('.icon-btn').forEach(function(btn) { btn.classList.remove('active'); });
  });
}

function deleteSelectedResults() {
  var sel = getSelectedResults();
  if (!sel.length) { toast('Nothing selected', 'err'); return; }
  showModal('Delete Results', '<p>Delete ' + sel.length + ' result(s)? This cannot be undone.</p>', [
    { text: 'Cancel', cls: '' },
    { text: 'Delete', cls: 'modal-btn-danger', action: function() {
      var promises = sel.map(function(p) {
        return apiFetch('/results?path=' + encodeURIComponent(p), { method: 'DELETE' });
      });
      Promise.all(promises).then(function() {
        closeAllSectionsForPaths(sel);
        toast('Deleted', 'ok'); loadResults(); closeModal();
      }).catch(function(e) { toast('Delete failed: ' + e.message, 'err'); });
    }}
  ]);
}

function renderArchiveSelector() {

  var current = sel.value;
  var html = '<option value="">Select archive…</option>';
  archives.forEach(function(a) {
    html += '<option value="' + esc(a.name) + '"' + (a.name === current ? ' selected' : '') + '>' +

function loadArchiveResults() {
  var name = document.getElementById('archive-select').value;
  if (!name) { document.getElementById('archive-results').innerHTML = ''; return; }
  apiFetch('/archives/' + encodeURIComponent(name) + '/results').then(function(d) {
    archiveResults = d.results || [];
    renderArchiveResults();
  }).catch(function(e) { toast('Load failed: ' + e.message, 'err'); });

function renderArchiveResults() {
  var el = document.getElementById('archive-results');
  if (!archiveResults.length) {
    el.innerHTML = '<div class="empty-state">No results in this archive.</div>';
    return;
  }
  var html = '<table class="tbl"><thead><tr>' +
    '<th>Config</th><th>Result</th><th>ADG</th><th>Gain</th><th>Exchange</th><th>Modified</th>' +
    '</tr></thead><tbody>';
  archiveResults.forEach(function(r) {
    html += '<tr>' +
      '<td>' + esc(r.config_name) + '</td>' +
      '<td>' + esc(r.result_name) + '</td>' +
      '<td class="' + (r.adg >= 0 ? 'positive' : 'negative') + '">' + pct(r.adg) + '</td>' +
      '<td class="' + (r.gain >= 0 ? 'positive' : 'negative') + '">' + pct(r.gain) + '</td>' +
      '<td>' + esc(Array.isArray(r.exchanges) ? r.exchanges.join(', ') : '') + '</td>' +
      '<td>' + fmtDate(r.modified) + '</td>' +
      '</tr>';
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

/* ════════════════════════════════════════════════
   MODAL
   ════════════════════════════════════════════════ */
function makeDraggable(el, handle) {
  var startX, startY, startL, startT;
  handle.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    var rect = el.getBoundingClientRect();
    startX = e.clientX; startY = e.clientY;
    startL = rect.left;  startT = rect.top;
    el.style.margin   = '0';
    el.style.position = 'fixed';
    el.style.left     = startL + 'px';
    el.style.top      = startT + 'px';
    function onMove(e) {
      el.style.left = (startL + e.clientX - startX) + 'px';
      el.style.top  = (startT + e.clientY - startY) + 'px';
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
    e.preventDefault();
  });
}

function showModal(title, bodyHtml, buttons) {
  var root = document.getElementById('modal-root');
  var box  = document.getElementById('modal-box');
  box.style.left = ''; box.style.top = ''; box.style.position = ''; box.style.margin = '';
  var html = '<div class="modal-header">' +
             '<span class="modal-title">' + esc(title) + '</span>' +
             '<button class="modal-close" id="modal-close-btn" title="Close">✕</button>' +
             '</div><div class="modal-body">' + bodyHtml + '</div><div class="modal-actions">';
  buttons.forEach(function(b, i) {
    html += '<button class="modal-btn ' + (b.cls || '') + '" id="modal-btn-' + i + '">' + esc(b.text) + '</button>';
  });
  html += '</div>';
  box.innerHTML = html;
  root.classList.add('open');
  document.getElementById('modal-close-btn').onclick = closeModal;
  buttons.forEach(function(b, i) {
    document.getElementById('modal-btn-' + i).onclick = b.action || closeModal;
  });
  makeDraggable(box, box.querySelector('.modal-header'));
}

function closeModal() {
  document.getElementById('modal-root').classList.remove('open');
}

/* ════════════════════════════════════════════════
   FORMATTING HELPERS
   ════════════════════════════════════════════════ */
function esc(s) {
  if (s === null || s === undefined) return '';
  var d = document.createElement('div'); d.textContent = String(s); return d.innerHTML;
}
function fmt(v, decimals) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return Number(v).toFixed(decimals);
}
function pct(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return (Number(v) * 100).toFixed(2) + '%';
}
function fmtDate(iso) {
  if (!iso) return '—';
  try { var d = new Date(iso); return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
  catch(e) { return iso; }
}

/* ════════════════════════════════════════════════
   RESULTS LIST — resize handle
   ════════════════════════════════════════════════ */
(function() {
  var handle = document.getElementById('results-resize-handle');
  var wrap = document.getElementById('results-list-wrap');
  if (!handle || !wrap) return;
  var dragging = false, startY = 0, startH = 0;
  handle.addEventListener('mousedown', function(e) {
    dragging = true;
    startY = e.clientY;
    startH = wrap.offsetHeight;
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var newH = Math.max(80, startH + (e.clientY - startY));
    wrap.style.height = newH + 'px';
  });
  document.addEventListener('mouseup', function() {
    if (dragging) { dragging = false; document.body.style.userSelect = ''; }
  });
})();
