<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Monitor - PBGui</title>
    <link rel="stylesheet" href="/app/css/app.css">
    <style>
        /* Additional styles for new features */
        .job-actions {
            display: flex;
            flex-wrap: wrap;
            gap: var(--sp-xs);
            align-items: center;
        }
        .job-actions button { margin-left: 0; }
        .btn-secondary { background: #4a5568; }
        .btn-secondary:hover { background: #2d3748; }
        .btn-view { background: #0f766e; color: #f8fafc; }
        .btn-view:hover { background: #115e59; }
        .btn-run { background: #15803d; color: #f8fafc; }
        .btn-run:hover { background: #166534; }
        .btn-info { background: #3182ce; }
        .btn-info:hover { background: #2c5282; }
        
        /* Log Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            inset: 0;
            width: 100%;
            height: 100%;
            padding-top: calc(var(--modal-visible-top-offset, 0px) + var(--sp-lg, 20px));
            padding-right: var(--sp-lg, 20px);
            padding-bottom: calc(var(--modal-visible-bottom-offset, 0px) + var(--sp-lg, 20px));
            padding-left: var(--sp-lg, 20px);
            overflow-y: auto;
            background-color: rgba(0,0,0,0.7);
        }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content {
            background: #1a202c;
            border-radius: 8px;
            padding: 1.5rem;
            width: min(900px, calc(100vw - (var(--sp-lg) * 2)));
            max-width: 900px;
            max-height: calc(var(--modal-visible-height, 100vh) - (var(--sp-lg, 20px) * 2));
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid #2d3748;
            padding-bottom: 0.75rem;
        }
        .modal-body {
            overflow-y: auto;
            flex: 1;
            background: #0e1117;
            padding: 1rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: var(--fs-sm);
        }
        .job-details-modal-body {
            background: #0f172a;
            padding: var(--sp-md);
            font-family: inherit;
            font-size: var(--fs-base);
            color: #e2e8f0;
            display: grid;
            gap: var(--sp-md);
        }
        .details-section {
            background: #111827;
            border: 1px solid #243041;
            border-radius: 6px;
            padding: var(--sp-md);
            display: grid;
            gap: var(--sp-sm);
        }
        .details-section h3 {
            margin: 0;
            font-size: var(--fs-md);
            color: #f8fafc;
        }
        .details-kv {
            display: grid;
            grid-template-columns: minmax(120px, max-content) 1fr;
            gap: var(--sp-xs) var(--sp-sm);
            align-items: start;
            font-size: var(--fs-sm);
        }
        .details-kv-key {
            color: #94a3b8;
            font-weight: 600;
        }
        .details-kv-value {
            color: #e2e8f0;
            min-width: 0;
            word-break: break-word;
        }
        .details-empty {
            color: #94a3b8;
            font-size: var(--fs-sm);
        }
        .json-block {
            margin: 0;
            padding: var(--sp-md);
            border-radius: 4px;
            background: #0b1220;
            border: 1px solid #1e293b;
            color: #e2e8f0;
            font-family: 'Courier New', monospace;
            font-size: var(--fs-sm);
            white-space: pre-wrap;
            word-break: break-word;
            overflow-x: auto;
        }
        .log-line {
            margin: 0.25rem 0;
            color: #f1f5f9;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .close-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: var(--fs-base);
        }
        .close-btn:hover { background: #dc2626; }
        
        /* Progress details */
        .progress-details {
            font-size: var(--fs-xs);
            color: #94a3b8;
            margin-top: 0.5rem;
        }
        .progress-details .detail { margin-right: 1rem; }
        
        /* Job expander */
        .job-expander {
            margin-top: 0.5rem;
            border-top: 1px solid #2d3748;
            padding-top: 0.5rem;
        }
        .expander-toggle {
            background: transparent;
            border: none;
            color: #60a5fa;
            cursor: pointer;
            font-size: var(--fs-sm);
            padding: 0.25rem 0;
        }
        .expander-toggle:hover { text-decoration: underline; }
        .expander-content {
            display: none;
            padding: 0.75rem;
            background: #0f172a;
            border-radius: 4px;
            margin-top: 0.5rem;
            font-size: var(--fs-sm);
        }
        .expander-content.open { display: block; }
        .detail-row { margin: 0.3rem 0; }
        
        /* Tab header actions */
        .tab-header-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1rem;
            padding: 0.5rem;
            border-bottom: 1px solid #2d3748;
        }
        .tab-header-actions button {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: var(--fs-sm);
        }
        .tab-header-actions button:hover { background: #dc2626; }
        .tab-header-actions button:disabled {
            background: #4a5568;
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* Action dialog */
        .action-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1100;
            background: rgba(0, 0, 0, 0.72);
            align-items: center;
            justify-content: center;
            padding: var(--sp-lg);
        }
        .action-modal.active { display: flex; }
        .action-modal-card {
            width: min(460px, 92vw);
            background: #131b2b;
            border: 1px solid #2d3748;
            border-radius: 12px;
            box-shadow: 0 20px 70px rgba(0, 0, 0, 0.9);
            overflow: hidden;
        }
        .action-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--sp-sm);
            padding: 0.85rem 1.1rem;
            border-bottom: 1px solid #1e2736;
            background: #111827;
        }
        .action-modal-title {
            font-size: var(--fs-md);
            font-weight: 700;
            color: #e2e8f0;
        }
        .action-modal-close {
            background: transparent;
            border: none;
            color: #64748b;
            font-size: var(--fs-lg);
            cursor: pointer;
            padding: 0.2rem 0.35rem;
            border-radius: 5px;
            line-height: 1;
        }
        .action-modal-close:hover {
            color: #e2e8f0;
            background: rgba(255, 255, 255, 0.06);
        }
        .action-modal-body {
            display: grid;
            gap: var(--sp-md);
            padding: var(--sp-lg);
        }
        .action-modal-message {
            font-size: var(--fs-base);
            color: #e2e8f0;
            line-height: 1.5;
        }
        .action-modal-detail {
            font-size: var(--fs-sm);
            color: #94a3b8;
            line-height: 1.45;
        }
        .action-modal-detail[hidden] { display: none !important; }
        .action-modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: var(--sp-sm);
            flex-wrap: wrap;
        }
        .action-modal-actions .btn {
            min-width: 96px;
        }
        .action-modal-cancel[hidden] { display: none !important; }

        html.is-embedded,
        body.is-embedded {
            padding: 0;
            background: transparent;
            overflow: hidden;
        }
        body.is-embedded .container {
            max-width: none;
            overflow: hidden;
        }
        body.is-embedded header {
            justify-content: flex-end;
            margin-bottom: var(--sp-sm);
            padding-bottom: 0;
            border-bottom: 0;
        }
        body.is-embedded header h1 {
            display: none;
        }
        body.is-embedded .tabs {
            margin-bottom: var(--sp-sm);
        }
        body.is-embedded .tab-header-actions {
            padding: 0 0 var(--sp-sm);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Job Monitor</h1>
            <div class="status">
                <span id="connection-status" class="badge badge-connecting">Connecting...</span>
                <span id="worker-status" class="badge badge-unknown">Worker: Unknown</span>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="running">Active</button>
            <button class="tab-btn" data-tab="done">Done</button>
            <button class="tab-btn" data-tab="failed">Failed</button>
        </div>

        <div class="tab-content active" id="tab-running">
            <div id="jobs-running" class="jobs-list">
                <p class="loading">Loading...</p>
            </div>
        </div>

        <div class="tab-content" id="tab-done">
            <div class="tab-header-actions">
                <button onclick="deleteAllJobs('done')" id="delete-all-done-btn">Delete All Done Jobs</button>
            </div>
            <div id="jobs-done" class="jobs-list">
                <p class="loading">Loading...</p>
            </div>
        </div>

        <div class="tab-content" id="tab-failed">
            <div class="tab-header-actions">
                <button onclick="deleteAllJobs('failed')" id="delete-all-failed-btn">Delete All Failed Jobs</button>
            </div>
            <div id="jobs-failed" class="jobs-list">
                <p class="loading">Loading...</p>
            </div>
        </div>
    </div>

    <!-- Log Modal -->
    <div id="log-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Job Log: <span id="log-job-id"></span></h2>
                <button class="close-btn" onclick="closeLogModal()">Close</button>
            </div>
            <div class="modal-body" id="log-content">
                <p>Loading...</p>
            </div>
        </div>
    </div>

    <div id="details-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Job Details: <span id="details-job-id"></span></h2>
                <button class="close-btn" onclick="closeDetailsModal()">Close</button>
            </div>
            <div class="modal-body job-details-modal-body" id="details-content">
                <p>Loading...</p>
            </div>
        </div>
    </div>

    <div id="action-modal" class="action-modal" aria-hidden="true">
        <div class="action-modal-card" role="dialog" aria-modal="true" aria-labelledby="action-modal-title">
            <div class="action-modal-header">
                <div class="action-modal-title" id="action-modal-title">Confirm action</div>
                <button class="action-modal-close" id="action-modal-close" type="button">&#x2715;</button>
            </div>
            <div class="action-modal-body">
                <div class="action-modal-message" id="action-modal-message"></div>
                <div class="action-modal-detail" id="action-modal-detail" hidden></div>
                <div class="action-modal-actions">
                    <button class="btn btn-secondary action-modal-cancel" id="action-modal-cancel" type="button">Cancel</button>
                    <button class="btn btn-info" id="action-modal-accept" type="button">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        
        // Extract token and exchange filter from URL query parameters
        const urlParams = new URLSearchParams(window.location.search);
        const API_TOKEN = urlParams.get('token');
        const EMBED_MODE = urlParams.get('embed') === '1';
        const EXCHANGE_FILTER = (urlParams.get('exchange') || '').trim().toLowerCase();
        const JOB_TYPE_FILTER = (urlParams.get('job_type') || '').trim().toLowerCase();

        if (EMBED_MODE) {
            document.documentElement.classList.add('is-embedded');
            document.body.classList.add('is-embedded');
        }

        function isClippingAncestor(element, view) {
            if (!element || !view || typeof view.getComputedStyle !== 'function') {
                return false;
            }
            const style = view.getComputedStyle(element);
            if (!style) {
                return false;
            }
            const overflowValue = `${String(style.overflow || '')} ${String(style.overflowY || '')} ${String(style.overflowX || '')}`;
            return /(auto|scroll|hidden|clip|overlay)/i.test(overflowValue);
        }

        function resolveModalViewportMetrics() {
            const fallbackHeight = Math.max(0, window.innerHeight || 0);
            let topViewportHeight = fallbackHeight;
            try {
                if (window.top && window.top.innerHeight) {
                    topViewportHeight = Math.max(0, window.top.innerHeight || 0);
                }
            } catch (_) {
                topViewportHeight = fallbackHeight;
            }

            const fallback = {
                visibleHeight: topViewportHeight || fallbackHeight,
                topOffset: 0,
                bottomOffset: 0,
            };

            try {
                const frame = window.frameElement;
                if (!frame || !window.top || window.top === window) {
                    return fallback;
                }
                const ownerDoc = frame.ownerDocument || (window.top && window.top.document) || null;
                const ownerView = (ownerDoc && ownerDoc.defaultView) || window.top;
                const rect = frame.getBoundingClientRect();
                let clipTop = 0;
                let clipBottom = topViewportHeight;
                let ancestor = frame.parentElement;
                while (ancestor) {
                    if (isClippingAncestor(ancestor, ownerView)) {
                        const ancestorRect = ancestor.getBoundingClientRect();
                        clipTop = Math.max(clipTop, ancestorRect.top);
                        clipBottom = Math.min(clipBottom, ancestorRect.bottom);
                    }
                    ancestor = ancestor.parentElement;
                }
                const visibleTop = Math.max(rect.top, clipTop);
                const visibleBottom = Math.min(rect.bottom, clipBottom);
                const visibleHeight = Math.max(0, visibleBottom - visibleTop);
                return {
                    visibleHeight: visibleHeight || fallback.visibleHeight,
                    topOffset: Math.max(0, visibleTop - rect.top),
                    bottomOffset: Math.max(0, rect.bottom - visibleBottom),
                };
            } catch (_) {
                return fallback;
            }
        }

        function updateModalViewportHeight() {
            const metrics = resolveModalViewportMetrics();
            document.documentElement.style.setProperty('--modal-visible-height', `${Math.max(0, metrics.visibleHeight)}px`);
            document.documentElement.style.setProperty('--modal-visible-top-offset', `${Math.max(0, metrics.topOffset)}px`);
            document.documentElement.style.setProperty('--modal-visible-bottom-offset', `${Math.max(0, metrics.bottomOffset)}px`);
        }

        updateModalViewportHeight();
        window.addEventListener('resize', updateModalViewportHeight);
        window.addEventListener('scroll', updateModalViewportHeight, { passive: true });
        try {
            const parentDoc = window.frameElement && window.frameElement.ownerDocument;
            if (parentDoc) {
                parentDoc.addEventListener('scroll', updateModalViewportHeight, { passive: true, capture: true });
            }
            if (window.top && window.top !== window) {
                window.top.addEventListener('resize', updateModalViewportHeight);
                window.top.addEventListener('scroll', updateModalViewportHeight, { passive: true });
                if (window.top.document && window.top.document !== parentDoc) {
                    window.top.document.addEventListener('scroll', updateModalViewportHeight, { passive: true, capture: true });
                }
            }
        } catch (_) {
            void _;
        }
        
        if (!API_TOKEN) {
            document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#ff4b4b;">Error: No authentication token provided</div>';
            throw new Error('Missing token');
        }
        
        const wsProto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const WS_URL = `${wsProto}//${window.location.host}/ws/jobs?token=${API_TOKEN}`;
        
        let ws = null;
        let currentTab = 'running';
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 5;
        let expandedJobs = new Set();
        let actionDialogResolve = null;
        let actionDialogReturnFocus = null;

        function closeActionDialog(confirmed) {
            const modal = document.getElementById('action-modal');
            if (modal) {
                modal.classList.remove('active');
                modal.setAttribute('aria-hidden', 'true');
            }
            const resolver = actionDialogResolve;
            const returnFocus = actionDialogReturnFocus;
            actionDialogResolve = null;
            actionDialogReturnFocus = null;
            if (returnFocus && typeof returnFocus.focus === 'function') {
                try { returnFocus.focus(); } catch (_) {}
            }
            if (typeof resolver === 'function') resolver(Boolean(confirmed));
        }

        function showActionDialog(options) {
            options = options || {};
            const modal = document.getElementById('action-modal');
            const title = document.getElementById('action-modal-title');
            const message = document.getElementById('action-modal-message');
            const detail = document.getElementById('action-modal-detail');
            const cancelBtn = document.getElementById('action-modal-cancel');
            const acceptBtn = document.getElementById('action-modal-accept');

            if (!modal || !title || !message || !detail || !cancelBtn || !acceptBtn) {
                if (options.cancelText === null || options.cancelText === '') {
                    window.alert(String(options.message || 'Done.'));
                    return Promise.resolve(true);
                }
                return Promise.resolve(window.confirm(String(options.message || 'Are you sure?')));
            }

            if (typeof actionDialogResolve === 'function') {
                const previousResolve = actionDialogResolve;
                actionDialogResolve = null;
                previousResolve(false);
            }

            title.textContent = String(options.title || 'Confirm action');
            message.textContent = String(options.message || 'Are you sure?');
            const detailText = String(options.detail || '').trim();
            detail.textContent = detailText;
            detail.hidden = !detailText;

            const cancelText = options.cancelText;
            if (cancelText === null || cancelText === '') {
                cancelBtn.hidden = true;
            } else {
                cancelBtn.hidden = false;
                cancelBtn.textContent = String(cancelText || 'Cancel');
            }
            acceptBtn.textContent = String(options.confirmText || 'Confirm');
            acceptBtn.className = 'btn ' + (options.confirmClass || 'btn-info');
            actionDialogReturnFocus = document.activeElement;

            return new Promise((resolve) => {
                actionDialogResolve = resolve;
                updateModalViewportHeight();
                modal.classList.add('active');
                modal.setAttribute('aria-hidden', 'false');
                acceptBtn.focus();
            });
        }

        async function showActionNotice(options) {
            await showActionDialog({
                title: options && options.title ? options.title : 'Notice',
                message: options && options.message ? options.message : '',
                detail: options && options.detail ? options.detail : '',
                confirmText: options && options.confirmText ? options.confirmText : 'OK',
                confirmClass: options && options.confirmClass ? options.confirmClass : 'btn-info',
                cancelText: null
            });
        }

            updateModalViewportHeight();
        // ── Job Filter ──
        function matchesExchangeFilter(job) {
            // No filter = show all jobs
            if (!EXCHANGE_FILTER && !JOB_TYPE_FILTER) return true;

            // Job type filter (comma-separated list)
            if (JOB_TYPE_FILTER) {
                const allowedTypes = JOB_TYPE_FILTER.split(',').map(t => t.trim());
                const jt = (job.type || '').toLowerCase();
                if (!allowedTypes.some(t => jt === t)) return false;
            }
            
                        updateModalViewportHeight();
            // Try explicit exchange field first
            let jobExchange = (job.exchange || '').trim().toLowerCase();
            
            // Fallback: derive exchange from job_type for legacy jobs
            if (!jobExchange && job.type) {
                const jobType = job.type.toLowerCase();
                if (jobType.startsWith('hl_') || jobType.includes('hyperliquid')) {
                    jobExchange = 'hyperliquid';
                } else if (jobType.startsWith('binance_') || jobType.includes('binance')) {
                    jobExchange = 'binanceusdm';
                } else if (jobType.startsWith('bybit_') || jobType.includes('bybit')) {
                    jobExchange = 'bybit';
                }
            }
            
            // If still no exchange detected, show on all tabs (unknown job type)
            if (!jobExchange) return true;
            
            // Match against detected exchange
            return jobExchange === EXCHANGE_FILTER;
        }

        // ── WebSocket Connection ──
        function connectWebSocket() {
            const statusEl = document.getElementById('connection-status');
            statusEl.textContent = 'Connecting...';
            statusEl.className = 'badge badge-connecting';

            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                console.log('WebSocket connected');
                statusEl.textContent = 'Connected';
                statusEl.className = 'badge badge-connected';
                reconnectAttempts = 0;
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'jobs') {
                        updateJobs(msg.data);
                    }
                } catch (e) {
                    console.error('WebSocket message error:', e);
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                statusEl.textContent = 'Error';
                statusEl.className = 'badge badge-error';
            };

            ws.onclose = () => {
                console.log('WebSocket closed');
                statusEl.textContent = 'Disconnected';
                statusEl.className = 'badge badge-error';
                
                // Try to reconnect
                if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                    reconnectAttempts++;
                    console.log(`Reconnecting... (attempt ${reconnectAttempts})`);
                    setTimeout(connectWebSocket, 3000);
                } else {
                    console.log('Max reconnection attempts reached, falling back to polling');
                    startPolling();
                }
            };
        }

        // ── Polling Fallback ──
        let pollingInterval = null;
        function startPolling() {
            if (pollingInterval) return;
            
            const statusEl = document.getElementById('connection-status');
            statusEl.textContent = 'Polling';
            statusEl.className = 'badge badge-connecting';

            pollingInterval = setInterval(async () => {
                try {
                    const resp = await fetch(`${API_BASE}/jobs/?states=pending,running&token=${API_TOKEN}`);
                    const data = await resp.json();
                    updateJobs(data.jobs);
                } catch (e) {
                    console.error('Polling error:', e);
                }
            }, 2000);
        }

        // ── Update Jobs Display ──
        function updateJobs(jobs) {
            const runningContainer = document.getElementById('jobs-running');
            
            // Apply exchange filter
            const filteredJobs = jobs.filter(matchesExchangeFilter);
            const activeJobs = filteredJobs.filter(j => ['pending', 'running'].includes(j.status));

            if (!activeJobs || activeJobs.length === 0) {
                runningContainer.innerHTML = '<p class="no-jobs">No active jobs.</p>';
                return;
            }

            // Keep active jobs stable: running first, then queue/start order.
            activeJobs.sort(compareActiveJobs);

            runningContainer.innerHTML = activeJobs.map(renderActiveJob).join('');
        }

        // ── Render Active Job (with details) ──
        function renderActiveJob(job) {
            const progress = job.progress || {};
            const pct = calculateProgress(progress);
            const coin = progress.coin || '';
            const chunk = progress.chunk_start ? `${progress.chunk_start}→${progress.chunk_end}` : '';
            const isExpanded = expandedJobs.has(job.id);
            const durationStr = formatJobDuration(job);
            
            const statusClass = job.status === 'running' ? 'status-running' : 'status-pending';
            
            // Progress details
            const downloaded = progress.downloaded_total || 0;
            const skipped = progress.skipped_existing_total || 0;
            const failed = progress.failed_total || 0;
            const dlBytes = formatBytes(progress.downloaded_bytes_total);
            const skBytes = formatBytes(progress.skipped_existing_bytes_total);
            const flBytes = formatBytes(progress.failed_bytes_total);
            const stage = progress.stage || '';
            const mode = progress.mode || '';
            const chunkDone = progress.chunk_done || 0;
            const chunkTotal = progress.chunk_total || 0;
            const step = progress.step || 0;
            const total = progress.total || 0;

            return `
                <div class="job-card">
                    <div class="job-header">
                        <div class="job-info">
                            <strong class="job-id">${job.id}</strong>
                            <span class="badge ${statusClass}">${job.status}</span>
                            <span class="job-type">${job.type}</span>
                            ${durationStr ? `<span class="detail" style="color:#8899aa;">${durationStr}</span>` : ''}
                        </div>
                        <div class="job-actions">
                            ${job.status === 'pending' ? `<button class="btn btn-run" onclick="runJob('${job.id}')">Run</button>` : ''}
                            <button class="btn btn-view" onclick="showJobDetails('${job.id}')">View</button>
                            <button class="btn btn-info" onclick="showLog('${job.id}')">Log</button>
                            <button class="btn btn-danger" onclick="cancelJob('${job.id}')">Cancel</button>
                        </div>
                    </div>
                    <div class="job-details">
                        ${coin ? `<span class="detail">Coin: ${coin}</span>` : ''}
                        ${chunk ? `<span class="detail">Chunk: ${chunk}</span>` : ''}
                        <span class="detail">Updated: ${formatTimestamp(job.updated_ts)}</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${pct}%">
                            <span class="progress-text">${pct}%</span>
                        </div>
                    </div>
                    ${total > 0 ? `
                        <div class="progress-details">
                            <span class="detail">Step: ${step}/${total}</span>
                            ${chunkTotal > 0 ? `<span class="detail">Chunk: ${chunkDone}/${chunkTotal}</span>` : ''}
                            ${stage ? `<span class="detail">Stage: ${stage}</span>` : ''}
                            ${mode ? `<span class="detail">Mode: ${mode}</span>` : ''}
                        </div>
                    ` : ''}
                    ${(downloaded + skipped + failed > 0) ? `
                        <div class="job-expander">
                            <button class="expander-toggle" onclick="toggleExpander('${job.id}', event)">
                                ${isExpanded ? '▼' : '▶'} Details
                            </button>
                            <div class="expander-content ${isExpanded ? 'open' : ''}" id="expander-${job.id}">
                                <div class="detail-row"><strong>Downloads:</strong> ${downloaded} files (${dlBytes})</div>
                                <div class="detail-row"><strong>Skipped:</strong> ${skipped} files (${skBytes})</div>
                                <div class="detail-row"><strong>Failed:</strong> ${failed} files (${flBytes})</div>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        // ── Render Job for Done/Failed tabs ──
        function renderJob(job) {
            const isDone = job.status === 'done';
            const isFailed = job.status === 'failed';
            const payload = job.payload || {};
            const progress = job.progress || {};
            const lr = progress.last_result || {};

            // Coins
            const coins = Array.isArray(payload.coins) ? payload.coins : [];
            const coinPreview = coins.length <= 8
                ? coins.join(', ')
                : coins.slice(0, 8).join(', ') + ` … (${coins.length} total)`;

            // Date range
            const startDay = payload.start_day || '';
            const endDay = payload.end_day || '';
            const rangeStr = (startDay || endDay)
                ? `${fmtDayCompact(startDay)} → ${fmtDayCompact(endDay)}`
                : '';

            // Stats
            const downloaded = progress.downloaded_total || lr.downloaded || 0;
            const skipped = progress.skipped_existing_total || lr.skipped_existing || 0;
            const failed = progress.failed_total || lr.failed || 0;
            const dlBytes = formatBytes(progress.downloaded_bytes_total || lr.downloaded_bytes || 0);
            const skBytes = formatBytes(progress.skipped_existing_bytes_total || lr.skipped_existing_bytes || 0);
            const flBytes = formatBytes(progress.failed_bytes_total || lr.failed_bytes || 0);
            const hasStats = (downloaded + skipped + failed) > 0;

            const durationStr = formatJobDuration(job);

            const isExpanded = expandedJobs.has(job.id);

            return `
                <div class="job-card simple">
                    <div class="job-header">
                        <div class="job-info">
                            <strong class="job-id">${job.id}</strong>
                            <span class="job-type">${job.type}</span>
                            ${durationStr ? `<span class="detail" style="color:#8899aa;">${durationStr}</span>` : ''}
                        </div>
                        <div class="job-actions">
                            <button class="btn btn-view" onclick="showJobDetails('${job.id}')">View</button>
                            <button class="btn btn-info" onclick="showLog('${job.id}')">Log</button>
                            ${isFailed ? `<button class="btn btn-secondary" onclick="retryJob('${job.id}')">Retry</button>` : ''}
                            ${isDone ? `<button class="btn btn-secondary" onclick="requeueJob('${job.id}')">Requeue</button>` : ''}
                            <button class="btn btn-danger" onclick="deleteJob('${job.id}')">Delete</button>
                        </div>
                    </div>
                    <div class="job-details">
                        <span class="detail">${formatTimestamp(job.updated_ts)}</span>
                        ${rangeStr ? `<span class="detail" style="margin-left:0.8rem;">Range: ${rangeStr}</span>` : ''}
                    </div>
                    ${job.error ? `<div class="job-error" style="margin-top:0.5rem;color:#ef4444;font-size:var(--fs-sm);">${job.error}</div>` : ''}
                    ${(hasStats || coinPreview) ? `
                        <div class="job-expander">
                            <button class="expander-toggle" onclick="toggleExpander('${job.id}', event)">
                                ${isExpanded ? '▼' : '▶'} Details
                            </button>
                            <div class="expander-content ${isExpanded ? 'open' : ''}" id="expander-${job.id}">
                                ${coinPreview ? `<div class="detail-row"><strong>Coins:</strong> ${coinPreview}</div>` : ''}
                                ${payload.only_missing_1m_src_hours !== undefined ? `<div class="detail-row"><strong>Only missing 1m_src hours:</strong> ${payload.only_missing_1m_src_hours ? 'Yes' : 'No'}</div>` : ''}
                                ${hasStats ? `
                                    <div class="detail-row"><strong>Downloaded:</strong> ${downloaded} files (${dlBytes})</div>
                                    <div class="detail-row"><strong>Skipped:</strong> ${skipped} files (${skBytes})</div>
                                    <div class="detail-row"><strong>Failed:</strong> ${failed} files (${flBytes})</div>
                                ` : ''}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function fmtDayCompact(yyyymmdd) {
            if (!yyyymmdd || yyyymmdd.length !== 8) return yyyymmdd || '?';
            return yyyymmdd.slice(0,4) + '-' + yyyymmdd.slice(4,6) + '-' + yyyymmdd.slice(6,8);
        }

        function formatJobDuration(job) {
            const createdTs = parseFloat(job.created_ts || 0);
            const updatedTs = parseFloat(job.updated_ts || 0);
            if (!(createdTs > 0) || updatedTs < createdTs) return '';
            const dur = Math.round(updatedTs - createdTs);
            const h = Math.floor(dur / 3600);
            const m = Math.floor((dur % 3600) / 60);
            const s = dur % 60;
            if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
            if (m > 0) return `${m}m ${String(s).padStart(2,'0')}s`;
            return `${s}s`;
        }

        // ── Helper Functions ──
        function calculateProgress(pr) {
            if (!pr.total) return 0;
            const step = pr.step || 0;
            const chunkDone = pr.chunk_done || 0;
            const chunkTotal = pr.chunk_total || 1;
            const frac = chunkTotal > 0 ? chunkDone / chunkTotal : 0;
            const pct = ((step - 1 + frac) / pr.total) * 100;
            return Math.min(100, Math.max(0, Math.round(pct)));
        }

        function formatBytes(bytes) {
            if (!bytes) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return (bytes / Math.pow(k, i)).toFixed(2) + ' ' + sizes[i];
        }

        function formatTimestamp(ts) {
            if (!ts) return '';
            const d = new Date(Number(ts) * 1000);
            if (isNaN(d.getTime())) return String(ts);
            const pad = n => String(n).padStart(2, '0');
            return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' '
                 + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
        }

        function compareActiveJobs(a, b) {
            const aRunning = a && a.status === 'running';
            const bRunning = b && b.status === 'running';
            if (aRunning !== bRunning) return aRunning ? -1 : 1;

            const aCreated = parseFloat(a && a.created_ts || 0);
            const bCreated = parseFloat(b && b.created_ts || 0);
            if (aCreated !== bCreated) return aCreated - bCreated;

            return String(a && a.id || '').localeCompare(String(b && b.id || ''));
        }

        function toggleExpander(jobId, event) {
            event.stopPropagation();
            const content = document.getElementById(`expander-${jobId}`);
            const btn = event.target;
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                btn.textContent = '▶ Details';
                expandedJobs.delete(jobId);
            } else {
                content.classList.add('open');
                btn.textContent = '▼ Details';
                expandedJobs.add(jobId);
            }
        }

        // ── API Actions ──
        async function cancelJob(jobId) {
            if (!(await showActionDialog({
                title: 'Cancel job',
                message: `Cancel job ${jobId}?`,
                confirmText: 'Cancel job',
                confirmClass: 'btn-danger'
            }))) return;
            
            try {
                const resp = await fetch(`${API_BASE}/jobs/cancel?token=${API_TOKEN}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({job_id: jobId, reason: 'user cancel'})
                });
                
                if (resp.ok) {
                    console.log(`Job ${jobId} cancelled`);
                } else {
                    const err = await resp.json();
                    await showActionNotice({ title: 'Cancel failed', message: `Failed to cancel: ${err.detail}` });
                }
            } catch (e) {
                console.error('Cancel error:', e);
                await showActionNotice({ title: 'Cancel failed', message: 'Failed to cancel job' });
            }
        }

        async function deleteJob(jobId) {
            if (!(await showActionDialog({
                title: 'Delete job',
                message: `Delete job ${jobId}?`,
                detail: 'This action cannot be undone.',
                confirmText: 'Delete',
                confirmClass: 'btn-danger'
            }))) return;
            
            try {
                const resp = await fetch(`${API_BASE}/jobs/${jobId}?token=${API_TOKEN}`, {
                    method: 'DELETE'
                });
                
                if (resp.ok) {
                    console.log(`Job ${jobId} deleted`);
                    loadTab(currentTab); // Refresh current tab
                } else {
                    const err = await resp.json();
                    await showActionNotice({ title: 'Delete failed', message: `Failed to delete: ${err.detail}` });
                }
            } catch (e) {
                console.error('Delete error:', e);
                await showActionNotice({ title: 'Delete failed', message: 'Failed to delete job' });
            }
        }

        async function retryJob(jobId) {
            if (!(await showActionDialog({
                title: 'Retry failed job',
                message: `Retry failed job ${jobId}?`,
                confirmText: 'Retry',
                confirmClass: 'btn-info'
            }))) return;
            
            try {
                const resp = await fetch(`${API_BASE}/jobs/${jobId}/retry?token=${API_TOKEN}`, {
                    method: 'POST'
                });
                
                if (resp.ok) {
                    console.log(`Job ${jobId} retried`);
                    loadTab(currentTab); // Refresh current tab
                } else {
                    const err = await resp.json();
                    await showActionNotice({ title: 'Retry failed', message: `Failed to retry: ${err.detail}` });
                }
            } catch (e) {
                console.error('Retry error:', e);
                await showActionNotice({ title: 'Retry failed', message: 'Failed to retry job' });
            }
        }

        async function requeueJob(jobId) {
            if (!(await showActionDialog({
                title: 'Requeue job',
                message: `Requeue job ${jobId}?`,
                confirmText: 'Requeue',
                confirmClass: 'btn-info'
            }))) return;
            
            try {
                const resp = await fetch(`${API_BASE}/jobs/${jobId}/requeue?token=${API_TOKEN}`, {
                    method: 'POST'
                });
                
                if (resp.ok) {
                    console.log(`Job ${jobId} requeued`);
                    loadTab(currentTab); // Refresh current tab
                } else {
                    const err = await resp.json();
                    await showActionNotice({ title: 'Requeue failed', message: `Failed to requeue: ${err.detail}` });
                }
            } catch (e) {
                console.error('Requeue error:', e);
                await showActionNotice({ title: 'Requeue failed', message: 'Failed to requeue job' });
            }
        }

        async function deleteAllJobs(state) {
            const stateLabel = state === 'done' ? 'done' : 'failed';
            const exchangeLabel = EXCHANGE_FILTER ? ` for ${EXCHANGE_FILTER}` : '';
            
            if (!(await showActionDialog({
                title: `Delete all ${stateLabel} jobs`,
                message: `Delete all ${stateLabel} jobs${exchangeLabel}?`,
                detail: 'This action cannot be undone.',
                confirmText: 'Delete all',
                confirmClass: 'btn-danger'
            }))) {
                return;
            }
            
            try {
                const payload = {
                    delete_all: true,
                    state: state
                };
                
                // Add exchange filter if present
                if (EXCHANGE_FILTER) {
                    payload.exchange = EXCHANGE_FILTER;
                }
                
                const resp = await fetch(`${API_BASE}/jobs/bulk-delete?token=${API_TOKEN}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                
                if (resp.ok) {
                    const data = await resp.json();
                    await showActionNotice({
                        title: 'Jobs deleted',
                        message: `Successfully deleted ${data.deleted} of ${data.total} jobs.`,
                        confirmText: 'OK',
                        confirmClass: 'btn-info'
                    });
                    loadTab(currentTab); // Refresh current tab
                } else {
                    const err = await resp.json();
                    await showActionNotice({ title: 'Delete failed', message: `Failed to delete jobs: ${err.detail}` });
                }
            } catch (e) {
                console.error('Delete all error:', e);
                await showActionNotice({ title: 'Delete failed', message: 'Failed to delete jobs' });
            }
        }

        async function showLog(jobId) {
            const modal = document.getElementById('log-modal');
            const logContent = document.getElementById('log-content');
            const logJobId = document.getElementById('log-job-id');
            
            logJobId.textContent = jobId;
            logContent.innerHTML = '<p>Loading...</p>';
            modal.classList.add('active');
            
            try {
                const resp = await fetch(`${API_BASE}/jobs/${jobId}/log?lines=500&token=${API_TOKEN}`);
                const data = await resp.json();
                
                if (!data.exists || !data.log || data.log.length === 0) {
                    logContent.innerHTML = '<p style="color:#94a3b8;">No log file found or log is empty.</p>';
                    return;
                }
                
                logContent.innerHTML = data.log.map(line => 
                    `<div class="log-line">${escapeHtml(line)}</div>`
                ).join('');
                
                // Auto-scroll to bottom
                logContent.scrollTop = logContent.scrollHeight;
            } catch (e) {
                console.error('Log error:', e);
                logContent.innerHTML = '<p style="color:#ef4444;">Failed to load log.</p>';
            }
        }

        function closeLogModal() {
            document.getElementById('log-modal').classList.remove('active');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatJsonBlock(value) {
            if (!value || (typeof value === 'object' && Object.keys(value).length === 0)) {
                return '<div class="details-empty">No data.</div>';
            }
            return `<pre class="json-block">${escapeHtml(JSON.stringify(value, null, 2))}</pre>`;
        }

        function renderDetailRows(rows) {
            const rendered = (rows || []).filter(row => row && row.value !== '' && row.value !== null && row.value !== undefined)
                .map(row => {
                    return '<div class="details-kv-key">' + escapeHtml(String(row.label)) + '</div>' +
                           '<div class="details-kv-value">' + escapeHtml(String(row.value)) + '</div>';
                }).join('');
            return rendered || '<div class="details-empty">No details available.</div>';
        }

        function renderJobDetails(job) {
            const payload = job && job.payload && typeof job.payload === 'object' ? job.payload : {};
            const progress = job && job.progress && typeof job.progress === 'object' ? job.progress : {};
            const coins = Array.isArray(payload.coins) ? payload.coins.join(', ') : '';
            const range = (payload.start_day || payload.end_day)
                ? `${fmtDayCompact(payload.start_day || '')} → ${fmtDayCompact(payload.end_day || '')}`
                : '';
            const lastResult = progress.last_result && typeof progress.last_result === 'object' ? progress.last_result : {};

            const summaryRows = [
                { label: 'Status', value: job.status || '' },
                { label: 'Type', value: job.type || '' },
                { label: 'Exchange', value: job.exchange || '' },
                { label: 'Created', value: formatTimestamp(job.created_ts) },
                { label: 'Updated', value: formatTimestamp(job.updated_ts) },
                { label: 'Duration', value: formatJobDuration(job) },
                { label: 'Run requested', value: job.run_requested ? 'Yes' : '' },
                { label: 'Cancel requested', value: job.cancel_requested ? 'Yes' : '' },
                { label: 'Error', value: job.error || '' }
            ];

            const scopeRows = [
                { label: 'Coins', value: coins },
                { label: 'Range', value: range },
                { label: 'Chunk days', value: payload.chunk_days },
                { label: 'Profile', value: payload.profile || '' },
                { label: 'Region', value: payload.region || '' },
                { label: 'Refetch', value: payload.refetch ? 'Yes' : '' },
                { label: 'Only missing 1m_src hours', value: payload.only_missing_1m_src_hours !== undefined ? (payload.only_missing_1m_src_hours ? 'Yes' : 'No') : '' },
                { label: 'Current coin', value: progress.coin || '' },
                { label: 'Current chunk', value: progress.chunk_start ? `${progress.chunk_start} → ${progress.chunk_end}` : '' },
                { label: 'Stage', value: progress.stage || '' },
                { label: 'Step', value: progress.total ? `${progress.step || 0}/${progress.total}` : '' },
                { label: 'Chunk progress', value: progress.chunk_total ? `${progress.chunk_done || 0}/${progress.chunk_total}` : '' }
            ];

            return `
                <div class="details-section">
                    <h3>Summary</h3>
                    <div class="details-kv">${renderDetailRows(summaryRows)}</div>
                </div>
                <div class="details-section">
                    <h3>Scope</h3>
                    <div class="details-kv">${renderDetailRows(scopeRows)}</div>
                </div>
                <div class="details-section">
                    <h3>Payload</h3>
                    ${formatJsonBlock(payload)}
                </div>
                <div class="details-section">
                    <h3>Progress</h3>
                    ${formatJsonBlock(progress)}
                </div>
                <div class="details-section">
                    <h3>Last Result</h3>
                    ${formatJsonBlock(lastResult)}
                </div>
            `;
        }

            async function runJob(jobId) {
                try {
                    const resp = await fetch(`${API_BASE}/jobs/${jobId}/run?token=${API_TOKEN}`, {
                        method: 'POST'
                    });
                    if (!resp.ok) {
                        const err = await resp.json().catch(() => ({}));
                        throw new Error(err.detail || resp.statusText || 'Failed to request run');
                    }
                } catch (e) {
                    console.error('Run job error:', e);
                    await showActionNotice({
                        title: 'Run failed',
                        message: `Failed to start job ${jobId}.`,
                        detail: (e && e.message) || 'Unknown error',
                        confirmText: 'Close',
                        confirmClass: 'btn-danger'
                    });
                }
            }

        async function showJobDetails(jobId) {
            const modal = document.getElementById('details-modal');
            const content = document.getElementById('details-content');
            const title = document.getElementById('details-job-id');

            title.textContent = jobId;
            content.innerHTML = '<p>Loading...</p>';
            modal.classList.add('active');

            try {
                const resp = await fetch(`${API_BASE}/jobs/${jobId}?token=${API_TOKEN}`);
                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    throw new Error(err.detail || resp.statusText || 'Failed to load job details');
                }
                const job = await resp.json();
                content.innerHTML = renderJobDetails(job || {});
            } catch (e) {
                console.error('Job details error:', e);
                content.innerHTML = `<div class="details-empty" style="color:#ef4444;">Failed to load job details: ${escapeHtml((e && e.message) || 'Unknown error')}</div>`;
            }
        }

        function closeDetailsModal() {
            document.getElementById('details-modal').classList.remove('active');
        }

        // ── Tab Switching ──
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                switchTab(tab);
            });
        });

        function switchTab(tab) {
            currentTab = tab;
            
            // Update buttons
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.tab === tab);
            });
            
            // Update content
            document.querySelectorAll('.tab-content').forEach(c => {
                c.classList.toggle('active', c.id === `tab-${tab}`);
            });
            
            // Load data for non-active tabs
            if (tab !== 'running') {
                loadTab(tab);
            }
        }

        async function loadTab(tab) {
            const container = document.getElementById(`jobs-${tab}`);
            container.innerHTML = '<p class="loading">Loading...</p>';
            
            try {
                const resp = await fetch(`${API_BASE}/jobs/?states=${tab}&limit=50&token=${API_TOKEN}`);
                const data = await resp.json();
                
                // Apply exchange filter + sort newest first
                const filteredJobs = (data.jobs || []).filter(matchesExchangeFilter);
                filteredJobs.sort((a, b) => (b.updated_ts || 0) - (a.updated_ts || 0));
                
                if (filteredJobs.length === 0) {
                    container.innerHTML = `<p class="no-jobs">No ${tab} jobs${EXCHANGE_FILTER ? ' for ' + EXCHANGE_FILTER : ''}.</p>`;
                    return;
                }
                
                container.innerHTML = filteredJobs.map(renderJob).join('');
            } catch (e) {
                console.error(`Load ${tab} error:`, e);
                container.innerHTML = `<p class="error">Failed to load ${tab} jobs.</p>`;
            }
        }

        // Close modal on outside click
        document.getElementById('log-modal').addEventListener('click', (e) => {
            if (e.target.id === 'log-modal') {
                closeLogModal();
            }
        });
        document.getElementById('details-modal').addEventListener('click', (e) => {
            if (e.target.id === 'details-modal') {
                closeDetailsModal();
            }
        });

        document.getElementById('action-modal').addEventListener('click', (e) => {
            if (e.target.id === 'action-modal') {
                closeActionDialog(false);
            }
        });
        document.getElementById('action-modal-close').addEventListener('click', () => closeActionDialog(false));
        document.getElementById('action-modal-cancel').addEventListener('click', () => closeActionDialog(false));
        document.getElementById('action-modal-accept').addEventListener('click', () => closeActionDialog(true));
        document.addEventListener('keydown', (e) => {
            const modal = document.getElementById('action-modal');
            if (!modal.classList.contains('active')) return;
            if (e.key === 'Escape') {
                e.preventDefault();
                closeActionDialog(false);
            } else if (e.key === 'Enter') {
                if (e.target && e.target.id === 'action-modal-cancel') return;
                e.preventDefault();
                closeActionDialog(true);
            }
        });

        // ── Initialize ──
        connectWebSocket();
    </script>
</body>
</html>
