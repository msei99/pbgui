    function triggerPbguiBranchAction(scope) {
      const isMaster = scope === 'master';
      const detail = store.detail && ((isMaster && store.detail.kind === 'master') || (!isMaster && store.detail.kind === 'vps' && store.detail.hostname === scope)) ? store.detail : null;
      if (!detail) return;
      const uiState = isMaster ? store.master : ensureVpsUi(scope, detail);
      const state = detail.branches.pbgui;
      const model = branchModel(state, uiState, 'pbgui');
      if (model.onTarget) return;
      if (isMaster) {
        runMasterWithLog('master-switch-pbgui-branch', 'Switch to ' + model.selectedBranch + (uiState.pbguiCommit !== 'HEAD' ? ' @ ' + shortHash(model.targetCommit) : ''), {
          branch: model.selectedBranch,
          commit: uiState.pbguiCommit !== 'HEAD' ? model.targetCommit : undefined
        });
      } else {
        const extraVars = { branch: model.selectedBranch };
        if (uiState.pbguiCommit !== 'HEAD' && !model.branchChanged && !model.isBehindOrigin) {
          extraVars.commit = model.targetCommit;
        }
        runVpsWithLog(scope, 'vps-switch-pbgui-branch', 'Switch to branch ' + model.selectedBranch + (extraVars.commit ? ' @ ' + shortHash(extraVars.commit) : ''), extraVars, false);
      }
    }

    function triggerPb7BranchAction(scope) {
      const isMaster = scope === 'master';
      const detail = store.detail && ((isMaster && store.detail.kind === 'master') || (!isMaster && store.detail.kind === 'vps' && store.detail.hostname === scope)) ? store.detail : null;
      if (!detail) return;
      const uiState = isMaster ? store.master : ensureVpsUi(scope, detail);
      const state = detail.branches.pb7;
      const branchState = { current_branch: state.current_branch, current_commit: state.current_commit, branches: state.branches };
      const model = branchModel(branchState, uiState, 'pb7');
      const effectiveBranch = String(uiState.pb7ManualBranch || model.selectedBranch || '');
      const effectiveCommit = String(uiState.pb7ManualCommit || (uiState.pb7Commit !== 'HEAD' ? model.targetCommit : ''));
      const extraVars = { pb7_branch: effectiveBranch };
      const remoteName = String(uiState.pb7RemoteName || state.default_remote_name || '');
      const remoteUrl = String(uiState.pb7RemoteUrl || (state.remote_urls || {})[remoteName] || '');
      if (effectiveCommit) extraVars.pb7_commit = effectiveCommit;
      if (remoteUrl) {
        extraVars.pb7_remote_name = remoteName || 'fork';
        extraVars.pb7_remote_url = remoteUrl;
      }
      const label = 'Switch PB7 to ' + effectiveBranch + (effectiveCommit ? ' @ ' + shortHash(effectiveCommit) : '');
      if (isMaster) {
        runMasterWithLog('master-switch-pb7-branch', label, extraVars);
      } else {
        runVpsWithLog(scope, 'vps-switch-pb7-branch', label, extraVars, false);
      }
    }

    function switchPb7ToUpstream(scope) {
      const label = 'Switch PB7 to upstream origin/master';
      const extraVars = {
        pb7_branch: 'master',
        pb7_remote_name: 'origin',
        pb7_remote_url: 'https://github.com/enarjord/passivbot.git'
      };
      if (scope === 'master') {
        store.master.pb7ManualBranch = '';
        store.master.pb7ManualCommit = '';
        store.master.pb7Branch = 'master';
        runMasterWithLog('master-switch-pb7-branch', label, extraVars);
      } else {
        const ui = ensureVpsUi(scope, store.detail && store.detail.hostname === scope ? store.detail : null);
        ui.pb7ManualBranch = '';
        ui.pb7ManualCommit = '';
        ui.pb7Branch = 'master';
        runVpsWithLog(scope, 'vps-switch-pb7-branch', label, extraVars, false);
      }
    }

    function loadRemoteBranches(scope) {
      if (scope === 'master') {
        const state = store.detail && store.detail.kind === 'master' ? store.detail.branches.pb7 : null;
        const remoteName = store.master.pb7RemoteName || (state ? state.default_remote_name : '');
        const remoteUrl = store.master.pb7RemoteUrl || (state ? (state.remote_urls || {})[remoteName] : '') || '';
        if (!remoteUrl) {
          toast('Please provide a remote URL first.', 'warning');
          return;
        }
        send({ cmd: 'load_remote_branches', remote_url: remoteUrl });
      } else {
        const ui = ensureVpsUi(scope, store.detail && store.detail.hostname === scope ? store.detail : null);
        const state = store.detail && store.detail.kind === 'vps' && store.detail.hostname === scope ? store.detail.branches.pb7 : null;
        const remoteName = ui.pb7RemoteName || (state ? state.default_remote_name : '');
        const remoteUrl = ui.pb7RemoteUrl || (state ? (state.remote_urls || {})[remoteName] : '') || '';
        if (!remoteUrl) {
          toast('Please provide a remote URL first.', 'warning');
          return;
        }
        send({ cmd: 'load_remote_branches', remote_url: remoteUrl });
      }
    }

    function asCountLabel(value, singular, plural) {

      if (count === 0) return '0 ' + plural;
      return count + ' ' + (count === 1 ? singular : plural);

    function resourceTone(percent) {
      const value = Number.isFinite(Number(percent)) ? Number(percent) : 0;
      if (value >= 85) return 'error';
      if (value >= 65) return 'warning';
      return 'ok';
    }

    function renderResourceMeter(label, metric) {
      if (!metric) return '';
      var mkey = {'Memory':'mem','Disk':'disk','Swap':'swap'}[label] || label.toLowerCase();
      var usage = Number.isFinite(Number(metric.usage_pct)) ? Math.max(0, Math.min(Number(metric.usage_pct), 100)) : 0;
      return `
        <div class='resource-meter' data-meter='${escAttr(mkey)}'>
          <div class='resource-meter-title'>${esc(label)} Free: ${esc(metric.free_mb || 0)} MB | Used: ${esc(metric.used_mb || 0)} MB | Total: ${esc(metric.total_mb || 0)} MB</div>
          <div class='resource-track'><div class='resource-fill ${resourceTone(usage)}' style='width:${usage}%'></div></div>
        </div>`;
    }

    function formatLatency(value) {
      const numeric = Number(value || 0);
      if (!Number.isFinite(numeric) || numeric <= 0) return 'n/a';
      if (numeric >= 1000) return (numeric / 1000).toFixed(numeric >= 10000 ? 0 : 1) + 's';
      return Math.round(numeric) + 'ms';
    }

    function renderStatusFlags(status) {

        cards.push({ key:'ssh_ok', label: 'SSH Ready', ok: !!status.ssh_ok, sub: status.ssh_ok ? 'SSH port reachable' : 'SSH still not reachable' });
      }
      if (Object.prototype.hasOwnProperty.call(status, 'init_ok') && !(status.summary_row || {}).pbgui) {
        cards.push({ key:'init_ok', label: 'Init Ready', ok: false, sub: 'No successful init yet' });
      }
      if (Object.prototype.hasOwnProperty.call(status, 'setup_ok') && !(status.summary_row || {}).pbgui) {
        cards.push({ key:'setup_ok', label: 'Setup Ready', ok: false, sub: 'No successful setup yet' });
      }
      if (Object.prototype.hasOwnProperty.call(status, 'rclone_ok')) {
        cards.push({ key:'rclone_ok', label: 'Rclone Ready', ok: !!status.rclone_ok, sub: status.rclone_ok ? 'PBRemote bucket available' : 'PBRemote bucket missing' });
      }
      if (Object.prototype.hasOwnProperty.call(status, 'coindata_ok')) {
        const credits = status.cmc_credits;
        let sub = status.coindata_ok ? 'CoinData API OK' : 'CoinData API missing/invalid';

        cards.push({ key:'online', label: 'Online', ok: !!status.online, sub: status.online ? 'Live telemetry received' : 'No current live telemetry' });
      }
      return `
        <div class='status-grid'>
          ${cards.map(function (card) {
            return `<div class='status-item' data-flag='${escAttr(card.key || '')}'><div class='status-label'>${esc(card.label)}</div><div class='status-value'>${boolDot(card.ok)}</div><div class='status-sub'>${esc(card.sub || '')}</div></div>`;

    }

    function renderVpsBranchView(repo) {
      const detail = store.detail && store.detail.kind === 'vps' && store.detail.hostname === store.hostname ? store.detail : null;
      if (!detail) {
        sendContext();
        return `<div class='empty-state'>Waiting for VPS detail for ${esc(store.hostname || 'selected host')}...</div>`;
      }
      const label = repo === 'pbgui' ? 'PBGui' : 'PB7';
      const panel = repo === 'pbgui' ? renderPbguiBranchPanel(detail.hostname, detail.branches.pbgui || {}) : renderPb7BranchPanel(detail.hostname, detail.branches.pb7 || {});
      return `

        <h2 class='page-section-title'>${esc(detail.hostname)} &mdash; ${label} Branch</h2>
        ${panel}`;
    }

    function renderVpsTaskLogView() {
      const detail = store.detail && store.detail.kind === 'vps' && store.detail.hostname === store.hostname ? store.detail : null;
      if (!detail) {
        sendContext();
        return `<div class='empty-state'>Waiting for VPS detail for ${esc(store.hostname || 'selected host')}...</div>`;
      }
      const progress = detail.progress || {};
      const title = store.taskLog.title || progress.command_text || progress.command || 'VPS command log';
      return `

        <div class='log-view-page'>
          <div class='panel'>
          <div class='panel-head'>
            <div>
              <div class='panel-title'>${esc(title)}</div>
            </div>
          </div>
          <div class='panel-body'>
            <div id='task-log-viewer-target' class='task-log-viewer-shell'></div>
          </div>
          </div>
        </div>`;
    }

    function renderVpsHostLogsView() {
      const detail = store.detail && store.detail.kind === 'vps' && store.detail.hostname === store.hostname ? store.detail : null;
      if (!detail) {
        sendContext();
        return `<div class='empty-state'>Waiting for VPS detail for ${esc(store.hostname || 'selected host')}...</div>`;
      }
      const ui = ensureVpsUi(detail.hostname, detail);
      return `
        ${renderLogPanel(detail, ui)}`;
    }

    var BOT_COLUMNS = [
      { label: 'Name',              field: 'name',                  width: '21%', type: 'str' },
      { label: 'CPU',               field: 'cpu',                   width: '6%',  type: 'num' },
      { label: 'Memory',            field: 'memory_mb',             width: '7%',  type: 'num' },
      { label: 'Swap',              field: 'swap_mb',               width: '7%',  type: 'num' },
      { label: 'Errors Today',      field: 'errors_today',          width: '10%', type: 'num' },
      { label: 'Tracebacks Today',  field: 'tracebacks_today',      width: '12%', type: 'num' },
      { label: 'PNL Today',         field: 'pnl_today',             width: '8%',  type: 'num' },
      { label: 'Errors Yesterday',  field: 'errors_yesterday',      width: '10%', type: 'num' },
      { label: 'Tracebacks Yest.',  field: 'tracebacks_yesterday',  width: '12%', type: 'num' },
      { label: 'PNL Yesterday',     field: 'pnl_yesterday',         width: '7%',  type: 'num' },
    ];

    function sortBotTable(field) {
      if (store.botSort.field === field) {
        store.botSort.dir = store.botSort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        store.botSort.field = field;
        store.botSort.dir = 'asc';
      }
      renderUi({ forceView: true });
    }

    function _sortBotItems(items) {
      var s = store.botSort;
      var col = BOT_COLUMNS.find(function(c) { return c.field === s.field; }) || BOT_COLUMNS[0];
      var m = s.dir === 'asc' ? 1 : -1;
      var t = col.type;
      return items.slice().sort(function(a, b) {
        var va = a[s.field], vb = b[s.field];
        if (va == null) va = t === 'num' ? 0 : '';
        if (vb == null) vb = t === 'num' ? 0 : '';
        if (t === 'num') return (Number(va) - Number(vb)) * m;
        return String(va).localeCompare(String(vb)) * m;
      });
    }

    function _cpuTag(v) {
      var n = Number(v) || 0;
      if (n <= 20) return '<span class="tag" style="color:#3ed28b;background:#0d3b20">' + esc(n) + '%</span>';
      if (n <= 40) return '<span class="tag" style="color:#a8d948;background:#1a2d08">' + esc(n) + '%</span>';
      if (n <= 60) return '<span class="tag" style="color:#f4b942;background:#3b2700">' + esc(n) + '%</span>';
      if (n <= 80) return '<span class="tag" style="color:#ef8a40;background:#3b1d00">' + esc(n) + '%</span>';
      return '<span class="tag" style="color:#ef6a70;background:#3b0d0d">' + esc(n) + '%</span>';
    }

    function _memSwapTag(v, suffix, level) {
      var n = Number(v) || 0;
      if (level === 'error')   return '<span class="tag" style="color:#ef6a70;background:#3b0d0d">' + esc(n) + ' ' + suffix + '</span>';
      if (level === 'warning') return '<span class="tag" style="color:#f4b942;background:#3b2700">' + esc(n) + ' ' + suffix + '</span>';
      return '<span class="tag" style="color:#3ed28b;background:#0d3b20">' + esc(n) + ' ' + suffix + '</span>';
    }

    function _metricTag(n) {
      var v = Number(n) || 0;
      if (v === 0)      return '<span class="tag" style="color:#3ed28b;background:#0d3b20">' + esc(v) + '</span>';
      if (v <= 20)     return '<span class="tag" style="color:#a8d948;background:#1a2d08">' + esc(v) + '</span>';
      if (v <= 40)     return '<span class="tag" style="color:#f4b942;background:#3b2700">' + esc(v) + '</span>';
      if (v <= 60)     return '<span class="tag" style="color:#ef8a40;background:#3b1d00">' + esc(v) + '</span>';
      if (v <= 80)     return '<span class="tag" style="color:#ef6a70;background:#3b0d0d">' + esc(v) + '</span>';
      return '<span class="tag" style="color:#cc3333;background:#3d0505">' + esc(v) + '</span>';
    }

    function _renderServiceRowCells(item, host, pbVersion) {
      const hasErrorsToday = Number(item.errors_today || 0) > 0;
      const hasErrorsYesterday = Number(item.errors_yesterday || 0) > 0;
      const hasTracebacksToday = Number(item.tracebacks_today || 0) > 0;
      const hasTracebacksYesterday = Number(item.tracebacks_yesterday || 0) > 0;
      return `\
        <td><div><span class='tag' style='cursor:pointer;color:var(--accent);background:rgba(93,196,255,0.12)' onclick='openBotLog(${js(host)}, ${js(item.name || '')}, ${js(pbVersion)})' title='Open bot log'>${esc(item.name || '-')}</span></div><div class='field-help' title='Bot start time'>${esc(item.start_time || '-')}</div></td>
        <td>${_cpuTag(item.cpu)}</td>
        <td>${_memSwapTag(item.memory_mb, 'MB', (item.levels && item.levels.memory) || 'ok')}</td>
        <td>${_memSwapTag(item.swap_mb, 'MB', (item.levels && item.levels.swap) || 'ok')}</td>
        <td>${hasErrorsToday ? `<span onclick='fetchBotLogMatches(${js(host)}, ${js(item.name || '')}, ${js(pbVersion)}, "errors", "today", ${Number(item.errors_today || 0)})' style='cursor:pointer'>${_metricTag(item.errors_today)}</span>` : _metricTag(item.errors_today)}</td>
        <td>${hasTracebacksToday ? `<span onclick='fetchBotLogMatches(${js(host)}, ${js(item.name || '')}, ${js(pbVersion)}, "tracebacks", "today", ${Number(item.tracebacks_today || 0)})' style='cursor:pointer'>${_metricTag(item.tracebacks_today)}</span>` : _metricTag(item.tracebacks_today)}</td>
        <td>${esc((Number(item.pnl_today) || 0).toFixed(2))}</td>
        <td>${hasErrorsYesterday ? `<span onclick='fetchBotLogMatches(${js(host)}, ${js(item.name || '')}, ${js(pbVersion)}, "errors", "yesterday", ${Number(item.errors_yesterday || 0)})' style='cursor:pointer'>${_metricTag(item.errors_yesterday)}</span>` : _metricTag(item.errors_yesterday)}</td>
        <td>${hasTracebacksYesterday ? `<span onclick='fetchBotLogMatches(${js(host)}, ${js(item.name || '')}, ${js(pbVersion)}, "tracebacks", "yesterday", ${Number(item.tracebacks_yesterday || 0)})' style='cursor:pointer'>${_metricTag(item.tracebacks_yesterday)}</span>` : _metricTag(item.tracebacks_yesterday)}</td>
        <td>${esc((Number(item.pnl_yesterday) || 0).toFixed(2))}</td>`;
    }

    function renderServiceRows(items) {
      if (!Array.isArray(items) || !items.length) {
        return `<div class='empty-state'>No entries in this section.</div>`;
      }
      var sorted = _sortBotItems(items);
      var s = store.botSort;
      return `
        <div class='table-wrap'>
          <table class='table-small'>
            <thead>
              <tr>
                ${BOT_COLUMNS.map(function (col) {
                  var arrow = s.field === col.field ? (s.dir === 'asc' ? ' \u25b4' : ' \u25be') : '';
                  return `<th style='width:${col.width};cursor:pointer' onclick='sortBotTable(${js(col.field)})'>${esc(col.label)}${arrow}</th>`;
                }).join('')}
              </tr>
            </thead>
            <tbody>
              ${sorted.map(function (item) {
                const host = item.server || store.hostname || '';
                const pbVersion = String(item.pb_version || '7');
                return `<tr data-bot='${escAttr(item.name || '')}'>${_renderServiceRowCells(item, host, pbVersion)}</tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>`;
    }

    function renderRunningPb7Fallback(items) {
      if (!Array.isArray(items) || !items.length) {
        return `<div class='empty-state'>No running PB7 instances reported.</div>`;
      }
      return `
        <div class='notice warning'>Live monitor details are currently unavailable. Running PB7 instances are listed from status_v7.json.</div>
        <div class='stack'>
          ${items.map(function (item) {
            return `
              <div class='branch-summary'>
                <span class='tag warning'>Running</span>
                <span class='pill'><strong>Name</strong> ${esc(item.name || '-')}</span>
                <span class='pill'><strong>Config Version</strong> ${esc(item.version || '-')}</span>
                <span class='pill'><strong>Enabled On</strong> ${esc(item.enabled_on || '-')}</span>
                <span class='pill'><strong>Activated</strong> ${esc(item.activate_ts || '-')}</span>
              </div>`;
          }).join('')}
        </div>`;
    }

    function renderMonitorPanel(monitor, isMaster, status) {
      const server = monitor.server || null;
      const serverMetrics = server || {};
      const hasServerMetrics = !!server;
      const pb7Rows = Array.isArray(monitor.v7) ? monitor.v7 : [];
      const pb7Fallback = Array.isArray(monitor.v7_running) ? monitor.v7_running : [];
      const summary = status && status.summary_row ? status.summary_row : {};
      let pb7Content = '';
      if (pb7Rows.length) {
        pb7Content = renderServiceRows(pb7Rows);
        if (pb7Fallback.length) {
          pb7Content += renderRunningPb7Fallback(pb7Fallback);
        }
      } else {
        pb7Content = renderRunningPb7Fallback(pb7Fallback);
      }
      const cpuValue = Number.isFinite(Number(serverMetrics.cpu)) ? Number(serverMetrics.cpu) : 0;
      const cpuPct = Math.max(0, Math.min(cpuValue, 100));
      const metrics = hasServerMetrics ? `
        <div class='stack'>
          <div style='font-size:var(--fs-sm);color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:0.06em'>Telemetry Data</div>
          <div class='resource-grid'>
            <div class='stack'>
              ${renderResourceMeter('Memory', serverMetrics.mem)}
              ${renderResourceMeter('Disk', serverMetrics.disk)}
            </div>
            <div class='stack'>
              ${renderResourceMeter('Swap', serverMetrics.swap)}
              <div class='resource-meter' data-meter='cpu'>
                <div class='resource-meter-title'>CPU ${esc(cpuValue)}%</div>
                <div class='resource-track'><div class='resource-fill ${resourceTone(cpuPct)}' style='width:${cpuPct}%'></div></div>
              </div>
            </div>
          </div>
        </div>` : `<div class='empty-state'>No live server metrics received yet.</div>`;
      return `
        <div class='panel'>
          <div class='panel-body'>
            ${metrics}
            <div class='stack'>
              <div>${pb7Content}</div>
            </div>
          </div>
        </div>`;
    }

    function renderLogPanel(detail, ui) {
      return `
        <div class='log-view-page'>
          <div class='panel'>
          <div class='panel-head'>
            <div>
              <div class='panel-title'>Host Log Viewer</div>
            </div>
          </div>
          <div class='panel-body'>
            <div id='vps-log-viewer-target' class='log-viewer-shell'></div>
          </div>
          </div>
        </div>`;
    }

    function renderVpsProgress(progress) {
      const sections = [
        { label: 'Initialization', status: progress.init_status, when: progress.last_init },
        { label: 'Setup', status: progress.setup_status, when: progress.last_setup },
        { label: 'Update', status: progress.update_status, when: progress.last_update }
      ];
      return `
        <div class='panel'>
          <div class='panel-head'>
            <div>
              <div class='panel-title'>Progress</div>
              <div class='panel-sub'>Separate status buckets for init, setup and update.</div>
            </div>
          </div>
          <div class='panel-body'>
            <div class='field-help'>Use the sidebar action buttons to open the shared command log viewer for full ansible output.</div>
            ${sections.map(function (section) {
              const status = String(section.status || 'idle');
              const cls = status.indexOf('success') >= 0 ? 'ok' : status.indexOf('fail') >= 0 || status.indexOf('error') >= 0 ? 'error' : status === 'idle' || status === 'none' ? 'warning' : 'warning';
              return `
                <div class='stack'>
                  <div class='branch-summary'>
                    <span class='tag ${cls}'>${esc(section.label)}: ${esc(status)}</span>
                    <span class='pill'><strong>Last Change</strong> ${esc(section.when || '-')}</span>
                  </div>
                </div>`;
            }).join('')}
          </div>
        </div>`;
    }

    function renderView(force) {
      const signature = getViewShellSignature();
      if (!force && store.renderSignatures.view === signature) return;
      store.renderSignatures.view = signature;
      let html = '';
      if (store.view === 'add') {
        html = renderAddView();
      } else if (store.view === 'master-task-log') {
        html = renderMasterTaskLogView();
      } else if (store.view === 'master') {
        html = renderMasterView();
      } else if (store.view === 'vps-task-log') {
        html = renderVpsTaskLogView();
      } else if (store.view === 'vps-host-logs') {
        html = renderVpsHostLogsView();
      } else if (store.view === 'vps') {
        html = renderVpsView();
      } else if (store.view === 'vps-setup') {
        html = renderVpsSetupView();
      } else if (store.view === 'vps-pbgui-branch') {
        html = renderVpsBranchView('pbgui');
      } else if (store.view === 'vps-pb7-branch') {
        html = renderVpsBranchView('pb7');
      } else {
        html = renderOverview();
      }
      const viewRoot = document.getElementById('viewRoot');
      const main = document.getElementById('main');
      const isLogView = store.view === 'master-task-log' || store.view === 'vps-task-log' || store.view === 'vps-host-logs';
      viewRoot.classList.toggle('log-view-root', isLogView);
      main.classList.toggle('log-view-active', isLogView);
      viewRoot.innerHTML = html;
    }

    function initSidebarResize() {
      if (window.PBGuiSidebarResize && typeof window.PBGuiSidebarResize.init === 'function') {
        window.PBGuiSidebarResize.init({ sidebarId: 'sidebar', handleId: 'sidebar-resize', minWidth: 220, maxWidth: 420 });
      }
    }

    function renderUi(options) {
      const opts = options || {};
      const sidebarActionsSignature = getSidebarActionsSignature();
      if (opts.forceSidebarActions || store.renderSignatures.sidebarActions !== sidebarActionsSignature) {
        store.renderSignatures.sidebarActions = sidebarActionsSignature;
        renderSidebarActions();
      }
      renderSidebarMeta();
      const sidebarListSignature = getSidebarListSignature();
      if (opts.forceSidebarList || store.renderSignatures.sidebarList !== sidebarListSignature) {
        store.renderSignatures.sidebarList = sidebarListSignature;
        renderSidebarList();
      }
      renderSummaryBar();
      renderView(!!opts.forceView);
      syncTaskLogViewer();
      syncVpsLogViewer();
      refreshCurrentViewLive();
      refreshLocalInteractiveState();
      scheduleVpsSecretSyncPasses();
    }

    document.getElementById('help-ovl').addEventListener('click', function (event) {
      if (event.target === event.currentTarget) closeHelp();
    });

    document.addEventListener('focusin', function (event) {
      const target = event.target;
      if (!(target instanceof HTMLInputElement)) return;
      if (!target.closest('.pw-wrap')) return;
      scheduleVpsSecretSyncPasses();
    });

    restoreViewFromHash();
    renderUi({ forceSidebarActions: true, forceSidebarList: true, forceView: true });
    initSidebarResize();
    initAlertModalInteractions();
    connectWs();
    window.addEventListener('hashchange', function () {
      restoreViewFromHash();
    });
  </script>
  <script src="/app/pbgui_nav.js?v=%%NAV_HASH%%"></script>
</body>
</html>
