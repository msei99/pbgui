    }

    function metricHistoryScale(metric, payload) {
      const unit = metricHistoryUnit(metric, payload);
      const meta = metricHistoryMeta(metric);
      if (meta.countMetric) {
        return {
          baseline: 0,
          guideValues: function(maxValue) {
            const top = Math.max(4, Math.ceil(maxValue / 4) * 4);
            const out = [];
            for (let i = 0; i <= 4; i += 1) out.push(Math.round((top * i) / 4));
            return { maxValue: top, values: out };
          },
          label: function(v) { return String(v); }
        };
      }
      if (meta.fillsMetric) {
        return {
          baseline: 0,
          guideValues: function(maxValue) {
            const top = Math.max(4, Math.ceil(maxValue / 4) * 4);
            const out = [];
            for (let i = 0; i <= 4; i += 1) out.push(Math.round((top * i) / 4));
            return { maxValue: top, values: out };
          },
          label: function(v) { return String(Math.round(v)); }
        };
      }
      if (meta.pnlMetric) {
        return {
          baseline: null,
          guideValues: function(minValue, maxValue) {
            const lo = Math.min(0, Math.floor(minValue));
            const hi = Math.max(0, Math.ceil(maxValue));
            const span = Math.max(hi - lo, 4);
            const step = Math.max(1, Math.ceil(span / 4));
            const out = [];
            for (let value = lo; value <= hi; value += step) out.push(value);
            if (!out.includes(0)) out.push(0);
            out.sort(function(a, b) { return a - b; });
            return { minValue: lo, maxValue: hi === lo ? lo + 1 : hi, values: out };
          },
          label: function(v) { return Number(v).toFixed(2); }
        };
      }
      if (unit === 'MB') {
        return {
          baseline: 0,
          guideValues: function(maxValue) {
            const steps = 4;
            const top = Math.max(1, Math.ceil(maxValue / 50) * 50);
            const out = [];
            for (let i = 0; i <= steps; i += 1) out.push(Math.round((top * i) / steps));
            return { maxValue: top, values: out };
          },
          label: function(v) { return v + 'MB'; }
        };
      }
      return {
        baseline: 100,
        guideValues: function(maxValue) {
          return { maxValue: Math.max(100, maxValue), values: [0, 25, 50, 75, 100] };
        },
        label: function(v) { return v + '%'; }
      };
    }

    function metricHistoryValueLabel(metric, value, payload) {
      if (!Number.isFinite(Number(value))) return 'n/a';
      const meta = metricHistoryMeta(metric);
      const unit = metricHistoryUnit(metric, payload);
      const numeric = Number(value);
      return ((meta.countMetric || meta.fillsMetric) ? String(Math.round(numeric)) : numeric.toFixed(2)) + unit;
    }

    function metricHistorySeriesPoints(metric, payload) {
      const meta = metricHistoryMeta(metric);
      if (meta.fillsMetric && Array.isArray(payload && payload.fills_points)) return payload.fills_points;
      if (meta.pnlMetric && Array.isArray(payload && payload.cumulative_points) && payload.cumulative_points.length) return payload.cumulative_points;
      return Array.isArray(payload && payload.points) ? payload.points : [];
    }

    function formatUtcHourLabel(hour) {

    function formatUtcDayLabel(day) {

    const CPU_HISTORY_MARGIN = 16;
    const CPU_HISTORY_MIN_WIDTH = 520;
    const CPU_HISTORY_MIN_HEIGHT = 320;

    function getCpuHistoryRectLimits() {
      const maxWidth = Math.max(320, window.innerWidth - (CPU_HISTORY_MARGIN * 2));
      const maxHeight = Math.max(240, window.innerHeight - (CPU_HISTORY_MARGIN * 2));
      return {
        minWidth: Math.min(CPU_HISTORY_MIN_WIDTH, maxWidth),
        minHeight: Math.min(CPU_HISTORY_MIN_HEIGHT, maxHeight),
        maxWidth: maxWidth,
        maxHeight: maxHeight,
      };
    }

    function clampCpuHistoryRect(rect) {
      const limits = getCpuHistoryRectLimits();
      const width = Math.min(Math.max(rect.width, limits.minWidth), limits.maxWidth);
      const height = Math.min(Math.max(rect.height, limits.minHeight), limits.maxHeight);
      const maxLeft = Math.max(CPU_HISTORY_MARGIN, window.innerWidth - width - CPU_HISTORY_MARGIN);
      const maxTop = Math.max(CPU_HISTORY_MARGIN, window.innerHeight - height - CPU_HISTORY_MARGIN);
      return {
        left: Math.min(Math.max(rect.left, CPU_HISTORY_MARGIN), maxLeft),
        top: Math.min(Math.max(rect.top, CPU_HISTORY_MARGIN), maxTop),
        width: width,
        height: height,
      };
    }

    function applyCpuHistoryRect(rect) {
      const box = document.getElementById('cpuHistoryBox');
      if (!box) return;
      const next = clampCpuHistoryRect(rect);
      box.style.left = next.left + 'px';
      box.style.top = next.top + 'px';
      box.style.width = next.width + 'px';
      box.style.height = next.height + 'px';
    }

    function resetCpuHistoryWindow() {

    function prepareCpuHistoryWindow(widthPx, heightPx) {
      const box = document.getElementById('cpuHistoryBox');
      if (!box) return;
      box.classList.add('modal-history-window');
      applyCpuHistoryRect({
        left: Math.round((window.innerWidth - (widthPx || 980)) / 2),
        top: Math.round((window.innerHeight - (heightPx || 560)) / 2),
        width: widthPx || 980,
        height: heightPx || 560,
      });

    function initCpuHistoryModalInteractions() {
      const box = document.getElementById('cpuHistoryBox');
      const head = document.getElementById('cpuHistoryHead');
      const resizeHandles = Array.from(box ? box.querySelectorAll('.cpu-history-resize-handle[data-resize]') : []);
      if (!box || !head || !resizeHandles.length) return;
      let drag = null;
      let resize = null;
      function releasePointer(target, pointerId) {
        try { target.releasePointerCapture(pointerId); } catch (error) {}
      }
      head.addEventListener('pointerdown', function (event) {
        if (!box.classList.contains('modal-history-window')) return;
        if (event.button !== 0) return;
        if (event.target && event.target.closest('.close-btn')) return;
        const rect = box.getBoundingClientRect();
        drag = { pointerId: event.pointerId, dx: event.clientX - rect.left, dy: event.clientY - rect.top };
        head.setPointerCapture(event.pointerId);
        event.preventDefault();
      });
      head.addEventListener('pointermove', function (event) {
        if (!drag || drag.pointerId !== event.pointerId || !box.classList.contains('modal-history-window')) return;
        applyCpuHistoryRect({ left: event.clientX - drag.dx, top: event.clientY - drag.dy, width: box.offsetWidth, height: box.offsetHeight });
      });
      head.addEventListener('pointerup', function (event) {
        if (!drag || drag.pointerId !== event.pointerId) return;
        drag = null;
        releasePointer(head, event.pointerId);
      });
      head.addEventListener('pointercancel', function (event) {
        if (!drag || drag.pointerId !== event.pointerId) return;
        drag = null;
        releasePointer(head, event.pointerId);
      });
      function updateResizeRect(base, direction, clientX, clientY) {
        const dx = clientX - base.startX;
        const dy = clientY - base.startY;
        let nextLeft = base.left;
        let nextTop = base.top;
        let nextWidth = base.width;
        let nextHeight = base.height;

        if (direction.indexOf('right') !== -1) {
          nextWidth = base.width + dx;
        }
        if (direction.indexOf('left') !== -1) {
          nextWidth = base.width - dx;
          nextLeft = base.left + dx;
        }
        if (direction.indexOf('bottom') !== -1) {
          nextHeight = base.height + dy;
        }
        if (direction.indexOf('top') !== -1) {
          nextHeight = base.height - dy;
          nextTop = base.top + dy;
        }

        applyCpuHistoryRect({ left: nextLeft, top: nextTop, width: nextWidth, height: nextHeight });
      }

      resizeHandles.forEach(function (handle) {
        handle.addEventListener('pointerdown', function (event) {
          if (!box.classList.contains('modal-history-window')) return;
          if (event.button !== 0) return;
          const rect = box.getBoundingClientRect();
          resize = {
            pointerId: event.pointerId,
            startX: event.clientX,
            startY: event.clientY,
            left: rect.left,
            top: rect.top,
            width: rect.width,
            height: rect.height,
            direction: String(handle.getAttribute('data-resize') || ''),
            handle: handle,
          };
          handle.setPointerCapture(event.pointerId);
          event.preventDefault();
          event.stopPropagation();
        });
        handle.addEventListener('pointermove', function (event) {
          if (!resize || resize.pointerId !== event.pointerId || resize.handle !== handle || !box.classList.contains('modal-history-window')) return;
          updateResizeRect(resize, resize.direction, event.clientX, event.clientY);
        });
        handle.addEventListener('pointerup', function (event) {
          if (!resize || resize.pointerId !== event.pointerId || resize.handle !== handle) return;
          resize = null;
          releasePointer(handle, event.pointerId);
        });
        handle.addEventListener('pointercancel', function (event) {
          if (!resize || resize.pointerId !== event.pointerId || resize.handle !== handle) return;
          resize = null;
          releasePointer(handle, event.pointerId);
        });
      });
    }

    let cpuHistoryDisplayMetric = 'cpu';

    window.openMetricHistory = function openMetricHistory(hostname, metricName, botName) {
      const host = String(hostname || '').trim();

      const requestMetric = metric === 'pnl_fills' ? 'pnl' : metric;

      fetch(API_BASE + '/metric-history/' + encodeURIComponent(host) + '?token=' + encodeURIComponent(TOKEN) + '&metric=' + encodeURIComponent(requestMetric) + (bot ? '&bot_name=' + encodeURIComponent(bot) : ''))
        .then(function (response) {
          if (!response.ok) throw new Error('metric history fetch failed');
          return response.json();
        })
        .then(function (data) {
          const payload = data || {};

    function getCpuHistoryTarget(target) {
      if (!target || typeof target.closest !== 'function') return null;
      const trigger = target.closest('[data-history-host], [data-cpu-history-host]');
      if (!trigger) return null;
      const host = String(trigger.getAttribute('data-history-host') || trigger.getAttribute('data-cpu-history-host') || '').trim();
      const bot = String(trigger.getAttribute('data-history-bot') || trigger.getAttribute('data-cpu-history-bot') || '').trim();
      const metric = String(trigger.getAttribute('data-history-metric') || 'cpu').trim().toLowerCase() || 'cpu';
      if (!host) return null;

    let lastCpuHistoryOpen = { key: '', ts: 0 };
    const CPU_HISTORY_DEBUG = (new URLSearchParams(window.location.search).get('cpu_debug') || '') === '1';

    function handleCpuHistoryInteraction(event) {
      const cpuTarget = getCpuHistoryTarget(event.target);
      if (!cpuTarget) return;
      const key = cpuTarget.metric + '::' + cpuTarget.host + '::' + cpuTarget.bot;
      const now = Date.now();
      if (lastCpuHistoryOpen.key === key && (now - lastCpuHistoryOpen.ts) < 400) {
        event.preventDefault();
        event.stopPropagation();
        return;
      }
      lastCpuHistoryOpen = { key: key, ts: now };
      event.preventDefault();
      event.stopPropagation();
      if (CPU_HISTORY_DEBUG) {
        toast('History click debug: ' + cpuTarget.metric + ' ' + cpuTarget.host + (cpuTarget.bot ? ' / ' + cpuTarget.bot : ''), 'info');
      }
      openMetricHistory(cpuTarget.host, cpuTarget.metric, cpuTarget.bot);

    function renderCpuHistoryMeta(data, points, metric) {
      const valid = points.filter(function (v) { return typeof v === 'number' && Number.isFinite(v); });
      const latest = valid.length ? valid[valid.length - 1] : null;
      const peak = valid.length ? Math.max.apply(null, valid) : null;
      const totalPnl = Number.isFinite(Number(data && data.total_pnl)) ? Number(data.total_pnl) : null;
      const totalFills = Number.isFinite(Number(data && data.total_fills)) ? Number(data.total_fills) : null;
      const bestDayPnl = Number.isFinite(Number(data && data.best_day_pnl)) ? Number(data.best_day_pnl) : null;
      const worstDayPnl = Number.isFinite(Number(data && data.worst_day_pnl)) ? Number(data.worst_day_pnl) : null;
      const lastFillTs = Number.isFinite(Number(data && data.last_fill_ts)) ? Number(data.last_fill_ts) : 0;
      const warningThreshold = Number.isFinite(Number(data && data.warning_threshold)) ? Number(data.warning_threshold) : null;
      const errorThreshold = Number.isFinite(Number(data && data.error_threshold)) ? Number(data.error_threshold) : null;
      const lastMinute = Number.isFinite(Number(data && data.last_minute)) ? Number(data.last_minute) : 0;
      const lastHour = Number.isFinite(Number(data && data.last_hour)) ? Number(data.last_hour) : 0;
      const lastSeen = lastMinute > 0 ? new Date(lastMinute * 60000).toLocaleString() : 'n/a';
      const lastSeenHourly = formatUtcHourLabel(lastHour);
      const meta = metricHistoryMeta(metric);
      const showThresholds = !meta.pnlMetric && !meta.fillsMetric;
      return `<div class='cpu-chart-meta'>`
        + (meta.pnlMetric ? cpuChartPill('Total PNL', metricHistoryValueLabel(metric, totalPnl, data)) : '')
        + ((meta.pnlMetric || meta.fillsMetric) ? cpuChartPill('Total fills', String(totalFills == null ? 'n/a' : totalFills)) : '')
        + cpuChartPill('Latest', metricHistoryValueLabel(metric, latest, data))
        + cpuChartPill('Peak', metricHistoryValueLabel(metric, peak, data))
        + (meta.pnlMetric && bestDayPnl != null ? cpuChartPill('Best day', metricHistoryValueLabel(metric, bestDayPnl, data)) : '')
        + (meta.pnlMetric && worstDayPnl != null ? cpuChartPill('Worst day', metricHistoryValueLabel(metric, worstDayPnl, data)) : '')
        + (showThresholds && warningThreshold != null ? cpuChartPill('Warning', metricHistoryValueLabel(metric, warningThreshold, data)) : '')
        + (showThresholds && errorThreshold != null ? cpuChartPill('Error', metricHistoryValueLabel(metric, errorThreshold, data)) : '')
        + cpuChartPill(meta.countMetric ? 'Last hour' : ((meta.pnlMetric || meta.fillsMetric) ? 'Last fill' : 'Last sample'), meta.countMetric ? lastSeenHourly : ((meta.pnlMetric || meta.fillsMetric) ? (lastFillTs > 0 ? new Date(lastFillTs * 1000).toISOString().replace('T', ' ').slice(0, 19) + ' UTC' : 'n/a') : lastSeen))
        + `</div>`;
    }

    function cpuChartPill(label, value) {
      return `<span class='cpu-chart-pill'><strong>${esc(label)}:</strong> ${esc(value)}</span>`;
    }

    function getCpuHistoryChartHeight() {
      const chart = document.getElementById('cpuHistoryBody');
      if (!chart) return 280;
      const style = window.getComputedStyle(chart);
      const paddingTop = parseFloat(style.paddingTop) || 0;
      const paddingBottom = parseFloat(style.paddingBottom) || 0;
      const available = chart.clientHeight - paddingTop - paddingBottom;
      return Math.max(220, Math.round(available || 280));
    }

    function renderCpuHistoryChart(data, points, metric) {
      if (!points.length) {
        return `<div class='empty-state'>No history available yet.</div>`;
      }
      const meta = metricHistoryMeta(metric);
      const chartPoints = points;
      const valid = chartPoints.map(function (value, index) {
        return typeof value === 'number' && Number.isFinite(value) ? { index: index, value: value } : null;
      }).filter(Boolean);
      if (!valid.length) {
        return `<div class='empty-state'>${metricHistoryEmpty(metric, data)}</div>`;
      }
      const width = 920;
      const height = getCpuHistoryChartHeight();
      const warningThreshold = !meta.pnlMetric && !meta.fillsMetric && Number.isFinite(Number(data && data.warning_threshold)) ? Number(data.warning_threshold) : null;
      const errorThreshold = !meta.pnlMetric && !meta.fillsMetric && Number.isFinite(Number(data && data.error_threshold)) ? Number(data.error_threshold) : null;
      const scale = metricHistoryScale(metric, data);
      const values = valid.map(function (item) { return item.value; });
      const minRaw = Math.min.apply(null, values.concat([warningThreshold || 0, errorThreshold || 0]));
      const maxRaw = Math.max.apply(null, values.concat([warningThreshold || 0, errorThreshold || 0]));
      const guidesMeta = meta.pnlMetric ? scale.guideValues(minRaw, maxRaw) : scale.guideValues(Math.max(scale.baseline, maxRaw));
      const guideLabelWidth = guidesMeta.values.reduce(function (maxLen, value) {
        return Math.max(maxLen, String(scale.label(value)).length);
      }, 0);
      const pad = { left: Math.max(42, Math.min(112, 12 + guideLabelWidth * 7)), right: 14, top: 14, bottom: 28 };
      const innerW = width - pad.left - pad.right;
      const innerH = height - pad.top - pad.bottom;
      const minValue = meta.pnlMetric ? guidesMeta.minValue : 0;
      const maxValue = guidesMeta.maxValue;
      function x(index) { return pad.left + (index / Math.max(chartPoints.length - 1, 1)) * innerW; }
      function y(value) { return pad.top + innerH - ((value - minValue) / Math.max(maxValue - minValue, 1e-9)) * innerH; }
      let path = '';
      valid.forEach(function (item, idx) {
        path += (idx === 0 ? 'M' : ' L') + x(item.index).toFixed(1) + ' ' + y(item.value).toFixed(1);
      });
      const pointMarkers = (meta.pnlMetric || meta.fillsMetric) ? valid.map(function (item) {
        return `<circle cx='${x(item.index).toFixed(1)}' cy='${y(item.value).toFixed(1)}' r='${valid.length === 1 ? 4 : 3}' fill='rgba(93,196,255,0.95)' stroke='rgba(5,9,15,0.9)' stroke-width='1.2' />`;
      }).join('') : '';
      const guides = guidesMeta.values.filter(function (v, i, arr) {
        return v <= maxValue || i === arr.length - 1;
      }).map(function (v) {
        const yy = y(v);
        return `<line x1='${pad.left}' y1='${yy.toFixed(1)}' x2='${(width - pad.right)}' y2='${yy.toFixed(1)}' stroke='rgba(255,255,255,0.08)' stroke-width='1' />`
          + `<text x='${pad.left - 8}' y='${(yy + 4).toFixed(1)}' text-anchor='end' fill='rgba(255,255,255,0.55)' font-size='11'>${scale.label(v)}</text>`;
      }).join('');
      let dailyLine = '';
      let dailyLabels = '';
      if (meta.countMetric && Array.isArray(data && data.daily_points) && data.daily_points.length) {
        const dailyPoints = data.daily_points.map(function (value, index) {
          return typeof value === 'number' && Number.isFinite(value) ? { index: index, value: value } : null;
        }).filter(Boolean);
        const dayCount = Math.max((data && data.daily_points && data.daily_points.length) || 0, 1);
        const dayPath = dailyPoints.map(function (item, idx) {
          const dayX = pad.left + (((item.index + 0.5) / dayCount) * innerW);
          return (idx === 0 ? 'M' : ' L') + dayX.toFixed(1) + ' ' + y(item.value).toFixed(1);
        }).join('');
        if (dayPath) {
          dailyLine = `<path d='${dayPath}' fill='none' stroke='rgba(171,219,255,0.92)' stroke-width='2' stroke-linejoin='round' stroke-linecap='round'></path>`;
        }
        dailyLabels = `<text x='${pad.left}' y='${pad.top + 14}' fill='rgba(171,219,255,0.9)' font-size='11'>daily UTC</text>`
          + `<text x='${pad.left + 72}' y='${pad.top + 14}' fill='rgba(93,196,255,0.72)' font-size='11'>hourly UTC</text>`;
      }
      const warningLine = warningThreshold == null ? '' : `<line x1='${pad.left}' y1='${y(warningThreshold).toFixed(1)}' x2='${(width - pad.right)}' y2='${y(warningThreshold).toFixed(1)}' stroke='rgba(244,185,66,0.85)' stroke-width='1.5' stroke-dasharray='6 4' />`;
      const errorLine = errorThreshold == null ? '' : `<line x1='${pad.left}' y1='${y(errorThreshold).toFixed(1)}' x2='${(width - pad.right)}' y2='${y(errorThreshold).toFixed(1)}' stroke='rgba(255,75,75,0.78)' stroke-width='1.5' stroke-dasharray='6 4' />`;
      const warningLabel = warningThreshold == null ? '' : `<text x='${width - pad.right}' y='${(y(warningThreshold) - 6).toFixed(1)}' text-anchor='end' fill='rgba(244,210,120,0.95)' font-size='11'>warning ${metricHistoryValueLabel(metric, warningThreshold, data)}</text>`;
      const errorLabel = errorThreshold == null ? '' : `<text x='${width - pad.right}' y='${(y(errorThreshold) + 14).toFixed(1)}' text-anchor='end' fill='rgba(255,120,120,0.95)' font-size='11'>error ${metricHistoryValueLabel(metric, errorThreshold, data)}</text>`;
      const zeroLine = meta.pnlMetric && minValue < 0 && maxValue > 0 ? `<line x1='${pad.left}' y1='${y(0).toFixed(1)}' x2='${(width - pad.right)}' y2='${y(0).toFixed(1)}' stroke='rgba(255,255,255,0.18)' stroke-width='1' stroke-dasharray='3 3' />` : '';
      const rangeLabel = meta.countMetric ? '4 week' : ((meta.pnlMetric || meta.fillsMetric) ? 'full' : '24 hour');
      const startLabel = meta.countMetric ? '4w ago' : ((meta.pnlMetric || meta.fillsMetric) ? 'first day' : '24h ago');
      let xAxisLabels = '';
      if ((meta.pnlMetric || meta.fillsMetric) && Array.isArray(data && data.days) && data.days.length) {
        const tickCount = Math.min(4, data.days.length);
        const ticks = [];
        for (let i = 0; i < tickCount; i += 1) {
          const idx = tickCount === 1 ? 0 : Math.round(((data.days.length - 1) * i) / (tickCount - 1));
          if (ticks.some(function (tick) { return tick.index === idx; })) continue;
          ticks.push({ index: idx, label: formatUtcDayLabel(data.days[idx]) });
        }
        xAxisLabels = ticks.map(function (tick) {
          const xx = x(tick.index).toFixed(1);
          const anchor = tick.index === 0 ? 'start' : (tick.index === chartPoints.length - 1 ? 'end' : 'middle');
          return `<text x='${xx}' y='${height - 8}' text-anchor='${anchor}' fill='rgba(255,255,255,0.55)' font-size='11'>${esc(tick.label)}</text>`;
        }).join('');
      }
      return `
        <div class='cpu-chart-wrap'>
          <svg class='cpu-chart-svg' viewBox='0 0 ${width} ${height}' preserveAspectRatio='none' role='img' aria-label='${escAttr(rangeLabel)} ${escAttr(metricHistoryMeta(metric).label)} history chart'>
            <rect x='0' y='0' width='${width}' height='${height}' rx='10' fill='rgba(5,9,15,0.55)'></rect>
            ${guides}
            ${zeroLine}
            ${warningLine}
            ${errorLine}
            ${warningLabel}
            ${errorLabel}
            ${dailyLine}
            <path d='${path}' fill='none' stroke='rgba(93,196,255,0.95)' stroke-width='2.5' stroke-linejoin='round' stroke-linecap='round'></path>
            ${pointMarkers}
            ${dailyLabels}
            ${xAxisLabels || `<text x='${pad.left}' y='${height - 8}' fill='rgba(255,255,255,0.55)' font-size='11'>${startLabel}</text><text x='${width - pad.right}' y='${height - 8}' text-anchor='end' fill='rgba(255,255,255,0.55)' font-size='11'>now</text>`}
          </svg>
        </div>`;
    }

    function formatLatency(value) {
      const numeric = Number(value || 0);
      if (!Number.isFinite(numeric) || numeric <= 0) return 'n/a';
      if (numeric >= 1000) return (numeric / 1000).toFixed(numeric >= 10000 ? 0 : 1) + 's';
      return Math.round(numeric) + 'ms';
    }

    function renderStatusFlags(status) {
      const cards = [];
      if (Object.prototype.hasOwnProperty.call(status, 'hosts_ok')) {
        cards.push({ key:'hosts_ok', label: 'Hosts Ready', ok: !!status.hosts_ok, sub: status.hosts_ok ? 'IP and hostname configured locally' : 'Missing /etc/hosts entry' });
      }
      if (Object.prototype.hasOwnProperty.call(status, 'ssh_ok')) {
        cards.push({ key:'ssh_ok', label: 'SSH Ready', ok: !!status.ssh_ok, sub: status.ssh_ok ? 'SSH port reachable' : 'SSH still not reachable' });
      }
      if (Object.prototype.hasOwnProperty.call(status, 'init_ok') && !(status.summary_row || {}).pbgui) {
        cards.push({ key:'init_ok', label: 'Init Ready', ok: false, sub: 'No successful init yet' });
      }
      if (Object.prototype.hasOwnProperty.call(status, 'setup_ok') && !(status.summary_row || {}).pbgui) {
        cards.push({ key:'setup_ok', label: 'Setup Ready', ok: false, sub: 'No successful setup yet' });
      }
      if (Object.prototype.hasOwnProperty.call(status, 'rclone_ok')) {
        const configured = Object.prototype.hasOwnProperty.call(status, 'pbremote_configured') ? !!status.pbremote_configured : true;
        cards.push(configured
          ? { key:'rclone_ok', label: 'Rclone Ready', ok: !!status.rclone_ok, sub: status.rclone_ok ? 'PBRemote bucket available' : 'PBRemote bucket missing' }
          : { key:'rclone_ok', label: 'Rclone Ready', valueHtml: `<span class='dot info'></span>Skipped`, sub: 'PBRemote bucket not configured' });
      }
      if (Object.prototype.hasOwnProperty.call(status, 'coindata_ok')) {
        const configured = Object.prototype.hasOwnProperty.call(status, 'coindata_configured') ? !!status.coindata_configured : true;
        const credits = status.cmc_credits;
        let sub = configured ? (status.coindata_ok ? 'CoinData API OK' : 'CoinData API missing/invalid') : 'CoinMarketCap API key not configured';
        if (configured && credits !== null && credits !== undefined && String(credits).trim() !== '') {
          sub = asCountLabel(credits, 'credit left', 'credits left');
        }
        cards.push(configured
          ? { key:'coindata_ok', label: 'CoinData Ready', ok: !!status.coindata_ok, sub: sub }
          : { key:'coindata_ok', label: 'CoinData Ready', valueHtml: `<span class='dot info'></span>Skipped`, sub: sub });
      }
      if (Object.prototype.hasOwnProperty.call(status, 'online')) {
        const telemetryAge = Number(status.telemetry_age);
        const staleSub = status.telemetry_stale
          ? ('Telemetry stale' + (Number.isFinite(telemetryAge) && telemetryAge > 0 ? ' (' + formatLatency(telemetryAge * 1000) + ' ago)' : ''))
          : 'No current live telemetry';
        cards.push({ key:'online', label: 'Online', ok: !!status.online, sub: status.online ? 'Live telemetry received' : staleSub });
      }
      if (store.detail && store.detail.kind === 'vps' && store.detail.hostname) {
        const userPwStatus = getSecretStatus(store.detail.hostname, 'user_pw');
        if (userPwStatus.stored) {
          cards.push({
            key:'session_user_pw',
            label: 'Session Password',
            ok: Number(userPwStatus.remaining_seconds || 0) > 0,
            sub: Number(userPwStatus.remaining_seconds || 0) > 0 ? 'Stored for ' + formatRemainingSeconds(userPwStatus.remaining_seconds) : 'Expired - enter again'
          });
        }
      }
      return `
        <div class='status-grid'>
          ${cards.map(function (card) {
            return `<div class='status-item' data-flag='${escAttr(card.key || '')}'><div class='status-label'>${esc(card.label)}</div><div class='status-value'>${card.valueHtml || boolDot(card.ok)}</div><div class='status-sub'>${esc(card.sub || '')}</div></div>`;
          }).join('')}
        </div>`;
    }

    function renderUfwSafetySummary(safety) {
      if (!safety) return '';
      const blocking = Array.isArray(safety.blocking) ? safety.blocking : [];
      const warnings = Array.isArray(safety.warnings) ? safety.warnings : [];
      if (!blocking.length && !warnings.length) return `<div class='notice ok'>Safety check passed.</div>`;
      return `
        ${blocking.length ? `<div class='notice error'><strong>Blocked</strong><br>${blocking.map(esc).join('<br>')}</div>` : ''}
        ${warnings.length ? `<div class='notice warning'><strong>Warnings</strong><br>${warnings.map(esc).join('<br>')}</div>` : ''}`;
    }

      const rules = Array.isArray(store.ufw.rules) ? store.ufw.rules : [];
      if (!rules.length) return `<div class='empty-state'>No UFW rules loaded. Click Read UFW.</div>`;
      return `
        <table class='data-table'>
          <thead><tr><th>#</th><th>To</th><th>Action</th><th>From</th><th>Comment</th><th>Delete</th></tr></thead>
          <tbody>
            ${rules.map(function (rule) {
              const number = Number(rule.number || 0);
              const checked = !!(store.ufw.deleteNumbers || {})[String(number)];
              const sshRule = String(rule.to || '').indexOf('22') >= 0;
              return `<tr class='${checked ? 'selected' : ''}'>
                <td>${esc(number)}</td>
                <td>${esc(rule.to || '')}</td>
                <td>${esc(rule.action || '')}</td>
                <td>${esc(rule.from || '')}</td>
                <td>${esc(rule.comment || '')}</td>
                <td><label class='checkbox-row'><input type='checkbox' ${checked ? 'checked' : ''} onchange='toggleUfwDelete(${js(number)}, this.checked)'> ${sshRule ? 'Delete SSH rule' : 'Delete'}</label></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`;

    function renderUfwPendingAdds() {
      const rows = Array.isArray(store.ufw.addRules) ? store.ufw.addRules : [];
      if (!rows.length) return `<div class='field-help'>No pending rules to add.</div>`;

        <table class='data-table compact'>

          <tbody>
            ${rows.map(function (rule, index) {
              return `<tr>
                <td>${esc(rule.port)}</td>
                <td>${esc(rule.proto)}</td>
                <td>${esc(rule.from)}</td>
                <td>${esc(rule.comment || '')}</td>

              </tr>`;

      const adds = Array.isArray(preview.add_rules) ? preview.add_rules : [];

          <div><strong>Delete:</strong> ${deletes.length ? deletes.map(function (n) { return '[' + esc(n) + ']'; }).join(', ') : 'none'}</div>
          <div><strong>Add:</strong></div>
          ${adds.length ? `<ul>${adds.map(function (rule) { return `<li>${esc(rule.port)}/${esc(rule.proto)} from ${esc(rule.from)}${rule.comment ? ' # ' + esc(rule.comment) : ''}</li>`; }).join('')}</ul>` : `<div class='field-help'>none</div>`}
        </div>`;
    }

    function openUfwPreviewModal(data) {
      const preview = (data || {}).preview || {};
      const safety = preview.safety || {};
      const blocked = !!(data || {}).stale || (Array.isArray(safety.blocking) && safety.blocking.length > 0);

      box.className = 'notice';
      box.innerHTML = renderUfwPreviewHtml(data);
      document.getElementById('alertModalBtnRow').innerHTML = blocked
        ? '<button class="btn ghost" type="button" onclick="closeAlertModal()">Close</button>'
        : '<button class="btn ghost" type="button" onclick="closeAlertModal()">Cancel</button> <button class="btn primary" type="button" id="ufw-apply-confirm">Apply Changes</button>';

      ensureMasterUi(detail);

      const summary = status.summary_row || {};
      const masterRtd = detail.monitor && detail.monitor.server ? detail.monitor.server.rtd : null;

    function renderReadSettingsProgress(ui) {
      const progress = (ui || {}).readSettingsProgress || {};
      const steps = Array.isArray(progress.steps) ? progress.steps : [];
      if (!steps.length) return '';
      const current = String(progress.current || '');
      const status = String(progress.status || 'running');
      const expectedTasks = [
        { step: 'queued', label: 'Queued' },
        { step: 'start', label: 'Prepare' },
        { step: 'password', label: 'Password' },
        { step: 'ssh', label: 'Connect' },
        { step: 'remote_config', label: 'Config' },
        { step: 'firewall', label: 'Firewall' },
        { step: 'save', label: 'Save' },
        { step: 'done', label: 'Done' }
      ];
      const seenByStep = {};
      steps.forEach(function (item) {
        const step = String((item || {}).step || '');
        if (step) seenByStep[step] = item || {};
      });
      const tasks = expectedTasks.map(function (task) {
        const seen = seenByStep[task.step] || null;
        return {
          step: task.step,
          label: seen && seen.label ? String(seen.label) : task.label,
          status: seen ? String(seen.status || 'running') : (status === 'done' ? 'done' : 'pending')
        };
      });
      steps.forEach(function (item) {
        const step = String((item || {}).step || '');
        if (step && !expectedTasks.some(function (task) { return task.step === step; })) {
          tasks.push({
            step: step,
            label: String((item || {}).label || step),
            status: String((item || {}).status || 'running')
          });
        }
      });
      const doneCount = tasks.filter(function (item) { return String(item.status || '') === 'done'; }).length;
      const percent = status === 'done'
        ? 100
        : Math.max(status === 'error' ? 0 : 5, Math.min(99, Math.round((doneCount / Math.max(1, tasks.length)) * 100)));
      const color = status === 'error' ? 'var(--danger)' : (status === 'done' ? 'var(--ok)' : 'var(--accent)');
      const title = status === 'done'
        ? 'Read VPS settings completed'
        : (status === 'error' ? 'Read VPS settings failed' : 'Reading VPS settings...');
      const currentEntry = steps.find(function (item) { return String((item || {}).step || '') === current; }) || steps[steps.length - 1] || {};
      const currentLabel = String(currentEntry.label || progress.label || title);
      return `
        <div class='read-settings-progress ${status === 'error' ? 'error' : ''}'>
          <div class='read-settings-progress-head'>
            <div>
              <div class='read-settings-progress-title'>${esc(title)}</div>
              <div class='field-help'>${esc(currentLabel)}</div>
            </div>
            <div class='read-settings-progress-percent'>${esc(String(percent))}%</div>
          </div>
          <div class='deploy-progress-bar'><div class='deploy-progress-fill' style='width:${escAttr(String(percent))}%;background:${escAttr(color)}'></div></div>
          <div class='read-settings-task-grid'>
            ${tasks.map(function (item) {
              const itemStatus = String(item.status || 'pending');
              const stateLabel = itemStatus === 'done' ? 'Done' : (itemStatus === 'error' ? 'Error' : (itemStatus === 'running' ? 'Active' : 'Open'));
              return `<div class='read-settings-task ${escAttr(itemStatus)}'><span>${esc(item.label || '')}</span><span class='read-settings-task-state'>${esc(stateLabel)}</span></div>`;
            }).join('')}
          </div>
        </div>`;
    }

    function sortBotTable(field) {
      if (store.botSort.field === field) {
        store.botSort.dir = store.botSort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        store.botSort.field = field;
        store.botSort.dir = 'asc';
      }
      renderUi({ forceView: true });
    }

    function _sortBotItems(items) {
      var s = store.botSort;
      var col = BOT_COLUMNS.find(function(c) { return c.field === s.field; }) || BOT_COLUMNS[0];
      var m = s.dir === 'asc' ? 1 : -1;
      var t = col.type;
      return items.slice().sort(function(a, b) {
        var va = a[s.field], vb = b[s.field];
        if (va == null) va = t === 'num' ? 0 : '';
        if (vb == null) vb = t === 'num' ? 0 : '';
        if (t === 'num') return (Number(va) - Number(vb)) * m;
        return String(va).localeCompare(String(vb)) * m;
      });
    }

    function _cpuTag(v) {
      var n = Number(v) || 0;
      if (n <= 20) return '<span class="tag" style="color:#3ed28b;background:#0d3b20">' + esc(n) + '%</span>';
      if (n <= 40) return '<span class="tag" style="color:#a8d948;background:#1a2d08">' + esc(n) + '%</span>';
      if (n <= 60) return '<span class="tag" style="color:#f4b942;background:#3b2700">' + esc(n) + '%</span>';
      if (n <= 80) return '<span class="tag" style="color:#ef8a40;background:#3b1d00">' + esc(n) + '%</span>';
      return '<span class="tag" style="color:#ef6a70;background:#3b0d0d">' + esc(n) + '%</span>';
    }

    function _cpuSubline(item) {
      const cpu60s = Number(item && item.cpu_60s);
      const cpu60sWindow = Number(item && item.cpu_60s_window);
      const cpu60sConfirmed = !!(item && item.cpu_60s_confirmed) || cpu60sWindow >= 60;
      if (cpu60sConfirmed) return '60s CPU ' + (Number.isFinite(cpu60s) ? cpu60s.toFixed(1) : '0.0') + '%';
      if (Number.isFinite(cpu60sWindow) && cpu60sWindow > 0) return '60s CPU warming up (' + Math.min(60, Math.floor(cpu60sWindow)) + 's/60s)';
      return '60s CPU waiting for data';
    }

    function _pnlValueHtml(value) {
      const pnl = Number(value) || 0;
      let color = 'var(--text)';
      if (pnl > 0) color = 'var(--ok)';
      else if (pnl < 0) color = 'var(--danger)';
      return `<span style='color:${color}'>${esc(pnl.toFixed(2))}</span>`;

    function _memSwapTag(v, suffix, level) {

      if (level === 'error')   return '<span class="tag" style="color:#ef6a70;background:#3b0d0d">' + esc(n) + ' ' + suffix + '</span>';

          sig: [host, pbVersion, String(item.name || ''), 'tracebacks', 'today', String(Number(item.tracebacks_today) || 0), hasTracebacksToday ? '1' : '0'].join('|')
        },
        tracebacks_4w: {
          html: tracebackHistoryBubble,
          sig: [host, String(item.name || ''), 'tracebacks', String(Number(item.tracebacks_4w) || 0)].join('|')
        },
        pnl_today: {
          html: `<div><span class='cpu-clickable' data-history-host='${escAttr(host)}' data-history-bot='${escAttr(item.name || '')}' data-history-metric='pnl'>${_pnlValueHtml(item.pnl_today)}</span></div><div class='field-help cpu-clickable' title='Realized fill count' data-history-host='${escAttr(host)}' data-history-bot='${escAttr(item.name || '')}' data-history-metric='pnl_fills'>fills: ${esc(pnlsToday)}</div>`,
          sig: [String((Number(item.pnl_today) || 0).toFixed(2)), String(pnlsToday)].join('|')
        },
        pnl_hist_total: {
          html: `<div><span class='cpu-clickable' data-history-host='${escAttr(host)}' data-history-bot='${escAttr(item.name || '')}' data-history-metric='pnl'>${_pnlValueHtml(item.pnl_hist_total)}</span></div><div class='field-help cpu-clickable' title='Realized fill count' data-history-host='${escAttr(host)}' data-history-bot='${escAttr(item.name || '')}' data-history-metric='pnl_fills'>fills: ${esc(pnlsHistTotal)}</div>`,
          sig: [String((Number(item.pnl_hist_total) || 0).toFixed(2)), String(pnlsHistTotal)].join('|')
        }
      };
    }

    function renderServiceRows(items) {
      if (!Array.isArray(items) || !items.length) {
        return `<div class='empty-state'>No entries in this section.</div>`;
      }
      var sorted = _sortBotItems(items);
      var s = store.botSort;
      return `
        <div class='table-wrap'>
          <table class='table-small'>
            <thead>
              <tr>
                ${BOT_COLUMNS.map(function (col) {
                  var arrow = s.field === col.field ? (s.dir === 'asc' ? ' \u25b4' : ' \u25be') : '';
                  return `<th style='width:${col.width};cursor:pointer' onclick='sortBotTable(${js(col.field)})'>${esc(col.label)}${arrow}</th>`;
                }).join('')}
              </tr>
            </thead>
            <tbody>
              ${sorted.map(function (item) {
                const host = item.server || store.hostname || '';
                const pbVersion = String(item.pb_version || '7');
                const cellHtml = _renderServiceRowCells(item, host, pbVersion);
                return `<tr data-bot='${escAttr(item.name || '')}'>${BOT_COLUMNS.map(function (col) {
                  const payload = cellHtml[col.field] || { html: '', sig: '' };
                  return `<td data-col='${escAttr(col.field)}' data-render-sig='${escAttr(payload.sig)}'>${payload.html}</td>`;
                }).join('')}</tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>`;
    }

    function renderRunningPb7Fallback(items) {
      if (!Array.isArray(items) || !items.length) {
        return `<div class='empty-state'>No running PB7 instances reported.</div>`;
      }
      return `
        <div class='notice warning'>Live monitor details are currently unavailable. Running PB7 instances are listed from status_v7.json.</div>
        <div class='stack'>
          ${items.map(function (item) {
            return `
              <div class='branch-summary'>
                <span class='tag warning'>Running</span>
                <span class='pill'><strong>Name</strong> ${esc(item.name || '-')}</span>
                <span class='pill'><strong>Config Version</strong> ${esc(item.version || '-')}</span>
                <span class='pill'><strong>Enabled On</strong> ${esc(item.enabled_on || '-')}</span>
                <span class='pill'><strong>Activated</strong> ${esc(item.activate_ts || '-')}</span>
              </div>`;
          }).join('')}
        </div>`;
    }

    function renderMonitorPanel(monitor, isMaster, status) {
      const server = monitor.server || null;
      const serverMetrics = server || {};
      const hasServerMetrics = !!server;
      const telemetryFresh = !(server && (server.telemetry_stale || server.telemetry_fresh === false));
      const pb7Rows = Array.isArray(monitor.v7) ? monitor.v7 : [];
      const pb7Fallback = Array.isArray(monitor.v7_running) ? monitor.v7_running : [];
      const summary = status && status.summary_row ? status.summary_row : {};
      const historyHost = String(summary.hostname || summary.name || store.hostname || '').trim();
      let pb7Content = '';
      if (pb7Rows.length) {
        pb7Content = renderServiceRows(pb7Rows);
        if (pb7Fallback.length) {
          pb7Content += renderRunningPb7Fallback(pb7Fallback);
        }
      } else {
        pb7Content = renderRunningPb7Fallback(pb7Fallback);
      }
      const cpuTelemetry = formatCpuTelemetry(serverMetrics);
      const staleNotice = hasServerMetrics && !telemetryFresh
        ? `<div class='notice warning'>Live telemetry is stale${serverMetrics.telemetry_age ? ` (${esc(formatLatency(Number(serverMetrics.telemetry_age) * 1000))} ago)` : ''}. Waiting for the metrics stream to recover.</div>`
        : '';
      const metrics = hasServerMetrics ? `
        <div class='stack'>
          <div style='font-size:var(--fs-sm);color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:0.06em'>Telemetry Data</div>
          ${staleNotice}
          <div class='resource-grid'>
            <div class='stack'>
              ${renderResourceMeter('Memory', serverMetrics.mem, historyHost)}
              ${renderResourceMeter('Disk', serverMetrics.disk, historyHost)}
            </div>
            <div class='stack'>
              ${renderResourceMeter('Swap', serverMetrics.swap, historyHost)}
              <div class='resource-meter cpu-clickable' data-meter='cpu' data-history-host='${escAttr(historyHost)}' data-history-metric='cpu' data-cpu-history-host='${escAttr(historyHost)}'>
                <div class='resource-meter-title'>${esc(cpuTelemetry.title)}</div>
                <div class='cpu-meter'>
                  <div class='cpu-meter-row' data-cpu-row='live'>
                    <div class='cpu-meter-label'>1s</div>
                    <div class='resource-track'><div class='resource-fill ${cpuTelemetry.liveTone || resourceTone(cpuTelemetry.livePct)}' data-cpu-bar='live' style='width:${cpuTelemetry.livePct}%'></div></div>
                    <div class='cpu-meter-value' data-cpu-value='live'>${esc(cpuTelemetry.liveValueText)}</div>
                  </div>
                  <div class='cpu-meter-row ${cpuTelemetry.avg60Confirmed ? '' : 'warming'}' data-cpu-row='avg60'>
                    <div class='cpu-meter-label'>60s</div>
                    <div class='resource-track'><div class='resource-fill ${cpuTelemetry.avg60Tone || resourceTone(cpuTelemetry.avg60Pct)}' data-cpu-bar='avg60' style='width:${cpuTelemetry.avg60Pct}%'></div></div>
                    <div class='cpu-meter-value' data-cpu-value='avg60'>${esc(cpuTelemetry.avg60ValueText)}</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>` : `<div class='empty-state'>No live server metrics received yet.</div>`;
      return `
        <div class='panel'>
          <div class='panel-body'>
            ${metrics}
            <div class='stack'>
              <div>${pb7Content}</div>
            </div>
          </div>
        </div>`;
    }

    function renderLogPanel(detail, ui) {
      return `
        <div class='log-view-page'>
          <div class='panel'>
          <div class='panel-head'>
            <div>
              <div class='panel-title'>Host Log Viewer</div>
            </div>
          </div>
          <div class='panel-body'>
            <div id='vps-log-viewer-target' class='log-viewer-shell'></div>
          </div>
          </div>
        </div>`;
    }

    function renderVpsProgress(progress) {
      const sections = [
        { label: 'Initialization', status: progress.init_status, when: progress.last_init },
        { label: 'Setup', status: progress.setup_status, when: progress.last_setup },
        { label: 'Update', status: progress.update_status, when: progress.last_update }
      ];
      return `
        <div class='panel'>
          <div class='panel-head'>
            <div>
              <div class='panel-title'>Progress</div>
              <div class='panel-sub'>Separate status buckets for init, setup and update.</div>
            </div>
          </div>
          <div class='panel-body'>
            <div class='field-help'>Use the sidebar action buttons to open the shared command log viewer for full ansible output.</div>
            ${sections.map(function (section) {
              const status = String(section.status || 'idle');
              const cls = status.indexOf('success') >= 0 ? 'ok' : status.indexOf('fail') >= 0 || status.indexOf('error') >= 0 ? 'error' : status === 'idle' || status === 'none' ? 'warning' : 'warning';
              return `
                <div class='stack'>
                  <div class='branch-summary'>
                    <span class='tag ${cls}'>${esc(section.label)}: ${esc(status)}</span>
                    <span class='pill'><strong>Last Change</strong> ${esc(section.when || '-')}</span>
                  </div>
                </div>`;
            }).join('')}
          </div>
        </div>`;
    }

    function renderView(force) {
      const signature = getViewShellSignature();
      if (!force && store.renderSignatures.view === signature) return;
      store.renderSignatures.view = signature;
      let html = '';
      if (store.view === 'add') {
        html = renderAddView();
      } else if (store.view === 'master-task-log') {
        html = renderMasterTaskLogView();
      } else if (store.view === 'master-pbgui-branch') {
        html = renderMasterBranchView('pbgui');
      } else if (store.view === 'master-pb7-branch') {
        html = renderMasterBranchView('pb7');
      } else if (store.view === 'master-ufw' || store.view === 'vps-ufw') {
        html = renderUfwView();
      } else if (store.view === 'master') {
        html = renderMasterView();
      } else if (store.view === 'vps-task-log') {
        html = renderVpsTaskLogView();
      } else if (store.view === 'vps-host-logs') {
        html = renderVpsHostLogsView();
      } else if (store.view === 'master-host-logs') {
        html = renderMasterHostLogsView();
      } else if (store.view === 'vps') {
        html = renderVpsView();
      } else if (store.view === 'vps-setup') {
        html = renderVpsSetupView();
      } else if (store.view === 'vps-pbgui-branch') {
        html = renderVpsBranchView('pbgui');
      } else if (store.view === 'vps-pb7-branch') {
        html = renderVpsBranchView('pb7');
      } else if (store.view === 'settings-vps-logging') {
        html = renderVpsLoggingSettingsView();
      } else if (store.view === 'deploys-vps-logging') {
        html = renderVpsLoggingDeploysView();
      } else {
        html = renderOverview();
      }
      const viewRoot = document.getElementById('viewRoot');
      const main = document.getElementById('main');
      const isLogView = store.view === 'master-task-log' || store.view === 'vps-task-log' || store.view === 'vps-host-logs' || store.view === 'master-host-logs';
      viewRoot.classList.toggle('log-view-root', isLogView);
      main.classList.toggle('log-view-active', isLogView);
      viewRoot.innerHTML = html;
    }

    function initSidebarResize() {
      if (window.PBGuiSidebarResize && typeof window.PBGuiSidebarResize.init === 'function') {
        window.PBGuiSidebarResize.init({ sidebarId: 'sidebar', handleId: 'sidebar-resize', minWidth: 220, maxWidth: 420 });
      }
    }

    function renderUi(options) {
      const opts = options || {};
      const sidebarActionsSignature = getSidebarActionsSignature();
      if (opts.forceSidebarActions || store.renderSignatures.sidebarActions !== sidebarActionsSignature) {
        store.renderSignatures.sidebarActions = sidebarActionsSignature;
        renderSidebarActions();
      }
      renderSidebarMeta();
      const sidebarListSignature = getSidebarListSignature();
      if (opts.forceSidebarList || store.renderSignatures.sidebarList !== sidebarListSignature) {
        store.renderSignatures.sidebarList = sidebarListSignature;
        renderSidebarList();
      }
      renderSummaryBar();
      const holdPb7BranchView = store.pb7BranchSelectInteracting && isPb7BranchView();
      const holdPbguiBranchView = store.pbguiBranchSelectInteracting && isPbguiBranchView();
      const holdVpsSetupFieldView = !opts.forceView && isActiveVpsSetupFormField();
      if (!holdPb7BranchView && !holdPbguiBranchView && !holdVpsSetupFieldView) {
        renderView(!!opts.forceView);
      }
      if (!holdPb7BranchView && !holdPbguiBranchView && store.view === 'master-pb7-branch' && store.detail && store.detail.kind === 'master') {
        syncPb7RemoteLoads('master', store.master, (store.detail.branches || {}).pb7 || {});
      } else if (!holdPb7BranchView && !holdPbguiBranchView && store.view === 'vps-pb7-branch' && store.hostname && store.detail && store.detail.kind === 'vps' && store.detail.hostname === store.hostname) {
        syncPb7RemoteLoads(store.hostname, ensureVpsUi(store.hostname, store.detail), (store.detail.branches || {}).pb7 || {});
      }
      syncTaskLogViewer();
      syncDeployLogViewers();
      syncVpsLogViewer();
      syncMasterHostLogViewer();
      refreshCurrentViewLive();
      refreshLocalInteractiveState();
      scheduleVpsSecretSyncPasses();
    }

    document.addEventListener('focusin', function (event) {
      const target = event.target;
      if (!(target instanceof HTMLInputElement)) return;
      if (!target.closest('.pw-wrap')) return;
      scheduleVpsSecretSyncPasses();
    });

    document.addEventListener('pointerdown', handleCpuHistoryInteraction, true);
    document.addEventListener('mouseup', function () {
      endOverviewSelection();
    });
    document.addEventListener('mouseleave', function () {
      endOverviewSelection();
    });
    window.addEventListener('resize', function () {
      const overlay = document.getElementById('cpuHistoryOverlay');
      const box = document.getElementById('cpuHistoryBox');
      if (!overlay || !box || !overlay.classList.contains('visible')) return;
      applyCpuHistoryRect(box.getBoundingClientRect());
      if (cpuHistoryLastPayload) {
        const points = metricHistorySeriesPoints(cpuHistoryLastPayload.metric, cpuHistoryLastPayload.data);
        document.getElementById('cpuHistoryMeta').innerHTML = renderCpuHistoryMeta(cpuHistoryLastPayload.data, points, cpuHistoryLastPayload.metric);
        document.getElementById('cpuHistoryBody').innerHTML = renderCpuHistoryChart(cpuHistoryLastPayload.data, points, cpuHistoryLastPayload.metric);
      }
    });
    initCpuHistoryModalInteractions();
    document.addEventListener('click', handleCpuHistoryInteraction, true);

    loadOverviewPrefs();
    restoreViewFromHash();
    window.overviewApiSyncController = createApiSyncStatusController({
      apiFetch: apiKeysFetch,
      buildStreamUrl: function () {
        return API_BASE.replace('/api/vps-manager', '/api/api-keys') + '/sync/ssh-status/stream?token=' + encodeURIComponent(TOKEN);
      },
      getButton: function () {
        return document.getElementById('overview-api-sync-btn');
      },
      showToast: toast,
      onStateChange: function () {
        renderSidebarActions();
        renderSidebarList();
        if (store.view === 'overview' || store.view === 'master' || isVpsContextView()) {
          refreshCurrentViewLive();
        }
      }
    });
    window.overviewApiSyncController.refresh().catch(function () {});
    window.overviewApiSyncController.openStream();
    renderUi({ forceSidebarActions: true, forceSidebarList: true, forceView: true });
    initSidebarResize();
    initAlertModalInteractions();
    connectWs();
    window.addEventListener('hashchange', function () {
      restoreViewFromHash();
    });
  </script>
  <script src="/app/js/shared_help_overlay.js?v=4"></script>
  <script src="/app/pbgui_nav.js?v=%%NAV_HASH%%"></script>
</body>
</html>
