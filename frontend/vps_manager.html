<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>VPS Manager - PBGui</title>
  <script src='https://cdn.jsdelivr.net/npm/marked/marked.min.js'></script>
  <script src='https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js'></script>
  <style>
    :root {
      --fs-xs: 11px;
      --fs-sm: 13px;
      --fs-base: 14px;
      --fs-md: 15px;
      --fs-lg: 18px;
      --fs-xl: 24px;
      --sp-xs: 4px;
      --sp-sm: 8px;
      --sp-md: 12px;
      --sp-lg: 20px;
      --input-h: 32px;
      --btn-h: 34px;
      --bg: #09111d;
      --bg2: #101a2a;
      --bg3: #152238;
      --panel: rgba(14, 22, 36, 0.92);
      --panel-2: rgba(19, 29, 46, 0.96);
      --border: #22324a;
      --text: #e5edf8;
      --text-dim: #98a8c0;
      --text-muted: #6f839d;
      --accent: #5dc4ff;
      --accent-2: #59d7a6;
      --warning: #f4b942;
      --danger: #ef6a70;
      --ok: #3ed28b;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.38);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background:
        radial-gradient(circle at top right, rgba(38, 136, 255, 0.12), transparent 24%),
        radial-gradient(circle at 15% 100%, rgba(64, 191, 149, 0.12), transparent 30%),
        linear-gradient(180deg, #09111d 0%, #070d16 100%);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: var(--fs-base);
      overflow: hidden;
    }

    body.help-open { overflow: hidden; }

    button, input, select, textarea {
      font: inherit;
    }

    #page-body {
      display: flex;
      height: calc(100vh - 52px);
      overflow: hidden;
    }

    #sidebar {
      width: 320px;
      max-width: 42vw;
      min-width: 250px;
      flex-shrink: 0;
      border-right: 1px solid rgba(255, 255, 255, 0.07);
      background: linear-gradient(180deg, rgba(7, 12, 20, 0.95), rgba(7, 12, 20, 0.88));
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    #sidebar-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      display: grid;
      gap: 8px;
    }

    .eyebrow {
      font-size: var(--fs-xs);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 700;
    }

    .sidebar-title {
      font-size: 22px;
      line-height: 1.1;
      font-weight: 700;
      color: var(--text);
    }

    .sidebar-subtitle {
      color: var(--text-dim);
      line-height: 1.5;
    }

    #sidebar-actions,
    #sidebar-meta,
    #sidebar-list {
      padding: 16px 18px;
    }

    #sidebar-actions {
      display: grid;
      gap: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    #sidebar-meta {
      display: grid;
      gap: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .mini-card {
      background: rgba(18, 29, 48, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 10px 12px;
      display: grid;
      gap: 4px;
    }

    .mini-card-label {
      color: var(--text-muted);
      font-size: var(--fs-xs);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .mini-card-value {
      color: var(--text);
      font-size: var(--fs-sm);
      line-height: 1.45;
      font-weight: 600;
    }

    #sidebar-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .side-group {
      display: grid;
      gap: 8px;
    }

    .side-group-title {
      color: var(--text-muted);
      font-size: var(--fs-xs);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .side-button {
      width: 100%;
      text-align: left;
      background: rgba(17, 28, 46, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      color: var(--text);
      padding: 11px 12px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
      display: grid;
      gap: 4px;
    }

    .side-button:hover {
      background: rgba(24, 40, 66, 0.98);
      border-color: rgba(93, 196, 255, 0.28);
      transform: translateY(-1px);
    }

    .side-button.active {
      background: linear-gradient(180deg, rgba(14, 49, 81, 0.96), rgba(16, 37, 63, 0.96));
      border-color: rgba(93, 196, 255, 0.52);
      box-shadow: inset 0 0 0 1px rgba(93, 196, 255, 0.12);
    }

    .side-button-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .side-button-title {
      font-weight: 700;
      font-size: var(--fs-base);
    }

    .side-button-sub {
      color: var(--text-dim);
      font-size: var(--fs-sm);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #main {
      flex: 1;
      min-width: 0;
      min-height: 0;
      overflow-y: auto;
      padding: 18px 20px 24px;
      display: grid;
      gap: 16px;
      align-content: start;
    }

    #main.log-view-active {
      overflow: hidden;
    }

    .summary-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(16, 29, 48, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-dim);
      font-size: var(--fs-sm);
      line-height: 1;
      white-space: nowrap;
    }

    .pill strong { color: var(--text); }

    .layout-grid {
      display: grid;
      gap: 16px;
    }

    .cards-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .cards-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .cards-4 {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      min-width: 0;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: linear-gradient(180deg, rgba(22, 34, 53, 0.92), rgba(18, 28, 44, 0.9));
    }

    .panel-title {
      font-size: var(--fs-md);
      font-weight: 700;
      color: var(--text);
    }

    .panel-sub {
      color: var(--text-dim);
      font-size: var(--fs-sm);
    }

    .panel-body {
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .panel:has(.log-viewer-shell),
    .panel:has(.task-log-viewer-shell) {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .panel:has(.log-viewer-shell) .panel-body,
    .panel:has(.task-log-viewer-shell) .panel-body {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .hero {
      display: grid;
      gap: 12px;
      padding: 18px;
      background:
        linear-gradient(140deg, rgba(9, 23, 44, 0.94), rgba(8, 16, 29, 0.95)),
        radial-gradient(circle at top right, rgba(93, 196, 255, 0.18), transparent 28%);
      border: 1px solid rgba(93, 196, 255, 0.16);
      border-radius: 18px;
    }

    .hero h1,
    .hero h2,
    .hero h3,
    .hero p { margin: 0; }

    .hero-title {
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.05;
      font-weight: 800;
      color: var(--text);
    }

    .hero-copy {
      max-width: 72ch;
      color: var(--text-dim);
      line-height: 1.6;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .metric {
      padding: 12px;
      border-radius: 14px;
      background: rgba(17, 28, 46, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.06);
      display: grid;
      gap: 4px;
    }

    .metric-label {
      font-size: var(--fs-xs);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      font-weight: 700;
    }

    .metric-value {
      font-size: var(--fs-lg);
      color: var(--text);
      font-weight: 700;
    }

    .metric-sub {
      color: var(--text-dim);
      font-size: var(--fs-sm);
      line-height: 1.45;
    }

    .field-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      align-items: start;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .field.span-2 {
      grid-column: span 2;
    }

    .field label {
      color: var(--text-dim);
      font-size: var(--fs-sm);
      font-weight: 600;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-width: 0;
      height: var(--input-h);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(6, 12, 20, 0.85);
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }

    .field textarea {
      min-height: 88px;
      height: auto;
      padding: 10px 12px;
      resize: vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: rgba(93, 196, 255, 0.5);
      box-shadow: 0 0 0 3px rgba(93, 196, 255, 0.12);
    }

    .pw-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .pw-wrap input {
      flex: 1;
      padding-right: 36px;
    }

    .pw-eye-btn {
      position: absolute;
      right: 8px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: var(--fs-md);
      padding: 0;
      line-height: 1;
      user-select: none;
    }

    .pw-eye-btn:hover {
      color: var(--text-dim);
    }

    .render-contents {
      display: contents;
    }

    .field-help {
      color: var(--text-muted);
      font-size: var(--fs-xs);
      line-height: 1.5;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: var(--input-h);
      color: var(--text);
      font-size: var(--fs-sm);
    }

    .checkbox-row input[type='checkbox'] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      height: var(--btn-h);
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(14, 24, 39, 0.95);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 600;
    }

    .btn:hover {
      background: rgba(22, 38, 61, 0.98);
      border-color: rgba(93, 196, 255, 0.22);
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.48;
      cursor: not-allowed;
      transform: none;
    }

    .btn.primary {
      background: linear-gradient(180deg, rgba(63, 173, 246, 0.98), rgba(39, 133, 207, 0.96));
      border-color: rgba(93, 196, 255, 0.4);
      color: #08111b;
    }

    .btn.primary:hover { background: linear-gradient(180deg, rgba(90, 189, 255, 1), rgba(52, 147, 222, 1)); }

    .btn.ok {
      background: linear-gradient(180deg, rgba(75, 205, 149, 0.98), rgba(41, 168, 110, 0.96));
      border-color: rgba(75, 205, 149, 0.42);
      color: #07130d;
    }

    .btn.warn {
      background: linear-gradient(180deg, rgba(244, 185, 66, 0.98), rgba(218, 147, 24, 0.96));
      border-color: rgba(244, 185, 66, 0.42);
      color: #1b1203;
    }

    .btn.danger {
      background: linear-gradient(180deg, rgba(239, 106, 112, 0.98), rgba(205, 68, 84, 0.96));
      border-color: rgba(239, 106, 112, 0.42);
      color: #1a090b;
    }

    .btn.ghost {
      color: var(--accent);
      border-color: rgba(93, 196, 255, 0.2);
      background: rgba(12, 22, 36, 0.92);
    }

    .status-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .master-status-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }

    .status-item {
      padding: 12px;
      border-radius: 14px;
      background: rgba(13, 22, 36, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.06);
      display: grid;
      gap: 5px;
    }

    .status-label {
      color: var(--text-muted);
      font-size: var(--fs-xs);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .status-value {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-weight: 700;
      line-height: 1.4;
    }

      .status-sub {
        color: var(--text-dim);
        font-size: var(--fs-xs);
        line-height: 1.45;
      }

    .status-sub {
      color: var(--text-dim);
      font-size: var(--fs-xs);
      line-height: 1.45;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.04);
    }

    .dot.ok { background: var(--ok); }
    .dot.warning { background: var(--warning); }
    .dot.error { background: var(--danger); }
    .dot.info { background: var(--accent); }

    .notice {
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(15, 25, 40, 0.85);
      color: var(--text-dim);
      line-height: 1.6;
    }

    .notice.warning {
      border-color: rgba(244, 185, 66, 0.32);
      background: rgba(75, 51, 7, 0.22);
      color: #f3d188;
    }

    .notice.error {
      border-color: rgba(239, 106, 112, 0.3);
      background: rgba(76, 19, 28, 0.22);
      color: #f6b0b7;
    }

    .missing-commits {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .missing-commits summary {
      cursor: pointer;
      font-weight: 700;
      color: var(--text);
      user-select: none;
    }

    .missing-commits-list {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .missing-commit-row {
      display: grid;
      gap: 3px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(10, 18, 30, 0.55);
    }

    .missing-commit-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .commit-link {
      color: var(--accent);
      text-decoration: none;
      font-size: var(--fs-sm);
    }

    .commit-link:hover {
      text-decoration: underline;
    }

    .commit-inline-details {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .commit-inline-details summary {
      cursor: pointer;
      color: var(--accent);
      font-size: var(--fs-sm);
      user-select: none;
    }

    .commit-inline-body {
      display: grid;
      gap: 8px;
      margin-top: 8px;
      color: var(--text-dim);
      font-size: var(--fs-sm);
      line-height: 1.55;
    }

    .commit-preview {
      display: grid;
      gap: 10px;
    }

    .commit-preview-header {
      display: grid;
      gap: 6px;
    }

    .commit-preview-title {
      color: var(--text);
      font-weight: 700;
      font-size: var(--fs-base);
    }

    .commit-preview-meta {
      color: var(--text-muted);
      font-size: var(--fs-xs);
    }

    .commit-preview-message {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .commit-file-block {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      overflow: hidden;
      background: rgba(8, 14, 24, 0.72);
    }

    .commit-file-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      background: rgba(18, 28, 44, 0.9);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-size: var(--fs-sm);
      flex-wrap: wrap;
    }

    .commit-file-patch {
      margin: 0;
      padding: 10px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      color: #d9e6f7;
    }

    .commit-file-patch .add {
      color: #7ee787;
    }

    .commit-file-patch .del {
      color: #ff9aa2;
    }

    .commit-file-patch .ctx {
      color: #8ba0ba;
    }

    .commit-file-patch .hdr {
      color: #79c0ff;
    }

    .table-wrap {
      overflow: auto;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

      .server-monitor-title {
        color: var(--text);
        font-size: var(--fs-lg);
        font-weight: 700;
        line-height: 1.3;
      }

      .resource-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: var(--sp-md);
      }

      .resource-meter {
        display: grid;
        gap: var(--sp-xs);
      }

      .resource-meter-title {
        color: var(--text);
        font-size: var(--fs-base);
        font-weight: 600;
        line-height: 1.4;
      }

      .resource-track {
        height: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      .resource-fill {
        height: 100%;
        border-radius: 999px;
        background: var(--ok);
      }

      .resource-fill.warning {
        background: var(--warning);
      }

      .resource-fill.error {
        background: var(--danger);
      }

    .server-monitor-title {
      color: var(--text);
      font-size: var(--fs-lg);
      font-weight: 700;
      line-height: 1.3;
    }

    .resource-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--sp-md);
    }

    .resource-meter {
      display: grid;
      gap: var(--sp-xs);
    }

    .resource-meter-title {
      color: var(--text);
      font-size: var(--fs-base);
      font-weight: 600;
      line-height: 1.4;
    }

    .resource-meter-sub {
      color: var(--text-muted);
      font-size: var(--fs-xs);
      line-height: 1.4;
    }

    .resource-meter-row {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
    }

    .resource-meter-label {
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .resource-meter-value {
      color: var(--text-dim);
      font-size: 11px;
      white-space: nowrap;
    }

    .resource-track {
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .resource-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--ok);
    }

    .resource-fill.warning {
      background: var(--warning);
    }

    .resource-fill.error {
      background: var(--danger);
    }

    .cpu-clickable {
      cursor: pointer;
      display: inline-flex;
    }

    .cpu-meter {
      display: grid;
      gap: 8px;
    }

    .cpu-meter-row {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
    }

    .cpu-meter-label {
      color: var(--text-muted);
    }

    .cpu-meter-value {
      color: var(--text-dim);
    }

    .cpu-meter-row.warming .cpu-meter-label,
    .cpu-meter-row.warming .cpu-meter-value {
      color: var(--text-muted);
      opacity: 0.78;
    }

    .cpu-meter-row.warming .resource-fill {
      opacity: 0.55;
    }

    .resource-meter.cpu-clickable {

      bottom: 0;
      width: 18px;
      height: 18px;
      cursor: nwse-resize;
      touch-action: none;
      opacity: 0.7;
      z-index: 1;

      content: '';
      position: absolute;
      right: 4px;
      bottom: 4px;

      border-right: 2px solid rgba(255, 255, 255, 0.45);

    .cpu-history-resize-handle.side-top,
    .cpu-history-resize-handle.side-bottom {
      left: 12px;
      right: 12px;
      height: 10px;

    .cpu-history-resize-handle.side-left,
    .cpu-history-resize-handle.side-right {
      top: 12px;
      bottom: 12px;
      width: 10px;
    }

    .cpu-history-resize-handle.side-top {
      top: 0;
      cursor: ns-resize;
    }

    .cpu-history-resize-handle.side-right {
      right: 0;
      cursor: ew-resize;
    }

    .cpu-history-resize-handle.side-bottom {
      bottom: 0;
      cursor: ns-resize;
    }

    .cpu-history-resize-handle.side-left {
      left: 0;

    .cpu-history-resize-handle.corner {
      width: 18px;
      height: 18px;

    .cpu-history-resize-handle.corner-top-left {
      top: 0;
      left: 0;

    .cpu-history-resize-handle.corner-top-right {
      top: 0;
      right: 0;
      cursor: nesw-resize;
    }

    .cpu-history-resize-handle.corner-bottom-right {
      right: 0;
      bottom: 0;

    .cpu-history-resize-handle.corner-bottom-left {

    function defaultVpsDeployConfig() {
      return {

        reboot_requested: false,

      };

    function getVpsLoggingConfig() {
      const cfg = (((store.state || {}).config || {}).vps_logging) || {};
      const base = defaultVpsLoggingConfig();
      base.services = Array.isArray(cfg.services) ? cfg.services.map(function (item) {
        return {
          service: String((item || {}).service || ''),
          max_mb: Number((item || {}).max_mb) || 0,
          default_max_mb: Number((item || {}).default_max_mb) || 0,
          backup_count: 0
        };
      }) : [];
      return base;
    }

    function getVpsDeployConfig() {
      const cfg = (((store.state || {}).config || {}).vps_deploy) || {};
      const base = defaultVpsDeployConfig();
      base.action = String(cfg.action || base.action || 'vps-deploy-logging');
      base.action_text = String(cfg.action_text || base.action_text || 'Deploy Settings');
      base.mode = String(cfg.mode || base.mode || 'parallel');
      base.debug = !!cfg.debug;
      base.reboot_requested = !!cfg.reboot_requested;
      base.selected_hosts = Array.isArray(cfg.selected_hosts) ? cfg.selected_hosts.map(function (item) { return String(item || ''); }).filter(Boolean) : [];
      base.actions = Array.isArray(cfg.actions) ? cfg.actions.map(function (item) {
        return {
          command: String((item || {}).command || ''),
          command_text: String((item || {}).command_text || (item || {}).command || '')
        };
      }).filter(function (item) { return item.command; }) : [];
      base.modes = Array.isArray(cfg.modes) && cfg.modes.length ? cfg.modes.map(function (item) { return String(item || ''); }).filter(Boolean) : base.modes;
      return base;
    }

    function getSelectedOverviewHosts() {
      const managed = new Set(getManagedRows().map(function (row) { return String(row.hostname || ''); }));
      return (store.selectedOverviewHosts || []).filter(function (hostname) { return managed.has(String(hostname || '')); });
    }

    function setSelectedOverviewHosts(hostnames) {
      store.selectedOverviewHosts = Array.from(new Set((hostnames || []).map(function (item) { return String(item || '').trim(); }).filter(Boolean)));
      store.selectedOverviewHostsHydrated = true;
      renderUi({ forceSidebarActions: true, forceView: store.view === 'overview' || isOverviewSettingsView() });
    }

    function toggleOverviewHostSelection(hostname) {
      hostname = String(hostname || '').trim();
      if (!hostname) return;
      const current = getSelectedOverviewHosts();
      if (current.indexOf(hostname) >= 0) {
        setSelectedOverviewHosts(current.filter(function (item) { return item !== hostname; }));
      } else {
        current.push(hostname);
        setSelectedOverviewHosts(current);
      }
    }

    function getOverviewSelectableHosts() {
      return getManagedRows().map(function (row) { return String(row.hostname || ''); }).filter(Boolean);
    }

    function setOverviewSelectionRange(anchorHost, targetHost, mode) {
      const hosts = getOverviewSelectableHosts();
      const anchorIndex = hosts.indexOf(String(anchorHost || ''));
      const targetIndex = hosts.indexOf(String(targetHost || ''));
      if (anchorIndex < 0 || targetIndex < 0) return;
      const start = Math.min(anchorIndex, targetIndex);
      const end = Math.max(anchorIndex, targetIndex);
      const range = hosts.slice(start, end + 1);
      if (mode === 'remove') {
        setSelectedOverviewHosts(getSelectedOverviewHosts().filter(function (item) { return range.indexOf(item) < 0; }));
        return;
      }
      if (mode === 'replace') {
        setSelectedOverviewHosts(range);
        return;
      }
      const merged = getSelectedOverviewHosts().slice();
      range.forEach(function (item) {
        if (merged.indexOf(item) < 0) merged.push(item);
      });
      setSelectedOverviewHosts(merged);
    }

    function startOverviewSelection(hostname, event) {
      hostname = String(hostname || '').trim();
      if (!hostname) return;
      const alreadySelected = getSelectedOverviewHosts().indexOf(hostname) >= 0;
      store.overviewSelectionAnchor = hostname;
      store.overviewSelectionDragging = true;
      store.overviewSelectionMode = alreadySelected ? 'remove' : 'add';
      setOverviewSelectionRange(hostname, hostname, alreadySelected ? 'remove' : 'add');
      if (event && event.target && typeof event.target.closest === 'function' && event.target.closest('.table-button')) {
        store.overviewSelectionDragging = false;
        store.overviewSelectionAnchor = '';
        store.overviewSelectionMode = '';
        return;
      }
      if (event && typeof event.preventDefault === 'function') event.preventDefault();
    }

    function moveOverviewSelection(hostname) {
      if (!store.overviewSelectionDragging) return;
      hostname = String(hostname || '').trim();
      if (!hostname || !store.overviewSelectionAnchor) return;
      setOverviewSelectionRange(store.overviewSelectionAnchor, hostname, store.overviewSelectionMode || 'add');
    }

    function endOverviewSelection() {
      store.overviewSelectionDragging = false;
      store.overviewSelectionAnchor = '';
      store.overviewSelectionMode = '';
    }

    function setVpsLoggingValue(serviceName, value) {
      const config = getVpsLoggingConfig();
      const nextValue = Number(value);
      config.services = config.services.map(function (item) {
        if (String(item.service || '') !== String(serviceName || '')) return item;
        return Object.assign({}, item, { max_mb: nextValue });
      });
      if (store.state && store.state.config) {
        store.state.config.vps_logging = config;
      }
      refreshLocalInteractiveState();
    }

    function saveVpsLoggingConfig(options) {
      const opts = options || {};
      store.suppressNextVpsLoggingSaveToast = !!opts.silent;
      send({
        cmd: 'save_vps_logging_config',
        data: {
          services: getVpsLoggingConfig().services

    function setVpsDeployAction(value) {
      const config = getVpsDeployConfig();
      const nextAction = String(value || '').trim() || 'vps-deploy-logging';
      const nextActionMeta = (config.actions || []).find(function (item) {
        return String(item.command || '') === nextAction;
      }) || null;
      config.action = nextAction;
      config.action_text = String((nextActionMeta && nextActionMeta.command_text) || nextAction || 'Deploy Settings');
      if (store.state && store.state.config) {
        store.state.config.vps_deploy = config;
      }
      renderUi({ forceSidebarActions: true, forceView: isOverviewSettingsView() || store.view === 'overview' });
      refreshLocalInteractiveState();
    }

    function setVpsDeployMode(value) {
      const config = getVpsDeployConfig();
      config.mode = String(value || '').trim() || 'parallel';
      if (store.state && store.state.config) {
        store.state.config.vps_deploy = config;

      renderUi({ forceSidebarActions: true, forceView: isOverviewSettingsView() || store.view === 'overview' });
      refreshLocalInteractiveState();
      saveVpsDeploySettings({ silent: true });

    function setVpsDeployDebug(checked) {
      const config = getVpsDeployConfig();
      config.debug = !!checked;
      if (store.state && store.state.config) {
        store.state.config.vps_deploy = config;
      }
      renderUi({ forceSidebarActions: true, forceView: isOverviewSettingsView() || store.view === 'overview' });
      refreshLocalInteractiveState();
      saveVpsDeploySettings({ silent: true });

    function setVpsDeployRebootRequested(checked) {
      const config = getVpsDeployConfig();
      config.reboot_requested = !!checked;
      if (store.state && store.state.config) {
        store.state.config.vps_deploy = config;
      }
      renderUi({ forceSidebarActions: true, forceView: isOverviewSettingsView() || store.view === 'overview' });
      refreshLocalInteractiveState();
      saveVpsDeploySettings({ silent: true });
    }

    function saveVpsDeploySettings(options) {
      const opts = options || {};
      store.suppressNextVpsDeploySaveToast = !!opts.silent;
      const config = getVpsDeployConfig();
      send({
        cmd: 'save_vps_deploy_settings',
        data: {
          action: config.action,
          mode: config.mode,
          debug: !!config.debug,
          reboot_requested: !!config.reboot_requested
        }
      });
    }

    function overviewDeployNeedsPassword(command) {
      const normalized = String(command || '').trim();
      return normalized === 'vps-update' || normalized === 'vps-cleanup';
    }

    function formatSkippedDeployHosts(skippedHosts) {
      const hosts = Array.isArray(skippedHosts)
        ? skippedHosts.map(function (item) { return String((item || {}).hostname || item || '').trim(); }).filter(Boolean)
        : [];
      if (!hosts.length) return '';
      return hosts.join(', ');
    }

    function getOverviewRowByHostname(hostname) {
      const target = String(hostname || '').trim();
      if (!target) return null;
      return getOverviewRows().find(function (row) {
        return String((row || {}).hostname || '').trim() === target;
      }) || null;
    }

    function cancelOverviewDeployPasswordFlow(options) {
      const flow = store.pendingOverviewDeploy;
      if (!flow) return;
      const opts = options || {};
      const entryId = String(flow.entry_id || '');
      const validatedCount = Array.isArray(flow.started_hosts) ? flow.started_hosts.length : 0;
      const skippedHosts = Array.isArray(flow.skipped_hosts) ? flow.skipped_hosts : [];
      const totalCount = Array.isArray(flow.hostnames) ? flow.hostnames.length : 0;
      if (entryId) {
        send({ cmd: 'finalize_vps_deploy_session', entry_id: entryId });
      }
      flow.pending_password = '';
      store.pendingOverviewDeploy = null;
      if (!opts.silent) {
        if (validatedCount > 0) {
          toast(String(flow.command_text || 'Update Linux') + ' continues for ' + validatedCount + ' of ' + totalCount + ' selected host' + (totalCount === 1 ? '' : 's') + (skippedHosts.length ? '. Not started because already running: ' + formatSkippedDeployHosts(skippedHosts) + '.' : '.'), 'info');
        } else {
          toast(String(flow.command_text || 'Update Linux') + ' cancelled.', 'info');
        }
      }
    }

    function processOverviewDeployPasswordFlow() {
      const flow = store.pendingOverviewDeploy;
      if (!flow || flow.validating || flow.prompt_open || flow.finalizing) {
        return;
      }
      flow.remaining_hosts = Array.isArray(flow.remaining_hosts)
        ? flow.remaining_hosts.map(function (item) { return String(item || '').trim(); }).filter(Boolean)
        : [];
      if (!flow.remaining_hosts.length) {
        const validatedCount = Array.isArray(flow.started_hosts) ? flow.started_hosts.length : 0;
        const skippedHosts = Array.isArray(flow.skipped_hosts) ? flow.skipped_hosts : [];
        const skippedLabel = formatSkippedDeployHosts(skippedHosts);
        const totalCount = Array.isArray(flow.hostnames) ? flow.hostnames.length : 0;
        if (!flow.summary_toast_shown) {
          flow.summary_toast_shown = true;
          if (validatedCount === totalCount && totalCount > 0) {
            toast(String(flow.command_text || 'Update Linux') + ' started for ' + validatedCount + ' host' + (validatedCount === 1 ? '' : 's') + '.', 'success');
          } else if (validatedCount > 0) {
            toast(String(flow.command_text || 'Update Linux') + ' started for ' + validatedCount + ' of ' + totalCount + ' selected host' + (totalCount === 1 ? '' : 's') + (skippedLabel ? '. Not started because already running: ' + skippedLabel + '.' : '.'), 'info');
          } else if (skippedLabel) {
            toast(String(flow.command_text || 'Update Linux') + ' not started. Already running: ' + skippedLabel + '.', 'warning');
          } else {
            toast(String(flow.command_text || 'Update Linux') + ' cancelled.', 'info');
          }
        }
        if (String(flow.entry_id || '').trim()) {
          flow.finalizing = true;
          send({ cmd: 'finalize_vps_deploy_session', entry_id: flow.entry_id });
        } else {
          store.pendingOverviewDeploy = null;
        }
        renderUi({ forceView: true });
        return;
      }
      const nextHost = String(flow.remaining_hosts[0] || '').trim();
      if (!nextHost) {
        flow.remaining_hosts.shift();
        processOverviewDeployPasswordFlow();
        return;
      }
      const totalCount = Array.isArray(flow.hostnames) ? flow.hostnames.length : flow.remaining_hosts.length;
      const hostIndex = Math.max(1, (flow.hostnames || []).indexOf(nextHost) + 1);
      flow.prompt_open = true;
      flow.prompt_host = nextHost;
      setTimeout(function () {
        openPasswordPrompt(nextHost, function (password) {
          const activeFlow = store.pendingOverviewDeploy;
          if (!activeFlow || String(activeFlow.prompt_host || '') !== nextHost) {
            return false;
          }
          activeFlow.pending_password = String(password || '');
          activeFlow.validating = true;
          setPasswordPromptStatus('', 'error');
          setPasswordPromptBusy(true, 'Validating...');
          send({
            cmd: 'validate_and_stage_vps_deploy_host',
            hostnames: Array.isArray(activeFlow.hostnames) ? activeFlow.hostnames.slice() : [],
            hostname: nextHost,
            password: activeFlow.pending_password,
            command: String(activeFlow.command || 'vps-update'),
            mode: String(activeFlow.mode || 'parallel'),
            debug: !!activeFlow.debug,
            extra_vars: activeFlow.extra_vars || null,
            entry_id: String(activeFlow.entry_id || ''),
            accept_unknown_host: !!activeFlow.accept_unknown_host
          });
          return false;
        }, {
          title: 'Validate VPS User Password',
          message: 'Enter the VPS user password for ' + nextHost + ' to run ' + String(flow.command_text || 'Update Linux') + '. Host ' + hostIndex + ' of ' + totalCount + '.',
          confirmLabel: 'Validate and Start',
          persistToForm: false
        });
      }, 0);
    }

    function compareOverviewValues(a, b) {
      if (typeof a === 'boolean' || typeof b === 'boolean') {
        return Number(!!a) - Number(!!b);
      }
      const aNum = typeof a === 'number' ? a : Number.NaN;
      const bNum = typeof b === 'number' ? b : Number.NaN;
      if (Number.isFinite(aNum) && Number.isFinite(bNum)) {
        return aNum - bNum;
      }
      return String(a == null ? '' : a).localeCompare(String(b == null ? '' : b), undefined, { numeric: true, sensitivity: 'base' });
    }

    function getSortedOverviewRows(rows) {
      const list = Array.isArray(rows) ? rows.slice() : [];
      const sort = normalizeOverviewSort(store.overviewSort);
      const column = OVERVIEW_COLUMNS.find(function (item) { return item.key === sort.field; }) || OVERVIEW_COLUMNS[0];
      return list.sort(function (left, right) {
        const leftMaster = left && left.nav === 'master';
        const rightMaster = right && right.nav === 'master';
        if (leftMaster !== rightMaster) {
          return leftMaster ? -1 : 1;
        }
        const direction = sort.dir === 'desc' ? -1 : 1;
        const result = compareOverviewValues(column.getValue(left), column.getValue(right));
        if (result !== 0) {
          return result * direction;
        }
        return String((left || {}).name || '').localeCompare(String((right || {}).name || ''), undefined, { numeric: true, sensitivity: 'base' });
      });
    }

        return stableStringify({
          view: store.view,

          uiFirewallIps: store.view === 'vps-setup' && ui && ui.form ? String(ui.form.firewall_ssh_ips || '') : '',

      }
      return stableStringify({ view: store.view });

    function isActiveVpsSetupFormField() {
      if (typeof document === 'undefined') return false;
      if (store.view !== 'vps-setup' || !store.hostname) return false;
      const node = document.activeElement;
      if (!node || typeof node.getAttribute !== 'function') return false;
      const fieldName = String(node.getAttribute('data-vps-field') || '');
      if (!fieldName) return false;
      return String(node.getAttribute('data-vps-host') || '') === String(store.hostname || '');

    function getOverviewVersionCore(ver) {
      return String(ver || '-').split(' /')[0].trim() || '-';
    }

    function getOverviewVersionTone(github, ver) {
      const g = String(github || '');
      const value = getOverviewVersionCore(ver);
      if (g.indexOf('✅') >= 0 || g.indexOf('✓') >= 0) return 'ok';
      if (g.indexOf('❌') >= 0) return 'error';
      if (value && value !== '-') return 'warning';
      return 'info';
    }

    function getOverviewGithubTarget(github) {
      const text = String(github || '').trim();
      if (!text || text === '-') return '';
      if (text.indexOf('❌') === 0 || text.indexOf('x') === 0 || text.indexOf('X') === 0) {
        return text.replace(/^[❌xX]\s*/, '').trim();
      }
      return '';
    }

    function getVersionStatusSub(branch, github, tone) {
      const branchText = String(branch || '-');
      const target = getOverviewGithubTarget(github);
      if (tone === 'error' && target) {
        return branchText && branchText !== '-' ? branchText + ' -> ' + target : 'Update: ' + target;
      }
      return branchText;
    }

    function renderOverviewVersionCell(version, github) {
      const value = getOverviewVersionCore(version);
      const tone = getOverviewVersionTone(github, value);
      if ((tone === 'error' || tone === 'warning') && value !== '-') {
        return `${esc(value)} <span class='tag warning'>⚠</span>`;
      }
      return esc(value);
    }

    function renderOverviewGithubCell(value) {
      const text = String(value || '-').trim();
      if (!text || text === '-') return '-';
      if (text.indexOf('✅') === 0 || text.indexOf('✓') === 0) {
        return `<span class='tag ok'>✓</span>`;
      }
      if (text.indexOf('❌') === 0 || text.indexOf('x') === 0 || text.indexOf('X') === 0) {
        const body = text.replace(/^[❌xX]\s*/, '').trim();
        return `<span class='tag error'>✕</span>${body ? ' ' + esc(body) : ''}`;
      }
      if (text.indexOf('⚠') === 0) {
        const body = text.replace(/^⚠️?\s*/, '').trim();
        return `<span class='tag warning'>⚠</span>${body ? ' ' + esc(body) : ''}`;
      }
      return esc(text);
    }

    function getDetailApiSyncLabel(summary) {
      if (!summary || summary.nav !== 'vps') return summary && summary.nav === 'master' ? 'local' : '-';
      const hostname = String(summary.hostname || '');
      const syncState = (window.overviewApiSyncController && window.overviewApiSyncController.state.syncInfo[hostname]) || {};
      if (syncState.in_sync === true) return 'OK';
      if (syncState.in_sync === false) return syncState.disconnected ? 'Out/off' : 'Out';
      if (syncState.disconnected) return 'Off';
      return '-';
    }

    function computeUptime(startValue) {
      if (startValue == null || startValue === '') return null;
      let ts = null;
      if (typeof startValue === 'number' && Number.isFinite(startValue) && startValue > 0) {
        ts = startValue * 1000;
      } else {
        const parsed = Date.parse(String(startValue || ''));
        ts = Number.isFinite(parsed) ? parsed : null;
      }
      if (!ts) return null;
      const diffMs = Date.now() - ts;
      if (diffMs < 0) return null;
      const totalHours = Math.floor(diffMs / 3600000);
      const days = Math.floor(totalHours / 24);
      const hours = totalHours % 24;
      if (days > 0) return days + 'd ' + hours + 'h';
      if (hours > 0) return hours + 'h ' + Math.floor((diffMs % 3600000) / 60000) + 'm';
      return Math.floor(diffMs / 60000) + 'm';
    }

      const hostname = String(status.name || summary.name || store.hostname || '-');

      const uptime = computeUptime(summary.start_ts || summary.start);
      const updatesCount = Number.parseInt(String(summary.updates == null ? '' : summary.updates).trim(), 10);
      const updatesNum = Number.isFinite(updatesCount) ? updatesCount : 0;
      const updatesTone = updatesNum === 0 ? 'ok' : 'error';
      const reboot = !!summary.reboot_required;
      const pbguiVer = String(summary.pbgui || '-');
      const pb7Ver = String(summary.pb7 || '-');
      const pbguiBranch = String(summary.pbgui_branch || '-');
      const pb7Branch = String(summary.pb7_branch || '-');
      const apiSync = getDetailApiSyncLabel(summary);
      const pbguiTone = getOverviewVersionTone(summary.pbgui_github, summary.pbgui);
      const pb7Tone = getOverviewVersionTone(summary.pb7_github, summary.pb7);
      const pbguiSub = getVersionStatusSub(pbguiBranch, summary.pbgui_github, pbguiTone);
      const pb7Sub = getVersionStatusSub(pb7Branch, summary.pb7_github, pb7Tone);
      const tags = [];
      if (!isMaster) {
        tags.push(`<span class='tag ${online ? 'ok' : 'error'}'>${esc(onlineText)}</span>`);
        if (!summary.pbgui) {
          if (!status.last_init) tags.push(`<span class='tag warning'>Init Pending</span>`);

      } else {

        tags.push(`<span class='tag ${pbremoteConfigured ? (status.rclone_ok ? 'ok' : 'warning') : ''}'>PBRemote ${pbremoteConfigured ? (status.rclone_ok ? 'Ready' : 'Missing') : 'Skipped'}</span>`);
        tags.push(`<span class='tag ${coindataConfigured ? (status.coindata_ok ? 'ok' : 'warning') : ''}'>CoinData ${coindataConfigured ? (status.coindata_ok ? 'Ready' : 'Missing') : 'Skipped'}</span>`);
      }

      return {
        hostname,
        online,
        onlineText,
        rtdLabel,
        bootTime,
        uptime,
        updatesNum,
        updatesTone,
        reboot,
        pbguiVer,
        pb7Ver,
        pbguiBranch,
        pb7Branch,
        pbguiSub,
        pb7Sub,
        apiSync,
        pbguiTone,
        pb7Tone,
        tagsHtml: tags.join(''),

    function syncCurrentVpsFormFromDom(hostname, ui) {
      if (typeof document === 'undefined') return false;
      if (store.view !== 'vps-setup' || store.hostname !== hostname || !ui) return false;
      if (store.suppressVpsDomSyncHost === hostname) return false;
      const nodes = Array.from(document.querySelectorAll('[data-vps-field]'));

      nodes.forEach(function (node) {
        const fieldName = String(node.getAttribute('data-vps-field') || '');

        if (!fieldName || fieldHost !== hostname) return;
        const value = node.type === 'checkbox' ? !!node.checked : String(node.value || '');
        const current = (ui.form || {})[fieldName];
        const same = node.type === 'checkbox' ? (!!current === !!value) : (String(current || '') === String(value || ''));
        if (!same) {
          ui.form[fieldName] = value;
          changed = true;

      const inputs = Array.from(document.querySelectorAll('.pw-wrap input[oninput]'));
      let changed = false;
      ['user_pw', 'coinmarketcap_api_key'].forEach(function (fieldName) {
        const input = inputs.find(function (node) {
          const handler = String(node.getAttribute('oninput') || '');
          if (handler.indexOf('setVpsField(') < 0) return false;
          const field = node.closest('.field');
          const label = String(field && field.querySelector('label') ? field.querySelector('label').textContent || '' : '').trim().toLowerCase();
          if (fieldName === 'user_pw') return label.indexOf('vps user password') >= 0;
          if (fieldName === 'coinmarketcap_api_key') return label.indexOf('coinmarketcap api key') >= 0;
          return false;
        });
        if (!input) return;
        const domValue = String(input.value || '');
        if (!domValue.trim()) return;
        if (String((((ui || {}).form || {})[fieldName]) || '') === domValue) return;
        ui.form[fieldName] = domValue;
        markVpsFieldDirtyState(ui, fieldName, domValue);
        changed = true;
      });
      return changed;
    }

    function getEffectiveVpsUserPw(hostname) {
      const detail = store.detail && store.detail.kind === 'vps' && store.detail.hostname === hostname ? store.detail : null;
      const ui = ensureVpsUi(hostname, detail);
      const localValue = String((((ui || {}).form || {}).user_pw) || '');

      if ((store.view === 'vps' || store.view === 'vps-setup') && store.hostname === hostname && syncCurrentVpsSecretsFromDom()) {
        return String((((ui || {}).form || {}).user_pw) || '');

    function getSecretStatus(hostname, fieldName) {
      const detail = store.detail && store.detail.kind === 'vps' && store.detail.hostname === hostname ? store.detail : null;
      return (((detail || {}).config || {}).secret_status || {})[fieldName] || { stored: false, expires_at: 0, remaining_seconds: 0 };
    }

    function hasSessionSecret(hostname, fieldName) {
      const status = getSecretStatus(hostname, fieldName);
      return !!status.stored && Number(status.remaining_seconds || 0) > 0;
    }

    function formatRemainingSeconds(value) {
      const seconds = Math.max(parseInt(value, 10) || 0, 0);
      if (!seconds) return 'expired';
      const minutes = Math.floor(seconds / 60);
      const rest = seconds % 60;
      return String(minutes).padStart(2, '0') + ':' + String(rest).padStart(2, '0');
    }

    function renderSecretHint(hostname, fieldName) {
      const status = getSecretStatus(hostname, fieldName);
      if (!status.stored) return '';
      if (Number(status.remaining_seconds || 0) <= 0) {
        return `<div class='field-sub error'>Session password expired</div>`;
      }
      return `<div class='field-sub'>Stored in this login session for ${esc(formatRemainingSeconds(status.remaining_seconds))}</div>`;
    }

      const key = String(hostname || '') + ':' + String(fieldName || '');

    function scheduleVpsSecretSyncPasses() {
      if (Array.isArray(store.vpsSecretSyncTimers)) {
        store.vpsSecretSyncTimers.forEach(function (timerId) {
          window.clearTimeout(timerId);
        });
      } else if (store.vpsSecretSyncTimer) {
        window.clearTimeout(store.vpsSecretSyncTimer);
      }
      if (store.vpsSecretSyncInterval) {
        window.clearInterval(store.vpsSecretSyncInterval);
        store.vpsSecretSyncInterval = null;
      }
      store.vpsSecretSyncTimers = [];
      if (store.view !== 'vps' || !store.hostname) return;
      [80, 250, 600, 1200, 2400, 4000].forEach(function (delayMs) {
        const timerId = window.setTimeout(function () {
          applySyncedVpsSecrets();
        }, delayMs);
        store.vpsSecretSyncTimers.push(timerId);
      });
      store.vpsSecretSyncDeadline = Date.now() + 15000;
      store.vpsSecretSyncInterval = window.setInterval(function () {
        if (store.view !== 'vps' || !store.hostname) {
          window.clearInterval(store.vpsSecretSyncInterval);
          store.vpsSecretSyncInterval = null;
          return;
        }
        if (Date.now() >= (store.vpsSecretSyncDeadline || 0)) {
          window.clearInterval(store.vpsSecretSyncInterval);
          store.vpsSecretSyncInterval = null;
          return;
        }
        applySyncedVpsSecrets();
      }, 500);
    }

    function _liveUpdateStatusFlags(containerId, status) {
      var FLAGS = [
        { key: 'hosts_ok', okSub: 'IP and hostname configured locally', failSub: 'Missing /etc/hosts entry' },
        { key: 'ssh_ok', okSub: 'SSH port reachable', failSub: 'SSH still not reachable' },

        { key: 'coindata_ok', okSub: 'CoinData API OK', failSub: 'CoinData API missing/invalid' },
        { key: 'online', okSub: 'Live telemetry received', failSub: 'No current live telemetry' }
      ];
      FLAGS.forEach(function(f) {
        if (!Object.prototype.hasOwnProperty.call(status, f.key)) return;
        var ok = !!status[f.key];
        var el = document.querySelector('#' + containerId + ' [data-flag="' + f.key + '"]');

          var text = ok ? (f.okSub || '') : (f.failSub || '');

            var telemetryAge = Number(status.telemetry_age);
            text = 'Telemetry stale' + (Number.isFinite(telemetryAge) && telemetryAge > 0 ? ' (' + formatLatency(telemetryAge * 1000) + ' ago)' : '');
          }
          if (f.key === 'coindata_ok') {
            var credits = status.cmc_credits;
            if (ok && credits !== null && credits !== undefined && String(credits).trim() !== '') {
              text = asCountLabel(credits, 'credit left', 'credits left');

          setNodeTextIfChanged(sub, text);

    function _liveUpdateServiceRows(containerId, items) {
      var tbody = document.querySelector('#' + containerId + ' tbody');

      rows.forEach(function(row) {
        rowMap[String(row.getAttribute('data-bot') || '')] = row;
      });
      var needsFullRerender = rows.length !== items.length;
      var nextNames = {};
      items.forEach(function(item) {
        var name = String(item.name || '');
        nextNames[name] = true;
        var row = rowMap[name];
        if (!row) {
          needsFullRerender = true;
          return;
        }
        var host = item.server || store.hostname || '';
        var pbVersion = String(item.pb_version || '7');

          var cell = row.querySelector('td[data-col="' + col.field + '"]');

            needsFullRerender = true;
            return;
          }
          var payload = cellHtml[col.field] || { html: '', sig: '' };
          if (cell.getAttribute('data-render-sig') !== payload.sig) {
            cell.setAttribute('data-render-sig', payload.sig);
            cell.innerHTML = payload.html;
          }
        });
      });
      rows.forEach(function(row) {
        var name = String(row.getAttribute('data-bot') || '');

    function _liveUpdateTelemetry(serverMetrics) {
      if (!serverMetrics) return;
      var labels = {mem:'Memory', disk:'Disk', swap:'Swap'};
      ['mem', 'disk', 'swap'].forEach(function(key) {
        var metric = serverMetrics[key];
        if (!metric) return;
        var el = document.querySelector('[data-meter="' + key + '"]');
        if (!el) return;
        var title = el.querySelector('.resource-meter-title');
        if (title) setNodeTextIfChanged(title, labels[key] + ' Free: ' + esc(metric.free_mb || 0) + ' MB | Used: ' + esc(metric.used_mb || 0) + ' MB | Total: ' + esc(metric.total_mb || 0) + ' MB');
        var usage = Number.isFinite(Number(metric.usage_pct)) ? Math.max(0, Math.min(Number(metric.usage_pct), 100)) : 0;
        var liveRow = el.querySelector('[data-resource-row="live"]');
        if (liveRow) setNodeClassNameIfChanged(liveRow, 'cpu-meter-row');
        var liveFill = el.querySelector('[data-resource-bar="live"]');
        if (liveFill) {
          setNodeClassNameIfChanged(liveFill, 'resource-fill ' + resourceTone(usage));
          liveFill.style.width = usage + '%';
        }
        var liveValue = el.querySelector('[data-resource-value="live"]');
        if (liveValue) {
          setNodeTextIfChanged(liveValue, (Number.isFinite(Number(metric.usage_pct)) ? Number(metric.usage_pct) : 0).toFixed(1) + '%');
        }
        var peak60 = Number.isFinite(Number(metric.usage_60s_peak)) ? Math.max(0, Math.min(Number(metric.usage_60s_peak), 100)) : 0;
        var peak60Window = Number.isFinite(Number(metric.usage_60s_window)) ? Number(metric.usage_60s_window) : 0;
        var peak60Confirmed = peak60Window >= 60;
        var peakRow = el.querySelector('[data-resource-row="peak60"]');
        if (peakRow) {
          setNodeClassNameIfChanged(peakRow, peak60Confirmed ? 'cpu-meter-row' : 'cpu-meter-row warming');
        }
        var peakFill = el.querySelector('[data-resource-bar="peak60"]');
        if (peakFill) {
          setNodeClassNameIfChanged(peakFill, 'resource-fill ' + resourceTone(peak60));
          peakFill.style.width = peak60 + '%';
        }
        var peakValue = el.querySelector('[data-resource-value="peak60"]');
        if (peakValue) {
          var peakText = 'waiting';
          if (peak60Confirmed) {
            peakText = peak60.toFixed(1) + '%';
          } else if (peak60Window > 0) {
            peakText = 'warming ' + Math.min(60, Math.floor(peak60Window)) + 's';
          }
          setNodeTextIfChanged(peakValue, peakText);
        }
      });
      var cpuMeter = document.querySelector('[data-meter="cpu"]');
      if (cpuMeter) {
        var cpuTelemetry = formatCpuTelemetry(serverMetrics);
        var cpuTitle = cpuMeter.querySelector('.resource-meter-title');

        var liveRow = cpuMeter.querySelector('[data-cpu-row="live"]');

          setNodeClassNameIfChanged(liveRow, 'cpu-meter-row');
        }
        var liveValue = cpuMeter.querySelector('[data-cpu-value="live"]');
        if (liveValue) setNodeTextIfChanged(liveValue, cpuTelemetry.liveValueText);
        var liveFill = cpuMeter.querySelector('[data-cpu-bar="live"]');
        if (liveFill) {
          setNodeClassNameIfChanged(liveFill, 'resource-fill ' + (cpuTelemetry.liveTone || resourceTone(cpuTelemetry.livePct)));
          liveFill.style.width = cpuTelemetry.livePct + '%';
        }
        var avgRow = cpuMeter.querySelector('[data-cpu-row="avg60"]');
        if (avgRow) {
          setNodeClassNameIfChanged(avgRow, cpuTelemetry.avg60Confirmed ? 'cpu-meter-row' : 'cpu-meter-row warming');
        }
        var avgValue = cpuMeter.querySelector('[data-cpu-value="avg60"]');
        if (avgValue) setNodeTextIfChanged(avgValue, cpuTelemetry.avg60ValueText);
        var avgFill = cpuMeter.querySelector('[data-cpu-bar="avg60"]');

    function normalizeVpsLogViewerTarget(filename) {
      const raw = String(filename || '').trim();
      if (!raw) return 'PBCoinData';
      const normalized = raw.replace(/^\.\//, '');
      const serviceMap = {
        'logs/PBCoinData.log': 'PBCoinData',
        'data/logs/PBCoinData.log': 'PBCoinData',
        'logs/PBRun.log': 'PBRun',
        'data/logs/PBRun.log': 'PBRun',
        'logs/PBRemote.log': 'PBRemote',
        'data/logs/PBRemote.log': 'PBRemote',
        'logs/PBData.log': 'PBData',
        'data/logs/PBData.log': 'PBData',
        'logs/PBGui.log': 'PBGui',
        'data/logs/PBGui.log': 'PBGui',
        'logs/PBApiServer.log': 'PBApiServer',
        'data/logs/PBApiServer.log': 'PBApiServer',
        'logs/FastAPI.log': 'FastAPI',
        'data/logs/FastAPI.log': 'FastAPI',
        'logs/VPSMonitor.log': 'VPSMonitor',
        'data/logs/VPSMonitor.log': 'VPSMonitor',
        'logs/VPSManagerApi.log': 'VPSManagerApi',
        'data/logs/VPSManagerApi.log': 'VPSManagerApi',
        'logs/Exchange.log': 'data/logs/Exchange.log',
        'data/logs/Exchange.log': 'data/logs/Exchange.log',
        'logs/PBRun.log.old': 'data/logs/PBRun.log.old',
        'data/logs/PBRun.log.old': 'data/logs/PBRun.log.old',
        'logs/sync.log': 'data/logs/sync.log',
        'data/logs/sync.log': 'data/logs/sync.log',
        'logs/sync.log.old': 'data/logs/sync.log.old',
        'data/logs/sync.log.old': 'data/logs/sync.log.old',
        'logs/tradfi_sync.log': 'data/logs/tradfi_sync.log',
        'data/logs/tradfi_sync.log': 'data/logs/tradfi_sync.log'
      };
      if (serviceMap[normalized]) return serviceMap[normalized];
      const newBotMatch = normalized.match(/software\/pb7\/logs\/(.+)\.log$/);
      if (newBotMatch) return 'Bot:' + newBotMatch[1] + ':7';
      const oldBotMatch = normalized.match(/pb7\/logs\/(\d{8}_.+?)\.log$/);
      if (oldBotMatch) return 'software/pb7/logs/' + oldBotMatch[1] + '.log';
      const botErrMatch = normalized.match(/(?:data\/)?run_v7\/([^/]+)\/(passivbot_err\.log(?:\.old)?)$/);
      if (botErrMatch) return 'data/run_v7/' + botErrMatch[1] + '/' + botErrMatch[2];
      const botMatch = normalized.match(/(?:data\/)?run_v7\/([^/]+)\/passivbot\.log$/);
      if (botMatch) return 'Bot:' + botMatch[1] + ':7';
      if (normalized.indexOf('logs/') === 0) return 'data/' + normalized;
      if (normalized.indexOf('run_v7/') === 0 || normalized.indexOf('multi/') === 0 || normalized.indexOf('instances/') === 0) {
        return 'data/' + normalized;
      }
      return normalized;
    }

    function getVpsLogViewerServices(hostname, vpState) {
      const detail = store.detail && store.detail.kind === 'vps' && store.detail.hostname === hostname ? store.detail : null;
      const logfiles = detail && Array.isArray(detail.logfiles) ? detail.logfiles : [];
      const state = vpState || store.state || {};
      const botLogsByHost = (state.bot_logs || {});
      const botLogs = botLogsByHost[hostname] || {};
      const hostMeta = (state.host_meta || {})[hostname] || {};
      const availableLogs = Array.isArray(hostMeta.available_logs) ? hostMeta.available_logs : [];
      const services = [];
      logfiles.forEach(function (filename) {
        const normalized = normalizeVpsLogViewerTarget(filename);
        if (normalized) services.push(normalized);
      });
      if (!logfiles.length) {
        availableLogs.forEach(function (filename) {
          const normalized = normalizeVpsLogViewerTarget(filename);
          if (normalized) services.push(normalized);
        });
        Object.keys(botLogs).forEach(function (botName) {
          const entries = Array.isArray(botLogs[botName]) ? botLogs[botName] : [];
          entries.forEach(function (filename) {
            const normalized = normalizeVpsLogViewerTarget(filename);
            if (normalized) services.push(normalized);
          });
        });
      }
      if (detail && detail.log_preview && detail.log_preview.filename) {
        const current = normalizeVpsLogViewerTarget(detail.log_preview.filename);
        if (current && services.indexOf(current) >= 0) services.unshift(current);
      }
      return Array.from(new Set(services));
    }

    function optionalServiceStatusFromDetail(status, service) {
      if (service === 'PBRemote' && Object.prototype.hasOwnProperty.call(status || {}, 'pbremote_configured') && !status.pbremote_configured) {
        return { status: 'disabled', expected: false, reason: 'PBRemote bucket is not configured' };

      if (service === 'PBCoinData' && Object.prototype.hasOwnProperty.call(status || {}, 'coindata_configured') && !status.coindata_configured) {
        return { status: 'disabled', expected: false, reason: 'CoinMarketCap API key is not configured' };

        });

    }

    function getMasterHostLogServices(hostname, vpState) {

    function renderMasterHostLogsView() {
