<!-- Dashboard Balance component — embedded via st.html(unsafe_allow_javascript=True).
     Config injected as JS variables (%%PLACEHOLDER%% pattern) by Dashboard.py.
     All angle brackets inside JS strings escaped as \x3C / \x3E for DOMPurify.
     CSS is provided by dashboard_render.js (loaded dynamically at init). -->

<div id="db-root" class="db-root" data-token="" data-api-base="" data-api-host="">
    <div class="db-header">
        <div class="db-totals">
            <div class="db-total-item">
                <label>Total Balance</label>
                <span class="db-green" id="db-tot-balance">—</span>
            </div>
            <div class="db-total-item">
                <label>Total uPnl</label>
                <span id="db-tot-upnl">—</span>
            </div>
            <div class="db-total-item">
                <label>Total TWE</label>
                <span id="db-tot-twe">—</span>
            </div>
        </div>
        <div class="db-user-sel" id="db-user-sel-edit" style="display:none">
            <label>Users:</label>
            <div style="position:relative">
                <div class="db-msel-btn" id="db-msel-btn">
                    <span id="db-msel-label">ALL</span>
                    <span class="db-msel-arrow">▼</span>
                </div>
                <div class="db-msel-drop" id="db-msel-drop">
                    <input class="db-msel-filter" id="db-msel-filter" type="text" placeholder="Filter...">
                    <div class="db-msel-list" id="db-msel-list"></div>
                </div>
            </div>
        </div>
        <div class="db-user-sel" id="db-user-sel-static">
            <label>Users:</label>
            <span id="db-user-static" style="color:#e2e8f0;font-size:0.78rem;"></span>
        </div>
    </div>
    <div class="db-status" id="db-status">Connecting…</div>
    <div class="db-table-wrap">
        <table class="db-table">
            <thead>
                <tr>
                    <th data-col="user">User <span class="db-sort-arrow"></span></th>
                    <th data-col="date">Date <span class="db-sort-arrow"></span></th>
                    <th data-col="balance">Balance USDT <span class="db-sort-arrow"></span></th>
                    <th data-col="upnl">uPnl <span class="db-sort-arrow"></span></th>
                    <th data-col="we">TWE % <span class="db-sort-arrow"></span></th>
                </tr>
            </thead>
            <tbody id="db-body"></tbody>
        </table>
        <div class="db-nodata" id="db-nodata" style="display:none">No balance data available.</div>
    </div>
</div>

<script>
(function () {
    // Config injected directly by view_balance_impl in Dashboard.py
    var TOKEN    = "%%TOKEN%%";
    var API_BASE = "%%API_BASE%%";
    var API_HOST = "%%API_HOST%%";
    var EDIT_MODE = %%EDIT_MODE%%;
    var selectedUsers = %%USERS%%;
    var allUsers = %%ALL_USERS%%;
    var INSTANCE_ID = "%%INSTANCE_ID%%";
    var POSITION = "%%POSITION%%";
    var HEIGHT   = %%HEIGHT%%;

    // Kill previous instance's WebSocket so it cannot overwrite our DOM
    if (window._dbBalanceWs) { try { window._dbBalanceWs.close(); } catch(_) {} }
    if (window._dbBalanceReconnTimer) clearTimeout(window._dbBalanceReconnTimer);
    window._dbBalanceInstanceId = INSTANCE_ID;

    function isStale() { return window._dbBalanceInstanceId !== INSTANCE_ID; }

    /* Apply height constraint if stored */
    if (HEIGHT > 0) {
        var _dbRoot = document.getElementById('db-root');
        if (_dbRoot) {
            _dbRoot.style.maxHeight = HEIGHT + 'px';
            _dbRoot.style.overflow = 'auto';
        }
    }

    var DR_VERSION = '20260322e';

    /* Load dashboard_render.js once (CSS + shared render primitives) */
    function _loadRenderScript(cb) {
        if (window.DashRender && window.DashRender.VERSION !== DR_VERSION) {
            window.DashRender = null;
            var old = document.getElementById('dr-css');
            if (old) old.parentNode.removeChild(old);
        }
        if (window.DashRender) { cb(); return; }
        if (window._drLoading) { setTimeout(function () { _loadRenderScript(cb); }, 50); return; }
        window._drLoading = true;
        var proto = (window.location.protocol === 'https:') ? 'https' : 'http';
        var s = document.createElement('script');
        s.src = proto + '://' + API_HOST + '/app/dashboard_render.js?v=' + DR_VERSION;
        s.onload  = function () { window._drLoading = false; cb(); };
        s.onerror = function () { window._drLoading = false; cb(); };   // fallback: continue anyway
        document.head.appendChild(s);
    }

    // Show/hide user select vs static label
    var editSel   = document.getElementById('db-user-sel-edit');
    var staticSel = document.getElementById('db-user-sel-static');
    var staticLbl = document.getElementById('db-user-static');
    if (EDIT_MODE) {
        if (editSel) editSel.style.display = '';
        if (staticSel) staticSel.style.display = 'none';
    } else {
        if (editSel) editSel.style.display = 'none';
        if (staticSel) staticSel.style.display = '';
        if (staticLbl) staticLbl.textContent = selectedUsers.join(', ');
    }
    var ws            = null;
    var reconnTimer   = null;
    var reconnDelay   = 1000;
    var lastRows      = [];     // cached rows for re-sorting
    var sortCol       = null;   // current sort column key
    var sortAsc       = true;   // sort direction

    function tweColor(v)  { return v < 100 ? '#22c55e' : v < 200 ? '#f59e0b' : '#ef4444'; }
    function upnlColor(v) { return v >= 0  ? '#22c55e' : '#ef4444'; }
    function tweBarPct(v) { return Math.min(100, (v / 300) * 100).toFixed(1); }
    function signedFmt(v) { return (v >= 0 ? '+' : '') + v.toFixed(2); }
    function setStatus(m) { var e = document.getElementById('db-status'); if (e) e.textContent = m; }

    function renderRows(rows) {
        var tbody  = document.getElementById('db-body');
        var noData = document.getElementById('db-nodata');
        if (!tbody) return;
        noData.style.display = rows.length === 0 ? 'block' : 'none';
        /* Delegate to shared module — single source of truth for row HTML */
        if (window.DashRender) {
            DashRender.renderBalanceRows(tbody, rows);
        } else {
            tbody.innerHTML = '';   // fallback: empty (unlikely once loaded)
        }
    }

    function applySortAndRender() {
        var rows = lastRows.slice();
        if (sortCol) {
            var isNum = (sortCol === 'balance' || sortCol === 'upnl' || sortCol === 'we');
            rows.sort(function(a, b) {
                var va = a[sortCol], vb = b[sortCol];
                if (isNum) return sortAsc ? va - vb : vb - va;
                va = String(va).toLowerCase(); vb = String(vb).toLowerCase();
                if (va < vb) return sortAsc ? -1 : 1;
                if (va > vb) return sortAsc ? 1 : -1;
                return 0;
            });
        }
        renderRows(rows);
        updateSortIndicators();
    }

    function updateSortIndicators() {
        var ths = document.querySelectorAll('.db-table thead th');
        for (var i = 0; i < ths.length; i++) {
            var th = ths[i];
            var col = th.getAttribute('data-col');
            var arrow = th.querySelector('.db-sort-arrow');
            if (col === sortCol) {
                th.classList.add('db-sorted');
                if (arrow) arrow.textContent = sortAsc ? '\u25B2' : '\u25BC';
            } else {
                th.classList.remove('db-sorted');
                if (arrow) arrow.textContent = '';
            }
        }
    }

    function dbSortByCol(col) {
        if (sortCol === col) {
            sortAsc = !sortAsc;
        } else {
            sortCol = col;
            sortAsc = (col === 'balance' || col === 'upnl' || col === 'we') ? false : true;
        }
        applySortAndRender();
    }

    function renderData(data) {
        var rows = (data && data.rows) ? data.rows : [];
        lastRows = rows;
        if (sortCol) {
            applySortAndRender();
        } else {
            var noData = document.getElementById('db-nodata');
            if (noData) noData.style.display = rows.length === 0 ? 'block' : 'none';
            renderRows(rows);
        }
        var t   = (data && data.totals) ? data.totals : {};
        var tc2 = tweColor(t.we   || 0);
        var uc2 = upnlColor(t.upnl || 0);
        var eB = document.getElementById('db-tot-balance');
        var eU = document.getElementById('db-tot-upnl');
        var eT = document.getElementById('db-tot-twe');
        if (eB) eB.textContent = '$' + (t.balance || 0).toFixed(2) + ' USDT';
        if (eU) { eU.textContent = signedFmt(t.upnl || 0); eU.style.color = uc2; }
        if (eT) { eT.textContent = (t.we || 0).toFixed(2) + ' %'; eT.style.color = tc2; }
        // Merge any new users from response into allUsers
        if (rows.length > 0) {
            for (var ri = 0; ri < rows.length; ri++) {
                if (allUsers.indexOf(rows[ri].user) < 0) allUsers.push(rows[ri].user);
            }
        }
    }

    function buildUserSelect() {
        var list = document.getElementById('db-msel-list');
        if (!list) return;
        list.innerHTML = '';
        for (var i = 0; i < allUsers.length; i++) {
            var u = allUsers[i];
            var item = document.createElement('div');
            item.className = 'db-msel-item';
            item.setAttribute('data-user', u.toLowerCase());
            var cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.value = u;
            cb.checked = (selectedUsers.indexOf(u) >= 0);
            cb.addEventListener('change', (function(val) {
                return function() { dbOnCheckChange(val, this.checked); };
            })(u));
            var lbl = document.createElement('span');
            lbl.textContent = u;
            item.appendChild(cb);
            item.appendChild(lbl);
            item.addEventListener('click', function(e) {
                if (e.target.tagName !== 'INPUT') {
                    var c = this.querySelector('input');
                    c.checked = !c.checked;
                    c.dispatchEvent(new Event('change'));
                }
            });
            list.appendChild(item);
            if (u === 'ALL') {
                var sep = document.createElement('div');
                sep.className = 'db-msel-sep';
                list.appendChild(sep);
            }
        }
        updateMselLabel();
    }

    function dbOnCheckChange(val, checked) {
        if (val === 'ALL') {
            if (checked) {
                selectedUsers = ['ALL'];
                uncheckAllExcept('ALL');
            } else {
                // In edit mode allow deselecting ALL (empty = no filter set yet)
                if (EDIT_MODE) {
                    selectedUsers = [];
                } else {
                    selectedUsers = ['ALL'];
                    recheckAll();
                }
                return;
            }
        } else {
            var idx = selectedUsers.indexOf(val);
            if (checked) {
                var ai = selectedUsers.indexOf('ALL');
                if (ai >= 0) selectedUsers.splice(ai, 1);
                if (idx < 0) selectedUsers.push(val);
                uncheckByVal('ALL');
            } else {
                if (idx >= 0) selectedUsers.splice(idx, 1);
            }
            // Allow empty selection in edit mode (shows '— select —')
            // In view mode fallback to ALL
            if (selectedUsers.length === 0 && !EDIT_MODE) {
                selectedUsers = ['ALL'];
                recheckAll();
            }
        }
        updateMselLabel();
        syncSelection();
        fetchBalance();
    }

    function syncSelection() {
        if (!EDIT_MODE || !TOKEN || !API_BASE || !POSITION) return;
        fetch(API_BASE + '/dashboard/balance/selection', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN},
            body: JSON.stringify({position: POSITION, users: selectedUsers})
        }).catch(function() {});
    }

    function uncheckAllExcept(keep) {
        var cbs = document.querySelectorAll('#db-msel-list input[type="checkbox"]');
        for (var i = 0; i < cbs.length; i++) {
            if (cbs[i].value !== keep) cbs[i].checked = false;
        }
    }
    function uncheckByVal(val) {
        var cbs = document.querySelectorAll('#db-msel-list input[type="checkbox"]');
        for (var i = 0; i < cbs.length; i++) {
            if (cbs[i].value === val) cbs[i].checked = false;
        }
    }
    function recheckAll() {
        var cbs = document.querySelectorAll('#db-msel-list input[type="checkbox"]');
        for (var i = 0; i < cbs.length; i++) {
            cbs[i].checked = (cbs[i].value === 'ALL');
        }
    }

    function updateMselLabel() {
        var lbl = document.getElementById('db-msel-label');
        if (!lbl) return;
        if (selectedUsers.length === 0) {
            lbl.textContent = '\u2014 select \u2014';
        } else if (selectedUsers.indexOf('ALL') >= 0) {
            lbl.textContent = 'ALL';
        } else if (selectedUsers.length === 1) {
            lbl.textContent = selectedUsers[0];
        } else {
            lbl.textContent = selectedUsers.length + ' users';
        }
    }

    function usersParam() {
        if (!selectedUsers.length || selectedUsers.indexOf('ALL') >= 0) return 'ALL';
        return selectedUsers.join(',');
    }

    function fetchBalance() {
        if (isStale()) return;
        if (!TOKEN || !API_BASE) return;
        var url = API_BASE + '/dashboard/balance?users=' + usersParam();
        fetch(url, { headers: { 'Authorization': 'Bearer ' + TOKEN } })
            .then(function(r) { if (isStale()) return; if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
            .then(function(d) { if (isStale() || !d) return; renderData(d); setStatus('Updated: ' + new Date().toLocaleTimeString()); })
            .catch(function(e) { if (!isStale()) setStatus('\u26a0 Data unavailable'); });
    }

    function connect() {
        if (isStale()) return;
        if (!TOKEN || !API_HOST) return;
        clearTimeout(reconnTimer);
        var proto = (window.location.protocol === 'https:') ? 'wss' : 'ws';
        ws = new WebSocket(proto + '://' + API_HOST + '/ws/dashboard?token=' + TOKEN);
        window._dbBalanceWs = ws;
        ws.onopen    = function() { if (isStale()) { ws.close(); return; } reconnDelay = 1000; setStatus('Connected \u2014 fetching\u2026'); fetchBalance(); };
        ws.onmessage = function(evt) {
            if (isStale()) { ws.close(); return; }
            try { var m = JSON.parse(evt.data); if (m.type === 'balance_updated') fetchBalance(); } catch(_) {}
        };
        ws.onclose   = function() {
            if (isStale()) return;
            setStatus('Disconnected \u2014 reconnecting\u2026');
            reconnTimer = setTimeout(connect, reconnDelay);
            reconnDelay = Math.min(reconnDelay * 2, 30000);
            window._dbBalanceReconnTimer = reconnTimer;
        };
        ws.onerror   = function() { ws.close(); };
    }

    // Build user select immediately from injected list
    buildUserSelect();

    // Toggle dropdown open/close
    var mselBtn = document.getElementById('db-msel-btn');
    var mselDrop = document.getElementById('db-msel-drop');
    var mselFilter = document.getElementById('db-msel-filter');
    if (mselBtn && mselDrop) {
        mselBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            var wasOpen = mselDrop.classList.contains('open');
            mselDrop.classList.toggle('open');
            if (!wasOpen && mselFilter) { mselFilter.value = ''; filterUsers(''); mselFilter.focus(); }
        });
        mselDrop.addEventListener('click', function(e) { e.stopPropagation(); });
        if (!window._dbBalCloseHandler) {
            window._dbBalCloseHandler = function() { var d = document.getElementById('db-msel-drop'); if (d) d.classList.remove('open'); };
            document.addEventListener('click', window._dbBalCloseHandler);
        }
    }
    if (mselFilter) {
        mselFilter.addEventListener('input', function() { filterUsers(this.value); });
    }

    function filterUsers(q) {
        q = q.toLowerCase();
        var items = document.querySelectorAll('#db-msel-list .db-msel-item');
        for (var i = 0; i < items.length; i++) {
            var u = items[i].getAttribute('data-user') || '';
            items[i].style.display = (!q || u === 'all' || u.indexOf(q) >= 0) ? '' : 'none';
        }
    }

    // Attach event listeners (DOMPurify strips inline onclick/onchange)
    var ths = document.querySelectorAll('.db-table thead th[data-col]');
    for (var ti = 0; ti < ths.length; ti++) {
        (function(th) {
            th.addEventListener('click', function() { dbSortByCol(th.getAttribute('data-col')); });
        })(ths[ti]);
    }

    /* Load shared CSS + render module, then connect */
    _loadRenderScript(function () {
        if (window.DashRender) { DashRender.injectCSS(); }
        connect();
        fetchBalance();
    });
})();
</script>
