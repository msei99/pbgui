<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VPS Monitor</title>
<style>
/* ─── Reset & Base ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
:root {
  --bg:       #0e1117;
  --bg2:      #1a1d24;
  --bg3:      #262730;
  --border:   #333640;
  --text:     #fafafa;
  --text-dim: #a0a4ab;
  --green:    #21c354;
  --orange:   #ff8c00;
  --red:      #ff4b4b;
  --blue:     #1f77ff;
  --accent:   #4da6ff;
  --font:     'Source Sans Pro', -apple-system, BlinkMacSystemFont, sans-serif;
}
body {
  font-family: var(--font);
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  display: flex;
  flex-direction: column;
}

#metric-tooltip {
  position: fixed;
  z-index: 9999;
  max-width: 320px;
  padding: 6px 8px;
  border-radius: 6px;
  background: rgba(12, 16, 24, 0.96);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 12px;
  line-height: 1.4;
  pointer-events: none;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
  white-space: pre-line;
  display: none;
}

#cpu-history-ovl {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(3, 6, 10, 0.72);
  backdrop-filter: blur(4px);
  z-index: 3001;
}

#cpu-history-ovl.visible {
  display: flex;
}

.cpu-history-box {
  width: min(980px, calc(100vw - 32px));
  max-height: min(86vh, 880px);
  border-radius: 18px;
  background: rgba(12, 21, 34, 0.98);
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: 0 24px 70px rgba(0, 0, 0, 0.54);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.cpu-history-box.modal-history-window {
  position: fixed;
  width: min(980px, calc(100vw - 32px));
  height: min(560px, calc(100vh - 32px));
  min-width: min(520px, calc(100vw - 32px));
  min-height: min(320px, calc(100vh - 32px));
  max-width: calc(100vw - 32px);
  max-height: calc(100vh - 32px);
  overflow: hidden;
}

.cpu-history-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  background: rgba(17, 29, 47, 0.94);
}

.cpu-history-box.modal-history-window .cpu-history-head {
  cursor: move;
  user-select: none;
}

.cpu-history-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}

.cpu-history-sub {
  color: var(--text-dim);
  font-size: 12px;
}

.cpu-history-close {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 24px;
  line-height: 1;
  cursor: pointer;
  padding: 0 4px;
}

.cpu-history-close:hover { color: var(--text); }

.cpu-history-body {
  padding: 16px;
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  gap: 14px;
  overflow: hidden;
}

.cpu-chart-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.cpu-chart-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(16, 29, 48, 0.88);
  border: 1px solid rgba(255, 255, 255, 0.08);
  color: var(--text-dim);
  font-size: 12px;
}

.cpu-chart-wrap {
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.06);
  background: rgba(10, 17, 27, 0.82);
  padding: 10px;
  flex: 1;
  min-height: 240px;
  overflow: hidden;
}

.cpu-chart-svg {
  width: 100%;
  height: 100%;
  display: block;
}

.cpu-history-resize-handle {
  position: absolute;
  right: 8px;
  bottom: 8px;
  width: 18px;
  height: 18px;
  cursor: nwse-resize;
  border-radius: 8px;
  display: none;
  background: linear-gradient(135deg, transparent 0 45%, rgba(93,196,255,0.18) 45% 55%, transparent 55% 100%);
}

.cpu-history-resize-handle::before {
  content: '';
  position: absolute;
  right: 3px;
  bottom: 3px;
  width: 10px;
  height: 10px;
  border-right: 2px solid rgba(93,196,255,0.55);
  border-bottom: 2px solid rgba(93,196,255,0.55);
  border-radius: 0 0 6px 0;
}

.cpu-history-box.modal-history-window .cpu-history-resize-handle {
  display: block;
}

.cpu-history-resize-handle.side-top,
.cpu-history-resize-handle.side-bottom {
  left: 12px;
  right: 12px;
  height: 10px;
  width: auto;
  background: none;
}

.cpu-history-resize-handle.side-left,
.cpu-history-resize-handle.side-right {
  top: 12px;
  bottom: 12px;
  width: 10px;
  height: auto;
  background: none;
}

.cpu-history-resize-handle.side-top {
  top: 0;
  left: 12px;
  right: 12px;
  bottom: auto;
  cursor: ns-resize;
}

.cpu-history-resize-handle.side-right {
  top: 12px;
  right: 0;
  bottom: 12px;
  left: auto;
  cursor: ew-resize;
}

.cpu-history-resize-handle.side-bottom {
  right: 12px;
  bottom: 0;
  left: 12px;
  top: auto;
  cursor: ns-resize;
}

.cpu-history-resize-handle.side-left {
  top: 12px;
  left: 0;
  bottom: 12px;
  right: auto;
  cursor: ew-resize;
}

.cpu-history-resize-handle.corner {
  width: 18px;
  height: 18px;
}

.cpu-history-resize-handle.corner-top-left {
  top: 0;
  left: 0;
  right: auto;
  bottom: auto;
  cursor: nwse-resize;
}

.cpu-history-resize-handle.corner-top-right {
  top: 0;
  right: 0;
  left: auto;
  bottom: auto;
  cursor: nesw-resize;
}

.cpu-history-resize-handle.corner-bottom-right {
  right: 0;
  bottom: 0;
  left: auto;
  top: auto;
  cursor: nwse-resize;
}

.cpu-history-resize-handle.corner-bottom-left {
  left: 0;
  bottom: 0;
  right: auto;
  top: auto;
  cursor: nesw-resize;
}

.cpu-clickable {
  cursor: pointer;
}

.cpu-clickable:hover {
  outline: 1px solid rgba(77, 166, 255, 0.35);
  outline-offset: 2px;
  border-radius: 6px;
}

#inst-tbody td.cpu-clickable:hover {
  outline: none;
  box-shadow: inset 0 0 0 1px rgba(77, 166, 255, 0.35);
  border-radius: 6px;
}

/* ─── Connection Banner ────────────────────────────────────── */
#conn-banner {
  padding: 8px 16px;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.3s;
}
.conn-ok      { background: var(--green); color: #000; display: none; }
.conn-lost    { background: var(--red);   color: #fff; }
.conn-waiting { background: var(--orange); color: #000; }

/* ─── Page body (sidebar + content) ───────────────────────── */
#page-body {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ─── Sidebar ──────────────────────────────────────────────── */
#sidebar {
  width: 180px;
  min-width: 140px;
  max-width: 280px;
  flex-shrink: 0;
  background: var(--bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
#sidebar-resize {
  position: absolute; top: 0; right: 0; bottom: 0; width: 4px;
  cursor: col-resize; background: transparent;
}
#sidebar-resize:hover, #sidebar-resize.active { background: rgba(77,166,255,0.4); }
#sidebar-sticky { flex-shrink: 0; padding: 0.5rem 0.5rem 0; }
#sidebar-header {
  padding: 0.3rem 0.25rem 0.4rem;
}
.sb-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.09em;
  color: #64748b; font-weight: 700;
}
#sidebar-toolbar {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
  padding: 0.3rem 0.1rem 0.45rem;
  border-bottom: 1px solid var(--border);
}
.sb-sep { border: none; border-top: 1px solid var(--border); margin: 2px 0; }
.sb-btn {
  display: inline-flex;
  align-items: center;
  padding: 0.35rem 0.6rem;
  border-radius: 5px;
  font-size: 13px;
  cursor: pointer;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font);
  transition: background 0.12s, border-color 0.12s, color 0.12s;
  width: 100%;
  text-align: left;
}
.sb-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--border); }
.sb-btn.active { background: rgba(77,166,255,0.12); border-color: rgba(77,166,255,0.5); color: var(--accent); }

/* Toggle rows in sidebar */
.sb-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-dim);
  cursor: pointer;
  user-select: none;
  padding: 0.25rem 0.6rem;
}
.sb-toggle input { cursor: pointer; accent-color: var(--accent); }

/* ─── Main content ─────────────────────────────────────────── */
#main-content {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* Tab panels */
.tab-content { display: none; padding: 16px; flex: 1; overflow-y: auto; min-height: 0; }
.tab-content.active { display: flex; flex-direction: column; }

/* ─── Compact Mode Overrides ───────────────────────────────── */
body.compact .vps-card         { margin-bottom: 2px; border-radius: 4px; }
body.compact .vps-header       { padding: 4px 12px; }
body.compact .vps-title        { font-size: 13px; min-width: 290px; width: 290px; flex-shrink: 0; overflow: hidden; }
body.compact .vps-body         { padding: 0 12px 8px; }
body.compact .metrics-grid     { gap: 6px; }
body.compact .metric-card      { padding: 6px 8px; }
body.compact .metric-label     { font-size: 10px; margin-bottom: 2px; }
body.compact .metric-value     { font-size: 16px; margin-bottom: 2px; }
body.compact .metric-sub       { font-size: 10px; }
body.compact .progress-bar     { height: 4px; margin-top: 3px; }
body.compact .summary-bar      { padding: 6px 0; margin-bottom: 6px; font-size: 12px; }
body.compact .tab-content      { padding: 8px 10px; }

/* Compact inline metrics in header row — sits between vps-title and arrow */
.compact-metrics {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: minmax(0, 1fr);
  column-gap: 10px;
  flex: 1;
  margin-left: 16px;
  font-size: 12px;
  font-weight: 600;
  align-items: center;
  min-width: 0;
}
.compact-metric {
  display: grid;
  grid-template-columns: 34px minmax(0, max-content) 28px 44px;
  align-items: center;
  column-gap: 4px;
  min-width: 0;
  justify-content: start;
}
.compact-metric .cm-label {
  text-align: right;
  color: var(--text-dim);
  font-weight: 500;
  white-space: nowrap;
}
.compact-metric .cm-value {
  min-width: 0;
  text-align: right;
  white-space: nowrap;
}
.compact-metric .cm-sub {
  width: 28px;
  text-align: right;
  color: var(--text-dim);
  font-size: 10px;
  flex-shrink: 0;
  white-space: nowrap;
}
.compact-bar {
  width: 44px;
  height: 6px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: hidden;
  flex-shrink: 0;
}
.compact-bar-fill {
  display: block;
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}

/* ─── Cards / Expanders ────────────────────────────────────── */
.vps-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.vps-card.connected { border-left: 3px solid var(--green); }
.vps-card.connecting { border-left: 3px solid var(--orange); }
.vps-card.disconnected { border-left: 3px solid var(--red); }
.vps-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  cursor: pointer;
  user-select: none;
}
.vps-header:hover { background: var(--bg3); }
.vps-title {
  font-weight: 600;
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.vps-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
}
.badge-green { background: var(--green); color: #000; }
.badge-red   { background: var(--red);   color: #fff; }
.badge-orange { background: var(--orange); color: #000; }
.vps-body { padding: 0 16px 16px; }
.vps-body.collapsed { display: none; }

/* ─── Metrics Grid ─────────────────────────────────────────── */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
}
.metric-card {
  background: var(--bg3);
  border-radius: 6px;
  padding: 12px;
  text-align: center;
}
.metric-label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.metric-value {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
}
.metric-sub {
  font-size: 11px;
  color: var(--text-dim);
}

/* ─── Progress Bar ─────────────────────────────────────────── */
.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--bg);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 6px;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease, background 0.3s;
}

/* ─── Instances Table ──────────────────────────────────────── */
.filter-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-bar select, .filter-bar input {
  padding: 6px 10px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
}
.filter-bar label {
  font-size: 13px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 4px;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
th {
  text-align: left;
  padding: 8px 10px;
  background: var(--bg3);
  color: var(--text-dim);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  position: sticky;
  top: 0;
  cursor: pointer;
  user-select: none;
}
th:hover { color: var(--text); }
th .sort-arrow { font-size: 10px; margin-left: 2px; }
td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
}
tr:hover td { background: var(--bg3); }
.pnl-pos { color: var(--green); }
.pnl-neg { color: var(--red); }
.pnl-zero { color: var(--orange); }
.err-none { color: var(--green); }
.err-low  { color: var(--orange); }
.err-high { color: var(--red); }
.sync-synced  { color: var(--green); font-weight: 600; }
.sync-outdated { color: var(--orange); font-weight: 600; }
.sync-pending  { color: var(--orange); }
.sync-stopped  { color: var(--fg2); }
.sync-disabled { color: var(--red); }
.sync-unknown  { color: var(--fg2); }
tr.row-inactive td { opacity: 0.45; }

/* ─── Services ─────────────────────────────────────────────── */
.svc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 8px;
}
.svc-card {
  background: var(--bg3);
  border-radius: 6px;
  padding: 8px 10px;
  text-align: center;
}
.svc-name { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
.svc-status { font-size: 11px; margin-bottom: 4px; }
.svc-btn {
  padding: 3px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg2);
  color: var(--text);
  cursor: pointer;
  font-family: var(--font);
  font-size: 11px;
  transition: all 0.2s;
}
.svc-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
.svc-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.svc-btn.restarting { background: var(--orange); color: #000; border-color: var(--orange); }

/* Services: expandable cards with inline dots (always used) */
.svc-host-card { margin-bottom: 2px; border-radius: 4px; }
.svc-host-header { padding: 4px 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
.svc-host-title { font-size: 13px; font-weight: 600; min-width: 160px; }
.svc-inline { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; flex: 1; }
.svc-inline-item {
  display: flex; align-items: center; gap: 4px;
  font-size: 12px; padding: 2px 8px;
  background: var(--bg3); border-radius: 4px;
}
.svc-inline-dot {
  width: 8px; height: 8px; border-radius: 50%; display: inline-block;
}
.svc-inline-name { font-weight: 500; }
.svc-host-body { padding: 4px 14px 10px; }
.svc-host-body.collapsed { display: none; }
.svc-host-arrow { font-size: 16px; margin-left: auto; }

/* ─── Summary bar ──────────────────────────────────────────── */
.summary-bar {
  display: flex;
  gap: 24px;
  padding: 10px 0;
  margin-bottom: 12px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.summary-item { display: flex; align-items: center; gap: 6px; }
.summary-dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block;
}

/* ─── Instance Detail Panel ────────────────────────────────── */
/* ─── Instance action icons ───────────────────────────── */
.inst-action {
  cursor: pointer;
  font-size: 14px;
  opacity: 0.6;
  transition: opacity 0.15s;
  padding: 0 3px;
}
.inst-action:hover { opacity: 1; }
.inst-actions { white-space: nowrap; }
.inst-cpu-sub {
  display: block;
  font-size: 11px;
  color: var(--text-dim);
  line-height: 1.25;
  margin-top: 2px;
  white-space: nowrap;
}

/* ─── Responsive ──────────────────────────────────────────── */
@media (max-width: 600px) {
  .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  #sidebar { width: 120px; min-width: 100px; }
  .sb-btn { font-size: 11px; padding: 0.3rem 0.4rem; }
}
/* ── Help overlay ── */
#help-ovl {
  display: none;
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 3000;
  width: min(900px, 95vw);
  height: min(700px, 90vh);
  min-width: 480px; min-height: 300px;
  background: #131b2b;
  border: 1px solid #2d3748;
  border-radius: 12px;
  box-shadow: 0 20px 70px rgba(0,0,0,0.9);
  flex-direction: column;
  overflow: hidden;
  resize: both;
}
#help-ovl.visible { display: flex; }
#help-drag-handle {
  position: absolute; top: 0; left: 0; right: 48px;
  height: 46px; cursor: move; z-index: 2;
}
#help-ovl > .ovl-panel {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; position: relative;
}
.ovl-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.85rem 1.1rem 0.85rem 1.25rem;
  border-bottom: 1px solid #1e2736;
  flex-shrink: 0; background: #111827;
}
.ovl-header-title { font-size: var(--fs-sm); font-weight: 700; color: #e2e8f0; display: flex; align-items: center; gap: 0.5rem; }
.ovl-header-actions { display: flex; align-items: center; gap: 0.5rem; position: relative; z-index: 3; }
.ovl-close { background: transparent; border: none; color: #64748b; font-size: var(--fs-md); cursor: pointer; padding: 0.2rem 0.35rem; border-radius: 5px; line-height: 1; transition: color 0.12s, background 0.12s; }
.ovl-close:hover { color: #e2e8f0; background: rgba(255,255,255,0.06); }
.lang-pill { display: flex; border: 1px solid #2d3748; border-radius: 6px; overflow: hidden; flex-shrink: 0; }
.lang-pill button { background: transparent; border: none; color: #64748b; font-size: var(--fs-xs); font-weight: 600; letter-spacing: 0.05em; padding: 0.2rem 0.55rem; cursor: pointer; transition: all 0.12s; }
.lang-pill button.active { background: #1e3a5f; color: #63b3ed; }
.lang-pill button:hover:not(.active) { background: rgba(255,255,255,0.04); color: #e2e8f0; }
#help-body { display: flex; flex: 1; overflow: hidden; }
#help-toc { width: 230px; min-width: 170px; flex-shrink: 0; border-right: 1px solid #1e2736; overflow-y: auto; padding: 0.5rem 0; background: #0e1117; }
#help-toc-filter { width: calc(100% - 1.2rem); margin: 0 0.6rem 0.4rem; background: #1a202c; color: #e2e8f0; border: 1px solid #2d3748; border-radius: 5px; padding: 0.35rem 0.5rem; font-size: var(--fs-sm); outline: none; }
#help-toc-filter:focus { border-color: #4a5568; }
#help-toc-filter::placeholder { color: #4a5568; }

<script>
/* ═══════════════════════════════════════════════════════════════
   VPS Monitor — WebSocket-powered real-time dashboard
   ═══════════════════════════════════════════════════════════════ */

// ── State ──────────────────────────────────────────────────
let ws = null;
let state = null;      // Latest full state from daemon
let reconnectTimer = null;
var TOKEN         = "%%TOKEN%%";
var ST_BASE       = "%%ST_BASE%%";
var WS_BASE       = "%%WS_BASE%%";
var PBGUI_VERSION = "%%VERSION%%";
var PBGUI_SERIAL  = "%%SERIAL%%";

// Instance tab state
let instSort = { col: 'name', asc: true };
let compactMode = false;
let compactInitialized = false;  // true after first state message applied
let compactToggled = {};  // hosts manually toggled open/closed in compact mode
let svcCompactToggled = {};  // services tab: hosts toggled open/closed in compact mode
let debugLogging = false;
let debugLoggingInitialized = false;
let hideIP = false;
let instFilterServer = 'All';
let instFilterVersion = 'All';
let instFilterErrors = false;
let instFilterOthers = false;

// Logs tab state
let vpsLogViewer = null;
let cpuHistoryRequestId = 0;

// ── WebSocket ──────────────────────────────────────────────
function connect() {
  const url = WS_BASE + `/ws/vps?token=${TOKEN}`;
  
  ws = new WebSocket(url);
  
  ws.onopen = () => {
    setBanner('ok');
    if (reconnectTimer) { clearInterval(reconnectTimer); reconnectTimer = null; }
  };
  
  ws.onmessage = (evt) => {
    try {
      const msg = JSON.parse(evt.data);
      handleMessage(msg);
    } catch (e) { console.error('WS parse error:', e); }
  };
  
  ws.onclose = () => {
    setBanner('lost');
    scheduleReconnect();
  };
  
  ws.onerror = () => {
    setBanner('lost');
  };
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  reconnectTimer = setInterval(() => {
    if (!ws || ws.readyState === WebSocket.CLOSED) {
      connect();
    }
  }, 3000);
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}

function setBanner(status) {
  const b = document.getElementById('conn-banner');
  b.className = status === 'ok' ? 'conn-ok' : status === 'lost' ? 'conn-lost' : 'conn-waiting';
  if (status === 'ok') { b.style.display = 'none'; }
  else {
    b.style.display = 'block';
    b.textContent = status === 'lost' ? 'Connection lost — reconnecting...' : 'Connecting to VPS Monitor...';
  }
}

// ── Message Handling ───────────────────────────────────────
function handleMessage(msg) {
  switch (msg.type) {
    case 'state':
      state = msg.data;
      // Apply persisted UI settings on first state message
      if (!compactInitialized && state.ui_settings) {
        compactInitialized = true;
        if (state.ui_settings.compact === 'true') {
          compactMode = true;
          const cb = document.getElementById('compact-check');
          if (cb) cb.checked = true;
          document.body.classList.add('compact');
        }
      }
      if (!debugLoggingInitialized && state.ui_settings) {
        debugLoggingInitialized = true;
        debugLogging = state.ui_settings.debug_logging === 'true';
        const cb = document.getElementById('debuglog-check');
        if (cb) cb.checked = debugLogging;
      }
      renderActiveTab();
      break;
    case 'result':
      handleResult(msg);
      break;
    case 'cpu_history':
      handleCpuHistory(msg.data || null, msg.host || '', msg.bot_name || '', msg.sid || '', 'cpu');
      break;
    case 'metric_history':
      handleCpuHistory(msg.data || null, msg.host || '', msg.bot_name || '', msg.sid || '', msg.metric || 'cpu');
      break;
    case 'error':
      console.error('Server error:', msg.error);
      break;
  }
}

let metricTooltipVisible = false;

function tooltipTextForMetrics(label, metrics) {
  if (!metrics) return '';
  if (label === 'CPU') {
    const cpuUi = cpuTelemetry(metrics);
    return cpuUi.compactTitle;
  }
  if (label === 'RAM') {
    return [
      'RAM used: ' + fmtBytes(metrics.mem_used),
      'RAM free: ' + fmtBytes(metrics.mem_available),
      'RAM total: ' + fmtBytes(metrics.mem_total),
      'Usage: ' + (Number(metrics.mem_percent || 0)).toFixed(1) + '%',
    ].join('\n');
  }
  if (label === 'Disk') {
    return [
      'Disk used: ' + fmtBytes(metrics.disk_used),
      'Disk free: ' + fmtBytes(metrics.disk_free),
      'Disk total: ' + fmtBytes(metrics.disk_total),
      'Usage: ' + (Number(metrics.disk_percent || 0)).toFixed(1) + '%',
    ].join('\n');
  }
  if (label === 'Swap') {
    return [
      'Swap used: ' + fmtBytes(metrics.swap_used),
      'Swap free: ' + fmtBytes(metrics.swap_free),
      'Swap total: ' + fmtBytes(metrics.swap_total),
      'Usage: ' + (Number(metrics.swap_percent || 0)).toFixed(1) + '%',
    ].join('\n');
  }
  return '';
}

function tooltipAttr(text) {
  return text ? ` data-tip="${escAttr(text)}"` : '';
}

function ensureMetricTooltip() {
  let el = document.getElementById('metric-tooltip');
  if (el) return el;
  el = document.createElement('div');
  el.id = 'metric-tooltip';
  document.body.appendChild(el);
  return el;
}

function hideMetricTooltip() {
  const el = document.getElementById('metric-tooltip');
  if (!el) return;
  el.style.display = 'none';
  metricTooltipVisible = false;
}

function showMetricTooltip(target, event) {
  if (!target) return;
  const text = String(target.getAttribute('data-tip') || '');
  if (!text) return;
  const el = ensureMetricTooltip();
  el.textContent = text;
  el.style.display = 'block';
  metricTooltipVisible = true;
  positionMetricTooltip(event);
}

function positionMetricTooltip(event) {
  const el = document.getElementById('metric-tooltip');
  if (!el || !metricTooltipVisible || !event) return;
  const offset = 14;
  const rect = el.getBoundingClientRect();
  let left = event.clientX + offset;
  let top = event.clientY + offset;
  if (left + rect.width > window.innerWidth - 8) left = event.clientX - rect.width - offset;
  if (top + rect.height > window.innerHeight - 8) top = event.clientY - rect.height - offset;
  el.style.left = Math.max(8, left) + 'px';
  el.style.top = Math.max(8, top) + 'px';
}

function initMetricTooltipHandlers() {
  document.addEventListener('mouseover', function (event) {
    const target = event.target && event.target.closest ? event.target.closest('[data-tip]') : null;
    if (!target) return;
    showMetricTooltip(target, event);
  });
  document.addEventListener('mousemove', function (event) {
    if (!metricTooltipVisible) return;
    const target = event.target && event.target.closest ? event.target.closest('[data-tip]') : null;
    if (!target) {
      hideMetricTooltip();
      return;
    }
    positionMetricTooltip(event);
  });
  document.addEventListener('mouseout', function (event) {
    const target = event.target && event.target.closest ? event.target.closest('[data-tip]') : null;
    if (!target) return;
    const related = event.relatedTarget && event.relatedTarget.closest ? event.relatedTarget.closest('[data-tip]') : null;
    if (related === target) return;
    hideMetricTooltip();
  });
  window.addEventListener('scroll', hideMetricTooltip, true);
  window.addEventListener('blur', hideMetricTooltip);
}

function handleResult(msg) {
  if (msg.cmd === 'restart_service') {
    // Update service button state
    const btn = document.querySelector(`[data-restart="${msg.host}:${msg.service}"]`);
    if (btn) {
      btn.disabled = false;
      btn.classList.remove('restarting');
      btn.textContent = msg.success ? '✅ Restarted' : '❌ Failed';
      setTimeout(() => { btn.textContent = 'Restart'; }, 3000);
    }
  }
  if (msg.cmd === 'kill_instance') {
    if (!msg.success) {
      console.warn('kill_instance failed for', msg.name, 'on', msg.host);
    }
  }
}

// ── Tab Navigation ─────────────────────────────────────────
function switchTab(tabName) {
  document.querySelectorAll('.sb-btn[data-tab]').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  const btn = document.querySelector('.sb-btn[data-tab="' + tabName + '"]');
  if (btn) btn.classList.add('active');
  const panel = document.getElementById('tab-' + tabName);
  if (panel) panel.classList.add('active');
  renderActiveTab();
}
document.querySelectorAll('.sb-btn[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ── Compact Mode Toggle ────────────────────────────────────
const compactCheck = document.getElementById('compact-check');
compactCheck.addEventListener('change', () => {
  compactMode = compactCheck.checked;
  compactToggled = {};  // Reset manual toggles on mode switch
  svcCompactToggled = {};  // Reset services toggles too
  document.body.classList.toggle('compact', compactMode);
  // Persist to INI
  send({ cmd: 'set_setting', key: 'compact', value: compactMode ? 'true' : 'false' });
  // Re-render to apply new layout
  renderDashboard();
});

// ── Hide IP Toggle ─────────────────────────────────────────
const hideipCheck = document.getElementById('hideip-check');
hideipCheck.addEventListener('change', () => {
  hideIP = hideipCheck.checked;
  renderActiveTab();
});

// ── Debug Logging Toggle ───────────────────────────────────
function onDebugLogChange() {
  const cb = document.getElementById('debuglog-check');
  if (!cb) return;
  debugLogging = cb.checked;
  send({ cmd: 'set_setting', key: 'debug_logging', value: debugLogging ? 'true' : 'false' });
}

function activeTab() {
  const btn = document.querySelector('.sb-btn[data-tab].active');
  return btn ? btn.dataset.tab : 'dashboard';
}

function renderActiveTab() {
  if (!state) return;
  switch (activeTab()) {
    case 'dashboard': renderDashboard(); break;
    case 'instances': renderInstances(); break;
    case 'services':  renderServices(); break;
    case 'logs':      initVpsLogViewer(); break;
  }
}

// ── Helpers ────────────────────────────────────────────────
function fmtBytes(b) {
  if (!b || b <= 0) return '0 B';
  const u = ['B','KB','MB','GB','TB'];
  let i = 0;
  while (b >= 1024 && i < u.length - 1) { b /= 1024; i++; }
  return b.toFixed(1) + ' ' + u[i];
}

function pctColor(pct) {
  if (pct < 60) return 'var(--green)';
  if (pct < 85) return 'var(--orange)';
  return 'var(--red)';
}

function ageStr(ts) {
  if (!ts || ts <= 0) return 'no data';
  const age = (Date.now() / 1000) - ts;
  if (age < 0) return 'future?';
  if (age < 60) return Math.round(age) + 's ago';
  return (age / 60).toFixed(1) + 'm ago';
}

// ── Dashboard ──────────────────────────────────────────────
function renderDashboard() {
  if (!state) return;
  const conns = state.connections?.connections || {};
  const sys = state.system || {};
  const streams = state.streams || {};

  // Summary bar
  const total = Object.keys(conns).length;
  const connected = Object.values(conns).filter(c => c.status === 'connected').length;
  const connecting = Object.values(conns).filter(c => c.status === 'connecting').length;
  const disconnected = total - connected - connecting;
  const summaryEl = document.getElementById('dash-summary');
  summaryEl.innerHTML = `
    <span class="summary-item"><span class="summary-dot" style="background:var(--green)"></span> ${connected} connected</span>
    <span class="summary-item"><span class="summary-dot" style="background:var(--orange)"></span> ${connecting} connecting</span>
    <span class="summary-item"><span class="summary-dot" style="background:var(--red)"></span> ${disconnected} disconnected</span>
    <span class="summary-item" style="color:var(--text-dim)">Updated: ${ageStr(state.timestamp)}</span>
  `;

  // VPS cards
  const statusRank = (status) => {
    if (status === 'connected') return 0;
    if (status === 'connecting') return 1;
    return 2;
  };
  const sorted = Object.keys(conns).sort((a, b) => {
    const ac = statusRank(String(conns[a].status || 'disconnected'));
    const bc = statusRank(String(conns[b].status || 'disconnected'));
    return ac - bc || a.localeCompare(b);
  });

  const cardsEl = document.getElementById('dash-cards');

  let html = '';
  for (const host of sorted) {
    const info = conns[host];
    const status = String(info.status || 'disconnected');
    const isConn = status === 'connected';
    const isConnecting = status === 'connecting';
    const metrics = sys[host];
    const stream = streams[host] || {};
    // compactToggled tracks manual open/close; reset on mode switch
    const isCollapsed = compactToggled[host] !== undefined
      ? compactToggled[host]
      : (compactMode ? true : !isConn);  // compact: default closed, normal: default open if connected

    html += `<div class="vps-card ${isConn ? 'connected' : (isConnecting ? 'connecting' : 'disconnected')}" data-host="${host}">`;
    html += `<div class="vps-header" onclick="toggleCard(this)">`;
    html += `<span class="vps-title">${isConn ? '✅' : (isConnecting ? '⏳' : '❌')} ${host}`;
    html += ` <span class="vps-badge ${isConn ? 'badge-green' : (isConnecting ? 'badge-orange' : 'badge-red')}"${hideIP ? ' style="display:none"' : ''}>${info.ip || '?'}</span>`;
    if (stream.alive) {
      const m = metrics;
      const lastUpdate = stream.last_update || (m ? m.timestamp : 0);
      const streamAge = lastUpdate ? (Date.now()/1000 - lastUpdate) : -1;
      const ageColor = streamAge < 5 ? 'green' : streamAge < 15 ? 'orange' : 'red';
      html += ` <span class="vps-badge badge-${ageColor}" style="font-size:10px">${ageStr(lastUpdate)}</span>`;
    }
    html += `</span>`;
    // Inline metrics in header (always shown for connected hosts)
    if (isConn && metrics) {
      const cpuUi = cpuTelemetry(metrics);
      html += `<span class="compact-metrics">`;
      html += compactMetric('CPU', cpuUi.liveCompact, metrics.cpu, cpuUi.compactSub, tooltipTextForMetrics('CPU', metrics), ` class="cpu-clickable compact-metric" data-history-host="${escAttr(host)}" data-history-metric="cpu" data-cpu-history-host="${escAttr(host)}"`);
      html += compactMetric('RAM', fmtBytes(metrics.mem_used), metrics.mem_percent, '', tooltipTextForMetrics('RAM', metrics), ` class="cpu-clickable compact-metric" data-history-host="${escAttr(host)}" data-history-metric="memory"`);
      html += compactMetric('Disk', fmtBytes(metrics.disk_used), metrics.disk_percent, '', tooltipTextForMetrics('Disk', metrics), ` class="cpu-clickable compact-metric" data-history-host="${escAttr(host)}" data-history-metric="disk"`);
      if (metrics.swap_total > 0) {
        html += compactMetric('Swap', fmtBytes(metrics.swap_used), metrics.swap_percent, '', tooltipTextForMetrics('Swap', metrics), ` class="cpu-clickable compact-metric" data-history-host="${escAttr(host)}" data-history-metric="swap"`);
      }
      html += `</span>`;
    }
    html += `<span style="font-size:18px">${isCollapsed ? '▸' : '▾'}</span>`;
    html += `</div>`;
    html += `<div class="vps-body ${isCollapsed ? 'collapsed' : ''}">`;

    if (!isConn) {
      const err = info.error || info.last_error || '';
      const statusText = isConnecting ? 'Connecting...' : 'Disconnected';
      const statusColor = isConnecting ? 'var(--orange)' : 'var(--red)';
      html += `<div style="color:${statusColor};padding:8px 0">${statusText}${err ? ': ' + esc(err) : ''}</div>`;
    } else if (!metrics) {
      html += `<div style="color:var(--text-dim);padding:8px 0">Waiting for system metrics...</div>`;
    } else {
      const cpuUi = cpuTelemetry(metrics);
      html += `<div class="metrics-grid">`;
      html += metricCard('CPU', cpuUi.liveFull, cpuUi.fullSub, metrics.cpu, tooltipTextForMetrics('CPU', metrics), ` class="cpu-clickable metric-card" data-history-host="${escAttr(host)}" data-history-metric="cpu" data-cpu-history-host="${escAttr(host)}"`);
      html += metricCard('RAM', fmtBytes(metrics.mem_used),
        fmtBytes(metrics.mem_total), metrics.mem_percent, tooltipTextForMetrics('RAM', metrics), ` class="cpu-clickable metric-card" data-history-host="${escAttr(host)}" data-history-metric="memory"`);
      html += metricCard('Disk', fmtBytes(metrics.disk_used),
        fmtBytes(metrics.disk_total), metrics.disk_percent, tooltipTextForMetrics('Disk', metrics), ` class="cpu-clickable metric-card" data-history-host="${escAttr(host)}" data-history-metric="disk"`);
      if (metrics.swap_total > 0) {
        html += metricCard('Swap', fmtBytes(metrics.swap_used),
          fmtBytes(metrics.swap_total), metrics.swap_percent, tooltipTextForMetrics('Swap', metrics), ` class="cpu-clickable metric-card" data-history-host="${escAttr(host)}" data-history-metric="swap"`);
      }
      html += `</div>`;
    }

    html += `</div></div>`;
  }

  if (!sorted.length) {
    html = '<div style="padding:24px;text-align:center;color:var(--text-dim)">No VPS servers configured.</div>';
  }
  cardsEl.innerHTML = html;
}

function metricCard(label, value, sub, pct, title, extraAttrs) {
  const color = pctColor(pct);
  return `
    <div${extraAttrs || ' class="metric-card"'}${tooltipAttr(title)}>
      <div class="metric-label">${label}</div>
      <div class="metric-value" style="color:${color}">${value}</div>
      ${sub ? `<div class="metric-sub">${sub}</div>` : ''}
      <div class="progress-bar">
        <div class="progress-fill" style="width:${Math.min(pct, 100)}%;background:${color}"></div>
      </div>
    </div>`;
}

function compactMetric(label, value, pct, sub, title, extraAttrs) {
  const color = pctColor(pct);
  return `<span${extraAttrs || ' class="compact-metric"'}${tooltipAttr(title)}>
    <span class="cm-label">${label}</span>
    <span class="cm-value" style="color:${color}">${value}</span>
    ${sub ? `<span class="cm-sub">${sub}</span>` : ''}
    <span class="compact-bar"><span class="compact-bar-fill" style="width:${Math.min(pct, 100)}%;background:${color}"></span></span>
  </span>`;
}

const METRIC_HISTORY_META = {
  cpu: { label: 'CPU', source: 'cpu_60s', unit: '%', empty: 'No confirmed 60s samples stored yet.' },
  memory: { label: 'Memory', source: 'mem_percent', unit: '%', botSource: 'rss_mb', botUnit: 'MB', empty: 'No memory history available yet.', botEmpty: 'No bot memory history available yet.' },
  disk: { label: 'Disk', source: 'disk_percent', unit: '%', empty: 'No disk history available yet.' },
  swap: { label: 'Swap', source: 'swap_percent', unit: '%', botSource: 'swap_mb', botUnit: 'MB', empty: 'No swap history available yet.', botEmpty: 'No bot swap history available yet.' },
  errors: { label: 'Errors', source: 'passivbot.log', unit: '', empty: 'No bot error history available yet.', timezoneBasis: 'UTC', countMetric: true },
  tracebacks: { label: 'Tracebacks', source: 'passivbot_err.log', unit: '', empty: 'No bot traceback history available yet.', timezoneBasis: 'UTC', countMetric: true },
  pnl: { label: 'PNL', source: 'passivbot.log', unit: '', empty: 'No bot PNL history available yet.', timezoneBasis: 'UTC', pnlMetric: true },
  pnl_fills: { label: 'Fills', source: 'passivbot.log', unit: '', empty: 'No bot fill history available yet.', timezoneBasis: 'UTC', fillsMetric: true },
};

function metricHistoryMeta(metric) {
  return METRIC_HISTORY_META[metric] || METRIC_HISTORY_META.cpu;
}

function metricHistoryTitle(metric, host, bot) {
  const meta = metricHistoryMeta(metric);
  return bot ? (meta.label + ' History - ' + bot + ' @ ' + host) : (meta.label + ' History - ' + host);
}

function metricHistorySubtitle(metric, payload) {
  const meta = metricHistoryMeta(metric);
  const source = String((payload && payload.source) || meta.source || '').trim();
  if (meta.countMetric) return '4w history, 1 sample/hour, UTC day totals, source: ' + source;
  if (meta.fillsMetric) return 'full history from available logs, UTC daily fill totals, source: ' + source;
  if (meta.pnlMetric) return 'full history from available logs, UTC daily aggregates, source: ' + source;
  return '24h history, 1 sample/minute, source: ' + source;
}

function metricHistoryLoadingSubtitle(metric, botName) {
  const meta = metricHistoryMeta(metric);
  const source = botName && meta.botSource ? meta.botSource : meta.source;
  if (meta.fillsMetric) return 'Loading full ' + source + ' fill history...';
  if (meta.pnlMetric) return 'Loading full ' + source + ' history...';
  return (meta.countMetric ? 'Loading 4w ' : 'Loading 24h ') + source + ' history...';
}

function metricHistoryUnit(metric, payload) {
  const meta = metricHistoryMeta(metric);
  const isBot = !!String(payload && payload.bot_name || '').trim();
  if (isBot && meta.botUnit) return meta.botUnit;
  return meta.unit || '';
}

function metricHistoryEmpty(metric, payload) {
  const meta = metricHistoryMeta(metric);
  const isBot = !!String(payload && payload.bot_name || '').trim();
  if (isBot && meta.botEmpty) return meta.botEmpty;
  return meta.empty;
}

function metricHistoryScale(metric, payload) {
  const unit = metricHistoryUnit(metric, payload);
  const meta = metricHistoryMeta(metric);
  if (meta.countMetric) {
    return {
      baseline: 0,
      guideValues: function(maxValue) {
        const top = Math.max(4, Math.ceil(maxValue / 4) * 4);
        const out = [];
        for (let i = 0; i <= 4; i += 1) out.push(Math.round((top * i) / 4));
        return { maxValue: top, values: out };
      },
      label: function(v) { return String(v); }
    };
  }
  if (meta.fillsMetric) {
    return {
      baseline: 0,
      guideValues: function(maxValue) {
        const top = Math.max(4, Math.ceil(maxValue / 4) * 4);
        const out = [];
        for (let i = 0; i <= 4; i += 1) out.push(Math.round((top * i) / 4));
        return { maxValue: top, values: out };
      },
      label: function(v) { return String(Math.round(v)); }
    };
  }
  if (meta.pnlMetric) {
    return {
      baseline: null,
      guideValues: function(minValue, maxValue) {
        const lo = Math.min(0, Math.floor(minValue));
        const hi = Math.max(0, Math.ceil(maxValue));
        const span = Math.max(hi - lo, 4);
        const step = Math.max(1, Math.ceil(span / 4));
        const out = [];
        for (let value = lo; value <= hi; value += step) out.push(value);
        if (!out.includes(0)) out.push(0);
        out.sort(function(a, b) { return a - b; });
        return { minValue: lo, maxValue: hi === lo ? lo + 1 : hi, values: out };
      },
      label: function(v) { return Number(v).toFixed(2); }
    };
  }
  if (unit === 'MB') {
    return {
      baseline: 0,
      guideValues: function(maxValue) {
        const steps = 4;
        const top = Math.max(1, Math.ceil(maxValue / 50) * 50);
        const out = [];
        for (let i = 0; i <= steps; i += 1) out.push(Math.round((top * i) / steps));
        return { maxValue: top, values: out };
      },
      label: function(v) { return v + 'MB'; }
    };
  }
  return {
    baseline: 100,
    guideValues: function(maxValue) {
      return { maxValue: Math.max(100, maxValue), values: [0, 25, 50, 75, 100] };
    },
    label: function(v) { return v + '%'; }
  };
}

function metricHistoryValueLabel(metric, value, payload) {
  if (!Number.isFinite(Number(value))) return 'n/a';
  const meta = metricHistoryMeta(metric);
  const unit = metricHistoryUnit(metric, payload);
  const numeric = Number(value);
  return ((meta.countMetric || meta.fillsMetric) ? String(Math.round(numeric)) : numeric.toFixed(2)) + unit;
}

function metricHistorySeriesPoints(metric, payload) {
  const meta = metricHistoryMeta(metric);
  if (meta.fillsMetric && Array.isArray(payload && payload.fills_points)) return payload.fills_points;
  if (meta.pnlMetric && Array.isArray(payload && payload.cumulative_points) && payload.cumulative_points.length) return payload.cumulative_points;
  return Array.isArray(payload && payload.points) ? payload.points : [];
}

function formatUtcHourLabel(hour) {
  if (!Number.isFinite(Number(hour)) || Number(hour) <= 0) return 'n/a';
  return new Date(Number(hour) * 3600000).toISOString().slice(0, 16).replace('T', ' ') + ' UTC';
}

function formatUtcDayLabel(day) {
  if (!Number.isFinite(Number(day)) || Number(day) <= 0) return 'n/a';
  return new Date(Number(day) * 86400000).toISOString().slice(0, 10);
}

const CPU_HISTORY_MARGIN = 16;
const CPU_HISTORY_MIN_WIDTH = 520;
const CPU_HISTORY_MIN_HEIGHT = 320;

function getCpuHistoryRectLimits() {
  const maxWidth = Math.max(320, window.innerWidth - (CPU_HISTORY_MARGIN * 2));
  const maxHeight = Math.max(240, window.innerHeight - (CPU_HISTORY_MARGIN * 2));
  return {
    minWidth: Math.min(CPU_HISTORY_MIN_WIDTH, maxWidth),
    minHeight: Math.min(CPU_HISTORY_MIN_HEIGHT, maxHeight),
    maxWidth: maxWidth,
    maxHeight: maxHeight,
  };
}

function clampCpuHistoryRect(rect) {
  const limits = getCpuHistoryRectLimits();
  const width = Math.min(Math.max(rect.width, limits.minWidth), limits.maxWidth);
  const height = Math.min(Math.max(rect.height, limits.minHeight), limits.maxHeight);
  const maxLeft = Math.max(CPU_HISTORY_MARGIN, window.innerWidth - width - CPU_HISTORY_MARGIN);
  const maxTop = Math.max(CPU_HISTORY_MARGIN, window.innerHeight - height - CPU_HISTORY_MARGIN);
  return {
    left: Math.min(Math.max(rect.left, CPU_HISTORY_MARGIN), maxLeft),
    top: Math.min(Math.max(rect.top, CPU_HISTORY_MARGIN), maxTop),
    width: width,
    height: height,
  };
}

function applyCpuHistoryRect(rect) {
  const box = document.getElementById('cpu-history-box');
  if (!box) return;
  const next = clampCpuHistoryRect(rect);
  box.style.left = next.left + 'px';
  box.style.top = next.top + 'px';
  box.style.width = next.width + 'px';
  box.style.height = next.height + 'px';
}

function resetCpuHistoryWindow() {
  const box = document.getElementById('cpu-history-box');
  if (!box) return;
  box.classList.remove('modal-history-window');
  box.style.left = '';
  box.style.top = '';
  box.style.width = '';
  box.style.height = '';
}

function prepareCpuHistoryWindow(widthPx, heightPx) {
  const box = document.getElementById('cpu-history-box');
  if (!box) return;
  box.classList.add('modal-history-window');
  applyCpuHistoryRect({
    left: Math.round((window.innerWidth - (widthPx || 980)) / 2),
    top: Math.round((window.innerHeight - (heightPx || 560)) / 2),
    width: widthPx || 980,
    height: heightPx || 560,
  });
}

function initCpuHistoryInteractions() {
  const box = document.getElementById('cpu-history-box');
  const head = document.getElementById('cpu-history-head');
  const resizeHandles = Array.from(box ? box.querySelectorAll('.cpu-history-resize-handle[data-resize]') : []);
  if (!box || !head || !resizeHandles.length) return;
  let drag = null;
  let resize = null;
  function releasePointer(target, pointerId) {
    try { target.releasePointerCapture(pointerId); } catch (error) {}
  }
  head.addEventListener('pointerdown', function (event) {
    if (!box.classList.contains('modal-history-window')) return;
    if (event.button !== 0) return;
    if (event.target && event.target.closest('.cpu-history-close')) return;
    const rect = box.getBoundingClientRect();
    drag = { pointerId: event.pointerId, dx: event.clientX - rect.left, dy: event.clientY - rect.top };
    head.setPointerCapture(event.pointerId);
    event.preventDefault();
  });
  head.addEventListener('pointermove', function (event) {
    if (!drag || drag.pointerId !== event.pointerId || !box.classList.contains('modal-history-window')) return;
    applyCpuHistoryRect({ left: event.clientX - drag.dx, top: event.clientY - drag.dy, width: box.offsetWidth, height: box.offsetHeight });
  });
  head.addEventListener('pointerup', function (event) {
    if (!drag || drag.pointerId !== event.pointerId) return;
    drag = null;
    releasePointer(head, event.pointerId);
  });
  head.addEventListener('pointercancel', function (event) {
    if (!drag || drag.pointerId !== event.pointerId) return;
    drag = null;
    releasePointer(head, event.pointerId);
  });
  function updateResizeRect(base, direction, clientX, clientY) {
    const dx = clientX - base.startX;
    const dy = clientY - base.startY;
    let nextLeft = base.left;
    let nextTop = base.top;
    let nextWidth = base.width;
    let nextHeight = base.height;

    if (direction.indexOf('right') !== -1) {
      nextWidth = base.width + dx;
    }
    if (direction.indexOf('left') !== -1) {
      nextWidth = base.width - dx;
      nextLeft = base.left + dx;
    }
    if (direction.indexOf('bottom') !== -1) {
      nextHeight = base.height + dy;
    }
    if (direction.indexOf('top') !== -1) {
      nextHeight = base.height - dy;
      nextTop = base.top + dy;
    }

    applyCpuHistoryRect({ left: nextLeft, top: nextTop, width: nextWidth, height: nextHeight });
  }

  resizeHandles.forEach(function (handle) {
    handle.addEventListener('pointerdown', function (event) {
      if (!box.classList.contains('modal-history-window')) return;
      if (event.button !== 0) return;
      const rect = box.getBoundingClientRect();
      resize = {
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        left: rect.left,
        top: rect.top,
        width: rect.width,
        height: rect.height,
        direction: String(handle.getAttribute('data-resize') || ''),
        handle: handle,
      };
      handle.setPointerCapture(event.pointerId);
      event.preventDefault();
      event.stopPropagation();
    });
    handle.addEventListener('pointermove', function (event) {
      if (!resize || resize.pointerId !== event.pointerId || resize.handle !== handle || !box.classList.contains('modal-history-window')) return;
      updateResizeRect(resize, resize.direction, event.clientX, event.clientY);
    });
    handle.addEventListener('pointerup', function (event) {
      if (!resize || resize.pointerId !== event.pointerId || resize.handle !== handle) return;
      resize = null;
      releasePointer(handle, event.pointerId);
    });
    handle.addEventListener('pointercancel', function (event) {
      if (!resize || resize.pointerId !== event.pointerId || resize.handle !== handle) return;
      resize = null;
      releasePointer(handle, event.pointerId);
    });
  });
}

function cpuTelemetry(metrics) {
  const live = Number.isFinite(Number(metrics && metrics.cpu)) ? Number(metrics.cpu) : 0;
  const avg60 = Number.isFinite(Number(metrics && metrics.cpu_60s)) ? Number(metrics.cpu_60s) : 0;
  const window60 = Number.isFinite(Number(metrics && metrics.cpu_60s_window)) ? Number(metrics.cpu_60s_window) : 0;
  const confirmed = window60 >= 60;
  let compactSub = '';
  let fullSub = '';
  if (confirmed) {
    compactSub = avg60.toFixed(0) + '%';
    fullSub = '1m CPU ' + avg60.toFixed(1) + '%';
  } else if (window60 > 0) {
    compactSub = Math.min(60, Math.floor(window60)) + 's';
    fullSub = '1m CPU warming up (' + Math.min(60, Math.floor(window60)) + 's/60s)';
  }
  return {
    liveCompact: live.toFixed(0) + '%',
    liveFull: live.toFixed(1) + '%',
    compactSub,
    fullSub,
    compactTitle: confirmed
      ? ([
          'CPU live (about 1s): ' + live.toFixed(1) + '%',
          'CPU 1m (60s window): ' + avg60.toFixed(1) + '%',
        ].join('\n'))
      : ([
          'CPU live (about 1s): ' + live.toFixed(1) + '%',
          'CPU 1m (60s window) warming up: ' + Math.min(60, Math.floor(window60)) + 's/60s',
        ].join('\n')),
  };
}

function escAttr(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function toggleCard(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('span:last-child');
  body.classList.toggle('collapsed');
  const isNowCollapsed = body.classList.contains('collapsed');
  arrow.textContent = isNowCollapsed ? '▸' : '▾';
  // Remember toggle state so renderDashboard() preserves it across re-renders
  const card = header.closest('.vps-card');
  if (card) compactToggled[card.dataset.host] = isNowCollapsed;
}

// ── Instances ──────────────────────────────────────────────
function renderInstances() {
  if (!state) return;
  const allInst = state.instances || {};
  const allV7 = state.v7_instances || {};

  // Build v7 lookup: "host|name" → {cv, rv, eo, running}
  const v7map = {};
  for (const [host, list] of Object.entries(allV7)) {
    for (const v of list) {
      v7map[host + '|' + v.name] = v;
    }
  }

  // Build flat list from running instances (monitors)
  const rows = [];
  const seen = new Set();  // track "host|name" to avoid duplicates
  for (const [host, instances] of Object.entries(allInst)) {
    for (const inst of instances) {
      const vmap = {'7': 'V7', '6': 'Multi', 's': 'Single'};
      const version = vmap[inst.p] || inst.p || '?';
      const memList = inst.m || [];
      const memMB = memList[0] ? (memList[0] / 1048576).toFixed(1) : '0';
      const swapMB = memList[9] ? (memList[9] / 1048576).toFixed(1) : '0';
      const startTs = inst.st || 0;
      const startStr = startTs ? new Date(startTs * 1000).toISOString().slice(0,16).replace('T',' ') : '?';

      const name = inst.u || '?';
      const key = host + '|' + name;
      seen.add(key);
      const v7 = v7map[key];
      const configVer = v7 ? v7.cv : null;
      const runningVer = v7 ? v7.rv : null;
      const enabledOn = v7 ? v7.eo : null;
      let syncStatus = '';
      if (v7) {
        if (v7.cv === v7.rv && v7.running) syncStatus = 'synced';
        else if (v7.running && v7.cv !== v7.rv) syncStatus = 'outdated';
        else syncStatus = 'pending';
      }

      rows.push({
        host, version, name, start: startStr,
        pbVersion: inst.p || '?',
        memMB: parseFloat(memMB), swapMB: parseFloat(swapMB), cpu: inst.c || 0,
        cpu60s: Number.isFinite(Number(inst.cpu_60s)) ? Number(inst.cpu_60s) : 0,
        cpu60sWindow: Number.isFinite(Number(inst.cpu_60s_window)) ? Number(inst.cpu_60s_window) : 0,
        pnlToday: inst.pt || 0, fillsToday: inst.ct || 0,
        pnlHist: inst.pnl_hist_total || 0, fillsHist: inst.pnls_hist_total || 0,
        errorsToday: inst.et || 0, errors4w: inst.errors_4w || 0,
        tbsToday: inst.tt || 0, tbs4w: inst.tracebacks_4w || 0,
        lastError: inst.e || '', lastTB: inst.t || '', lastInfo: inst.i || '',
        configVer, runningVer, enabledOn, syncStatus,
      });
    }
  }

  // Add non-running v7 instances (stopped bots still deployed)
  for (const [host, list] of Object.entries(allV7)) {
    for (const v of list) {
      const key = host + '|' + v.name;
      if (seen.has(key)) continue;
      let syncStatus = 'stopped';
      if (v.eo === 'disabled') syncStatus = 'disabled';
      rows.push({
        host, version: 'V7', name: v.name, start: '–',
        pbVersion: '7',
        memMB: 0, swapMB: 0, cpu: 0, cpu60s: 0, cpu60sWindow: 0,
        pnlToday: 0, fillsToday: 0,
        pnlHist: 0, fillsHist: 0,
        errorsToday: 0, errors4w: 0,
        tbsToday: 0, tbs4w: 0,
        lastError: '', lastTB: '', lastInfo: '',
        configVer: v.cv, runningVer: v.rv, enabledOn: v.eo, syncStatus,
      });
    }
  }

  // Filters
  const servers = ['All', ...new Set(rows.map(r => r.host))].sort();
  const versions = ['All', ...new Set(rows.map(r => r.version))].sort();

  const filtersEl = document.getElementById('inst-filters');
  // Only rebuild filters if they changed
  if (!filtersEl.dataset.built) {
    filtersEl.innerHTML = `
      <label>Server: <select id="f-server">${servers.map(s => `<option${s===instFilterServer?' selected':''}>${s}</option>`).join('')}</select></label>
      <label>Version: <select id="f-version">${versions.map(v => `<option${v===instFilterVersion?' selected':''}>${v}</option>`).join('')}</select></label>
      <label><input type="checkbox" id="f-errors" ${instFilterErrors?'checked':''}> Only with errors</label>
      <label><input type="checkbox" id="f-others" ${instFilterOthers?'checked':''}> Show other</label>
    `;
    filtersEl.dataset.built = '1';
    document.getElementById('f-server').onchange = (e) => { instFilterServer = e.target.value; filtersEl.dataset.built = ''; renderInstances(); };
    document.getElementById('f-version').onchange = (e) => { instFilterVersion = e.target.value; renderInstances(); };
    document.getElementById('f-errors').onchange = (e) => { instFilterErrors = e.target.checked; renderInstances(); };
    document.getElementById('f-others').onchange = (e) => { instFilterOthers = e.target.checked; renderInstances(); };
  }

  // Apply filters
  let filtered = rows;
  if (instFilterServer !== 'All') filtered = filtered.filter(r => r.host === instFilterServer);
  if (instFilterVersion !== 'All') filtered = filtered.filter(r => r.version === instFilterVersion);
  if (instFilterErrors) filtered = filtered.filter(r => r.errorsToday > 0 || r.tbsToday > 0);
  if (!instFilterOthers) {
    filtered = filtered.filter(r => r.syncStatus === 'synced' || r.syncStatus === 'outdated' || r.syncStatus === 'pending' || r.syncStatus === '');
  }

  // Sort: running on selected server first, then alphabetical by name
  const col = instSort.col;
  filtered.sort((a, b) => {
    // Primary: running instances first (syncStatus synced/outdated before stopped/disabled)
    const runA = (a.syncStatus === 'synced' || a.syncStatus === 'outdated') ? 0 : 1;
    const runB = (b.syncStatus === 'synced' || b.syncStatus === 'outdated') ? 0 : 1;
    if (runA !== runB) return runA - runB;
    // Secondary: user-chosen column
    let va = a[col], vb = b[col];
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    let cmp = va < vb ? -1 : va > vb ? 1 : 0;
    if (cmp !== 0) return instSort.asc ? cmp : -cmp;
    // Tertiary: alphabetical by name
    const na = a.name.toLowerCase(), nb = b.name.toLowerCase();
    return na < nb ? -1 : na > nb ? 1 : 0;
  });

  document.getElementById('inst-count').textContent = `${filtered.length} of ${rows.length} instances`;

  // Table header
  const cols = [
    {key:'host',label:'Server'},{key:'version',label:'Version'},{key:'name',label:'Name'},
    {key:'syncStatus',label:'Sync'},{key:'enabledOn',label:'Enabled On'},
    {key:'configVer',label:'Cfg Ver'},{key:'runningVer',label:'Run Ver'},
    {key:'start',label:'Start'},{key:'memMB',label:'Mem (MB)'},{key:'cpu',label:'CPU %'},{key:'swapMB',label:'Swap (MB)'},
    {key:'pnlToday',label:'PnL Today'},{key:'fillsToday',label:'Fills'},
    {key:'pnlHist',label:'PnL Hist'},{key:'fillsHist',label:'Fills Hist'},
    {key:'errorsToday',label:'Err Tdy'},{key:'errors4w',label:'Err 4W'},
    {key:'tbsToday',label:'TB Tdy'},{key:'tbs4w',label:'TB 4W'},
    {key:'_actions',label:''},
  ];

  const thead = document.getElementById('inst-thead');
  thead.innerHTML = cols.map(c => {
    if (c.key === '_actions') return `<th></th>`;
    const arrow = instSort.col === c.key ? (instSort.asc ? ' ▲' : ' ▼') : '';
    return `<th data-sort="${c.key}">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
  }).join('');

  thead.querySelectorAll('th').forEach(th => {
    th.onclick = () => {
      const key = th.dataset.sort;
      if (instSort.col === key) instSort.asc = !instSort.asc;
      else { instSort.col = key; instSort.asc = true; }
      renderInstances();
    };
  });

  // Table body
  const tbody = document.getElementById('inst-tbody');
  tbody.innerHTML = filtered.map((r, i) => `
    <tr class="${(r.syncStatus === 'stopped' || r.syncStatus === 'disabled') ? 'row-inactive' : ''}">
      <td>${esc(r.host)}</td>
      <td>${esc(r.version)}</td>
      <td>${esc(r.name)}</td>
      <td class="sync-${r.syncStatus || 'unknown'}">${syncLabel(r.syncStatus)}</td>
      <td>${esc(r.enabledOn || '–')}</td>
      <td>${r.configVer !== null ? r.configVer : '–'}</td>
      <td>${r.runningVer !== null ? r.runningVer : '–'}</td>
      <td>${esc(r.start)}</td>
      <td class="cpu-clickable" data-history-host="${escAttr(r.host)}" data-history-bot="${escAttr(r.name)}" data-history-metric="memory">${r.memMB.toFixed(1)}</td>
      <td class="cpu-clickable" data-cpu-history-host="${escAttr(r.host)}" data-cpu-history-bot="${escAttr(r.name)}">${instanceCpuCell(r.host, r.name, r.cpu, r.cpu60s, r.cpu60sWindow)}</td>
      <td class="cpu-clickable" data-history-host="${escAttr(r.host)}" data-history-bot="${escAttr(r.name)}" data-history-metric="swap">${r.swapMB != null ? Number(r.swapMB).toFixed(1) : '0.0'}</td>
      <td class="cpu-clickable ${pnlClass(r.pnlToday)}" data-history-host="${escAttr(r.host)}" data-history-bot="${escAttr(r.name)}" data-history-metric="pnl">${r.pnlToday.toFixed(2)}</td>
      <td>${r.fillsToday}</td>
      <td class="cpu-clickable ${pnlClass(r.pnlHist)}" data-history-host="${escAttr(r.host)}" data-history-bot="${escAttr(r.name)}" data-history-metric="pnl">${r.pnlHist.toFixed(2)}</td>
      <td class="cpu-clickable" data-history-host="${escAttr(r.host)}" data-history-bot="${escAttr(r.name)}" data-history-metric="pnl_fills">${r.fillsHist}</td>
      <td class="cpu-clickable ${errClass(r.errorsToday)}" data-history-host="${escAttr(r.host)}" data-history-bot="${escAttr(r.name)}" data-history-metric="errors">${r.errorsToday}</td>
      <td class="cpu-clickable ${errClass(r.errors4w)}" data-history-host="${escAttr(r.host)}" data-history-bot="${escAttr(r.name)}" data-history-metric="errors">${r.errors4w}</td>
      <td class="cpu-clickable ${errClass(r.tbsToday)}" data-history-host="${escAttr(r.host)}" data-history-bot="${escAttr(r.name)}" data-history-metric="tracebacks">${r.tbsToday}</td>
      <td class="cpu-clickable ${errClass(r.tbs4w)}" data-history-host="${escAttr(r.host)}" data-history-bot="${escAttr(r.name)}" data-history-metric="tracebacks">${r.tbs4w}</td>
      <td class="inst-actions">
        <span class="inst-action" title="View Log" onclick="event.stopPropagation();viewInstanceLog('${esc(r.host)}','${esc(r.name)}','${esc(r.pbVersion)}')">📋</span>
        <span class="inst-action" title="Restart (kill)" onclick="event.stopPropagation();killInstance('${esc(r.host)}','${esc(r.name)}','${esc(r.pbVersion)}',this)">🔄</span>
      </td>
    </tr>
  `).join('');
}

function instanceCpuCell(host, name, liveCpu, cpu60s, cpu60sWindow) {
  const live = Number.isFinite(Number(liveCpu)) ? Number(liveCpu) : 0;
  const avg60 = Number.isFinite(Number(cpu60s)) ? Number(cpu60s) : 0;
  const window60 = Number.isFinite(Number(cpu60sWindow)) ? Number(cpu60sWindow) : 0;
  let sub = '';
  if (window60 >= 60) sub = '60s ' + avg60.toFixed(1) + '%';
  else if (window60 > 0) sub = '60s warmup ' + Math.min(60, Math.floor(window60)) + 's/60s';
  return `<span>${live.toFixed(1)}${sub ? `<span class="inst-cpu-sub">${esc(sub)}</span>` : ''}</span>`;
}

window.openMetricHistory = function openMetricHistory(host, metricName, botName) {
  const overlay = document.getElementById('cpu-history-ovl');
  const title = document.getElementById('cpu-history-title');
  const sub = document.getElementById('cpu-history-sub');
  const meta = document.getElementById('cpu-history-meta');
  const chart = document.getElementById('cpu-history-chart');
  if (!overlay || !title || !sub || !meta || !chart) return;
  const hostName = String(host || '');
  const metric = String(metricName || 'cpu').trim().toLowerCase() || 'cpu';
  const requestMetric = metric === 'pnl_fills' ? 'pnl' : metric;
  const bot = String(botName || '');
  if (!hostName) return;
  cpuHistoryRequestId += 1;
  const rid = cpuHistoryRequestId;
  if (overlay.parentElement !== document.body) {
    document.body.appendChild(overlay);
  }
  overlay.classList.add('visible');
  overlay.style.display = 'flex';
  overlay.style.visibility = 'visible';
  overlay.style.opacity = '1';
  overlay.style.zIndex = '5001';
  prepareCpuHistoryWindow(980, 560);
  cpuHistoryDisplayMetric = metric;
  title.textContent = metricHistoryTitle(metric, hostName, bot);
  const metaInfo = metricHistoryMeta(metric);
  sub.textContent = metricHistoryLoadingSubtitle(metric, bot);
  meta.innerHTML = '';
  chart.innerHTML = '<div style="color:var(--text-dim);padding:24px;text-align:center">Loading…</div>';
  send({ cmd: requestMetric === 'cpu' ? 'get_cpu_history' : 'get_metric_history', host: hostName, bot_name: bot, metric: requestMetric, sid: String(rid) });
};

window.openCpuHistory = function openCpuHistory(host, botName) {
  window.openMetricHistory(host, 'cpu', botName);
};

window.closeCpuHistory = function closeCpuHistory() {
  const overlay = document.getElementById('cpu-history-ovl');
  if (!overlay) return;
  overlay.classList.remove('visible');
  overlay.style.display = 'none';
  overlay.style.visibility = 'hidden';
  overlay.style.opacity = '0';
  resetCpuHistoryWindow();
};

function getCpuHistoryTarget(target) {
  if (!target || typeof target.closest !== 'function') return null;
  const trigger = target.closest('[data-history-host], [data-cpu-history-host]');
  if (!trigger) return null;
  const host = String(trigger.getAttribute('data-history-host') || trigger.getAttribute('data-cpu-history-host') || '').trim();
  const bot = String(trigger.getAttribute('data-history-bot') || trigger.getAttribute('data-cpu-history-bot') || '').trim();
  const metric = String(trigger.getAttribute('data-history-metric') || 'cpu').trim().toLowerCase() || 'cpu';
  if (!host) return null;
  return { host, bot, metric };
}

let lastCpuHistoryOpen = { key: '', ts: 0 };
let cpuHistoryDisplayMetric = 'cpu';

function handleCpuHistoryInteraction(event) {
  const target = getCpuHistoryTarget(event.target);
  if (!target) return;
  const key = target.metric + '::' + target.host + '::' + target.bot;
  const now = Date.now();
  if (lastCpuHistoryOpen.key === key && (now - lastCpuHistoryOpen.ts) < 400) {
    event.preventDefault();
    event.stopPropagation();
    return;
  }
  lastCpuHistoryOpen = { key, ts: now };
  event.preventDefault();
  event.stopPropagation();
  openMetricHistory(target.host, target.metric, target.bot);
}

function handleCpuHistory(payload, host, botName, sid, metricName) {
  const overlay = document.getElementById('cpu-history-ovl');
  if (!overlay || !overlay.classList.contains('visible')) return;
  if (sid && String(sid) !== String(cpuHistoryRequestId)) return;
  const title = document.getElementById('cpu-history-title');
  const sub = document.getElementById('cpu-history-sub');
  const meta = document.getElementById('cpu-history-meta');
  const chart = document.getElementById('cpu-history-chart');
  if (!title || !sub || !meta || !chart) return;
  const data = payload || {};
  const metric = sid && String(sid) === String(cpuHistoryRequestId)
    ? cpuHistoryDisplayMetric
    : (String(metricName || (data && data.metric) || 'cpu').trim().toLowerCase() || 'cpu');
  const points = metricHistorySeriesPoints(metric, data);
  title.textContent = metricHistoryTitle(metric, host, botName);
  sub.textContent = metricHistorySubtitle(metric, data);
  meta.innerHTML = renderCpuHistoryMeta(data, points, metric);
  chart.innerHTML = renderCpuHistoryChart(data, points, metric);
}

function getCpuHistoryChartHeight() {
  const chart = document.getElementById('cpu-history-chart');
  if (!chart) return 280;
  const style = window.getComputedStyle(chart);
  const paddingTop = parseFloat(style.paddingTop) || 0;
  const paddingBottom = parseFloat(style.paddingBottom) || 0;
  const available = chart.clientHeight - paddingTop - paddingBottom;
  return Math.max(220, Math.round(available || 280));
}

function renderCpuHistoryMeta(data, points, metric) {
  const valid = points.filter(function (v) { return typeof v === 'number' && Number.isFinite(v); });
  const latest = valid.length ? valid[valid.length - 1] : null;
  const peak = valid.length ? Math.max.apply(null, valid) : null;
  const totalPnl = Number.isFinite(Number(data && data.total_pnl)) ? Number(data.total_pnl) : null;
  const totalFills = Number.isFinite(Number(data && data.total_fills)) ? Number(data.total_fills) : null;
  const bestDayPnl = Number.isFinite(Number(data && data.best_day_pnl)) ? Number(data.best_day_pnl) : null;
  const worstDayPnl = Number.isFinite(Number(data && data.worst_day_pnl)) ? Number(data.worst_day_pnl) : null;
  const lastFillTs = Number.isFinite(Number(data && data.last_fill_ts)) ? Number(data.last_fill_ts) : 0;
  const warningThreshold = Number.isFinite(Number(data && data.warning_threshold)) ? Number(data.warning_threshold) : null;
  const errorThreshold = Number.isFinite(Number(data && data.error_threshold)) ? Number(data.error_threshold) : null;
  const lastMinute = Number.isFinite(Number(data && data.last_minute)) ? Number(data.last_minute) : 0;
  const lastHour = Number.isFinite(Number(data && data.last_hour)) ? Number(data.last_hour) : 0;
  const lastSeen = lastMinute > 0 ? new Date(lastMinute * 60000).toLocaleString() : 'n/a';
  const lastSeenHourly = formatUtcHourLabel(lastHour);
  const metaInfo = metricHistoryMeta(metric);
  const showThresholds = !metaInfo.pnlMetric && !metaInfo.fillsMetric;
  return [
    metaInfo.pnlMetric ? cpuChartPill('Total PNL', metricHistoryValueLabel(metric, totalPnl, data)) : '',
    (metaInfo.pnlMetric || metaInfo.fillsMetric) ? cpuChartPill('Total fills', String(totalFills == null ? 'n/a' : totalFills)) : '',
    cpuChartPill('Latest', metricHistoryValueLabel(metric, latest, data)),
    cpuChartPill('Peak', metricHistoryValueLabel(metric, peak, data)),
    metaInfo.pnlMetric && bestDayPnl != null ? cpuChartPill('Best day', metricHistoryValueLabel(metric, bestDayPnl, data)) : '',
    metaInfo.pnlMetric && worstDayPnl != null ? cpuChartPill('Worst day', metricHistoryValueLabel(metric, worstDayPnl, data)) : '',
    showThresholds && warningThreshold != null ? cpuChartPill('Warning', metricHistoryValueLabel(metric, warningThreshold, data)) : '',
    showThresholds && errorThreshold != null ? cpuChartPill('Error', metricHistoryValueLabel(metric, errorThreshold, data)) : '',
    cpuChartPill(metaInfo.countMetric ? 'Last hour' : ((metaInfo.pnlMetric || metaInfo.fillsMetric) ? 'Last fill' : 'Last sample'), metaInfo.countMetric ? lastSeenHourly : ((metaInfo.pnlMetric || metaInfo.fillsMetric) ? (lastFillTs > 0 ? new Date(lastFillTs * 1000).toISOString().replace('T', ' ').slice(0, 19) + ' UTC' : 'n/a') : lastSeen)),
  ].join('');
}

function cpuChartPill(label, value) {
  return `<span class="cpu-chart-pill"><strong>${esc(label)}:</strong> ${esc(value)}</span>`;
}

function renderCpuHistoryChart(data, points, metric) {
  if (!points.length) {
    return '<div style="color:var(--text-dim);padding:24px;text-align:center">No history available yet.</div>';
  }
  const meta = metricHistoryMeta(metric);
  const width = 920;
  const height = getCpuHistoryChartHeight();
  const warningThreshold = !meta.pnlMetric && !meta.fillsMetric && Number.isFinite(Number(data && data.warning_threshold)) ? Number(data.warning_threshold) : null;
  const errorThreshold = !meta.pnlMetric && !meta.fillsMetric && Number.isFinite(Number(data && data.error_threshold)) ? Number(data.error_threshold) : null;
  const chartPoints = points;
  const valid = chartPoints
    .map(function (value, index) { return typeof value === 'number' && Number.isFinite(value) ? { index: index, value: value } : null; })
    .filter(Boolean);
  if (!valid.length) {
    return '<div style="color:var(--text-dim);padding:24px;text-align:center">' + esc(metricHistoryEmpty(metric, data)) + '</div>';
  }
  const scale = metricHistoryScale(metric, data);
  const values = valid.map(function (item) { return item.value; });
  const minRaw = Math.min.apply(null, values.concat([warningThreshold || 0, errorThreshold || 0]));
  const maxRaw = Math.max.apply(null, values.concat([warningThreshold || 0, errorThreshold || 0]));
  const guidesMeta = meta.pnlMetric ? scale.guideValues(minRaw, maxRaw) : scale.guideValues(Math.max(scale.baseline, maxRaw));
  const guideLabelWidth = guidesMeta.values.reduce(function (maxLen, value) {
    return Math.max(maxLen, String(scale.label(value)).length);
  }, 0);
  const pad = { left: Math.max(42, Math.min(112, 12 + guideLabelWidth * 7)), right: 14, top: 14, bottom: 28 };
  const innerW = width - pad.left - pad.right;
  const innerH = height - pad.top - pad.bottom;
  const minValue = meta.pnlMetric ? guidesMeta.minValue : 0;
  const maxValue = guidesMeta.maxValue;
  function x(index) { return pad.left + (index / Math.max(chartPoints.length - 1, 1)) * innerW; }
  function y(value) { return pad.top + innerH - ((value - minValue) / Math.max(maxValue - minValue, 1e-9)) * innerH; }
  let path = '';
  valid.forEach(function (item, idx) {
    path += (idx === 0 ? 'M' : ' L') + x(item.index).toFixed(1) + ' ' + y(item.value).toFixed(1);
  });
  const pointMarkers = (meta.pnlMetric || meta.fillsMetric) ? valid.map(function (item) {
    return `<circle cx="${x(item.index).toFixed(1)}" cy="${y(item.value).toFixed(1)}" r="${valid.length === 1 ? 4 : 3}" fill="rgba(93,196,255,0.95)" stroke="rgba(5,9,15,0.9)" stroke-width="1.2" />`;
  }).join('') : '';
  const guides = guidesMeta.values.filter(function (v, i, arr) { return v <= maxValue || i === arr.length - 1; }).map(function (v) {
    const yy = y(v);
    return `<line x1="${pad.left}" y1="${yy.toFixed(1)}" x2="${(width - pad.right)}" y2="${yy.toFixed(1)}" stroke="rgba(255,255,255,0.08)" stroke-width="1" />`
      + `<text x="${pad.left - 8}" y="${(yy + 4).toFixed(1)}" text-anchor="end" fill="rgba(255,255,255,0.55)" font-size="11">${scale.label(v)}</text>`;
  }).join('');
  let dailyLine = '';
  let dailyLabels = '';
  if (meta.countMetric && Array.isArray(data && data.daily_points) && data.daily_points.length) {
    const dailyPoints = data.daily_points.map(function (value, index) {
      return typeof value === 'number' && Number.isFinite(value) ? { index: index, value: value } : null;
    }).filter(Boolean);
    const dayCount = Math.max((data && data.daily_points && data.daily_points.length) || 0, 1);
    const dayPath = dailyPoints.map(function (item, idx) {
      const dayX = pad.left + (((item.index + 0.5) / dayCount) * innerW);
      return (idx === 0 ? 'M' : ' L') + dayX.toFixed(1) + ' ' + y(item.value).toFixed(1);
    }).join('');
    if (dayPath) {
      dailyLine = `<path d="${dayPath}" fill="none" stroke="rgba(171,219,255,0.92)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"></path>`;
    }
    dailyLabels = `<text x="${pad.left}" y="${pad.top + 14}" fill="rgba(171,219,255,0.9)" font-size="11">daily UTC</text>`
      + `<text x="${pad.left + 72}" y="${pad.top + 14}" fill="rgba(93,196,255,0.72)" font-size="11">hourly UTC</text>`;
  }
  const zeroLine = meta.pnlMetric && minValue < 0 && maxValue > 0 ? `<line x1="${pad.left}" y1="${y(0).toFixed(1)}" x2="${(width - pad.right)}" y2="${y(0).toFixed(1)}" stroke="rgba(255,255,255,0.18)" stroke-width="1" stroke-dasharray="3 3" />` : '';
  const warningLine = warningThreshold == null ? '' : `<line x1="${pad.left}" y1="${y(warningThreshold).toFixed(1)}" x2="${(width - pad.right)}" y2="${y(warningThreshold).toFixed(1)}" stroke="rgba(244,185,66,0.85)" stroke-width="1.5" stroke-dasharray="6 4" />`;
  const errorLine = errorThreshold == null ? '' : `<line x1="${pad.left}" y1="${y(errorThreshold).toFixed(1)}" x2="${(width - pad.right)}" y2="${y(errorThreshold).toFixed(1)}" stroke="rgba(255,75,75,0.78)" stroke-width="1.5" stroke-dasharray="6 4" />`;
  const warningLabel = warningThreshold == null ? '' : `<text x="${width - pad.right}" y="${(y(warningThreshold) - 6).toFixed(1)}" text-anchor="end" fill="rgba(244,210,120,0.95)" font-size="11">warning ${metricHistoryValueLabel(metric, warningThreshold, data)}</text>`;
  const errorLabel = errorThreshold == null ? '' : `<text x="${width - pad.right}" y="${(y(errorThreshold) + 14).toFixed(1)}" text-anchor="end" fill="rgba(255,120,120,0.95)" font-size="11">error ${metricHistoryValueLabel(metric, errorThreshold, data)}</text>`;
  const rangeLabel = meta.countMetric ? '4 week' : ((meta.pnlMetric || meta.fillsMetric) ? 'full' : '24 hour');
  const startLabel = meta.countMetric ? '4w ago' : ((meta.pnlMetric || meta.fillsMetric) ? 'first day' : '24h ago');
  let xAxisLabels = '';
  if ((meta.pnlMetric || meta.fillsMetric) && Array.isArray(data && data.days) && data.days.length) {
    const tickCount = Math.min(4, data.days.length);
    const ticks = [];
    for (let i = 0; i < tickCount; i += 1) {
      const idx = tickCount === 1 ? 0 : Math.round(((data.days.length - 1) * i) / (tickCount - 1));
      if (ticks.some(function (tick) { return tick.index === idx; })) continue;
      ticks.push({ index: idx, label: formatUtcDayLabel(data.days[idx]) });
    }
    xAxisLabels = ticks.map(function (tick) {
      const xx = x(tick.index).toFixed(1);
      const anchor = tick.index === 0 ? 'start' : (tick.index === chartPoints.length - 1 ? 'end' : 'middle');
      return `<text x="${xx}" y="${height - 8}" text-anchor="${anchor}" fill="rgba(255,255,255,0.55)" font-size="11">${esc(tick.label)}</text>`;
    }).join('');
  }
  return `
    <svg class="cpu-chart-svg" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" role="img" aria-label="${escAttr(rangeLabel)} ${escAttr(metricHistoryMeta(metric).label)} history chart">
      <rect x="0" y="0" width="${width}" height="${height}" rx="10" fill="rgba(5,9,15,0.55)"></rect>
      ${guides}
      ${zeroLine}
      ${warningLine}
      ${errorLine}
      ${warningLabel}
      ${errorLabel}
      ${dailyLine}
      <path d="${path}" fill="none" stroke="rgba(93,196,255,0.95)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"></path>
      ${pointMarkers}
      ${dailyLabels}
      ${xAxisLabels || `<text x="${pad.left}" y="${height - 8}" fill="rgba(255,255,255,0.55)" font-size="11">${startLabel}</text><text x="${width - pad.right}" y="${height - 8}" text-anchor="end" fill="rgba(255,255,255,0.55)" font-size="11">now</text>`}
    </svg>`;
}
