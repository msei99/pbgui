<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PBv7 Run</title>
<link rel="stylesheet" href="/app/css/sidebar.css?v=1">
<script src="/app/js/sidebar_resize.js?v=1"></script>
<style>
/* ─── Reset & Base ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
:root {
  --bg:       #0e1117;
  --bg2:      #1a1d24;
  --bg3:      #262730;
  --border:   #333640;
  --text:     #fafafa;
  --text-dim: #a0a4ab;
  --green:    #21c354;
  --orange:   #ff8c00;
  --red:      #ff4b4b;
  --blue:     #1f77ff;
  --accent:   #4da6ff;
  --font:     'Source Sans Pro', -apple-system, BlinkMacSystemFont, sans-serif;
  --fs-xs:    11px;
  --fs-sm:    13px;
  --fs-base:  14px;
  --fs-md:    15px;
  --fs-lg:    18px;
  --sp-xs:    4px;
  --sp-sm:    8px;
  --sp-md:    12px;
  --sp-lg:    20px;
  --input-h:  32px;
  --btn-h:    32px;
}
body {
  font-family: var(--font);
  font-size: var(--fs-base);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  display: flex;
  flex-direction: column;
}

/* ─── Connection Banner ────────────────────────────────────── */
#conn-banner {
  padding: var(--sp-sm) 16px;
  text-align: center;
  font-size: var(--fs-sm);
  font-weight: 600;
  transition: all 0.3s;
}
.conn-ok      { background: var(--green); color: #000; display: none; }
.conn-lost    { background: var(--red);   color: #fff; }
.conn-waiting { background: var(--orange); color: #000; }

/* ─── Page layout (sidebar + main content) ─────────────────── */
#page-body {
  display: flex;
  height: calc(100vh - 52px);
  overflow: hidden;
}

/* ─── Main content ─────────────────────────────────────────── */
#main-content {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-lg);
  min-width: 0;
}

/* ─── Table ────────────────────────────────────────────────── */
.tbl-wrap {
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--fs-base);
}
th, td {
  padding: var(--sp-xs) var(--sp-sm);
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
th {
  background: var(--bg2);
  color: var(--text-dim);
  font-size: var(--fs-sm);
  text-transform: uppercase;
  position: sticky;
  top: 0;
  cursor: pointer;
  user-select: none;
}
th:hover { color: var(--text); }
tr:hover td { background: var(--bg3); }
tbody tr { cursor: pointer; }
.sort-arrow { font-size: 10px; margin-left: 2px; }

/* Status classes */
.st-synced          { color: var(--green); font-weight: 600; }
.st-outdated        { color: var(--orange); font-weight: 600; }
.st-activate_needed { color: var(--orange); }
.st-stop_needed     { color: var(--red); }
.st-disabled        { color: var(--text-dim); }
.st-collecting      { color: var(--text-dim); font-style: italic; }
tr.row-inactive td  { opacity: 0.45; }

/* Inline buttons */
.btn-edit {
  height: 24px; width: 28px;
  padding: 0;
  font-size: var(--fs-sm);
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--bg2);
  color: var(--accent);
  cursor: pointer;
}
.btn-edit:hover { background: var(--bg3); }
.btn-del {
  height: 24px; width: 28px;
  padding: 0;
  font-size: var(--fs-sm);
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--bg2);
  color: var(--red);
  cursor: pointer;
  margin-left: 4px;
}
.btn-del:hover { background: var(--bg3); }

/* Confirmation modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 10000;
  display: flex; align-items: center; justify-content: center;
}
.modal-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: var(--sp-lg) 28px;
  min-width: 340px;
  max-width: 460px;
  text-align: center;
}
.modal-box h3 { margin-bottom: var(--sp-md); font-size: var(--fs-lg); }
.modal-box p { margin-bottom: var(--sp-lg); color: var(--text-dim); font-size: var(--fs-base); }
.modal-box .warn { color: var(--orange); font-weight: 600; }
.modal-btns { display: flex; gap: var(--sp-sm); justify-content: center; }
.modal-btns button {
  padding: var(--sp-sm) var(--sp-lg);
  border-radius: 4px;
  border: 1px solid var(--border);
  cursor: pointer;
  font-size: var(--fs-base);
  font-weight: 600;
}
.modal-btn-cancel { background: var(--bg3); color: var(--text); }
.modal-btn-cancel:hover { background: var(--border); }
.modal-btn-delete { background: var(--red); color: #fff; border-color: var(--red); }
.modal-btn-delete:hover { opacity: 0.85; }
.modal-btn-restore { background: var(--green); color: #fff; border-color: var(--green); }
.modal-btn-restore:hover { opacity: 0.85; }

/* Backup modal */
.backup-list { text-align: left; }
.backup-instance {
  border-bottom: 1px solid var(--border);
  padding-bottom: var(--sp-sm);
  margin-bottom: var(--sp-sm);
}
.backup-instance:last-child { border-bottom: none; margin-bottom: 0; }
.backup-instance-name {
  font-weight: 700; font-size: var(--fs-base); color: var(--text);
  margin-bottom: var(--sp-xs);
  display: flex; align-items: center; gap: var(--sp-sm);
}
.backup-instance-name .badge-exists {
  font-size: var(--fs-xs); background: var(--bg3); color: var(--text-dim);
  border-radius: 3px; padding: 1px 6px;
}
.backup-ts-row {
  display: flex; align-items: center; gap: var(--sp-sm);
  padding: 4px var(--sp-sm); font-size: var(--fs-sm);
  background: rgba(255,255,255,0.03);
  border-radius: 4px;
  margin: 2px 0;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 1px 3px rgba(0,0,0,0.3);
}
.backup-ts-row .ts { color: var(--text-dim); flex: 1; }
.backup-ts-row button {
  padding: 2px var(--sp-sm); border-radius: 3px; border: 1px solid var(--border);
  cursor: pointer; font-size: var(--fs-xs); font-weight: 600;
}
.backup-ts-row .btn-restore { background: var(--green); color: #fff; border-color: var(--green); }
.backup-ts-row .btn-restore:hover { opacity: 0.85; }
.backup-ts-row .btn-del-backup { background: transparent; color: var(--red); border-color: var(--red); }
.backup-ts-row .btn-del-backup:hover { background: var(--red); color: #fff; }
.backup-empty { color: var(--text-dim); font-size: var(--fs-sm); padding: var(--sp-md); text-align: center; }

/* Backup modal — draggable panel */
.backup-panel {
  display: none;
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10001;
  width: min(660px, 92vw);
  height: min(580px, 88vh);
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 20px 70px rgba(0,0,0,0.8);
  flex-direction: column;
}
.backup-panel.visible { display: flex; }
.backup-panel-drag {
  position: absolute; top: 0; left: 0; right: 40px;
  height: 44px; cursor: move; z-index: 2;
}
.backup-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--sp-sm) var(--sp-md);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg3);
  border-radius: 8px 8px 0 0;
  position: relative;
}
.backup-panel-header h3 { margin: 0; font-size: var(--fs-lg); }
.backup-panel-close {
  background: transparent; border: none; color: var(--text-dim);
  font-size: 18px; cursor: pointer; padding: 2px 6px; line-height: 1;
  border-radius: 4px; z-index: 3; position: relative;
}
.backup-panel-close:hover { color: var(--text); background: rgba(255,255,255,0.06); }
.backup-settings-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px var(--sp-md);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  font-size: var(--fs-sm);
}
.backup-settings-row label { color: var(--text-dim); white-space: nowrap; }
.backup-settings-row .num-stepper { display: flex; align-items: center; }
.backup-settings-row .num-stepper input {
  width: 56px; text-align: center; border-radius: 0 !important;
  background: var(--bg2); color: #4caf50; border: 1px solid var(--border);
  padding: 2px 4px; font-size: var(--fs-sm); height: 26px;
  -moz-appearance: textfield;
}
.backup-settings-row .num-stepper input::-webkit-inner-spin-button,
.backup-settings-row .num-stepper input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.backup-settings-row .stepper-btn {
  width: 24px; height: 26px; flex-shrink: 0;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); font-size: 14px; line-height: 1;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  user-select: none; padding: 0;
}
.backup-settings-row .stepper-btn:first-child { border-radius: 4px 0 0 4px; border-right: none; }
.backup-settings-row .stepper-btn:last-child  { border-radius: 0 4px 4px 0; border-left: none; }
.backup-settings-row .stepper-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
.btn-save-retention {
  background: transparent; border: 1px solid var(--border); color: var(--text-dim);
  border-radius: 4px; cursor: pointer; padding: 2px 8px; font-size: 14px;
  display: flex; align-items: center; height: 26px;
}
.btn-save-retention:hover { background: rgba(76,175,80,0.15); color: #4caf50; }
.backup-panel-body {
  flex: 1; min-height: 0; overflow-y: auto; padding: var(--sp-md);
}
.backup-panel-grip {
  position: absolute; right: 0; bottom: 0; width: 16px; height: 16px;
  cursor: nwse-resize; z-index: 4;
  background: linear-gradient(135deg, transparent 30%, var(--text-dim) 30% 36%,
    transparent 36% 56%, var(--text-dim) 56% 62%, transparent 62%);
  opacity: 0.5; border-radius: 0 0 8px 0;
}
.backup-panel-grip:hover { opacity: 1; }

/* Toast */
#toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: var(--sp-sm) var(--sp-lg);
  border-radius: 6px;
  font-size: var(--fs-sm);
  font-weight: 600;
  z-index: 9999;
  display: none;
  transition: opacity 0.3s;
}
.toast-ok   { background: var(--green); color: #000; }
.toast-err  { background: var(--red); color: #fff; }
.toast-info { background: var(--blue); color: #fff; }
</style>
</head>
<body>

<!-- Navigation bar (filled by pbgui_nav.js) -->
<nav id="topnav"></nav>

<!-- Connection banner -->
<div id="conn-banner" class="conn-waiting">Connecting…</div>

<!-- Page body: sidebar + main content -->
<div id="page-body">

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-sticky">
      <div id="sidebar-header">
        <span class="sb-title">Instances</span>
        <span class="sb-count" id="instance-count">0</span>
      </div>
      <div id="sidebar-toolbar">
        <div class="sb-label">Search</div>
        <input type="text" id="f-search" class="sb-input" placeholder="Name, note, host…">
        <div class="sb-label" style="margin-top:4px">Status</div>
        <select id="f-status" class="sb-input">
          <option value="All" selected>All</option>
          <option value="active">Active</option>
          <option value="synced">Synced</option>
          <option value="outdated">Outdated</option>
          <option value="activate_needed">Needs Sync</option>
          <option value="stop_needed">Stop Needed</option>
          <option value="disabled">Disabled</option>
          <option value="collecting">Collecting</option>
        </select>
        <hr class="sb-sep">
        <button class="sb-btn" onclick="loadInstances()">&#x21bb; Refresh</button>
        <button class="sb-btn" onclick="addInstance()">&#x2795; Add Instance</button>
        <button class="sb-btn" onclick="openBackups()">&#x1F4BE; Backups</button>
      </div>
    </div>
    <div id="sidebar-resize"></div>
  </div>

  <!-- Main content -->
  <div id="main-content">
    <div class="tbl-wrap">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

</div><!-- /page-body -->

<div id="toast"></div>
<div id="modal-root"></div>

<script>
/* ─── Config (var so nav.js can access them) ──────────────── */
var TOKEN          = "%%TOKEN%%";
var API_BASE       = "%%API_BASE%%";
var WS_BASE        = "%%WS_BASE%%";
var ST_BASE        = "%%ST_BASE%%";
var PBGUI_VERSION  = "%%VERSION%%";
var PBGUI_SERIAL   = "%%SERIAL%%";

/* ─── State ───────────────────────────────────────────────── */
var instances = [];
var sort = { col: 'name', asc: true };
var filterSearch = '';
var filterStatus = 'All';

/* ─── API helpers ─────────────────────────────────────────── */
function apiFetch(path, opts) {
  opts = opts || {};
  var url = API_BASE + path;
  opts.headers = Object.assign({ 'Authorization': 'Bearer ' + TOKEN }, opts.headers || {});
  return fetch(url, opts);
}

/* ─── Load instances ──────────────────────────────────────── */
function loadInstances() {
  apiFetch('/instances').then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }).then(function(data) {
    instances = data.instances || [];
    render();
    setBanner('ok');
  }).catch(function(e) {
    console.error('Load failed:', e);
    setBanner('lost');
  });
}

/* ─── WebSocket for real-time updates ─────────────────────── */
var ws = null;
var wsReconnectTimer = null;
var wsReconnectDelay = 1000;

function connectWS() {
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
  var url = WS_BASE + '/api/v7/ws/v7?token=' + encodeURIComponent(TOKEN);
  ws = new WebSocket(url);

  ws.onopen = function() {
    wsReconnectDelay = 1000;
    setBanner('ok');
  };

  ws.onmessage = function(ev) {
    try {
      var msg = JSON.parse(ev.data);
      if (msg.type === 'instances' && Array.isArray(msg.data)) {
        instances = msg.data;
        render();
        setBanner('ok');
      }
    } catch(e) { console.error('WS parse error:', e); }
  };

  ws.onclose = function() {
    setBanner('lost');
    scheduleReconnect();
  };

  ws.onerror = function() {
    setBanner('lost');
  };
}

function scheduleReconnect() {
  if (wsReconnectTimer) return;
  wsReconnectTimer = setTimeout(function() {
    wsReconnectTimer = null;
    connectWS();
    wsReconnectDelay = Math.min(wsReconnectDelay * 2, 30000);
  }, wsReconnectDelay);
}

/* ─── Render (diff-based: only update changed cells) ──────── */
var COLS = [
  { key: 'name',            label: 'Name' },
  { key: 'enabled_on',      label: 'Enabled On' },
  { key: 'status',          label: 'Status' },
  { key: 'version',         label: 'Cfg Ver' },
  { key: 'running_version', label: 'Run Ver' },
  { key: 'twe',             label: 'TWE' },
  { key: 'running_on',      label: 'Running On' },
  { key: 'note',            label: 'Note' },
  { key: '_actions',        label: '' },
];

var STATUS_LABELS = {
  synced:          'synced',
  outdated:        'outdated',
  activate_needed: 'sync needed',
  stop_needed:     'stop needed',
  disabled:        'disabled',
  collecting:      'collecting…',
};

var headerRendered = false;
var rowMap = {};  /* name -> { tr, cells: string[] } */

function buildCells(r) {
  var stClass = 'st-' + (r.status || 'disabled');
  var stLabel = STATUS_LABELS[r.status] || r.status || '\u2013';
  var runOn = (r.running_on || []).join(', ') || '\u2013';
  return [
    esc(r.name),
    esc(r.enabled_on || '\u2013'),
    '<span class="' + stClass + '">' + stLabel + '</span>',
    (r.version != null ? String(r.version) : '\u2013'),
    (r.running_version != null ? String(r.running_version) : '\u2013'),
    esc(r.twe || '\u2013'),
    esc(runOn),
    esc(r.note || ''),
    '<button class="btn-edit" data-edit="' + esc(r.name) + '" title="Edit">\u270E</button>' +
    '<button class="btn-del" data-delete="' + esc(r.name) + '" title="Delete">\u2716</button>',
  ];
}

function createTr(r, cells) {
  var tr = document.createElement('tr');
  tr.dataset.key = r.name;
  if (r.status === 'disabled') tr.className = 'row-inactive';
  cells.forEach(function(html) {
    var td = document.createElement('td');
    td.innerHTML = html;
    tr.appendChild(td);
  });
  return tr;
}

function renderHeader() {
  if (headerRendered) {
    /* Just update sort arrows */
    var ths = document.getElementById('thead').querySelectorAll('th[data-sort]');
    ths.forEach(function(th) {
      var arrow = th.querySelector('.sort-arrow');
      if (arrow) {
        arrow.textContent = sort.col === th.dataset.sort
          ? (sort.asc ? ' \u25B2' : ' \u25BC') : '';
      }
    });
    return;
  }
  var thead = document.getElementById('thead');
  thead.innerHTML = '<tr>' + COLS.map(function(c) {
    if (c.key === '_actions') return '<th></th>';
    return '<th data-sort="' + c.key + '">' + c.label + '<span class="sort-arrow"></span></th>';
  }).join('') + '</tr>';
  thead.querySelectorAll('th[data-sort]').forEach(function(th) {
    th.onclick = function() {
      var key = th.dataset.sort;
      if (sort.col === key) sort.asc = !sort.asc;
      else { sort.col = key; sort.asc = true; }
      render();
    };
  });
  headerRendered = true;
  renderHeader();  /* set initial arrows */
}

function render() {
  var filtered = instances.slice();

  // Search filter
  if (filterSearch) {
    var q = filterSearch.toLowerCase();
    filtered = filtered.filter(function(r) {
      return r.name.toLowerCase().indexOf(q) >= 0 ||
        (r.note || '').toLowerCase().indexOf(q) >= 0 ||
        (r.enabled_on || '').toLowerCase().indexOf(q) >= 0;
    });
  }

  // Status filter
  if (filterStatus !== 'All') {
    if (filterStatus === 'active') {
      filtered = filtered.filter(function(r) { return r.status !== 'disabled'; });
    } else {
      filtered = filtered.filter(function(r) { return r.status === filterStatus; });
    }
  }

  // Sort: active first, then by selected column
  filtered.sort(function(a, b) {
    var actA = a.status === 'disabled' ? 1 : 0;
    var actB = b.status === 'disabled' ? 1 : 0;
    if (actA !== actB) return actA - actB;

    var va = a[sort.col], vb = b[sort.col];
    if (Array.isArray(va)) va = va.join(',');
    if (Array.isArray(vb)) vb = vb.join(',');
    if (va == null) va = '';
    if (vb == null) vb = '';
    if (typeof va === 'string') { va = va.toLowerCase(); vb = ('' + vb).toLowerCase(); }
    var cmp = va < vb ? -1 : (va > vb ? 1 : 0);
    if (cmp !== 0) return sort.asc ? cmp : -cmp;
    return a.name.toLowerCase() < b.name.toLowerCase() ? -1 : 1;
  });

  document.getElementById('instance-count').textContent =
    filtered.length + '/' + instances.length;

  renderHeader();

  // Body: diff-based update
  var tbody = document.getElementById('tbody');
  var usedKeys = {};

  filtered.forEach(function(r, idx) {
    usedKeys[r.name] = true;
    var cells = buildCells(r);
    var entry = rowMap[r.name];
    var inactive = r.status === 'disabled';

    if (entry) {
      /* Update only changed cells */
      var tds = entry.tr.children;
      for (var i = 0; i < cells.length; i++) {
        if (entry.cells[i] !== cells[i]) {
          tds[i].innerHTML = cells[i];
        }
      }
      entry.cells = cells;
      /* Update row class */
      entry.tr.className = inactive ? 'row-inactive' : '';
      /* Move to correct position if needed */
      if (tbody.children[idx] !== entry.tr) {
        tbody.insertBefore(entry.tr, tbody.children[idx] || null);
      }
    } else {
      /* New row */
      var tr = createTr(r, cells);
      rowMap[r.name] = { tr: tr, cells: cells };
      tbody.insertBefore(tr, tbody.children[idx] || null);
    }
  });

  /* Remove deleted rows */
  Object.keys(rowMap).forEach(function(name) {
    if (!usedKeys[name]) {
      rowMap[name].tr.remove();
      delete rowMap[name];
    }
  });
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ─── Edit (navigate to FastAPI edit page) ────────────────── */
function editInstance(name) {
  var url = API_BASE + '/edit_page?name=' + encodeURIComponent(name) + '&token=' + encodeURIComponent(TOKEN) +
    '&st_base=' + encodeURIComponent(ST_BASE);
  window.location.href = url;
}

/* ─── Add Instance (navigate to FastAPI edit page) ────────── */
function addInstance() {
  var url = API_BASE + '/edit_page?new=1&token=' + encodeURIComponent(TOKEN) +
    '&st_base=' + encodeURIComponent(ST_BASE);
  window.location.href = url;
}

/* ─── Delete Instance (modal confirm → API DELETE) ────────── */
function confirmDelete(name) {
  var inst = instances.find(function(r) { return r.name === name; });
  if (inst && inst.running_on && inst.running_on.length > 0) {
    toast('Cannot delete ' + name + ' — running on ' + inst.running_on.join(', ') + '. Stop it first.', 'err');
    return;
  }
  var root = document.getElementById('modal-root');
  root.innerHTML =
    '<div class="modal-overlay" id="modal-overlay">' +
      '<div class="modal-box">' +
        '<h3>Delete Instance?</h3>' +
        '<p class="warn">\u26A0 ' + esc(name) + '</p>' +
        '<p>This will permanently delete the instance directory and all its files.</p>' +
        '<div class="modal-btns">' +
          '<button class="modal-btn-cancel" id="modal-cancel">Cancel</button>' +
          '<button class="modal-btn-delete" id="modal-confirm">Delete</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  document.getElementById('modal-cancel').onclick = closeModal;
  document.getElementById('modal-overlay').onclick = function(e) {
    if (e.target === this) closeModal();
  };
  document.getElementById('modal-confirm').onclick = function() {
    executeDelete(name);
  };
}

function executeDelete(name) {
  var confirmBtn = document.getElementById('modal-confirm');
  if (confirmBtn) { confirmBtn.disabled = true; confirmBtn.textContent = 'Deleting\u2026'; }
  apiFetch('/instances/' + encodeURIComponent(name), { method: 'DELETE' }).then(function(res) {
    if (res.status === 409) {
      return res.json().then(function(d) { throw new Error(d.detail || 'Instance is running'); });
    }
    if (!res.ok) {
      return res.json().then(function(d) { throw new Error(d.detail || 'HTTP ' + res.status); });
    }
    return res.json();
  }).then(function(data) {
    closeModal();
    var hostInfo = '';
    if (data.hosts) {
      var ok = 0, fail = 0;
      Object.keys(data.hosts).forEach(function(h) {
        if (data.hosts[h].success) ok++; else fail++;
      });
      if (ok > 0 || fail > 0) {
        hostInfo = ' (VPS: ' + ok + '/' + (ok + fail) + ' hosts OK' + (fail > 0 ? ', ' + fail + ' failed' : '') + ')';
      }
    }
    toast(name + ' deleted' + hostInfo, 'ok');
    /* Remove from local state immediately */
    instances = instances.filter(function(r) { return r.name !== name; });
    if (rowMap[name]) { rowMap[name].tr.remove(); delete rowMap[name]; }
    render();
  }).catch(function(e) {
    closeModal();
    toast('Delete failed: ' + e.message, 'err');
  });
}

function closeModal() {
  document.body.style.overflow = '';
  document.getElementById('modal-root').innerHTML = '';
}

/* ─── Backup / Restore ────────────────────────────────────── */
function openBackups() {
  var root = document.getElementById('modal-root');
  if (!document.getElementById('backup-panel')) {
    root.innerHTML =
      '\x3Cdiv class="backup-panel" id="backup-panel">' +
        '\x3Cdiv class="backup-panel-drag" id="backup-drag">\x3C/div>' +
        '\x3Cdiv class="backup-panel-header">' +
          '\x3Ch3>Instance Backups\x3C/h3>' +
          '\x3Cbutton class="backup-panel-close" id="backup-close">\u2715\x3C/button>' +
        '\x3C/div>' +
        '\x3Cdiv class="backup-settings-row">' +
          '\x3Clabel>Retention limit: \x3C/label>' +
          '\x3Cdiv class="num-stepper">' +
            '\x3Cbutton type="button" class="stepper-btn" id="ret-minus">\u2212\x3C/button>' +
            '\x3Cinput type="number" id="backup-retention" min="1" step="1" />' +
            '\x3Cbutton type="button" class="stepper-btn" id="ret-plus">+\x3C/button>' +
          '\x3C/div>' +
          '\x3Cbutton id="backup-retention-save" class="btn-save-retention" title="Save retention limit">\uD83D\uDCBE\x3C/button>' +
          '\x3Cspan id="backup-retention-msg" style="margin-left:6px;font-size:0.85em;">\x3C/span>' +
        '\x3C/div>' +
        '\x3Cdiv class="backup-panel-body">' +
          '\x3Cdiv id="backup-content" class="backup-empty">Loading\u2026\x3C/div>' +
        '\x3C/div>' +
        '\x3Cdiv class="backup-panel-grip" id="backup-grip">\x3C/div>' +
      '\x3C/div>';
    document.getElementById('backup-close').onclick = closeModal;
    document.getElementById('backup-retention-save').onclick = saveRetention;
    document.getElementById('ret-minus').onclick = function() { stepRetention(-1); };
    document.getElementById('ret-plus').onclick = function() { stepRetention(1); };
    document.getElementById('backup-retention').addEventListener('wheel', function(e) {
      e.preventDefault(); stepRetention(e.deltaY < 0 ? 1 : -1);
    }, { passive: false });
    document.getElementById('backup-retention').addEventListener('input', function() { markRetentionDirty(); });
    (function() {
      var panel = document.getElementById('backup-panel');
      var handle = document.getElementById('backup-drag');
      var startX, startY, boxL, boxT;
      handle.addEventListener('mousedown', function(e) {
        e.preventDefault();
        var r = panel.getBoundingClientRect();
        panel.style.transform = 'none';
        panel.style.left = r.left + 'px'; panel.style.top = r.top + 'px';
        startX = e.clientX; startY = e.clientY; boxL = r.left; boxT = r.top;
        function onMove(ev) {
          panel.style.left = (boxL + ev.clientX - startX) + 'px';
          panel.style.top  = (boxT + ev.clientY - startY) + 'px';
        }
        function onUp() {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    }());
    /* resize grip */
    (function() {
      var panel = document.getElementById('backup-panel');
      var grip = document.getElementById('backup-grip');
      grip.addEventListener('mousedown', function(e) {
        e.preventDefault(); e.stopPropagation();
        var r = panel.getBoundingClientRect();
        panel.style.transform = 'none';
        panel.style.left = r.left + 'px'; panel.style.top = r.top + 'px';
        var sX = e.clientX, sY = e.clientY, sW = r.width, sH = r.height;
        var sL = r.left, sT = r.top;
        function onMove(ev) {
          var nW = Math.max(420, sW + ev.clientX - sX);
          var nH = Math.max(260, sH + ev.clientY - sY);
          panel.style.width  = nW + 'px';
          panel.style.height = nH + 'px';
          panel.style.left   = (sL - (nW - sW) / 2) + 'px';
          panel.style.top    = (sT - (nH - sH) / 2) + 'px';
        }
        function onUp() {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    }());
  }
  document.getElementById('backup-panel').classList.add('visible');
  document.body.style.overflow = 'hidden';
  fetchRetention();
  fetchBackups();
}

var _retSavedVal = 50;

function fetchRetention() {
  apiFetch('/backup-settings').then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }).then(function(data) {
    var inp = document.getElementById('backup-retention');
    var v = data.max_versions || 50;
    _retSavedVal = v;
    if (inp) { inp.value = v; inp.style.color = '#4caf50'; }
  }).catch(function() {
    var inp = document.getElementById('backup-retention');
    _retSavedVal = 50;
    if (inp) { inp.value = 50; inp.style.color = '#4caf50'; }
  });
}

function stepRetention(dir) {
  var inp = document.getElementById('backup-retention');
  if (!inp) return;
  var val = parseInt(inp.value, 10) || 1;
  val = Math.max(1, val + dir);
  inp.value = val;
  markRetentionDirty();
}

function markRetentionDirty() {
  var inp = document.getElementById('backup-retention');
  if (!inp) return;
  var cur = parseInt(inp.value, 10);
  inp.style.color = (cur === _retSavedVal) ? '#4caf50' : '#ff9800';
}

function saveRetention() {
  var inp = document.getElementById('backup-retention');
  var msg = document.getElementById('backup-retention-msg');
  if (!inp) return;
  var val = parseInt(inp.value, 10);
  if (isNaN(val) || val < 1) { inp.value = 1; val = 1; }
  apiFetch('/backup-settings', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ max_versions: val })
  }).then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }).then(function(data) {
    _retSavedVal = data.max_versions;
    inp.value = data.max_versions;
    inp.style.color = '#4caf50';
    if (msg) { msg.textContent = 'Saved'; msg.style.color = '#4caf50'; }
    setTimeout(function() { if (msg) msg.textContent = ''; }, 2000);
  }).catch(function(e) {
    if (msg) { msg.textContent = 'Error: ' + e.message; msg.style.color = '#f44336'; }
  });
}

function fetchBackups() {
  apiFetch('/backups').then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }).then(function(data) {
    var container = document.getElementById('backup-content');
    if (!container) return;
    var backups = data.backups || [];
    if (backups.length === 0) {
      container.className = 'backup-empty';
      container.textContent = 'No backups available.';
      return;
    }
    container.className = 'backup-list';
    var html = '';
    backups.forEach(function(b) {
      html += '\x3Cdiv class="backup-instance">';
      html += '\x3Cdiv class="backup-instance-name">' + esc(b.name);
      if (b.currently_exists) html += ' \x3Cspan class="badge-exists">active\x3C/span>';
      html += '\x3C/div>';
      b.timestamps.forEach(function(ts) {
        var canRestore = !b.currently_exists;
        html += '\x3Cdiv class="backup-ts-row">';
        html += '\x3Cspan class="ts">' + esc(ts) + '\x3C/span>';
        if (canRestore) {
          html += '\x3Cbutton class="btn-restore" data-restore-name="' + esc(b.name) + '" data-restore-ts="' + esc(ts) + '">Restore\x3C/button>';
        }
        html += '\x3Cbutton class="btn-del-backup" data-del-name="' + esc(b.name) + '" data-del-ts="' + esc(ts) + '">\u2716\x3C/button>';
        html += '\x3C/div>';
      });
      html += '\x3C/div>';
    });
    container.innerHTML = html;
    /* event delegation */
    container.onclick = function(e) {
      var btn = e.target.closest('[data-restore-name]');
      if (btn) { doRestore(btn.dataset.restoreName, btn.dataset.restoreTs); return; }
      btn = e.target.closest('[data-del-name]');
      if (btn) { doDeleteBackup(btn.dataset.delName, btn.dataset.delTs); return; }
    };
  }).catch(function(e) {
    var container = document.getElementById('backup-content');
    if (container) { container.className = 'backup-empty'; container.textContent = 'Error: ' + e.message; }
  });
}

function doRestore(name, ts) {
  var url = '/restore/' + encodeURIComponent(name) + '/' + encodeURIComponent(ts);
  apiFetch(url, { method: 'POST' }).then(function(res) {
    if (res.status === 409) {
      return res.json().then(function(d) { throw new Error(d.detail); });
    }
    if (!res.ok) {
      return res.json().then(function(d) { throw new Error(d.detail || 'HTTP ' + res.status); });
    }
    return res.json();
  }).then(function(data) {
    toast(name + ' restored from ' + ts, 'ok');
    closeModal();
    loadInstances();
  }).catch(function(e) {
    toast('Restore failed: ' + e.message, 'err');
  });
}

function doDeleteBackup(name, ts) {
  var url = '/backups/' + encodeURIComponent(name) + '/' + encodeURIComponent(ts);
  apiFetch(url, { method: 'DELETE' }).then(function(res) {
    if (!res.ok) {
      return res.json().then(function(d) { throw new Error(d.detail || 'HTTP ' + res.status); });
    }
    return res.json();
  }).then(function() {
    toast('Backup ' + name + '/' + ts + ' deleted', 'ok');
    fetchBackups(); /* refresh list */
  }).catch(function(e) {
    toast('Delete backup failed: ' + e.message, 'err');
  });
}

/* ─── Toast ───────────────────────────────────────────────── */
var toastTimer = null;
function toast(msg, type) {
  fetch('/api/notify_log', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
    body: JSON.stringify({ msg: msg, level: type || 'info' })
  }).catch(function() {});
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast-' + (type || 'info');
  el.style.display = 'block';
  el.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() {
    el.style.opacity = '0';
    setTimeout(function() { el.style.display = 'none'; }, 300);
  }, 8000);
}

/* ─── Banner ──────────────────────────────────────────────── */
function setBanner(state) {
  var el = document.getElementById('conn-banner');
  el.className = 'conn-' + state;
  if (state === 'ok') el.style.display = 'none';
  else el.style.display = 'block';
}

/* ─── Event binding ───────────────────────────────────────── */
document.getElementById('f-search').oninput = function(e) {
  filterSearch = e.target.value;
  render();
};
document.getElementById('f-status').onchange = function(e) {
  filterStatus = e.target.value;
  render();
};

/* Event delegation for table buttons (survives DOM diff) */
document.getElementById('tbody').addEventListener('click', function(e) {
  var btn = e.target.closest('[data-edit]');
  if (btn) { editInstance(btn.dataset.edit); return; }
  btn = e.target.closest('[data-delete]');
  if (btn) { confirmDelete(btn.dataset.delete); return; }
});

document.getElementById('tbody').addEventListener('dblclick', function(e) {
  if (e.target.closest('[data-edit],[data-delete]')) return;
  var tr = e.target.closest('tr[data-key]');
  if (tr) editInstance(tr.dataset.key);
});

/* ─── Auto-refresh via WebSocket ──────────────────────────── */
loadInstances();  /* initial REST fetch for immediate data */
connectWS();      /* then switch to real-time WebSocket */
