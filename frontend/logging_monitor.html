<style>
/* ─── Design tokens ──────────────────────────────────────── */
:root {
  --bg: #0e1117;
  --bg2: #1a1d24;
  --bg3: #262730;
  --border: #333640;
  --text: #fafafa;
  --text-dim: #a0a4ab;
  --accent: #4da6ff;
  --blue: #1f77ff;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
  --fs-xs: 11px; --fs-sm: 13px; --fs-base: 14px;
  --fs-md: 15px; --fs-lg: 18px; --fs-xl: 24px;
  --sp-xs: 4px; --sp-sm: 8px; --sp-md: 12px; --sp-lg: 20px;
  --input-h: 32px; --btn-h: 32px;

/* ─── Reset & Base ───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #0e1117; color: #fafafa; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; font-size: var(--fs-base); line-height: 1.5; display: flex; flex-direction: column; }

/* ─── Page body ──────────────────────────────────────────── */
#page-body {
  display: flex;
  flex: 1;
  min-height: 0;

}

/* ─── Sidebar ────────────────────────────────────────────── */
#sidebar {
  flex-shrink: 0;
  background: #0e1117;
  border-right: 1px solid #333640;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

  padding: 0.5rem 0.6rem 0.3rem;
}

/* ─── Settings panel ─────────────────────────────────────── */
#settings-panel {
  display: none;
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 20px 24px;
}
#settings-panel.visible { display: block; }

.settings-section {
  background: #1a1d24;
  border: 1px solid #333640;
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 20px;
}
.settings-section h3 {
  font-size: var(--fs-md);
  font-weight: 600;
  color: #e2e8f0;

}
.settings-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.settings-row label {
  font-size: var(--fs-sm);
  color: #a0a4ab;

  flex-shrink: 0;
}
.settings-row input[type="number"] {
  width: 90px;

  border: 1px solid #333640;

  border-radius: 4px;

  color: #fafafa;

}
.settings-btn.primary { background: #26a69a; border-color: #26a69a; color: #fff; }
.settings-btn.primary:hover { background: #2bbbad; }
.settings-btn.danger { border-color: rgba(239,68,68,.5); color: #ef4444; }
.settings-btn.danger:hover { background: rgba(239,68,68,.12); border-color: #ef4444; }
.settings-btn:hover:not(.primary):not(.danger) { background: #2d3748; border-color: #4a5568; color: #e2e8f0; }
.settings-msg {
  font-size: var(--fs-sm);
  padding: 4px 8px;

  display: none;
}
.settings-msg.ok { display: inline-block; background: rgba(33,195,84,.15); color: #21c354; }

.per-service-table { width: 100%; border-collapse: collapse; }

<script>
  var TOKEN          = "%%TOKEN%%";
  var ST_BASE        = "%%ST_BASE%%";
  var API_BASE       = "%%API_BASE%%";    // e.g. http://127.0.0.1:8600/api/logging
  var PBGUI_VERSION  = "%%VERSION%%";
  var PBGUI_SERIAL   = "%%SERIAL%%";
</script>
<script src="/app/js/log_viewer_panel.js?v=8"></script>
<script src="/app/pbgui_nav.js?v=%%NAV_HASH%%"></script>

<!-- ═══════════════════════════════════════════════════════════
     Log Viewer + Settings Logic
     ════════════════════════════════════════════════════════ -->
<script>
/* ── Nav config ─────────────────────────────────────────── */
window.PBGUI_NAV_CONFIG = { subtitle: 'Logging', current: 'system_logging', token: TOKEN, stBase: ST_BASE, apiBase: API_BASE, version: PBGUI_VERSION, serial: PBGUI_SERIAL };


/* ── HTTP helpers ────────────────────────────────────────── */
function apiGet(path) {
  return fetch(API_BASE + path, {
    headers: { 'Authorization': 'Bearer ' + TOKEN }
  }).then(function(r) { return r.json(); });
}
function apiPost(path, body) {
  return fetch(API_BASE + path, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }).then(function(r) { return r.json(); });
}

/* ── State ──────────────────────────────────────────────── */
var viewer = null;
var currentFile = '';
var rotatedFiles = {};
var settingsVisible = false;


/* ── Page-level: rotation, purge, init ────────────────── */
function loadRotationData() {
  apiGet('/').then(function(data) {
    rotatedFiles = data.rotated || {};
    onViewerFileChange(currentFile);
  }).catch(function() {});
}

function onViewerFileChange(filename) {
  currentFile = filename;
  var toolbar = document.getElementById('page-toolbar');
  var rotLabel = document.getElementById('rotation-label');
  var rotSel = document.getElementById('rotation-select');
  var purgeBtn = document.getElementById('purge-btn');
  if (!filename) {
    if (toolbar) toolbar.style.display = 'none';
    return;
  }
  var variants = rotatedFiles[filename] || [];
  if (variants.length || true) {
    toolbar.style.display = 'flex';
    purgeBtn.style.display = '';
  }
  if (variants.length) {
    rotSel.innerHTML = '<option value="current">Current</option>';
    for (var i = 0; i < variants.length; i++) {
      var v = variants[i];
      var suffix = v.replace(filename, '');
      var opt = document.createElement('option');
      opt.value = v;
      opt.textContent = suffix.charAt(0) === '.' ? suffix : '.' + suffix;
      rotSel.appendChild(opt);
    }
    rotSel.value = 'current';
    rotLabel.style.display = 'flex';
  } else {
    rotLabel.style.display = 'none';
  }
}

function onRotationChange() {
  var rotSel = document.getElementById('rotation-select');
  if (!rotSel || !viewer) return;
  if (rotSel.value === 'current') {
    viewer.setFile(currentFile);
  } else {
    viewer.fetchFile(rotSel.value);
  }
}

function purgeCurrentFile() {
  if (!currentFile) return;
  if (!confirm('Purge "' + currentFile + '"?\n\nThe file will be rotated (saved as .1) and a new empty file created.')) return;
  apiPost('/purge/' + encodeURIComponent(currentFile), {})
    .then(function(data) {
      if (data.success) {
        loadRotationData();
        if (viewer) viewer.setFile(currentFile);
      } else {
        alert('Purge failed: ' + (data.detail || JSON.stringify(data)));
      }
    })
    .catch(function(err) { alert('Purge error: ' + err); });
}

/* ── Settings panel ──────────────────────────────────────── */
function showView(view) {
  var panel = document.getElementById('settings-panel');
  var logView = document.getElementById('log-view');
  var btnLogs = document.getElementById('btn-logs');
  var btnSettings = document.getElementById('btn-settings');
  if (view === 'settings') {
    settingsVisible = true;
    panel.classList.add('visible');
    logView.style.display = 'none';
    btnLogs.classList.remove('active');
    btnSettings.classList.add('active');
    loadRotationSettings();
  } else {
    settingsVisible = false;
    panel.classList.remove('visible');
    logView.style.display = '';
    btnLogs.classList.add('active');
    btnSettings.classList.remove('active');
  }
}

function loadRotationSettings() {
  var loading = document.getElementById('per-svc-loading');
  if (loading) loading.style.display = 'block';

  apiGet('/rotation').then(function(data) {
    var def = data.default || {};
    document.getElementById('def-max-mb').value       = def.max_mb       || 10;
    document.getElementById('def-backup-count').value = def.backup_count || 1;

    var tbody = document.getElementById('per-svc-body');
    tbody.innerHTML = '';
    var services = Object.keys(data.per_service || {}).sort();
    if (services.length === 0) {
      var tr = document.createElement('tr');
      tr.innerHTML = '<td colspan="5" style="color:#a0a4ab;font-size:var(--fs-sm);padding:8px">No log files found.</td>';
      tbody.appendChild(tr);
    } else {
      services.forEach(function(svc) {
        var s = data.per_service[svc];
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td class="per-svc-name">' + esc(svc) + '</td>' +
          '<td><input class="per-svc-input" type="number" id="svc-mb-' + esc(svc) + '" min="1" max="10240" value="' + (s.max_mb || 10) + '"></td>' +
          '<td><input class="per-svc-input" type="number" id="svc-bc-' + esc(svc) + '" min="1" max="20"   value="' + (s.backup_count || 1) + '"></td>' +
          '<td><button class="per-svc-save" onclick="saveService(\'' + esc(svc) + '\')">Save</button></td>' +
          '<td><span class="per-svc-msg" id="svc-msg-' + esc(svc) + '">✓ Saved</span></td>';
        tbody.appendChild(tr);
      });
    }
    if (loading) loading.style.display = 'none';
  }).catch(function() {
    if (loading) loading.textContent = 'Failed to load settings.';
  });
}

function saveDefault() {
  var maxMb = parseInt(document.getElementById('def-max-mb').value, 10) || 10;
  var bc    = parseInt(document.getElementById('def-backup-count').value, 10) || 1;
  var msg   = document.getElementById('def-msg');
  apiPost('/rotation', { scope: 'default', max_mb: maxMb, backup_count: bc })
    .then(function(data) {
      if (data.success) {
        msg.textContent = '✓ Saved'; msg.className = 'settings-msg ok';
        setTimeout(function() { msg.className = 'settings-msg'; }, 2500);
      } else {
        msg.textContent = 'Error'; msg.className = 'settings-msg err';
      }
    })
    .catch(function() { msg.textContent = 'Error'; msg.className = 'settings-msg err'; });
}

function saveService(svc) {
  var maxMb = parseInt(document.getElementById('svc-mb-' + svc).value, 10) || 10;
  var bc    = parseInt(document.getElementById('svc-bc-' + svc).value, 10) || 1;
  var msgEl = document.getElementById('svc-msg-' + svc);
  apiPost('/rotation', { scope: svc, max_mb: maxMb, backup_count: bc })
    .then(function(data) {
      if (data.success) {
        msgEl.classList.add('visible');
        setTimeout(function() { msgEl.classList.remove('visible'); }, 2000);
      }
    });
}

/* ── Init ────────────────────────────────────────────────── */
function wsBase() {
  var proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  return proto + '//' + window.location.host;
}

viewer = new LogViewerPanel({
  containerId: 'log-viewer-target',
  wsBase: wsBase(),
  token: TOKEN,
  defaultHost: 'local',
  presets: 'system',
  showRestart: true,
  height: '100%',
  onFileChange: onViewerFileChange
});
viewer.open();
loadRotationData();
window.PBGuiSidebarResize.init({ sidebarId: 'sidebar', handleId: 'sidebar-resize', minWidth: 140, maxWidth: 300 });
</script>

<!-- ── Help overlay JS ── -->
<script>
(function () {
  var helpOvl       = document.getElementById('help-ovl');
  var helpContent   = document.getElementById('help-content');
  var helpTocList   = document.getElementById('help-toc-list');
  var helpFilter    = document.getElementById('help-toc-filter');
  var helpLangEN    = document.getElementById('help-lang-en');
  var helpLangDE    = document.getElementById('help-lang-de');
  var helpDragHandle = document.getElementById('help-drag-handle');
  var helpSearch      = document.getElementById('help-search');
  var helpSearchUp    = document.getElementById('help-search-up');
  var helpSearchDn    = document.getElementById('help-search-dn');
  var helpSearchCount = document.getElementById('help-search-count');
  var helpSearchGlobal = document.getElementById('help-search-global');

  var helpLang = 'EN';
  var helpTopics = [];
  var helpSel = 0;
  var _sMarks = [], _sIdx = -1, _sTimer = null, _rawHtml = null;
  var _topicCache = {}, _globalMode = false;

  /* Docs base: strip /logging from API_BASE → /api */
  var docsBase = API_BASE.replace(/\/logging$/, '');

  function mdToHtml(md) {
    var lines = md.split('\n'), html = '', inPre = false, preBuf = '', inUl = false, inOl = false;
    function flushList() { if (inUl) { html += '</ul>'; inUl = false; } if (inOl) { html += '</ol>'; inOl = false; } }
    function inlineFormat(t) {
      t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
      t = t.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
      t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
      t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      t = t.replace(/__(.+?)__/g, '<strong>$1</strong>');
      t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
      return t;
    }
    for (var i = 0; i < lines.length; i++) {
      var l = lines[i];
      if (l.match(/^```/)) { if (!inPre) { flushList(); inPre = true; preBuf = ''; } else { html += '<pre><code>' + preBuf.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</code></pre>'; inPre = false; } continue; }
      if (inPre) { preBuf += (preBuf ? '\n' : '') + l; continue; }
      if (l.match(/^---+$/)) { flushList(); html += '<hr>'; continue; }
      var hm = l.match(/^(#{1,6})\s+(.*)/); if (hm) { flushList(); html += '<h' + hm[1].length + '>' + inlineFormat(hm[2]) + '</h' + hm[1].length + '>'; continue; }
      if (l.match(/^>\s?/)) { flushList(); html += '<blockquote>' + inlineFormat(l.replace(/^>\s?/, '')) + '</blockquote>'; continue; }
      var ulm = l.match(/^[\-\*]\s+(.*)/); if (ulm) { if (!inUl) { if (inOl) { html += '</ol>'; inOl = false; } html += '<ul>'; inUl = true; } html += '<li>' + inlineFormat(ulm[1]) + '</li>'; continue; }
      var olm = l.match(/^\d+\.\s+(.*)/); if (olm) { if (!inOl) { if (inUl) { html += '</ul>'; inUl = false; } html += '<ol>'; inOl = true; } html += '<li>' + inlineFormat(olm[1]) + '</li>'; continue; }
      if (l.trim() === '') { flushList(); html += '<p></p>'; continue; }
      flushList(); html += '<p>' + inlineFormat(l) + '</p>';
    }
    flushList(); return html;
  }

  function _clearSearch() { if (_rawHtml !== null) helpContent.innerHTML = _rawHtml; _sMarks = []; _sIdx = -1; helpSearchCount.textContent = ''; }
  function _applySearch(term) {
    if (_rawHtml === null || !term) { _clearSearch(); return; }
    var re; try { re = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'); } catch(e) { return; }
    helpContent.innerHTML = _rawHtml.replace(/(<[^>]+>)|([^<]+)/g, function(_, tag, text) {
      if (tag) return tag;
      return text.replace(re, function(_, m) { return '<mark>' + m + '</mark>'; });
    });
    _sMarks = Array.from(helpContent.querySelectorAll('mark'));
    if (_sMarks.length > 0) _gotoMark(0); else _updateSCount();
  }
  function _updateSCount() { helpSearchCount.textContent = _sMarks.length ? (_sIdx + 1) + '/' + _sMarks.length : (helpSearch.value.trim() ? '0 found' : ''); }
  function _gotoMark(idx) {
    if (!_sMarks.length) return;
    if (_sIdx >= 0 && _sIdx < _sMarks.length) _sMarks[_sIdx].classList.remove('current');
    _sIdx = ((idx % _sMarks.length) + _sMarks.length) % _sMarks.length;
    _sMarks[_sIdx].classList.add('current');
    _sMarks[_sIdx].scrollIntoView({ block: 'center', behavior: 'smooth' });
    _updateSCount();
  }
  function _ensureTopicCached(idx, cb) {
    if (_topicCache[idx] !== undefined) { cb(_topicCache[idx]); return; }
    var t = helpTopics[idx]; if (!t) { cb(''); return; }
    fetch(docsBase + '/docs/content?file=' + encodeURIComponent(t.file) + '&lang=' + helpLang + '&token=' + TOKEN)
      .then(function(r) { return r.json(); })
      .then(function(d) { _topicCache[idx] = mdToHtml(d.content || ''); cb(_topicCache[idx]); })
      .catch(function() { _topicCache[idx] = ''; cb(''); });
  }
  function _showGlobalResults(term) {
    if (!term) { helpContent.innerHTML = '<p style="color:#64748b;padding:8px 0;">Type a search term to find across all topics.</p>'; helpSearchCount.textContent = ''; return; }
    var re; try { re = new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'); } catch(e) { return; }
    helpContent.innerHTML = '<div class="help-loading">Searching\u2026</div>';
    var pending = helpTopics.length;
    if (pending === 0) { helpContent.innerHTML = ''; helpSearchCount.textContent = '0 found'; return; }
    var allResults = [];
    helpTopics.forEach(function(t, idx) {
      _ensureTopicCached(idx, function(html) {
        var text = html.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ');
        var matchIdxs = [], m; re.lastIndex = 0;
        while ((m = re.exec(text)) !== null) { matchIdxs.push(m.index); if (matchIdxs.length >= 3) break; }
        if (matchIdxs.length > 0) {
          var snippets = matchIdxs.map(function(mi) { return text.slice(Math.max(0, mi - 55), Math.min(text.length, mi + 80)); });
          allResults.push({ idx: idx, title: t.title, snippets: snippets });
        }
        if (--pending === 0) _renderGlobalResults(term, allResults);
      });
    });
  }
  function _renderGlobalResults(term, results) {
    var re; try { re = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'); } catch(e) { return; }
    helpSearchCount.textContent = results.length + (results.length === 1 ? ' topic' : ' topics');
    if (results.length === 0) { helpContent.innerHTML = '<p style="color:#64748b;padding:8px 0;">No results found.</p>'; return; }
    var html = '<div class="gs-results">';
    results.forEach(function(r) {
      html += '<div class="gs-item" data-idx="' + r.idx + '"><div class="gs-topic">' + r.title + '</div>';
      r.snippets.forEach(function(s) { html += '<div class="gs-snip">\u2026' + s.replace(re, function(_, m) { return '<mark>' + m + '</mark>'; }) + '\u2026</div>'; });
      html += '</div>';
    });
    helpContent.innerHTML = html + '</div>';
    helpContent.querySelectorAll('.gs-item').forEach(function(el) {
      el.addEventListener('click', function() { var idx = parseInt(el.getAttribute('data-idx'), 10); helpSearchGlobal.checked = false; _globalMode = false; helpSearch.placeholder = 'Search in topic\u2026'; loadTopic(idx); });
    });
  }
  helpSearch.addEventListener('input', function() { if (_sTimer) clearTimeout(_sTimer); _sTimer = setTimeout(function() { var term = helpSearch.value.trim(); if (_globalMode) _showGlobalResults(term); else _applySearch(term); }, 260); });
  helpSearch.addEventListener('keydown', function(e) { if (e.key === 'Enter' && !_globalMode) { e.preventDefault(); _gotoMark(_sIdx + (e.shiftKey ? -1 : 1)); } if (e.key === 'Escape') { helpSearch.value = ''; if (_globalMode) _showGlobalResults(''); else _clearSearch(); } });
  helpSearchUp.addEventListener('click', function() { _gotoMark(_sIdx - 1); });
  helpSearchDn.addEventListener('click', function() { _gotoMark(_sIdx + 1); });
  helpSearchGlobal.addEventListener('change', function() {
    _globalMode = helpSearchGlobal.checked;
    helpSearch.placeholder = _globalMode ? 'Search all topics\u2026' : 'Search in topic\u2026';
    var term = helpSearch.value.trim();
    if (_globalMode) { _showGlobalResults(term); } else { if (_rawHtml !== null) { helpContent.innerHTML = _rawHtml; _sMarks = []; _sIdx = -1; helpSearchCount.textContent = ''; } if (term) _applySearch(term); }
  });

  function renderToc() {
    var flt = helpFilter.value.trim().toLowerCase();
    helpTocList.innerHTML = '';
    helpTopics.forEach(function(t, idx) {
      if (flt && t.title.toLowerCase().indexOf(flt) === -1) return;
      var el = document.createElement('div');
      el.className = 'toc-item' + (idx === helpSel ? ' active' : '');
      el.textContent = t.title;
      el.addEventListener('click', function() { loadTopic(idx); });
      helpTocList.appendChild(el);
    });
  }
  function loadTopic(idx) {
    helpSel = idx; renderToc();
    var t = helpTopics[idx]; if (!t) return;
    _rawHtml = null; _sMarks = []; _sIdx = -1; helpSearchCount.textContent = '';
    helpContent.innerHTML = '<div class="help-loading">Loading...</div>';
    fetch(docsBase + '/docs/content?file=' + encodeURIComponent(t.file) + '&lang=' + helpLang + '&token=' + TOKEN)
      .then(function(r) { return r.json(); })
      .then(function(d) { _rawHtml = mdToHtml(d.content || ''); _topicCache[idx] = _rawHtml; helpContent.innerHTML = _rawHtml; helpContent.scrollTop = 0; var st = helpSearch.value.trim(); if (st) _applySearch(st); })
      .catch(function() { helpContent.innerHTML = '<div class="help-loading">Failed to load content.</div>'; });
  }
  function loadHelpIndex(keyword) {
    helpTocList.innerHTML = '<div class="help-loading">Loading...</div>';
    fetch(docsBase + '/docs/index?lang=' + helpLang + '&token=' + TOKEN)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        helpTopics = data || []; renderToc();
        if (helpTopics.length > 0) {
          var startIdx = 0;
          if (keyword) { var kw = keyword.toLowerCase(); for (var i = 0; i < helpTopics.length; i++) { if (helpTopics[i].title.toLowerCase().indexOf(kw) !== -1 || (helpTopics[i].file && helpTopics[i].file.toLowerCase().indexOf(kw) !== -1)) { startIdx = i; break; } } }
          loadTopic(startIdx);
        }
      })
      .catch(function() { helpTocList.innerHTML = '<div class="help-loading">Failed to load topics.</div>'; });
  }
  helpFilter.addEventListener('input', renderToc);
  helpLangEN.addEventListener('click', function() { if (helpLang === 'EN') return; helpLang = 'EN'; helpLangEN.classList.add('active'); helpLangDE.classList.remove('active'); _topicCache = {}; helpSel = 0; loadHelpIndex('logging'); });
  helpLangDE.addEventListener('click', function() { if (helpLang === 'DE') return; helpLang = 'DE'; helpLangDE.classList.add('active'); helpLangEN.classList.remove('active'); _topicCache = {}; helpSel = 0; loadHelpIndex('logging'); });
  document.getElementById('help-close').addEventListener('click', function() { helpOvl.classList.remove('visible'); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') helpOvl.classList.remove('visible'); });
  (function() {
    var startX, startY, boxL, boxT;
    helpDragHandle.addEventListener('mousedown', function(e) {
      e.preventDefault(); var r = helpOvl.getBoundingClientRect(); helpOvl.style.transform = 'none';
      helpOvl.style.left = r.left + 'px'; helpOvl.style.top = r.top + 'px'; startX = e.clientX; startY = e.clientY; boxL = r.left; boxT = r.top;
      function onMove(ev) { helpOvl.style.left = (boxL + ev.clientX - startX) + 'px'; helpOvl.style.top = (boxT + ev.clientY - startY) + 'px'; }
      function onUp() { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); }
      document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
    });
  }());
  window._openLoggingHelp = function() {
    helpOvl.classList.add('visible');
    if (helpTopics.length === 0) { loadHelpIndex('logging'); return; }
    for (var i = 0; i < helpTopics.length; i++) {
      if (helpTopics[i].title.toLowerCase().indexOf('logging') !== -1 || (helpTopics[i].file && helpTopics[i].file.toLowerCase().indexOf('logging') !== -1)) { loadTopic(i); return; }
    }
    loadTopic(0);
  };
  window.PBGUI_HELP_OPENER = window._openLoggingHelp;
}());
</script>
</body>
