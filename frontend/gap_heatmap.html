<!-- Gap / Coverage Heatmap — embedded via st.html(unsafe_allow_javascript=True)
     This HTML fragment is injected directly into the DOM (NOT iframed).
     All CSS is scoped under .hm-root to avoid Streamlit style conflicts.
     Variables are injected by Python into data-attributes on the root element.
     DOMPurify constraint: ALL '<' in JS string literals must be \x3c -->

<style>
    /* ============================================================
       SCOPED STYLES — all selectors prefixed with .hm-root
       ============================================================ */
    .hm-root {
        --hm-bg-primary:   #1a202c;
        --hm-bg-secondary: #2d3748;
        --hm-bg-tertiary:  #374151;
        --hm-text-primary: #f7fafc;
        --hm-text-secondary: #a0aec0;
        --hm-border:       #4a5568;
        --hm-accent:       #3b82f6;
        --hm-success:      #10b981;
        --hm-warning:      #f59e0b;
        --hm-danger:       #ef4444;

        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        color: var(--hm-text-primary);
        line-height: 1.5;
        margin: 0;
        padding: 0;
    }

    .hm-root * {
        box-sizing: border-box;
    }

    /* ---- header ---- */
    .hm-root .hm-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.5rem 0.75rem;
        background: var(--hm-bg-secondary);
        border: 1px solid var(--hm-border);
        border-radius: 8px;
        margin-bottom: 0.5rem;
        gap: 0.75rem;
        flex-wrap: wrap;
    }

    .hm-root .hm-header-title {
        font-size: 1.1rem;
        font-weight: 600;
        margin: 0;
    }

    .hm-root .hm-header-meta {
        font-size: 0.8rem;
        color: var(--hm-text-secondary);
    }

    .hm-root .hm-ws-indicator {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--hm-text-secondary);
        margin-right: 4px;
        transition: background 0.3s;
    }

    .hm-root .hm-ws-indicator.connected { background: var(--hm-success); }
    .hm-root .hm-ws-indicator.disconnected { background: var(--hm-danger); }
    .hm-root .hm-ws-indicator.reconnecting { background: var(--hm-warning); animation: hm-pulse 1s infinite; }

    @keyframes hm-pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.3; }
    }

    /* ---- controls ---- */
    .hm-root .hm-controls {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-bottom: 0.5rem;
    }

    .hm-root .hm-select {
        background: var(--hm-bg-tertiary);
        color: var(--hm-text-primary);
        border: 1px solid var(--hm-border);
        border-radius: 6px;
        padding: 0.3rem 0.6rem;
        font-size: 0.85rem;
        cursor: pointer;
    }

    .hm-root .hm-label {
        font-size: 0.82rem;
        color: var(--hm-text-secondary);
    }

    .hm-root .hm-checkbox-label {
        display: flex;
        align-items: center;
        gap: 0.3rem;
        font-size: 0.82rem;
        color: var(--hm-text-secondary);
        cursor: pointer;
    }

    .hm-root .hm-btn {
        background: var(--hm-bg-tertiary);
        color: var(--hm-text-primary);
        border: 1px solid var(--hm-border);
        border-radius: 6px;
        padding: 0.3rem 0.7rem;
        font-size: 0.82rem;
        cursor: pointer;
        transition: background 0.15s;
    }

    .hm-root .hm-btn:hover {
        background: var(--hm-accent);
        border-color: var(--hm-accent);
    }

    /* ---- chart areas ---- */
    .hm-root .hm-section {
        background: var(--hm-bg-primary);
        border: 1px solid var(--hm-border);
        border-radius: 8px;
        padding: 0.5rem;
        margin-bottom: 0.5rem;
    }

    .hm-root .hm-section-title {
        font-size: 0.9rem;
        font-weight: 600;
        margin: 0 0 0.4rem 0;
        color: var(--hm-text-secondary);
    }

    .hm-root .hm-chart-div {
        width: 100%;
        min-height: 200px;
    }

    .hm-root .hm-legend {
        font-size: 0.78rem;
        margin-top: 0.3rem;
        line-height: 1.8;
    }

    /* ---- loading / error overlay ---- */
    .hm-root .hm-status-msg {
        padding: 0.5rem;
        font-size: 0.85rem;
        color: var(--hm-text-secondary);
        text-align: center;
    }

    .hm-root .hm-error-msg {
        padding: 0.5rem;
        font-size: 0.85rem;
        color: var(--hm-danger);
    }

    .hm-root .hm-progress-bar {
        width: 100%;
        height: 4px;
        background: var(--hm-bg-tertiary);
        border-radius: 2px;
        margin-top: 0.4rem;
        overflow: hidden;
    }

    .hm-root .hm-progress-bar-fill {
        height: 100%;
        background: var(--hm-accent);
        border-radius: 2px;
        transition: width 0.3s ease;
    }

    .hm-root .hm-progress-bar-indeterminate {
        height: 100%;
        width: 30%;
        background: var(--hm-accent);
        border-radius: 2px;
        animation: hm-slide 1.2s ease-in-out infinite;
    }

    @keyframes hm-slide {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(400%); }
    }

    /* ---- toast ---- */
    .hm-root .hm-toast {
        display: inline-block;
        margin-left: 12px;
        padding: 0.4rem 0.8rem;
        border-radius: 6px;
        font-size: 0.82rem;
        color: #fff;
        vertical-align: middle;
        opacity: 1;
        transition: opacity 0.5s;
    }
    .hm-root .hm-toast.success { background: var(--hm-success); }
    .hm-root .hm-toast.error   { background: var(--hm-danger); }
</style>

<div class="hm-root" id="__HM_ROOT_ID__"
     data-token=""

        </div>

        </div>

</div>

<script>
(function() {
    var ROOT_ID = '__HM_ROOT_ID__';
    var root = document.getElementById(ROOT_ID);
    if (!root) return;

    // ---------------------------------------------------------------- config
    var TOKEN    = root.dataset.token    || '';
    var EXCHANGE = root.dataset.exchange || '';
    var DATASET  = root.dataset.dataset  || '';
    var COIN     = root.dataset.coin     || '';
    var API_BASE = root.dataset.apiBase  || '';   // e.g. http://localhost:8765/api
    // derive origin (scheme + host + port) for WebSocket and static files
    var API_ORIGIN = API_BASE.replace(/\/api$/, '');  // e.g. http://localhost:8765

    // ---------------------------------------------------------------- ids
    // NOTE: suffix already includes the leading underscore (e.g. '_title')
    function $id(suffix) { return document.getElementById(ROOT_ID + suffix); }
    var elTitle      = $id('_title');
    var elMeta       = $id('_meta');
    var elWsDot      = $id('_ws-dot');
    var elWsTxt      = $id('_ws-txt');
    var elOvChart    = $id('_overview-chart');
    var elOvLegend   = $id('_overview-legend');
    var elMoSelect   = $id('_month-select');
    var elMinChart   = $id('_minutes-chart');
    var elMinLegend  = $id('_minutes-legend');
    var elCbHoliday  = $id('_cb-holiday');
    var elCbOos      = $id('_cb-oos');
    var elBtnReload  = $id('_btn-reload');
    var elBtnStopMin = $id('_btn-stop-min');
    var elBtnDlL2book = $id('_btn-dl-l2book');
    var elBtnDlOvMissing = $id('_btn-dl-ov-missing');

    if (elTitle) elTitle.textContent = COIN + ' \u2014 ' + DATASET + ' (' + EXCHANGE + ')';

    // ---------------------------------------------------------------- state
    var infoData      = null;
    var currentMonth  = null;
    var wsSocket      = null;
    var wsReconnectDelay = 2000;
    var wsLastMtime   = 0;
    var wsAlive       = false;
    var minutesAbort  = null;  // AbortController for minutes SSE
    var newestDataDay = null;  // YYYYMMDD — last day with actual l2Book data

    // ---------------------------------------------------------------- auth header
    function authHeaders() {
        return {'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json'};
    }

    // ---------------------------------------------------------------- Plotly loader
    // plotly.min.js is served as a static file from the FastAPI server at
    // {API_ORIGIN}/app/plotly.min.js — avoids any inline HTML-injection issues.
    function waitForPlotly(cb) {
        if (window.Plotly) { cb(); return; }
        if (document.getElementById('hm-plotly-script')) {
            // Already injected but not yet loaded — poll
            var tries = 0;
            var poller = setInterval(function() {
                if (window.Plotly) { clearInterval(poller); cb(); }
                else if (++tries > 100) { clearInterval(poller); }
            }, 100);
            return;
        }
        var s = document.createElement('script');
        s.id  = 'hm-plotly-script';
        s.src = API_ORIGIN + '/app/plotly.min.js';
        s.onload = function() { cb(); };
        s.onerror = function() {
            if (elOvChart) elOvChart.innerHTML =
                '\x3cdiv class="hm-error-msg">\u26a0 Could not load Plotly.js from ' +
                API_ORIGIN + '/app/plotly.min.js\x3c/div>';
        };
        document.head.appendChild(s);
    }

    // ---------------------------------------------------------------- API helpers
    function buildQS(extra) {
        var p = 'exchange=' + encodeURIComponent(EXCHANGE) +
                '&dataset='  + encodeURIComponent(DATASET)  +
                '&coin='     + encodeURIComponent(COIN);
        if (extra) p += '&' + extra;
        return p;
    }

    function apiGet(path, qs, cb, cbErr) {
        var url = API_BASE + path + '?' + qs;
        fetch(url, {method: 'GET', headers: authHeaders()})
            .then(function(r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(cb)
            .catch(function(e) {
                if (cbErr) cbErr(e);
                else console.error('[HeatMap] fetch error', path, e);
            });
    }

    // ---------------------------------------------------------------- render helpers
    var PLOTLY_CONFIG = {responsive: true, displaylogo: false, toImageButtonOptions: {scale: 2}};

    function renderPlotly(el, figJson) {
        if (!el) return;
        if (!figJson) {
            if (window.Plotly) Plotly.purge(el);
            el.innerHTML = '\x3cdiv class="hm-status-msg">\u2014 No data \u2014\x3c/div>';
            return;
        }
        try {
            var fig = (typeof figJson === 'string') ? JSON.parse(figJson) : figJson;
            // ensure dark background
            if (!fig.layout) fig.layout = {};
            fig.layout.paper_bgcolor = fig.layout.paper_bgcolor || '#1a202c';
            fig.layout.plot_bgcolor  = fig.layout.plot_bgcolor  || '#1a202c';
            fig.layout.font          = fig.layout.font          || {};
            fig.layout.font.color    = fig.layout.font.color    || '#f7fafc';
            // Explicitly clear loading indicators before rendering chart
            el.innerHTML = '';
            Plotly.newPlot(el, fig.data || [], fig.layout || {}, PLOTLY_CONFIG);
        } catch (e) {
            if (window.Plotly) Plotly.purge(el);
            el.innerHTML = '\x3cdiv class="hm-error-msg">\u26a0 Chart render error: ' + e.message + '\x3c/div>';
        }
    }

    function setLoading(el, msg, pct) {
        if (!el) return;
        // Purge Plotly state before clearing innerHTML — otherwise react() fails on next call.
        if (window.Plotly) Plotly.purge(el);
        var bar = '';
        if (typeof pct === 'number' && pct >= 0) {
            bar = '\x3cdiv class="hm-progress-bar">\x3cdiv class="hm-progress-bar-fill" style="width:' + Math.min(pct, 100) + '%">\x3c/div>\x3c/div>';
        } else {
            bar = '\x3cdiv class="hm-progress-bar">\x3cdiv class="hm-progress-bar-indeterminate">\x3c/div>\x3c/div>';
        }
        el.innerHTML = '\x3cdiv class="hm-status-msg">' + msg + bar + '\x3c/div>';
    }

    function setError(el, msg) {
        if (!el) return;
        if (window.Plotly) Plotly.purge(el);
        el.innerHTML = '\x3cdiv class="hm-error-msg">\u26a0 ' + msg + '\x3c/div>';
    }

    // ---------------------------------------------------------------- load info
    function loadInfo(then) {
        apiGet('/heatmap/info', buildQS(), function(data) {
            infoData = data;
            var meta = '';
            if (data.tradfi_type) meta += 'TradFi: ' + data.tradfi_type + ' \u00b7 ';
            if (data.is_candles)  meta += 'candles \u00b7 ';
            meta += data.months ? (data.months.length + ' months') : '';
            if (elMeta) elMeta.textContent = meta;
            // populate month selector
            if (elMoSelect && data.months && data.months.length > 0) {
                while (elMoSelect.options.length > 1) elMoSelect.remove(1);
                var months = data.months.slice().reverse();  // newest first
                months.forEach(function(m) {
                    var opt = document.createElement('option');
                    opt.value = m;
                    opt.textContent = m;
                    elMoSelect.appendChild(opt);
                });
                elMoSelect.disabled = false;
                // pre-select latest (first in reversed list)
                elMoSelect.value = months[0];
                currentMonth = months[0];
                updateDlButton();
            } else if (elMoSelect) {
                elMoSelect.disabled = true;
            }
            if (then) then();
        }, function() {
            if (elMeta) elMeta.textContent = 'Could not load metadata.';
        });
    }

    // ---------------------------------------------------------------- load overview
    function loadOverview() {
        setLoading(elOvChart, 'Loading overview\u2026');
        var url = API_BASE + '/heatmap/overview-stream?' + buildQS();
        fetch(url, {method: 'GET', headers: authHeaders()})
            .then(function(response) {
                if (!response.ok) throw new Error('HTTP ' + response.status);
                var reader = response.body.getReader();
                var decoder = new TextDecoder();
                var buffer = '';
                var evtType = '', evtData = '';

                function pump() {
                    return reader.read().then(function(result) {
                        if (result.done) return;
                        buffer += decoder.decode(result.value, {stream: true});
                        var lines = buffer.split('\n');
                        buffer = lines.pop(); // keep incomplete line in buffer

                        for (var i = 0; i < lines.length; i++) {
                            var line = lines[i];
                            if (line.indexOf('event: ') === 0) {
                                evtType = line.substring(7);
                            } else if (line.indexOf('data: ') === 0) {
                                evtData = line.substring(6);
                            } else if (line === '' && evtData) {
                                try {
                                    var msg = JSON.parse(evtData);
                                    if (evtType === 'progress') {
                                        var txt = msg.msg || 'Loading\u2026';
                                        var pctVal = -1;
                                        if (msg.total > 0) {
                                            pctVal = Math.round(msg.current / msg.total * 100);
                                            txt += ' (' + msg.current.toLocaleString() + '/' + msg.total.toLocaleString() + ' files \u2014 ' + pctVal + '%)';
                                        }
                                        setLoading(elOvChart, txt, pctVal >= 0 ? pctVal : undefined);
                                    } else if (evtType === 'result') {
                                        if (msg.error && !msg.figure) {
                                            setError(elOvChart, msg.error);
                                        } else {
                                            renderPlotly(elOvChart, msg.figure);
                                            if (elOvLegend) elOvLegend.innerHTML = msg.legend_html || '';
                                            newestDataDay = msg.newest_data_day || null;
                                            updateOvDlButton();
                                        }
                                    }
                                } catch(e) {}
                                evtType = '';
                                evtData = '';
                            }
                        }
                        return pump();
                    });
                }
                return pump();
            })
            .catch(function(e) {
                // Fallback: if SSE endpoint fails, try regular overview
                apiGet('/heatmap/overview', buildQS(), function(data) {
                    if (data.error && !data.figure) {
                        setError(elOvChart, data.error);
                        return;
                    }
                    renderPlotly(elOvChart, data.figure);
                    if (elOvLegend) elOvLegend.innerHTML = data.legend_html || '';
                    newestDataDay = data.newest_data_day || null;
                    updateOvDlButton();
                }, function(e2) {
                    setError(elOvChart, e2.message || e.message);
                });
            });
    }

    // ---------------------------------------------------------------- load minutes (SSE with progress + abort)
    function showStopBtn(show) {
        if (elBtnStopMin) elBtnStopMin.style.display = show ? 'inline-block' : 'none';
    }

    function abortMinutes() {
        if (minutesAbort) { minutesAbort.abort(); minutesAbort = null; }
        showStopBtn(false);
    }

    function loadMinutes(month, showHoliday, showOos) {
        if (!month) return;
        abortMinutes();
        setLoading(elMinChart, 'Loading minute detail for ' + month + '\u2026');
        showStopBtn(true);

        minutesAbort = new AbortController();
        var extra = 'month=' + encodeURIComponent(month) +
                    '&show_holiday=' + (showHoliday ? 'true' : 'false') +
                    '&show_oos='     + (showOos     ? 'true' : 'false');
        var url = API_BASE + '/heatmap/minutes-stream?' + buildQS(extra);

        fetch(url, {method: 'GET', headers: authHeaders(), signal: minutesAbort.signal})
            .then(function(response) {
                if (!response.ok) throw new Error('HTTP ' + response.status);
                var reader = response.body.getReader();
                var decoder = new TextDecoder();
                var buffer = '';
                var evtType = '', evtData = '';

                function pump() {
                    return reader.read().then(function(result) {
                        if (result.done) { showStopBtn(false); return; }
                        buffer += decoder.decode(result.value, {stream: true});
                        var lines = buffer.split('\n');
                        buffer = lines.pop();

                        for (var i = 0; i < lines.length; i++) {
                            var line = lines[i];
                            if (line.indexOf('event: ') === 0) {
                                evtType = line.substring(7);
                            } else if (line.indexOf('data: ') === 0) {
                                evtData = line.substring(6);
                            } else if (line === '' && evtData) {
                                try {
                                    var msg = JSON.parse(evtData);
                                    if (evtType === 'progress') {
                                        var txt = msg.msg || 'Loading\u2026';
                                        var pctVal = -1;
                                        if (msg.total > 0) {
                                            pctVal = Math.round(msg.current / msg.total * 100);
                                            txt += ' (' + msg.current + '/' + msg.total + ' files \u2014 ' + pctVal + '%)';
                                        }
                                        setLoading(elMinChart, txt, pctVal >= 0 ? pctVal : undefined);
                                    } else if (evtType === 'result') {
                                        showStopBtn(false);
                                        minutesAbort = null;
                                        if (msg.error && !msg.figure) {
                                            setError(elMinChart, msg.error);
                                        } else {
                                            renderPlotly(elMinChart, msg.figure);
                                            if (elMinLegend) elMinLegend.innerHTML = msg.legend_html || '';
                                        }
                                    }
                                } catch(e) {}
                                evtType = '';
                                evtData = '';
                            }
                        }
                        return pump();
                    });
                }
                return pump();
            })
            .catch(function(e) {
                showStopBtn(false);
                minutesAbort = null;
                if (e.name === 'AbortError') {
                    if (elMinChart) elMinChart.innerHTML = '\x3cdiv class="hm-status-msg">Cancelled.\x3c/div>';
                    return;
                }
                // Fallback: try regular /minutes endpoint
                apiGet('/heatmap/minutes', buildQS(extra), function(data) {
                    if (data.error && !data.figure) {
                        if (elMinChart) elMinChart.innerHTML = '\x3cdiv class="hm-error-msg">\u26a0 ' + data.error + '\x3c/div>';
                        return;
                    }
                    renderPlotly(elMinChart, data.figure);
                    if (elMinLegend) elMinLegend.innerHTML = data.legend_html || '';
                }, function(e2) {
                    if (elMinChart) elMinChart.innerHTML = '\x3cdiv class="hm-error-msg">\u26a0 ' + (e2.message || e.message) + '\x3c/div>';
                });
            });
    }

    // ---------------------------------------------------------------- reload all
    function reloadAll() {
        loadOverview();
        if (currentMonth) {
            loadMinutes(
                currentMonth,
                elCbHoliday ? elCbHoliday.checked : false,
                elCbOos     ? elCbOos.checked     : true
            );
        }
    }

    // ---------------------------------------------------------------- event listeners
    if (elMoSelect) {
        elMoSelect.addEventListener('change', function() {
            currentMonth = elMoSelect.value || null;
            updateDlButton();
            loadMinutes(
                currentMonth,
                elCbHoliday ? elCbHoliday.checked : false,
                elCbOos     ? elCbOos.checked     : true
            );
        });
    }

    function onCheckboxChange() {
        if (currentMonth) {
            loadMinutes(
                currentMonth,
                elCbHoliday ? elCbHoliday.checked : false,
                elCbOos     ? elCbOos.checked     : true
            );
        }
    }

    if (elCbHoliday) elCbHoliday.addEventListener('change', onCheckboxChange);
    if (elCbOos)     elCbOos.addEventListener('change',     onCheckboxChange);

    if (elBtnReload) {
        elBtnReload.addEventListener('click', function() {
            loadInfo(reloadAll);
        });
    }

    if (elBtnStopMin) {
        elBtnStopMin.addEventListener('click', function() {
            abortMinutes();
            if (elMinChart) elMinChart.innerHTML = '\x3cdiv class="hm-status-msg">Cancelled.\x3c/div>';
        });
    }

    // ---------------------------------------------------------------- toast helper
    function showToast(msg, cls) {
        var t = document.createElement('span');
        t.className = 'hm-toast ' + (cls || 'success');
        t.textContent = msg;
        // Insert next to the download button so it's always visible
        if (elBtnDlL2book && elBtnDlL2book.parentNode) {
            elBtnDlL2book.parentNode.appendChild(t);
        } else {
            root.appendChild(t);
        }
        setTimeout(function() { t.style.opacity = '0'; }, 5000);
        setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 5500);
    }

    // ---------------------------------------------------------------- download l2Book (overview — missing tail)
    function updateOvDlButton() {
        if (!elBtnDlOvMissing) return;
        var isL2 = DATASET.toLowerCase().indexOf('l2book') >= 0;
        // Show only if l2Book and there is a gap (newestDataDay is in the past)
        var today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
        var hasGap = isL2 && newestDataDay && newestDataDay < today;
        elBtnDlOvMissing.style.display = hasGap ? 'inline-block' : 'none';
    }

    if (elBtnDlOvMissing) {
        elBtnDlOvMissing.addEventListener('click', function() {
            if (!newestDataDay) return;
            var today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
            // Start one day after newest data
            var sd = newestDataDay;
            // Increment day by 1
            var dt = new Date(sd.substring(0, 4) + '-' + sd.substring(4, 6) + '-' + sd.substring(6, 8));
            dt.setDate(dt.getDate() + 1);
            var y = dt.getFullYear();
            var m = ('0' + (dt.getMonth() + 1)).slice(-2);
            var d = ('0' + dt.getDate()).slice(-2);
            sd = '' + y + m + d;
            if (sd > today) { showToast('No missing days — data is up to date', 'success'); return; }

            elBtnDlOvMissing.disabled = true;
            elBtnDlOvMissing.textContent = 'Queueing\u2026';
            var url = API_BASE + '/heatmap/queue-l2book-download?exchange=' +
                      encodeURIComponent(EXCHANGE) +
                      '&coin=' + encodeURIComponent(COIN) +
                      '&start_day=' + encodeURIComponent(sd) +
                      '&end_day=' + encodeURIComponent(today);
            fetch(url, {method: 'POST', headers: authHeaders()})
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    elBtnDlOvMissing.disabled = false;
                    elBtnDlOvMissing.textContent = '\u25bc Download missing';
                    if (data.error) {
                        showToast(data.error, 'error');
                    } else {
                        showToast('Queued: ' + data.coin + ' ' + data.start_day + '\u2013' + data.end_day + ' (job ' + data.job_id.substring(0, 12) + '\u2026)', 'success');
                    }
                })
                .catch(function(e) {
                    elBtnDlOvMissing.disabled = false;
                    elBtnDlOvMissing.textContent = '\u25bc Download missing';
                    showToast('Queue failed: ' + e.message, 'error');
                });
        });
    }

    // ---------------------------------------------------------------- download l2Book (month)
    function updateDlButton() {
        if (!elBtnDlL2book) return;
        var isL2 = DATASET.toLowerCase().indexOf('l2book') >= 0;
        elBtnDlL2book.style.display = (isL2 && currentMonth) ? 'inline-block' : 'none';
    }

    if (elBtnDlL2book) {
        elBtnDlL2book.addEventListener('click', function() {
            if (!currentMonth) return;
            elBtnDlL2book.disabled = true;
            elBtnDlL2book.textContent = 'Queueing\u2026';
            var url = API_BASE + '/heatmap/queue-l2book-download?exchange=' +
                      encodeURIComponent(EXCHANGE) +
                      '&coin=' + encodeURIComponent(COIN) +
                      '&month=' + encodeURIComponent(currentMonth);
            fetch(url, {method: 'POST', headers: authHeaders()})
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    elBtnDlL2book.disabled = false;
                    elBtnDlL2book.textContent = '\u25bc Download month';
                    if (data.error) {
                        showToast(data.error, 'error');
                    } else {
                        showToast('Download queued: ' + data.coin + ' ' + data.start_day + '\u2013' + data.end_day + ' (job ' + data.job_id.substring(0, 12) + '\u2026)', 'success');
                    }
                })
                .catch(function(e) {
                    elBtnDlL2book.disabled = false;
                    elBtnDlL2book.textContent = '\u25bc Download month';
                    showToast('Queue failed: ' + e.message, 'error');
                });
        });
    }

    // ---------------------------------------------------------------- WebSocket
    function wsSetState(state) {
        wsAlive = (state === 'connected');
        if (!elWsDot || !elWsTxt) return;
        elWsDot.className = 'hm-ws-indicator ' + state;
        var labels = {connected: 'Live', reconnecting: 'Reconnecting\u2026', disconnected: 'Offline'};
        elWsTxt.textContent = labels[state] || state;
    }

    function wsConnect() {
        if (!TOKEN || !EXCHANGE) return;
        wsSetState('reconnecting');
        var wsBase = API_ORIGIN.replace(/^http/, 'ws');
        var url = wsBase + '/ws/heatmap-watch?token=' + encodeURIComponent(TOKEN) +
                  '&exchange=' + encodeURIComponent(EXCHANGE) +
                  '&dataset='  + encodeURIComponent(DATASET)  +
                  '&coin='     + encodeURIComponent(COIN);
        try {
            wsSocket = new WebSocket(url);
        } catch(e) {
            scheduleReconnect();
            return;
        }

        wsSocket.onopen = function() {
            wsSetState('connected');
            wsReconnectDelay = 2000;
        };

        wsSocket.onmessage = function(evt) {
            try {
                var msg = JSON.parse(evt.data);
                if (msg.type === 'updated') {
                    var newMtime = msg.mtime || 0;
                    if (newMtime > wsLastMtime) {
                        wsLastMtime = newMtime;
                        reloadAll();
                    }
                }
            } catch(e) {}
        };

        wsSocket.onclose = function() {
            wsSetState('disconnected');
            scheduleReconnect();
        };

        wsSocket.onerror = function() {
            wsSetState('disconnected');
        };
    }

    function scheduleReconnect() {
        setTimeout(function() {
            wsConnect();
        }, wsReconnectDelay);
        wsReconnectDelay = Math.min(wsReconnectDelay * 1.5, 30000);
    }

    // ---------------------------------------------------------------- init
    waitForPlotly(function() {
        loadInfo(function() {
            reloadAll();
            wsConnect();
        });
    });

    // Cancel any in-flight minutes SSE when the page is unloaded / Streamlit rerenders
    window.addEventListener('beforeunload', function() { abortMinutes(); });

})();
</script>
