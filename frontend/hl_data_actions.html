<!-- HL Data Actions.
     Two collapsible sections (Download l2Book + Build best 1m OHLCV) with
     inline job monitors via WebSocket. No iframes. All CSS scoped under
     .hlda-root. Config injected via data-attributes on root element.
     All event binding via addEventListener / event delegation.
-->

<style>
    html, body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow-x: hidden;
    }

    html.hlda-embedded,
    body.hlda-embedded {
        overflow: hidden;
    }

    .hlda-root {
        --hlda-bg: #0e1117;
        --hlda-bg2: #161b22;
        --hlda-bg3: #1a1f2e;
        --hlda-border: #262730;
        --hlda-border2: #2d3748;
        --hlda-text: #fafafa;
        --hlda-text2: #b0b8c4;
        --hlda-text3: #8899aa;
        --hlda-text4: #666;
        --hlda-accent: #26a69a;
        --hlda-accent-hover: #2bbbad;
        --hlda-warn: #ffa726;
        --hlda-err: #ff4b4b;
        --hlda-info: #3182ce;
        --hlda-success: #26a69a;
        --fs-xs: 11px;
        --fs-sm: 13px;
        --fs-base: 14px;
        --fs-md: 15px;
        --fs-lg: 18px;
        --fs-xl: 22px;
        --sp-xs: 4px;
        --sp-sm: 8px;
        --sp-md: 12px;
        --sp-lg: 20px;
        --input-h: 32px;
        --btn-h: 32px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        color: var(--hlda-text);
        line-height: 1.6;
        margin: 0;
        padding: 0;
    }
    .hlda-root * { box-sizing: border-box; }
    .hlda-root .hlda-section {
        border: 1px solid var(--hlda-border);
        border-radius: 8px;
        margin-bottom: 12px;
        overflow: visible;
    }
    .hlda-root .hlda-sh {
        display: flex; align-items: center; gap: 8px;
        padding: 10px 14px;
        background: var(--hlda-bg2);
        cursor: pointer; user-select: none;
        font-size: var(--fs-base); font-weight: 500;
        border-radius: 8px;
    }
    .hlda-root .hlda-sh:hover { background: #1c2230; }
    .hlda-root .hlda-arrow {
        font-size: 14px; transition: transform 0.15s; color: var(--hlda-text2);
        display: inline-block;
    }
    .hlda-root .hlda-section.open .hlda-arrow { transform: rotate(90deg); }
    .hlda-root .hlda-sb { display: none; padding: 14px 16px; }
    .hlda-root .hlda-section.open .hlda-sb { display: block; }
    .hlda-root .hlda-section.open .hlda-sh { border-radius: 8px 8px 0 0; }
    .hlda-root .hlda-fs { margin-bottom: 14px; }
    .hlda-root .hlda-lbl {
        display: block; font-size: var(--fs-sm); font-weight: 500;
        color: var(--hlda-text2); margin-bottom: 4px;
    }
    .hlda-root .hlda-cs { position: relative; }
    .hlda-root .hlda-ct {
        background: var(--hlda-bg3); border: 1px solid var(--hlda-border2);
        border-radius: 6px; padding: 8px 12px; color: var(--hlda-text);
        font-size: var(--fs-sm); cursor: pointer; min-height: 38px;
        display: flex; align-items: center; flex-wrap: wrap; gap: 4px;
    }
    .hlda-root .hlda-ct:hover { border-color: #4a5568; }
    .hlda-root .hlda-ct .ph { color: var(--hlda-text4); }
    .hlda-root .hlda-chip {
        display: inline-flex; align-items: center;
        background: #26a69a33; color: var(--hlda-accent);
        border-radius: 4px; padding: 2px 8px; font-size: var(--fs-xs); gap: 4px;
    }
    .hlda-root .hlda-chip .rm { cursor: pointer; font-size: var(--fs-base); line-height: 1; opacity: .7; }
    .hlda-root .hlda-chip .rm:hover { opacity: 1; }
    .hlda-root .hlda-csm { color: var(--hlda-text3); font-size: 12px; }
    .hlda-root .hlda-dd {
        display: none; position: absolute; top: 100%; left: 0; right: 0;
        background: var(--hlda-bg3); border: 1px solid var(--hlda-border2);
        border-radius: 0 0 6px 6px; max-height: 260px; overflow-y: auto; z-index: 100;
    }
    .hlda-root .hlda-dd.open { display: block; }
    .hlda-root .hlda-ddh {
        display: flex; gap: 6px; padding: 6px 8px; border-bottom: 1px solid var(--hlda-border2);
    }
    .hlda-root .hlda-ddh button {
        background: var(--hlda-border2); border: none; color: var(--hlda-text2);
        padding: 3px 10px; border-radius: 4px; font-size: var(--fs-xs); cursor: pointer;
    }
    .hlda-root .hlda-ddh button:hover { background: #4a5568; color: var(--hlda-text); }
    .hlda-root .hlda-dds {
        width: 100%; background: var(--hlda-bg); border: none;
        border-bottom: 1px solid var(--hlda-border2);
        color: var(--hlda-text); padding: 6px 8px; font-size: 13px; outline: none;
    }
    .hlda-root .hlda-co {
        padding: 5px 10px; cursor: pointer; font-size: var(--fs-sm);
        display: flex; align-items: center; gap: 6px;
    }
    .hlda-root .hlda-co:hover { background: var(--hlda-border2); }
    .hlda-root .hlda-co input[type="checkbox"] { accent-color: var(--hlda-accent); width: 14px; height: 14px; }
    .hlda-root .hlda-dr { display: flex; gap: 12px; }
    .hlda-root .hlda-dr .hlda-fs { flex: 1; }
    .hlda-root input[type="date"] {
        background: var(--hlda-bg3); border: 1px solid var(--hlda-border2);
        border-radius: 6px; padding: 8px 12px; color: var(--hlda-text);
        font-size: var(--fs-sm); width: 100%;
    }
    .hlda-root input[type="date"]:hover { border-color: #4a5568; }
    .hlda-root input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); }
    .hlda-root .hlda-hint { font-size: 11px; color: var(--hlda-text4); margin-top: 2px; }
    .hlda-root .hlda-date-wrap { position: relative; }
    .hlda-root .hlda-date-input {
        background: var(--hlda-bg3); border: 1px solid var(--hlda-border2);
        border-radius: 6px; padding: 8px 30px 8px 12px; color: var(--hlda-text);
        font-size: var(--fs-sm); width: 100%; height: 38px;
    }
    .hlda-root .hlda-date-input:hover { border-color: #4a5568; }
    .hlda-root .hlda-date-btn {
        position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
        background: transparent; border: none; color: var(--hlda-text2);
        font-size: var(--fs-sm); line-height: 1; cursor: pointer; padding: 2px 4px;
    }
    .hlda-root .hlda-date-btn:hover { color: var(--hlda-text); }
    .hlda-root .hlda-picker-toolbar {
        display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        margin-top: 10px;
    }
    .hlda-root .hlda-picker-filter-wrap {
        flex: 1 1 280px; min-width: 220px;
    }
    .hlda-root .hlda-filter-input {
        width: 100%; background: var(--hlda-bg3); border: 1px solid var(--hlda-border2);
        border-radius: 6px; color: var(--hlda-text); padding: 8px 12px; font-size: var(--fs-sm);
        height: 38px;
    }
    .hlda-root .hlda-filter-input:hover { border-color: #4a5568; }
    .hlda-root .hlda-mini-btn {
        background: var(--hlda-border2); border: 1px solid var(--hlda-border2); color: var(--hlda-text2);
        padding: 8px 12px; border-radius: 6px; font-size: var(--fs-sm); cursor: pointer; height: 38px;
    }
    .hlda-root .hlda-mini-btn:hover { background: #4a5568; color: var(--hlda-text); }
    .hlda-root .hlda-mini-btn:disabled { opacity: .5; cursor: not-allowed; }
    .hlda-root .hlda-picker-meta {
        color: var(--hlda-text3); font-size: var(--fs-xs); white-space: nowrap;
    }
    .hlda-root .hlda-coin-grid {
        margin-top: 12px;
        border-top: 1px solid var(--hlda-border);
        padding-top: 12px;
        display: grid;
        grid-template-columns: repeat(8, minmax(0, 1fr));
        gap: 4px;
        align-content: start;
    }
    .hlda-root .hlda-coin-row {
        display: flex; align-items: center; gap: 8px;
        min-height: 34px; padding: 0 8px; border-radius: 8px;
        border: 1px solid transparent; cursor: pointer; min-width: 0;
        color: var(--hlda-text);
    }
    .hlda-root .hlda-coin-row.hlda-coin-btn {
        width: 100%; justify-content: flex-start; background: transparent;
        font: inherit; text-align: left; user-select: none;
    }
    .hlda-root .hlda-coin-row:hover { background: rgba(99, 179, 237, 0.08); }
    .hlda-root .hlda-coin-row.selected {
        border-color: rgba(99, 179, 237, 0.24);
        background: rgba(99, 179, 237, 0.12);
    }
    .hlda-root .hlda-coin-row.hlda-coin-btn:focus-visible {
        outline: 1px solid rgba(99, 179, 237, 0.42);
        outline-offset: 1px;
    }
    .hlda-root .hlda-coin-row input[type="checkbox"] {
        accent-color: var(--hlda-accent); width: 14px; height: 14px; margin: 0; flex-shrink: 0;
    }
    .hlda-root .hlda-coin-name {
        min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        font-size: var(--fs-sm);
    }
    .hlda-root .hlda-coin-empty {
        grid-column: 1 / -1; padding: 12px; color: var(--hlda-text3); font-size: var(--fs-sm);
    }
    .hlda-root .hlda-cb {
        display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
    }
    .hlda-root .hlda-cb input[type="checkbox"] {
        accent-color: var(--hlda-accent); width: 16px; height: 16px;
    }
    .hlda-root .hlda-cb label {
        display: inline; margin-bottom: 0; font-size: var(--fs-sm);
        color: var(--hlda-text); cursor: pointer;
    }
    .hlda-root .hlda-help {
        font-size: 11px; color: var(--hlda-text4);
        margin-top: 2px; margin-left: 24px; margin-bottom: 10px;
    }
    .hlda-root .hlda-btn {
        background: var(--hlda-accent); border: none; color: white;
        padding: 9px 28px; border-radius: 6px; font-size: var(--fs-base);
        font-weight: 500; cursor: pointer; transition: background 0.2s;
    }
    .hlda-root .hlda-btn:hover { background: var(--hlda-accent-hover); }
    .hlda-root .hlda-btn:disabled { background: #4a5568; cursor: not-allowed; opacity: .7; }
    .hlda-root .hlda-ar { display: flex; align-items: center; gap: 14px; }
    .hlda-root .hlda-lo {
        display: none; align-items: center; gap: 8px;
        font-size: var(--fs-sm); color: var(--hlda-text3); margin-top: 8px;
    }
    .hlda-root .hlda-lo.active { display: inline-flex; }
    .hlda-root .hlda-spin {
        width: 16px; height: 16px;
        border: 2px solid var(--hlda-border2); border-top-color: var(--hlda-accent);
        border-radius: 50%; animation: hlda-spin 0.7s linear infinite;
    }
    @keyframes hlda-spin { to { transform: rotate(360deg); } }
    .hlda-root .hlda-msg {
        padding: 8px 12px; border-radius: 6px; font-size: var(--fs-sm);
        margin-top: 10px; display: none;
    }
    .hlda-root .hlda-msg.success { display: block; background: #26a69a22; border: 1px solid #26a69a55; color: var(--hlda-success); }
    .hlda-root .hlda-msg.error   { display: block; background: #ff4b4b22; border: 1px solid #ff4b4b55; color: var(--hlda-err); }
    .hlda-root .hlda-msg.warning { display: block; background: #ffa72622; border: 1px solid #ffa72655; color: var(--hlda-warn); }
    .hlda-root .hlda-nocreds {
        background: #ffa72622; border: 1px solid #ffa72655; color: var(--hlda-warn);
        padding: 10px 14px; border-radius: 6px; font-size: var(--fs-sm);
    }
    .hlda-root .hlda-jm {
        margin-top: 16px; border-top: 1px solid var(--hlda-border);
        padding-top: 12px;
    }
    .hlda-root .hlda-jm-title {
        font-size: var(--fs-sm); font-weight: 600; color: var(--hlda-text2);
        margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
    }
    .hlda-root .hlda-jm-badge {
        font-size: var(--fs-xs); padding: 2px 8px; border-radius: 3px; font-weight: 500;
    }
    .hlda-root .hlda-jm-badge.connected { background: #10b98133; color: #10b981; }
    .hlda-root .hlda-jm-badge.disconnected { background: #ef444433; color: #ef4444; }
    .hlda-root .hlda-tabs { display: flex; gap: 0; margin-bottom: 10px; border-bottom: 1px solid var(--hlda-border); }
    .hlda-root .hlda-tab {
        padding: 6px 16px; font-size: var(--fs-sm); cursor: pointer;
        background: none; border: none; color: var(--hlda-text3);
        border-bottom: 2px solid transparent; transition: all 0.15s;
    }
    .hlda-root .hlda-tab:hover { color: var(--hlda-text); }
    .hlda-root .hlda-tab.active { color: var(--hlda-accent); border-bottom-color: var(--hlda-accent); }
    .hlda-root .hlda-tp { display: none; }
    .hlda-root .hlda-tp.active { display: block; }
    .hlda-root .hlda-jc {
        background: var(--hlda-bg2); border: 1px solid var(--hlda-border);
        border-radius: 6px; padding: 10px 12px; margin-bottom: 8px;
    }
    .hlda-root .hlda-jh { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
    .hlda-root .hlda-ji { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .hlda-root .hlda-ji .jid { font-weight: 600; font-size: 12px; color: var(--hlda-text); word-break: break-all; }
    .hlda-root .hlda-ji .jtype { font-size: 12px; color: var(--hlda-text3); }
    .hlda-root .hlda-ji .jdur { font-size: 12px; color: var(--hlda-text3); }
    .hlda-root .hlda-sbadge {
        font-size: var(--fs-xs); padding: 2px 8px; border-radius: 3px; font-weight: 500;
    }
    .hlda-root .hlda-sbadge.running { background: #3b82f633; color: #3b82f6; }
    .hlda-root .hlda-sbadge.pending { background: #f59e0b33; color: #f59e0b; }
    .hlda-root .hlda-sh-status {
        margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: var(--fs-xs);
    }
    .hlda-root .hlda-sh-status .sh-running {
        color: #3b82f6; font-weight: 500; display: flex; align-items: center; gap: 4px;
    }
    .hlda-root .hlda-sh-status .sh-running .sh-dot {
        width: 6px; height: 6px; border-radius: 50%; background: #3b82f6;
        animation: hlda-pulse 1.2s infinite;
    }
    @keyframes hlda-pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .hlda-root .hlda-sh-status .sh-pending {
        color: #f59e0b; font-weight: 500;
    }
    .hlda-root .hlda-jd {
        font-size: 12px; color: var(--hlda-text3); margin-top: 4px;
        display: flex; flex-wrap: wrap; gap: 6px;
    }
    .hlda-root .hlda-jerr { font-size: 12px; color: var(--hlda-err); margin-top: 4px; }
    .hlda-root .hlda-pb {
        background: var(--hlda-border); border-radius: 4px; height: 20px;
        margin-top: 6px; overflow: hidden; position: relative;
    }
    .hlda-root .hlda-pf {
        background: var(--hlda-accent); height: 100%; border-radius: 4px;
        transition: width 0.3s; min-width: 0;
    }
    .hlda-root .hlda-pt {
        position: absolute; top: 0; left: 0; right: 0; text-align: center;
        font-size: var(--fs-xs); line-height: 20px; color: white; font-weight: 500;
    }
    .hlda-root .hlda-pd {
        font-size: 11px; color: var(--hlda-text3); margin-top: 4px;
        display: flex; flex-wrap: wrap; gap: 8px;
    }
    .hlda-root .hlda-exp { margin-top: 6px; }
    .hlda-root .hlda-exp-toggle {
        background: none; border: none; color: var(--hlda-text3);
        font-size: var(--fs-xs); cursor: pointer; padding: 2px 0;
    }
    .hlda-root .hlda-exp-toggle:hover { color: var(--hlda-text); }
    .hlda-root .hlda-exp-body {
        display: none; padding: 6px 0 0 8px; font-size: var(--fs-xs); color: var(--hlda-text2);
    }
    .hlda-root .hlda-exp-body.open { display: block; }
    .hlda-root .hlda-exp-body .dr { margin-bottom: 2px; }
    .hlda-root .hlda-exp-body .dr strong { color: var(--hlda-text); }
    .hlda-root .hlda-ja { display: flex; gap: 6px; }
    .hlda-root .hlda-jbtn {
        font-size: var(--fs-xs); padding: 3px 10px; border-radius: 4px;
        border: 1px solid var(--hlda-border2); background: none;
        color: var(--hlda-text2); cursor: pointer;
    }
    .hlda-root .hlda-jbtn:hover { background: var(--hlda-border2); color: var(--hlda-text); }
    .hlda-root .hlda-jbtn.danger { border-color: #ef444455; color: #ef4444; }
    .hlda-root .hlda-jbtn.danger:hover { background: #ef444422; }
    .hlda-root .hlda-empty { text-align: center; color: var(--hlda-text4); padding: 16px; font-size: 13px; }
    .hlda-root .hlda-br { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; }
    .hlda-root .hlda-br .hlda-fs { flex: 1; min-width: 140px; }
    @media (max-width: 1500px) {
        .hlda-root .hlda-coin-grid { grid-template-columns: repeat(6, minmax(0, 1fr)); }
    }
    @media (max-width: 1180px) {
        .hlda-root .hlda-coin-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
    @media (max-width: 760px) {
        .hlda-root .hlda-coin-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    .hlda-root.show-only-section .hlda-section {
        border: 0;
        border-radius: 0;
        margin-bottom: 0;
        overflow: visible;
    }
    .hlda-root.show-only-section .hlda-sh {
        display: none;
    }
    .hlda-root.show-only-section .hlda-sb {
        display: block;
        padding: 0;
    }
    .hlda-root.show-only-section .hlda-jm {
        margin-top: 20px;
    }
    .hlda-root .hlda-modal {
        display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,.7); z-index: 10000; align-items: center; justify-content: center;
        padding-top: calc(var(--hlda-modal-visible-top-offset, 0px) + var(--sp-lg, 20px));
        padding-right: var(--sp-lg, 20px);
        padding-bottom: calc(var(--hlda-modal-visible-bottom-offset, 0px) + var(--sp-lg, 20px));
        padding-left: var(--sp-lg, 20px);
        overflow-y: auto;
    }
    .hlda-root .hlda-modal.active { display: flex; }
    .hlda-root .hlda-modal-box {
        background: var(--hlda-bg); border: 1px solid var(--hlda-border2);
        border-radius: 8px; width: min(800px, calc(100vw - (var(--sp-lg) * 2))); max-width: 800px;
        max-height: calc(var(--hlda-modal-visible-height, 100vh) - (var(--sp-lg, 20px) * 2));
        display: flex; flex-direction: column;
        overflow: hidden;
    }
    .hlda-root .hlda-modal-hd {
        display: flex; justify-content: space-between; align-items: center;
        padding: 12px 16px; border-bottom: 1px solid var(--hlda-border);
    }
    .hlda-root .hlda-modal-hd h3 { font-size: var(--fs-md); font-weight: 600; }
    .hlda-root .hlda-modal-close {
        background: none; border: none; color: var(--hlda-text3);
        font-size: var(--fs-xl); cursor: pointer; padding: 0 4px;
    }
    .hlda-root .hlda-modal-close:hover { color: var(--hlda-text); }
    .hlda-root .hlda-modal-body {
        padding: 12px 16px; overflow-y: auto; flex: 1;
        font-family: 'Fira Code', 'Consolas', monospace; font-size: var(--fs-xs);
        line-height: 1.5; white-space: pre-wrap; color: var(--hlda-text2);
    }
    .hlda-root .hlda-modal-body.is-details {
        display: grid;
        gap: var(--sp-md);
        font-family: inherit;
        font-size: var(--fs-base);
        line-height: 1.5;
        white-space: normal;
        color: var(--hlda-text);
        background: #0f172a;
    }
    .hlda-root .hlda-detail-section {
        display: grid;
        gap: var(--sp-sm);
        padding: var(--sp-md);
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.82);
    }
    .hlda-root .hlda-detail-section h4 {
        margin: 0;
        font-size: var(--fs-md);
        color: var(--hlda-text);
    }
    .hlda-root .hlda-detail-grid {
        display: grid;

<script>

(function() {
    if (window.self !== window.top) {
        document.documentElement.classList.add('hlda-embedded');
        document.body.classList.add('hlda-embedded');
    }
    var ROOT = document.getElementById('__HLDA_ROOT__');
    if (!ROOT) { console.error('[HLDA] Root element not found'); return; }

    // Config from data-* attributes
    var TOKEN = ROOT.getAttribute('data-token') || '';
    var API_BASE = ROOT.getAttribute('data-api-base') || '';
    var API_HOST = ROOT.getAttribute('data-api-host') || '';
    var INITIAL_SECTION = String(ROOT.getAttribute('data-initial-section') || '').toLowerCase();
    var SHOW_ONLY_SECTION = (INITIAL_SECTION === 'download' || INITIAL_SECTION === 'build') ? INITIAL_SECTION : '';
    var P = '__HLDA__';
    var STORAGE_KEY = 'pbgui_hl_data_sections';

    var dlCoins = [], dlSelected = new Set(), dlArchive = {oldest_day:'',newest_day:''}, dlHasCreds = false, dlFilter = '';
    var dlDragStart = null, dlDragSelecting = false, dlDragMode = null;
    var buildCoins = [], buildSelected = new Set(), buildFilter = '';
    var buildDragStart = null, buildDragSelecting = false, buildDragMode = null;
    var expandedJobs = { dl: new Set(), build: new Set() };
    var activeJobs = { dl: [], build: [] };
    var currentTab = { dl: 'running', build: 'running' };
    var ws = null, wsRetryCount = 0;

    function authOptions(options) {
        var opts = Object.assign({}, options || {});
        var headers = Object.assign({}, opts.headers || {});
        if (TOKEN) headers.Authorization = 'Bearer ' + TOKEN;
        opts.headers = headers;
        return opts;
    }

    function isClippingAncestor(element, view) {
        if (!element || !view || typeof view.getComputedStyle !== 'function') return false;
        var style = view.getComputedStyle(element);
        if (!style) return false;
        var overflowValue = String(style.overflow || '') + ' ' + String(style.overflowY || '') + ' ' + String(style.overflowX || '');
        return /(auto|scroll|hidden|clip|overlay)/i.test(overflowValue);
    }

    function resolveModalViewportMetrics() {
        var fallbackHeight = Math.max(0, window.innerHeight || 0);
        var topViewportHeight = fallbackHeight;
        try {
            if (window.top && window.top.innerHeight) {
                topViewportHeight = Math.max(0, window.top.innerHeight || 0);
            }
        } catch (e) {}

        var fallback = {
            visibleHeight: topViewportHeight || fallbackHeight,
            topOffset: 0,
            bottomOffset: 0,
        };

        try {
            var frame = window.frameElement;
            if (!frame || !window.top || window.top === window) return fallback;
            var ownerDoc = frame.ownerDocument || (window.top && window.top.document) || null;
            var ownerView = (ownerDoc && ownerDoc.defaultView) || window.top;
            var rect = frame.getBoundingClientRect();
            var clipTop = 0;
            var clipBottom = topViewportHeight;
            var ancestor = frame.parentElement;
            while (ancestor) {
                if (isClippingAncestor(ancestor, ownerView)) {
                    var ancestorRect = ancestor.getBoundingClientRect();
                    clipTop = Math.max(clipTop, ancestorRect.top);
                    clipBottom = Math.min(clipBottom, ancestorRect.bottom);
                }
                ancestor = ancestor.parentElement;
            }
            var visibleTop = Math.max(rect.top, clipTop);
            var visibleBottom = Math.min(rect.bottom, clipBottom);
            var visibleHeight = Math.max(0, visibleBottom - visibleTop);
            return {
                visibleHeight: visibleHeight || fallback.visibleHeight,
                topOffset: Math.max(0, visibleTop - rect.top),
                bottomOffset: Math.max(0, rect.bottom - visibleBottom),
            };
        } catch (e) {
            return fallback;
        }
    }

    function updateModalViewportHeight() {
        var metrics = resolveModalViewportMetrics();
        ROOT.style.setProperty('--hlda-modal-visible-height', Math.max(0, metrics.visibleHeight) + 'px');
        ROOT.style.setProperty('--hlda-modal-visible-top-offset', Math.max(0, metrics.topOffset) + 'px');
        ROOT.style.setProperty('--hlda-modal-visible-bottom-offset', Math.max(0, metrics.bottomOffset) + 'px');
    }

    updateModalViewportHeight();
    window.addEventListener('resize', updateModalViewportHeight);
    window.addEventListener('scroll', updateModalViewportHeight, { passive: true });
    try {
        var parentDoc = window.frameElement && window.frameElement.ownerDocument;
        if (parentDoc) {
            parentDoc.addEventListener('scroll', updateModalViewportHeight, { passive: true, capture: true });
        }
        if (window.top && window.top !== window) {
            window.top.addEventListener('resize', updateModalViewportHeight);
            window.top.addEventListener('scroll', updateModalViewportHeight, { passive: true });
            if (window.top.document && window.top.document !== parentDoc) {
                window.top.document.addEventListener('scroll', updateModalViewportHeight, { passive: true, capture: true });
            }
        }
    } catch (e) {}

    if (SHOW_ONLY_SECTION) {
        ROOT.classList.add('show-only-section');
    }

    // Use document.getElementById — same as market_data_status.html
    function $(id) { return document.getElementById(P + id); }

    function loadState() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); } catch(e) { return {}; } }
    function saveState(id, open) { try { var s=loadState(); s[id]=open; localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e) {} }
    function isOpen(id) { var s=loadState(); return s[id] || false; }

    function fmtDay(d) { return (!d||d.length!==8)?'':d.slice(0,4)+'-'+d.slice(4,6)+'-'+d.slice(6,8); }
    function inputToDay(v) { return v?v.replace(/-/g,''):''; }

    // ── Update header status badges (visible even when collapsed) ──
    function updateHeaderStatus(ns) {
        var el = $('sh-status-' + ns);
        if (!el) return;
        var jobs = activeJobs[ns] || [];
        var running = jobs.filter(function(j) { return j.status === 'running'; });
        var pending = jobs.filter(function(j) { return j.status === 'pending'; });
        var parts = [];
        if (running.length) {
            var coins = (running[0].payload || {}).coins || [];
            var label = coins.length ? coins.length + ' coins' : 'job';
            parts.push('\x3Cspan class="sh-running"\x3E\x3Cspan class="sh-dot"\x3E\x3C/span\x3E Running ' + escHtml(label) + '\x3C/span\x3E');
        }
        if (pending.length) {
            parts.push('\x3Cspan class="sh-pending"\x3E' + pending.length + ' pending\x3C/span\x3E');
        }
        el.innerHTML = parts.join(' \x3Cspan style="color:var(--hlda-text4)"\x3E·\x3C/span\x3E ');
    }

    // ── Init sections open/closed state ──
    ['download','build'].forEach(function(id) {
        var sec = $('sec-'+id);
        if (!sec) return;
        sec.hidden = !!SHOW_ONLY_SECTION && id !== SHOW_ONLY_SECTION;
        var shouldOpen = SHOW_ONLY_SECTION ? id === SHOW_ONLY_SECTION : isOpen(id);
        sec.classList.toggle('open', shouldOpen);
    });
    if (SHOW_ONLY_SECTION) {
        saveState('download', SHOW_ONLY_SECTION === 'download');
        saveState('build', SHOW_ONLY_SECTION === 'build');
    }

    // ══════════════════════════════════════════════════════════════
    //  Section toggle — direct addEventListener (like market_data_status.html)
    // ══════════════════════════════════════════════════════════════
    function toggleSection(id) {
        var el = $('sec-'+id);
        if (!el) return;
        var open = el.classList.toggle('open');
        saveState(id, open);
    }

    var shDownload = $('sh-download');
    if (shDownload) {
        shDownload.addEventListener('click', function() { toggleSection('download'); });
    }

    var shBuild = $('sh-build');
    if (shBuild) {
        shBuild.addEventListener('click', function() { toggleSection('build'); });
    }

    var modalClose = ROOT.querySelector('.hlda-modal-close');
    if (modalClose) {
        modalClose.addEventListener('click', function() { closeModal(); });
    }

    // ══════════════════════════════════════════════════════════════
    //  CENTRAL EVENT DELEGATION for dynamic content (NOT toggle-section)
    // ══════════════════════════════════════════════════════════════
    ROOT.addEventListener('click', function(e) {
        var t = e.target.closest('[data-action]');
        if (!t) return;
        var action = t.getAttribute('data-action');
        var ns = t.getAttribute('data-ns') || '';
        switch (action) {
            case 'toggle-section':
                // Handled by direct addEventListener above
                break;
            case 'close-modal':
                closeModal();
                break;
            case 'toggle-dd':
                toggleDD(ns);
                break;
            case 'cs-all':
                e.stopPropagation(); csAll(ns);
                break;
            case 'cs-clear':
                e.stopPropagation(); csClear(ns);
                break;
            case 'cs-toggle':
                e.stopPropagation();
                csToggle(ns, t.getAttribute('data-coin'));
                break;
            case 'cs-remove':
                e.stopPropagation(); e.preventDefault();
                csRemove(ns, t.getAttribute('data-coin'));
                break;
            case 'submit-dl':
                submitDL();
                break;
            case 'dl-select-visible':
                downloadSelectVisible();
                break;
            case 'dl-clear-selection':
                downloadClearSelection();
                break;
            case 'submit-build':
                submitBuild();
                break;
            case 'build-select-visible':
                buildSelectVisible();
                break;
            case 'build-clear-selection':
                buildClearSelection();
                break;
            case 'switch-tab':
                switchTab(ns, t.getAttribute('data-tab'));
                break;
            case 'run-job':
                runJob(t.getAttribute('data-job'));
                break;
            case 'show-job-details':
                showJobDetails(t.getAttribute('data-job'));
                break;
            case 'show-log':
                showLog(t.getAttribute('data-job'));
                break;
            case 'cancel-job':
                cancelJob(t.getAttribute('data-job'));
                break;
            case 'delete-job':
                deleteJob(t.getAttribute('data-job'));
                break;
            case 'retry-job':
                retryJob(t.getAttribute('data-job'));
                break;
            case 'requeue-job':
                requeueJob(t.getAttribute('data-job'));
                break;
            case 'tog-exp':
                e.stopPropagation();
                togExp(ns, t.getAttribute('data-job'), t);
                break;
        }
    });

    ROOT.addEventListener('input', function(e) {
        var t = e.target.closest('[data-action]');
        if (!t) return;
        if (t.getAttribute('data-action') === 'cs-filter') {
            csFilter(t.getAttribute('data-ns'));
            return;
        }
        if (t.getAttribute('data-action') === 'dl-filter') {
            dlFilter = t.value || '';
            renderDownloadCoinPicker();
            return;
        }
        if (t.getAttribute('data-action') === 'build-filter') {
            buildFilter = t.value || '';
            renderBuildCoinPicker();
        }
    });

    ROOT.addEventListener('change', function(e) {
        var target = e.target;
        if (!target) return;
        if (target.id === P + 'build-sd') {
            ensureBuildDateOrder('start');
            return;
        }
        if (target.id === P + 'build-ed') {
            ensureBuildDateOrder('end');
        }
    });

    ROOT.addEventListener('keydown', function(e) {
        if (!e || (e.key !== 'Enter' && e.key !== ' ')) return;
        var dlRow = e.target && e.target.closest ? e.target.closest('[data-dl-coin-row]') : null;
        if (dlRow && dlRow.closest && dlRow.closest('#' + P + 'opts-dl')) {
            e.preventDefault();
            dlRow.classList.toggle('selected');
            dlRow.setAttribute('aria-pressed', dlRow.classList.contains('selected') ? 'true' : 'false');
            syncDownloadSelectionFromDom();
            return;
        }
        var row = e.target && e.target.closest ? e.target.closest('[data-build-coin-row]') : null;
        if (!row || !row.closest || !row.closest('#' + P + 'opts-build')) return;
        e.preventDefault();
        row.classList.toggle('selected');
        row.setAttribute('aria-pressed', row.classList.contains('selected') ? 'true' : 'false');
        syncBuildSelectionFromDom();
    });

    document.addEventListener('mousedown', function(e) {
        if (e.button !== 0) return;
        var dlRow = e.target && e.target.closest ? e.target.closest('[data-dl-coin-row]') : null;
        if (dlRow && dlRow.closest && dlRow.closest('#' + P + 'opts-dl')) {
            e.preventDefault();
            dlDragStart = {
                coin: dlRow.getAttribute('data-dl-coin-row') || '',
                x: e.clientX,
                y: e.clientY,
                lastX: e.clientX,
                lastY: e.clientY
            };
            dlDragSelecting = false;
            dlDragMode = dlRow.classList.contains('selected') ? 'remove' : 'add';
            return;
        }
        var row = e.target && e.target.closest ? e.target.closest('[data-build-coin-row]') : null;
        if (!row || !row.closest || !row.closest('#' + P + 'opts-build')) return;
        e.preventDefault();
        buildDragStart = {
            coin: row.getAttribute('data-build-coin-row') || '',
            x: e.clientX,
            y: e.clientY,
            lastX: e.clientX,
            lastY: e.clientY
        };
        buildDragSelecting = false;
        buildDragMode = row.classList.contains('selected') ? 'remove' : 'add';
    });

    document.addEventListener('mousemove', function(e) {
        if (dlDragStart) {
            if (!dlDragSelecting && Math.max(Math.abs(e.clientX - dlDragStart.x), Math.abs(e.clientY - dlDragStart.y)) > 5) {
                dlDragSelecting = true;
            }
            if (!dlDragSelecting) return;
            e.preventDefault();
            var dlAnchor = getDownloadCoinRows().find(function(item) {
                return (item.getAttribute('data-dl-coin-row') || '') === dlDragStart.coin;
            });
            setDownloadCoinRowSelected(dlAnchor, dlDragMode === 'add');
            applyDownloadDragPath(dlDragStart.lastX, dlDragStart.lastY, e.clientX, e.clientY);
            dlDragStart.lastX = e.clientX;
            dlDragStart.lastY = e.clientY;
            return;
        }
        if (!buildDragStart) return;
        if (!buildDragSelecting && Math.max(Math.abs(e.clientX - buildDragStart.x), Math.abs(e.clientY - buildDragStart.y)) > 5) {
            buildDragSelecting = true;
        }
        if (!buildDragSelecting) return;
        e.preventDefault();
        var anchor = getBuildCoinRows().find(function(item) {
            return (item.getAttribute('data-build-coin-row') || '') === buildDragStart.coin;
        });
        setBuildCoinRowSelected(anchor, buildDragMode === 'add');
        applyBuildDragPath(buildDragStart.lastX, buildDragStart.lastY, e.clientX, e.clientY);
        buildDragStart.lastX = e.clientX;
        buildDragStart.lastY = e.clientY;
    });

    document.addEventListener('mouseup', function() {
        if (dlDragStart) {
            var dlAnchor = getDownloadCoinRows().find(function(item) {
                return (item.getAttribute('data-dl-coin-row') || '') === dlDragStart.coin;
            });
            if (!dlDragSelecting) {
                setDownloadCoinRowSelected(dlAnchor, !(dlAnchor && dlAnchor.classList.contains('selected')));
            }
            syncDownloadSelectionFromDom();
            dlDragStart = null;
            dlDragSelecting = false;
            dlDragMode = null;
            return;
        }
        if (!buildDragStart) return;
        var anchor = getBuildCoinRows().find(function(item) {
            return (item.getAttribute('data-build-coin-row') || '') === buildDragStart.coin;
        });
        if (!buildDragSelecting) {
            setBuildCoinRowSelected(anchor, !(anchor && anchor.classList.contains('selected')));
        }
        syncBuildSelectionFromDom();
        buildDragStart = null;
        buildDragSelecting = false;
        buildDragMode = null;
    });

    // Close dropdowns on outside click
    document.addEventListener('click', function(e) {
        ['dl','build'].forEach(function(ns) {
            var sel = $('cs-'+ns);
            if (sel && !sel.contains(e.target)) { var dd=$('dd-'+ns); if(dd) dd.classList.remove('open'); }
        });
    });

    // ══════════════════════════════════════════════════════════════
    //  INIT (with retry on transient fetch failures)
    // ══════════════════════════════════════════════════════════════
    var INIT_MAX_RETRIES = 3, INIT_RETRY_DELAY = 1500;

    async function doInit(attempt) {
        var dl=$('body-download'), bl=$('body-build');
        try {
            var r = await Promise.all([
                fetch(API_BASE + '/heatmap/l2book-download-info', authOptions()),
                fetch(API_BASE + '/heatmap/build-ohlcv-info', authOptions()),
            ]);
            if (!r[0].ok) throw new Error('Download info HTTP ' + r[0].status);
            if (!r[1].ok) throw new Error('Build info HTTP ' + r[1].status);
            var dlD = await r[0].json(), bD = await r[1].json();
            dlCoins = dlD.coins||[]; dlHasCreds = dlD.has_aws_creds;
            dlArchive = dlD.archive_range||{oldest_day:'',newest_day:''};
            buildCoins = bD.eligible_coins||[];
            populateDownload(); populateBuild();
            connectWS();
        } catch(e) {
            if (attempt < INIT_MAX_RETRIES) {
                var msg = '\x3Cdiv class="hlda-empty"\x3EConnection failed, retrying (' + (attempt+1) + '/' + INIT_MAX_RETRIES + ')…\x3C/div\x3E';
                if(dl) dl.innerHTML=msg; if(bl) bl.innerHTML=msg;
                setTimeout(function() { doInit(attempt + 1); }, INIT_RETRY_DELAY);
            } else {
                var err = '\x3Cdiv class="hlda-msg error" style="display:block"\x3EFailed to load: ' + escHtml(e.message) + '\x3C/div\x3E';
                if(dl) dl.innerHTML=err; if(bl) bl.innerHTML=err;
            }
        }
    }
    doInit(0);

    // ══════════════════════════════════════════════════════════════
    //  POPULATE: Download l2Book
    // ══════════════════════════════════════════════════════════════
    function populateDownload() {
        var body = $('body-download');
        if (!body) return;
        if (!dlHasCreds) {
            body.innerHTML = '\x3Cdiv class="hlda-nocreds"\x3E⚠ No AWS credentials configured. Go to \x3Cstrong\x3ESettings (l2Book)\x3C/strong\x3E above to enter your Access Key ID and Secret Access Key.\x3C/div\x3E';
            return;
        }
        if (!dlCoins.length) {
            body.innerHTML = '\x3Cdiv class="hlda-msg warning" style="display:block"\x3ENo downloadable Hyperliquid l2Book coins configured. XYZ/TradFi symbols are excluded here.\x3C/div\x3E';
            return;
        }
        var oldest = dlArchive.oldest_day ? fmtDay(dlArchive.oldest_day) : '?';
        var newest = dlArchive.newest_day ? fmtDay(dlArchive.newest_day) : '?';
        body.innerHTML =
            '\x3Cdiv class="hlda-fs"\x3E' +
                '\x3Cspan class="hlda-lbl"\x3ECoins for download\x3C/span\x3E' +
                '\x3Cdiv class="hlda-hint"\x3ELeave this empty to queue all downloadable non-XYZ coins. Drag across visible coin rows to add or remove larger ranges quickly.\x3C/div\x3E' +
                '\x3Cdiv class="hlda-picker-toolbar"\x3E' +
                    '\x3Cdiv class="hlda-picker-filter-wrap"\x3E\x3Cinput type="text" class="hlda-filter-input" id="' + P + 'search-dl" placeholder="Filter enabled coin list" data-action="dl-filter"\x3E\x3C/div\x3E' +
                    '\x3Cbutton type="button" class="hlda-mini-btn" id="' + P + 'dl-select-visible" data-action="dl-select-visible"\x3ESelect visible\x3C/button\x3E' +
                    '\x3Cbutton type="button" class="hlda-mini-btn" id="' + P + 'dl-clear-selection" data-action="dl-clear-selection"\x3EClear all\x3C/button\x3E' +
                    '\x3Cspan class="hlda-picker-meta" id="' + P + 'dl-selected-count"\x3E0 selected / ' + dlCoins.length + ' total\x3C/span\x3E' +
                    '\x3Cspan class="hlda-picker-meta" id="' + P + 'dl-visible-count"\x3E0 visible\x3C/span\x3E' +
                '\x3C/div\x3E' +
                '\x3Cdiv class="hlda-coin-grid" id="' + P + 'opts-dl"\x3E\x3C/div\x3E' +
            '\x3C/div\x3E' +

    function applyDownloadDragPath(fromX, fromY, toX, toY) {
        var dx = toX - fromX;
        var dy = toY - fromY;
        var distance = Math.max(Math.abs(dx), Math.abs(dy));
        var steps = Math.max(1, Math.ceil(distance / 8));
        for (var index = 0; index <= steps; index++) {
            var ratio = steps === 0 ? 1 : (index / steps);
            var x = fromX + dx * ratio;
            var y = fromY + dy * ratio;
            var hit = document.elementFromPoint(x, y);
            var row = hit && hit.closest ? hit.closest('[data-dl-coin-row]') : null;
            if (!row || !row.closest || !row.closest('#' + P + 'opts-dl')) continue;
            setDownloadCoinRowSelected(row, dlDragMode === 'add');
        }
    }

    function syncDownloadSelectionFromDom() {
        var visibleCoins = new Set(getDownloadVisibleCoins());
        var nextSelected = new Set(Array.from(dlSelected).filter(function(coin) {
            return !visibleCoins.has(coin);
        }));
        getDownloadCoinRows().forEach(function(row) {
            var coin = row.getAttribute('data-dl-coin-row') || '';
            if (!coin) return;
            if (row.classList.contains('selected')) nextSelected.add(coin);
        });
        dlSelected = nextSelected;
        updateDownloadPickerSummary();
    }

    function buildDateValueToMs(value) {
        var v = String(value || '').trim().toLowerCase();
        if (!v) return null;
        if (v === 'now') {
            var now = new Date();
            return new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
        }
        if (!/^\d{4}-\d{2}-\d{2}$/.test(v)) return null;
        var d = new Date(v + 'T00:00:00');
        if (isNaN(d)) return null;
        return d.getTime();
    }

    function ensureBuildDateOrder(changedSide, silent) {

        var endEl = $('build-ed');
        if (!startEl || !endEl) return true;
        var startVal = (startEl.value || '').trim();
        var endVal = (endEl.value || '').trim();
        var startMs = buildDateValueToMs(startVal);
        var endMs = buildDateValueToMs(endVal);
        if (startMs === null || endMs === null || endMs >= startMs) return true;
        if (changedSide === 'start') {
            endEl.value = startVal;
            endEl.dataset.prev = startVal;
        } else {
            startEl.value = endVal;
            startEl.dataset.prev = endVal;
        }
        if (!silent) showMsg('build','warning','End date cannot be before start date. The range was adjusted automatically.');
        return false;
    }

    async function submitDL() {
        var btn = $('dl-btn'), lo = $('dl-lo');
        var sd=inputToDay($('dl-sd')?$('dl-sd').value:''), ed=inputToDay($('dl-ed')?$('dl-ed').value:'');
        if (!sd||!ed) { showMsg('dl','error','Start and end dates are required.'); return; }
        if (ed < sd) { showMsg('dl','error','End date must be after start date.'); return; }
        btn.disabled=true; lo.classList.add('active'); hideMsg('dl');
        try {
            var coins = dlSelected.size===0||dlSelected.size===dlCoins.length ? ['All'] : Array.from(dlSelected);
            var resp = await fetch(API_BASE + '/heatmap/queue-l2book-download-bulk', authOptions({
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ coins: coins, start_day:sd, end_day:ed,
                    only_missing_1m_src_hours: $('dl-only')?$('dl-only').checked:true }),
            }));
            var data = await resp.json();
            if (data.error) { showMsg('dl','error',data.error); }
            else {
                var txt='Queued job \x3Cstrong\x3E' + data.job_id + '\x3C/strong\x3E — ' + data.coins_count + ' coins, ' + fmtDay(data.start_day) + ' → ' + fmtDay(data.end_day);
                if (data.missing_coins && data.missing_coins.length) txt+='\x3Cbr\x3E\x3Csmall style="color:var(--hlda-warn);"\x3ESkipped (not in archive): ' + data.missing_coins.join(', ') + '\x3C/small\x3E';
                showMsg('dl','success',txt);
            }
        } catch(e) { showMsg('dl','error','Request failed: ' + e.message); }
        finally { btn.disabled=false; lo.classList.remove('active'); }
    }

    async function submitBuild() {
        var btn=$('build-btn'), lo=$('build-lo');
        btn.disabled=true; lo.classList.add('active'); hideMsg('build');
        try {
            var coins = buildSelected.size===0||buildSelected.size===buildCoins.length ? ['All'] : Array.from(buildSelected);
            var sd=inputToDay($('build-sd')?$('build-sd').value:''), ed=inputToDay($('build-ed')?$('build-ed').value:'');
            if (sd&&ed&&ed < sd) { showMsg('build','error','Start date must be on or before End date.'); return; }
            var resp = await fetch(API_BASE + '/heatmap/queue-build-ohlcv', authOptions({
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ coins: coins, start_day:sd, end_day:ed,
                    refetch: $('build-refetch')?$('build-refetch').checked:false }),
            }));
            var data = await resp.json();
            if (data.error) { showMsg('build','error',data.error); }
            else {
                var txt='Queued job \x3Cstrong\x3E' + data.job_id + '\x3C/strong\x3E — ' + data.coins_count + ' coins';
                if (data.start_day) txt+=', ' + fmtDay(data.start_day) + ' → ' + fmtDay(data.end_day);
                else txt+=', end: ' + fmtDay(data.end_day);
                if (data.refetch) txt+=' (refetch)';
                showMsg('build','success',txt);
            }
        } catch(e) { showMsg('build','error','Request failed: ' + e.message); }
        finally { btn.disabled=false; lo.classList.remove('active'); }
    }

    function connectWS() {
        var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        var wsUrl = proto + '//' + API_HOST + '/ws/jobs?token=' + TOKEN;
        try {
            ws = new WebSocket(wsUrl);
            ws.onopen = function() {
                wsRetryCount = 0;
                ['dl','build'].forEach(function(ns) {
                    var badge = $('jm-badge-' + ns);
                    if (badge) { badge.textContent='Connected'; badge.className='hlda-jm-badge connected'; }
                });
            };
            ws.onmessage = function(evt) {
                try {
                    var msg = JSON.parse(evt.data);
                    if (msg.type === 'jobs') {
                        var allJobs = msg.data || [];
                        ['dl','build'].forEach(function(ns) {
                            var jt = JOB_TYPES[ns];
                            var filtered = allJobs.filter(function(j) {
                                return (j.type||'').toLowerCase() === jt &&
                                       (j.status==='pending' || j.status==='running');
                            });
                            filtered.sort(compareActiveJobs);
                            activeJobs[ns] = filtered;
                            updateHeaderStatus(ns);
                            if (currentTab[ns] === 'running') renderActivePanel(ns);
                        });
                    }
                } catch(ex) {}
            };
            ws.onclose = function() {
                ['dl','build'].forEach(function(ns) {
                    var badge = $('jm-badge-' + ns);
                    if (badge) { badge.textContent='Disconnected'; badge.className='hlda-jm-badge disconnected'; }
                });
                if (wsRetryCount < 5) { wsRetryCount++; setTimeout(connectWS, 3000); }
            };
            ws.onerror = function() { ws.close(); };
        } catch(ex) {
            ['dl','build'].forEach(function(ns) {
                var badge = $('jm-badge-' + ns);
                if (badge) { badge.textContent='Error'; badge.className='hlda-jm-badge disconnected'; }
            });
        }
    }

        panel.innerHTML = jobs.map(function(j) { return renderActiveJob(ns, j); }).join('');
    }

    async function loadHistoryTab(ns, tab) {
        var panel = $('jm-panel-' + ns + '-' + tab);
        if (!panel) return;
        panel.innerHTML = '\x3Cdiv class="hlda-empty"\x3ELoading…\x3C/div\x3E';
        try {
            var resp = await fetch(API_BASE + '/jobs/?states=' + tab + '&limit=20', authOptions());
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            var data = await resp.json();
            var jobs = data.jobs || data;
            var jt = JOB_TYPES[ns];
            var filtered = jobs.filter(function(j) { return (j.type||'').toLowerCase()===jt; });
            filtered.sort(function(a,b) { return (b.updated_ts||0)-(a.updated_ts||0); });
            if (!filtered.length) { panel.innerHTML = '\x3Cdiv class="hlda-empty"\x3ENo ' + tab + ' jobs.\x3C/div\x3E'; return; }
            panel.innerHTML = filtered.map(function(j) { return renderHistoryJob(ns, j); }).join('');
        } catch(e) { panel.innerHTML = '\x3Cdiv class="hlda-msg error" style="display:block"\x3EFailed to load: ' + escHtml(e.message) + '\x3C/div\x3E'; }
    }

    function renderHistoryJob(ns, job) {
        var payload=job.payload||{}, pr=job.progress||{}, lr=pr.last_result||{};
        var coins=Array.isArray(payload.coins)?payload.coins:[];
        var coinPrev=coins.length<=8?coins.join(', '):coins.slice(0,8).join(', ')+' … (' + coins.length + ' total)';
        var sd=payload.start_day||'', ed=payload.end_day||'';
        var rangeStr=(sd||ed)?(fmtDay(sd)||'?')+' → '+(fmtDay(ed)||'?'):'';
        var dl=pr.downloaded_total||lr.downloaded||0, sk=pr.skipped_existing_total||lr.skipped_existing||0, fl=pr.failed_total||lr.failed||0;
        var hasStats=(dl+sk+fl)>0;
        var cTs=parseFloat(job.created_ts||0), uTs=parseFloat(job.updated_ts||0);
        var durStr='';
        if (cTs>0&&uTs>=cTs) { var d=Math.round(uTs-cTs); var hh=Math.floor(d/3600),mm=Math.floor((d%3600)/60),ss=d%60;
            if(hh>0) durStr=hh+'h '+String(mm).padStart(2,'0')+'m'; else if(mm>0) durStr=mm+'m '+String(ss).padStart(2,'0')+'s'; else durStr=ss+'s'; }
        var isExp=expandedJobs[ns].has(job.id);
        var isDone=job.status==='done', isFailed=job.status==='failed';

        var h = '\x3Cdiv class="hlda-jc"\x3E' +
            '\x3Cdiv class="hlda-jh"\x3E' +
                '\x3Cdiv class="hlda-ji"\x3E' +
                    '\x3Cspan class="jid"\x3E' + escHtml(job.id) + '\x3C/span\x3E' +
                    '\x3Cspan class="jtype"\x3E' + escHtml(job.type) + '\x3C/span\x3E' +
                    (durStr ? '\x3Cspan class="jdur"\x3E' + durStr + '\x3C/span\x3E' : '') +
                '\x3C/div\x3E' +
                '\x3Cdiv class="hlda-ja"\x3E' +
                    '\x3Cbutton class="hlda-jbtn view" data-action="show-job-details" data-job="' + escAttr(job.id) + '"\x3EView\x3C/button\x3E' +
                    '\x3Cbutton class="hlda-jbtn" data-action="show-log" data-job="' + escAttr(job.id) + '"\x3ELog\x3C/button\x3E' +
                    (isFailed ? '\x3Cbutton class="hlda-jbtn" data-action="retry-job" data-job="' + escAttr(job.id) + '"\x3ERetry\x3C/button\x3E' : '') +
                    (isDone ? '\x3Cbutton class="hlda-jbtn" data-action="requeue-job" data-job="' + escAttr(job.id) + '"\x3ERequeue\x3C/button\x3E' : '') +
                    '\x3Cbutton class="hlda-jbtn danger" data-action="delete-job" data-job="' + escAttr(job.id) + '"\x3EDelete\x3C/button\x3E' +
                '\x3C/div\x3E' +
            '\x3C/div\x3E' +
            '\x3Cdiv class="hlda-jd"\x3E' +
                '\x3Cspan\x3E' + fmtTS(job.updated_ts) + '\x3C/span\x3E' +
                (rangeStr ? '\x3Cspan\x3ERange: ' + rangeStr + '\x3C/span\x3E' : '') +
            '\x3C/div\x3E';
        if (job.error) h += '\x3Cdiv class="hlda-jerr"\x3E' + escHtml(job.error) + '\x3C/div\x3E';
        if (hasStats||coinPrev) {
            h += '\x3Cdiv class="hlda-exp"\x3E' +
                '\x3Cbutton class="hlda-exp-toggle" data-action="tog-exp" data-ns="' + ns + '" data-job="' + escAttr(job.id) + '"\x3E' + (isExp?'▼':'▶') + ' Details\x3C/button\x3E' +
                '\x3Cdiv class="hlda-exp-body ' + (isExp?'open':'') + '" id="' + P + 'exp-' + ns + '-' + job.id + '"\x3E' +
                    (coinPrev ? '\x3Cdiv class="dr"\x3E\x3Cstrong\x3ECoins:\x3C/strong\x3E ' + escHtml(coinPrev) + '\x3C/div\x3E' : '') +
                    (payload.only_missing_1m_src_hours!==undefined ? '\x3Cdiv class="dr"\x3E\x3Cstrong\x3EOnly missing 1m_src hours:\x3C/strong\x3E ' + (payload.only_missing_1m_src_hours?'Yes':'No') + '\x3C/div\x3E' : '') +
                    (hasStats ? '\x3Cdiv class="dr"\x3E\x3Cstrong\x3EDownloaded:\x3C/strong\x3E ' + dl + ' files (' + fmtBytes(pr.downloaded_bytes_total||lr.downloaded_bytes||0) + ')\x3C/div\x3E' +
                        '\x3Cdiv class="dr"\x3E\x3Cstrong\x3ESkipped:\x3C/strong\x3E ' + sk + ' files (' + fmtBytes(pr.skipped_existing_bytes_total||lr.skipped_existing_bytes||0) + ')\x3C/div\x3E' +
                        '\x3Cdiv class="dr"\x3E\x3Cstrong\x3EFailed:\x3C/strong\x3E ' + fl + ' files (' + fmtBytes(pr.failed_bytes_total||lr.failed_bytes||0) + ')\x3C/div\x3E' : '') +
                '\x3C/div\x3E' +
            '\x3C/div\x3E';
        }
        h += '\x3C/div\x3E';
        return h;
    }

    // ── Job actions ──
    function formatJobDuration(job) {
        var createdTs = parseFloat(job && job.created_ts || 0);
        var updatedTs = parseFloat(job && job.updated_ts || 0);
        if (!(createdTs > 0) || !(updatedTs >= createdTs)) return '';
        var duration = Math.round(updatedTs - createdTs);
        var hh = Math.floor(duration / 3600);
        var mm = Math.floor((duration % 3600) / 60);
        var ss = duration % 60;
        if (hh > 0) return hh + 'h ' + String(mm).padStart(2, '0') + 'm';
        if (mm > 0) return mm + 'm ' + String(ss).padStart(2, '0') + 's';
        return ss + 's';
    }

    function formatJsonBlock(value) {
        if (!value || (typeof value === 'object' && Object.keys(value).length === 0)) {
            return '\x3Cdiv class="hlda-detail-empty"\x3ENo data.\x3C/div\x3E';
        }
        return '\x3Cpre class="hlda-json"\x3E' + escHtml(JSON.stringify(value, null, 2)) + '\x3C/pre\x3E';
    }

    function renderDetailRows(rows) {
        var html = (rows || []).filter(function(row) {
            return row && row.value !== '' && row.value !== null && row.value !== undefined;
        }).map(function(row) {
            return '\x3Cdiv class="hlda-detail-key"\x3E' + escHtml(String(row.label)) + '\x3C/div\x3E' +
                   '\x3Cdiv class="hlda-detail-value"\x3E' + escHtml(String(row.value)) + '\x3C/div\x3E';
        }).join('');
        return html || '\x3Cdiv class="hlda-detail-empty"\x3ENo details available.\x3C/div\x3E';
    }

    function renderJobDetails(job) {
        var payload = job && job.payload && typeof job.payload === 'object' ? job.payload : {};
        var progress = job && job.progress && typeof job.progress === 'object' ? job.progress : {};
        var lastResult = progress.last_result && typeof progress.last_result === 'object' ? progress.last_result : {};
        var coins = Array.isArray(payload.coins) ? payload.coins.join(', ') : '';
        var range = (payload.start_day || payload.end_day)
            ? (fmtDay(payload.start_day || '') || '?') + ' → ' + (fmtDay(payload.end_day || '') || '?')
            : '';
        var currentChunk = progress.chunk_start ? String(progress.chunk_start) + ' → ' + String(progress.chunk_end || '') : '';

        var summaryRows = [
            { label: 'Status', value: job.status || '' },
            { label: 'Type', value: job.type || '' },
            { label: 'Exchange', value: job.exchange || '' },
            { label: 'Created', value: fmtTS(job.created_ts) },
            { label: 'Updated', value: fmtTS(job.updated_ts) },
            { label: 'Duration', value: formatJobDuration(job) },
            { label: 'Run requested', value: job.run_requested ? 'Yes' : '' },
            { label: 'Cancel requested', value: job.cancel_requested ? 'Yes' : '' },
            { label: 'Error', value: job.error || '' }
        ];
        var scopeRows = [
            { label: 'Coins', value: coins },
            { label: 'Range', value: range },
            { label: 'Chunk days', value: payload.chunk_days },
            { label: 'Profile', value: payload.profile || '' },
            { label: 'Region', value: payload.region || '' },
            { label: 'Refetch', value: payload.refetch ? 'Yes' : '' },
            { label: 'Only missing 1m_src hours', value: payload.only_missing_1m_src_hours !== undefined ? (payload.only_missing_1m_src_hours ? 'Yes' : 'No') : '' },
            { label: 'Current coin', value: progress.coin || '' },
            { label: 'Current chunk', value: currentChunk },
            { label: 'Stage', value: progress.stage || '' },
            { label: 'Step', value: progress.total ? String(progress.step || 0) + '/' + String(progress.total) : '' },
            { label: 'Chunk progress', value: progress.chunk_total ? String(progress.chunk_done || 0) + '/' + String(progress.chunk_total) : '' }
        ];

        return '\x3Cdiv class="hlda-detail-section"\x3E' +
                   '\x3Ch4\x3ESummary\x3C/h4\x3E' +
                   '\x3Cdiv class="hlda-detail-grid"\x3E' + renderDetailRows(summaryRows) + '\x3C/div\x3E' +
               '\x3C/div\x3E' +
               '\x3Cdiv class="hlda-detail-section"\x3E' +
                   '\x3Ch4\x3EScope\x3C/h4\x3E' +
                   '\x3Cdiv class="hlda-detail-grid"\x3E' + renderDetailRows(scopeRows) + '\x3C/div\x3E' +
               '\x3C/div\x3E' +
               '\x3Cdiv class="hlda-detail-section"\x3E' +
                   '\x3Ch4\x3EPayload\x3C/h4\x3E' + formatJsonBlock(payload) +
               '\x3C/div\x3E' +
               '\x3Cdiv class="hlda-detail-section"\x3E' +
                   '\x3Ch4\x3EProgress\x3C/h4\x3E' + formatJsonBlock(progress) +
               '\x3C/div\x3E' +
               '\x3Cdiv class="hlda-detail-section"\x3E' +
                   '\x3Ch4\x3ELast Result\x3C/h4\x3E' + formatJsonBlock(lastResult) +
               '\x3C/div\x3E';
    }

    async function runJob(id) {
        try {
            var resp = await fetch(API_BASE + '/jobs/' + id + '/run', authOptions({ method: 'POST' }));
            if (!resp.ok) {
                var detail = 'HTTP ' + resp.status;
                try {
                    var err = await resp.json();
                    if (err && (err.detail || err.error)) detail = String(err.detail || err.error);
                } catch (e) {}
                throw new Error(detail);
            }
        } catch (e) {
            var modal = $('modal'), title = $('modal-title'), body = $('modal-body');
            if (modal && title && body) {
                body.classList.remove('is-details');
                title.textContent = 'Run failed';
                body.textContent = 'Failed to start job ' + id + ': ' + (e && e.message ? e.message : 'Unknown error');
                updateModalViewportHeight();
                modal.classList.add('active');
            }
        }
    }

    async function showJobDetails(jobId) {
        var modal = $('modal'), title = $('modal-title'), body = $('modal-body');
        if (!modal || !title || !body) return;
        title.textContent = 'Job Details: ' + jobId;
        body.classList.add('is-details');
        body.innerHTML = '\x3Cdiv class="hlda-detail-empty"\x3ELoading…\x3C/div\x3E';
        updateModalViewportHeight();
        modal.classList.add('active');
        try {
            var resp = await fetch(API_BASE + '/jobs/' + jobId, authOptions());
            if (!resp.ok) {
                var detail = 'HTTP ' + resp.status;
                try {
                    var err = await resp.json();
                    if (err && (err.detail || err.error)) detail = String(err.detail || err.error);
                } catch (e) {}
                throw new Error(detail);
            }
            var job = await resp.json();
            body.innerHTML = renderJobDetails(job || {});
        } catch(e) {
            body.innerHTML = '\x3Cdiv class="hlda-detail-empty" style="color:#ef4444;"\x3EFailed to load job details: ' + escHtml(e && e.message ? e.message : 'Unknown error') + '\x3C/div\x3E';
        }
    }

    async function showLog(jobId) {
        var modal=$('modal'), title=$('modal-title'), body=$('modal-body');
        body.classList.remove('is-details');
        title.textContent='Log: '+jobId; body.textContent='Loading…';
        updateModalViewportHeight();
        modal.classList.add('active');
        try {
            var r=await fetch(API_BASE + '/jobs/' + jobId + '/log', authOptions());
            if (!r.ok) throw new Error('HTTP '+r.status);
            var d=await r.json();
            body.textContent = (d.log||d.lines||[]).join('\n') || 'No log entries.';
        } catch(e) { body.textContent='Failed to load log: '+e.message; }
    }
    function closeModal() {
        var modal = $('modal'), body = $('modal-body');
        if (body) body.classList.remove('is-details');
        if (modal) modal.classList.remove('active');
    }

    async function cancelJob(id) {
        try {
            var resp = await fetch(API_BASE + '/jobs/cancel', authOptions({
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ job_id: id, reason: 'user cancel' })
            }));
            if (!resp.ok) {
                var detail = 'HTTP ' + resp.status;
                try {
                    var err = await resp.json();
                    if (err && (err.detail || err.error)) detail = String(err.detail || err.error);
                } catch(e) {}
                throw new Error(detail);
            }
        } catch(e) {
            var modal=$('modal'), title=$('modal-title'), body=$('modal-body');
            if (modal && title && body) {
                title.textContent='Cancel failed';
                body.textContent='Failed to cancel job ' + id + ': ' + (e && e.message ? e.message : 'Unknown error');
                updateModalViewportHeight();
                modal.classList.add('active');
            }
        }
    }
    async function deleteJob(id) {
        try { await fetch(API_BASE + '/jobs/' + id, authOptions({method:'DELETE'})); } catch(e) {}
        ['dl','build'].forEach(function(ns) { if(currentTab[ns]!=='running') loadHistoryTab(ns, currentTab[ns]); });
    }
    async function retryJob(id) {
        try { await fetch(API_BASE + '/jobs/' + id + '/retry', authOptions({method:'POST'})); } catch(e) {}
        ['dl','build'].forEach(function(ns) { if(currentTab[ns]==='failed') loadHistoryTab(ns,'failed'); });
    }
    async function requeueJob(id) {
        try { await fetch(API_BASE + '/jobs/' + id + '/requeue', authOptions({method:'POST'})); } catch(e) {}
        ['dl','build'].forEach(function(ns) { if(currentTab[ns]==='done') loadHistoryTab(ns,'done'); });
    }

    function togExp(ns, jobId, btn) {
        var el = $('exp-' + ns + '-' + jobId);
        if (!el) return;
        if (el.classList.contains('open')) {
            el.classList.remove('open'); expandedJobs[ns].delete(jobId);
            if(btn) btn.textContent='▶ Details';
        } else {
            el.classList.add('open'); expandedJobs[ns].add(jobId);
            if(btn) btn.textContent='▼ Details';
        }
    }

    // ── Helpers ──
    function calcPct(pr) {
        if (!pr.total) return 0;
        var s=pr.step||0, cD=pr.chunk_done||0, cT=pr.chunk_total||1;
        var frac=cT>0?cD/cT:0;
        return Math.min(100, Math.max(0, Math.round(((s-1+frac)/pr.total)*100)));
    }
    function fmtBytes(b) {
        if(!b) return '0 B';
        var k=1024, sz=['B','KB','MB','GB'];
        var i=Math.floor(Math.log(b)/Math.log(k));
        return (b/Math.pow(k,i)).toFixed(2)+' '+sz[i];
    }
    function fmtTS(ts) {
        if(!ts) return '';
        var d=new Date(Number(ts)*1000);
        if(isNaN(d.getTime())) return String(ts);
        function p(n){return String(n).padStart(2,'0');}
        return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
    }
    function compareActiveJobs(a, b) {
        var aRunning = !!(a && a.status === 'running');
        var bRunning = !!(b && b.status === 'running');
        if (aRunning !== bRunning) return aRunning ? -1 : 1;
        var aCreated = parseFloat(a && a.created_ts || 0);
        var bCreated = parseFloat(b && b.created_ts || 0);
        if (aCreated !== bCreated) return aCreated - bCreated;
        return String(a && a.id || '').localeCompare(String(b && b.id || ''));
    }
    function escHtml(t) { var d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
    function escAttr(t) { return String(t).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/\x3C/g,'&lt;').replace(/\x3E/g,'&gt;'); }
})();

</script>
