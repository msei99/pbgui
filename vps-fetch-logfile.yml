---
# Fetch logfile from VPS
# Steps:
# 1. Clone pbgui repository
# 2. Restart PBRun and PBCoinData if pbgui repository was updated

- hosts: "{{ hostname }}"
  gather_facts: yes

  vars:
    # ansible_ssh_pass: "{{ user_pw }}"
    # ansible_become_password: "{{ user_pw }}"
    user: "{{ user }}"
    vps_dir: "{{ vps_dir }}"
    logfile: "{{ logfile }}"
    # user_pw: "{{ user_pw }}"
    install_dir: "{{ install_dir | default(ansible_facts['env']['HOME'] + '/software') }}"
    logs_dir: "{{ install_dir }}/pbgui/data"

  tasks:
    - name: display facts
      debug:
        var: ansible_facts
      tags: debug,never

    - name: fetch logfile from vps
      fetch:
        src: "{{ logs_dir }}/{{ logfile }}"
        dest: "{{ vps_dir }}/"
        flat: yes
