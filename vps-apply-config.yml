---
# Apply optional VPS PBGui configuration without updating code.

- hosts: "{{ hostname }}"
  gather_facts: yes

  vars:
    user: "{{ user }}"
    install_dir: "{{ install_dir | default(ansible_facts['env']['HOME'] + '/software') }}"

  tasks:
    - name: display facts
      debug:
        var: ansible_facts
      tags: debug,never

    - name: Sync PBRemote bucket
      ini_file:
        path: "{{ install_dir }}/pbgui/pbgui.ini"
        section: pbremote
        option: bucket
        value: "{{ bucket | default('') | string | trim }}"
      when: bucket is defined

    - name: Sync CoinMarketCap API key
      ini_file:
        path: "{{ install_dir }}/pbgui/pbgui.ini"
        section: coinmarketcap
        option: api_key
        value: "{{ coinmarketcap_api_key | default('') | string | trim }}"
      when: coinmarketcap_api_key is defined

    - name: Start or stop optional PBGui services
      script: setup/vps_service_control.sh restart PBRemote PBCoinData
      environment:
        PBGUI_DIR: "{{ install_dir }}/pbgui"
        PBGUI_PYTHON: "{{ install_dir }}/venv_pbgui/bin/python"
        PBGUI_USER: "{{ user }}"
      register: pbgui_process_health
      retries: 8
      delay: 3
      until: pbgui_process_health.rc == 0

    - name: print service control result
      debug:
        var: pbgui_process_health
      tags: debug,never
