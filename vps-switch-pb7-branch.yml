---
# Switch pb7 branch/commit on VPS
# Steps:
# 1. Fetch from origin
# 2. Check for uncommitted changes (fail if found)
# 3. Checkout specified branch
# 4. Optionally hard-reset the checked out branch to a specific commit
# 5. Otherwise hard-reset the checked out branch to the selected remote head
# 6. Restart pbgui services

- hosts: "{{ hostname }}"
  gather_facts: yes

  vars:
    user: "{{ user }}"
    target_branch: "{{ pb7_branch }}"
    source_branch: "{{ pb7_source_branch | default(pb7_branch) }}"
    pb7_ref: "{{ lookup('file', playbook_dir + '/pb7_ref.txt') | trim }}"
    use_pinned_ref: "{{ pb7_use_pin | default(false) | bool }}"
    target_commit: "{{ pb7_ref if use_pinned_ref else (pb7_commit | default('')) }}"
    remote_name: "{{ pb7_remote_name | default('origin') }}"
    remote_url: "{{ pb7_remote_url | default('') }}"
    selected_ref: "{{ target_commit if target_commit != '' else remote_name ~ '/' ~ source_branch }}"
    install_dir: "{{ install_dir | default(ansible_facts['env']['HOME'] + '/software') }}"
    pbgdir: "{{ install_dir }}/pbgui"
    pb7dir: "{{ install_dir }}/pb7"

  tasks:
    - name: display facts
      debug:
        var: ansible_facts
      tags: debug,never

    - name: Validate pinned PB7 commit when requested
      assert:
        that:
          - pb7_ref is match('^[0-9a-f]{40}$')
        fail_msg: "pb7_ref.txt must contain one exact lowercase 40-character commit SHA."
      when: use_pinned_ref

    - name: Ensure custom remote exists (optional)
      shell: |
        set -e
        if [ -n "{{ remote_url }}" ]; then
          if git remote get-url "{{ remote_name }}" >/dev/null 2>&1; then
            git remote set-url "{{ remote_name }}" "{{ remote_url }}"
          else
            git remote add "{{ remote_name }}" "{{ remote_url }}"
          fi
        fi
      args:
        chdir: "{{ pb7dir }}"
      changed_when: false

    - name: Fetch from selected remote
      command: git fetch "{{ remote_name }}"
      args:
        chdir: "{{ pb7dir }}"
      changed_when: false

    - name: Check for uncommitted changes (tracked files only)
      shell: git diff --name-only && git diff --cached --name-only
      args:
        chdir: "{{ pb7dir }}"
      register: git_status
      changed_when: false

    - name: Fail if uncommitted changes exist
      fail:
        msg: "Uncommitted changes detected in PB7. Please commit or stash changes before switching branches."
      when: git_status.stdout != ""

    - name: Check if source branch exists on selected remote
      command: git show-ref --verify --quiet "refs/remotes/{{ remote_name }}/{{ source_branch }}"
      args:
        chdir: "{{ pb7dir }}"
      register: source_branch_exists
      failed_when: false
      changed_when: false

    - name: Fail if source branch is missing on selected remote
      fail:
        msg: "Remote branch {{ remote_name }}/{{ source_branch }} does not exist. Please choose a valid source branch before switching PB7."
      when: source_branch_exists.rc != 0

    - name: Resolve selected PB7 ref to one immutable commit
      command: git rev-parse "{{ selected_ref }}^{commit}"
      args:
        chdir: "{{ pb7dir }}"
      register: resolved_commit
      changed_when: false

    - name: Verify selected commit is Passivbot v7 before checkout
      command:
        argv:
          - "{{ install_dir }}/venv_pbgui/bin/python"
          - "{{ pbgdir }}/pb7_guard.py"
          - --repo
          - "{{ pb7dir }}"
          - --ref
          - "{{ resolved_commit.stdout }}"
          - --expected-major
          - "7"
      register: pb7_preflight
      changed_when: false

    - name: Stop PBRun before changing PB7 checkout
      script: setup/vps_service_control.sh stop PBRun
      environment:
        PBGUI_DIR: "{{ pbgdir }}"
        PBGUI_PYTHON: "{{ install_dir }}/venv_pbgui/bin/python"
        PBGUI_USER: "{{ user }}"
      changed_when: false
      when: "'checkout_required=true' in pb7_preflight.stdout"

    - name: Stop PB7 processes before changing checkout
      command:
        argv:
          - "{{ install_dir }}/venv_pbgui/bin/python"
          - "{{ pbgdir }}/pb7_guard.py"
          - --repo
          - "{{ pb7dir }}"
          - --ref
          - "{{ resolved_commit.stdout }}"
          - --expected-major
          - "7"
          - --stop-processes
          - --venv
          - "{{ install_dir }}/venv_pb7"
      changed_when: false
      when: "'checkout_required=true' in pb7_preflight.stdout"

    - name: Checkout target branch directly at verified commit
      command: git checkout -B "{{ target_branch }}" "{{ resolved_commit.stdout }}"
      args:
        chdir: "{{ pb7dir }}"
      register: checkout_result
      notify: restart pb7

    - name: Set target branch upstream
      command: git branch --set-upstream-to "{{ remote_name }}/{{ source_branch }}" "{{ target_branch }}"
      args:
        chdir: "{{ pb7dir }}"
      changed_when: false

  handlers:
    - name: Stop PBRun before PB7 rebuild
      script: setup/vps_service_control.sh stop PBRun
      environment:
        PBGUI_DIR: "{{ pbgdir }}"
        PBGUI_PYTHON: "{{ install_dir }}/venv_pbgui/bin/python"
        PBGUI_USER: "{{ user }}"
      changed_when: false
      listen: "restart pb7"
      ignore_errors: yes

    - name: kill all pb7 processes
      shell: |
        pids="$({
          ps -ef | grep "{{ pb7dir }}/src/main.py" | grep -v grep | awk '{print $2}'
          ps -ef | grep "{{ install_dir }}/venv_pb7/bin/python" | grep -v grep | awk '{print $2}'
        } | sort -u)"
        if [ -n "$pids" ]; then
          kill $pids
        fi
      args:
        executable: /bin/bash
      changed_when: false
      listen: "restart pb7"
      ignore_errors: yes

    - name: Measure pb7 disk footprint before update
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        echo "free_mb=$(df -Pm '{{ install_dir }}' | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb '{{ install_dir }}/venv_pb7')"
        echo "rust_target_mb=$(path_mb '{{ install_dir }}/pb7/passivbot-rust/target')"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      register: pb7_disk_before
      changed_when: false
      listen: "restart pb7"

    - name: Install pb7 requirements
      pip:
        virtualenv: "{{ install_dir }}/venv_pb7"
        requirements: "{{ install_dir }}/pb7/requirements-live.txt"
        extra_args: --no-cache-dir
      environment:
        PIP_NO_CACHE_DIR: "1"
        PIP_DISABLE_PIP_VERSION_CHECK: "1"
      listen: "restart pb7"

    - name: Remove pip cache directory
      file:
        path: "{{ install_dir | dirname }}/.cache/pip"
        state: absent
      listen: "restart pb7"

    - name: Measure pb7 disk footprint after requirements install
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        echo "free_mb=$(df -Pm '{{ install_dir }}' | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb '{{ install_dir }}/venv_pb7')"
        echo "rust_target_mb=$(path_mb '{{ install_dir }}/pb7/passivbot-rust/target')"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      register: pb7_disk_after_deps
      changed_when: false
      listen: "restart pb7"

    - name: Build passivbot-rust with maturin
      shell: |
        source ~/.profile || source ~/.bashrc || true
        source "{{ install_dir }}/venv_pb7/bin/activate"
        maturin develop --release
      args:
        chdir: "{{ install_dir }}/pb7/passivbot-rust"
        executable: /bin/bash
      listen: "restart pb7"

    - name: Write rust source stamp after maturin build
      shell: |
        source "{{ install_dir }}/venv_pb7/bin/activate"
        python - <<'PY'
        import sys
        sys.path.insert(0, 'src')
        from rust_utils import stamp_compiled_extensions, source_fingerprint
        stamp_compiled_extensions(source_fingerprint())
        print('Rust source stamp updated.')
        PY
      args:
        chdir: "{{ install_dir }}/pb7"
        executable: /bin/bash
      listen: "restart pb7"

    - name: Measure pb7 disk footprint after Rust build
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        echo "free_mb=$(df -Pm '{{ install_dir }}' | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb '{{ install_dir }}/venv_pb7')"
        echo "rust_target_mb=$(path_mb '{{ install_dir }}/pb7/passivbot-rust/target')"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      register: pb7_disk_after_build
      changed_when: false
      listen: "restart pb7"

    - name: Remove rustup downloads directory
      file:
        path: "{{ install_dir | dirname }}/.rustup/downloads"
        state: absent
      listen: "restart pb7"

    - name: Remove rustup tmp directory
      file:
        path: "{{ install_dir | dirname }}/.rustup/tmp"
        state: absent
      listen: "restart pb7"

    - name: Measure pb7 disk footprint after cleanup
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        echo "free_mb=$(df -Pm '{{ install_dir }}' | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb '{{ install_dir }}/venv_pb7')"
        echo "rust_target_mb=$(path_mb '{{ install_dir }}/pb7/passivbot-rust/target')"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      register: pb7_disk_after_cleanup
      changed_when: false
      listen: "restart pb7"

    - name: Print pb7 disk usage summary
      debug:
        msg:
          - "before: {{ pb7_disk_before.stdout_lines | join(', ') }}"
          - "after_deps: {{ pb7_disk_after_deps.stdout_lines | join(', ') }}"
          - "after_build: {{ pb7_disk_after_build.stdout_lines | join(', ') }}"
          - "after_cleanup: {{ pb7_disk_after_cleanup.stdout_lines | join(', ') }}"
          - "usage_mb: deps={{ free_before_mb - free_after_deps_mb }}, build={{ free_after_deps_mb - free_after_build_mb }}, cleanup_reclaimed={{ free_after_cleanup_mb - free_after_build_mb }}, net={{ free_before_mb - free_after_cleanup_mb }}"
      vars:
        free_before_mb: "{{ (pb7_disk_before.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
        free_after_deps_mb: "{{ (pb7_disk_after_deps.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
        free_after_build_mb: "{{ (pb7_disk_after_build.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
        free_after_cleanup_mb: "{{ (pb7_disk_after_cleanup.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
      listen: "restart pb7"

    - name: Make sure PBRun ist running
      script: setup/vps_service_control.sh start PBRun
      environment:
        PBGUI_DIR: "{{ pbgdir }}"
        PBGUI_PYTHON: "{{ install_dir }}/venv_pbgui/bin/python"
        PBGUI_USER: "{{ user }}"
      listen: "restart pb7"
