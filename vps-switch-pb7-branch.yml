---
# Switch pb7 branch/commit on VPS
# Steps:
# 1. Fetch from origin
# 2. Check for uncommitted changes (fail if found)
# 3. Checkout specified branch
# 4. Optionally checkout specific commit (detached HEAD)
# 5. Pull if on branch HEAD (not detached)
# 6. Restart pbgui services

- hosts: "{{ hostname }}"
  gather_facts: yes

  vars:
    user: "{{ user }}"
    target_branch: "{{ pb7_branch }}"
    target_commit: "{{ pb7_commit | default('') }}"
    remote_name: "{{ pb7_remote_name | default('origin') }}"
    remote_url: "{{ pb7_remote_url | default('') }}"

  tasks:
    - name: display facts
      debug:
        var: ansible_facts
      tags: debug,never

    - name: get install_dir
      set_fact:
        install_dir: "{{ ansible_facts['env']['HOME'] + '/software' }}"
        pbgdir: "{{ ansible_facts['env']['HOME'] + '/software/pbgui' }}"
        pb7dir: "{{ ansible_facts['env']['HOME'] + '/software/pb7' }}"

    - name: Ensure custom remote exists (optional)
      shell: |
        set -e
        if [ -n "{{ remote_url }}" ]; then
          if git remote get-url "{{ remote_name }}" >/dev/null 2>&1; then
            git remote set-url "{{ remote_name }}" "{{ remote_url }}"
          else
            git remote add "{{ remote_name }}" "{{ remote_url }}"
          fi
        fi
      args:
        chdir: "{{ pb7dir }}"
      changed_when: false

    - name: Fetch from selected remote
      command: git fetch "{{ remote_name }}"
      args:
        chdir: "{{ pb7dir }}"
      changed_when: false

    - name: Check for uncommitted changes (tracked files only)
      shell: git diff --name-only && git diff --cached --name-only
      args:
        chdir: "{{ pb7dir }}"
      register: git_status
      changed_when: false

    - name: Fail if uncommitted changes exist
      fail:
        msg: "Uncommitted changes detected in PB7. Please commit or stash changes before switching branches."
      when: git_status.stdout != ""

    - name: Check if branch exists locally
      command: git rev-parse --verify "{{ target_branch }}"
      args:
        chdir: "{{ pb7dir }}"
      register: branch_exists
      failed_when: false
      changed_when: false

    - name: Create and checkout local branch from remote if it doesn't exist
      command: git checkout -b "{{ target_branch }}" --track "{{ remote_name }}/{{ target_branch }}"
      args:
        chdir: "{{ pb7dir }}"
      when: branch_exists.rc != 0
      notify: restart pb7

    - name: Checkout target branch (if already exists locally)
      command: git checkout "{{ target_branch }}"
      args:
        chdir: "{{ pb7dir }}"
      when: branch_exists.rc == 0
      notify: restart pb7

    - name: Reset to specific commit if provided (stays on branch)
      command: git reset --hard "{{ target_commit }}"
      args:
        chdir: "{{ pb7dir }}"
      when: target_commit != ""
      register: commit_reset
      notify: restart pb7

    - name: Reset to latest remote HEAD (only if no specific commit provided)
      command: git reset --hard "{{ remote_name }}/{{ target_branch }}"
      args:
        chdir: "{{ pb7dir }}"
      when: target_commit == ""
      notify: restart pb7

  handlers:
    - name: Measure pb7 disk footprint before update
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        echo "free_mb=$(df -Pm '{{ install_dir }}' | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb '{{ install_dir }}/venv_pb7')"
        echo "rust_target_mb=$(path_mb '{{ install_dir }}/pb7/passivbot-rust/target')"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      register: pb7_disk_before
      changed_when: false
      listen: "restart pb7"

    - name: Install pb7 requirements
      pip:
        virtualenv: "{{ install_dir }}/venv_pb7"
        requirements: "{{ install_dir }}/pb7/requirements-live.txt"
        extra_args: --no-cache-dir
      environment:
        PIP_NO_CACHE_DIR: "1"
        PIP_DISABLE_PIP_VERSION_CHECK: "1"
      listen: "restart pb7"

    - name: Remove pip cache directory
      file:
        path: "{{ install_dir | dirname }}/.cache/pip"
        state: absent
      listen: "restart pb7"

    - name: Measure pb7 disk footprint after requirements install
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        echo "free_mb=$(df -Pm '{{ install_dir }}' | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb '{{ install_dir }}/venv_pb7')"
        echo "rust_target_mb=$(path_mb '{{ install_dir }}/pb7/passivbot-rust/target')"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      register: pb7_disk_after_deps
      changed_when: false
      listen: "restart pb7"

    - name: Build passivbot-rust with maturin
      shell: |
        source ~/.profile || source ~/.bashrc || true
        source "{{ install_dir }}/venv_pb7/bin/activate"
        maturin develop --release
      args:
        chdir: "{{ install_dir }}/pb7/passivbot-rust"
        executable: /bin/bash
      listen: "restart pb7"

    - name: Measure pb7 disk footprint after Rust build
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        echo "free_mb=$(df -Pm '{{ install_dir }}' | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb '{{ install_dir }}/venv_pb7')"
        echo "rust_target_mb=$(path_mb '{{ install_dir }}/pb7/passivbot-rust/target')"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      register: pb7_disk_after_build
      changed_when: false
      listen: "restart pb7"

    - name: Remove rustup downloads directory
      file:
        path: "{{ install_dir | dirname }}/.rustup/downloads"
        state: absent
      listen: "restart pb7"

    - name: Remove rustup tmp directory
      file:
        path: "{{ install_dir | dirname }}/.rustup/tmp"
        state: absent
      listen: "restart pb7"

    - name: Measure pb7 disk footprint after cleanup
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        echo "free_mb=$(df -Pm '{{ install_dir }}' | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb '{{ install_dir }}/venv_pb7')"
        echo "rust_target_mb=$(path_mb '{{ install_dir }}/pb7/passivbot-rust/target')"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      register: pb7_disk_after_cleanup
      changed_when: false
      listen: "restart pb7"

    - name: Print pb7 disk usage summary
      debug:
        msg:
          - "before: {{ pb7_disk_before.stdout_lines | join(', ') }}"
          - "after_deps: {{ pb7_disk_after_deps.stdout_lines | join(', ') }}"
          - "after_build: {{ pb7_disk_after_build.stdout_lines | join(', ') }}"
          - "after_cleanup: {{ pb7_disk_after_cleanup.stdout_lines | join(', ') }}"
          - "usage_mb: deps={{ free_before_mb - free_after_deps_mb }}, build={{ free_after_deps_mb - free_after_build_mb }}, cleanup_reclaimed={{ free_after_cleanup_mb - free_after_build_mb }}, net={{ free_before_mb - free_after_cleanup_mb }}"
      vars:
        free_before_mb: "{{ (pb7_disk_before.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
        free_after_deps_mb: "{{ (pb7_disk_after_deps.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
        free_after_build_mb: "{{ (pb7_disk_after_build.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
        free_after_cleanup_mb: "{{ (pb7_disk_after_cleanup.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
      listen: "restart pb7"

    - name: kill all pb7 processes
      shell: |
        pids="$(ps -ef | grep "{{ pb7dir }}/src/main.py" | grep -v grep | awk '{print $2}')"
        if [ -n "$pids" ]; then
          kill $pids
        fi
      args:
        executable: /bin/bash
      changed_when: false
      listen: "restart pb7"
      ignore_errors: yes

    - name: Make sure PBRun ist running
      shell: |
        source "{{ install_dir }}/venv_pbgui/bin/activate"
        python "{{ pbgdir }}/starter.py" -s PBRun
      args:
        executable: /bin/bash
        chdir: "{{ pbgdir }}"
      listen: "restart pb7"
