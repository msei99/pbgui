---
# Update pbgui and pb7
# Steps:
# 1. Clone pbgui repository
# 2. Sync PBGui systemd units and restart PBCluster, PBRun, PBCoinData and PBMonitorAgent if pbgui repository was updated
# 3. Clone passivbot repository for pb7
# 4. Restart all pb7 bots if pb7 repository was updated

- hosts: "{{ hostname }}"
  gather_facts: yes
  force_handlers: true

  vars:
    # ansible_ssh_pass: "{{ user_pw }}"
    # ansible_become_password: "{{ user_pw }}"
    # user_pw: "{{ user_pw }}"
    install_dir: "{{ install_dir | default(ansible_facts['env']['HOME'] + '/software') }}"
    pb7_ref: "{{ lookup('file', playbook_dir + '/pb7_ref.txt') | trim }}"

  tasks:
    - name: display facts
      debug:
        var: ansible_facts
      tags: debug,never

    - name: Measure pb7 disk footprint at playbook start
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        install_dir="$PBGUI_INSTALL_DIR"
        echo "free_mb=$(df -Pm "$install_dir" | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb "$install_dir/venv_pb7")"
        echo "rust_target_mb=$(path_mb "$install_dir/pb7/passivbot-rust/target")"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      environment:
        PBGUI_INSTALL_DIR: "{{ install_dir }}"
      register: pb7_disk_playbook_start
      changed_when: false

    - name: remove stable toolchain if exists
      shell: |
        source ~/.profile || source ~/.bashrc || true
        rustup toolchain uninstall stable 1.78.0
      args:
        executable: /bin/bash
      ignore_errors: yes

    - name: Update rust
      shell: |
        source ~/.profile || source ~/.bashrc || true
        rustup update 1.90.0
      args:
        executable: /bin/bash
      register: update_rust

    - name: print update_rust
      debug:
        var: update_rust
      tags: debug,never

    - name: Measure pb7 disk footprint after rust update
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        install_dir="$PBGUI_INSTALL_DIR"
        echo "free_mb=$(df -Pm "$install_dir" | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb "$install_dir/venv_pb7")"
        echo "rust_target_mb=$(path_mb "$install_dir/pb7/passivbot-rust/target")"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      environment:
        PBGUI_INSTALL_DIR: "{{ install_dir }}"
      register: pb7_disk_after_rust_update
      changed_when: false

    - name: Get current pbgui branch
      command: git rev-parse --abbrev-ref HEAD
      args:
        chdir: "{{ install_dir }}/pbgui"
      register: current_pbgui_branch
      changed_when: false

    - name: clone pbgui repository
      git:
        repo: https://github.com/msei99/pbgui.git
        dest: "{{ install_dir }}/pbgui"
        version: "{{ current_pbgui_branch.stdout }}"
        refspec: "+refs/heads/{{ current_pbgui_branch.stdout }}:refs/remotes/origin/{{ current_pbgui_branch.stdout }}"
        update: yes
        force: yes
      register: pbgui_repo

    - name: Reconcile pbgui requirements
      pip:
        virtualenv: "{{ install_dir }}/venv_pbgui"
        requirements: "{{ install_dir }}/pbgui/requirements_vps.txt"
        extra_args: --no-cache-dir --upgrade pip
      environment:
        PIP_NO_CACHE_DIR: "1"
        PIP_DISABLE_PIP_VERSION_CHECK: "1"
      register: pbgui_requirements

    - name: Schedule PBGui restart after successful update
      command: /bin/true
      changed_when: (pbgui_repo.changed | default(false)) or (pbgui_requirements.changed | default(false))
      notify: restart pbgui

    - name: print pbgui_repo
      debug:
        var: pbgui_repo
      tags: debug,never

    - name: Build enabled PBGui service list
      set_fact:
        pbgui_credential_capability_known: "{{ credential_active is defined and credential_active is not none }}"
        pbgui_enabled_services: "{{ ['pbcluster', 'pbrun', 'monitor-agent'] + (['pbcoindata'] if (credential_active | default(false) | default(false, true)) else []) + (['api'] if (pbgui_role | default('') | lower) == 'master' else []) }}"

    - name: Reconcile PBGui systemd user services
      command:
        argv: "{{ ['/bin/bash', install_dir + '/pbgui/setup/setup_systemd.sh', '--user', user, '--pbgui-dir', install_dir + '/pbgui', '--python', install_dir + '/venv_pbgui/bin/python', '--enable', pbgui_enabled_services | join(',')] + (['--no-start'] if (pbgui_role | default('') | string | lower) == 'master' else []) + ([] if pbgui_credential_capability_known else ['--no-disable-excluded']) }}"
      register: systemd_reconcile_result
      changed_when: "'changed=true' in (systemd_reconcile_result.stdout | default(''))"

    - name: Check whether master monitor-agent needs recovery
      command:
        argv:
          - systemctl
          - --user
          - is-active
          - --quiet
          - pbgui-monitor-agent.service
      register: monitor_agent_before
      changed_when: false
      failed_when: false
      when: (pbgui_role | default('') | string | lower) == 'master'

    - name: Recover and verify master monitor-agent without touching PBApiServer
      script: setup/vps_service_control.sh start PBMonitorAgent
      environment:
        PBGUI_DIR: "{{ install_dir }}/pbgui"
        PBGUI_PYTHON: "{{ install_dir }}/venv_pbgui/bin/python"
        PBGUI_USER: "{{ user }}"
      register: monitor_agent_recovery
      changed_when: monitor_agent_before.rc != 0
      when: (pbgui_role | default('') | string | lower) == 'master'

    - name: Validate pinned PB7 commit
      assert:
        that:
          - pb7_ref is match('^[0-9a-f]{40}$')
        fail_msg: "pb7_ref.txt must contain one exact lowercase 40-character commit SHA."

    - name: Fetch and verify pinned Passivbot v7
      command:
        argv:
          - "{{ install_dir }}/venv_pbgui/bin/python"
          - "{{ install_dir }}/pbgui/pb7_guard.py"
          - --repo
          - "{{ install_dir }}/pb7"
          - --ref
          - "{{ pb7_ref }}"
          - --expected-major
          - "7"
          - --fetch-url
          - https://github.com/enarjord/passivbot.git
      register: pb7_preflight
      changed_when: false

    - name: Stop PBRun before changing PB7 checkout
      script: setup/vps_service_control.sh stop PBRun
      environment:
        PBGUI_DIR: "{{ install_dir }}/pbgui"
        PBGUI_PYTHON: "{{ install_dir }}/venv_pbgui/bin/python"
        PBGUI_USER: "{{ user }}"
      changed_when: false
      when: "'checkout_required=true' in pb7_preflight.stdout"

    - name: Stop PB7 processes before changing checkout
      command:
        argv:
          - "{{ install_dir }}/venv_pbgui/bin/python"
          - "{{ install_dir }}/pbgui/pb7_guard.py"
          - --repo
          - "{{ install_dir }}/pb7"
          - --ref
          - "{{ pb7_ref }}"
          - --expected-major
          - "7"
          - --stop-processes
          - --venv
          - "{{ install_dir }}/venv_pb7"
      changed_when: false
      when: "'checkout_required=true' in pb7_preflight.stdout"

    - name: Checkout verified pinned Passivbot v7
      command:
        argv:
          - "{{ install_dir }}/venv_pbgui/bin/python"
          - "{{ install_dir }}/pbgui/pb7_guard.py"
          - --repo
          - "{{ install_dir }}/pb7"
          - --ref
          - "{{ pb7_ref }}"
          - --expected-major
          - "7"
          - --checkout
      register: pb7_repo
      changed_when: "'checkout_changed=true' in pb7_repo.stdout"
      notify: restart pb7

    - name: print pb7_repo
      debug:
        var: pb7_repo
      tags: debug,never

  handlers:
    - name: Measure pb7 disk footprint before update
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        echo "free_mb=$(df -Pm "$PBGUI_INSTALL_DIR" | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb "$PBGUI_INSTALL_DIR/venv_pb7")"
        echo "rust_target_mb=$(path_mb "$PBGUI_INSTALL_DIR/pb7/passivbot-rust/target")"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      environment:
        PBGUI_INSTALL_DIR: "{{ install_dir }}"
      register: pb7_disk_before
      changed_when: false
      listen: "restart pb7"

    - name: Remove pip cache directory after pbgui install
      file:
        path: "{{ install_dir | dirname }}/.cache/pip"
        state: absent
      listen: "restart pbgui"

    - name: Ensure PBCluster SSH key exists
      command:
        argv:
          - "{{ install_dir }}/venv_pbgui/bin/python"
          - "{{ install_dir }}/pbgui/cluster_ssh_setup.py"
          - ensure-local
          - --pbgdir
          - "{{ install_dir }}/pbgui"
      register: cluster_sync_key_setup
      changed_when: "'\"created\": true' in cluster_sync_key_setup.stdout"
      listen: "restart pbgui"

    - name: Install master PBCluster authorized key
      command:
        argv:
          - "{{ install_dir }}/venv_pbgui/bin/python"
          - "{{ install_dir }}/pbgui/cluster_ssh_setup.py"
          - install-authorized-key
          - --pbgdir
          - "{{ install_dir }}/pbgui"
          - --source-node
          - "{{ cluster_sync_source_node_id }}"
          - --source-public-key
          - "{{ cluster_sync_source_public_key }}"
      register: cluster_sync_authorized_key
      changed_when: "'\"changed\": true' in cluster_sync_authorized_key.stdout"
      when: (cluster_sync_source_node_id | default('') | string | length) > 0 and (cluster_sync_source_public_key | default('') | string | length) > 0
      listen: "restart pbgui"

    - name: Sync PBGui systemd user services
      command:
        argv: "{{ ['/bin/bash', install_dir + '/pbgui/setup/setup_systemd.sh', '--user', user, '--pbgui-dir', install_dir + '/pbgui', '--python', install_dir + '/venv_pbgui/bin/python', '--enable', pbgui_enabled_services | join(','), '--no-start'] + ([] if pbgui_credential_capability_known else ['--no-disable-excluded']) }}"
      register: systemd_setup_result
      changed_when: "'changed=true' in (systemd_setup_result.stdout | default(''))"
      listen: "restart pbgui"

    - name: Restart PBCluster, PBCoinData and PBMonitorAgent
      script: setup/vps_service_control.sh restart PBCluster PBCoinData PBMonitorAgent
      environment:
        PBGUI_DIR: "{{ install_dir }}/pbgui"
        PBGUI_PYTHON: "{{ install_dir }}/venv_pbgui/bin/python"
        PBGUI_USER: "{{ user }}"
        PBGUI_CREDENTIAL_ACTIVE: "{{ credential_active | default('', true) }}"
      register: pbgui_process_health
      retries: 8
      delay: 3
      until: pbgui_process_health.rc == 0
      listen: "restart pbgui"

    - name: Restart PBRun after PBGui-only update
      script: setup/vps_service_control.sh restart PBRun
      environment:
        PBGUI_DIR: "{{ install_dir }}/pbgui"
        PBGUI_PYTHON: "{{ install_dir }}/venv_pbgui/bin/python"
        PBGUI_USER: "{{ user }}"
      when: not (pb7_repo.changed | default(false))
      listen: "restart pbgui"

    - name: Restart remote master PBApiServer
      shell: |
        set -euo pipefail
        restart_unit="pbgui-api-restart-$(date +%s%N)"
        systemd-run --user --unit="$restart_unit" --collect /bin/bash -c '
          sleep 1
          systemctl --user enable pbgui-api.service
          if ! systemctl --user restart pbgui-api.service; then
            systemctl --user show pbgui-api.service --no-pager --property=ActiveState,SubState,Result,ExecMainStatus,NRestarts
            systemctl --user status pbgui-api.service --no-pager -l
            exit 1
          fi
          baseline="$(systemctl --user show pbgui-api.service --property=NRestarts --value)"
          case "$baseline" in ""|*[!0-9]*) baseline=0 ;; esac
          sleep 12
          active="$(systemctl --user show pbgui-api.service --property=ActiveState --value)"
          sub="$(systemctl --user show pbgui-api.service --property=SubState --value)"
          result="$(systemctl --user show pbgui-api.service --property=Result --value)"
          status="$(systemctl --user show pbgui-api.service --property=ExecMainStatus --value)"
          after="$(systemctl --user show pbgui-api.service --property=NRestarts --value)"
          case "$after" in ""|*[!0-9]*) after=0 ;; esac
          if [ "$active" != active ] || [ "$sub" != running ] || [ "$result" != success ] || [ "${status:-0}" != 0 ] || [ "$after" -gt "$baseline" ]; then
            systemctl --user show pbgui-api.service --no-pager --property=ActiveState,SubState,Result,ExecMainStatus,NRestarts
            systemctl --user status pbgui-api.service --no-pager -l
            exit 1
          fi
        '
      args:
        executable: /bin/bash
      changed_when: true
      when: (pbgui_role | default('') | string | lower) == 'master'
      listen: "restart pbgui"

    - name: Stop PBRun before PB7 rebuild
      script: setup/vps_service_control.sh stop PBRun
      environment:
        PBGUI_DIR: "{{ install_dir }}/pbgui"
        PBGUI_PYTHON: "{{ install_dir }}/venv_pbgui/bin/python"
        PBGUI_USER: "{{ user }}"
      changed_when: false
      listen: "restart pb7"
      ignore_errors: yes

    - name: kill all pb7 processes
      command:
        argv:
          - "{{ install_dir }}/venv_pbgui/bin/python"
          - "{{ install_dir }}/pbgui/pb7_guard.py"
          - --repo
          - "{{ install_dir }}/pb7"
          - --ref
          - "{{ pb7_ref }}"
          - --expected-major
          - "7"
          - --stop-processes
          - --venv
          - "{{ install_dir }}/venv_pb7"
      changed_when: false
      listen: "restart pb7"
      ignore_errors: yes

    - name: Install pb7 requirements
      pip:
        virtualenv: "{{ install_dir }}/venv_pb7"
        requirements: "{{ install_dir }}/pb7/requirements-live.txt"
        extra_args: --no-cache-dir
      environment:
        PIP_NO_CACHE_DIR: "1"
        PIP_DISABLE_PIP_VERSION_CHECK: "1"
      listen: "restart pb7"

    - name: Remove pip cache directory after pb7 install
      file:
        path: "{{ install_dir | dirname }}/.cache/pip"
        state: absent
      listen: "restart pb7"

    - name: Measure pb7 disk footprint after requirements install
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        echo "free_mb=$(df -Pm "$PBGUI_INSTALL_DIR" | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb "$PBGUI_INSTALL_DIR/venv_pb7")"
        echo "rust_target_mb=$(path_mb "$PBGUI_INSTALL_DIR/pb7/passivbot-rust/target")"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      environment:
        PBGUI_INSTALL_DIR: "{{ install_dir }}"
      register: pb7_disk_after_deps
      changed_when: false
      listen: "restart pb7"

    - name: Build passivbot-rust with maturin
      command:
        argv:
          - "{{ install_dir }}/venv_pb7/bin/maturin"
          - develop
          - --release
      args:
        chdir: "{{ install_dir }}/pb7/passivbot-rust"
      register: maturin_result
      listen: "restart pb7"

    - name: Write rust source stamp after maturin build
      command:
        argv:
          - "{{ install_dir }}/venv_pb7/bin/python"
          - -c
          - |
            import sys
            sys.path.insert(0, 'src')
            from rust_utils import stamp_compiled_extensions, source_fingerprint
            stamp_compiled_extensions(source_fingerprint())
            print('Rust source stamp updated.')
      args:
        chdir: "{{ install_dir }}/pb7"
      listen: "restart pb7"

    - name: Measure pb7 disk footprint after Rust build
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        echo "free_mb=$(df -Pm "$PBGUI_INSTALL_DIR" | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb "$PBGUI_INSTALL_DIR/venv_pb7")"
        echo "rust_target_mb=$(path_mb "$PBGUI_INSTALL_DIR/pb7/passivbot-rust/target")"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      environment:
        PBGUI_INSTALL_DIR: "{{ install_dir }}"
      register: pb7_disk_after_build
      changed_when: false
      listen: "restart pb7"

    - name: Remove rustup downloads directory after pb7 build
      file:
        path: "{{ install_dir | dirname }}/.rustup/downloads"
        state: absent
      listen: "restart pb7"

    - name: Remove rustup tmp directory after pb7 build
      file:
        path: "{{ install_dir | dirname }}/.rustup/tmp"
        state: absent
      listen: "restart pb7"

    - name: Measure pb7 disk footprint after cleanup
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        echo "free_mb=$(df -Pm "$PBGUI_INSTALL_DIR" | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb "$PBGUI_INSTALL_DIR/venv_pb7")"
        echo "rust_target_mb=$(path_mb "$PBGUI_INSTALL_DIR/pb7/passivbot-rust/target")"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      environment:
        PBGUI_INSTALL_DIR: "{{ install_dir }}"
      register: pb7_disk_after_cleanup
      changed_when: false
      listen: "restart pb7"

    - name: Print pb7 disk usage summary
      debug:
        msg:
          - "playbook_start: {{ pb7_disk_playbook_start.stdout_lines | join(', ') }}"
          - "after_rust_update: {{ pb7_disk_after_rust_update.stdout_lines | join(', ') }}"
          - "before_pb7_handlers: {{ pb7_disk_before.stdout_lines | join(', ') }}"
          - "after_deps: {{ pb7_disk_after_deps.stdout_lines | join(', ') }}"
          - "after_build: {{ pb7_disk_after_build.stdout_lines | join(', ') }}"
          - "after_cleanup: {{ pb7_disk_after_cleanup.stdout_lines | join(', ') }}"
          - "usage_mb: rustup_update={{ free_playbook_start_mb - free_after_rust_update_mb }}, pre_handler={{ free_after_rust_update_mb - free_before_mb }}, deps={{ free_before_mb - free_after_deps_mb }}, build={{ free_after_deps_mb - free_after_build_mb }}, cleanup_reclaimed={{ free_after_cleanup_mb - free_after_build_mb }}, net_from_start={{ free_playbook_start_mb - free_after_cleanup_mb }}"
      vars:
        free_playbook_start_mb: "{{ (pb7_disk_playbook_start.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
        free_after_rust_update_mb: "{{ (pb7_disk_after_rust_update.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
        free_before_mb: "{{ (pb7_disk_before.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
        free_after_deps_mb: "{{ (pb7_disk_after_deps.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
        free_after_build_mb: "{{ (pb7_disk_after_build.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
        free_after_cleanup_mb: "{{ (pb7_disk_after_cleanup.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
      listen: "restart pb7"

    - name: Make sure PBRun ist running
      script: setup/vps_service_control.sh start PBRun
      environment:
        PBGUI_DIR: "{{ install_dir }}/pbgui"
        PBGUI_PYTHON: "{{ install_dir }}/venv_pbgui/bin/python"
        PBGUI_USER: "{{ user }}"
      listen: "restart pb7"
