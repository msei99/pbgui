---
# Update pbgui and pb7
# Steps:
# 1. Clone pbgui repository
# 2. Restart PBRun, PBRemote and PBCoinData if pbgui repository was updated
# 3. Clone passivbot repository for pb7
# 4. Restart all pb7 bots if pb7 repository was updated

- hosts: "{{ hostname }}"
  gather_facts: yes

  vars:
    # ansible_ssh_pass: "{{ user_pw }}"
    # ansible_become_password: "{{ user_pw }}"
    user: "{{ user }}"
    # user_pw: "{{ user_pw }}"

  tasks:
    - name: display facts
      debug:
        var: ansible_facts
      tags: debug,never

    - name: Measure pb7 disk footprint at playbook start
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        install_dir="{{ ansible_facts['env']['HOME'] }}/software"
        echo "free_mb=$(df -Pm "$install_dir" | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb "$install_dir/venv_pb7")"
        echo "rust_target_mb=$(path_mb "$install_dir/pb7/passivbot-rust/target")"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      register: pb7_disk_playbook_start
      changed_when: false

    - name: remove stable toolchain if exists
      shell: |
        source ~/.profile || source ~/.bashrc || true
        rustup toolchain uninstall stable 1.78.0
      args:
        executable: /bin/bash
      ignore_errors: yes

    - name: Update rust
      shell: |
        source ~/.profile || source ~/.bashrc || true
        rustup update 1.90.0
      args:
        executable: /bin/bash
      register: update_rust

    - name: print update_rust
      debug:
        var: update_rust
      tags: debug,never

    - name: Measure pb7 disk footprint after rust update
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        install_dir="{{ ansible_facts['env']['HOME'] }}/software"
        echo "free_mb=$(df -Pm "$install_dir" | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb "$install_dir/venv_pb7")"
        echo "rust_target_mb=$(path_mb "$install_dir/pb7/passivbot-rust/target")"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      register: pb7_disk_after_rust_update
      changed_when: false

    - name: get install_dir
      set_fact:
        install_dir: "{{ ansible_facts['env']['HOME'] + '/software' }}"

    - name: Get current pbgui branch
      command: git rev-parse --abbrev-ref HEAD
      args:
        chdir: "{{ install_dir }}/pbgui"
      register: current_pbgui_branch
      changed_when: false

    - name: clone pbgui repository
      git:
        repo: https://github.com/msei99/pbgui.git
        dest: "{{ install_dir }}/pbgui"
        version: "{{ current_pbgui_branch.stdout }}"
        update: yes
        force: yes
      register: pbgui_repo
      notify: restart pbgui

    - name: print pbgui_repo
      debug:
        var: pbgui_repo
      tags: debug,never

    # --- PB6 cleanup: remove pb6 if still installed ---
    - name: Check if pb6 directory exists
      stat:
        path: "{{ install_dir }}/pb6"
      register: pb6_dir

    - name: Check if pb6 venv exists
      stat:
        path: "{{ install_dir }}/venv_pb6"
      register: pb6_venv

    - name: Kill all running pb6 processes
      shell: |
        pids="$(ps -ef | grep "{{ install_dir }}/pb6/passivbot" | grep -v grep | awk '{print $2}')"
        if [ -n "$pids" ]; then
          echo "Killing pb6 processes: $pids"
          kill $pids
        else
          echo "No pb6 processes running"
        fi
      args:
        executable: /bin/bash
      changed_when: false
      ignore_errors: yes
      when: pb6_dir.stat.exists

    - name: Remove pb6 directory
      file:
        path: "{{ install_dir }}/pb6"
        state: absent
      when: pb6_dir.stat.exists

    - name: Remove pb6 venv
      file:
        path: "{{ install_dir }}/venv_pb6"
        state: absent
      when: pb6_venv.stat.exists

    - name: Remove pb6 entries from pbgui.ini
      lineinfile:
        path: "{{ install_dir }}/pbgui/pbgui.ini"
        regexp: 'pb6'
        state: absent
      when: pb6_dir.stat.exists or pb6_venv.stat.exists

    - name: Get current pb7 branch
      command: git rev-parse --abbrev-ref HEAD
      args:
        chdir: "{{ install_dir }}/pb7"
      register: current_pb7_branch
      changed_when: false

    - name: clone passivbot repository for pb7
      git:
        repo: https://github.com/enarjord/passivbot.git
        dest: "{{ install_dir }}/pb7"
        version: "{{ current_pb7_branch.stdout }}"
        update: yes
        force: yes
      register: pb7_repo
      notify: restart pb7

    - name: print pb7_repo
      debug:
        var: pb7_repo
      tags: debug,never

  handlers:
    - name: Measure pb7 disk footprint before update
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        echo "free_mb=$(df -Pm '{{ install_dir }}' | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb '{{ install_dir }}/venv_pb7')"
        echo "rust_target_mb=$(path_mb '{{ install_dir }}/pb7/passivbot-rust/target')"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      register: pb7_disk_before
      changed_when: false
      listen: "restart pb7"

    - name: Install pbgui requirements
      pip:
        virtualenv: "{{ install_dir }}/venv_pbgui"
        requirements: "{{ install_dir }}/pbgui/requirements_vps.txt"
        extra_args: --no-cache-dir --upgrade pip
      environment:
        PIP_NO_CACHE_DIR: "1"
        PIP_DISABLE_PIP_VERSION_CHECK: "1"
      listen: "restart pbgui"

    - name: Remove pip cache directory after pbgui install
      file:
        path: "{{ install_dir | dirname }}/.cache/pip"
        state: absent
      listen: "restart pbgui"

    - name: Restart PBRun, PBRemote and PBCoinData
      shell: |
        source "{{ install_dir }}/venv_pbgui/bin/activate"
        python "{{ install_dir }}/pbgui/starter.py" -r PBRun PBRemote PBCoinData
      args:
        executable: /bin/bash
        chdir: "{{ install_dir }}/pbgui"
      listen: "restart pbgui"

    - name: Verify PBRun PBRemote and PBCoinData are running
      shell: |
        source "{{ install_dir }}/venv_pbgui/bin/activate"
        missing=0
        for proc in PBRun.py PBRemote.py PBCoinData.py; do
          if ! pgrep -f "{{ install_dir }}/pbgui/${proc}" >/dev/null; then
            echo "Missing process: ${proc}"
            python "{{ install_dir }}/pbgui/starter.py" -s "${proc%.py}" || true
            missing=1
          fi
        done
        if [ "$missing" -ne 0 ]; then
          echo "--- PBRun.log tail ---"
          tail -n 40 "{{ install_dir }}/pbgui/data/logs/PBRun.log" || true
          echo "--- PBRemote.log tail ---"
          tail -n 40 "{{ install_dir }}/pbgui/data/logs/PBRemote.log" || true
          echo "--- PBCoinData.log tail ---"
          tail -n 40 "{{ install_dir }}/pbgui/data/logs/PBCoinData.log" || true
          exit 1
        fi
      args:
        executable: /bin/bash
        chdir: "{{ install_dir }}/pbgui"
      register: pbgui_process_health
      retries: 8
      delay: 3
      until: pbgui_process_health.rc == 0
      listen: "restart pbgui"

    - name: Install pb7 requirements
      pip:
        virtualenv: "{{ install_dir }}/venv_pb7"
        requirements: "{{ install_dir }}/pb7/requirements-live.txt"
        extra_args: --no-cache-dir
      environment:
        PIP_NO_CACHE_DIR: "1"
        PIP_DISABLE_PIP_VERSION_CHECK: "1"
      listen: "restart pb7"

    - name: Remove pip cache directory after pb7 install
      file:
        path: "{{ install_dir | dirname }}/.cache/pip"
        state: absent
      listen: "restart pb7"

    - name: Measure pb7 disk footprint after requirements install
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        echo "free_mb=$(df -Pm '{{ install_dir }}' | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb '{{ install_dir }}/venv_pb7')"
        echo "rust_target_mb=$(path_mb '{{ install_dir }}/pb7/passivbot-rust/target')"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      register: pb7_disk_after_deps
      changed_when: false
      listen: "restart pb7"

    - name: Build passivbot-rust with maturin
      shell: |
        source ~/.profile || source ~/.bashrc || true
        source "{{ install_dir }}/venv_pb7/bin/activate"
        maturin develop --release
      args:
        chdir: "{{ install_dir }}/pb7/passivbot-rust"
        executable: /bin/bash
      register: maturin_result
      listen: "restart pb7"

    - name: Measure pb7 disk footprint after Rust build
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        echo "free_mb=$(df -Pm '{{ install_dir }}' | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb '{{ install_dir }}/venv_pb7')"
        echo "rust_target_mb=$(path_mb '{{ install_dir }}/pb7/passivbot-rust/target')"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      register: pb7_disk_after_build
      changed_when: false
      listen: "restart pb7"

    - name: Remove rustup downloads directory after pb7 build
      file:
        path: "{{ install_dir | dirname }}/.rustup/downloads"
        state: absent
      listen: "restart pb7"

    - name: Remove rustup tmp directory after pb7 build
      file:
        path: "{{ install_dir | dirname }}/.rustup/tmp"
        state: absent
      listen: "restart pb7"

    - name: Measure pb7 disk footprint after cleanup
      shell: |
        path_mb() {
          if [ -e "$1" ]; then
            du -sm "$1" 2>/dev/null | awk '{print $1}'
          else
            echo 0
          fi
        }
        echo "free_mb=$(df -Pm '{{ install_dir }}' | awk 'NR==2 {print $4}')"
        echo "venv_pb7_mb=$(path_mb '{{ install_dir }}/venv_pb7')"
        echo "rust_target_mb=$(path_mb '{{ install_dir }}/pb7/passivbot-rust/target')"
        echo rustup_downloads_mb="$(path_mb "$HOME/.rustup/downloads")"
        echo rustup_tmp_mb="$(path_mb "$HOME/.rustup/tmp")"
      args:
        executable: /bin/bash
      register: pb7_disk_after_cleanup
      changed_when: false
      listen: "restart pb7"

    - name: Print pb7 disk usage summary
      debug:
        msg:
          - "playbook_start: {{ pb7_disk_playbook_start.stdout_lines | join(', ') }}"
          - "after_rust_update: {{ pb7_disk_after_rust_update.stdout_lines | join(', ') }}"
          - "before_pb7_handlers: {{ pb7_disk_before.stdout_lines | join(', ') }}"
          - "after_deps: {{ pb7_disk_after_deps.stdout_lines | join(', ') }}"
          - "after_build: {{ pb7_disk_after_build.stdout_lines | join(', ') }}"
          - "after_cleanup: {{ pb7_disk_after_cleanup.stdout_lines | join(', ') }}"
          - "usage_mb: rustup_update={{ free_playbook_start_mb - free_after_rust_update_mb }}, pre_handler={{ free_after_rust_update_mb - free_before_mb }}, deps={{ free_before_mb - free_after_deps_mb }}, build={{ free_after_deps_mb - free_after_build_mb }}, cleanup_reclaimed={{ free_after_cleanup_mb - free_after_build_mb }}, net_from_start={{ free_playbook_start_mb - free_after_cleanup_mb }}"
      vars:
        free_playbook_start_mb: "{{ (pb7_disk_playbook_start.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
        free_after_rust_update_mb: "{{ (pb7_disk_after_rust_update.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
        free_before_mb: "{{ (pb7_disk_before.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
        free_after_deps_mb: "{{ (pb7_disk_after_deps.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
        free_after_build_mb: "{{ (pb7_disk_after_build.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
        free_after_cleanup_mb: "{{ (pb7_disk_after_cleanup.stdout | regex_findall('free_mb=(\\d+)') | first | default('0')) | int }}"
      listen: "restart pb7"

    - name: kill all pb7 processes
      shell: |
        pids="$(ps -ef | grep "{{ install_dir }}/pb7/src/main.py" | grep -v grep | awk '{print $2}')"
        if [ -n "$pids" ]; then
          kill $pids
        fi
      args:
        executable: /bin/bash
      changed_when: false
      listen: "restart pb7"
      ignore_errors: yes
    
    - name: Make sure PBRun ist running
      shell: |
        source "{{ install_dir }}/venv_pbgui/bin/activate"
        python "{{ install_dir }}/pbgui/starter.py" -s PBRun
      args:
        executable: /bin/bash
        chdir: "{{ install_dir }}/pbgui"
      listen: "restart pb7"
