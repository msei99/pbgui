---
# Migrate an existing VPS from legacy start.sh/crontab startup to systemd user services.

- hosts: "{{ hostname }}"
  gather_facts: yes

  vars:
    ansible_ssh_pass: "{{ user_pw }}"
    ansible_become_password: "{{ user_pw }}"
    user: "{{ user }}"
    install_dir: "{{ install_dir | default(ansible_facts['env']['HOME'] + '/software') }}"
    pbgui_dir: "{{ install_dir }}/pbgui"
    python_bin: "{{ install_dir }}/venv_pbgui/bin/python"
    all_systemd_units:
      - pbgui-pbrun.service
      - pbgui-pbremote.service
      - pbgui-pbcoindata.service

  tasks:
    - name: display facts
      debug:
        var: ansible_facts
      tags: debug,never

    - name: check PBGui directory
      stat:
        path: "{{ pbgui_dir }}"
      register: pbgui_dir_stat

    - name: fail when PBGui directory is missing
      fail:
        msg: "PBGui directory not found at {{ pbgui_dir }}"
      when: not pbgui_dir_stat.stat.isdir

    - name: check PBGui venv Python
      stat:
        path: "{{ python_bin }}"
      register: python_bin_stat

    - name: fail when PBGui venv Python is missing
      fail:
        msg: "PBGui virtualenv Python not found at {{ python_bin }}"
      when: not python_bin_stat.stat.exists

    - name: ensure PBGui setup directory exists
      file:
        path: "{{ pbgui_dir }}/setup"
        state: directory
        mode: "0755"

    - name: read PBGui optional service config
      shell: |
        PBGUI_CONFIG_PATH={{ pbgui_dir | quote }}/pbgui.ini python3 - <<'PY'
        import configparser
        import os

        config = configparser.ConfigParser()
        config.read(os.environ.get('PBGUI_CONFIG_PATH') or '')

        def configured(value):
            normalized = str(value or '').strip()
            lowered = normalized.lower()
            if not normalized or lowered in {'none', 'null', 'false', '<api_key>', '<bucket_name>', '<bucket_name>:'}:
                return False
            return not normalized.startswith('<')

        print('pbremote_configured=' + ('yes' if configured(config.get('pbremote', 'bucket', fallback='')) else 'no'))
        print('coindata_configured=' + ('yes' if configured(config.get('coinmarketcap', 'api_key', fallback='')) else 'no'))
        PY
      args:
        executable: /bin/bash
      register: optional_service_config
      changed_when: false

    - name: build enabled PBGui migration service list
      set_fact:
        pbgui_pbremote_configured: "{{ 'pbremote_configured=yes' in optional_service_config.stdout_lines }}"
        pbgui_coindata_configured: "{{ 'coindata_configured=yes' in optional_service_config.stdout_lines }}"
        pbgui_enabled_services: "{{ ['pbrun'] + (['pbremote'] if ('pbremote_configured=yes' in optional_service_config.stdout_lines) else []) + (['pbcoindata'] if ('coindata_configured=yes' in optional_service_config.stdout_lines) else []) }}"
        systemd_units: "{{ ['pbgui-pbrun.service'] + (['pbgui-pbremote.service'] if ('pbremote_configured=yes' in optional_service_config.stdout_lines) else []) + (['pbgui-pbcoindata.service'] if ('coindata_configured=yes' in optional_service_config.stdout_lines) else []) }}"

    - name: copy systemd setup helper
      copy:
        src: setup/setup_systemd.sh
        dest: "{{ pbgui_dir }}/setup/setup_systemd.sh"
        mode: "0755"

    - name: copy systemd-aware starter helper
      copy:
        src: starter.py
        dest: "{{ pbgui_dir }}/starter.py"
        mode: "0755"

    - name: preinstall PBGui systemd user units without starting services
      command:
        argv:
          - /bin/bash
          - "{{ pbgui_dir }}/setup/setup_systemd.sh"
          - --user
          - "{{ user }}"
          - --pbgui-dir
          - "{{ pbgui_dir }}"
          - --python
          - "{{ python_bin }}"
          - --enable
          - "{{ pbgui_enabled_services | join(',') }}"
          - --include-pbremote
          - --no-start
      become: yes
      register: systemd_preinstall_result

    - name: stop existing PBGui systemd user services before migration
      shell: |
        uid="$(id -u {{ user | quote }})"
        for unit in {{ all_systemd_units | join(' ') }}; do
          sudo -H -u {{ user | quote }} env XDG_RUNTIME_DIR="/run/user/${uid}" systemctl --user stop "$unit" >/dev/null 2>&1 || true
        done
      args:
        executable: /bin/bash
      become: yes
      changed_when: false

    - name: stop remaining legacy PBGui processes
      shell: |
        PBGUI_MIGRATION_DIR={{ pbgui_dir | quote }} python3 - <<'PY'
        import os
        import signal
        import sys
        import time
        from pathlib import Path

        target_dir = os.path.realpath(os.environ['PBGUI_MIGRATION_DIR'])
        target_prefix = target_dir + os.sep
        scripts = ('PBRun.py', 'PBRemote.py', 'PBCoinData.py', 'starter.py')
        pidfiles = {
            'PBRun.py': 'pbrun.pid',
            'PBRemote.py': 'pbremote.pid',
            'PBCoinData.py': 'pbcoindata.pid',
        }
        current = os.getpid()

        def read_process(pid):
            try:
                with open(f'/proc/{pid}/cmdline', 'rb') as handle:
                    cmd = handle.read().replace(b'\0', b' ').decode('utf-8', errors='replace').strip()
            except Exception:
                cmd = ''
            try:
                cwd = os.path.realpath(os.readlink(f'/proc/{pid}/cwd'))
            except Exception:
                cwd = ''
            return cmd, cwd

        def matching_script(cmd):
            for script in scripts:
                if script in cmd:
                    return script
            return None

        def is_target_process(pid):
            if pid == current:
                return False
            cmd, cwd = read_process(pid)
            if not cmd or not matching_script(cmd):
                return False
            return target_prefix in cmd or cwd == target_dir

        def collect_targets():
            targets = set()
            for name in os.listdir('/proc'):
                if not name.isdigit():
                    continue
                pid = int(name)
                if is_target_process(pid):
                    targets.add(pid)

            pid_dir = Path(target_dir) / 'data' / 'pid'
            for script, pidfile in pidfiles.items():
                path = pid_dir / pidfile
                try:
                    raw = path.read_text(encoding='utf-8').strip()
                    pid = int(raw) if raw.isdigit() else 0
                except Exception:
                    continue
                if pid > 0 and is_target_process(pid):
                    cmd, _cwd = read_process(pid)
                    if matching_script(cmd) == script:
                        targets.add(pid)
            return targets

        def signal_targets(targets, sig):
            for pid in targets:
                try:
                    os.kill(pid, sig)
                except ProcessLookupError:
                    pass

        targets = collect_targets()
        signal_targets(targets, signal.SIGTERM)
        deadline = time.monotonic() + 8
        remaining = collect_targets()
        while remaining and time.monotonic() < deadline:
            time.sleep(0.5)
            remaining = collect_targets()
        if remaining:
            signal_targets(remaining, signal.SIGKILL)
            deadline = time.monotonic() + 3
            while remaining and time.monotonic() < deadline:
                time.sleep(0.25)
                remaining = collect_targets()
        if remaining:
            print('legacy_processes_remaining=' + ','.join(str(pid) for pid in sorted(remaining)))
            sys.exit(1)

        removed_pidfiles = 0
        pid_dir = Path(target_dir) / 'data' / 'pid'
        for pidfile in pidfiles.values():
            path = pid_dir / pidfile
            if not path.exists():
                continue
            try:
                raw = path.read_text(encoding='utf-8').strip()
                pid = int(raw) if raw.isdigit() else 0
            except Exception:
                pid = 0
            if not pid or not is_target_process(pid):
                path.unlink(missing_ok=True)
                removed_pidfiles += 1
        print(f'legacy_processes={len(targets)} removed_pidfiles={removed_pidfiles}')
        PY
      args:
        executable: /bin/bash
      register: legacy_process_stop
      changed_when: "'legacy_processes=0 removed_pidfiles=0' not in legacy_process_stop.stdout"

    - name: install and start PBGui systemd user services
      command:
        argv:
          - /bin/bash
          - "{{ pbgui_dir }}/setup/setup_systemd.sh"
          - --user
          - "{{ user }}"
          - --pbgui-dir
          - "{{ pbgui_dir }}"
          - --python
          - "{{ python_bin }}"
          - --enable
          - "{{ pbgui_enabled_services | join(',') }}"
          - --include-pbremote
      become: yes
      register: systemd_setup_result

    - name: verify PBGui systemd services stay active
      shell: |
        uid="$(id -u {{ user | quote }})"
        units=({{ systemd_units | join(' ') }})
        run_systemctl() {
          sudo -H -u {{ user | quote }} env XDG_RUNTIME_DIR="/run/user/${uid}" systemctl --user "$@"
        }
        show_prop() {
          run_systemctl show "$1" -p "$2" --value 2>/dev/null || true
        }
        declare -A restarts_before
        for unit in "${units[@]}"; do
          restarts_before["$unit"]="$(show_prop "$unit" NRestarts)"
          [[ "${restarts_before[$unit]}" =~ ^[0-9]+$ ]] || restarts_before["$unit"]=0
        done
        sleep 12
        failed=0
        for unit in "${units[@]}"; do
          active="$(show_prop "$unit" ActiveState)"
          sub="$(show_prop "$unit" SubState)"
          result="$(show_prop "$unit" Result)"
          status="$(show_prop "$unit" ExecMainStatus)"
          restarts_after="$(show_prop "$unit" NRestarts)"
          [[ "$restarts_after" =~ ^[0-9]+$ ]] || restarts_after=0
          printf 'unit=%s active=%s sub=%s result=%s status=%s restarts_before=%s restarts_after=%s\n' "$unit" "$active" "$sub" "$result" "$status" "${restarts_before[$unit]}" "$restarts_after"
          if [ "$active" != "active" ] || [ "$sub" != "running" ] || [ "$result" != "success" ] || [ "${status:-0}" != "0" ] || [ "$restarts_after" -gt "${restarts_before[$unit]}" ]; then
            run_systemctl status "$unit" --no-pager -l || true
            failed=1
          fi
        done
        exit "$failed"
      args:
        executable: /bin/bash
      become: yes
      register: systemd_active_result
      changed_when: false

    - name: remove Ansible-managed legacy pbgui crontab entry
      cron:
        name: "pbgui"
        state: absent

    - name: remove legacy pbgui start.sh crontab lines
      shell: |
        PBGUI_MIGRATION_DIR={{ pbgui_dir | quote }} PBGUI_MIGRATION_USER={{ user | quote }} python3 - <<'PY'
        import os
        import pwd
        import subprocess

        pbgui_dir = os.path.realpath(os.environ['PBGUI_MIGRATION_DIR'])
        user = os.environ['PBGUI_MIGRATION_USER']
        home = pwd.getpwnam(user).pw_dir
        legacy_start = f'{pbgui_dir}/start.sh'
        tokens = {legacy_start}
        if legacy_start.startswith(home.rstrip('/') + '/'):
            rel = legacy_start[len(home.rstrip('/')) + 1:]
            tokens.update({f'~/{rel}', '$HOME/' + rel, '$' + '{HOME}/' + rel})

        result = subprocess.run(['crontab', '-l'], text=True, capture_output=True, check=False)
        lines = result.stdout.splitlines()
        kept = []
        changed = False
        skip_next = False
        for line in lines:
            if line.strip() == '#Ansible: pbgui':
                skip_next = True
                changed = True
                continue
            if skip_next:
                skip_next = False
                changed = True
                continue
            if any(token in line for token in tokens):
                changed = True
                continue
            kept.append(line)
        if changed:
            new_crontab = '\n'.join(kept)
            if new_crontab:
                new_crontab += '\n'
            subprocess.run(['crontab', '-'], input=new_crontab, text=True, check=True)
            print('changed=1')
        else:
            print('changed=0')
        PY
      args:
        executable: /bin/bash
      register: legacy_crontab_cleanup
      changed_when: "'changed=1' in legacy_crontab_cleanup.stdout"

    - name: delete legacy start.sh
      file:
        path: "{{ pbgui_dir }}/start.sh"
        state: absent

    - name: print systemd setup result
      debug:
        var: systemd_setup_result
      tags: debug,never

    - name: print systemd preinstall result
      debug:
        var: systemd_preinstall_result
      tags: debug,never

    - name: print systemd active result
      debug:
        var: systemd_active_result
      tags: debug,never
