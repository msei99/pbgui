---
# Update pbgui on VPS
# Steps:
# 1. Clone pbgui repository
# 2. Sync PBGui systemd units and restart PBCluster, PBRun, PBCoinData and PBMonitorAgent if pbgui repository was updated

- hosts: "{{ hostname }}"
  gather_facts: yes
  force_handlers: true

  vars:
    # ansible_ssh_pass: "{{ user_pw }}"
    # ansible_become_password: "{{ user_pw }}"
    # user_pw: "{{ user_pw }}"
    install_dir: "{{ install_dir | default(ansible_facts['env']['HOME'] + '/software') }}"

  tasks:
    - name: display facts
      debug:
        var: ansible_facts
      tags: debug,never

    - name: Get current branch
      command: git rev-parse --abbrev-ref HEAD
      args:
        chdir: "{{ install_dir }}/pbgui"
      register: current_branch
      changed_when: false

    - name: clone pbgui repository
      git:
        repo: https://github.com/msei99/pbgui.git
        dest: "{{ install_dir }}/pbgui"
        version: "{{ current_branch.stdout }}"
        refspec: "+refs/heads/{{ current_branch.stdout }}:refs/remotes/origin/{{ current_branch.stdout }}"
        update: yes
        force: yes
      register: pbgui_repo

    - name: Reconcile pbgui requirements
      pip:
        virtualenv: "{{ install_dir }}/venv_pbgui"
        requirements: "{{ install_dir }}/pbgui/requirements_vps.txt"
        extra_args: --no-cache-dir --upgrade pip
      environment:
        PIP_NO_CACHE_DIR: "1"
        PIP_DISABLE_PIP_VERSION_CHECK: "1"
      register: pbgui_requirements

    - name: Schedule PBGui restart after successful update
      command: /bin/true
      changed_when: (pbgui_repo.changed | default(false)) or (pbgui_requirements.changed | default(false))
      notify: restart pbgui

    - name: print pbgui_repo
      debug:
        var: pbgui_repo
      tags: debug,never

    - name: Build enabled PBGui service list
      set_fact:
        pbgui_credential_capability_known: "{{ credential_active is defined and credential_active is not none }}"
        pbgui_enabled_services: "{{ ['pbcluster', 'pbrun', 'monitor-agent'] + (['pbcoindata'] if (credential_active | default(false) | default(false, true)) else []) + (['api'] if (pbgui_role | default('') | lower) == 'master' else []) }}"

    - name: Reconcile PBGui systemd user services
      command:
        argv: "{{ ['/bin/bash', install_dir + '/pbgui/setup/setup_systemd.sh', '--user', user, '--pbgui-dir', install_dir + '/pbgui', '--python', install_dir + '/venv_pbgui/bin/python', '--enable', pbgui_enabled_services | join(',')] + (['--no-start'] if (pbgui_role | default('') | string | lower) == 'master' else []) + ([] if pbgui_credential_capability_known else ['--no-disable-excluded']) }}"
      register: systemd_reconcile_result
      changed_when: "'changed=true' in (systemd_reconcile_result.stdout | default(''))"

    - name: Check whether master monitor-agent needs recovery
      command:
        argv:
          - systemctl
          - --user
          - is-active
          - --quiet
          - pbgui-monitor-agent.service
      register: monitor_agent_before
      changed_when: false
      failed_when: false
      when: (pbgui_role | default('') | string | lower) == 'master'

    - name: Recover and verify master monitor-agent without touching PBApiServer
      script: setup/vps_service_control.sh start PBMonitorAgent
      environment:
        PBGUI_DIR: "{{ install_dir }}/pbgui"
        PBGUI_PYTHON: "{{ install_dir }}/venv_pbgui/bin/python"
        PBGUI_USER: "{{ user }}"
      register: monitor_agent_recovery
      changed_when: monitor_agent_before.rc != 0
      when: (pbgui_role | default('') | string | lower) == 'master'

  handlers:
    - name: Remove pip cache directory
      file:
        path: "{{ install_dir | dirname }}/.cache/pip"
        state: absent
      listen: "restart pbgui"

    - name: Ensure PBCluster SSH key exists
      command:
        argv:
          - "{{ install_dir }}/venv_pbgui/bin/python"
          - "{{ install_dir }}/pbgui/cluster_ssh_setup.py"
          - ensure-local
          - --pbgdir
          - "{{ install_dir }}/pbgui"
      register: cluster_sync_key_setup
      changed_when: "'\"created\": true' in cluster_sync_key_setup.stdout"
      listen: "restart pbgui"

    - name: Install master PBCluster authorized key
      command:
        argv:
          - "{{ install_dir }}/venv_pbgui/bin/python"
          - "{{ install_dir }}/pbgui/cluster_ssh_setup.py"
          - install-authorized-key
          - --pbgdir
          - "{{ install_dir }}/pbgui"
          - --source-node
          - "{{ cluster_sync_source_node_id }}"
          - --source-public-key
          - "{{ cluster_sync_source_public_key }}"
      register: cluster_sync_authorized_key
      changed_when: "'\"changed\": true' in cluster_sync_authorized_key.stdout"
      when: (cluster_sync_source_node_id | default('') | string | length) > 0 and (cluster_sync_source_public_key | default('') | string | length) > 0
      listen: "restart pbgui"

    - name: Sync PBGui systemd user services
      command:
        argv: "{{ ['/bin/bash', install_dir + '/pbgui/setup/setup_systemd.sh', '--user', user, '--pbgui-dir', install_dir + '/pbgui', '--python', install_dir + '/venv_pbgui/bin/python', '--enable', pbgui_enabled_services | join(','), '--no-start'] + ([] if pbgui_credential_capability_known else ['--no-disable-excluded']) }}"
      register: systemd_setup_result
      changed_when: "'changed=true' in (systemd_setup_result.stdout | default(''))"
      listen: "restart pbgui"

    - name: Restart PBCluster, PBRun, PBCoinData and PBMonitorAgent
      script: setup/vps_service_control.sh restart PBCluster PBRun PBCoinData PBMonitorAgent
      environment:
        PBGUI_DIR: "{{ install_dir }}/pbgui"
        PBGUI_PYTHON: "{{ install_dir }}/venv_pbgui/bin/python"
        PBGUI_USER: "{{ user }}"
        PBGUI_CREDENTIAL_ACTIVE: "{{ credential_active | default('', true) }}"
      register: pbgui_process_health
      retries: 8
      delay: 3
      until: pbgui_process_health.rc == 0
      listen: "restart pbgui"

    - name: Restart remote master PBApiServer
      shell: |
        set -euo pipefail
        restart_unit="pbgui-api-restart-$(date +%s%N)"
        systemd-run --user --unit="$restart_unit" --collect /bin/bash -c '
          sleep 1
          systemctl --user enable pbgui-api.service
          if ! systemctl --user restart pbgui-api.service; then
            systemctl --user show pbgui-api.service --no-pager --property=ActiveState,SubState,Result,ExecMainStatus,NRestarts
            systemctl --user status pbgui-api.service --no-pager -l
            exit 1
          fi
          baseline="$(systemctl --user show pbgui-api.service --property=NRestarts --value)"
          case "$baseline" in ""|*[!0-9]*) baseline=0 ;; esac
          sleep 12
          active="$(systemctl --user show pbgui-api.service --property=ActiveState --value)"
          sub="$(systemctl --user show pbgui-api.service --property=SubState --value)"
          result="$(systemctl --user show pbgui-api.service --property=Result --value)"
          status="$(systemctl --user show pbgui-api.service --property=ExecMainStatus --value)"
          after="$(systemctl --user show pbgui-api.service --property=NRestarts --value)"
          case "$after" in ""|*[!0-9]*) after=0 ;; esac
          if [ "$active" != active ] || [ "$sub" != running ] || [ "$result" != success ] || [ "${status:-0}" != 0 ] || [ "$after" -gt "$baseline" ]; then
            systemctl --user show pbgui-api.service --no-pager --property=ActiveState,SubState,Result,ExecMainStatus,NRestarts
            systemctl --user status pbgui-api.service --no-pager -l
            exit 1
          fi
        '
      args:
        executable: /bin/bash
      changed_when: true
      when: (pbgui_role | default('') | string | lower) == 'master'
      listen: "restart pbgui"
