---
# Setup for VPS
# Steps:
# 1. Get local home
# 2. Get remote home and install_dir
# 3. Configure Firewall
# 4. Update Server
# 5. Reboot if required
# 6. Create swapfile
# 7. Install git, python3.12, rustc, cargo
# 8. Clone pbgui repository
# 9. Clone passivbot repository for pb7
# 10. Create python3.12 venv for pbgui
# 11. Create python3.12 venv for pb7
# 12. Build passivbot-rust with maturin
# 13. Setup pbgui
# 14. Install and start PBGui systemd user services

- hosts: "{{ hostname }}"
  gather_facts: yes

  vars:
    ansible_ssh_pass: "{{ user_pw }}"
    ansible_become_password: "{{ user_pw }}"
    user: "{{ user }}"
    user_pw: "{{ user_pw }}"
    swap_size: "{{ swap_size }}"
    firewall: "{{ firewall }}"
    firewall_ssh_port: "{{ firewall_ssh_port }}"
    firewall_ssh_ips: "{{ firewall_ssh_ips }}"
    pb7_ref: "{{ lookup('file', playbook_dir + '/pb7_ref.txt') | trim }}"

  tasks:
    - name: display facts
      debug:
        var: ansible_facts
      tags: debug,never

    - name: get local_home
      set_fact:
        local_home: "{{ lookup('env', 'HOME') }}"
      delegate_to: localhost
    
    - name: print local home
      debug:
        var: local_home
      tags: debug,never

    - name: get remote_home and install_dir
      set_fact:
        remote_home: "{{ ansible_facts['env']['HOME'] }}"
        install_dir: "{{ install_dir | default(ansible_facts['env']['HOME'] + '/software') }}"

    - name: create install directory
      file:
        path: "{{ install_dir }}"
        state: directory
        owner: "{{ user }}"
        mode: "0755"
      become: yes
    
    - name: print install_dir
      debug:
        var: install_dir
      tags: debug,never

    - name: configure Firewall
      block:
        - name: Disable IPv6
          lineinfile:
            dest: /etc/default/ufw
            regexp: '^IPV6='
            line: "IPV6=no"
            state: present

        - name: reset ufw to default
          ufw:
            state: reset

        - name: allow ssh from any ipv4
          ufw:
            rule: allow
            port: "{{ firewall_ssh_port }}"
            proto: tcp
            direction: in
            state: enabled
            log: yes
            from: "0.0.0.0/0"
            to: "0.0.0.0/0"
          when: firewall_ssh_ips == ""
        
        - name: allow ssh from specific IPs
          ufw:
            rule: allow
            port: "{{ firewall_ssh_port }}"
            proto: tcp
            direction: in
            state: enabled
            log: yes
            from_ip: "{{ item }}"
          loop: "{{ firewall_ssh_ips }}"
          when: firewall_ssh_ips != ""
      become: yes
      when: firewall

    - name: disable ufw
      ufw:
        state: disabled
      become: yes
      when: not firewall

    - name: update server
      apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600
        autoremove: yes
        autoclean: yes
        clean: yes
        force_apt_get: yes
      become: yes
      register: update_result

    - name: print update result
      debug:
        var: update_result.stdout_lines

    - name: Check if reboot required
      stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Reboot if required
      reboot:
        msg: "Rebooting machine in 5 seconds"
      when: reboot_required_file.stat.exists == true
      become: yes
  
    - name: check if swapfile exists
      stat:
        path: /swapfile
      register: swapfile_status

    - name: print swapfile status
      debug:
        var: swapfile_status.stat.exists
      tags: debug,never

    - name: create swapfile block
      block:
        - name: create swapfile if it does not exist
          command: fallocate -l {{ swap_size }} /swapfile
        
        - name: Set permissions on swapfile
          command: chmod 600 /swapfile

        - name: Make swapfile
          command: mkswap /swapfile
        
        - name: Enable swapfile
          command: swapon /swapfile
        
        - name: Add swapfile to fstab
          mount:
            name: /swapfile
            src: /swapfile
            fstype: swap
            opts: sw
            state: present
        
        - name: swappiness
          sysctl:
            name: vm.swappiness
            value: 10
            state: present
        
        - name: vfs_cache_pressure
          sysctl:
            name: vm.vfs_cache_pressure
            value: 50
            state: present
      become: yes
      when: swapfile_status.stat.exists == false
      
    - name: Read the current /etc/default/grub content
      ansible.builtin.slurp:
        src: /etc/default/grub
      register: grub_content_b64

    - name: Set the current line variable
      set_fact:
        current_grub_content: "{{ grub_content_b64.content | b64decode }}"

    - name: Extract current GRUB_CMDLINE_LINUX value
      set_fact:
        current_cmdline: "{{ current_grub_content | regex_search('^GRUB_CMDLINE_LINUX=\"([^\"]*)\"', '\\1', multiline=True) | join(' ') }}"

    - name: Ensure 'ipv6.disable=1' is present in the cmdline
      set_fact:
        new_cmdline: >-
          {% if current_cmdline is defined and 'ipv6.disable=1' not in current_cmdline %}
            {{ current_cmdline }} ipv6.disable=1
          {% elif current_cmdline is undefined %}
            ipv6.disable=1
          {% else %}
            {{ current_cmdline }}
          {% endif %}

    - name: Clean up new_cmdline
      set_fact:
        new_cmdline: "{{ new_cmdline | trim }}"

    - name: Replace the line in /etc/default/grub
      ansible.builtin.replace:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX="[^"]*"'
        replace: 'GRUB_CMDLINE_LINUX="{{ new_cmdline }}"'
      when: new_cmdline is defined
      become: yes

    - name: Update GRUB configuration
      command: update-grub
      become: yes

    - name: Check if python3.12-venv is available from current apt sources
      command: apt-cache policy python3.12-venv
      register: python312_venv_policy
      changed_when: false
      failed_when: false

    - name: Add deadsnakes/ppa for installing python3.12 only when distro does not provide it
      apt_repository:
        repo: ppa:deadsnakes/ppa
        update_cache: yes
      become: yes
      when: python312_venv_policy.stdout is search('(?m)^\s*Candidate:\s*\(none\)\s*$')

    - name: Install git, python3.12 and gcc
      apt:
        pkg:
        - git
        - python3.12-venv
        - gcc
        clean: yes
      become: yes

    - name: Install rustup
      apt:
        pkg:
        - rustup
        clean: yes
      become: yes

    - name: remove stable toolchain if exists
      shell: rustup toolchain uninstall stable 1.78.0
      ignore_errors: yes

    - name: Update rust
      shell: rustup update 1.90.0

    - name: clone pbgui repository
      git:
        repo: https://github.com/msei99/pbgui.git
        dest: "{{ install_dir }}/pbgui"
        version: main
        update: yes

    - name: Validate pinned PB7 commit
      assert:
        that:
          - pb7_ref is match('^[0-9a-f]{40}$')
        fail_msg: "pb7_ref.txt must contain one exact lowercase 40-character commit SHA."

    - name: Check for existing PB7 checkout
      stat:
        path: "{{ install_dir }}/pb7/.git"
      register: pb7_git_dir

    - name: Verify pinned PB7 commit before changing an existing runtime
      command:
        argv:
          - python3
          - "{{ install_dir }}/pbgui/pb7_guard.py"
          - --repo
          - "{{ install_dir }}/pb7"
          - --ref
          - "{{ pb7_ref }}"
          - --expected-major
          - "7"
          - --fetch-url
          - https://github.com/enarjord/passivbot.git
      changed_when: false
      when: pb7_git_dir.stat.exists

    - name: Stop PBRun before replacing an existing PB7 runtime
      script: setup/vps_service_control.sh stop PBRun
      environment:
        PBGUI_DIR: "{{ install_dir }}/pbgui"
        PBGUI_PYTHON: "{{ install_dir }}/venv_pbgui/bin/python"
        PBGUI_USER: "{{ user }}"
      changed_when: false
      ignore_errors: yes
      when: pb7_git_dir.stat.exists

    - name: Stop processes from the existing PB7 runtime
      command:
        argv:
          - python3
          - "{{ install_dir }}/pbgui/pb7_guard.py"
          - --repo
          - "{{ install_dir }}/pb7"
          - --ref
          - "{{ pb7_ref }}"
          - --expected-major
          - "7"
          - --stop-processes
          - --venv
          - "{{ install_dir }}/venv_pb7"
      changed_when: false
      when: pb7_git_dir.stat.exists

    - name: Clone Passivbot without checking out upstream master
      command:
        argv:
          - git
          - clone
          - --no-checkout
          - https://github.com/enarjord/passivbot.git
          - "{{ install_dir }}/pb7"
      when: not pb7_git_dir.stat.exists

    - name: Fetch, verify and checkout pinned Passivbot v7
      command:
        argv:
          - python3
          - "{{ install_dir }}/pbgui/pb7_guard.py"
          - --repo
          - "{{ install_dir }}/pb7"
          - --ref
          - "{{ pb7_ref }}"
          - --expected-major
          - "7"
          - --fetch-url
          - https://github.com/enarjord/passivbot.git
          - --checkout
      changed_when: false

    - name: create python3.12 venv for pbgui
      pip:
        virtualenv_command: python3.12 -m venv
        virtualenv: "{{ install_dir }}/venv_pbgui"
        requirements: "{{ install_dir }}/pbgui/requirements_vps.txt"
        extra_args: --no-cache-dir --upgrade pip
      environment:
        PIP_NO_CACHE_DIR: "1"
        PIP_DISABLE_PIP_VERSION_CHECK: "1"

    - name: create python3.12 venv for pb7
      pip:
        virtualenv_command: python3.12 -m venv
        virtualenv: "{{ install_dir }}/venv_pb7"
        requirements: "{{ install_dir }}/pb7/requirements-live.txt"
        extra_args: --no-cache-dir
      environment:
        PIP_NO_CACHE_DIR: "1"
        PIP_DISABLE_PIP_VERSION_CHECK: "1"
    
    - name: Build passivbot-rust with maturin
      command:
        argv:
          - "{{ install_dir }}/venv_pb7/bin/maturin"
          - develop
          - --release
      args:
        chdir: "{{ install_dir }}/pb7/passivbot-rust"
      register: maturin_result

    - name: Write rust source stamp after maturin build
      command:
        argv:
          - "{{ install_dir }}/venv_pb7/bin/python"
          - -c
          - |
            import sys
            sys.path.insert(0, 'src')
            from rust_utils import stamp_compiled_extensions, source_fingerprint
            stamp_compiled_extensions(source_fingerprint())
            print('Rust source stamp updated.')
      args:
        chdir: "{{ install_dir }}/pb7"

    - name: remove pip cache directory
      file:
        path: "{{ remote_home }}/.cache/pip"
        state: absent

    - name: Ensure PBCluster SSH key exists
      command:
        argv:
          - "{{ install_dir }}/venv_pbgui/bin/python"
          - "{{ install_dir }}/pbgui/cluster_ssh_setup.py"
          - ensure-local
          - --pbgdir
          - "{{ install_dir }}/pbgui"
      register: cluster_sync_key_setup
      changed_when: "'\"created\": true' in cluster_sync_key_setup.stdout"

    - name: Install master PBCluster authorized key
      command:
        argv:
          - "{{ install_dir }}/venv_pbgui/bin/python"
          - "{{ install_dir }}/pbgui/cluster_ssh_setup.py"
          - install-authorized-key
          - --pbgdir
          - "{{ install_dir }}/pbgui"
          - --source-node
          - "{{ cluster_sync_source_node_id }}"
          - --source-public-key
          - "{{ cluster_sync_source_public_key }}"
      register: cluster_sync_authorized_key
      changed_when: "'\"changed\": true' in cluster_sync_authorized_key.stdout"
      when: (cluster_sync_source_node_id | default('') | string | length) > 0 and (cluster_sync_source_public_key | default('') | string | length) > 0

    - name: clean apt package cache after setup
      apt:
        autoremove: yes
        autoclean: yes
        clean: yes
      become: yes

    - name: print maturin result
      debug:
        var: maturin_result
      tags: debug,never

    - name: remove legacy pbgui crontab entry
      cron:
        name: "pbgui"
        state: absent

    - name: remove legacy start.sh
      file:
        path: "{{ install_dir }}/pbgui/start.sh"
        state: absent
    
    - name: check whether pbgui.ini already exists
      stat:
        path: "{{ install_dir }}/pbgui/pbgui.ini"
      register: pbgui_ini_stat

    - name: create pbgui.ini from the example only when absent
      copy:
        src: "{{ install_dir }}/pbgui/pbgui.ini.example"
        dest: "{{ install_dir }}/pbgui/pbgui.ini"
        remote_src: true
        force: false
        mode: preserve
      when: not pbgui_ini_stat.stat.exists
    
    - name: edit pbgui.ini
      replace:
        path: "{{ install_dir }}/pbgui/pbgui.ini"
        regexp: "{{ item.regexp }}"
        replace: "{{ item.replace }}"
      loop:
        - { regexp: '<hostname>', replace: "{{ hostname }}" }
        - { regexp: '<install_dir>', replace: "{{ install_dir }}" }

    - name: store firewall config in pbgui.ini
      ini_file:
        path: "{{ install_dir }}/pbgui/pbgui.ini"
        section: firewall
        option: "{{ item.option }}"
        value: "{{ item.value }}"
      loop:
        - option: enabled
          value: "{{ (firewall | bool) | ternary('true', 'false') }}"
        - option: ssh_port
          value: "{{ firewall_ssh_port | default(22) }}"
        - option: ssh_ips
          value: "{{ firewall_ssh_ips if firewall_ssh_ips is string else (firewall_ssh_ips | default([]) | reject('equalto', '') | list | join(',')) }}"

    - name: Build enabled PBGui service list
      set_fact:
        pbgui_credential_capability_known: "{{ credential_active is defined and credential_active is not none }}"
        pbgui_enabled_services: "{{ ['pbcluster', 'pbrun', 'monitor-agent'] + (['pbcoindata'] if (credential_active | default(false) | default(false, true)) else []) }}"
        systemd_units: "{{ ['pbgui-pbcluster.service', 'pbgui-pbrun.service', 'pbgui-monitor-agent.service'] + (['pbgui-pbcoindata.service'] if (credential_active | default(false) | default(false, true)) else []) }}"

    - name: apply VPS logging max bytes
      ini_file:
        path: "{{ install_dir }}/pbgui/pbgui.ini"
        section: logging
        option: "rotate_{{ (item.service | lower | regex_replace('[^a-z0-9]+', '_') | trim('_')) }}_max_bytes"
        value: "{{ ((item.max_mb | float) * 1024 * 1024) | round(0, 'floor') | int }}"
        no_extra_spaces: true
      loop: "{{ vps_logging_services | default([]) }}"

    - name: apply VPS logging backup count
      ini_file:
        path: "{{ install_dir }}/pbgui/pbgui.ini"
        section: logging
        option: "rotate_{{ (item.service | lower | regex_replace('[^a-z0-9]+', '_') | trim('_')) }}_backup_count"
        value: "0"
        no_extra_spaces: true
      loop: "{{ vps_logging_services | default([]) }}"
    
    - name: install and start PBGui systemd user services
      command:
        argv: "{{ ['/bin/bash', install_dir + '/pbgui/setup/setup_systemd.sh', '--user', user, '--pbgui-dir', install_dir + '/pbgui', '--python', install_dir + '/venv_pbgui/bin/python', '--enable', pbgui_enabled_services | join(',')] + ([] if pbgui_credential_capability_known else ['--no-disable-excluded']) }}"
      become: yes
      register: systemd_setup_result
      changed_when: "'changed=true' in (systemd_setup_result.stdout | default(''))"

    - name: verify PBGui systemd services stay active
      shell: |
        uid="$(id -u "$PBGUI_SERVICE_USER")"
        read -r -a units <<< "$PBGUI_SYSTEMD_UNITS"
        run_systemctl() {
          sudo -H -u "$PBGUI_SERVICE_USER" env XDG_RUNTIME_DIR="/run/user/${uid}" systemctl --user "$@"
        }
        show_prop() {
          run_systemctl show "$1" -p "$2" --value 2>/dev/null || true
        }
        declare -A restarts_before
        for unit in "${units[@]}"; do
          restarts_before["$unit"]="$(show_prop "$unit" NRestarts)"
          [[ "${restarts_before[$unit]}" =~ ^[0-9]+$ ]] || restarts_before["$unit"]=0
        done
        sleep 12
        failed=0
        for unit in "${units[@]}"; do
          active="$(show_prop "$unit" ActiveState)"
          sub="$(show_prop "$unit" SubState)"
          result="$(show_prop "$unit" Result)"
          status="$(show_prop "$unit" ExecMainStatus)"
          restarts_after="$(show_prop "$unit" NRestarts)"
          [[ "$restarts_after" =~ ^[0-9]+$ ]] || restarts_after=0
          printf 'unit=%s active=%s sub=%s result=%s status=%s restarts_before=%s restarts_after=%s\n' "$unit" "$active" "$sub" "$result" "$status" "${restarts_before[$unit]}" "$restarts_after"
          if [ "$active" != "active" ] || [ "$sub" != "running" ] || [ "$result" != "success" ] || [ "${status:-0}" != "0" ] || [ "$restarts_after" -gt "${restarts_before[$unit]}" ]; then
            run_systemctl show "$unit" --no-pager --property=ActiveState,SubState,Result,ExecMainStatus,NRestarts || true
            run_systemctl status "$unit" --no-pager -l || true
            failed=1
          fi
        done
        exit "$failed"
      args:
        executable: /bin/bash
      environment:
        PBGUI_SERVICE_USER: "{{ user }}"
        PBGUI_SYSTEMD_UNITS: "{{ systemd_units | join(' ') }}"
      become: yes
      register: systemd_active_result
      changed_when: false

    - name: print systemd setup result
      debug:
        var: systemd_setup_result
      tags: debug,never

    - name: print systemd active result
      debug:
        var: systemd_active_result
      tags: debug,never
