---
# Switch pb7 branch/commit on localhost
# Steps:
# 1. Fetch from origin
# 2. Check for uncommitted changes (fail if found)
# 3. Checkout specified branch
# 4. Optionally hard-reset the checked out branch to a specific commit
# 5. Otherwise hard-reset the checked out branch to the selected remote head
# 6. Restart pbgui services

- hosts: localhost
  gather_facts: "{{ debug }}"

  vars:
    user: "{{ user }}"
    pbgdir: "{{ pbgdir }}"
    pbgvenv: "{{ pbgvenv }}"
    pb7dir: "{{ pb7dir }}"
    pb7venv: "{{ pb7venv }}"
    target_branch: "{{ pb7_branch }}"
    source_branch: "{{ pb7_source_branch | default(pb7_branch) }}"
    pb7_ref: "{{ lookup('file', playbook_dir + '/pb7_ref.txt') | trim }}"
    use_pinned_ref: "{{ pb7_use_pin | default(false) | bool }}"
    target_commit: "{{ pb7_ref if use_pinned_ref else (pb7_commit | default('')) }}"
    remote_name: "{{ pb7_remote_name | default('origin') }}"
    remote_url: "{{ pb7_remote_url | default('') }}"
    selected_ref: "{{ target_commit if target_commit != '' else remote_name ~ '/' ~ source_branch }}"

  tasks:
    - name: display facts
      debug:
        var: ansible_facts
      tags: debug,never

    - name: Validate pinned PB7 commit when requested
      assert:
        that:
          - pb7_ref is match('^[0-9a-f]{40}$')
        fail_msg: "pb7_ref.txt must contain one exact lowercase 40-character commit SHA."
      when: use_pinned_ref

    - name: Ensure custom remote exists (optional)
      shell: |
        set -e
        if [ -n "{{ remote_url }}" ]; then
          if git remote get-url "{{ remote_name }}" >/dev/null 2>&1; then
            git remote set-url "{{ remote_name }}" "{{ remote_url }}"
          else
            git remote add "{{ remote_name }}" "{{ remote_url }}"
          fi
        fi
      args:
        chdir: "{{ pb7dir }}"
      when: pb7dir != ""
      changed_when: false

    - name: Fetch from selected remote
      command: git fetch "{{ remote_name }}"
      args:
        chdir: "{{ pb7dir }}"
      when: pb7dir != ""
      changed_when: false

    - name: Check for uncommitted changes (tracked files only)
      shell: git diff --name-only && git diff --cached --name-only
      args:
        chdir: "{{ pb7dir }}"
      register: git_status
      changed_when: false

    - name: Fail if uncommitted changes exist
      fail:
        msg: "Uncommitted changes detected in PB7. Please commit or stash changes before switching branches."
      when: git_status.stdout != ""

    - name: Check if source branch exists on selected remote
      command: git show-ref --verify --quiet "refs/remotes/{{ remote_name }}/{{ source_branch }}"
      args:
        chdir: "{{ pb7dir }}"
      register: source_branch_exists
      failed_when: false
      changed_when: false

    - name: Fail if source branch is missing on selected remote
      fail:
        msg: "Remote branch {{ remote_name }}/{{ source_branch }} does not exist. Please choose a valid source branch before switching PB7."
      when: source_branch_exists.rc != 0

    - name: Resolve selected PB7 ref to one immutable commit
      command: git rev-parse "{{ selected_ref }}^{commit}"
      args:
        chdir: "{{ pb7dir }}"
      register: resolved_commit
      changed_when: false

    - name: Verify selected commit is Passivbot v7 before checkout
      command:
        argv:
          - python3
          - "{{ pbgdir }}/pb7_guard.py"
          - --repo
          - "{{ pb7dir }}"
          - --ref
          - "{{ resolved_commit.stdout }}"
          - --expected-major
          - "7"
      register: pb7_preflight
      changed_when: false

    - name: Stop PBRun before changing PB7 checkout
      command:
        argv:
          - "{{ pbgui_python | default(ansible_playbook_python) }}"
          - "{{ pbgdir }}/starter.py"
          - --stop
          - PBRun
      changed_when: false
      when: "'checkout_required=true' in pb7_preflight.stdout"

    - name: Stop PB7 processes before changing checkout
      command:
        argv:
          - python3
          - "{{ pbgdir }}/pb7_guard.py"
          - --repo
          - "{{ pb7dir }}"
          - --ref
          - "{{ resolved_commit.stdout }}"
          - --expected-major
          - "7"
          - --stop-processes
          - --venv
          - "{{ pb7venv }}"
      changed_when: false
      when: "'checkout_required=true' in pb7_preflight.stdout"

    - name: Checkout target branch directly at verified commit
      command: git checkout -B "{{ target_branch }}" "{{ resolved_commit.stdout }}"
      args:
        chdir: "{{ pb7dir }}"
      register: checkout_result
      notify: restart pb7

    - name: Set target branch upstream
      command: git branch --set-upstream-to "{{ remote_name }}/{{ source_branch }}" "{{ target_branch }}"
      args:
        chdir: "{{ pb7dir }}"
      changed_when: false

    - name: Display checkout result
      debug:
        msg: |
          PB7 Target Branch: {{ target_branch }}
          PB7 Source Branch: {{ remote_name }}/{{ source_branch }}
          PB7 Commit: {{ target_commit if target_commit != '' else 'HEAD' }}
          Status: Switched successfully
      tags: debug,never

  handlers:
    - name: Stop PBRun before PB7 rebuild
      command:
        argv:
          - "{{ pbgui_python | default(ansible_playbook_python) }}"
          - "{{ pbgdir }}/starter.py"
          - --stop
          - PBRun
      changed_when: false
      listen: "restart pb7"
      ignore_errors: yes

    - name: kill all pb7 processes
      shell: |
        pids="$({
          ps -ef | grep "{{ pb7dir }}/src/main.py" | grep -v grep | awk '{print $2}'
          ps -ef | grep "{{ pb7venv }}/bin/python" | grep -v grep | awk '{print $2}'
        } | sort -u)"
        if [ -n "$pids" ]; then
          kill $pids
        fi
      args:
        executable: /bin/bash
      changed_when: false
      listen: "restart pb7"
      ignore_errors: yes

    - name: Install pb7 requirements
      pip:
        requirements: "{{ pb7dir }}/requirements.txt"
        virtualenv: "{{ pb7venv }}"
        extra_args: --upgrade pip
      listen: "restart pb7"

    - name: Build passivbot-rust with maturin
      shell: |
        source ~/.profile || source ~/.bashrc || true
        source "{{ pb7venv }}/bin/activate"
        maturin develop --release
      args:
        chdir: "{{ pb7dir }}/passivbot-rust"
        executable: /bin/bash
      register: maturin_result
      listen: "restart pb7"

    - name: Write rust source stamp after maturin build
      shell: |
        source "{{ pb7venv }}/bin/activate"
        python - <<'PY'
        import sys
        sys.path.insert(0, 'src')
        from rust_utils import stamp_compiled_extensions, source_fingerprint
        stamp_compiled_extensions(source_fingerprint())
        print('Rust source stamp updated.')
        PY
      args:
        chdir: "{{ pb7dir }}"
        executable: /bin/bash
      listen: "restart pb7"

    - name: Make sure PBRun ist running
      shell: |
        "{{ pbgui_python | default(ansible_playbook_python) }}" "{{ pbgdir }}/starter.py" -s PBRun
      args:
        executable: /bin/bash
        chdir: "{{ pbgdir }}"
      listen: "restart pb7"
